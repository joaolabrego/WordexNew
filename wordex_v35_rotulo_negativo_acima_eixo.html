        const jsonButton = document.querySelector('.toolbar button[aria-label="Carregar JSON"]');

        if (jsonButton) {
          jsonButton.title = this.reportDataFileName
            ? `JSON: ${this.reportDataFileName} (clique para substituir)`
            : "Abrir arquivo JSON do disco";
        }

        this.updateJsonMacroPickerTitles();
        this.updateDocumentJsonStatus();
      }

      updateJsonMacroPickerTitles() {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");

        if (collectionSelect) {
          const base = this.getReportDataRootRecord()
            ? "Coleção do JSON"
            : "Coleção do JSON (carregue o JSON com 📂)";
          const selectedCollection = String(collectionSelect.value || "").trim();

          collectionSelect.title = selectedCollection
            ? `${base} — ${selectedCollection}`
            : base;
        }

        if (fieldSelect) {
          const base = "Campo macro do JSON";
          const selectedMacro = String(fieldSelect.value || "").trim();

          if (!selectedMacro) {
            fieldSelect.title = base;
            return;
          }

          const option = fieldSelect.selectedOptions?.[0] ||
            fieldSelect.options[fieldSelect.selectedIndex];
          const label = String(option?.textContent || selectedMacro).trim();

          fieldSelect.title = `${base} — ${label}`;
        }
      }

      updateDocumentJsonStatus() {
        if (document.body.classList.contains("wordex-generated-report")) {
          return;
        }

        const title = this.documentElement?.querySelector(".document-title");

        if (!title) {
          return;
        }

        let status = title.querySelector(".document-json-status");

        if (!status) {
          status = document.createElement("span");
          status.className = "document-json-status";
          title.appendChild(status);
        }

        if (this.getReportDataRootRecord()) {
          status.textContent = "";
          status.hidden = true;
          return;
        }

        status.hidden = false;
        status.textContent = "(SEM JSON)";
      }

      getSampleValueForCollection(collectionName) {
        const root = this.getReportDataRootRecord();

        if (!root) {
          return null;
        }

        const normalized = String(collectionName || "").trim();

        if (!normalized || normalized === "ROOT") {
          return root;
        }

        const directItems = root[normalized];

        if (Array.isArray(directItems) && directItems.length > 0) {
          return directItems[0];
        }

        return this.findNestedCollectionSample(root, normalized);
      }

      findNestedCollectionSample(root, collectionName) {
        const normalized = String(collectionName || "").trim();

        if (!normalized || !root || typeof root !== "object") {
          return null;
        }

        for (const item of this.getArrayProperties(root)) {
          if (this.isTotalCollectionName(item.name)) {
            continue;
          }

          for (const parentRecord of item.value) {
            if (!parentRecord || typeof parentRecord !== "object") {
              continue;
            }

            const nestedItems = parentRecord[normalized];

            if (Array.isArray(nestedItems) && nestedItems.length > 0) {
              return nestedItems[0];
            }
          }
        }

        return null;
      }

      isEmbeddedFkObject(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return false;
        }

        if (this.isTypedFieldValue(value) || this.isChartDataObject(value)) {
          return false;
        }

        return true;
      }

      collectContextFieldPaths(value, prefix = "") {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return [];
        }

        const paths = [];

        Object.keys(value)
          .filter(key => !key.startsWith("$"))
          .filter(key => !/_Kind$/i.test(key))
          .sort((left, right) => left.localeCompare(right, "pt"))
          .forEach(key => {
            const child = value[key];
            const path = prefix ? `${prefix}.${key}` : key;

            if (Array.isArray(child)) {
              return;
            }

            if (this.isScalarReportField(child)) {
              if (child !== null && child !== undefined) {
                paths.push(path);
              }

              return;
            }

            if (this.isEmbeddedFkObject(child)) {
              paths.push(...this.collectContextFieldPaths(child, path));
            }
          });

        return paths;
      }

      collectContextFieldNames(value) {
        return this.collectContextFieldPaths(value);
      }

      getReportFieldKindAtPath(sample, path) {
        const parts = String(path || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) {
          return "text";
        }

        const value = this.getValueByPath(sample, parts);

        if (this.isTypedFieldValue(value)) {
          return String(value.Kind || "text").toLowerCase();
        }

        return this.inferLegacyFieldKind(parts[parts.length - 1], value);
      }

      collectChartSourceNames(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return [];
        }

        return Object.keys(value)
          .filter(key => !key.startsWith("$"))
          .filter(key => !/_Kind$/i.test(key))
          .filter(key => this.isChartDataObject(value[key]))
          .sort((left, right) => left.localeCompare(right, "pt"));
      }

      getMacroFieldsForCollection(collectionName, options = null) {
        const sample = this.getSampleValueForCollection(collectionName);

        if (!sample) {
          return [];
        }

        const { mode, allowedKinds } = this.normalizeMacroFieldOptions(options);
        let rawPaths = mode === "chart"
          ? this.collectChartSourceNames(sample)
          : this.collectContextFieldNames(sample);

        const kinds = Array.isArray(allowedKinds)
          ? allowedKinds.map(kind => String(kind || "").toLowerCase()).filter(Boolean)
          : null;

        if (mode !== "chart" && kinds?.length) {
          rawPaths = rawPaths.filter(path =>
            kinds.includes(this.getReportFieldKindAtPath(sample, path))
          );
        }

        return rawPaths;
      }

      setJsonMacroKindFilter(allowedKinds) {
        this.jsonMacroKindFilter = Array.isArray(allowedKinds) ? allowedKinds : null;
        this.onJsonCollectionChange();
      }

      populateJsonMacroFieldSelect(collectionName, options = null) {
        const fieldSelect = document.getElementById("jsonMacroField");

        if (!fieldSelect) {
          return;
        }

        const sample = this.getSampleValueForCollection(collectionName);
        const previousValue = fieldSelect.value;
        const fields = this.getMacroFieldsForCollection(collectionName, options);
        const { mode } = this.normalizeMacroFieldOptions(options);

        fieldSelect.innerHTML = `<option value="">${mode === "chart" ? "Gráfico" : "Campo"}</option>`;

        fields.forEach(fieldName => {
          const option = document.createElement("option");

          option.value = fieldName;
          option.textContent = mode === "chart"
            ? `${fieldName} (chart)`
            : (sample ? this.formatMacroFieldOption(fieldName, sample) : fieldName);
          fieldSelect.appendChild(option);
        });

        fieldSelect.value = fields.includes(previousValue) ? previousValue : "";
        this.updateJsonMacroPickerTitles();
      }

      updateJsonMacroToolbar(options = {}) {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const insertButton = document.getElementById("jsonMacroInsertBtn");

        if (!collectionSelect || !fieldSelect) {
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          this.syncJsonMacroPickerForImageContext(this.getImageMacroContext(this.selectedObject));
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        if (this.syncJsonMacroPickerForTableContext(options)) {
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        if (this.isParagraphMacroToolbarActive()) {
          this.syncJsonMacroPickerForParagraphContext();
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        const root = this.getReportDataRootRecord();
        const hasData = !!root;

        this.jsonMacroKindFilter = null;

        collectionSelect.disabled = !hasData;
        fieldSelect.disabled = !hasData;

        if (insertButton) {
          insertButton.disabled = !hasData;
        }

        if (!hasData) {
          collectionSelect.innerHTML = '<option value="">Coleção</option>';
          fieldSelect.innerHTML = '<option value="">Campo</option>';
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        const collections = this.getReportDataCollections();
        const previousCollection = collectionSelect.value || "ROOT";
        const nextCollection = this.renderJsonCollectionSelect(
          collectionSelect,
          collections,
          previousCollection,
          { force: !!options.forceCollectionRebuild }
        );

        this.populateJsonMacroFieldSelect(nextCollection);
        this.updateJsonDataToolbarHint();
        this.updateToolbarContext();
      }

      onJsonCollectionChange() {
        const collectionName = document.getElementById("jsonCollection")?.value;

        if (this.isParagraphMacroToolbarActive()) {
          this.syncJsonMacroPickerForParagraphContext();
          this.updateJsonMacroPickerTitles();
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          const context = this.getImageMacroContext(this.selectedObject);

          if ((collectionName || "ROOT") !== context.collectionName) {
            this.syncJsonMacroPickerForImageContext(context);
            this.updateJsonMacroPickerTitles();
            return;
          }
        }

        if (!collectionName) {
          this.populateJsonMacroFieldSelect("ROOT");
          this.updateJsonMacroPickerTitles();
          return;
        }

        this.populateJsonMacroFieldSelect(collectionName);
        this.updateJsonMacroPickerTitles();
      }

      onJsonMacroFieldChange() {
        this.updateJsonMacroPickerTitles();

        const macroField = this.getSelectedJsonMacroName();

        if (!macroField || !this.getReportDataRootRecord()) {
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          const context = this.getImageMacroContext(this.selectedObject);
          const requestedCollection = this.getSelectedJsonCollectionName();

          if (
            context.inTableCell &&
            requestedCollection !== context.collectionName
          ) {
            this.syncJsonMacroPickerForImageContext(context);
            alert(
              `Esta imagem só aceita macros do tipo image em coleção ${context.collectionName}.`
            );
            return;
          }

          if (!context.inTableCell && requestedCollection !== "ROOT") {
            this.syncJsonMacroPickerForImageContext(context);
            alert("Esta imagem só aceita macros do tipo image em ROOT.");
            return;
          }

          this.syncJsonMacroPickerForImageContext(context);

          if (!this.isAllowedImageMacroField(macroField, context)) {
            const scopeLabel = context.inTableCell
              ? `coleção ${context.collectionName}`
              : "ROOT";

            alert(
              `Esta imagem só aceita macros do tipo image em ${scopeLabel}.`
            );
            return;
          }

          this.applyMacroFieldToImageBox(this.selectedObject, macroField);
          return;
        }

        if (this.selectedObject?.matches?.(".wordex-chart-box")) {
          this.applyMacroFieldToChartBox(this.selectedObject, macroField);
        }
      }

      getMacroInsertionContainer() {
        const selection = window.getSelection();
        const rangeFromSelection = selection?.rangeCount ? selection.getRangeAt(0) : null;
        const cellFromSelection = this.getTableCellFromRange(rangeFromSelection);
        const cellFromSavedRange = this.getTableCellFromRange(this.savedRange);

        if (cellFromSelection) {
          return cellFromSelection;
        }

        if (cellFromSavedRange) {
          return cellFromSavedRange;
        }

        const paragraphFromSelection = this.findParagraphElementFromNode(
          rangeFromSelection?.commonAncestorContainer
        );
        const paragraphFromSavedRange = this.findParagraphElementFromNode(
          this.savedRange?.commonAncestorContainer
        );
        const selectedParagraph = this.getSelectedParagraphElement();

        return paragraphFromSelection ||
          paragraphFromSavedRange ||
          selectedParagraph ||
          null;
      }

      insertMacroTextInEditableContainer(container, macroText) {
        if (!container || !macroText) {
          return false;
        }

        if (container.matches("td")) {
          container.focus();
        } else if (container.matches(".paragraph")) {
          container.focus();
        }

        const selection = window.getSelection();
        let range = null;

        if (
          selection?.rangeCount &&
          container.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          range = selection.getRangeAt(0).cloneRange();
        } else if (
          this.savedRange &&
          container.contains(this.savedRange.commonAncestorContainer)
        ) {
          range = this.savedRange.cloneRange();
        } else {
          range = document.createRange();
          range.selectNodeContents(container);
          range.collapse(false);
        }

        const rangeContainer = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;
        const objectInSelection = rangeContainer?.closest?.(WordexEditor.objectSelector);

        if (objectInSelection && container.contains(objectInSelection)) {
          range = document.createRange();
          range.setStartAfter(objectInSelection);
          range.collapse(true);
        }

        if (container.matches("td") && container.innerHTML.trim().toLowerCase() === "<br>") {
          container.innerHTML = "";
          range = document.createRange();
          range.selectNodeContents(container);
          range.collapse(false);
        }

        const textNode = document.createTextNode(macroText);
        range.insertNode(textNode);

        const caretRange = document.createRange();
        caretRange.setStartAfter(textNode);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);
        this.savedRange = caretRange.cloneRange();

        const paragraph = container.matches(".paragraph")
          ? container
          : container.closest(".paragraph");

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
          this.syncParagraphElement(paragraph);
          this.updateParagraphEmptyState(paragraph);
          this.saveUndoStateIfChanged();
        }

        return true;
      }

      insertMacroAtCaret(macroText) {
        const container = this.getMacroInsertionContainer();

        if (!container) {
          return false;
        }

        return this.insertMacroTextInEditableContainer(container, macroText);
      }

      insertSelectedJsonMacro() {
        const collectionName = this.getSelectedJsonCollectionName();
        this.populateJsonMacroFieldSelect(collectionName, {
          allowedKinds: WordexEditor.textMacroKinds
        });

        const fieldSelect = document.getElementById("jsonMacroField");

        if (!fieldSelect) {
          return;
        }

        const macroName = this.normalizeMacroName(fieldSelect.value);

        if (!macroName) {
          return;
        }

        const macroText = this.formatMacroName(macroName);
        const inserted = this.insertMacroAtCaret(macroText);

        if (!inserted) {
          alert("Coloque o cursor num parágrafo ou numa célula de tabela para inserir a macro.");
        }
      }

      loadJsonFile(file) {
        if (!file) return;

        const reader = new FileReader();
        const hadData = !!this.getReportDataRootRecord();

        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result || "").replace(/^\uFEFF/, ""));
            this.reportData = data;
            this.reportDataFileName = file.name || "JSON carregado";
            this.prefetchReportImageDataUrls(this.reportData).catch(() => {});
            this.updateJsonMacroToolbar({ forceCollectionRebuild: true });
            alert(
              hadData
                ? "JSON substituído: " + this.reportDataFileName
                : "JSON carregado: " + this.reportDataFileName
            );
          } catch (error) {
            if (!hadData) {
              this.reportData = null;
              this.reportDataFileName = "";
              this.updateJsonMacroToolbar();
            }

            alert("Erro ao carregar JSON: " + error.message);
          }
        };

        reader.onerror = () => {
          alert("Não foi possível ler o arquivo JSON.");
        };

        reader.readAsText(file, "utf-8");
      }

      escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    }

    const wordex = new WordexEditor("document");
    window.wordex = wordex;
  </script>
</body>
