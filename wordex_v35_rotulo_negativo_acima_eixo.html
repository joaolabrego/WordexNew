        return this.getTableParentDatasource(table);
      }

      getTableCollectionName(cell) {
        const table = cell?.closest?.("table.wordex-table");

        if (!table) {
          return "ROOT";
        }

        const row = cell?.closest?.("tr");

        if (row) {
          return this.getTableRowMacroCollectionName(table, row);
        }

        return this.getTableParentDatasource(table);
      }

      getImageMacroContext(target = null) {
        if (!target) {
          const cell = this.getSelectedCellForInsertion();
          const table = cell?.closest?.("table.wordex-table") || null;

          if (table) {
            return {
              collectionName: this.getTableCollectionName(cell),
              inTableCell: true,
              table
            };
          }

          return { collectionName: "ROOT", inTableCell: false, table: null };
        }

        const node = target.matches?.(".dynamic-image-box, td")
          ? target
          : (target.closest?.(".dynamic-image-box, td") || target);
        const cell = node.matches?.("td") ? node : node.closest?.("td");
        const table = cell?.closest?.("table.wordex-table") || null;

        if (table) {
          return {
            collectionName: this.getTableCollectionName(cell),
            inTableCell: true,
            table
          };
        }

        return { collectionName: "ROOT", inTableCell: false, table: null };
      }

      isImageMacroToolbarActive() {
        const image = this.selectedObject;

        if (!image?.matches?.(".dynamic-image-box") || !this.documentElement.contains(image)) {
          return false;
        }

        if (image.classList.contains("selected-object")) {
          return true;
        }

        if (document.activeElement?.closest?.(".dynamic-image-box") === image) {
          return true;
        }

        const selection = window.getSelection();

        if (!selection?.rangeCount) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !!element && image.contains(element);
      }

      getAllowedImageMacroFields(context) {
        const collectionName = context?.collectionName || "ROOT";

        return this.getMacroFieldsForCollection(collectionName, {
          allowedKinds: WordexEditor.imageMacroKinds
        });
      }

      isAllowedImageMacroField(macroField, context) {
        const normalized = this.normalizeMacroName(macroField);

        if (!normalized) {
          return false;
        }

        return this.getAllowedImageMacroFields(context).includes(normalized);
      }

      syncJsonMacroPickerForImageContext(context) {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const insertButton = document.getElementById("jsonMacroInsertBtn");
        const collectionName = context?.collectionName || "ROOT";
        const hasData = !!this.getReportDataRootRecord();

        if (collectionSelect) {
          if (hasData) {
            const collections = context.table
              ? this.getTableMacroCollections(context.table)
              : this.getReportDataCollections();

            this.renderJsonCollectionSelect(collectionSelect, collections, collectionName);
          } else {
            collectionSelect.innerHTML = '<option value="ROOT">ROOT</option>';
          }

          collectionSelect.value = collectionName;
          collectionSelect.disabled = true;
        }

        if (fieldSelect) {
          fieldSelect.disabled = !hasData;

          if (hasData) {
            this.populateJsonMacroFieldSelect(collectionName, {
              allowedKinds: WordexEditor.imageMacroKinds
            });
          } else {
            fieldSelect.innerHTML = '<option value="">Campo</option>';
          }
        }

        if (insertButton) {
          insertButton.disabled = !hasData;
        }
      }

      releaseJsonMacroPickerFromImageContext() {
        this.jsonMacroKindFilter = null;
        this.updateJsonMacroToolbar();
      }

      isObjectParagraphMacroContext() {
        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        const objectParagraph = this.getSelectedObjectParagraphElement();

        if (objectParagraph && this.documentElement.contains(objectParagraph)) {
          return true;
        }

        if (!this.selectedBlockId || this.selectedParagraphId) {
          return false;
        }

        const block = this.findBlockById(this.selectedBlockId);

        if (!block || block.type === "paragraph") {
          return false;
        }

        if (this.selectedObject?.matches?.(".wordex-table")) {
          return false;
        }

        return block.type === "chart" ||
          block.type === "dynamicImage" ||
          block.type === "staticImage";
      }

      isParagraphSelectedForMacroContext() {
        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        if (this.isObjectParagraphMacroContext()) {
          return !this.isImageMacroToolbarActive();
        }

        if (!this.selectedParagraphId) {
          return false;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (this.paragraphHasMainObject(paragraph)) {
          return false;
        }

        const selection = window.getSelection();
        const range = selection?.rangeCount ? selection.getRangeAt(0) : this.savedRange;

        if (range && this.getTableCellFromRange(range)) {
          return false;
        }

        return true;
      }

      isParagraphMacroToolbarActive() {
        if (this.isImageMacroToolbarActive()) {
          return false;
        }

        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        return this.isParagraphSelectedForMacroContext();
      }

      syncJsonMacroPickerForParagraphContext() {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const insertButton = document.getElementById("jsonMacroInsertBtn");
        const hasData = !!this.getReportDataRootRecord();

        this.jsonMacroKindFilter = null;

        if (collectionSelect) {
          if (hasData) {
            this.renderJsonCollectionSelect(
              collectionSelect,
              [{ name: "ROOT", label: "ROOT" }],
              "ROOT"
            );
          } else {
            collectionSelect.innerHTML = '<option value="ROOT">ROOT</option>';
          }

          collectionSelect.value = "ROOT";
          collectionSelect.disabled = true;
        }

        if (fieldSelect) {
          fieldSelect.disabled = !hasData;

          if (hasData) {
            this.populateJsonMacroFieldSelect("ROOT");
          } else {
            fieldSelect.innerHTML = '<option value="">Campo</option>';
          }
        }

        if (insertButton) {
          insertButton.disabled = !hasData;
        }
      }

      requireAllowedImageMacroField(context, message) {
        if (!this.getReportDataRootRecord()) {
          return null;
        }

        const macroField = this.getSelectedJsonMacroName();

        if (!macroField) {
          if (message) {
            alert(message);
          }

          return null;
        }

        if (!this.isAllowedImageMacroField(macroField, context)) {
          const scopeLabel = context.inTableCell
            ? `coleção ${context.collectionName}`
            : "ROOT";

          alert(
            `A imagem só aceita macros do tipo image em ${scopeLabel}. ` +
            `Selecione um campo válido na toolbar Dados.`
          );
          return null;
        }

        return macroField;
      }

      requireJsonDataLoaded(message = "Carregue o JSON em Dados antes de continuar.") {
        if (this.getReportDataRootRecord()) {
          return true;
        }

        if (message) {
          alert(message);
        }

        return false;
      }

      requireSelectedJsonCollection(message = "Selecione uma coleção em Dados.") {
        if (!this.requireJsonDataLoaded()) {
          return null;
        }

        const collectionSelect = document.getElementById("jsonCollection");
        const collectionName = String(collectionSelect?.value || "").trim();

        if (!collectionName) {
          alert(message);
          return null;
        }

        return collectionName;
      }

      requireSelectedJsonMacroField(message = "Selecione um campo em Dados.") {
        if (!this.getReportDataRootRecord()) {
          return null;
        }

        const macroName = this.getSelectedJsonMacroName();

        if (!macroName) {
          if (message) {
            alert(message);
          }
          return null;
        }

        return macroName;
      }

      insertDynamicImage() {
        if (!this.getReportDataRootRecord()) {
          return;
        }

        const context = this.getImageMacroContext();
        this.syncJsonMacroPickerForImageContext(context);

        const macroField = this.requireAllowedImageMacroField(
          context,
          "Selecione um campo image em Dados antes de inserir a imagem."
        );

        if (!macroField) {
          return;
        }

        const image = this.createDynamicImageElement(macroField, "left", "80mm", "45mm");

        this.insertNodeAtCurrentInsertionPoint(image);

        if (image.isConnected) {
          this.selectObject(image);
        }
      }

      applyMacroFieldToImageBox(imageBox, macroField) {
        if (!imageBox?.matches?.(".dynamic-image-box") || !macroField) {
          return null;
        }

        const context = this.getImageMacroContext(imageBox);

        if (!this.isAllowedImageMacroField(macroField, context)) {
          const scopeLabel = context.inTableCell
            ? `coleção ${context.collectionName}`
            : "ROOT";

          alert(
            `Esta imagem só aceita macros do tipo image em ${scopeLabel}.`
          );
          this.syncJsonMacroPickerForImageContext(context);
          return null;
        }

        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = macroField;
        delete imageBox.dataset.imageName;
        delete imageBox.dataset.wordexMaterialized;
        imageBox.innerHTML = "{{" + this.escapeHtml(macroField) + "}}";

        const cell = imageBox.closest("td");

        if (cell) {
          this.fitObjectInTableCell(imageBox, cell);
        } else {
          this.limitObjectWidthToParagraph(imageBox);

          const paragraph = imageBox.closest(".paragraph");

          if (paragraph) {
            this.updateFreeContainerBounds(paragraph);
          }
        }

        this.syncObjectAfterChange(imageBox);
        this.selectObject(imageBox);
        return imageBox;
      }

      insertChart() {
        const chartType = this.getSelectedChartInsertType();

        this.insertNodeAtCurrentInsertionPoint(
          this.createChartElement("", chartType, "left", "100mm", "60mm")
        );
      }

      getSelectedChartInsertType() {
        const value = String(document.getElementById("chartInsertType")?.value || "bar").trim().toLowerCase();

        if (["bar", "line", "pie", "doughnut"].includes(value)) {
          return value;
        }

        return "bar";
      }

      getChartTextStyle(chartBox) {
        return {
          fontFamily: chartBox?.style?.fontFamily || "Arial",
          fontSize: chartBox?.style?.fontSize || "12pt",
          color: chartBox?.style?.color || "#444444",
          fontWeight: chartBox?.style?.fontWeight || "normal",
          fontStyle: chartBox?.style?.fontStyle || "normal",
          textDecoration: chartBox?.style?.textDecorationLine || chartBox?.style?.textDecoration || "none"
        };
      }

      normalizeFontFamilyForSelect(fontFamily) {
        const primary = String(fontFamily || "Arial")
          .split(",")[0]
          .trim()
          .replace(/^['"]|['"]$/g, "");
        const select = document.getElementById("fontFamily");

        if (select && Array.from(select.options).some(option => option.value === primary)) {
          return primary;
        }

        return "Arial";
      }

      normalizeFontSizeForSelect(fontSize) {
        const value = String(fontSize || "12pt").trim();
        const select = document.getElementById("fontSize");

        if (select && Array.from(select.options).some(option => option.value === value)) {
          return value;
        }

        const pt = Number.parseFloat(value.replace("pt", "").replace(",", "."));

        if (Number.isFinite(pt)) {
          return `${Math.round(pt)}pt`;
        }

        return "12pt";
      }

      normalizeColorForInput(color) {
        const value = String(color || "#444444").trim();

        if (/^#[0-9a-f]{3,8}$/i.test(value)) {
          if (value.length === 4) {
            return `#${value[1]}${value[1]}${value[2]}${value[2]}${value[3]}${value[3]}`;
          }

          return value;
        }

        const match = value.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);

        if (match) {
          return `#${[match[1], match[2], match[3]]
            .map(part => Number(part).toString(16).padStart(2, "0"))
            .join("")}`;
        }

        return "#444444";
      }

      resolveChartSvgTextStyle(chartStyle) {
        const fontFamily = String(chartStyle?.fontFamily || "Arial")
          .split(",")[0]
          .trim()
          .replace(/^['"]|['"]$/g, "") || "Arial";
        const pt = Number.parseFloat(String(chartStyle?.fontSize || "12pt").replace("pt", "").replace(",", ".")) || 12;
        const factor = pt / 12;
        const color = this.normalizeColorForInput(chartStyle?.color);
        const fontWeight = String(chartStyle?.fontWeight || "normal").trim() || "normal";
        const fontStyle = String(chartStyle?.fontStyle || "normal").trim() || "normal";
        const textDecoration = String(chartStyle?.textDecoration || "none").trim() || "none";

        return {
          fontFamily: this.escapeHtml(fontFamily),
          fontSize: Math.max(6, Math.round(9 * factor)),
          color,
          fontWeight: fontWeight === "bold" || Number(fontWeight) >= 600 ? "bold" : "normal",
          fontStyle: fontStyle === "italic" ? "italic" : "normal",
          textDecoration: textDecoration === "none" ? "none" : textDecoration
        };
      }

      formatChartSvgTextLabel(x, y, text, textStyle, options = {}) {
        const anchor = options.anchor || "end";
        const rotate = options.rotate;
        const rotateAttr = Number.isFinite(rotate)
          ? ` transform="rotate(${rotate} ${x} ${y})"`
          : "";
        const weightAttr = textStyle.fontWeight === "bold" ? ' font-weight="bold"' : "";
        const styleAttr = textStyle.fontStyle === "italic" ? ' font-style="italic"' : "";
        const decorationAttr = textStyle.textDecoration && textStyle.textDecoration !== "none"
          ? ` text-decoration="${this.escapeHtml(textStyle.textDecoration)}"`
          : "";

        return `<text x="${x}" y="${y}" font-family="${textStyle.fontFamily}" font-size="${textStyle.fontSize}" fill="${textStyle.color}" text-anchor="${anchor}"${weightAttr}${styleAttr}${decorationAttr}${rotateAttr}>${this.escapeHtml(text)}</text>`;
      }

      getChartBarValueLabel(cell) {
        const text = String(cell?.text ?? cell?.label ?? "").trim();

        if (text) {
          return text;
        }

        return this.formatChartAxisValue(cell?.value ?? 0);
      }

      getChartOverlayFontFamily(chartStyle) {
        return String(chartStyle?.fontFamily || "Arial")
          .split(",")[0]
          .trim()
          .replace(/^['"]|['"]$/g, "") || "Arial";
      }

      buildChartOverlayLabelStyle(chartStyle) {
        const fontFamily = this.escapeHtml(this.getChartOverlayFontFamily(chartStyle));
        const fontSize = this.escapeHtml(this.normalizeFontSizeForSelect(chartStyle?.fontSize));
        const color = this.escapeHtml(this.normalizeColorForInput(chartStyle?.color || "#444444"));
        const fontWeight = String(chartStyle?.fontWeight || "normal").trim();
        const fontStyle = String(chartStyle?.fontStyle || "normal").trim();
        const weight = fontWeight === "bold" || Number(fontWeight) >= 600 ? "font-weight:bold;" : "";
        const style = fontStyle === "italic" ? "font-style:italic;" : "";

        return `font-family:${fontFamily};font-size:${fontSize};color:${color};${weight}${style}`;
      }

      buildChartValueLabelStyle(chartStyle) {
        const pt = Number.parseFloat(String(chartStyle?.fontSize || "12pt").replace("pt", "").replace(",", ".")) || 12;
        const valuePt = Math.max(7, Math.round(pt * 0.75));

        return this.buildChartOverlayLabelStyle({
          ...chartStyle,
          fontSize: `${valuePt}pt`
        });
      }

      getChartValueLabelGapPx() {
        return 2;
      }

      getChartMinBarWidthForValueLabelPx() {
        return 22;
      }

      measureViewBoxDistancePx(svg, preview, dx, dy = 0) {
        const start = this.mapChartViewBoxToPreview(svg, preview, 0, 0);
        const end = this.mapChartViewBoxToPreview(svg, preview, dx, dy);

        if (!start || !end) {
          return 0;
        }

        return Math.hypot(end.left - start.left, end.top - start.top);
      }

      getChartOverlayRectCenterX(rect) {
        return rect.left + rect.width / 2;
      }

      shouldShowChartBarValueLabel(label, barWidthPx) {
        const minWidth = this.getChartMinBarWidthForValueLabelPx();

        if (barWidthPx < minWidth) {
          return false;
        }

        label.style.visibility = "visible";
        const bounds = label.getBoundingClientRect();
        const labelSpanPx = Math.max(bounds.width, bounds.height, 1);

        return labelSpanPx <= barWidthPx * 1.35;
      }

      chartOverlayRectsOverlap(a, b, padding = 3) {
        return !(
          a.right + padding < b.left ||
          b.right + padding < a.left ||
          a.bottom + padding < b.top ||
          b.bottom + padding < a.top
        );
      }

      resolveChartValueLabelCollisions(bars, labels, seriesCount) {
        const count = Math.max(Number(seriesCount) || 1, 1);
        const categoryCount = Math.ceil(labels.length / count);

        for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
          const group = [];

          for (let seriesIndex = 0; seriesIndex < count; seriesIndex++) {
            const index = categoryIndex * count + seriesIndex;
            const label = labels[index];
            const bar = bars[index];

            if (!label || !bar || label.classList.contains("is-hidden")) {
              continue;
            }

            group.push({
              label,
              barHeight: Number(bar.getAttribute("height")) || 0,
              absValue: Math.abs(Number(bar.querySelector("title")?.textContent) || 0)
            });
          }

          group.sort((left, right) => {
            return this.getChartOverlayRectCenterX(left.label.getBoundingClientRect()) -
              this.getChartOverlayRectCenterX(right.label.getBoundingClientRect());
          });

          const kept = [];

          group.forEach(item => {
            const rect = item.label.getBoundingClientRect();
            const overlapIndex = kept.findIndex(entry => this.chartOverlayRectsOverlap(entry.rect, rect, 2));

            if (overlapIndex < 0) {
              kept.push({ ...item, rect });
              return;
            }

            const current = kept[overlapIndex];

            if (item.absValue > current.absValue || (item.absValue === current.absValue && item.barHeight > current.barHeight)) {
              current.label.classList.add("is-hidden");
              kept[overlapIndex] = { ...item, rect };
            } else {
              item.label.classList.add("is-hidden");
            }
          });
        }
      }

      getChartCategoryLabelY() {
        return 93;
      }

      getChartPlotBottomLimit() {
        return this.getChartCategoryLabelY() - 9;
      }

      mapChartViewBoxToPreview(svg, preview, x, y) {
        if (!svg?.createSVGPoint || typeof svg.getScreenCTM !== "function" || !preview) {
          return null;
        }

        const matrix = svg.getScreenCTM();

        if (!matrix) {
          return null;
        }

        const point = svg.createSVGPoint();
        point.x = x;
        point.y = y;
        const mapped = point.matrixTransform(matrix);
        const previewRect = preview.getBoundingClientRect();

        return {
          left: mapped.x - previewRect.left,
          top: mapped.y - previewRect.top
        };
      }

      layoutChartBarValueLabels(chartBox) {
        const preview = chartBox?.querySelector?.(".wordex-chart-preview");
        const svg = preview?.querySelector?.("svg");
        const panel = preview?.querySelector?.(".wordex-chart-value-labels");

        if (!preview || !svg || !panel) {
          return;
        }

        const bars = svg.querySelectorAll(".wordex-chart-bar");
        const labels = panel.querySelectorAll(".wordex-chart-value-label");
        const seriesCount = Number(panel.dataset.seriesCount) || 1;
        const zeroY = Number(panel.dataset.viewboxZeroY);

        if (!bars.length || bars.length !== labels.length) {
          return;
        }

        bars.forEach((bar, index) => {
          const label = labels[index];

          if (!label) {
            return;
          }

          const barX = Number(bar.getAttribute("x")) || 0;
          const barWidth = Number(bar.getAttribute("width")) || 0;
          const barY = Number(bar.getAttribute("y")) || 0;
          const isNegative = bar.dataset.negative === "1";
          const gapPx = this.getChartValueLabelGapPx();
          const centerX = barX + barWidth / 2;
          const anchorY = isNegative ? (Number.isFinite(zeroY) ? zeroY : barY) : barY;
          const barWidthPx = this.measureViewBoxDistancePx(svg, preview, barWidth, 0);
          const mapped = this.mapChartViewBoxToPreview(svg, preview, centerX, anchorY);

          label.classList.remove("is-hidden");
          label.style.visibility = "visible";

          if (!mapped) {
            label.classList.add("is-hidden");
            return;
          }

          label.style.left = `${mapped.left}px`;

          /*
            Rótulos de barras são texto horizontal rotacionado 270 graus.
            Como, após a rotação, a altura visual do rótulo corresponde à largura
            original do texto, o ponto de ancoragem precisa considerar offsetWidth.
            Assim o rótulo positivo fica acima da barra e o negativo fica abaixo
            do eixo zero, sem invadir a barra.
          */
          const rotatedVisualHeight = label.offsetWidth || 0;
          /*
            Rótulos negativos também devem ficar acima do eixo zero.
            Para negativos, anchorY já é o zeroY; para positivos, é o topo da barra.
            Portanto, em ambos os casos o rótulo fica acima do ponto de ancoragem.
          */
          const labelCenterY = mapped.top - gapPx - rotatedVisualHeight / 2;

          label.style.top = `${labelCenterY}px`;

          if (!this.shouldShowChartBarValueLabel(label, barWidthPx)) {
            label.classList.add("is-hidden");
          }
        });

        this.resolveChartValueLabelCollisions(bars, labels, seriesCount);
      }

      layoutChartCategoryLabels(chartBox) {
        const preview = chartBox?.querySelector?.(".wordex-chart-preview");
        const svg = preview?.querySelector?.("svg");
        const panel = preview?.querySelector?.(".wordex-chart-category-labels");

        if (!preview || !svg || !panel) {
          return;
        }

        panel.querySelectorAll(".wordex-chart-category-label").forEach(label => {
          const x = Number(label.dataset.viewboxX);
          const y = Number(label.dataset.viewboxY);

          if (!Number.isFinite(x) || !Number.isFinite(y)) {
            return;
          }

          const mapped = this.mapChartViewBoxToPreview(svg, preview, x, y);

          if (!mapped) {
            return;
          }

          label.style.left = `${mapped.left}px`;
          label.style.top = `${mapped.top}px`;
        });
      }

      scheduleChartOverlayLayout(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        const run = () => {
          if (!chartBox.isConnected) {
            return;
          }

          this.applyChartLegendPanelPosition(chartBox);
          this.layoutChartBarValueLabels(chartBox);
          this.layoutChartCategoryLabels(chartBox);
        };

        if (typeof requestAnimationFrame === "function") {
          requestAnimationFrame(run);
        } else {
          run();
        }
      }

      computeBarChartLayout(chartData, chartStyle = null, seriesColors = null) {
        const payload = this.normalizeChartPayload(chartData);
        const categoryLabels = this.getChartCategoryLabels(chartData);
        const categoryCount = Math.max(categoryLabels.length, payload?.Items?.length || 0, 1);
        const seriesCount = this.getChartSeriesCount(chartData);
        const barSeriesColors = Array.isArray(seriesColors) && seriesColors.length
          ? seriesColors
          : this.getDefaultChartSeriesColors();
        const plotLeft = 14;
        const plotRight = 208;
        const plotWidth = plotRight - plotLeft;
        const groupGap = 12;
        const innerGap = 2;
        const plotTop = 8;
        const categoryAnchorY = this.getChartCategoryLabelY();
        const plotBottomLimit = this.getChartPlotBottomLimit();
        const allValues = this.getAllChartNumericValues(chartData);
        const maxPositive = Math.max(0, ...allValues, 0);
        const maxNegative = Math.abs(Math.min(0, ...allValues, 0));
        const availableHeight = plotBottomLimit - plotTop;
        let zeroY = plotBottomLimit;
        let posBarHeight = availableHeight;
        let negBarHeight = 0;

        if (maxNegative > 0 && maxPositive > 0) {
          posBarHeight = availableHeight * (maxPositive / (maxPositive + maxNegative));
          negBarHeight = availableHeight - posBarHeight;
          zeroY = plotTop + posBarHeight;
        } else if (maxNegative > 0) {
          zeroY = plotTop;
          posBarHeight = 0;
          negBarHeight = availableHeight;
        }

        const scalePositive = maxPositive > 0 ? maxPositive : 1;
        const scaleNegative = maxNegative > 0 ? maxNegative : 1;
        const availableWidth = plotWidth - groupGap * (categoryCount + 1);
        const groupWidth = availableWidth / categoryCount;
        const barWidth = Math.max(3, (groupWidth - innerGap * Math.max(seriesCount - 1, 0)) / seriesCount);
        const bars = [];
        const valueLabels = [];

        for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
          const groupX = plotLeft + groupGap + categoryIndex * (groupWidth + groupGap);
          const item = payload?.Items?.[categoryIndex] || { values: [] };

          for (let seriesIndex = 0; seriesIndex < seriesCount; seriesIndex++) {
            const cell = item.values?.[seriesIndex] || { value: 0 };
            const value = this.toChartNumericValue(cell.value);
            let height = 0;
            let y = zeroY;
            let negativeAttr = "";

            if (value > 0) {
              height = Math.max(1, posBarHeight * value / scalePositive);
              y = zeroY - height;
            } else if (value < 0) {
              height = Math.max(1, negBarHeight * Math.abs(value) / scaleNegative);
              y = zeroY;
              negativeAttr = ' data-negative="1"';
            }

            bars.push(
              `<rect class="wordex-chart-bar" data-series-index="${seriesIndex}"${negativeAttr} x="${groupX + seriesIndex * (barWidth + innerGap)}" y="${y}" width="${barWidth}" height="${height}" fill="${barSeriesColors[seriesIndex % barSeriesColors.length]}"><title>${this.escapeHtml(this.formatChartNumericTooltip(value))}</title></rect>`
            );

            valueLabels.push(this.getChartBarValueLabel(cell));
          }
        }

        const categoryLabelSpecs = categoryLabels.map((label, index) => {
          if (!label) {
            return null;
          }

          const groupX = plotLeft + groupGap + index * (groupWidth + groupGap);
          const x = groupX + groupWidth / 2;

          return { label, x, y: categoryAnchorY };
        }).filter(Boolean);

        return {
          bars,
          valueLabels,
          categoryLabelSpecs,
          plotLeft,
          plotRight,
          plotTop,
          plotBottomLimit,
          axisY: zeroY
        };
      }

      buildChartBarValueLabelsPanelHtml(valueLabels, chartStyle, zeroY = null, seriesCount = 1) {
        if (!Array.isArray(valueLabels) || !valueLabels.length) {
          return "";
        }

        const labelStyle = this.buildChartValueLabelStyle(chartStyle);
        const zeroAttr = Number.isFinite(Number(zeroY))
          ? ` data-viewbox-zero-y="${Number(zeroY)}"`
          : "";
        const seriesAttr = ` data-series-count="${Math.max(Number(seriesCount) || 1, 1)}"`;
        const items = valueLabels.map(text => {
          return `<span class="wordex-chart-value-label" style="${labelStyle}">${this.escapeHtml(text)}</span>`;
        }).join("");

        return `<div class="wordex-chart-value-labels" role="presentation"${zeroAttr}${seriesAttr}>${items}</div>`;
      }

      buildChartCategoryLabelsPanelHtml(categoryLabelSpecs, chartStyle) {
        if (!Array.isArray(categoryLabelSpecs) || !categoryLabelSpecs.length) {
          return "";
        }

        const labelStyle = this.buildChartOverlayLabelStyle(chartStyle);
        const items = categoryLabelSpecs.map(({ label, x, y }) => {
          return `<span class="wordex-chart-category-label" data-viewbox-x="${x}" data-viewbox-y="${y}" style="${labelStyle}">${this.escapeHtml(label)}</span>`;
        }).join("");

        return `<div class="wordex-chart-category-labels" role="presentation">${items}</div>`;
      }

      parseChartLocaleNumber(raw) {
        if (raw === null || raw === undefined || raw === "") {
          return NaN;
        }

        if (typeof raw === "number") {
          return Number.isFinite(raw) ? raw : NaN;
        }

        let text = String(raw).trim()
          .replace(/\u00A0/g, "")
          .replace(/\s/g, "");

        if (!text) {
          return NaN;
        }

        text = text.replace(/[^0-9,.\-+]/g, "");

        if (!text || text === "-" || text === "+" || text === "-." || text === "+.") {
          return NaN;
        }

        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma >= 0 && lastDot >= 0) {
          if (lastComma > lastDot) {
            text = text.replace(/\./g, "").replace(",", ".");
          } else {
            text = text.replace(/,/g, "");
          }
        } else if (lastComma >= 0) {
          const decimals = text.length - lastComma - 1;

          if (decimals === 3 && lastComma > 0) {
            text = text.replace(/,/g, "");
          } else {
            text = text.replace(",", ".");
          }
        } else if (lastDot >= 0) {
          const decimals = text.length - lastDot - 1;
          const dotCount = (text.match(/\./g) || []).length;

          if (dotCount > 1 || (decimals === 3 && lastDot > 0)) {
            text = text.replace(/\./g, "");
          }
        }

        const parsed = Number(text);
        return Number.isFinite(parsed) ? parsed : NaN;
      }

      toChartNumericValue(raw, fallback = 0) {
        const parsed = this.parseChartLocaleNumber(raw);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      normalizeChartCellValue(cell, defaultLabel) {
        const displayText = String(cell?.text ?? cell?.label ?? "").trim();
        const numericSource = typeof cell?.value === "number"
          ? cell.value
          : (cell?.value ?? cell?.text);
        const value = this.toChartNumericValue(numericSource);
        const text = displayText || this.formatChartAxisValue(value);

        return {
          text,
          value,
          label: String(cell?.label ?? defaultLabel ?? "")
        };
      }

      syncChartToolbarControls() {
        const typeSelect = document.getElementById("chartInsertType");
        const chartBox = this.getLiveSelectedObject();

        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        const chartType = String(chartBox.dataset.chartType || "bar").trim().toLowerCase();

        if (typeSelect && ["bar", "line", "pie", "doughnut"].includes(chartType)) {
          typeSelect.value = chartType;
        }

        const style = this.getChartTextStyle(chartBox);
        const fontFamily = document.getElementById("fontFamily");
        const fontSize = document.getElementById("fontSize");
        const fontColor = document.getElementById("fontColor");

        if (fontFamily) {
          fontFamily.value = this.normalizeFontFamilyForSelect(style.fontFamily);
        }

        if (fontSize) {
          fontSize.value = this.normalizeFontSizeForSelect(style.fontSize);
        }

        if (fontColor) {
          fontColor.value = this.normalizeColorForInput(style.color);
        }

        if (chartType !== "bar") {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);
        const activeSeriesIndex = this.getChartActiveSeriesIndex(chartBox, seriesCount);
        const colorInput = document.getElementById("chartSeriesColor");
        const colorLabel = document.getElementById("chartSeriesColorLabel");
        const columnLabel = chartData?.Columns?.[activeSeriesIndex]?.label || `Série ${activeSeriesIndex + 1}`;

        if (colorLabel) {
          colorLabel.textContent = columnLabel;
        }

        if (colorInput) {
          colorInput.value = this.normalizeColorForInput(seriesColors[activeSeriesIndex]);
        }
      }

      getDefaultChartSeriesColors() {
        return ["#555555", "#888888", "#aaaaaa", "#bbbbbb", "#777777"];
      }

      readChartSeriesColors(chartBox, seriesCount = 1) {
        const defaults = this.getDefaultChartSeriesColors();
        let stored = [];

        try {
          const parsed = JSON.parse(chartBox?.dataset?.wordexChartSeriesColors || "[]");
          stored = Array.isArray(parsed)
            ? parsed.map(color => this.normalizeColorForInput(color))
            : [];
        } catch (error) {
          stored = [];
        }

        const count = Math.max(Number(seriesCount) || 1, 1);

        return Array.from({ length: count }, (_, index) => {
          return stored[index] || defaults[index % defaults.length];
        });
      }

      writeChartSeriesColors(chartBox, colors) {
        if (!chartBox || !Array.isArray(colors)) {
          return;
        }

        chartBox.dataset.wordexChartSeriesColors = JSON.stringify(
          colors.map(color => this.normalizeColorForInput(color))
        );
      }

      getChartBoxResolvedData(chartBox) {
        if (!chartBox) {
          return null;
        }

        return this.readChartDataFromElement(chartBox);
      }

      hydrateChartBoxFromSavedHtml(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        const chartData = this.readChartDataFromElement(chartBox);

        if (!chartData) {
          return;
        }

        if (!this.getChartDataScriptElement(chartBox)) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.bindChartBarSeriesInteraction(chartBox);
        this.scheduleChartOverlayLayout(chartBox);
      }

      getDefaultChartLegendPosition() {
        return { x: 8, y: 10, custom: false };
      }

      readChartLegendPosition(chartBox) {
        const x = Number(chartBox?.dataset?.wordexChartLegendX);
        const y = Number(chartBox?.dataset?.wordexChartLegendY);

        if (Number.isFinite(x) && Number.isFinite(y)) {
          return { x, y, custom: true };
        }

        return this.getDefaultChartLegendPosition();
      }

      writeChartLegendPosition(chartBox, x, y) {
        if (!chartBox) {
          return;
        }

        chartBox.dataset.wordexChartLegendX = String(Math.round(Number(x) * 10) / 10);
        chartBox.dataset.wordexChartLegendY = String(Math.round(Number(y) * 10) / 10);
      }

      buildChartLegendPanelHtml(seriesLabels, seriesColors, chartStyle) {
        if (!Array.isArray(seriesLabels) || seriesLabels.length < 2) {
          return "";
        }

        const labelStyle = this.buildChartOverlayLabelStyle(chartStyle);
        const items = seriesLabels.map((label, index) => {
          const swatchColor = seriesColors[index % seriesColors.length];

          return `
            <span class="wordex-chart-legend-item">
              <span class="wordex-chart-legend-swatch" style="background-color:${swatchColor};"></span>
              <span class="wordex-chart-legend-label" style="${labelStyle}">${this.escapeHtml(label)}</span>
            </span>
          `;
        }).join("");

        return `<div class="wordex-chart-legend-panel" role="presentation">${items}</div>`;
      }

      applyChartLegendPanelPosition(chartBox) {
        const panel = chartBox?.querySelector?.(".wordex-chart-legend-panel");

        if (!panel) {
          return;
        }

        const position = this.readChartLegendPosition(chartBox);
        panel.style.left = `${position.x}px`;
        panel.style.top = `${position.y}px`;
      }

      startChartLegendDrag(event, chartBox) {
        const preview = chartBox?.querySelector?.(".wordex-chart-preview");
        const panel = preview?.querySelector?.(".wordex-chart-legend-panel");

        if (!preview || !panel) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        const startPointerX = event.clientX;
        const startPointerY = event.clientY;
        const startPosition = this.readChartLegendPosition(chartBox);

        preview.setPointerCapture?.(event.pointerId);

        const onMove = moveEvent => {
          const x = startPosition.x + (moveEvent.clientX - startPointerX);
          const y = startPosition.y + (moveEvent.clientY - startPointerY);

          panel.style.left = `${x}px`;
          panel.style.top = `${y}px`;
          this.writeChartLegendPosition(chartBox, x, y);
        };

        const onUp = upEvent => {
          preview.releasePointerCapture?.(upEvent.pointerId);
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          this.syncObjectAfterChangeAndKeepSelected(chartBox);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      }

      getChartActiveSeriesIndex(chartBox, seriesCount = 1) {
        const maxIndex = Math.max(Number(seriesCount) || 1, 1) - 1;
        const index = Number(chartBox?.dataset?.wordexChartActiveSeriesIndex ?? "0");

        if (!Number.isFinite(index)) {
          return 0;
        }

        return Math.min(Math.max(0, index), maxIndex);
      }

      applyChartSeriesColor(chartBox, seriesIndex, color) {
        if (!chartBox?.matches?.(".wordex-chart-box") || chartBox.dataset.chartType !== "bar") {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(
          this.getChartSeriesCount(chartData),
          Number(seriesIndex) + 1,
          1
        );
        const colors = this.readChartSeriesColors(chartBox, seriesCount);
        colors[seriesIndex] = this.normalizeColorForInput(color);
        chartBox.dataset.wordexChartActiveSeriesIndex = String(seriesIndex);
        this.writeChartSeriesColors(chartBox, colors);
        this.updateChartBoxPresentation(chartBox);
      }

      applyChartSeriesColorFromToolbar(color) {
        const chartBox = this.getLiveSelectedObject();

        if (!chartBox?.matches?.(".wordex-chart-box") || chartBox.dataset.chartType !== "bar") {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesIndex = this.getChartActiveSeriesIndex(chartBox, seriesCount);
        this.applyChartSeriesColor(chartBox, seriesIndex, color);
        this.syncObjectAfterChangeAndKeepSelected(chartBox);
      }

      bindChartBarSeriesInteraction(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box") || chartBox.dataset.chartType !== "bar") {
          return;
        }

        const preview = chartBox.querySelector(".wordex-chart-preview");

        if (!preview || preview.dataset.wordexChartBarsBound === "1") {
          return;
        }

        preview.dataset.wordexChartBarsBound = "1";
        preview.addEventListener("pointerdown", event => {
          if (this.selectedObject !== chartBox) {
            return;
          }

          if (event.target?.closest?.(".wordex-chart-legend-panel")) {
            this.startChartLegendDrag(event, chartBox);
            return;
          }

          const rect = event.target?.closest?.("rect.wordex-chart-bar");

          if (!rect || !chartBox.contains(rect)) {
            return;
          }

          event.preventDefault();
          event.stopPropagation();

          const seriesIndex = Number(rect.dataset.seriesIndex);

          if (!Number.isFinite(seriesIndex)) {
            return;
          }

          chartBox.dataset.wordexChartActiveSeriesIndex = String(seriesIndex);
          this.syncChartToolbarControls();
        });
      }

      insertTextbox() {
        if (!this.getSelectedObjectParagraphElement()) {
          alert("Selecione um parágrafo de objeto (imagem, gráfico ou tabela) para inserir o textbox.");
          return;
        }

        const text = prompt("Texto inicial:", "Textbox");
        if (text === null) return;

        this.insertTextboxIntoObjectParagraph(
          this.createTextboxElement(text, "free", "35mm", "8mm")
        );
      }

      askChartType(defaultValue) {
        const value = prompt("Tipo do gráfico: bar, line, pie ou doughnut", defaultValue);

        if (!value) return null;

        const chartType = value.trim().toLowerCase();

        if (!["bar", "line", "pie", "doughnut"].includes(chartType)) {
          alert("Tipo inválido. Use bar, line, pie ou doughnut.");
          return null;
        }

        return chartType;
      }

      insertTable() {
        const rows = Number(prompt("Quantidade de linhas:", "3"));
        const cols = Number(prompt("Quantidade de colunas:", "3"));

        if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1) {
          alert("Informe uma quantidade válida de linhas e colunas.");
          return;
        }

        const table = this.createTableElement(rows, cols, "left", "80mm");

        if (this.getReportDataRootRecord()) {
          const parentDatasource = this.getSelectedJsonCollectionName() || "ROOT";

          if (parentDatasource && parentDatasource !== "ROOT") {
            table.dataset.wordexDatasource = parentDatasource;
          } else {
            delete table.dataset.wordexDatasource;
          }

          const childDatasource = prompt(
            parentDatasource === "ROOT"
              ? "ChildDatasource (coleção do ROOT; vazio = Parent):"
              : "ChildDatasource (vazio = mesmo que Parent):",
            ""
          );

          if (childDatasource === null) {
            return;
          }

          if (!this.applyTableChildDatasource(table, parentDatasource, childDatasource)) {
            return;
          }
        }

        this.insertNodeAtCurrentInsertionPoint(table);
      }

      createDynamicImageElement(fieldName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = fieldName;
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;

        imageBox.innerHTML = "{{" + this.escapeHtml(fieldName) + "}}";

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      createEmptyImageElement(align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "staticImage";
        imageBox.dataset.imageName = "Imagem";
        imageBox.dataset.align = align || "left";
        imageBox.style.width = width || "80mm";
        imageBox.style.height = height || "45mm";

        this.applyAlignment(imageBox, align || "left");
        return imageBox;
      }

      createStaticImageElement(imageSrc, imageName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "staticImage";
        imageBox.dataset.imageName = imageName || "Imagem";
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;
        imageBox.dataset.wordexMaterialized = "1";

        const img = document.createElement("img");
        img.src = String(imageSrc || "");
        img.alt = imageName || "Imagem";
        img.draggable = false;
        img.style.display = "block";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";
        img.style.width = "auto";
        img.style.height = "auto";
        img.style.objectFit = "contain";
        imageBox.appendChild(img);

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      applyMacroFieldToChartBox(chartBox, macroField) {
        if (!chartBox?.matches?.(".wordex-chart-box") || !macroField) {
          return null;
        }

        chartBox.dataset.sourceName = macroField;
        this.clearChartManualData(chartBox);
        this.updateChartBoxPresentation(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
        return chartBox;
      }

      createChartElement(sourceName, chartType, align, width, height, chartData = null) {
        const chartBox = document.createElement("div");
        chartBox.className = "wordex-chart-box";
        chartBox.contentEditable = "false";
        chartBox.dataset.wordexType = "chart";
        chartBox.dataset.chartType = chartType;
        chartBox.dataset.align = align;
        chartBox.style.width = width;
        chartBox.style.height = height;

        if (sourceName) {
          chartBox.dataset.sourceName = sourceName;
        }

        if (chartData) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.updateChartBoxPresentation(chartBox);
        this.applyAlignment(chartBox, align);
        return chartBox;
      }

      createTextboxElement(text, align, width, height) {
        const textbox = document.createElement("div");
        textbox.className = "wordex-textbox";
        textbox.contentEditable = "true";
        textbox.dataset.wordexType = "textbox";
        textbox.dataset.align = align;
        textbox.style.width = width;
        textbox.style.height = height;
        textbox.style.textAlign = "left";
        textbox.innerHTML = this.escapeHtml(text || "");

        this.applyAlignment(textbox, align);
        return textbox;
      }

      generateChartPlaceholderHtml(sourceName, chartType, chartData = null, chartStyle = null, seriesColors = null) {
        let previewSvg = chartData
          ? this.generateChartSvgFromData(chartType, chartData, chartStyle, seriesColors)
          : this.generateChartSvg(chartType, chartStyle);
        let legendHtml = "";
        let valueLabelsHtml = "";
        let categoryLabelsHtml = "";

        if (chartData && chartType === "bar") {
          const layout = this.computeBarChartLayout(chartData, chartStyle, seriesColors);
          const seriesCount = this.getChartSeriesCount(chartData);
          valueLabelsHtml = this.buildChartBarValueLabelsPanelHtml(
            layout.valueLabels,
            chartStyle,
            layout.axisY,
            seriesCount
          );
          categoryLabelsHtml = this.buildChartCategoryLabelsPanelHtml(layout.categoryLabelSpecs, chartStyle);
        }

        if (chartData && chartType === "bar" && this.getChartSeriesCount(chartData) >= 2) {
          const seriesLabels = this.getChartSeriesLabels(chartData);
          const colors = Array.isArray(seriesColors) && seriesColors.length
            ? seriesColors
            : this.getDefaultChartSeriesColors();

          legendHtml = this.buildChartLegendPanelHtml(seriesLabels, colors, chartStyle);
        }

        return `
          <span class="wordex-chart-preview">
            ${previewSvg}
            ${valueLabelsHtml}
            ${categoryLabelsHtml}
            ${legendHtml}
          </span>
        `;
      }

      generateChartSvg(chartType) {
        if (chartType === "line") {
          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              <polyline points="14,82 48,52 84,66 120,24 156,42 192,12 208,22"
                fill="none" stroke="#555" stroke-width="4" />
              <line x1="14" y1="90" x2="208" y2="90" stroke="#bbb" stroke-width="1" />
              <line x1="14" y1="8" x2="14" y2="90" stroke="#bbb" stroke-width="1" />
            </svg>
          `;
        }

        if (chartType === "pie" || chartType === "doughnut") {
          const hole = chartType === "doughnut"
            ? '<circle cx="110" cy="50" r="22" fill="#fafafa"></circle>'
            : "";

          return `
            <svg viewBox="0 0 220 100">
              <circle cx="110" cy="50" r="42" fill="#ddd"></circle>
              <path d="M110 50 L110 8 A42 42 0 0 1 150 63 Z" fill="#aaa"></path>
              <path d="M110 50 L150 63 A42 42 0 0 1 78 78 Z" fill="#c8c8c8"></path>
              ${hole}
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="none">
            <rect x="24" y="28" width="26" height="62" fill="#bbb"></rect>
            <rect x="62" y="12" width="26" height="78" fill="#999"></rect>
            <rect x="100" y="48" width="26" height="42" fill="#ccc"></rect>
            <rect x="138" y="6" width="26" height="84" fill="#888"></rect>
            <rect x="176" y="24" width="26" height="66" fill="#aaa"></rect>
            <line x1="14" y1="90" x2="208" y2="90" stroke="#777" stroke-width="1"></line>
            <line x1="14" y1="8" x2="14" y2="90" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      getDefaultChartData() {
        return {
          ChartTitle: "",
          CategoryField: "Categoria",
          Columns: [
            { key: "Serie1", label: "Série 1" }
          ],
          Items: [
            {
              title: "",
              values: [
                { text: "", value: 0, label: "Série 1" }
              ]
            }
          ]
        };
      }

      normalizeChartPayload(payload) {
        if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
          return null;
        }

        if (Array.isArray(payload.Items) && !Array.isArray(payload.Columns)) {
          const itemTitle = String(payload.ItemTitle || "Valor").trim() || "Valor";
          const firstLabel = String(payload.Items[0]?.label || itemTitle).trim() || itemTitle;

          return {
            ChartTitle: String(payload.ChartTitle || payload.chartTitle || "").trim(),
            CategoryField: String(payload.CategoryField || payload.ItemTitle || "Categoria").trim() || "Categoria",
            Columns: [{ key: itemTitle, label: firstLabel }],
            Items: payload.Items.map(item => ({
              title: String(item?.title ?? ""),
              values: [
                this.normalizeChartCellValue(item, firstLabel)
              ]
            }))
          };
        }

        return {
          ChartTitle: String(payload.ChartTitle || payload.chartTitle || "").trim(),
          CategoryField: String(payload.CategoryField || "Categoria").trim() || "Categoria",
          Columns: Array.isArray(payload.Columns)
            ? payload.Columns.map((column, index) => ({
              key: String(column?.key || column?.title || `Serie${index + 1}`).trim() || `Serie${index + 1}`,
              label: String(column?.label || column?.title || column?.key || `Série ${index + 1}`).trim() || `Série ${index + 1}`
            }))
            : [],
          Items: Array.isArray(payload.Items)
            ? payload.Items.map(item => ({
              title: String(item?.title ?? ""),
              values: Array.isArray(item?.values)
                ? item.values.map((value, index) => this.normalizeChartCellValue(
                  value,
                  value?.label ||
                  payload.Columns?.[index]?.label ||
                  payload.Columns?.[index]?.key ||
                  `Série ${index + 1}`
                ))
                : []
            }))
            : []
        };
      }

      getChartDataScriptElement(chartBox) {
        return chartBox?.querySelector?.("script.wordex-chart-data") || null;
      }

      readChartDataFromElement(chartBox) {
        if (!chartBox) {
          return null;
        }

        const script = this.getChartDataScriptElement(chartBox);

        if (script) {
          try {
            const parsed = this.normalizeChartPayload(JSON.parse(script.textContent || ""));

            if (parsed) {
              return parsed;
            }
          } catch (error) {
            /* tenta data-wordex-chart-data abaixo */
          }
        }

        const inlineData = String(chartBox.dataset.wordexChartData || "").trim();

        if (!inlineData) {
          return null;
        }

        try {
          return this.normalizeChartPayload(JSON.parse(inlineData));
        } catch (error) {
          return null;
        }
      }

      writeChartDataToElement(chartBox, chartData) {
        if (!chartBox) {
          return;
        }

        const normalized = chartData ? this.normalizeChartPayload(chartData) : null;
        let script = this.getChartDataScriptElement(chartBox);

        if (!normalized) {
          script?.remove();
          delete chartBox.dataset.chartDataMode;
          chartBox.removeAttribute("data-wordex-chart-data");
          return;
        }

        if (!script) {
          script = document.createElement("script");
          script.type = "application/json";
          script.className = "wordex-chart-data";
          chartBox.appendChild(script);
        }

        script.textContent = JSON.stringify(normalized);
        chartBox.dataset.chartDataMode = "manual";
        chartBox.dataset.wordexChartData = JSON.stringify(normalized);
      }

      clearChartManualData(chartBox) {
        this.writeChartDataToElement(chartBox, null);
      }

      hasChartMacroSource(chartBox) {
        return !!String(chartBox?.dataset?.sourceName || "").trim();
      }

      resolveChartPayload(chartBox, scopes) {
        const sourceName = String(chartBox?.dataset?.sourceName || "").trim();

        if (sourceName) {
          const resolved = this.resolveDataPath(sourceName, scopes);

          if (resolved && this.isChartDataObject(resolved)) {
            return this.normalizeChartPayload(resolved);
          }

          return null;
        }

        return this.readChartDataFromElement(chartBox);
      }

      updateChartBoxPresentation(chartBox) {
        if (!chartBox) {
          return;
        }

        const sourceName = String(chartBox.dataset.sourceName || "").trim();
        const chartType = chartBox.dataset.chartType || "bar";
        const chartData = this.getChartBoxResolvedData(chartBox);
        const chartStyle = this.getChartTextStyle(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);
        const script = this.getChartDataScriptElement(chartBox);

        chartBox.innerHTML = this.generateChartPlaceholderHtml(
          sourceName,
          chartType,
          chartData,
          chartStyle,
          seriesColors
        );

        if (script) {
          chartBox.appendChild(script);
        } else if (chartData && !sourceName) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.applyChartLegendPanelPosition(chartBox);
        this.bindChartBarSeriesInteraction(chartBox);
        this.scheduleChartOverlayLayout(chartBox);
      }

      chartDataToDialogModel(chartData) {
        const payload = this.normalizeChartPayload(chartData) || this.getDefaultChartData();
        const columns = payload.Columns.length
          ? payload.Columns
          : [{ key: "Serie1", label: "Série 1" }];
        const items = payload.Items.length
          ? payload.Items
          : [{ title: "", values: [{ text: "", value: 0, label: columns[0].label }] }];

        return {
          categoryField: payload.CategoryField || "Categoria",
          columns: columns.map(column => ({
            key: column.key,
            label: column.label
          })),
          rows: items.map(item => ({
            category: String(item.title ?? ""),
            values: columns.map((column, index) => {
              const cell = item.values?.[index] || {};

              return {
                text: String(cell.text ?? cell.value ?? ""),
                value: this.toChartNumericValue(
                  typeof cell.value === "number" ? cell.value : (cell.value ?? cell.text)
                )
              };
            })
          }))
        };
      }

      buildChartDataFromDialogModel(model) {
        const categoryField = String(model?.categoryField || "Categoria").trim() || "Categoria";
        const columns = (model?.columns || [])
          .map((column, index) => ({
            key: String(column?.key || `Serie${index + 1}`).trim() || `Serie${index + 1}`,
            label: String(column?.label || `Série ${index + 1}`).trim() || `Série ${index + 1}`
          }))
          .filter(column => column.label);

        if (columns.length === 0) {
          throw new Error("Informe ao menos uma coluna de série.");
        }

        const rows = Array.isArray(model?.rows) ? model.rows : [];

        if (rows.length === 0) {
          throw new Error("Informe ao menos uma linha de categoria.");
        }

        return this.normalizeChartPayload({
          ChartTitle: "",
          CategoryField: categoryField,
          Columns: columns,
          Items: rows.map(row => ({
            title: String(row?.category ?? "").trim(),
            values: columns.map((column, index) => {
              const rawInput = String(
                row?.values?.[index]?.text ??
                row?.values?.[index]?.value ??
                ""
              ).trim();
              const numericValue = this.parseChartLocaleNumber(rawInput);

              return {
                text: rawInput || (Number.isFinite(numericValue) ? this.formatChartAxisValue(numericValue) : ""),
                value: Number.isFinite(numericValue) ? numericValue : 0,
                label: column.label
              };
            })
          }))
        });
      }

      validateChartDialogModel(model) {
        if (!model?.columns?.length) {
          return "Informe ao menos uma coluna de série.";
        }

        if (!model?.rows?.length) {
          return "Informe ao menos uma linha de categoria.";
        }

        for (const column of model.columns) {
          if (!String(column.label || "").trim()) {
            return "Cada coluna precisa de um rótulo.";
          }
        }

        for (const row of model.rows) {
          if (!String(row.category || "").trim()) {
            return "Cada linha precisa de uma categoria.";
          }

          for (const cell of row.values || []) {
            const numericValue = this.parseChartLocaleNumber(cell?.value ?? cell?.text);

            if (!Number.isFinite(numericValue)) {
              return "Informe valores numéricos válidos em todas as células.";
            }
          }
        }

        return "";
      }

      closeChartDataDialog() {
        this.chartDataDialogBackdrop?.remove();
        this.chartDataDialogBackdrop = null;
      }

      openChartDataDialog() {
        const chartBox = this.selectedObject;

        if (!chartBox?.matches?.(".wordex-chart-box")) {
          alert("Selecione um gráfico.");
          return;
        }

        if (this.hasChartMacroSource(chartBox)) {
          alert("Este gráfico usa macro JSON. Na montagem, os dados vêm da macro e não desta tabela.");
          return;
        }

        this.closeChartDataDialog();

        const model = this.chartDataToDialogModel(this.readChartDataFromElement(chartBox));
        const backdrop = document.createElement("div");
        backdrop.className = "wordex-chart-data-dialog-backdrop";
        backdrop.innerHTML = `
          <div class="wordex-chart-data-dialog" role="dialog" aria-modal="true" aria-labelledby="wordex-chart-data-title">
            <h2 id="wordex-chart-data-title">Dados do gráfico</h2>
            <div class="wordex-chart-data-dialog-fields">
              <label>Campo categoria
                <input type="text" id="wordexChartDialogCategoryField" value="${this.escapeHtml(model.categoryField)}" />
              </label>
            </div>
            <div class="wordex-chart-data-dialog-toolbar">
              <button type="button" id="wordexChartDialogAddRow">+ Linha</button>
              <button type="button" id="wordexChartDialogRemoveRow">− Linha</button>
              <button type="button" id="wordexChartDialogAddColumn">+ Coluna</button>
              <button type="button" id="wordexChartDialogRemoveColumn">− Coluna</button>
            </div>
            <div class="wordex-chart-data-dialog-table-wrap">
              <table id="wordexChartDialogTable"></table>
            </div>
            <div class="wordex-chart-data-dialog-actions">
              <button type="button" id="wordexChartDialogCancel">Cancelar</button>
              <button type="button" class="primary" id="wordexChartDialogConfirm">Confirmar</button>
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);
        this.chartDataDialogBackdrop = backdrop;

        const table = backdrop.querySelector("#wordexChartDialogTable");
        const removeRowButton = backdrop.querySelector("#wordexChartDialogRemoveRow");
        const removeColumnButton = backdrop.querySelector("#wordexChartDialogRemoveColumn");

        const updateRemoveButtonsState = () => {
          if (removeRowButton) {
            removeRowButton.disabled = model.rows.length <= 1;
          }

          if (removeColumnButton) {
            removeColumnButton.disabled = model.columns.length <= 1;
          }
        };

        const renderTable = () => {
          const headerCells = [
            `<th>${this.escapeHtml(model.categoryField || "Categoria")}</th>`
          ].concat(
            model.columns.map((column, index) => `
              <th>
                <input type="text" data-chart-column-label="${index}" value="${this.escapeHtml(column.label)}" aria-label="Rótulo da coluna ${index + 1}" />
              </th>
            `)
          );

          const bodyRows = model.rows.map((row, rowIndex) => {
            const cells = [
              `<td><input type="text" data-chart-row-category="${rowIndex}" value="${this.escapeHtml(row.category)}" aria-label="Categoria ${rowIndex + 1}" /></td>`
            ].concat(
              row.values.map((cell, columnIndex) => `
                <td>
                  <input type="text" data-chart-cell="${rowIndex}:${columnIndex}" value="${this.escapeHtml(String(cell.text ?? cell.value ?? ""))}" aria-label="Valor linha ${rowIndex + 1} coluna ${columnIndex + 1}" />
                </td>
              `)
            );

            return `<tr>${cells.join("")}</tr>`;
          });

          table.innerHTML = `<thead><tr>${headerCells.join("")}</tr></thead><tbody>${bodyRows.join("")}</tbody>`;
          updateRemoveButtonsState();
        };

        const syncModelFromTable = () => {
          model.categoryField = backdrop.querySelector("#wordexChartDialogCategoryField")?.value || "Categoria";
          backdrop.querySelectorAll("[data-chart-column-label]").forEach(input => {
            const index = Number(input.getAttribute("data-chart-column-label"));
            if (model.columns[index]) {
              model.columns[index].label = input.value;
              model.columns[index].key = String(input.value || `Serie${index + 1}`).trim() || `Serie${index + 1}`;
            }
          });
          model.rows.forEach((row, rowIndex) => {
            row.category = backdrop.querySelector(`[data-chart-row-category="${rowIndex}"]`)?.value || "";
            row.values.forEach((cell, columnIndex) => {
              cell.value = backdrop.querySelector(`[data-chart-cell="${rowIndex}:${columnIndex}"]`)?.value || "";
              cell.text = cell.value;
            });
          });
        };

        renderTable();

        backdrop.querySelector("#wordexChartDialogCategoryField")?.addEventListener("input", event => {
          model.categoryField = event.target.value || "Categoria";
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogAddRow")?.addEventListener("click", () => {
          syncModelFromTable();
          model.rows.push({
            category: "",
            values: model.columns.map(column => ({ text: "", value: "", label: column.label }))
          });
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogAddColumn")?.addEventListener("click", () => {
          syncModelFromTable();
          const index = model.columns.length + 1;
          model.columns.push({ key: `Serie${index}`, label: `Série ${index}` });
          model.rows.forEach(row => row.values.push({ text: "", value: "" }));
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogRemoveRow")?.addEventListener("click", () => {
          syncModelFromTable();

          if (model.rows.length <= 1) {
            return;
          }

          model.rows.pop();
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogRemoveColumn")?.addEventListener("click", () => {
          syncModelFromTable();

          if (model.columns.length <= 1) {
            return;
          }

          model.columns.pop();
          model.rows.forEach(row => row.values.pop());
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogCancel")?.addEventListener("click", () => {
          this.closeChartDataDialog();
        });

        backdrop.addEventListener("click", event => {
          if (event.target === backdrop) {
            this.closeChartDataDialog();
          }
        });

        backdrop.querySelector("#wordexChartDialogConfirm")?.addEventListener("click", () => {
          syncModelFromTable();
          const validationError = this.validateChartDialogModel(model);

          if (validationError) {
            alert(validationError);
            return;
          }

          try {
            const chartData = this.buildChartDataFromDialogModel(model);
            this.writeChartDataToElement(chartBox, chartData);
            this.updateChartBoxPresentation(chartBox);
            this.syncObjectAfterChange(chartBox);
            this.selectObject(chartBox);
            this.closeChartDataDialog();
          } catch (error) {
            alert(error.message || String(error));
          }
        });
      }

      getChartSeriesValues(chartData, seriesIndex = 0) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload) {
          return [];
        }

        return payload.Items.map(item => {
          const cell = item.values?.[seriesIndex] || item.values?.[0] || {};
          return this.toChartNumericValue(cell.value);
        });
      }

      getChartCategoryLabels(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload) {
          return [];
        }

        return payload.Items.map(item => String(item.title ?? "").trim());
      }

      getAllChartNumericValues(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload) {
          return [];
        }

        const values = [];

        payload.Items.forEach(item => {
          (item.values || []).forEach(cell => {
            values.push(this.toChartNumericValue(cell?.value));
          });
        });

        return values;
      }

      getChartSeriesCount(chartData) {
        const payload = this.normalizeChartPayload(chartData);
        return Math.max(payload?.Columns?.length || 0, 1);
      }

      getChartSeriesLabels(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload?.Columns?.length) {
          return ["Série 1"];
        }

        return payload.Columns.map((column, index) => {
          return String(column.label || column.key || `Série ${index + 1}`).trim() || `Série ${index + 1}`;
        });
      }

      formatChartAxisValue(value) {
        const amount = Number(value);

        if (!Number.isFinite(amount)) {
          return "0";
        }

        const rounded = Math.round(amount * 1000) / 1000;

        if (Math.abs(rounded - Math.round(rounded)) < 0.001) {
          return String(Math.round(rounded));
        }

        return String(rounded).replace(".", ",");
      }

      formatChartNumericTooltip(value) {
        const amount = Number(value);

        if (!Number.isFinite(amount)) {
          return "0";
        }

        return String(amount);
      }

      computeChartYAxisTicks(minVal, maxVal, plotHeight) {
        const minSpacing = 11;
        const maxLabels = Math.max(2, Math.floor(plotHeight / minSpacing) + 1);
        const minIntermediates = 3;
        const desiredLabels = minIntermediates + 2;
        const labelCount = Math.min(maxLabels, Math.max(2, desiredLabels));
        const steps = Math.max(1, labelCount - 1);
        const ticks = [];

        for (let i = 0; i <= steps; i++) {
          ticks.push(minVal + (maxVal - minVal) * i / steps);
        }

        return ticks;
      }

      generateChartSvgFromData(chartType, chartData, chartStyle = null, seriesColors = null) {
        const textStyle = this.resolveChartSvgTextStyle(chartStyle);
        const values = this.getChartSeriesValues(chartData, 0);
        const maxValue = Math.max(...values, 1);

        if (chartType === "line") {
          const points = values.map((value, index) => {
            const x = values.length <= 1 ? 110 : 14 + (194 * index / (values.length - 1));
            const y = 90 - (72 * value / maxValue);
            return `${x},${y}`;
          }).join(" ");

          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              <polyline points="${points}" fill="none" stroke="#555" stroke-width="4"></polyline>
              <line x1="14" y1="90" x2="208" y2="90" stroke="#bbb" stroke-width="1"></line>
              <line x1="14" y1="8" x2="14" y2="90" stroke="#bbb" stroke-width="1"></line>
            </svg>
          `;
        }

        if (chartType === "pie" || chartType === "doughnut") {
          const total = values.reduce((sum, value) => sum + value, 0) || 1;
          let angle = -Math.PI / 2;
          const cx = 110;
          const cy = 50;
          const radius = 42;
          const colors = ["#888", "#aaa", "#bbb", "#999", "#777", "#ccc"];
          const slices = values.map((value, index) => {
            const sliceAngle = (value / total) * Math.PI * 2;
            const x1 = cx + Math.cos(angle) * radius;
            const y1 = cy + Math.sin(angle) * radius;
            angle += sliceAngle;
            const x2 = cx + Math.cos(angle) * radius;
            const y2 = cy + Math.sin(angle) * radius;
            const largeArc = sliceAngle > Math.PI ? 1 : 0;
            return `<path d="M${cx} ${cy} L${x1} ${y1} A${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${colors[index % colors.length]}"></path>`;
          }).join("");
          const hole = chartType === "doughnut"
            ? `<circle cx="${cx}" cy="${cy}" r="22" fill="#fafafa"></circle>`
            : "";

          return `<svg viewBox="0 0 220 100">${slices}${hole}</svg>`;
        }

        const layout = this.computeBarChartLayout(chartData, chartStyle, seriesColors);

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="xMidYMid meet">
            ${layout.bars.join("")}
            <line x1="${layout.plotLeft}" y1="${layout.axisY}" x2="${layout.plotRight}" y2="${layout.axisY}" stroke="#777" stroke-width="1"></line>
            <line x1="${layout.plotLeft}" y1="${layout.plotTop}" x2="${layout.plotLeft}" y2="${layout.plotBottomLimit}" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      materializeCharts(container, scopes) {
        if (!container) {
          return;
        }

        container.querySelectorAll(".wordex-chart-box").forEach(chartBox => {
          this.materializeChartBox(chartBox, scopes);
        });
      }

      materializeChartBox(chartBox, scopes) {
        if (!chartBox || chartBox.dataset.wordexMaterialized === "1") {
          return;
        }

        const payload = this.resolveChartPayload(chartBox, scopes);
        const chartType = chartBox.dataset.chartType || "bar";
        const chartStyle = this.getChartTextStyle(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(payload), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);

        chartBox.innerHTML = this.generateChartPlaceholderHtml(
          "",
          chartType,
          payload,
          chartStyle,
          seriesColors
        );

        if (payload) {
          chartBox.dataset.wordexChartData = JSON.stringify(payload);
        } else {
          chartBox.removeAttribute("data-wordex-chart-data");
        }

        this.applyChartLegendPanelPosition(chartBox);
        this.bindChartBarSeriesInteraction(chartBox);
        chartBox.dataset.wordexMaterialized = "1";
        this.scheduleChartOverlayLayout(chartBox);
      }

      createTableElement(rows, cols, align, width) {
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.align = align;
        table.style.width = width;

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement("tr");

          for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
        }

        this.applyAlignment(table, align);
        this.ensureTableBoundaryRowTypes(table);
        return table;
      }

      ensureTableBoundaryRowTypes(table) {
        const rows = Array.from(table?.rows || []);

        if (rows.length === 0) {
          return;
        }

        rows[0].dataset.wordexRowType = "TableHeader";
        this.normalizeTableRowColumnsForType(table, rows[0], "TableHeader");

        if (rows.length > 1) {
          const footerRow = rows[rows.length - 1];
          footerRow.dataset.wordexRowType = "TableFooter";
          this.normalizeTableRowColumnsForType(table, footerRow, "TableFooter");
        }

        rows.forEach(row => this.updateTableRowTypeLabel(row));
      }

      askAlignment(defaultValue) {
        const value = prompt("Alinhamento: left, right, center ou none", defaultValue === "free" ? "none" : defaultValue);
        if (!value) return null;

        let align = value.trim().toLowerCase();

        if (align === "none") {
          align = "free";
        }

        if (!["left", "right", "center", "free"].includes(align)) {
          alert("Alinhamento inválido. Use left, right, center ou none.");
          return null;
        }

        return align;
      }

      applyAlignment(element, align) {
        element.dataset.align = align;

        element.style.float = "";
        element.style.display = "";
        element.style.margin = "";
        element.style.verticalAlign = "";
        element.style.position = "";

        const isTable = element.matches("table");
        const isChart = element.matches(".wordex-chart-box");
        const isTextbox = element.matches(".wordex-textbox");

        if (align === "left") {
          element.style.float = "left";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 10px 8px 0";
          return;
        }

        if (align === "right") {
          element.style.float = "right";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 0 8px 10px";
          return;
        }

        if (align === "center") {
          element.style.float = "none";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "8px auto";
          return;
        }

        if (align === "free") {
          element.style.float = "none";
          element.style.display = isTable ? "inline-table" : (isChart ? "flex" : (isTextbox ? "inline-block" : "inline-flex"));
          element.style.verticalAlign = "middle";
          element.style.margin = "4px";
        }
      }

      insertNodeAtCurrentInsertionPoint(node) {
        this.isInsertingObject = true;

        try {
          if (this.isTextboxNode(node)) {
            this.insertTextboxIntoObjectParagraph(node);
            return;
          }

          const cell = this.getSelectedCellForInsertion();

          if (cell && this.isMainObjectNode(node)) {
            this.insertNodeInsideSelectedTableCell(node, cell);
            return;
          }

          this.selectedCell = null;

          if (this.isMainObjectNode(node)) {
            this.insertMainObjectInNewParagraph(node);
            return;
          }

          const paragraphElement = this.ensureParagraphForInsertion();
