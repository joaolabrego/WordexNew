        const target = this.getCurrentBoxBorderTarget();

        if (!target) {
          alert("Selecione uma célula, tabela, objeto ou parágrafo para aplicar essa borda.");
          return;
        }

        const applied = this.applyBorderPresetToBoxElement(target.element, preset);

        if (!applied) {
          alert("Bordas internas só se aplicam a tabelas.");
          return;
        }

        this.syncBorderTargetAfterChange(target);
      }

      toggleSelectedTableGridLines() {
        this.closeBorderDropdown();

        const context = this.getCurrentTableBorderContext();

        if (!context?.table) {
          alert("Selecione uma tabela para alternar as linhas de grade.");
          return;
        }

        context.table.classList.toggle("wordex-show-gridlines");
        this.syncAndSelectTableComponent(context, context.mode || "table");
      }

      trySelectObjectInsideTableCell(event, container = this.documentElement) {
        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object || !container.contains(object)) {
          return false;
        }

        const cell = object.closest("td");

        if (!cell || !container.contains(cell)) {
          return false;
        }

        const ownerTable = cell.closest(".wordex-table");

        /*
          Se o objeto encontrado for a própria tabela dona da célula,
          não é objeto interno: deixa o fluxo normal selecionar célula/tabela.
          Imagem, gráfico, textbox e tabela aninhada dentro da célula devem
          poder ser selecionados para configurar/redimensionar.
        */
        if (ownerTable && object === ownerTable) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        event.wordexTableClickHandled = true;

        this.selectObject(object);
        return true;
      }

      handleTableOrObjectClick(event, container, options = {}) {
        const {
          stopPropagationAtStart = false,
          stopPropagationOnCell = false,
          stopPropagationOnCellModifier = false,
          stopPropagationOnObject = false,
          stopPropagationOnObjectModifier = false,
          requireObjectInContainer = true
        } = options;

        if (event.defaultPrevented || event.wordexTableClickHandled) {
          return true;
        }

        if (stopPropagationAtStart) {
          event.stopPropagation();
        }

        if (this.trySelectObjectInsideTableCell(event, container)) {
          return true;
        }

        const cell = event.target.closest("td");

        if (cell && container.contains(cell)) {
          const table = cell.closest(".wordex-table");

          if (table) {
            if (stopPropagationOnCell) {
              event.stopPropagation();
            }

            event.wordexTableClickHandled = true;

            if (this.isPrimaryModifierPressed(event)) {
              event.preventDefault();

              if (stopPropagationOnCellModifier) {
                event.stopPropagation();
              }

              this.cycleTableComponentSelection(cell);
            } else {
              this.selectTableCell(cell);
            }

            return true;
          }
        }

        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object) {
          return false;
        }

        if (requireObjectInContainer && !container.contains(object)) {
          return false;
        }

        if (stopPropagationOnObject) {
          event.stopPropagation();
        }

        const isPrimaryModifier = this.isPrimaryModifierPressed(event);
        const isTextboxObject = object.matches(".wordex-textbox");

        /*
          v254: textbox passa a seguir a lógica da tabela:
          - clique normal edita o texto interno e não seleciona o objeto;
          - Ctrl+click seleciona o textbox como objeto para alinhar,
            redimensionar, aplicar borda, margem etc.
        */
        if (isTextboxObject && !isPrimaryModifier) {
          return false;
        }

        if (isPrimaryModifier && this.isWordexTableObject(object)) {
          event.preventDefault();
          event.wordexTableClickHandled = true;

          if (stopPropagationOnObjectModifier) {
            event.stopPropagation();
          }

          const cycleCell = this.getCellForTableComponentCycle(object, event.target);

          if (cycleCell) {
            this.cycleTableComponentSelection(cycleCell);
          } else {
            this.selectTableComponent(object, null, "table");
          }
        } else {
          if (isPrimaryModifier) {
            event.preventDefault();

            if (stopPropagationOnObjectModifier) {
              event.stopPropagation();
            }
          }

          this.selectObject(object);
        }

        return true;
      }

      selectTableCell(cell) {
        if (!cell) return;

        const table = cell.closest(".wordex-table");

        if (!table) return;

        this.selectTableComponent(table, cell, "cell");
      }

      getCellForTableComponentCycle(table, target) {
        if (!table) return null;

        const targetElement = target && target.nodeType === Node.ELEMENT_NODE
          ? target
          : target?.parentElement;

        const targetCell = targetElement?.closest?.("td") || null;

        if (targetCell && table.contains(targetCell)) {
          return targetCell;
        }

        if (this.selectedCell && table.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        return table.rows?.[0]?.cells?.[0] || null;
      }

      cycleTableComponentSelection(cell) {
        if (!cell) return;

        const table = cell.closest(".wordex-table");

        if (!table) return;

        const currentMode =
          this.selectedObject === table
            ? (this.selectedTableMode || table.dataset.wordexSelectionMode || "cell")
            : (table.dataset.wordexSelectionMode || "cell");

        let nextMode = "table";

        if (currentMode === "table") {
          nextMode = "row";
        } else if (currentMode === "row") {
          nextMode = "column";
        } else if (currentMode === "column") {
          nextMode = "cell";
        } else if (currentMode === "cell") {
          nextMode = "table";
        } else {
          /*
            Modo indefinido: primeiro Ctrl+clique sobe para tabela.
          */
          nextMode = "table";
        }

        this.selectTableComponent(table, cell, nextMode);
      }

      selectTableComponent(table, cell, mode) {
        if (!table) return;

        this.selectedObject = table;
        this.selectedCell = cell || this.selectedCell;
        this.selectedTableMode = mode || "table";
        table.dataset.wordexSelectionMode = this.selectedTableMode;
        this.selectedTableRow = cell ? cell.parentElement : null;
        this.selectedTableColumnIndex = cell && cell.parentElement
          ? Array.from(cell.parentElement.cells).indexOf(cell)
          : null;

        if (this.selectedTableMode !== "cell") {
          const selection = window.getSelection();

          if (selection) {
            selection.removeAllRanges();
          }

          this.savedRange = null;
        }

        const paragraph = table.closest(".paragraph");
        const block = table.closest(".paragraph-block, .object-block");
        const region = table.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.macroPickerActiveTable = table;
        this.renderSelection();
      }

      normalizeTableRowType(rowType) {
        return String(rowType || "").trim();
      }

      normalizeLegacyTableFooterRows(container) {
        if (!container) return;

        container.querySelectorAll?.('tr[data-wordex-row-type="TableHeader"]').forEach(row => {
          row.dataset.wordexRowType = "TableHeader";
          this.updateTableRowTypeLabel(row);
        });

        container.querySelectorAll?.('tr[data-wordex-row-type="TableFooter"]').forEach(row => {
          row.dataset.wordexRowType = "TableFooter";
          this.updateTableRowTypeLabel(row);
        });
      }

      getTableRowDatasource(row) {
        return String(row?.dataset?.wordexDatasource || "").trim();
      }

      isTableRowEnabled(row) {
        return row?.dataset?.wordexEnabled !== "false";
      }

      setTableRowEnabled(row, enabled) {
        if (!row) return;

        if (enabled === false) {
          row.dataset.wordexEnabled = "false";
        } else {
          delete row.dataset.wordexEnabled;
        }

        this.updateTableRowTypeLabel(row);
      }

      getTableRowTypeLabel(row) {
        if (!row) return "";

        const parts = [];
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (rowType) parts.push(rowType);
        if (!this.isTableRowEnabled(row)) parts.push("Enabled=false");

        return parts.join(" | ");
      }

      updateTableRowTypeLabel(row) {
        if (!row) return;

        const label = this.getTableRowTypeLabel(row);

        if (label) {
          row.title = label;
        } else {
          row.removeAttribute("title");
        }

        Array.from(row.cells || []).forEach(cell => {
          delete cell.dataset.rowTypeLabel;
        });
      }

      shouldDecolumnizeTableRow(table, row, rowType) {
        /*
          A descolunização pertence ao tipo da linha, não à posição.
          Qualquer linha GroupHeader vira uma célula única
          com colspan total.
        */
        rowType = this.normalizeTableRowType(rowType);
        return rowType === "GroupHeader" || rowType === "TableHeader" || rowType === "TableFooter";
      }

      isCellHtmlEmpty(html) {
        const text = String(html || "")
          .replace(/<br\s*\/?\s*>/gi, "")
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      decolumnizeTableRow(table, row, rowType, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const columnCount = Math.max(
          1,
          Number(totalColumns) || this.getTableColumnCount(table)
        );

        const firstCell = row.cells[0];
        const extraCells = Array.from(row.cells).slice(1);

        /*
          Preserva algum conteúdo que eventualmente exista nas demais células,
          antes de remover as células excedentes.
        */
        extraCells.forEach(cell => {
          if (!this.isCellHtmlEmpty(cell.innerHTML)) {
            if (!this.isCellHtmlEmpty(firstCell.innerHTML)) {
              firstCell.insertAdjacentHTML("beforeend", "<br>");
            }

            firstCell.insertAdjacentHTML("beforeend", cell.innerHTML);
          }

          cell.remove();
        });

        firstCell.colSpan = columnCount;
        firstCell.contentEditable = "true";

        row.dataset.wordexDecolumnized = "1";
        row.dataset.wordexOriginalColumnCount = String(columnCount);
        this.updateTableRowTypeLabel(row);
      }

      recolumnizeTableRow(table, row, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const firstCell = row.cells[0];
        const columnCount = Math.max(
          1,
          Number(totalColumns) ||
            Number(row.dataset.wordexOriginalColumnCount) ||
            Number(firstCell.colSpan) ||
            this.getTableColumnCount(table)
        );

        firstCell.colSpan = 1;

        delete row.dataset.wordexDecolumnized;
        delete row.dataset.wordexOriginalColumnCount;

        while (row.cells.length < columnCount) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          row.appendChild(td);
        }
      }

      normalizeTableRowColumnsForType(table, row, rowType) {
        if (!table || !row) return;

        if (this.shouldDecolumnizeTableRow(table, row, rowType)) {
          this.decolumnizeTableRow(table, row, rowType);
          return;
        }

        this.recolumnizeTableRow(table, row);
      }

      getSelectedTableRowContext() {
        const context = this.getSelectedTableContext();

        if (!context) return null;

        return {
          table: context.table,
          row: context.row,
          cell: context.cell,
          rowIndex: Array.from(context.table.rows).indexOf(context.row)
        };
      }

      getTableRowSection(table, rowIndex) {
        const rows = Array.from(table?.rows || []);

        if (rowIndex <= 0) {
          return "tableHeader";
        }

        if (rowIndex >= rows.length - 1) {
          return "tableFooter";
        }

        return "middle";
      }

      getAllowedTableRowTypesForRow(table, row) {
        const rowIndex = Array.from(table.rows).indexOf(row);
        const section = this.getTableRowSection(table, rowIndex);

        if (section === "tableHeader") {
          return ["TableHeader"];
        }

        if (section === "tableFooter") {
          return ["TableFooter"];
        }

        return ["ColumnHeader", "GroupHeader", "Detail", "GroupFooter"];
      }

      parseTruthyText(value) {
        return ["true", "1", "sim", "s", "yes", "y"].includes(String(value || "").trim().toLowerCase());
      }

      isValidBooleanText(value) {
        return ["true", "false", "1", "0", "sim", "não", "nao", "s", "n", "yes", "no", "y"]
          .includes(String(value || "").trim().toLowerCase());
      }

      finalizeSelectedTableRowChange(context) {
        if (!context?.row) return;
        this.updateTableRowTypeLabel(context.row);
        this.syncAndSelectTableComponent(context, "row");
        this.syncTableRowTypeToolbar();
      }

      applySelectedTableRowType(rowType) {
        const rawValue = String(rowType ?? "").trim();

        if (!rawValue) {
          this.clearSelectedTableRowType();
          return;
        }

        rowType = this.normalizeTableRowType(rawValue);

        const context = this.getSelectedTableRowContext();

        if (!context) return;

        const rowIndex = Array.from(context.table.rows).indexOf(context.row);
        const section = this.getTableRowSection(context.table, rowIndex);

        if (section === "tableHeader" && rowType !== "TableHeader") {
          alert("A primeira linha da tabela é sempre TableHeader.");
          this.syncTableRowTypeToolbar();
          return;
        }

        if (section === "tableFooter" && rowType !== "TableFooter") {
          alert("A última linha da tabela é sempre TableFooter.");
          this.syncTableRowTypeToolbar();
          return;
        }

        if (section === "middle" && (rowType === "TableHeader" || rowType === "TableFooter")) {
          alert("TableHeader e TableFooter ficam fixos na primeira e na última linha.");
          this.syncTableRowTypeToolbar();
          return;
        }

        const allowed = this.getAllowedTableRowTypesForRow(context.table, context.row);

        if (!allowed.includes(rowType)) {
          alert("Tipo de linha inválido para esta posição.");

          this.syncTableRowTypeToolbar();
          return;
        }

        context.row.dataset.wordexRowType = rowType;

        this.normalizeTableRowColumnsForType(context.table, context.row, rowType);
        this.finalizeSelectedTableRowChange(context);
      }

      clearSelectedTableRowType() {
        const context = this.getSelectedTableRowContext();

        if (!context) return;

        const rowIndex = Array.from(context.table.rows).indexOf(context.row);
        const section = this.getTableRowSection(context.table, rowIndex);

        if (section === "tableHeader" || section === "tableFooter") {
          alert("A primeira linha é sempre TableHeader e a última sempre TableFooter.");
          this.syncTableRowTypeToolbar();
          return;
        }

        delete context.row.dataset.wordexRowType;

        this.normalizeTableRowColumnsForType(context.table, context.row, "");
        this.finalizeSelectedTableRowChange(context);
      }

      configureSelectedTableRow() {
        const context = this.getSelectedTableRowContext();

        if (!context) return;

        const enabledText = prompt(
          "Enabled da linha? Use true ou false:",
          this.isTableRowEnabled(context.row) ? "true" : "false"
        );

        if (enabledText === null) return;

        if (!this.isValidBooleanText(enabledText)) {
          alert("Enabled inválido. Use true ou false.");
          return;
        }

        const isEnabled = this.parseTruthyText(enabledText);

        this.setTableRowEnabled(context.row, isEnabled);
        this.finalizeSelectedTableRowChange(context);
      }

      syncTableRowTypeToolbar() {
        const select = document.getElementById("tableRowType");

        if (!select) return;

        const context = this.getSelectedTableRowContextWithoutAlert();

        select.disabled = !context;

        Array.from(select.options).forEach(option => {
          if (!option.value) {
            option.disabled = false;
            return;
          }

          option.disabled = context
            ? !this.getAllowedTableRowTypesForRow(context.table, context.row).includes(option.value)
            : false;
        });

        const currentRowType = context?.row
          ? this.normalizeTableRowType(context.row.dataset.wordexRowType || "")
          : "";

        if (context?.row && currentRowType !== (context.row.dataset.wordexRowType || "")) {
          context.row.dataset.wordexRowType = currentRowType;
        }

        select.value = currentRowType || "";
      }

      hasSelectedTableRowForToolbar() {
        const liveObject = this.getLiveSelectedObject();

        if (!liveObject || !this.isWordexTableObject(liveObject)) {
          return false;
        }

        const mode = this.selectedTableMode || "cell";

        if (mode === "table") {
          return false;
        }

        return !!(
          this.getSelectedTableRowContextWithoutAlert() ||
          (mode === "row" && this.isInDocument(this.selectedTableRow))
        );
      }

      getToolbarContextState() {
        const liveObject = this.getLiveSelectedObject();
        const isTable = !!(liveObject && this.isWordexTableObject(liveObject));
        const isChart = !!(liveObject && liveObject.matches(".wordex-chart-box"));
        const isBarChart = !!(
          isChart &&
          String(liveObject.dataset.chartType || "bar").trim().toLowerCase() === "bar"
        );
        const isNonTextObject = !!(
          liveObject &&
          liveObject.matches(".dynamic-image-box, .wordex-table")
        );
        const activeTextbox = this.getActiveTextboxForTextEditing();
        const paragraph = this.getSelectedParagraphElement();
        const marginTarget = this.getCurrentMarginTarget();

        return {
          text: !!(activeTextbox || (paragraph && !isNonTextObject) || isChart),
          align: !!(liveObject || activeTextbox || paragraph),
          "chart-bar": isBarChart,
          table: isTable,
          "table-row": this.hasSelectedTableRowForToolbar(),
          margin: !!marginTarget,
          object: !!liveObject,
          "json-image": !!this.getReportDataRootRecord(),
          "json-macros": !!this.getReportDataRootRecord()
        };
      }

      updateToolbarContext() {
        const state = this.getToolbarContextState();

        document.querySelectorAll("[data-wordex-toolbar-context]").forEach(element => {
          const context = element.dataset.wordexToolbarContext;
          const visible = !!state[context];

          element.classList.toggle("wordex-toolbar-hidden", !visible);
        });

        if (!state.table) {
          this.closeBorderDropdown?.();
        }

        this.syncChartToolbarControls();
      }

      getSelectedTableRowContextWithoutAlert() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) return null;

        return {
          table,
          row: cell.parentElement,
          cell,
          rowIndex: Array.from(table.rows).indexOf(cell.parentElement)
        };
      }

      askTableAlignment() {
        const value = prompt("Alinhamento: left, center, right ou justify", "left");

        if (!value) return null;

        const align = value.trim().toLowerCase();

        if (!["left", "center", "right", "justify"].includes(align)) {
          alert("Alinhamento inválido. Use left, center, right ou justify.");
          return null;
        }

        return align;
      }

      getSelectedTableContext() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            const node = selection.getRangeAt(0).commonAncestorContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            cell = element?.closest("td") || null;
          }
        }

        if (!cell) {
          alert("Selecione uma célula da tabela.");
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          alert("A célula selecionada não pertence a uma tabela Wordex.");
          return null;
        }

        return {
          table,
          cell,
          row: cell.parentElement,
          columnIndex: Array.from(cell.parentElement.cells).indexOf(cell)
        };
      }

      getSelectedTableContextWithoutAlert() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            cell = this.getTableCellFromRange(selection.getRangeAt(0));
          }
        }

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          return null;
        }

        return {
          table,
          cell,
          row: cell.parentElement,
          columnIndex: Array.from(cell.parentElement.cells).indexOf(cell)
        };
      }

      applyParagraphAlignToSelectedTableComponent(align) {
        const context = this.getSelectedTableContextWithoutAlert();

        if (!context) {
          return false;
        }

        const mode = this.selectedTableMode || "cell";

        /*
          v255: tabela inteira selecionada com Ctrl+click deve se comportar
          como objeto dentro do parágrafo. Assim, esquerda/centro/direita
          alinham a tabela no fluxo, em vez de alterar o texto das células.
          Célula, linha e coluna continuam alinhando o conteúdo interno.
        */
        if (mode === "table") {
          return false;
        }

        const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
          ? align
          : "";

        const applyToCell = cell => {
          if (cell) {
            cell.style.textAlign = normalizedAlign;
          }
        };

        if (mode === "row") {
          Array.from(context.row.cells).forEach(applyToCell);
        } else if (mode === "column") {
          Array.from(context.table.rows).forEach(row => applyToCell(row.cells[context.columnIndex]));
        } else if (mode === "table") {
          context.table.querySelectorAll("td").forEach(applyToCell);
        } else {
          applyToCell(context.cell);
        }

        this.syncAndSelectTableComponent(context, mode === "table" ? "table" : mode);
        return true;
      }

      alignSelectedTable(scope) {
        const context = this.getSelectedTableContext();
        if (!context) return;

        const align = this.askTableAlignment();
        if (!align) return;

        this.forEachSelectedTableTarget(scope, cell => {
          cell.style.textAlign = align;
        });

        this.syncAndSelectTableComponent(context, "cell");
      }

      alignSelectedTableCell() {
        this.alignSelectedTable("cell");
      }

      alignSelectedTableRow() {
        this.alignSelectedTable("row");
      }

      alignSelectedTableColumn() {
        this.alignSelectedTable("column");
      }

      applyParagraphAlign(align) {
        /*
          Célula/linha/coluna/tabela continuam tendo prioridade sobre objetos
          selecionados anteriormente.
        */
        if (this.applyParagraphAlignToSelectedTableComponent(align)) {
          return;
        }

        const selectedObject = this.getLiveSelectedObject();

        if (selectedObject) {
          const objectAlign = this.normalizeToolbarAlignForObject(align);
          this.applyAlignment(selectedObject, objectAlign);
          this.limitObjectWidthToParagraph(selectedObject);
          this.syncObjectAfterChangeAndKeepSelected(selectedObject);
          return;
        }

        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          this.applyTextboxTextAlign(activeTextbox, align);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
            ? align
            : "";

          paragraph.style.textAlign = normalizedAlign;

          const block = this.findBlockById(paragraph.dataset.blockId);
          if (block) {
            block.style.textAlign = normalizedAlign;
            block.html = this.getCleanInnerHtml(paragraph);
          }
          return;
        }
      }

      applyTextboxTextAlign(textbox, align) {
        if (!textbox) return;

        const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
          ? align
          : "left";

        /*
          v253/v254: o textbox precisa ter alinhamento interno próprio.
          Quando o parágrafo é alinhado, o objeto acompanha visualmente o fluxo,
          mas o texto interno não deve herdar o text-align do parágrafo.
          A partir da v254, Ctrl+click seleciona o textbox como objeto;
          clique normal mantém o foco de edição no texto interno.
        */
        textbox.style.textAlign = normalizedAlign;
        this.syncObjectAfterChangeAndKeepSelected(textbox);
      }

      getLiveSelectedObject() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          this.selectedObject.matches?.(WordexEditor.objectSelector)
        ) {
          return this.selectedObject;
        }

        return null;
      }

      getActiveTextboxForTextEditing() {
        const activeElement = document.activeElement;
        const activeTextbox = activeElement?.closest?.(".wordex-textbox") || null;

        if (activeTextbox && this.documentElement.contains(activeTextbox)) {
          return activeTextbox;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          return null;
        }

        const node = selection.getRangeAt(0).commonAncestorContainer;
        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        const textbox = element?.closest?.(".wordex-textbox") || null;

        return textbox && this.documentElement.contains(textbox) ? textbox : null;
      }

      normalizeToolbarAlignForObject(align) {
        if (align === "left" || align === "center" || align === "right") {
          return align;
        }

        return "free";
      }

      applyFormatting(style) {
        if (this.applyFormattingToSelectedText(style)) {
          return;
        }

        if (this.selectedObject) {
          this.applyFormattingToSelectedObject(style);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.applyFormattingToParagraph(paragraph, style);
        }
      }

      applyFormattingToSelectedText(style) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          v247: quando o usuário seleciona um trecho que já está dentro de um
          span de formatação e muda o tamanho da fonte de volta, não podemos
          simplesmente criar outro span dentro do anterior. O span antigo fica
          segurando a altura da linha mesmo que o texto visível volte ao tamanho
          normal. Nesse caso, reaproveitamos o span existente e atualizamos sua
          formatação em vez de aninhar outro.
        */
        const existingSpan = this.findFormattingSpanCoveredByRange(range, paragraph);

        if (existingSpan) {
          this.applyStyleObject(existingSpan, style);
          existingSpan.querySelectorAll("span").forEach(child => {
            this.applyStyleObject(child, style);
          });

          this.removeEmptyInlineStyleElements(paragraph);

          selection.removeAllRanges();

          const newRange = document.createRange();
          newRange.selectNodeContents(existingSpan);
          selection.addRange(newRange);

          this.finalizeParagraphFormatting(paragraph, true);
          return true;
        }

        const span = document.createElement("span");
        this.applyStyleObject(span, style);

        try {
          range.surroundContents(span);
        } catch {
          const contents = range.extractContents();
          span.appendChild(contents);
          range.insertNode(span);
        }

        selection.removeAllRanges();

        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        selection.addRange(newRange);

        this.finalizeParagraphFormatting(paragraph, true);

        return true;
      }

      findFormattingSpanCoveredByRange(range, paragraph) {
        if (!range || !paragraph) return null;

        const startElement = range.startContainer.nodeType === Node.ELEMENT_NODE
          ? range.startContainer
          : range.startContainer.parentElement;

        const endElement = range.endContainer.nodeType === Node.ELEMENT_NODE
          ? range.endContainer
          : range.endContainer.parentElement;

        if (!startElement || !endElement) return null;

        const selectedText = String(range.toString() || "").trim();

        if (!selectedText) return null;

        const candidates = [];
        let current = startElement;

        while (current && current !== paragraph) {
          if (
            current instanceof HTMLSpanElement &&
            current.contains(endElement) &&
            paragraph.contains(current)
          ) {
            const spanText = String(current.textContent || "").trim();

            if (spanText === selectedText) {
              candidates.push(current);
            }
          }

          current = current.parentElement;
        }

        /*
          Retorna o span mais externo que ainda corresponde exatamente ao texto
          selecionado. Se existir um span antigo grande envolvendo um span novo
          pequeno, atualizar o externo é o que permite a altura da linha voltar.
        */
        return candidates.length ? candidates[candidates.length - 1] : null;
      }

      finalizeParagraphFormatting(paragraph, updateSelectionIds = false) {
        if (!paragraph) return;

        if (updateSelectionIds) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        }

        this.syncParagraphElement(paragraph);
        this.renderSelection();
        this.saveUndoStateIfChanged();
      }

      applyFormattingToParagraph(paragraph, style) {
        this.applyStyleObject(paragraph, style);

        const block = this.findBlockById(paragraph.dataset.blockId);

        if (block) {
          block.style.fontFamily = paragraph.style.fontFamily || block.style.fontFamily;
          block.style.fontSize = paragraph.style.fontSize || block.style.fontSize;
          block.style.color = paragraph.style.color || block.style.color || "#000000";
          block.style.textAlign = paragraph.style.textAlign || block.style.textAlign;
          block.html = this.getCleanInnerHtml(paragraph);
        }

        this.finalizeParagraphFormatting(paragraph);
      }

      applyFormattingToSelectedObject(style) {
        const object = this.selectedObject;

        if (!object) return;

        /*
          Imagem: fonte/cor afetam apenas o rótulo visual do marcador.
          Tabela: fonte/cor afetam o conteúdo das células.
        */
        this.applyStyleObject(object, style);

        if (this.isWordexTableObject(object)) {
          object.querySelectorAll("td").forEach(cell => {
            this.applyStyleObject(cell, style);
          });
        }

        if (object.matches(".wordex-chart-box")) {
          this.updateChartBoxPresentation(object);
        }

        this.syncObjectAfterChangeAndKeepSelected(object);
      }

      applyStyleObject(element, style) {
        if (!element || !style) return;

        Object.entries(style).forEach(([key, value]) => {
          element.style[key] = value;

          if (key === "textDecoration") {
            element.style.textDecorationLine = value;
          }
        });
      }

      isPrimaryModifierPressed(event) {
        return !!(event && (event.ctrlKey || event.metaKey));
      }

      isWordexTableObject(object) {
        return !!(object && object.matches(".wordex-table"));
      }

      handleUndoShortcut(event) {
        if (event.wordexUndoHandled) {
          return false;
        }

        const key = String(event.key || "").toLowerCase();

        if (!this.isPrimaryModifierPressed(event)) {
          return false;
        }

        if (event.shiftKey || event.altKey || key !== "z") {
          return false;
        }

        /*
          Não sequestra Ctrl+Z em campos auxiliares do próprio navegador/editor.
        */
        const target = event.target;

        if (
          target?.closest?.(".toolbar") ||
          target?.matches?.("textarea, input, select")
        ) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        event.wordexUndoHandled = true;

        this.undoLastChange();
        return true;
      }

      getUndoSnapshot() {
        return JSON.stringify(this.wordexDocument);
      }

      resetUndoHistory() {
        const snapshot = this.getUndoSnapshot();

        this.undoStack = [snapshot];
        this.undoIndex = 0;
        this.lastUndoSnapshot = snapshot;
      }

      saveUndoCheckpointForParagraph(paragraphElement) {
        if (this.isRestoringUndo || !paragraphElement) return;

        this.syncParagraphElement(paragraphElement);
        this.saveUndoStateIfChanged();
      }

      syncDocumentFromDomForUndo() {
        if (!this.documentElement) return;

        this.documentElement.querySelectorAll(".paragraph").forEach(paragraphElement => {
          this.syncParagraphElement(paragraphElement);
        });

        this.documentElement.querySelectorAll(".object-block").forEach(wrapper => {
          const object = wrapper.querySelector(WordexEditor.objectSelector);

          if (object) {
            this.syncStandaloneObjectFromDom(object);
          }
        });
      }

      saveUndoStateIfChanged() {
        if (this.isRestoringUndo) return;

        const snapshot = this.getUndoSnapshot();
        const currentHistorySnapshot = this.undoStack[this.undoIndex];

        if (snapshot === currentHistorySnapshot) {
          this.lastUndoSnapshot = snapshot;
          return;
        }

        /*
          Se o usuário desfez e depois alterou o documento,
          descarta o futuro do histórico.
        */
        if (this.undoIndex < this.undoStack.length - 1) {
          this.undoStack = this.undoStack.slice(0, this.undoIndex + 1);
        }

        this.undoStack.push(snapshot);
        this.undoIndex = this.undoStack.length - 1;
        this.lastUndoSnapshot = snapshot;

        if (this.undoStack.length > this.maxUndoSteps) {
          this.undoStack.shift();
          this.undoIndex = Math.max(0, this.undoIndex - 1);
        }
      }

      countTablesInUndoSnapshot(snapshot) {
        return (String(snapshot || "").match(/wordex-table/g) || []).length;
      }

      undoSnapshotWouldLoseTables(storedSnapshot, liveSnapshot) {
        return (
          this.countTablesInUndoSnapshot(storedSnapshot) >
          this.countTablesInUndoSnapshot(liveSnapshot)
        );
      }

      undoLastChange() {
        if (this.undoStack.length === 0 || this.undoIndex <= 0) {
          alert("Nada para desfazer.");
          return;
        }

        /*
          Mescla edição de texto ainda não salva no índice atual (sem criar entrada nova).
          Se a sincronização omitir tabelas do HTML, não sobrescreve o snapshot guardado.
        */
        const storedSnapshot = this.undoStack[this.undoIndex];

        this.isRestoringUndo = true;
        this.syncDocumentFromDomForUndo();
        const liveSnapshot = this.getUndoSnapshot();

        if (!this.undoSnapshotWouldLoseTables(storedSnapshot, liveSnapshot)) {
          this.undoStack[this.undoIndex] = liveSnapshot;
          this.lastUndoSnapshot = liveSnapshot;
        }

        this.isRestoringUndo = false;

        this.undoIndex--;
        this.restoreUndoSnapshot(this.undoStack[this.undoIndex]);
      }

      restoreUndoSnapshot(snapshot) {
        try {
          this.isRestoringUndo = true;

          this.wordexDocument = JSON.parse(snapshot);
          this.lastUndoSnapshot = snapshot;

          this.clearSelection();
          this.render();
        } catch (error) {
          alert("Erro ao desfazer: " + error.message);
        } finally {
          this.isRestoringUndo = false;
        }
      }

      handleInlineObjectDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        /*
          Dentro de textbox, Backspace/Delete continua sendo edição normal.
          Dentro de célula de tabela, porém, o Wordex precisa conseguir
          selecionar/excluir objetos inseridos na célula.
        */
        if (event.target.closest(".wordex-textbox")) {
          return false;
        }

        const selection = window.getSelection();
        const range = selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

        const activeCell =
          event.target.closest("td") ||
          this.getTableCellFromRange(range) ||
          this.selectedCell;

        /*
          Se uma célula está ativa, a tabela dona da célula também fica
          marcada como selectedObject para fins de edição da tabela.
          Nesse caso, Backspace/Delete NÃO pode apagar essa tabela inteira.
          Primeiro deve tentar achar objeto dentro da célula.
        */
        const selectedCellTable = activeCell?.closest?.(".wordex-table") || null;
        const selectedObjectIsOwnerTable =
          selectedCellTable &&
          this.selectedObject === selectedCellTable;

        /*
          Se já há um objeto selecionado, Backspace/Delete exclui esse objeto,
          exceto quando esse objeto é apenas a tabela dona da célula ativa.
        */
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          !selectedObjectIsOwnerTable
        ) {
          event.preventDefault();
          event.stopPropagation();

          this.deleteSelectedObject();
          return true;
        }

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }
        const container = this.findDeletionContainerFromNode(range.commonAncestorContainer);

        if (!container || !this.documentElement.contains(container)) {
          return false;
        }

        const result = this.findAdjacentObjectAtCaret(container, range, event.key);

        if (!result || !result.object || !result.marker) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        /*
          Não exclui de imediato. Primeiro seleciona o objeto.
          Isso evita surpresas e também resolve melhor objetos centralizados
          ou alinhados à direita, que não se comportam como texto comum.
        */
        this.placeCaretAtMarker(result.marker);
        result.marker.remove();

        this.selectObject(result.object);

        const cell = result.object.closest("td");
        if (cell) {
          this.selectedCell = cell;
        }

        return true;
      }

      findDeletionContainerFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        /*
          Se o caret está numa célula, a célula é o container de edição.
          Caso contrário, usa o parágrafo.
        */
        return element.closest("td") || element.closest(".paragraph");
      }

      findAdjacentObjectAtCaret(container, range, key) {
        const marker = document.createElement("span");
        marker.dataset.wordexCaretMarker = "1";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "0";
        marker.style.overflow = "hidden";
        marker.appendChild(document.createTextNode("\u200B"));

        const workRange = range.cloneRange();
        workRange.insertNode(marker);

        const units = this.getDeletionUnits(container, marker);
        const index = units.indexOf(marker);

        if (index < 0) {
          marker.remove();
          return null;
        }

        const step = key === "Backspace" ? -1 : 1;

        for (let i = index + step; i >= 0 && i < units.length; i += step) {
          const current = units[i];

          if (this.isWordexInlineObject(current)) {
            return {
              object: current,
              marker
            };
          }

          if (current.nodeType === Node.TEXT_NODE) {
            /*
              Textos técnicos invisíveis não contam como conteúdo.
              Texto real interrompe a busca, deixando o navegador apagar texto normalmente.
            */
            const text = current.nodeValue
              .replace(/\u200B/g, "")
              .replace(/\uFEFF/g, "")
              .replace(/\s/g, "");

            if (text.length === 0) {
              continue;
            }

            break;
          }

          /*
            BRs e spans vazios podem existir como sobras de edição;
            não devem impedir a seleção do objeto adjacente.
          */
          if (
            current.nodeType === Node.ELEMENT_NODE &&
            (
              current.tagName === "BR" ||
              current.dataset.wordexCaretMarker === "1" ||
              current.textContent.replace(/\u200B/g, "").trim() === ""
            )
          ) {
            continue;
          }

          break;
        }

        marker.remove();
        return null;
      }

      getDeletionUnits(container, marker) {
        const units = [];

        const walk = node => {
          if (node === marker) {
            units.push(node);
            return;
          }

          if (node.nodeType === Node.TEXT_NODE) {
            units.push(node);
            return;
          }

          if (node.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          /*
            Objetos Wordex contam como uma unidade apagável.
            Não entramos no conteúdo interno deles.
          */
          if (this.isWordexInlineObject(node)) {
            units.push(node);
            return;
          }

          /*
            BR conta como unidade vazia atravessável.
          */
          if (node.tagName === "BR") {
            units.push(node);
            return;
          }

          Array.from(node.childNodes).forEach(child => walk(child));
        };

        Array.from(container.childNodes).forEach(child => walk(child));

        return units;
      }

      isWordexInlineObject(node) {
        return Boolean(
          node &&
          node.nodeType === Node.ELEMENT_NODE &&
          node.matches(WordexEditor.objectSelector)
        );
      }

      placeCaretAtMarker(marker) {
        const selection = window.getSelection();
        const range = document.createRange();

        range.setStartBefore(marker);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      handleEmptyParagraphDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        if (
          !this.isParagraphHtmlEmpty(this.getCleanInnerHtml(paragraph)) ||
          this.hasParagraphVisualContent(paragraph)
        ) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.deleteEmptyParagraph(paragraph);
        return true;
      }

      deleteEmptyParagraph(paragraphElement) {
        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        blocks.splice(index, 1);

        this.ensureRequiredParagraphs();

        let targetBlock = null;

        if (blocks.length > 0) {
          targetBlock = blocks[Math.min(index, blocks.length - 1)];
        }

        this.selected.region = region;
        this.selectedObject = null;
        this.selectedCell = null;

        if (targetBlock && targetBlock.type === "paragraph") {
          this.selectedParagraphId = targetBlock.id;
          this.selectedBlockId = targetBlock.id;
        } else {
          this.selectedParagraphId = null;
          this.selectedBlockId = null;
        }

        this.render();

        const targetElement = this.getSelectedParagraphElement();

        if (targetElement) {
          targetElement.focus();

          if (this.isParagraphHtmlEmpty(this.getCleanInnerHtml(targetElement))) {
            this.placeCaretAtStart(targetElement);
          } else {
            this.placeCaretAtEnd(targetElement);
          }

          this.saveSelectionIfInsideParagraph();
        }
      }

      handleParagraphEnter(event) {
        if (event.key !== "Enter") {
          return false;
        }

        /*
          Shift+Enter continua disponível para quebra de linha interna,
          caso seja necessário em algum ponto.
        */
        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          Dentro de célula de tabela ou textbox, Enter deve continuar sendo comportamento
          do próprio conteúdo, não criação de novo parágrafo externo.
        */
        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.splitParagraphAtCaret(paragraph);
        return true;
      }

      splitParagraphAtCaret(paragraphElement) {
        if (!paragraphElement) return;

        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        const currentBlock = blocks[index];

        let afterHtml = "";

        const selection = window.getSelection();

        if (
          selection &&
          selection.rangeCount > 0 &&
          paragraphElement.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          const range = selection.getRangeAt(0);

          /*
            Se houver texto selecionado, ele é removido antes da divisão.
          */
          if (!range.collapsed) {
            range.deleteContents();
          }

          const afterRange = document.createRange();
          afterRange.selectNodeContents(paragraphElement);
          afterRange.setStart(range.startContainer, range.startOffset);

          const afterFragment = afterRange.extractContents();
          afterHtml = this.fragmentToHtml(afterFragment);
        }

        /*
          Depois de extrair o conteúdo posterior ao cursor,
          o parágrafo atual fica apenas com a parte anterior.
        */
        this.syncParagraphElement(paragraphElement);

        /*
          O novo parágrafo deve nascer com a configuração atual da toolbar,
          não com o estilo do parágrafo anterior.
        */
        const newParagraph = this.createParagraph(afterHtml);

        blocks.splice(index + 1, 0, newParagraph);

        this.selected.region = region;
        this.selectedParagraphId = newParagraph.id;
        this.selectedBlockId = newParagraph.id;
        this.selectedObject = null;
        this.selectedCell = null;

        this.render();

        const newElement = this.getSelectedParagraphElement();

        if (newElement) {
          newElement.focus();
          this.placeCaretAtStart(newElement);
          this.saveSelectionIfInsideParagraph();
        }
      }

      fragmentToHtml(fragment) {
        const container = document.createElement("div");
        container.appendChild(fragment);
        return container.innerHTML;
      }

      handleParagraphBoundaryArrow(event) {
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") {
          return false;
        }

        /*
          Ctrl+setas continuam reservadas para movimentar objetos/blocos.
        */
        if (event.ctrlKey || event.altKey || event.metaKey || event.shiftKey) {
          return false;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (paragraph.closest("td")) {
          return false;
        }

        const lineInfo = this.getCaretVisualLineInfo(paragraph, range);

        if (!lineInfo) {
          return false;
        }

        if (event.key === "ArrowUp" && !lineInfo.isFirstLine) {
          return false;
        }

        if (event.key === "ArrowDown" && !lineInfo.isLastLine) {
          return false;
        }

        const currentBlock = paragraph.closest(".paragraph-block");

        if (!currentBlock) {
          return false;
        }

        const targetBlock = event.key === "ArrowUp"
          ? this.findSiblingParagraphBlock(currentBlock, "previous")
          : this.findSiblingParagraphBlock(currentBlock, "next");

        if (!targetBlock) {
          return false;
        }

        const targetParagraph = targetBlock.querySelector(".paragraph");

        if (!targetParagraph) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        const region = targetBlock.closest(".region")?.dataset.region || this.selected.region;
        const blockId = targetBlock.dataset.blockId;

        this.selectParagraph(region, blockId);
        targetParagraph.focus();

        if (event.key === "ArrowUp") {
          this.placeCaretAtEnd(targetParagraph);
        } else {
          this.placeCaretAtStart(targetParagraph);
        }

        this.saveSelectionIfInsideParagraph();
        return true;
      }

      findSiblingParagraphBlock(currentBlock, direction) {
        let sibling = direction === "previous"
          ? currentBlock.previousElementSibling
          : currentBlock.nextElementSibling;

        while (sibling) {
          if (sibling.classList.contains("paragraph-block")) {
            return sibling;
          }

          sibling = direction === "previous"
            ? sibling.previousElementSibling
            : sibling.nextElementSibling;
        }

        return null;
      }

      getCaretVisualLineInfo(paragraph, range) {
        /*
          Detecta a linha visual real do caret.
          Isso é diferente de início/fim lógico do parágrafo.
          Exemplo: em um parágrafo quebrado em 3 linhas, seta para cima
          só vai ao parágrafo anterior se o caret estiver na primeira linha visual.
        */
        const marker = document.createElement("span");
        marker.dataset.wordexCaretLineMarker = "1";
        marker.textContent = "\u200B";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "1em";
        marker.style.overflow = "hidden";
        marker.style.verticalAlign = "baseline";

        const markerRange = range.cloneRange();
        markerRange.insertNode(marker);

        const caretRect = marker.getBoundingClientRect();

        const paragraphRange = document.createRange();
        paragraphRange.selectNodeContents(paragraph);

        const rects = Array.from(paragraphRange.getClientRects())
          .filter(rect => rect.width > 0 && rect.height > 0);

        marker.remove();

        if (!caretRect || caretRect.height === 0) {
          return null;
        }

        if (rects.length === 0) {
          return {
            isFirstLine: true,
            isLastLine: true
          };
        }

        /*
          Agrupa retângulos por linha visual, porque getClientRects()
          pode retornar vários retângulos na mesma linha.
        */
        const tolerance = 3;
        const lines = [];

        rects.forEach(rect => {
          let line = lines.find(item => Math.abs(item.top - rect.top) <= tolerance);

          if (!line) {
            line = {
              top: rect.top,
              bottom: rect.bottom
            };
            lines.push(line);
          } else {
            line.top = Math.min(line.top, rect.top);
            line.bottom = Math.max(line.bottom, rect.bottom);
          }
        });

        lines.sort((a, b) => a.top - b.top);

        const firstLine = lines[0];
        const lastLine = lines[lines.length - 1];

        return {
          isFirstLine: Math.abs(caretRect.top - firstLine.top) <= tolerance ||
            (caretRect.top >= firstLine.top - tolerance && caretRect.top <= firstLine.bottom + tolerance),

          isLastLine: Math.abs(caretRect.top - lastLine.top) <= tolerance ||
            (caretRect.top >= lastLine.top - tolerance && caretRect.top <= lastLine.bottom + tolerance)
        };
      }

      installInlineObjectDragEvents() {
        this.documentElement.addEventListener("mousedown", event => {
          this.startInlineObjectMouseDragCandidate(event);
        });

        document.addEventListener("mousemove", event => {
          this.handleInlineObjectMouseDragMove(event);
        });

        document.addEventListener("mouseup", event => {
          this.finishInlineObjectMouseDrag(event);
        });
      }

      startInlineObjectMouseDragCandidate(event) {
        if (event.button !== 0 || event.defaultPrevented || this.resizeDrag) {
          return;
        }

        if (event.target.closest(".wordex-resize-overlay, .toolbar, .wordex-resize-handle")) {
          return;
        }

        const object = event.target.closest(WordexEditor.objectSelector);
        if (!object || !this.documentElement.contains(object)) {
          return;
        }

        const dragContext = this.getObjectDragContainer(object);
        if (!dragContext) {
          return;
        }

        /*
          Tabelas continuam usando Ctrl+click para alternar seleção de tabela,
          linha, coluna e célula. O arrasto da tabela inteira só começa no modo
          table; célula, linha e coluna são fixos para edição/redimensionamento
          parcial (linha/coluna), mas a célula em si não move nem redimensiona.
        */
        if (this.isWordexTableObject(object) && this.selectedObject !== object) {
          return;
        }

        if (
          this.isWordexTableObject(object) &&
          this.selectedTableMode !== "table"
        ) {
          return;
        }

        /*
          Textbox só se move livremente depois de selecionado como objeto (Ctrl+click).
          Clique normal continua reservado para editar o texto interno.
        */
        if (object.matches(".wordex-textbox") && this.selectedObject !== object) {
          return;
        }

        this.inlineObjectDrag = {
          object,
          mode: dragContext.mode,
          container: dragContext.container,
          started: false,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startOffsetX: 0,
          startOffsetY: 0
        };
      }

      handleInlineObjectMouseDragMove(event) {
        const drag = this.inlineObjectDrag;
        if (!drag) return;

        if (!this.isInDocument(drag.object) || !this.isInDocument(drag.container)) {
          this.finishInlineObjectMouseDrag(event);
          return;
        }

        const dx = event.clientX - drag.startClientX;
        const dy = event.clientY - drag.startClientY;

        if (!drag.started) {
          if (Math.hypot(dx, dy) < 5) {
            return;
          }

          drag.started = true;
          document.body.classList.add("wordex-object-dragging");
          drag.object.classList.add("wordex-inline-object-dragging");
          this.selectObject(drag.object);
          this.prepareObjectForFreeDrag(drag.object, drag.container);
          drag.startOffsetX = this.getObjectVisualXInsideBlock(drag.object, drag.container);
          drag.startOffsetY = this.getObjectVisualYInsideBlock(drag.object, drag.container);
        }

        event.preventDefault();

        this.applyObjectFreePosition(
          drag.object,
          drag.container,
          drag.startOffsetX + dx,
          drag.startOffsetY + dy
        );
        this.updateFreeContainerBounds(drag.container);
        this.keepObjectSelected(drag.object);
      }

      finishInlineObjectMouseDrag(event) {
        const drag = this.inlineObjectDrag;
        if (!drag) return;

        this.inlineObjectDrag = null;
        document.body.classList.remove("wordex-object-dragging");

        if (!this.isInDocument(drag.object)) {
          return;
        }

        drag.object.classList.remove("wordex-inline-object-dragging");

        if (drag.started) {
          this.updateFreeContainerBounds(drag.container);
          this.syncObjectPositionInContainer(drag.object, drag.container, drag.mode);
          this.syncObjectAfterChangeAndKeepSelected(drag.object);
          event?.preventDefault?.();
        }
      }

      getCaretRangeFromPoint(clientX, clientY) {
        if (document.caretRangeFromPoint) {
          return document.caretRangeFromPoint(clientX, clientY);
        }

        if (document.caretPositionFromPoint) {
          const position = document.caretPositionFromPoint(clientX, clientY);
          if (!position) return null;

          const range = document.createRange();
          range.setStart(position.offsetNode, position.offset);
          range.collapse(true);
          return range;
        }

        return null;
      }

      handleFreeObjectKeyboard(event) {
        const arrows = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"];
        if (!arrows.includes(event.key)) return;

        /*
          Setas comuns ficam para navegação normal.
          Movimentação de objetos/blocos só com Ctrl + seta.
        */
        if (!event.ctrlKey) return;

        /*
          Se houver imagem/tabela selecionada, ela tem prioridade.
        */
        if (this.selectedObject) {
          const paragraph = this.selectedObject.closest(".paragraph");
          const objectBlock = this.selectedObject.closest(".object-block");

          if (!paragraph && !objectBlock) return;

          event.preventDefault();

          const step = event.shiftKey ? 80 : 24;

          /*
            Se o objeto está dentro de um parágrafo e o usuário usa Ctrl+seta,
            assumimos que ele quer movimentação livre dentro do texto.
            Então convertemos o alinhamento para "free" automaticamente.
          */
          if (paragraph) {
            const currentX = this.getObjectVisualXInsideBlock(this.selectedObject, paragraph);
            const currentY = this.getObjectVisualYInsideBlock(this.selectedObject, paragraph);

            if (event.key === "ArrowLeft") {
              this.applyObjectFreePosition(this.selectedObject, paragraph, currentX - step, currentY);
            } else if (event.key === "ArrowRight") {
              this.applyObjectFreePosition(this.selectedObject, paragraph, currentX + step, currentY);
            } else if (event.key === "ArrowUp") {
              this.applyObjectFreePosition(this.selectedObject, paragraph, currentX, currentY - step);
            } else if (event.key === "ArrowDown") {
              this.applyObjectFreePosition(this.selectedObject, paragraph, currentX, currentY + step);
            }

            this.updateFreeContainerBounds(paragraph);
            this.syncParagraphElement(paragraph);
            this.keepObjectSelected(this.selectedObject);
            return;
          }

          if (objectBlock) {
            if (event.key === "ArrowLeft") {
              this.moveStandaloneObjectHorizontally(-step);
            } else if (event.key === "ArrowRight") {
              this.moveStandaloneObjectHorizontally(step);
            } else if (event.key === "ArrowUp") {
              this.moveObjectBlockVertically("up");
            } else if (event.key === "ArrowDown") {
              this.moveObjectBlockVertically("down");
            }

            return;
          }
        }

        /*
          Sem objeto selecionado: Ctrl + ↑/↓ move o parágrafo/bloco selecionado.
        */
        if (this.selectedBlockId && (event.key === "ArrowUp" || event.key === "ArrowDown")) {
          event.preventDefault();

          this.moveSelectedBlockVertically(
            event.key === "ArrowUp" ? "up" : "down"
          );
        }
      }

      moveSelectedBlockVertically(direction) {
        if (!this.selectedBlockId) return;

        const blocks = this.wordexDocument[this.selected.region];
        const index = blocks.findIndex(block => block.id === this.selectedBlockId);

        if (index < 0) return;

        const newIndex = direction === "up" ? index - 1 : index + 1;

        if (newIndex < 0 || newIndex >= blocks.length) return;

        const [block] = blocks.splice(index, 1);
        blocks.splice(newIndex, 0, block);

        this.selectedBlockId = block.id;

        if (block.type === "paragraph") {
          this.selectedParagraphId = block.id;
          this.selectedObject = null;
        } else {
          this.selectedParagraphId = null;
        }

        this.render();

        if (block.type === "paragraph") {
          const paragraph = this.getSelectedParagraphElement();

          if (paragraph) {
            paragraph.focus();
            this.placeCaretAtEnd(paragraph);
            this.selectParagraph(this.selected.region, block.id);
          }
        } else {
          const rendered = this.documentElement.querySelector(
            `.object-block[data-block-id="${block.id}"] .dynamic-image-box, .object-block[data-block-id="${block.id}"] .wordex-table, .object-block[data-block-id="${block.id}"] .wordex-chart-box`
          );

          if (rendered) {
            this.keepObjectSelected(rendered);
          }
        }
      }

      moveStandaloneObjectHorizontally(delta) {
        const object = this.selectedObject;
        if (!object) return;

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const currentX = this.getObjectVisualXInsideBlock(object, wrapper);
        const currentY = this.getObjectVisualYInsideBlock(object, wrapper);

        this.applyObjectFreePosition(object, wrapper, currentX + delta, currentY);
        this.updateFreeContainerBounds(wrapper);
        this.syncStandaloneObjectFromDom(object);
        this.keepObjectSelected(object);
      }

      clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      moveInlineFreeObjectHorizontally(direction, step) {
        const object = this.selectedObject;
        const paragraph = object.closest(".paragraph");

        if (!paragraph) return;

        const position = direction === "left"
          ? this.findTextPositionBeforeObject(paragraph, object, step)
          : this.findTextPositionAfterObject(paragraph, object, step);

        if (!position) return;

        object.classList.remove("selected-object");
        object.remove();

        this.insertObjectIntoTextNode(position.node, position.offset, object);

        this.syncParagraphElement(paragraph);
        this.keepObjectSelected(object);
      }

      moveObjectBlockVertically(direction) {
        const object = this.selectedObject;
        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          const currentBlock = paragraph.closest(".paragraph-block");
          const targetBlock = direction === "up"
            ? currentBlock.previousElementSibling
            : currentBlock.nextElementSibling;

          if (!targetBlock || !targetBlock.classList.contains("paragraph-block")) return;

          const targetParagraph = targetBlock.querySelector(".paragraph");
          if (!targetParagraph) return;

          object.classList.remove("selected-object");
          object.remove();

          if (direction === "up") {
            targetParagraph.appendChild(object);
          } else {
            targetParagraph.insertBefore(object, targetParagraph.firstChild);
          }

          this.syncParagraphElement(paragraph);
          this.syncParagraphElement(targetParagraph);
          this.keepObjectSelected(object);
          return;
        }

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const region = wrapper.closest(".region");
        const blocks = this.wordexDocument[region.dataset.region];
        const index = blocks.findIndex(block => block.id === wrapper.dataset.blockId);
        const newIndex = direction === "up" ? index - 1 : index + 1;

        if (index < 0 || newIndex < 0 || newIndex >= blocks.length) return;

        const [block] = blocks.splice(index, 1);
        blocks.splice(newIndex, 0, block);

        this.selectedBlockId = block.id;
        this.render();

        const rendered = this.documentElement.querySelector(
          `.object-block[data-block-id="${block.id}"] .dynamic-image-box, .object-block[data-block-id="${block.id}"] .wordex-table`
        );

        if (rendered) this.selectObject(rendered);
      }

      getMovableTextNodes(paragraph, object) {
        const walker = document.createTreeWalker(
          paragraph,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode: node => {
              const parent = node.parentElement;
              if (!parent) return NodeFilter.FILTER_REJECT;

              if (
                parent.closest(".dynamic-image-box") ||
                parent.closest(".wordex-table") ||
                parent.closest(".wordex-chart-box") ||
                parent.closest(".wordex-textbox") ||
                parent.closest(".inline-field")
              ) {
                return NodeFilter.FILTER_REJECT;
              }

              if (!node.nodeValue || node.nodeValue.length === 0) {
                return NodeFilter.FILTER_REJECT;
              }

              return NodeFilter.FILTER_ACCEPT;
            }
          }
        );

        const nodes = [];
        let node;

        while ((node = walker.nextNode())) {
          nodes.push(node);
        }

        return nodes;
      }

      findTextPositionBeforeObject(paragraph, object, step) {
        const nodes = this.getMovableTextNodes(paragraph, object)
          .filter(node => node.compareDocumentPosition(object) & Node.DOCUMENT_POSITION_FOLLOWING);

        let remaining = step;

        for (let i = nodes.length - 1; i >= 0; i--) {
          const node = nodes[i];
          const length = node.nodeValue.length;

          if (remaining <= length) {
            return { node, offset: Math.max(0, length - remaining) };
          }

          remaining -= length;
        }

        if (nodes.length > 0) return { node: nodes[0], offset: 0 };

        return null;
      }

      findTextPositionAfterObject(paragraph, object, step) {
        const nodes = this.getMovableTextNodes(paragraph, object)
          .filter(node => object.compareDocumentPosition(node) & Node.DOCUMENT_POSITION_FOLLOWING);

        let remaining = step;

        for (const node of nodes) {
          const length = node.nodeValue.length;

          if (remaining <= length) {
            return { node, offset: Math.min(length, remaining) };
          }

          remaining -= length;
        }

        if (nodes.length > 0) {
          const last = nodes[nodes.length - 1];
          return { node: last, offset: last.nodeValue.length };
        }

        return null;
      }

      insertObjectIntoTextNode(textNode, offset, object) {
        const parent = textNode?.parentNode;

        if (!parent) return;

        /*
          Defesa extra:
          Ctrl+setas nunca pode mover um objeto para dentro de outro objeto.
          O caso que causava invasão era texto interno do gráfico sendo usado
          como ponto de inserção.
        */
        const parentElement = parent.nodeType === Node.ELEMENT_NODE
          ? parent
          : parent.parentElement;

        if (
          parentElement?.closest?.(WordexEditor.objectSelector)
        ) {
          return;
        }

        const text = textNode.nodeValue;
        const before = text.slice(0, offset);
        const after = text.slice(offset);

        const beforeNode = document.createTextNode(before);
        const afterNode = document.createTextNode(after);

        parent.insertBefore(beforeNode, textNode);
        parent.insertBefore(object, textNode);
        parent.insertBefore(afterNode, textNode);
        parent.removeChild(textNode);
      }

      keepObjectSelected(object) {
        if (!object) return;

        this.selectObject(object);

        const selection = window.getSelection();
        if (selection) {
          selection.removeAllRanges();
        }

        /*
          Alguns elementos, especialmente tabela com células editáveis,
          fazem o navegador tentar devolver o foco ao texto/célula após a movimentação.
          Este reforço mantém o objeto selecionado visualmente e logicamente.
        */
        setTimeout(() => {
          if (!this.documentElement.contains(object)) return;

          this.selectedObject = object;

          const paragraph = object.closest(".paragraph");
          const block = object.closest(".paragraph-block, .object-block");
          const region = object.closest(".region");

          if (region) {
            this.selected.region = region.dataset.region;
          }

          if (paragraph) {
            this.selectedParagraphId = paragraph.dataset.blockId;
            this.selectedBlockId = paragraph.dataset.blockId;
          } else if (block) {
            this.selectedParagraphId = null;
            this.selectedBlockId = block.dataset.blockId;
          }

          this.renderSelection();
        }, 0);
      }

      setCaretAfterObject(object) {
        const selection = window.getSelection();
        const caretRange = document.createRange();

        caretRange.setStartAfter(object);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.savedRange = caretRange.cloneRange();
      }

      deleteSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        /*
          Proteção: célula selecionada deixa a tabela dona da célula como objeto
          selecionado. Essa seleção é operacional; não deve apagar a tabela.
        */
        const selection = window.getSelection();
        const range = selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

        const activeCell =
          this.getTableCellFromRange(range) ||
          this.selectedCell;

        const selectedCellTable = activeCell?.closest?.(".wordex-table") || null;

        if (selectedCellTable && this.selectedObject === selectedCellTable) {
          return;
        }

        const paragraph = this.selectedObject.closest(".paragraph");
        const objectBlock = this.selectedObject.closest(".object-block");

        if (paragraph) {
          this.selectedObject.remove();
          this.selectedObject = null;
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          return;
        }

        if (objectBlock) {
          this.deleteBlock(this.selected.region, objectBlock.dataset.blockId);
        }
      }

      deleteBlock(region, blockId) {
        const blocks = this.wordexDocument[region];
        const index = blocks.findIndex(block => block.id === blockId);

        if (index >= 0) {
          blocks.splice(index, 1);
        }

        this.ensureRequiredParagraphs();

        this.clearSelection();
        this.render();
      }

      syncObjectDomState(object) {
        if (!object) {
          return false;
        }

        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          this.syncParagraphElement(paragraph);
          return true;
        }

        if (object.closest(".object-block")) {
          this.syncStandaloneObjectFromDom(object);
          return true;
        }

        return false;
      }

      syncObjectAfterChange(object) {
        if (this.syncObjectDomState(object)) {
          this.saveUndoStateIfChanged();
        }
      }

      syncObjectAfterChangeAndKeepSelected(object) {
        this.syncObjectAfterChange(object);
        this.keepObjectSelected(object);
      }

      migrateParagraphMarginsToWrapper(paragraphElement, wrapper) {
        if (!paragraphElement || !wrapper) return;

        ["marginTop", "marginRight", "marginBottom", "marginLeft"].forEach(property => {
          const value = paragraphElement.style[property];

          if (!value) return;

          if (!wrapper.style[property]) {
            wrapper.style[property] = value;
          }

          paragraphElement.style[property] = "";
        });
      }

      syncParagraphElement(paragraphElement) {
        if (!paragraphElement) return;

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (block) {
          const html = this.getCleanInnerHtml(paragraphElement);
          this.updateParagraphEmptyState(paragraphElement);
          block.html = this.isParagraphVisuallyEmptyHtml(html) ? "" : html;
          block.style = block.style || {};

          const wrapper = paragraphElement.closest(".paragraph-block");

          if (wrapper) {
            this.migrateParagraphMarginsToWrapper(paragraphElement, wrapper);
            block.style.marginTop = wrapper.style.marginTop || "";
            block.style.marginRight = wrapper.style.marginRight || "";
            block.style.marginBottom = wrapper.style.marginBottom || "";
            block.style.marginLeft = wrapper.style.marginLeft || "";

            if (paragraphElement.style.minHeight) {
              block.style.minHeight = paragraphElement.style.minHeight;
            }
          }
        }
      }

      copyStandaloneAlignAndWidth(block, object) {
        block.align = object.dataset.align;
        block.width = object.style.width;
      }

      copyStandaloneBlockX(block, object) {
        block.blockX = object.dataset.blockX || "0";
        block.blockY = object.dataset.blockY || "0";
      }

      syncStandaloneObjectHtml(block, object) {
        block.html = this.getCleanOuterHtml(object);
      }

      syncStandaloneObjectFromDom(object) {
        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const block = this.findBlockById(wrapper.dataset.blockId);
        if (!block) return;

        if (block.type === "dynamicImage") {
          block.fieldName = object.dataset.fieldName;
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.copyStandaloneBlockX(block, object);
          return;
        }

        if (block.type === "staticImage") {
          block.imageName = object.dataset.imageName || object.querySelector("img")?.alt || "Imagem";
          block.imageSrc = object.querySelector("img")?.getAttribute("src") || "";
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.copyStandaloneBlockX(block, object);
          return;
        }

        if (block.type === "chart") {
          block.sourceName = object.dataset.sourceName || "";
          block.chartType = object.dataset.chartType;
          block.chartData = this.readChartDataFromElement(object);
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.syncStandaloneObjectHtml(block, object);
          return;
        }

        if (block.type === "table") {
          this.copyStandaloneAlignAndWidth(block, object);
          this.copyStandaloneBlockX(block, object);
