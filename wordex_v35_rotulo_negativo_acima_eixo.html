          this.syncStandaloneObjectHtml(block, object);
        }
      }

      getCleanInnerHtml(paragraphElement) {
        /*
          Tabelas (contenteditable=false dentro do parágrafo) por vezes não entram
          de forma fiável no innerHTML do clone. Imagem/gráfico não têm esse problema.
        */
        if (paragraphElement.querySelector("table.wordex-table")) {
          return this.serializeParagraphInlineObjects(paragraphElement);
        }

        const clone = paragraphElement.cloneNode(true);
        this.clearObjectSelectionMarks(clone);
        return clone.innerHTML;
      }

      serializeParagraphInlineObjects(paragraphElement) {
        const parts = [];

        paragraphElement.childNodes.forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            parts.push(child.textContent);
            return;
          }

          if (child.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          if (child.matches(WordexEditor.objectSelector)) {
            parts.push(this.getCleanOuterHtml(child));
            return;
          }

          if (child.tagName === "BR") {
            parts.push("<br>");
            return;
          }

          parts.push(child.outerHTML);
        });

        return parts.join("");
      }

      getCleanOuterHtml(element) {
        const clone = element.cloneNode(true);
        this.normalizeLegacyTableFooterRows(clone);
        this.clearObjectSelectionMarks(clone);
        return clone.outerHTML;
      }

      saveSelectionIfInsideParagraph() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const paragraphElement = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraphElement) return;

        const previousObject = this.selectedObject;
        const previousRegion = this.selected.region;
        const regionElement = paragraphElement.closest(".region");

        if (regionElement?.dataset?.region) {
          this.selected.region = regionElement.dataset.region;
        }

        /*
          A célula deve ser determinada pelo caret real, não pelo parágrafo.
          A tabela fica dentro do parágrafo, então paragraphElement.closest("td")
          sempre seria falso e limparia selectedCell durante a digitação.
        */
        const activeCell = this.getTableCellFromRange(range);

        if (activeCell) {
          const table = activeCell.closest(".wordex-table");

          this.selectedCell = activeCell;
          this.selectedObject = table || this.selectedObject;
          this.selectedTableMode = this.selectedTableMode || "cell";
          this.selectedTableRow = activeCell.parentElement;
          this.selectedTableColumnIndex = activeCell.parentElement
            ? Array.from(activeCell.parentElement.cells).indexOf(activeCell)
            : null;
        } else {
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;

          if (this.selectedObject?.matches?.(".wordex-table")) {
            const keepTableSelection =
              this.selectedTableMode === "table" ||
              this.selectedTableMode === "row" ||
              this.selectedTableMode === "column";

            if (!keepTableSelection) {
              this.selectedObject = null;
            }
          }

          if (!document.activeElement?.closest?.(".toolbar")) {
            if (this.selectedObject?.matches?.(".wordex-table")) {
              this.macroPickerActiveTable = this.selectedObject;
            } else {
              this.macroPickerActiveTable = null;
            }
          }
        }

        if (this.selectedObject?.matches?.(".dynamic-image-box")) {
          const range = selection.getRangeAt(0);
          const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;
          const focusInImage =
            document.activeElement?.closest?.(".dynamic-image-box") === this.selectedObject;

          if (!focusInImage && (!element || !this.selectedObject.contains(element))) {
            this.selectedObject = null;
          }
        }

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.savedRange = range.cloneRange();

        const nextTable = this.getActiveTableForMacroContext();
        const jsonToolbarNeedsUpdate =
          this.selectedObject !== previousObject ||
          nextTable !== this.macroPickerActiveTable ||
          this.selected.region !== previousRegion;

        if (jsonToolbarNeedsUpdate) {
          this.macroPickerActiveTable = nextTable;
          this.updateJsonMacroToolbar();
        }
      }

      findParagraphElementFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        return element.closest(".paragraph");
      }

      placeCaretAtStart(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEnd(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEndIfNoSelection(element) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          this.placeCaretAtEnd(element);
          return;
        }

        const range = selection.getRangeAt(0);

        if (!element.contains(range.commonAncestorContainer)) {
          this.placeCaretAtEnd(element);
        }
      }

      normalizeAllObjectsIntoParagraphs() {
        ["headerTemplate", "bodyFlow", "footerTemplate"].forEach(region => {
          this.wordexDocument[region] = this.wordexDocument[region].map(block => {
            if (block.type === "paragraph") {
              return block;
            }

            return this.convertObjectBlockToParagraph(block);
          });
        });
      }

      convertObjectBlockToParagraph(block) {
        let html = "";

        if (block.type === "dynamicImage") {
          const image = this.createDynamicImageElement(
            block.fieldName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "staticImage") {
          const image = this.createStaticImageElement(
            block.imageSrc || "",
            block.imageName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "table") {
          html = (block.html || this.createTableHtml(1, 1, block.align || "left", block.width || "80mm")) + "\u200B";
        }

        return {
          id: block.id || this.createId("paragraph"),
          type: "paragraph",
          html,
          style: {
            fontFamily: "Arial",
            fontSize: "12pt",
            textAlign: "left"
          }
        };
      }

      render() {
        this.normalizeAllObjectsIntoParagraphs();
        this.documentElement.innerHTML = "";

        const title = document.createElement("div");
        title.className = "document-title";
        const page = this.getPageSettings();
        title.textContent = `Wordex — ${page.format} ${page.orientation === "landscape" ? "paisagem" : "retrato"} — ${page.width} x ${page.height}`;
        this.documentElement.appendChild(title);

        this.injectContinuousWatermarkPreview(
          this.documentElement,
          this.getGeneratedWatermarkSettings(),
          "wordex-editor-watermark"
        );

        this.documentElement.appendChild(
          this.renderRegion("headerTemplate", "header-template", "Modelo de cabeçalho")
        );

        this.documentElement.appendChild(
          this.renderRegion("bodyFlow", "body-flow", "Corpo contínuo")
        );

        this.documentElement.appendChild(
          this.renderRegion("footerTemplate", "footer-template", "Modelo de rodapé")
        );

        if (this.selected.region === "bodyFlow") {
          this.ensureParagraphSelection();
        }

        this.renderSelection();

        if (!this.isInsertingObject) {
          this.updateJsonMacroToolbar();
          this.saveUndoStateIfChanged();
        } else {
          this.updateToolbarContext();
        }
      }

      refreshTableRowTypeLabels(container) {
        if (!container) return;

        container.querySelectorAll(".wordex-table").forEach(table => {
          Array.from(table.rows).forEach(row => {
            const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

            if (rowType) {
              row.dataset.wordexRowType = rowType;
              this.normalizeTableRowColumnsForType(table, row, rowType);
            }

            this.updateTableRowTypeLabel(row);
          });
        });
      }

      renderRegion(region, cssClass, emptyText) {
        const regionElement = document.createElement("section");
        regionElement.className = "region " + cssClass;
        regionElement.dataset.region = region;

        if (this.wordexDocument[region].length === 0) {
          regionElement.classList.add("is-empty");
        }

        regionElement.addEventListener("click", event => {
          event.stopPropagation();

          if (event.target === regionElement || event.target.classList.contains("empty")) {
            this.selectRegion(region);
          }
        });

        const blocks = this.wordexDocument[region];

        if (blocks.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = emptyText + " vazio";
          regionElement.appendChild(empty);
        }

        blocks.forEach(block => {
          if (block.type !== "paragraph") {
            block = this.convertObjectBlockToParagraph(block);
          }

          regionElement.appendChild(this.renderParagraphBlock(region, block));
        });

        return regionElement;
      }

      renderParagraphBlock(region, block) {
        const wrapper = document.createElement("div");
        wrapper.className = "paragraph-block";
        wrapper.dataset.blockId = block.id;

        const blockStyle = block.style || {};
        wrapper.style.marginTop = blockStyle.marginTop || "";
        wrapper.style.marginRight = blockStyle.marginRight || "";
        wrapper.style.marginBottom = blockStyle.marginBottom || "";
        wrapper.style.marginLeft = blockStyle.marginLeft || "";

        wrapper.addEventListener("click", event => {
          if (this.handleTableOrObjectClick(event, wrapper, {
            stopPropagationAtStart: true
          })) {
            return;
          }

          this.selectParagraph(region, block.id);
        });

        /*
          Parágrafos não têm mais botão Excluir.
          Eles são removidos com Backspace/Delete quando estiverem vazios.
        */

        const paragraph = document.createElement("div");
        paragraph.className = "paragraph";
        paragraph.contentEditable = "true";
        paragraph.dataset.blockId = block.id;
        paragraph.dataset.emptyText = "Parágrafo vazio";
        paragraph.innerHTML = block.html || "";
        this.refreshTableRowTypeLabels(paragraph);

        paragraph.classList.toggle("is-empty", this.isParagraphVisuallyEmptyHtml(block.html));

        requestAnimationFrame(() => {
          paragraph.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            this.limitObjectWidthToParagraph(object);
          });

          paragraph.querySelectorAll(".wordex-chart-box").forEach(chartBox => {
            this.hydrateChartBoxFromSavedHtml(chartBox);
          });

          this.normalizeFreeObjectsInContainer(paragraph);
          this.syncParagraphElement(paragraph);
        });

        paragraph.style.fontFamily = block.style.fontFamily;
        paragraph.style.fontSize = block.style.fontSize;
        paragraph.style.color = block.style.color || "#000000";
        paragraph.style.textAlign = block.style.textAlign;
        paragraph.style.minHeight = blockStyle.minHeight || "";

        paragraph.addEventListener("focus", () => {
          this.selectParagraph(region, block.id);
          this.placeCaretAtEndIfNoSelection(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("click", event => {
          if (this.handleTableOrObjectClick(event, paragraph, {
            stopPropagationOnCell: true,
            stopPropagationOnObjectModifier: true
          })) {
            return;
          }

          this.selectParagraph(region, block.id);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("keyup", () => {
          this.updateParagraphEmptyState(paragraph);
          this.saveSelectionIfInsideParagraph();
          block.html = this.getCleanInnerHtml(paragraph);
        });

        paragraph.addEventListener("mouseup", () => {
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("input", () => {
          this.updateParagraphEmptyState(paragraph);
          block.html = this.getCleanInnerHtml(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        wrapper.appendChild(paragraph);

        return wrapper;
      }

      isInDocument(node) {
        return !!(node && this.documentElement.contains(node));
      }

      clearObjectSelectionMarks(container) {
        if (!container) return;

        container.querySelectorAll(".wordex-resize-overlay").forEach(element => element.remove());

        container.querySelectorAll(WordexEditor.objectSelectionSelector).forEach(element => {
          element.classList.remove(...WordexEditor.objectSelectionClasses);
        });
      }

      clearEditorSelectionMarks(container) {
        if (!container) return;

        container.querySelectorAll(WordexEditor.editorSelectionSelector).forEach(element => {
          element.classList.remove(...WordexEditor.editorSelectionClasses);
        });
      }

      applyObjectSelectionMarks() {
        if (this.isInDocument(this.selectedObject)) {
          const isTableComponentSelection =
            this.isWordexTableObject(this.selectedObject) &&
            this.selectedTableMode &&
            this.selectedTableMode !== "table";

          if (!isTableComponentSelection) {
            this.selectedObject.classList.add("selected-object");
          }
        }

        if (
          this.isInDocument(this.selectedCell) &&
          this.selectedTableMode === "cell"
        ) {
          this.selectedCell.classList.add("selected-cell");
        }

        if (this.selectedTableMode === "row" && this.isInDocument(this.selectedTableRow)) {
          Array.from(this.selectedTableRow.cells).forEach(cell => {
            cell.classList.add("selected-row-cell");
          });
        }

        if (
          this.selectedTableMode === "column" &&
          this.selectedObject?.matches?.(".wordex-table") &&
          Number.isInteger(this.selectedTableColumnIndex)
        ) {
          Array.from(this.selectedObject.rows).forEach(row => {
            const cell = row.cells[this.selectedTableColumnIndex];

            if (cell) {
              cell.classList.add("selected-column-cell");
            }
          });
        }
      }

      renderSelection() {
        this.documentElement.querySelectorAll(".region").forEach(regionElement => {
          regionElement.classList.toggle(
            "selected",
            regionElement.dataset.region === this.selected.region
          );
        });

        this.documentElement.querySelectorAll(".paragraph-block, .object-block").forEach(blockElement => {
          blockElement.classList.toggle(
            "selected-block",
            blockElement.dataset.blockId === this.selectedBlockId
          );
        });

        this.clearObjectSelectionMarks(this.documentElement);
        this.applyObjectSelectionMarks();
        this.syncTableRowTypeToolbar();
        this.updateToolbarContext();
        this.updateJsonMacroToolbar();
        this.updateObjectResizeOverlay();
      }

      resizeTableRowsByTotalHeight(table, totalHeight) {
        const rows = Array.from(table.rows);
        if (rows.length === 0) return;

        const rowHeight = Math.max(18, Math.floor(totalHeight / rows.length));

        rows.forEach(row => {
          row.style.height = rowHeight + "px";

          Array.from(row.cells).forEach(cell => {
            cell.style.height = rowHeight + "px";
          });
        });
      }

      loadSavedWordexDocumentFromHtml() {
        const stateElement = document.getElementById("wordexSavedDocument");

        if (!stateElement) return;

        try {
          const state = JSON.parse(stateElement.textContent || "{}");

          if (state && state.wordexDocument) {
            this.wordexDocument = state.wordexDocument;
          } else if (state && Array.isArray(state.bodyFlow)) {
            this.wordexDocument = state;
          }

          if (state?.reportData) {
            this.reportData = state.reportData;
            this.reportDataFileName = String(state.reportDataFileName || "").trim();
          }
        } catch (error) {
          console.warn("Não foi possível carregar o documento Wordex salvo.", error);
        }
      }

      syncCurrentEditingState() {
        if (this.isRestoringUndo) {
          this.syncDocumentFromDomForUndo();
          return;
        }

        if (this.selectedObject && this.syncObjectDomState(this.selectedObject)) {
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.syncParagraphElement(paragraph);
        }
      }

      saveWordexHtml() {
        try {
          this.syncCurrentEditingState();

          const html = this.buildStandaloneWordexHtml();
          const fileName = this.getSavedWordexHtmlFileName();

          if (this.savedWordexFileHandle?.createWritable) {
            this.writeTextToFileHandle(this.savedWordexFileHandle, html).catch(() => {
              this.savedWordexFileHandle = null;
              this.promptSaveWordexHtml(html, fileName);
            });
            return;
          }

          this.promptSaveWordexHtml(html, fileName);
        } catch (error) {
          alert("Erro ao salvar Wordex HTML: " + error.message);
        }
      }

      async promptSaveWordexHtml(html, fileName) {
        try {
          await this.writeTextFilePreferred(fileName, html, "text/html;charset=utf-8");
        } catch (error) {
          if (error?.name === "AbortError") {
            return;
          }

          alert("Erro ao salvar Wordex HTML: " + error.message);
        }
      }

      canUseNativeSaveFilePicker() {
        return window.isSecureContext && typeof window.showSaveFilePicker === "function";
      }

      async writeTextFilePreferred(fileName, text, mimeType) {
        if (this.canUseNativeSaveFilePicker()) {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{
              description: "HTML Wordex",
              accept: { "text/html": [".html", ".htm"] }
            }]
          });

          await this.writeTextToFileHandle(handle, text);
          this.savedWordexFileHandle = handle;
          return true;
        }

        this.downloadTextFile(fileName, text, mimeType);
        return true;
      }

      async writeTextToFileHandle(handle, text) {
        const writable = await handle.createWritable();
        await writable.write(String(text || ""));
        await writable.close();
      }

      sanitizeSavedHtmlFileName(value) {
        const reservedNames = new Set([
          "wordex",
          "wordex.html",
          "wordexnew",
          "wordexnew.html"
        ]);

        let baseName = String(value || "").trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        baseName = baseName
          .replace(/\.html?$/i, "")
          .replace(/[\\/:*?"<>|]+/g, "_")
          .trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        return baseName + ".html";
      }

      getSavedWordexState() {
        return {
          savedAt: new Date().toISOString(),
          wordexDocument: this.wordexDocument,
          reportData: this.reportData,
          reportDataFileName: this.reportDataFileName
        };
      }

      escapeScriptTagBreakout(text) {
        return String(text || "").replace(/<\/script/gi, "<\\/script");
      }

      buildStandaloneWordexHtml() {
        const clone = document.documentElement.cloneNode(true);

        clone.querySelectorAll("#wordexSavedDocument").forEach(node => node.remove());
        this.removeObjectResizeOverlayFromClone(clone);
        clone.querySelectorAll("script").forEach(node => node.remove());

        const bootScriptHtml = this.serializeInlineScript(
          "wordexEmbeddedTemplates",
          this.buildEmbeddedTemplatesBootScript()
        );
        const stateScriptHtml = this.serializeJsonStateScript();
        const editorScriptHtml = this.serializeInlineScript("", this.getLiveWordexEditorScriptSource());

        const markup = "<!DOCTYPE html>\n" + clone.outerHTML;
        const bodyClose = markup.lastIndexOf("</body>");

        if (bodyClose < 0) {
          throw new Error("Não foi possível montar o HTML standalone.");
        }

        return (
          markup.slice(0, bodyClose) +
          bootScriptHtml +
          stateScriptHtml +
          editorScriptHtml +
          markup.slice(bodyClose)
        );
      }

      buildEmbeddedTemplatesBootScript() {
        return [
          "window.WORDEX_PAGED_TEMPLATE = " + JSON.stringify(String(window.WORDEX_PAGED_TEMPLATE || "")) + ";",
          "window.WORDEX_PDF_TEMPLATE = " + JSON.stringify(String(window.WORDEX_PDF_TEMPLATE || "")) + ";"
        ].join("\n");
      }

      serializeInlineScript(id, content) {
        const idAttr = id ? ` id="${id}"` : "";

        return `<script${idAttr}>${this.escapeScriptTagBreakout(content)}<\/script>\n`;
      }

      serializeJsonStateScript() {
        const json = JSON.stringify(this.getSavedWordexState(), null, 2);

        return `<script id="wordexSavedDocument" type="application/json">${this.escapeScriptTagBreakout(json)}<\/script>\n`;
      }

      getLiveWordexEditorScriptSource() {
        const editorScript = Array.from(document.body?.querySelectorAll("script:not([src])") || []).find(script => {
          return script.id !== "wordexSavedDocument" &&
            script.id !== "wordexEmbeddedTemplates" &&
            script.type !== "application/json" &&
            String(script.textContent || "").includes("class WordexEditor");
        });

        if (!editorScript) {
          throw new Error("Script principal do WordexEditor não encontrado na página.");
        }

        let source = String(editorScript.textContent || "").trim();

        if (!/\bwindow\.wordex\s*=/.test(source)) {
          source += /\b(const|let|var)\s+wordex\s*=/.test(source)
            ? "\nwindow.wordex = wordex;"
            : '\nconst wordex = new WordexEditor("document");\nwindow.wordex = wordex;';
        }

        return source;
      }

      getSavedWordexHtmlFileName() {
        return this.sanitizeSavedHtmlFileName(document.title || "Relatorio");
      }

      getSuggestedReportBaseName() {
        return this.sanitizeSavedHtmlFileName(document.title || "Relatorio").replace(/\.html$/i, "");
      }

      getSuggestedReportPdfFileName() {
        return this.getSuggestedReportBaseName() + ".pdf";
      }

      downloadTextFile(fileName, text, mimeType) {
        const blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      generateHtmlFromJson() {
        this.generateHtmlFromJsonAsync().catch(error => {
          alert("Erro ao montar HTML: " + error.message);
        });
      }

      async generateHtmlFromJsonAsync() {
        this.syncCurrentEditingState();
        await this.prefetchReportImageDataUrls(this.reportData);

        const html = this.buildGeneratedReportHtml(this.reportData);
        this.openGeneratedHtmlInNewTab(html);
      }

      collectImageUrlsFromReportValue(value, urls) {
        if (this.isTypedFieldValue(value) && String(value.Kind || "").toLowerCase() === "image") {
          const imageUrl = String(value.Value || "").trim();

          if (this.looksLikeImageSource(imageUrl) && !/^data:/i.test(imageUrl) && !this.looksLikeRawBase64Image(imageUrl)) {
            urls.add(imageUrl);
          }

          return;
        }

        if (Array.isArray(value)) {
          value.forEach(item => this.collectImageUrlsFromReportValue(item, urls));
          return;
        }

        if (value && typeof value === "object") {
          Object.values(value).forEach(item => this.collectImageUrlsFromReportValue(item, urls));
        }
      }

      looksLikeRawBase64Image(value) {
        const text = String(value || "").trim().replace(/\s+/g, "");

        if (text.length < 32) {
          return false;
        }

        if (/^data:/i.test(text) || /^https?:\/\//i.test(text) || /^blob:/i.test(text)) {
          return false;
        }

        return /^[A-Za-z0-9+/=]+$/.test(text) && text.length % 4 === 0;
      }

      guessBase64ImageMime(base64) {
        const value = String(base64 || "").trim().replace(/\s+/g, "");

        if (value.startsWith("iVBORw0KG")) {
          return "image/png";
        }

        if (value.startsWith("/9j/")) {
          return "image/jpeg";
        }

        if (value.startsWith("R0lGOD")) {
          return "image/gif";
        }

        if (value.startsWith("UklGR")) {
          return "image/webp";
        }

        if (value.startsWith("PHN2Zy") || value.startsWith("PD94bW")) {
          return "image/svg+xml";
        }

        return "image/png";
      }

      wrapRawBase64AsDataUrl(value) {
        const base64 = String(value || "").trim().replace(/\s+/g, "");
        return `data:${this.guessBase64ImageMime(base64)};base64,${base64}`;
      }

      normalizeReportImageSource(value) {
        const src = String(value || "").trim();

        if (!src) {
          return "";
        }

        if (/^data:image\//i.test(src)) {
          return src;
        }

        if (this.looksLikeRawBase64Image(src)) {
          return this.wrapRawBase64AsDataUrl(src);
        }

        return src;
      }

      blobToDataUrl(blob) {
        return new Promise(resolve => {
          if (!blob) {
            resolve("");
            return;
          }

          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => resolve("");
          reader.readAsDataURL(blob);
        });
      }

      async fetchReportImageAsDataUrl(url) {
        const src = String(url || "").trim();

        if (!src || /^data:/i.test(src)) {
          return "";
        }

        try {
          const response = await fetch(src, {
            mode: "cors",
            credentials: "omit",
            cache: "force-cache"
          });

          if (!response.ok) {
            return "";
          }

          const blob = await response.blob();

          if (!String(blob.type || "").startsWith("image/")) {
            return "";
          }

          return await this.blobToDataUrl(blob);
        } catch (error) {
          return "";
        }
      }

      loadReportImageAsDataUrl(url, useCrossOrigin = true) {
        return new Promise(resolve => {
          const src = String(url || "").trim();

          if (!src) {
            resolve("");
            return;
          }

          if (/^data:/i.test(src)) {
            resolve(src);
            return;
          }

          const img = new Image();

          if (useCrossOrigin) {
            img.crossOrigin = "anonymous";
          }

          img.onload = () => {
            try {
              const canvas = document.createElement("canvas");
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              canvas.getContext("2d").drawImage(img, 0, 0);
              resolve(canvas.toDataURL("image/png"));
            } catch (error) {
              resolve("");
            }
          };

          img.onerror = () => resolve("");
          img.src = src;
        });
      }

      async ensureReportImageDataUrl(url) {
        const src = String(url || "").trim();

        if (!src) {
          return "";
        }

        const normalized = this.normalizeReportImageSource(src);

        if (/^data:image\//i.test(normalized)) {
          if (!/^data:/i.test(src)) {
            this.reportImageDataUrlCache[src] = normalized;
          }

          return normalized;
        }

        if (this.reportImageDataUrlCache[src]) {
          return this.reportImageDataUrlCache[src];
        }

        let dataUrl = await this.fetchReportImageAsDataUrl(src);

        if (!dataUrl) {
          dataUrl = await this.loadReportImageAsDataUrl(src, true);
        }

        if (!dataUrl) {
          dataUrl = await this.loadReportImageAsDataUrl(src, false);
        }

        if (dataUrl && dataUrl !== src) {
          this.reportImageDataUrlCache[src] = dataUrl;
          return dataUrl;
        }

        return src;
      }

      async prefetchReportImageDataUrls(data) {
        if (data === undefined || data === null) {
          return;
        }

        this.reportImageDataUrlCache = this.reportImageDataUrlCache || {};
        const urls = new Set();
        this.collectImageUrlsFromReportValue(data, urls);

        await Promise.all(
          Array.from(urls).map(url => this.ensureReportImageDataUrl(url))
        );
      }

      resolveReportImageSourceForOutput(url) {
        const src = String(url || "").trim();

        if (!src) {
          return "";
        }

        const normalized = this.normalizeReportImageSource(src);

        if (/^data:/i.test(normalized)) {
          return normalized;
        }

        return this.reportImageDataUrlCache?.[src] || normalized;
      }

      openGeneratedHtmlInNewTab(html) {
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const opened = window.open(url, "_blank");

        if (!opened) {
          const link = document.createElement("a");
          link.href = url;
          link.target = "_blank";
          document.body.appendChild(link);
          link.click();
          link.remove();
        }

        setTimeout(() => URL.revokeObjectURL(url), 60000);
      }

      static loadPagedTemplate() {
        if (WordexEditor.pagedTemplateCache) {
          return WordexEditor.pagedTemplateCache;
        }

        const template = window.WORDEX_PAGED_TEMPLATE;

        if (!template) {
          throw new Error(
            "wordex-paged.html não foi carregado. Mantenha o arquivo na mesma pasta de WORDEX.html."
          );
        }

        WordexEditor.pagedTemplateCache = String(template);
        return WordexEditor.pagedTemplateCache;
      }

      static loadPdfTemplate() {
        if (WordexEditor.pdfTemplateCache) {
          return WordexEditor.pdfTemplateCache;
        }

        const template = window.WORDEX_PDF_TEMPLATE;

        if (!template) {
          throw new Error(
            "wordex-pdf.html não foi carregado. Mantenha o arquivo na mesma pasta de WORDEX.html."
          );
        }

        WordexEditor.pdfTemplateCache = String(template);
        return WordexEditor.pdfTemplateCache;
      }

      applyPagedTemplatePlaceholders(template, values) {
        return String(template || "").replace(/@@([A-Z0-9_]+)@@/g, (match, key) => {
          if (!Object.prototype.hasOwnProperty.call(values, key)) {
            return match;
          }

          return String(values[key] ?? "");
        });
      }

      buildGeneratedReportHtml(data) {
        const pagedTemplate = WordexEditor.loadPagedTemplate();
        const documentClone = this.buildGeneratedDocumentClone(data);
        const headerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".header-template");
        const footerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".footer-template");

        /*
          Defesa extra: header/footer nunca podem permanecer no source paginado.
          Eles pertencem ao chrome de página e são reinjetados uma vez por página
          depois que o Pagex monta as páginas.
        */
        this.removeGeneratedHeaderFooterRegionsFromSource(documentClone);
        const page = this.getPageSettings();
        // O body paginado respeita a altura real do chrome header/footer,
        // medida a partir dos parágrafos inseridos no template.
        const minimumHeaderChromeMm = 12;
        const minimumFooterChromeMm = 12;
        const measuredHeaderChromeMm = headerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(headerTemplateHtml, "header-template", minimumHeaderChromeMm)
          : 0;
        const measuredFooterChromeMm = footerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(footerTemplateHtml, "footer-template", minimumFooterChromeMm)
          : 0;
        const fixedHeaderChromeMm = headerTemplateHtml
          ? Math.max(minimumHeaderChromeMm, measuredHeaderChromeMm)
          : minimumHeaderChromeMm;
        const fixedFooterChromeMm = footerTemplateHtml
          ? Math.max(minimumFooterChromeMm, measuredFooterChromeMm)
          : minimumFooterChromeMm;
        const generatedPage = {
          ...page,
          marginTop: headerTemplateHtml
            ? this.formatMillimeters(fixedHeaderChromeMm)
            : page.marginTop,
          marginBottom: footerTemplateHtml
            ? this.formatMillimeters(fixedFooterChromeMm)
            : page.marginBottom
        };
        const pageMetrics = {
          marginLeftMm: this.parseCssSizeToMillimeters(page.marginLeft),
          marginRightMm: this.parseCssSizeToMillimeters(page.marginRight)
        };
        const title = this.escapeHtml("Relatório Wordex montado");
        const pageAtRule = this.getGeneratedPageAtRule(generatedPage);
        const watermark = this.getGeneratedWatermarkSettings();

        documentClone.style.width = generatedPage.width;
        documentClone.style.minHeight = generatedPage.height;
        documentClone.style.margin = "0 auto";
        documentClone.style.boxSizing = "border-box";

        this.injectContinuousWatermarkPreview(
          documentClone,
          watermark,
          "wordex-generated-continuous-watermark"
        );

        const pagexConfig = JSON.stringify({
          headerTemplateHtml: headerTemplateHtml || "",
          footerTemplateHtml: footerTemplateHtml || "",
          watermarkConfig: watermark || null,
          pdfFileName: this.getSuggestedReportPdfFileName(),
          htmlFileName: this.getSuggestedReportBaseName() + ".html",
          pdfTitle: String(document.title || "Relatório Wordex").trim(),
          imageDataUrlMap: this.buildReportImageDataUrlMapForOutput(),
          pageConfig: {
            width: generatedPage.width,
            height: generatedPage.height,
            marginLeftMm: pageMetrics.marginLeftMm,
            marginRightMm: pageMetrics.marginRightMm
          }
        }).replace(/<\//g, "<\\/");

        return this.applyPagedTemplatePlaceholders(pagedTemplate, {
          WORDEX_TITLE: title,
          WORDEX_PAGE_WIDTH: generatedPage.width,
          WORDEX_PAGE_MIN_HEIGHT: generatedPage.height,
          WORDEX_PAGE_MARGIN_LEFT: page.marginLeft || "15mm",
          WORDEX_PAGE_MARGIN_RIGHT: page.marginRight || "15mm",
          WORDEX_PAGE_AT_RULE: pageAtRule,
          WORDEX_SOURCE_HTML: documentClone.outerHTML,
          WORDEX_PAGEX_CONFIG: pagexConfig,
          WORDEX_PDF_TEMPLATE_BOOT: `<textarea id="wordex-pdf-template-store" hidden style="display:none">${this.escapeHtml(WordexEditor.loadPdfTemplate())}</textarea><script>window.WORDEX_PDF_TEMPLATE=document.getElementById("wordex-pdf-template-store").value;<\/script>`
        });
      }

      regionHasPrintableContent(region) {
        if (!region) {
          return false;
        }

        return region.querySelector(".paragraph-block, .object-block") !== null;
      }

      extractGeneratedRegionTemplateHtml(container, selector) {
        const region = container?.querySelector(selector);

        if (!this.regionHasPrintableContent(region)) {
          return "";
        }

        const html = region.outerHTML;
        region.remove();
        return html;
      }

      removeGeneratedHeaderFooterRegionsFromSource(container) {
        if (!container) return;

        container.querySelectorAll(
          ".header-template, .footer-template"
        ).forEach(node => node.remove());
      }

      getGeneratedPageAtRule(page) {
        return `@page {
  size: ${page.width} ${page.height};
  margin: ${this.getPageMarginCss(page)};
}`;
      }

      buildGeneratedDocumentClone(data) {
        const clone = this.documentElement.cloneNode(true);
        const hasReportData = data !== undefined && data !== null;

        clone.querySelectorAll(".document-title, .empty").forEach(node => node.remove());
        this.removeEditorSelectionMarks(clone);

        if (hasReportData) {
          const rootCollection = this.normalizeRootCollection(data);
          const firstRootItem = rootCollection.length > 0 ? rootCollection[0] : {};
          const rootScope = this.createDataScope(firstRootItem, "ROOT", firstRootItem, null);

          /*
            O ROOT é sempre tratado como coleção. O uso recomendado é uma única
            linha em ROOT, mas duas ou mais linhas serão processadas normalmente
            pelo mesmo forEach dos demais grupos.
          */
          this.expandTablesWithData(clone, rootCollection, null);
          this.resolveGeneratedContentMacros(clone, [rootScope]);
        } else {
          this.finalizeStaticImages(clone);
          this.materializeCharts(clone, []);
        }

        this.cleanGeneratedDocumentNode(clone);
        this.markGeneratedPaginationAtoms(clone);
        this.rewriteEmbeddedImagesInContainer(clone);

        return clone;
      }

      rewriteEmbeddedImagesInContainer(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll("img").forEach(img => {
          const src = String(img.getAttribute("src") || "").trim();
          const resolved = this.resolveReportImageSourceForOutput(src);

          if (resolved && resolved !== src) {
            img.setAttribute("src", resolved);
            img.removeAttribute("crossorigin");
          }
        });
      }

      buildReportImageDataUrlMapForOutput() {
        const map = Object.assign({}, this.reportImageDataUrlCache || {});
        const urls = new Set();
        this.collectImageUrlsFromReportValue(this.reportData, urls);

        urls.forEach(url => {
          const resolved = this.resolveReportImageSourceForOutput(url);

          if (resolved && /^data:/i.test(resolved)) {
            map[url] = resolved;
          }
        });

        return map;
      }

      markGeneratedPaginationAtoms(container) {
        if (!container) return;

        const atomicObjectSelector = ".dynamic-image-box, .wordex-chart-box, .wordex-textbox";

        container.querySelectorAll(atomicObjectSelector).forEach(object => {
          object.classList.add("wordex-atomic-object");

          const paragraphBlock = object.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-atomic-block");
          }
        });

        container.querySelectorAll("table.wordex-table").forEach(table => {
          table.classList.add("wordex-paginable-table");

          const paragraphBlock = table.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-table-block");
          }
        });
      }

      normalizeRootCollection(data) {
        if (Array.isArray(data)) {
          return data;
        }

        if (data === undefined || data === null) {
          return [];
        }

        return [data];
      }

      removeEditorSelectionMarks(container) {
        this.clearEditorSelectionMarks(container);
      }

      cleanGeneratedDocumentNode(container) {
        if (!container) return;

        this.normalizeLegacyTableFooterRows(container);

        container.querySelectorAll("*").forEach(element => {
          element.removeAttribute("contenteditable");
          element.removeAttribute("data-row-type-label");
          element.removeAttribute("data-wordex-datasource");
          element.removeAttribute("data-wordex-enabled");
          element.removeAttribute("data-wordex-generated");
          element.classList.remove(
            ...WordexEditor.editorSelectionClasses,
            "is-empty"
          );
        });

        container.querySelectorAll("tr[data-wordex-row-type]").forEach(row => {
          row.removeAttribute("title");
          delete row.dataset.wordexRowType;
          delete row.dataset.wordexDatasource;
          delete row.dataset.wordexEnabled;
          delete row.dataset.wordexDecolumnized;
          delete row.dataset.wordexOriginalColumnCount;
        });
      }

      expandTablesWithData(container, rootData, inheritedScopes = null) {
        if (!container) return;

        const rootCollection = this.normalizeRootCollection(rootData);
        const scopes = inheritedScopes || [
          this.createDataScope(rootCollection[0] || {}, "ROOT", rootCollection[0] || {}, null)
        ];

        Array.from(container.querySelectorAll("table.wordex-table")).forEach(table => {
          this.expandTableWithData(table, rootCollection, scopes);
        });
      }

      expandTableWithData(table, rootData, rootScopes) {
        if (!table || table.dataset.wordexGenerated === "1") return;

        this.normalizeLegacyTableFooterRows(table);

        const rows = Array.from(table.rows);

        if (rows.length === 0) {
          return;
        }

        const reportMap = this.buildTableReportMap(table, rows);
        const rootCollection = Array.isArray(rootData) ? rootData : this.normalizeRootCollection(rootData);
        const expandedRows = this.renderTableReportMap(reportMap, rootCollection, rootScopes);

        table.innerHTML = "";
        expandedRows.forEach(row => table.appendChild(row));
        table.dataset.wordexGenerated = "1";
      }

      buildTableReportMap(table, rows) {
        if (rows.length < 2) {
          throw new Error("A tabela precisa de pelo menos TableHeader e TableFooter.");
        }

        const map = {
          parentDatasource: this.getTableParentDatasource(table),
          childDatasource: this.getTableChildDatasource(table),
          tableHeader: null,
          perParentRows: [],
          perChildRows: [],
          tableFooter: null
        };

        rows.forEach((row, index) => {
          const entry = this.createTableReportMapEntry(row, index);
          const rowType = entry.rowType || "";
          const isFirst = index === 0;
          const isLast = index === rows.length - 1;

          if (isFirst) {
            if (rowType && rowType !== "TableHeader") {
              throw new Error(
                `Estrutura da tabela inválida: a linha 1 deve ser TableHeader (encontrado ${rowType}).`
              );
            }

            map.tableHeader = entry;
            return;
          }

          if (isLast) {
            if (rowType && rowType !== "TableFooter") {
              throw new Error(
                `Estrutura da tabela inválida: a última linha deve ser TableFooter (encontrado ${rowType}).`
              );
            }

            map.tableFooter = entry;
            return;
          }

          if (rowType === "TableHeader" || rowType === "TableFooter") {
            throw new Error(
              `Estrutura da tabela inválida: ${rowType} só pode ficar na primeira ou na última linha.`
            );
          }

          if (!rowType) {
            map.perChildRows.push(entry);
            return;
          }

          if (this.isTablePerParentBandRowType(rowType)) {
            map.perParentRows.push(entry);
            return;
          }

          if (this.isTablePerChildLoopRowType(rowType)) {
            map.perChildRows.push(entry);
            return;
          }

          throw new Error(`Tipo de linha inválido na linha ${entry.index + 1}: ${rowType}`);
        });

        if (!map.tableHeader || !map.tableFooter) {
          throw new Error("A tabela precisa de TableHeader na primeira linha e TableFooter na última.");
        }

        if (map.perParentRows.length === 0 && map.perChildRows.length === 0) {
          throw new Error("A tabela precisa de ao menos uma linha entre TableHeader e TableFooter.");
        }

        return map;
      }

      createTableReportMapEntry(row, index) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (rowType && rowType !== (row.dataset.wordexRowType || "")) {
          row.dataset.wordexRowType = rowType;
          this.updateTableRowTypeLabel(row);
        }

        return {
          row,
          index,
          rowType,
          enabled: this.isTableRowEnabled(row)
        };
      }

      renderTableReportMap(reportMap, rootCollection, rootScopes) {
        const parentItems = this.createInitialReportItems(
          reportMap.parentDatasource,
          rootCollection,
          rootScopes
        );
        const expandedRows = [];
        const parentCollectionName = reportMap.parentDatasource === "ROOT"
          ? "ROOT"
          : this.getDatasourceCollectionName(reportMap.parentDatasource);
        const childCollectionName = reportMap.childDatasource
          ? this.getDatasourceCollectionName(reportMap.childDatasource)
          : parentCollectionName;

        parentItems.forEach(parentItem => {
          const parentScope = this.createDataScope(
            parentItem.value,
            parentItem.collectionName || parentCollectionName,
            parentItem.root,
            null
          );

          expandedRows.push(
            ...this.renderTableBandRow(reportMap.tableHeader, parentScope, parentItem.root)
          );

          const childItems = this.createTableChildItems(
            parentItem.value,
            reportMap.parentDatasource,
            reportMap.childDatasource,
            parentItem.root
          );
          const childBandScope = this.createTableChildBandScope(
            parentItem.value,
            childItems,
            childCollectionName,
            parentItem.root,
            parentCollectionName
          );

          reportMap.perParentRows.forEach(entry => {
            expandedRows.push(...this.renderTableBandRow(entry, childBandScope, parentItem.root));
          });

          childItems.forEach(childItem => {
            const childScope = this.createDataScope(
              childItem.value,
              childCollectionName,
              parentItem.root,
              parentItem.value,
              parentCollectionName
            );

            reportMap.perChildRows.forEach(entry => {
              expandedRows.push(...this.renderTableBandRow(entry, childScope, parentItem.root));
            });
          });

          expandedRows.push(
            ...this.renderTableBandRow(reportMap.tableFooter, parentScope, parentItem.root)
          );
        });

        return expandedRows;
      }

      createTableChildItems(parentValue, parentDatasource, childDatasource, rootData) {
        const parentDs = String(parentDatasource || "ROOT").trim() || "ROOT";
        const childDs = String(childDatasource || "").trim();

        if (!childDs || childDs === parentDs) {
          return [{ value: parentValue }];
        }

        return this.resolveDatasourceItems(parentValue, childDs, rootData);
      }

      createTableChildBandScope(parentValue, childItems, childCollectionName, rootData, parentCollectionName) {
        const sampleValue = childItems.length > 0 ? childItems[0].value : parentValue;

        return this.createDataScope(
          sampleValue,
          childCollectionName,
          rootData,
          parentValue,
          parentCollectionName
        );
      }

      renderTableBandRow(entry, scope, rootData) {
        if (!entry?.enabled || !entry.row) {
          return [];
        }

        const clone = entry.row.cloneNode(true);

        this.expandTablesWithData(clone, rootData, [scope]);
        this.resolveGeneratedContentMacros(clone, [scope]);

        return [clone];
      }

      createInitialReportItems(datasource, rootCollection, rootScopes) {
        const tableDatasource = String(datasource || "ROOT").trim() || "ROOT";
        const roots = this.normalizeRootCollection(rootCollection);
        const items = [];

        if (tableDatasource === "ROOT") {
          roots.forEach(rootItem => {
            items.push({
              value: rootItem,
              root: rootItem,
              collectionName: "ROOT"
            });
          });

          return items;
        }

        roots.forEach(rootItem => {
          this.resolveDatasourceItems(rootItem, tableDatasource, rootItem).forEach(child => {
            items.push({
              value: child.value,
              root: rootItem,
              collectionName: this.getDatasourceCollectionName(tableDatasource)
            });
          });
        });

        return items;
      }

      resolveDatasourceItems(currentValue, datasource, rootData) {
        const value = this.resolveDatasourceValue(currentValue, datasource, rootData);

        if (Array.isArray(value)) {
          return value.map(item => ({ value: item }));
        }

        if (value && typeof value === "object") {
          if (Array.isArray(value.$items)) {
            return value.$items.map(item => ({ value: item }));
          }

          if (Array.isArray(value.items)) {
            return value.items.map(item => ({ value: item }));
          }

          return [{ value }];
        }

        return [];
      }

      resolveDatasourceValue(currentValue, datasource, rootData) {
        const sourceName = String(datasource || "").trim();

        if (!sourceName || sourceName === "." || sourceName === "$item") {
          return currentValue;
        }

        if (sourceName === "ROOT" || sourceName === "$root") {
          return rootData;
        }

        const parts = sourceName
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return this.getValueByPath(currentValue, parts);
      }

      getDatasourceCollectionName(datasource) {
        const parts = String(datasource || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return parts.length > 0 ? parts[parts.length - 1] : "";
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveGeneratedContentMacros(clone, scopes);
        return clone;
      }

      inferGroupCollectionNameFromRows(rows, currentValue) {
        const arrays = this.getArrayProperties(currentValue);

        if (arrays.length === 0) return null;

        const groupRows = rows.filter(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
          return rowType === "GroupHeader" || rowType === "GroupFooter";
        });

        const macroPaths = groupRows.length > 0
          ? groupRows.flatMap(row => this.collectMacroPaths(row))
          : rows.flatMap(row => this.collectMacroPaths(row));

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferGroupCollectionName(table, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = this.collectMacroPaths(table);

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferRootDetailCollectionName(detailRows, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferDetailCollectionName(detailRows, groupItem) {
        const arrays = this.getArrayProperties(groupItem);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      findCollectionNameReferencedByMacros(collections, macroPaths) {
        for (const item of collections) {
          if (macroPaths.some(path => path === item.name || path.startsWith(item.name + "."))) {
            return item.name;
          }
        }

        return null;
      }

      getArrayProperties(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) return [];

        return Object.keys(value)
          .filter(key => Array.isArray(value[key]))
          .map(key => ({ name: key, value: value[key] }));
      }

      isTotalCollectionName(name) {
        return /^Totais/i.test(String(name || ""));
      }

      getCollectionFromValue(value, collectionName) {
        if (!value || !collectionName || !Array.isArray(value[collectionName])) {
          return [];
        }

        return value[collectionName];
      }

      collectMacroPaths(element) {
        const paths = [];
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);

        while (walker.nextNode()) {
          const text = walker.currentNode.nodeValue || "";
          const matches = text.matchAll(/{{\s*([^{}]+?)\s*}}/g);

          for (const match of matches) {
            paths.push(match[1].trim());
          }
        }

        if (element.attributes) {
          Array.from(element.attributes).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        }

        element.querySelectorAll?.("*").forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        });

        return paths;
      }

      resolveGeneratedContentMacros(element, scopes) {
        this.resolveMacrosInElement(element, scopes);
        this.materializeResolvedImageUrlTextNodes(element);
        this.materializeDynamicImages(element, scopes);
        this.materializeCharts(element, scopes);
      }

      shouldSkipMacroResolutionNode(node) {
        return !!node?.parentElement?.closest?.(".dynamic-image-box, .wordex-chart-box");
      }

      decodeHtmlEntities(value) {
        return String(value ?? "")
          .replace(/&amp;/g, "&")
          .replace(/&quot;/g, "\"")
          .replace(/&#039;/g, "'")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">");
      }

      looksLikeImageSource(value) {
        if (this.isTypedFieldValue(value)) {
          if (String(value.Kind || "").toLowerCase() === "image") {
            return this.looksLikeImageSource(value.Value);
          }

          return false;
        }

        const text = String(value || "").trim();

        if (!text) {
          return false;
        }

        if (/^data:image\//i.test(text)) {
          return true;
        }

        if (this.looksLikeRawBase64Image(text)) {
          return true;
        }

        if (/\.(png|jpe?g|gif|webp|svg|bmp|ico)(\?|#|$)/i.test(text)) {
          return true;
        }

        if (/^https?:\/\//i.test(text) && /(?:imgurl=|\/img\/|image\/|logo|foto|photo)/i.test(text)) {
          return true;
        }

        return false;
      }

      extractMacroNameFromImageBox(box) {
        if (!box) {
          return "";
        }

        const fromDataset = this.normalizeMacroName(box.dataset.fieldName || "");

        if (fromDataset) {
          return fromDataset;
        }

        const fromAttribute = this.normalizeMacroName(box.getAttribute("data-field-name") || "");

        if (fromAttribute) {
          return fromAttribute;
        }

        const macroMatch = String(box.innerHTML || "").match(/\{\{\s*([^{}]+?)\s*\}\}/);

        return macroMatch ? this.normalizeMacroName(macroMatch[1]) : "";
      }

      resolveMacrosInElement(element, scopes) {
        if (!element) return;

        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
        const textNodes = [];

        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(node => {
          if (this.shouldSkipMacroResolutionNode(node)) {
            return;
          }

          node.nodeValue = this.resolveMacrosInText(node.nodeValue || "", scopes);
        });

        const allElements = [element, ...Array.from(element.querySelectorAll?.("*") || [])];

        allElements.forEach(child => {
          if (child.matches?.(".dynamic-image-box, .wordex-chart-box")) {
            return;
          }

          Array.from(child.attributes || []).forEach(attribute => {
            if (!String(attribute.value || "").includes("{{")) return;
            child.setAttribute(attribute.name, this.resolveMacrosInText(attribute.value, scopes));
          });
        });
      }

      materializeResolvedImageUrlTextNodes(container) {
        if (!container) {
          return;
        }

        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
        const replacements = [];

        while (walker.nextNode()) {
          const node = walker.currentNode;

          if (node.parentElement?.closest?.(".dynamic-image-box")) {
            continue;
          }

          const value = this.decodeHtmlEntities(node.nodeValue || "").trim();

          if (!this.looksLikeImageSource(value)) {
            continue;
          }

          replacements.push({ node, value });
        }

        replacements.forEach(item => {
          const img = document.createElement("img");
          img.src = this.resolveReportImageSourceForOutput(item.value);
          img.alt = "";
          img.draggable = false;
          img.style.display = "block";
          img.style.maxWidth = "100%";
          img.style.height = "auto";
          item.node.parentNode.replaceChild(img, item.node);
        });
      }

      materializeDynamicImages(container, scopes) {
        if (!container) return;

        container.querySelectorAll(".dynamic-image-box").forEach(box => {
          this.materializeDynamicImageBox(box, scopes);
        });
      }

      materializeDynamicImageBox(box, scopes) {
        if (!box || box.dataset.wordexMaterialized === "1") return;

        const existingImg = box.querySelector("img");
        const existingSrc = String(existingImg?.getAttribute("src") || "").trim();

        if (existingSrc && this.looksLikeImageSource(existingSrc)) {
          box.dataset.wordexMaterialized = "1";
          return;
        }

        const fieldName = this.extractMacroNameFromImageBox(box);
        let imageSrc = "";

        if (fieldName) {
          imageSrc = this.stringifyResolvedValue(this.resolveDataPath(fieldName, scopes)).trim();
        }

        if (!imageSrc) {
          const textFallback = this.decodeHtmlEntities(String(box.textContent || ""))
            .replace(/^\s*Imagem\s*/i, "")
            .replace(/\{\{[^}]+\}\}/g, "")
            .trim();

          if (this.looksLikeImageSource(textFallback)) {
            imageSrc = textFallback;
          }
        }

        imageSrc = this.decodeHtmlEntities(String(imageSrc || "").trim());
        imageSrc = this.resolveReportImageSourceForOutput(imageSrc);

        if (!imageSrc || !this.looksLikeImageSource(imageSrc)) {
          box.innerHTML = "";
          box.dataset.wordexMaterialized = "1";
          return;
        }

        const img = document.createElement("img");
        img.src = imageSrc;
        img.alt = fieldName || "";
        img.draggable = false;
        img.style.display = "block";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";
        img.style.width = "auto";
        img.style.height = "auto";
        img.style.objectFit = "contain";

        box.innerHTML = "";
        box.appendChild(img);
        box.dataset.wordexMaterialized = "1";
      }

      finalizeStaticImages(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll(".dynamic-image-box").forEach(box => {
          this.materializeDynamicImageBox(box, []);
        });
      }

      resolveMacrosInText(text, scopes) {
        return String(text || "").replace(/{{\s*([^{}]+?)\s*}}/g, (_match, path) => {
          return this.escapeHtml(this.stringifyResolvedValue(this.resolveDataPath(path, scopes)));
        });
      }

      resolveDataPath(path, scopes) {
        const parts = String(path || "")
          .trim()
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) return "";

        for (const scope of scopes || []) {
          const value = this.getValueByPath(scope, parts);

          if (value !== undefined && value !== null) {
            return this.unwrapTypedFieldValue(value);
          }
        }

        return "";
      }

      getValueByPath(source, parts) {
        let value = source;
        let previousPart = "";

        for (const part of parts) {
          if (value === undefined || value === null) return undefined;

          if (Array.isArray(value)) {
            if (/^\d+$/.test(part)) {
              value = value[Number(part)];
              previousPart = part;
              continue;
            }

            /*
              Coleções normais nunca são reduzidas automaticamente ao primeiro item.
              Assim, {{Produtos.Nome}} não pega o primeiro produto por acidente fora do
              contexto Detail/Produto corrente.

              A exceção deliberada são coleções de totais, como TotaisProdutos, porque
              elas representam um resumo do grupo corrente e só são usadas quando o
              template as referencia explicitamente, normalmente no GroupFooter.
            */
            if (this.isTotalCollectionName(previousPart)) {
              value = value.length > 0 ? value[0]?.[part] : undefined;
              previousPart = part;
              continue;
            }

            return undefined;
          }

          if (typeof value !== "object") {
            return undefined;
          }

          if (Object.prototype.hasOwnProperty.call(value, part)) {
            value = value[part];
            previousPart = part;
          } else {
            return undefined;
          }
        }

        return value;
      }

      isTypedFieldValue(value) {
        return !!(
          value &&
          typeof value === "object" &&
          !Array.isArray(value) &&
          Object.prototype.hasOwnProperty.call(value, "Kind") &&
          Object.prototype.hasOwnProperty.call(value, "Value")
        );
      }

      unwrapTypedFieldValue(value) {
        return this.isTypedFieldValue(value) ? value.Value : value;
      }

      isScalarReportField(value) {
        if (value === null || value === undefined) {
          return true;
        }

        return this.isTypedFieldValue(value) || typeof value !== "object";
      }

      isChartDataObject(value) {
        if (!value || typeof value !== "object" || Array.isArray(value) || this.isTypedFieldValue(value)) {
          return false;
        }

        return (
          Object.prototype.hasOwnProperty.call(value, "ChartTitle") ||
          Object.prototype.hasOwnProperty.call(value, "chartTitle") ||
          Array.isArray(value.Columns) ||
          Array.isArray(value.columns) ||
          Array.isArray(value.Items) ||
          Array.isArray(value.items)
        );
      }

      normalizeMacroFieldOptions(options) {
        if (Array.isArray(options)) {
          return { mode: "scalar", allowedKinds: options };
        }

        if (!options || typeof options !== "object") {
          return { mode: "scalar", allowedKinds: this.jsonMacroKindFilter };
        }

        return {
          mode: options.mode || "scalar",
          allowedKinds: options.allowedKinds ?? this.jsonMacroKindFilter
        };
      }

      inferLegacyFieldKind(fieldName, value) {
        const name = String(fieldName || "").toLowerCase();

        if (/_value$/i.test(name)) {
          return "number";
        }

        if (/_label$/i.test(name)) {
          return "text";
        }

        if (
          /logo|imagem|image|foto|picture|avatar|url/.test(name) &&
          this.looksLikeImageSource(value)
        ) {
          return "image";
        }

        if (this.looksLikeImageSource(value)) {
          return "image";
        }

        if (typeof value === "boolean") {
          return "boolean";
        }

        if (typeof value === "number") {
          return Number.isInteger(value) ? "number" : "currency";
        }

        return "text";
      }

      getReportFieldKind(sample, fieldName) {
        const value = sample?.[fieldName];

        if (this.isTypedFieldValue(value)) {
          return String(value.Kind || "text").toLowerCase();
        }

        return this.inferLegacyFieldKind(fieldName, value);
      }

      formatMacroFieldOption(fieldName, sample) {
        const path = String(fieldName || "").trim();
        const kind = path.includes(".")
          ? this.getReportFieldKindAtPath(sample, path)
          : this.getReportFieldKind(sample, fieldName);

        return `${path} (${kind})`;
      }

      stringifyResolvedValue(value) {
        value = this.unwrapTypedFieldValue(value);
        if (value === undefined || value === null) return "";
        if (Array.isArray(value)) return value.map(item => this.stringifyResolvedValue(item)).join(", ");
        if (typeof value === "object") {
          if (this.isChartDataObject(value)) {
            return "";
          }

          return JSON.stringify(value);
        }
        return String(value);
      }

      createDataScope(value, collectionName, rootData, parentValue, parentCollectionName = "") {
        /*
          Cada escopo representa a linha corrente de um nível do JSON.
          Campos do registro ficam no scope sem prefixo inventado: {{Email}}, {{Nome}}.
          O nome da coleção aponta para a linha corrente: {{Clientes.Nome}}.
          No Child, a coleção Parent continua disponível com o nome real do JSON.

          A resolução usa uma pilha de escopos, sempre do mais interno para o mais externo.
        */
        const scope = {};

        if (value && typeof value === "object" && !Array.isArray(value)) {
          Object.assign(scope, value);
        }

        scope.$value = value;
        scope.$item = value;
        scope.$root = rootData;
        scope.$collectionName = collectionName || "";

        if (parentValue !== undefined && parentValue !== null) {
          scope.$parent = parentValue;

          if (parentCollectionName) {
            scope[parentCollectionName] = parentValue;
          }
        }

        if (collectionName) {
          scope[collectionName] = value;
        }

        return scope;
      }

      chooseJsonFile() {
        const input = document.getElementById("jsonFileInput");

        if (!input) {
          alert("Input de JSON não encontrado.");
          return;
        }

        input.click();
      }

      getReportDataRootRecord() {
        if (!this.reportData) {
          return null;
        }

        if (Array.isArray(this.reportData)) {
          return this.reportData[0] ?? null;
        }

        if (this.reportData && typeof this.reportData === "object") {
          return this.reportData;
        }

        return null;
      }

      getReportDataCollections() {
        const root = this.getReportDataRootRecord();

        if (!root) {
          return [];
        }

        const collections = [{ name: "ROOT", label: "ROOT" }];
        const seen = new Set(["ROOT"]);

        this.getArrayProperties(root).forEach(item => {
          if (seen.has(item.name)) {
            return;
          }

          seen.add(item.name);
          collections.push({ name: item.name, label: item.name });
        });

        return collections;
      }

      getAllowedTableChildCollectionNames(parentDatasource) {
        const parent = String(parentDatasource || "ROOT").trim() || "ROOT";
        const root = this.getReportDataRootRecord();

        if (!root) {
          return [];
        }

        if (parent === "ROOT") {
          return this.getReportDataCollections()
            .map(item => item.name)
            .filter(name => name !== "ROOT");
        }

        const sample = this.getSampleValueForCollection(parent);

        if (!sample) {
          return [];
        }

        return this.getArrayProperties(sample)
          .filter(item => !this.isTotalCollectionName(item.name))
          .map(item => item.name);
      }

      normalizeTableChildDatasource(parentDatasource, childDatasource) {
        const parent = String(parentDatasource || "ROOT").trim() || "ROOT";
        const child = String(childDatasource || "").trim();

        if (!child || child === parent) {
          return "";
        }

        const allowedChildren = this.getAllowedTableChildCollectionNames(parent);

        if (!allowedChildren.includes(child)) {
          const hint = allowedChildren.length > 0
            ? allowedChildren.join(", ")
            : "nenhuma";

          alert(
            `ChildDatasource "${child}" não é válido para Parent ${parent}. ` +
            `Opções permitidas: ${hint}.`
          );
          return null;
        }

        return child;
      }

      applyTableChildDatasource(table, parentDatasource, childDatasource) {
        const normalizedChild = this.normalizeTableChildDatasource(
          parentDatasource,
          childDatasource
        );

        if (normalizedChild === null) {
          return false;
        }

        if (normalizedChild) {
          table.dataset.wordexChildren = normalizedChild;
        } else {
          delete table.dataset.wordexChildren;
        }

        return true;
      }

      getTableMacroCollections(table) {
        if (!table?.matches?.(".wordex-table")) {
          return this.getReportDataCollections();
        }

        const parent = this.getTableParentDatasource(table);

        if (parent === "ROOT") {
          return this.getReportDataCollections();
        }

        const allowedChildren = this.getAllowedTableChildCollectionNames(parent);
        const collections = [];
        const seen = new Set();

        const pushCollection = (name, label = name) => {
          const normalized = String(name || "").trim();

          if (!normalized || seen.has(normalized)) {
            return;
          }

          seen.add(normalized);
          collections.push({ name: normalized, label: label || normalized });
        };

        pushCollection(parent, parent);

        allowedChildren.forEach(childName => {
          if (childName !== parent) {
            pushCollection(childName, childName);
          }
        });

        return collections;
      }

      renderJsonCollectionSelect(collectionSelect, collections, preferredValue = "ROOT", options = {}) {
        if (!collectionSelect) {
          return "";
        }

        const items = Array.isArray(collections) ? collections : [];
        const names = items.map(item => item.name);
        const preferred = String(preferredValue || "").trim();
        const nextValue = names.includes(preferred)
          ? preferred
          : (names.includes("ROOT") ? "ROOT" : (names[0] || ""));

        if (items.length === 0) {
          collectionSelect.innerHTML = '<option value="">Coleção</option>';
          collectionSelect.value = "";
          return "";
        }

        const currentValues = [...collectionSelect.options].map(option => option.value);
        const hasPlaceholderOnly =
          currentValues.length === 0 ||
          (currentValues.length === 1 && !currentValues[0]);

        if (
          !options.force &&
          !hasPlaceholderOnly &&
          document.activeElement === collectionSelect &&
          currentValues.length === names.length &&
          names.every((name, index) => currentValues[index] === name) &&
          names.includes(collectionSelect.value)
        ) {
          return collectionSelect.value;
        }

        collectionSelect.innerHTML = "";

        items.forEach(item => {
          const option = document.createElement("option");
          option.value = item.name;
          option.textContent = item.label;
          collectionSelect.appendChild(option);
        });

        collectionSelect.value = nextValue;
        return nextValue;
      }

      ensureJsonCollectionSelectOption(collectionSelect, collectionName, label = collectionName) {
        if (!collectionSelect || !collectionName) {
          return;
        }

        const exists = [...collectionSelect.options].some(option => option.value === collectionName);

        if (!exists) {
          const option = document.createElement("option");
          option.value = collectionName;
          option.textContent = label || collectionName;
          collectionSelect.appendChild(option);
        }
      }

      resolveActiveTableForMacroContext() {
        const rowContext = this.getSelectedTableRowForMacroContext();

        if (rowContext?.table) {
          return rowContext.table;
        }

        const cell = this.getSelectedCellForInsertion();
        const tableFromCell = cell?.closest?.(".wordex-table");

        if (tableFromCell) {
          return tableFromCell;
        }

        if (
          this.selectedObject?.matches?.(".wordex-table") &&
          this.documentElement.contains(this.selectedObject)
        ) {
          return this.selectedObject;
        }

        if (
          this.macroPickerActiveTable &&
          this.documentElement.contains(this.macroPickerActiveTable)
        ) {
          return this.macroPickerActiveTable;
        }

        return null;
      }

      getActiveTableForMacroContext() {
        return this.resolveActiveTableForMacroContext();
      }

      getSelectedTableRowForMacroContext() {
        const rowContext = this.getSelectedTableRowContextWithoutAlert();

        if (rowContext?.row) {
          return rowContext;
        }

        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection?.rangeCount) {
            cell = this.getTableCellFromRange(selection.getRangeAt(0));
          }
        }

        if (!cell && this.savedRange) {
          cell = this.getTableCellFromRange(this.savedRange);
        }

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");
        const row = cell.closest("tr");

        if (!table || !row) {
          return null;
        }

        return { table, row, cell };
      }

      syncJsonMacroPickerForTableContext(options = {}) {
        const table = this.getActiveTableForMacroContext();

        if (!table) {
          return false;
        }

        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const insertButton = document.getElementById("jsonMacroInsertBtn");
        const hasData = !!this.getReportDataRootRecord();

        if (!hasData) {
          return false;
        }

        if (!collectionSelect || !fieldSelect) {
          return false;
        }

        const rowContext = this.getSelectedTableRowForMacroContext();
        const collectionName = rowContext?.row
          ? this.getTableRowMacroCollectionName(table, rowContext.row)
          : this.getTableParentDatasource(table);
        const collections = this.getTableMacroCollections(table);
        const preferredCollection = String(collectionSelect.value || collectionName || "").trim();
        const nextCollection = this.renderJsonCollectionSelect(
          collectionSelect,
          collections,
          preferredCollection || collectionName,
          { force: !!options.forceCollectionRebuild }
        );

        collectionSelect.disabled = false;
        fieldSelect.disabled = false;

        if (insertButton) {
          insertButton.disabled = false;
        }

        this.populateJsonMacroFieldSelect(nextCollection);

        return true;
      }

      refreshJsonCollectionPicker() {
        this.updateJsonMacroToolbar({ forceCollectionRebuild: true });
      }

      updateJsonDataToolbarHint() {
