      getTableCellFromRangeSelection(selection) {
        if (!selection || selection.rangeCount === 0) return null;

        return this.getTableCellFromRange(selection.getRangeAt(0));
      }

      getTableCellFromRange(range) {
        if (!range) return null;

        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        const cell = element?.closest?.("td") || null;

        if (!cell || !this.documentElement.contains(cell)) return null;

        const table = cell.closest(".wordex-table");

        return table ? cell : null;
      }

      currentSelectionIsInsideDocumentButOutsideTable() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        if (!element || !this.documentElement.contains(element)) {
          return false;
        }

        return !element.closest("td");
      }

      insertNodeInsideSelectedTableCell(node, cell = this.getSelectedCellForInsertion()) {
        if (!node || !cell) return;

        const paragraphForUndo = cell.closest(".paragraph");

        if (paragraphForUndo) {
          this.saveUndoCheckpointForParagraph(paragraphForUndo);
        }

        cell.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro da célula, o novo objeto
          entra depois dele.
        */
        if (this.selectedObject && cell.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (
          selection &&
          selection.rangeCount > 0 &&
          cell.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          range = selection.getRangeAt(0).cloneRange();

          /*
            Se o caret estiver dentro de um objeto da célula, sobe para fora.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && cell.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        /*
          Célula recém-criada costuma ter apenas <br>. Remove esse marcador
          antes de inserir objeto real.
        */
        if (cell.innerHTML.trim().toLowerCase() === "<br>") {
          cell.innerHTML = "";
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");
        range.insertNode(anchor);
        range.insertNode(node);

        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToCell(node, cell);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        const table = cell.closest(".wordex-table");

        if (table) {
          this.syncObjectAfterChange(table);
          this.selectObject(table);
          this.selectTableCell(cell);
        } else {
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }

        this.savedRange = null;
      }

      limitObjectWidthToCell(object, cell) {
        if (!object || !cell) return;

        if (!object.matches(WordexEditor.objectSelector)) return;

        const cellWidth = cell.clientWidth;

        if (!cellWidth) return;

        const computed = window.getComputedStyle(object);
        const marginLeft = parseFloat(computed.marginLeft || "0") || 0;
        const marginRight = parseFloat(computed.marginRight || "0") || 0;
        const maxWidth = Math.max(30, Math.floor(cellWidth - marginLeft - marginRight - 4));
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      insertNodeInsideCurrentParagraph(node) {
        const paragraphElement = this.getSelectedParagraphElement();

        if (!paragraphElement) return;

        this.saveUndoCheckpointForParagraph(paragraphElement);

        paragraphElement.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro do parágrafo, o novo objeto
          deve ser inserido DEPOIS dele, nunca dentro dele.
          Isso evita tabela/imagem/gráfico invadindo o gráfico anterior.
        */
        if (this.selectedObject && paragraphElement.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (this.savedRange && paragraphElement.contains(this.savedRange.commonAncestorContainer)) {
          range = this.savedRange.cloneRange();

          /*
            Se a seleção salva estiver dentro de um objeto, sobe para fora dele.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && paragraphElement.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(paragraphElement);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");

        range.insertNode(anchor);
        range.insertNode(node);

        /*
          Mantém um ponto de edição depois do objeto, fora da caixa.
          Isso evita que o próximo objeto seja inserido dentro do gráfico/imagem.
        */
        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToParagraph(node);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.selectedObject = null;
        this.savedRange = caretRange.cloneRange();

        this.syncParagraphElement(paragraphElement);
        this.renderSelection();

        if (node.matches?.("table.wordex-table")) {
          this.ensureUndoRecordsTableInParagraph(paragraphElement);
        } else {
          this.saveUndoStateIfChanged();
        }
      }

      ensureUndoRecordsTableInParagraph(paragraphElement) {
        if (this.isRestoringUndo || !paragraphElement) return;

        this.syncParagraphElement(paragraphElement);

        const snapshot = this.getUndoSnapshot();
        const blockId = paragraphElement.dataset.blockId;
        const block = this.findBlockById(blockId);
        const html = block?.html || "";

        if (!html.includes("wordex-table")) {
          return;
        }

        if (this.undoStack[this.undoIndex] === snapshot) {
          this.lastUndoSnapshot = snapshot;
          return;
        }

        if (this.undoIndex < this.undoStack.length - 1) {
          this.undoStack = this.undoStack.slice(0, this.undoIndex + 1);
        }

        this.undoStack.push(snapshot);
        this.undoIndex = this.undoStack.length - 1;
        this.lastUndoSnapshot = snapshot;

        if (this.undoStack.length > this.maxUndoSteps) {
          this.undoStack.shift();
          this.undoIndex = Math.max(0, this.undoIndex - 1);
        }
      }

      getMaxObjectWidthInParagraph(object, paragraph) {
        if (!object || !paragraph) return 40;

        const paragraphWidth = paragraph.clientWidth;
        const computed = window.getComputedStyle(object);

        /*
          v255: quando o objeto está centralizado, o navegador transforma
          margin-left/right:auto em margens computadas grandes. Se essas
          margens forem descontadas daqui, cada novo clique em centralizar
          reduz a largura do objeto alguns pixels. Portanto, margens auto
          ou alinhamento center não entram no limite de largura.
        */
        const hasAutoHorizontalMargin =
          object.dataset.align === "center" ||
          object.style.marginLeft === "auto" ||
          object.style.marginRight === "auto";

        const marginLeft = hasAutoHorizontalMargin
          ? 0
          : (parseFloat(computed.marginLeft || "0") || 0);

        const marginRight = hasAutoHorizontalMargin
          ? 0
          : (parseFloat(computed.marginRight || "0") || 0);

        /*
          A largura do objeto deve caber dentro da área útil do parágrafo,
          descontando margens horizontais reais do próprio objeto.
        */
        return Math.max(40, Math.floor(paragraphWidth - marginLeft - marginRight - 4));
      }

      limitObjectWidthToParagraph(object) {
        if (!object) return;

        if (!object.matches(WordexEditor.objectSelector)) return;

        const paragraph = object.closest(".paragraph");

        if (!paragraph) return;

        /*
          Precisa estar no DOM para getBoundingClientRect refletir o layout real.
        */
        const maxWidth = this.getMaxObjectWidthInParagraph(object, paragraph);
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      resizeSelectedTableComponentBy(deltaWidth, deltaHeight) {
        if (
          !this.selectedObject ||
          !this.isWordexTableObject(this.selectedObject) ||
          !this.selectedTableMode ||
          this.selectedTableMode === "table"
        ) {
          return false;
        }

        const context = this.getSelectedTableContext();

        if (!context) return false;

        const mode = this.selectedTableMode;

        if (mode === "row") {
          const rect = context.row.getBoundingClientRect();
          const newHeight = Math.max(18, Math.round(rect.height + deltaHeight));

          if (deltaHeight === 0) {
            return true;
          }

          context.row.style.height = newHeight + "px";
          Array.from(context.row.cells).forEach(cell => {
            cell.style.height = newHeight + "px";
          });

          this.syncAndSelectTableComponent(context, "row");
          return true;
        }

        if (mode === "column") {
          if (deltaWidth === 0) {
            return true;
          }

          const currentCell = context.cell;
          const currentWidth = currentCell.getBoundingClientRect().width;
          const newWidth = Math.max(24, Math.round(currentWidth + deltaWidth));

          Array.from(context.table.rows).forEach(row => {
            const cell = row.cells[context.columnIndex];

            if (cell) {
              cell.style.width = newWidth + "px";
            }
          });

          this.syncAndSelectTableComponent(context, "column");
          return true;
        }

        if (mode === "cell") {
          const rect = context.cell.getBoundingClientRect();
          const newWidth = Math.max(24, Math.round(rect.width + deltaWidth));
          const newHeight = Math.max(18, Math.round(rect.height + deltaHeight));

          if (deltaWidth !== 0) {
            context.cell.style.width = newWidth + "px";
          }

          if (deltaHeight !== 0) {
            context.cell.style.height = newHeight + "px";
          }

          this.syncAndSelectTableComponent(context, "cell");
          return true;
        }

        return false;
      }

      installObjectResizeHandleEvents() {
        document.addEventListener("mousemove", event => {
          this.handleObjectResizePointerMove(event);
        });

        document.addEventListener("mouseup", event => {
          this.handleObjectResizePointerUp(event);
        });

        window.addEventListener("resize", () => {
          this.positionObjectResizeOverlay();
        });

        document.addEventListener("scroll", () => {
          this.positionObjectResizeOverlay();
        }, true);
      }

      isObjectResizeOverlayAllowed(object = this.selectedObject) {
        if (!this.isInDocument(object)) return false;

        if (
          this.isWordexTableObject(object) &&
          this.selectedTableMode &&
          this.selectedTableMode !== "table"
        ) {
          return !!this.getSelectedTableComponentResizeInfo();
        }

        return !!object.matches?.(WordexEditor.objectSelector);
      }

      getUnionRectFromElements(elements) {
        const visibleRects = Array.from(elements || [])
          .filter(element => element && this.isInDocument(element))
          .map(element => element.getBoundingClientRect())
          .filter(rect => rect.width > 0 || rect.height > 0);

        if (visibleRects.length === 0) {
          return null;
        }

        const left = Math.min(...visibleRects.map(rect => rect.left));
        const top = Math.min(...visibleRects.map(rect => rect.top));
        const right = Math.max(...visibleRects.map(rect => rect.right));
        const bottom = Math.max(...visibleRects.map(rect => rect.bottom));

        return {
          left,
          top,
          right,
          bottom,
          width: right - left,
          height: bottom - top
        };
      }

      getSelectedTableComponentResizeInfo() {
        if (
          !this.selectedObject ||
          !this.isWordexTableObject(this.selectedObject) ||
          !this.selectedTableMode ||
          this.selectedTableMode === "table"
        ) {
          return null;
        }

        const context = this.getSelectedTableContextWithoutAlert();

        if (!context) {
          return null;
        }

        const mode = this.selectedTableMode;
        let rect = null;

        if (mode === "cell") {
          rect = context.cell.getBoundingClientRect();
        } else if (mode === "row") {
          rect = context.row.getBoundingClientRect();
        } else if (mode === "column") {
          const cells = Array.from(context.table.rows)
            .map(row => row.cells[context.columnIndex])
            .filter(Boolean);

          rect = this.getUnionRectFromElements(cells);
        }

        if (!rect || rect.width <= 0 || rect.height <= 0) {
          return null;
        }

        return {
          kind: "table-" + mode,
          mode,
          rect,
          table: context.table,
          cell: context.cell,
          row: context.row,
          columnIndex: context.columnIndex
        };
      }

      getObjectResizeInfo() {
        if (!this.isObjectResizeOverlayAllowed()) {
          return null;
        }

        const tableComponentInfo = this.getSelectedTableComponentResizeInfo();

        if (tableComponentInfo) {
          return tableComponentInfo;
        }

        if (!this.selectedObject?.matches?.(WordexEditor.objectSelector)) {
          return null;
        }

        const rect = this.selectedObject.getBoundingClientRect();

        if (rect.width <= 0 || rect.height <= 0) {
          return null;
        }

        return {
          kind: "object",
          mode: "object",
          rect,
          object: this.selectedObject
        };
      }

      ensureObjectResizeOverlay() {
        if (this.resizeOverlay) {
          return this.resizeOverlay;
        }

        const overlay = document.createElement("div");
        overlay.className = "wordex-resize-overlay";
        overlay.setAttribute("aria-hidden", "true");

        ["nw", "ne", "sw", "se"].forEach(handleName => {
          const handle = document.createElement("span");
          handle.className = "wordex-resize-handle";
          handle.dataset.handle = handleName;
          handle.title = "Arraste para redimensionar";
          overlay.appendChild(handle);
        });

        overlay.addEventListener("mousedown", event => {
          const handle = event.target.closest(".wordex-resize-handle");
          if (!handle) return;

          this.startObjectResizeDrag(event, handle.dataset.handle);
        });

        document.body.appendChild(overlay);
        this.resizeOverlay = overlay;
        return overlay;
      }

      hideObjectResizeOverlay() {
        if (this.resizeOverlay) {
          this.resizeOverlay.classList.remove("is-visible");
        }
      }

      removeObjectResizeOverlayFromClone(root) {
        root?.querySelectorAll?.(".wordex-resize-overlay").forEach(node => node.remove());
      }

      updateObjectResizeOverlay() {
        if (!this.isObjectResizeOverlayAllowed()) {
          this.hideObjectResizeOverlay();
          return;
        }

        this.ensureObjectResizeOverlay();
        this.positionObjectResizeOverlay();
      }

      positionObjectResizeOverlay() {
        if (!this.resizeOverlay) {
          this.hideObjectResizeOverlay();
          return;
        }

        const resizeInfo = this.getObjectResizeInfo();

        if (!resizeInfo) {
          this.hideObjectResizeOverlay();
          return;
        }

        const rect = resizeInfo.rect;

        this.resizeOverlay.dataset.resizeTarget = resizeInfo.kind;
        this.resizeOverlay.style.left = rect.left + "px";
        this.resizeOverlay.style.top = rect.top + "px";
        this.resizeOverlay.style.width = rect.width + "px";
        this.resizeOverlay.style.height = rect.height + "px";
        this.resizeOverlay.classList.add("is-visible");
      }

      getObjectVisualXInsideBlock(object, container) {
        if (!object || !container) return 0;

        const savedX = Number.parseInt(object.dataset.blockX, 10);

        if (Number.isFinite(savedX)) {
          return savedX;
        }

        const blockRect = container.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();
        return this.clamp(Math.round(objectRect.left - blockRect.left), 0, Math.max(0, container.clientWidth));
      }

      getObjectVisualYInsideBlock(object, container) {
        if (!object || !container) return 0;

        const savedY = Number.parseInt(object.dataset.blockY, 10);

        if (Number.isFinite(savedY)) {
          return savedY;
        }

        const blockRect = container.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();
        return this.clamp(Math.round(objectRect.top - blockRect.top), 0, Math.max(0, container.clientHeight));
      }

      getObjectDragContainer(object) {
        if (!object) {
          return null;
        }

        const objectBlock = object.closest(".object-block");

        if (objectBlock) {
          return { mode: "objectBlock", container: objectBlock };
        }

        const tableCell = object.closest("td");

        if (tableCell && this.documentElement.contains(tableCell)) {
          return { mode: "tableCell", container: tableCell };
        }

        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          return { mode: "paragraph", container: paragraph };
        }

        return null;
      }

      prepareObjectForFreeDrag(object, container) {
        if (!object || !container) {
          return;
        }

        if (object.dataset.align !== "free") {
          this.applyAlignment(object, "free");
        }

        this.applyObjectFreePosition(
          object,
          container,
          this.getObjectVisualXInsideBlock(object, container),
          this.getObjectVisualYInsideBlock(object, container)
        );
      }

      applyObjectFreePosition(object, container, x, y) {
        if (!object || !container) {
          return;
        }

        const wrapperWidth = container.clientWidth;
        const objectWidth = object.getBoundingClientRect().width;
        const objectHeight = object.getBoundingClientRect().height;
        const min = this.getObjectMinimumSize(object);

        const nextX = this.clamp(
          Math.round(x),
          0,
          Math.max(0, Math.floor(wrapperWidth - Math.max(objectWidth, min.width) - 4))
        );
        const nextY = Math.max(0, Math.round(y));
        const neededHeight = nextY + Math.max(objectHeight, min.height) + 8;

        if (neededHeight > container.clientHeight) {
          container.style.minHeight = neededHeight + "px";
        }

        object.style.float = "none";
        object.style.position = "";
        object.style.display = object.matches("table")
          ? "table"
          : (object.matches(".wordex-chart-box") ? "flex" : "inline-block");
        object.style.marginLeft = nextX + "px";
        object.style.marginTop = nextY + "px";
        object.style.marginRight = "8px";
        object.style.marginBottom = "4px";
        object.dataset.blockX = String(nextX);
        object.dataset.blockY = String(nextY);
        object.dataset.align = "free";
      }

      updateFreeContainerBounds(container) {
        if (!container) {
          return;
        }

        let maxBottom = 0;

        container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
          const top = Number.parseInt(object.dataset.blockY, 10) ||
            Number.parseInt(object.style.marginTop, 10) ||
            0;
          maxBottom = Math.max(maxBottom, top + object.offsetHeight + 8);
        });

        if (maxBottom <= 0) {
          return;
        }

        const baseline = container.classList.contains("object-block") ? 24 : 18;
        container.style.minHeight = Math.max(baseline, maxBottom) + "px";
      }

      syncObjectPositionInContainer(object, container, mode) {
        if (!object || !container) {
          return;
        }

        if (mode === "objectBlock") {
          this.syncStandaloneObjectFromDom(object);
          return;
        }

        if (mode === "paragraph") {
          this.syncParagraphElement(container);
          return;
        }

        if (mode === "tableCell") {
          this.syncObjectAfterChange(object);
        }
      }

      getObjectMinimumSize(object) {
        if (this.isWordexTableObject(object)) {
          return { width: 40, height: 24 };
        }

        if (object?.matches?.(".wordex-textbox")) {
          return { width: 24, height: 18 };
        }

        return { width: 40, height: 24 };
      }

      constrainObjectSize(object, width, height) {
        const min = this.getObjectMinimumSize(object);
        let newWidth = Math.max(min.width, Math.round(width));
        let newHeight = Math.max(min.height, Math.round(height));

        const objectBlock = object.closest(".object-block");

        if (objectBlock) {
          const wrapperWidth = objectBlock.clientWidth;
          const currentX = this.getObjectVisualXInsideBlock(object, objectBlock);
          const maxWidth = Math.max(min.width, wrapperWidth - currentX - 4);
          newWidth = Math.min(newWidth, maxWidth);
        }

        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          newWidth = Math.min(newWidth, this.getMaxObjectWidthInParagraph(object, paragraph));
        }

        return { width: newWidth, height: newHeight };
      }

      applyObjectSizeInPixels(object, width, height) {
        const size = this.constrainObjectSize(object, width, height);

        object.style.width = size.width + "px";

        if (object.matches(".dynamic-image-box, .wordex-chart-box, .wordex-textbox")) {
          object.style.height = size.height + "px";
        } else if (this.isWordexTableObject(object)) {
          this.resizeTableRowsByTotalHeight(object, size.height);
        }

        this.positionObjectResizeOverlay();
        return size;
      }

      startObjectResizeDrag(event, handleName) {
        const resizeInfo = this.getObjectResizeInfo();

        if (!resizeInfo) return;

        event.preventDefault();
        event.stopPropagation();

        const rect = resizeInfo.rect;

        if (resizeInfo.kind.startsWith("table-")) {
          this.resizeDrag = {
            kind: "table-component",
            mode: resizeInfo.mode,
            table: resizeInfo.table,
            cell: resizeInfo.cell,
            row: resizeInfo.row,
            columnIndex: resizeInfo.columnIndex,
            handleName,
            startClientX: event.clientX,
            startClientY: event.clientY,
            startWidth: rect.width,
            startHeight: rect.height
          };

          document.body.classList.add("wordex-resizing");
          return;
        }

        const object = resizeInfo.object || this.selectedObject;
        const objectBlock = object.closest(".object-block");
        const blockX = objectBlock
          ? this.getObjectVisualXInsideBlock(object, objectBlock)
          : 0;

        this.resizeDrag = {
          kind: "object",
          object,
          handleName,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startWidth: rect.width,
          startHeight: rect.height,
          startBlockX: blockX,
          objectBlock,
          wrapperWidth: objectBlock?.clientWidth || 0
        };

        document.body.classList.add("wordex-resizing");
      }

      applyTableComponentResizeFromDrag(drag, dx, dy) {
        if (!drag || !this.isInDocument(drag.table)) return;

        const handle = drag.handleName || "se";
        const mode = drag.mode;

        if (mode === "row") {
          let newHeight = drag.startHeight;

          if (handle.includes("s")) {
            newHeight = drag.startHeight + dy;
          } else if (handle.includes("n")) {
            newHeight = drag.startHeight - dy;
          }

          newHeight = Math.max(18, Math.round(newHeight));
          drag.row.style.height = newHeight + "px";
          Array.from(drag.row.cells).forEach(cell => {
            cell.style.height = newHeight + "px";
          });
        } else if (mode === "column") {
          let newWidth = drag.startWidth;

          if (handle.includes("e")) {
            newWidth = drag.startWidth + dx;
          } else if (handle.includes("w")) {
            newWidth = drag.startWidth - dx;
          }

          newWidth = Math.max(24, Math.round(newWidth));
          Array.from(drag.table.rows).forEach(row => {
            const cell = row.cells[drag.columnIndex];

            if (cell) {
              cell.style.width = newWidth + "px";
            }
          });
        } else if (mode === "cell") {
          let newWidth = drag.startWidth;
          let newHeight = drag.startHeight;

          if (handle.includes("e")) {
            newWidth = drag.startWidth + dx;
          } else if (handle.includes("w")) {
            newWidth = drag.startWidth - dx;
          }

          if (handle.includes("s")) {
            newHeight = drag.startHeight + dy;
          } else if (handle.includes("n")) {
            newHeight = drag.startHeight - dy;
          }

          drag.cell.style.width = Math.max(24, Math.round(newWidth)) + "px";
          drag.cell.style.height = Math.max(18, Math.round(newHeight)) + "px";
        }

        this.syncObjectAfterChange(drag.table);
        this.positionObjectResizeOverlay();
      }

      handleObjectResizePointerMove(event) {
        if (!this.resizeDrag) return;

        const drag = this.resizeDrag;

        if (drag.kind === "table-component") {
          if (!this.isInDocument(drag.table)) {
            this.handleObjectResizePointerUp(event);
            return;
          }

          event.preventDefault();

          const dx = event.clientX - drag.startClientX;
          const dy = event.clientY - drag.startClientY;
          this.applyTableComponentResizeFromDrag(drag, dx, dy);
          return;
        }

        if (!this.isInDocument(drag.object)) {
          this.handleObjectResizePointerUp(event);
          return;
        }

        event.preventDefault();

        const dx = event.clientX - drag.startClientX;
        const dy = event.clientY - drag.startClientY;
        const handle = drag.handleName;

        let newWidth = drag.startWidth;
        let newHeight = drag.startHeight;

        if (handle.includes("e")) {
          newWidth = drag.startWidth + dx;
        } else if (handle.includes("w")) {
          newWidth = drag.startWidth - dx;

          if (drag.objectBlock) {
            const minWidth = this.getObjectMinimumSize(drag.object).width;
            const maxX = Math.max(0, drag.startBlockX + drag.startWidth - minWidth);
            const nextX = this.clamp(drag.startBlockX + dx, 0, maxX);

            newWidth = drag.startWidth + (drag.startBlockX - nextX);

            drag.object.style.float = "none";
            drag.object.style.display = drag.object.matches("table") ? "table" : "flex";
            drag.object.style.marginLeft = nextX + "px";
            drag.object.style.marginRight = "8px";
            drag.object.dataset.blockX = String(nextX);
          }
        }

        if (handle.includes("s")) {
          newHeight = drag.startHeight + dy;
        } else if (handle.includes("n")) {
          newHeight = drag.startHeight - dy;
        }

        this.applyObjectSizeInPixels(drag.object, newWidth, newHeight);
      }

      handleObjectResizePointerUp(event) {
        if (!this.resizeDrag) return;

        const drag = this.resizeDrag;
        this.resizeDrag = null;
        document.body.classList.remove("wordex-resizing");

        if (drag.kind === "table-component") {
          if (this.isInDocument(drag.table)) {
            this.syncAndSelectTableComponent(drag, drag.mode);
            this.positionObjectResizeOverlay();
          }

          return;
        }

        const object = drag.object;

        if (this.isInDocument(object)) {
          this.syncObjectAfterChangeAndKeepSelected(object);
          this.positionObjectResizeOverlay();
        }
      }

      resizeSelectedObjectBy(deltaWidth, deltaHeight) {
        if (this.resizeSelectedTableComponentBy(deltaWidth, deltaHeight)) {
          return;
        }

        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        const object = this.selectedObject;
        const rect = object.getBoundingClientRect();

        this.applyObjectSizeInPixels(
          object,
          rect.width + deltaWidth,
          rect.height + deltaHeight
        );

        this.syncObjectAfterChangeAndKeepSelected(object);
      }

      parseCssSizeToPixels(value, referenceElement) {
        const text = String(value || "").trim();

        if (text.endsWith("px")) {
          return Number(text.replace("px", "")) || 0;
        }

        if (text.endsWith("mm")) {
          return (Number(text.replace("mm", "")) || 0) * 3.7795275591;
        }

        if (text.endsWith("cm")) {
          return (Number(text.replace("cm", "")) || 0) * 37.795275591;
        }

        if (text.endsWith("pt")) {
          return (Number(text.replace("pt", "")) || 0) * 1.3333333333;
        }

        const number = Number(text);
        if (Number.isFinite(number)) return number;

        return referenceElement?.getBoundingClientRect().height || 0;
      }

      configureSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        if (this.selectedObject.matches(".dynamic-image-box")) {
          this.configureImage(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-chart-box")) {
          this.configureChart(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-textbox")) {
          this.configureTextbox(this.selectedObject);
          return;
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          this.configureTable(this.selectedObject);
        }
      }

      configureImage(imageBox) {
        const fieldName = prompt("Nome da imagem:", imageBox.dataset.fieldName || "Imagem");
        if (!fieldName) return;

        const align = this.askAlignment(imageBox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", imageBox.style.width || "80mm");
        if (!width) return;

        const height = prompt("Altura:", imageBox.style.height || "45mm");
        if (!height) return;

        imageBox.dataset.fieldName = fieldName;
        imageBox.style.width = width;
        imageBox.style.height = height;
        imageBox.innerHTML =
          "<span><strong>Imagem</strong>{{" +
          this.escapeHtml(fieldName) +
          "}}</span>";

        this.applyAlignment(imageBox, align);
        this.limitObjectWidthToParagraph(imageBox);
        this.syncObjectAfterChange(imageBox);
        this.selectObject(imageBox);
      }

      configureChart(chartBox) {
        const sourceName = prompt("Nome lógico/fonte de dados do gráfico:", chartBox.dataset.sourceName || "VendasPorMes");
        if (!sourceName) return;

        const chartType = this.askChartType(chartBox.dataset.chartType || "bar");
        if (!chartType) return;

        const align = this.askAlignment(chartBox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", chartBox.style.width || "100mm");
        if (!width) return;

        const height = prompt("Altura:", chartBox.style.height || "60mm");
        if (!height) return;

        chartBox.dataset.sourceName = sourceName;
        chartBox.dataset.chartType = chartType;
        chartBox.style.width = width;
        chartBox.style.height = height;
        chartBox.innerHTML = this.generateChartPlaceholderHtml(sourceName, chartType);

        this.applyAlignment(chartBox, align);
        this.limitObjectWidthToParagraph(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
      }

      configureTextbox(textbox) {
        const align = this.askAlignment(textbox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", textbox.style.width || "80mm");
        if (!width) return;

        const height = prompt("Altura:", textbox.style.height || "30mm");
        if (!height) return;

        textbox.style.width = width;
        textbox.style.height = height;

        this.applyAlignment(textbox, align);
        this.limitObjectWidthToParagraph(textbox);
        this.syncObjectAfterChange(textbox);
        this.selectObject(textbox);
      }

      configureTable(table) {
        const align = this.askAlignment(table.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura da tabela:", table.style.width || "80mm");
        if (!width) return;

        const datasource = prompt(
          "Datasource da tabela (nome da coleção; vazio = ROOT):",
          table.dataset.wordexDatasource || ""
        );

        if (datasource === null) return;

        const currentRows = table.rows.length;
        const currentCols = this.getTableColumnCount(table);

        const rows = Number(prompt("Quantidade de linhas:", String(currentRows)));
        const cols = Number(prompt("Quantidade de colunas:", String(currentCols)));

        if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1) {
          alert("Informe uma quantidade válida de linhas e colunas.");
          return;
        }

        this.resizeTableStructure(table, rows, cols);

        const defaultColWidths = this.getColumnWidths(table).join(", ");
        const colWidths = prompt(
          "Larguras das colunas, separadas por vírgula. Deixe vazio para não alterar.",
          defaultColWidths
        );

        if (colWidths !== null && colWidths.trim() !== "") {
          this.applyColumnWidths(table, colWidths);
        }

        const defaultRowHeights = this.getRowHeights(table).join(", ");
        const rowHeights = prompt(
          "Alturas das linhas, separadas por vírgula. Deixe vazio para não alterar.",
          defaultRowHeights
        );

        if (rowHeights !== null && rowHeights.trim() !== "") {
          this.applyRowHeights(table, rowHeights);
        }

        table.style.width = width;

        if (datasource.trim()) {
          table.dataset.wordexDatasource = datasource.trim();
        } else {
          delete table.dataset.wordexDatasource;
        }

        this.applyAlignment(table, align);
        this.limitObjectWidthToParagraph(table);
        this.syncObjectAfterChange(table);
        this.selectObject(table);
      }

      getTableColumnCount(table) {
        let count = 0;

        Array.from(table.rows).forEach(row => {
          const rowCount = Array.from(row.cells).reduce((total, cell) => {
            return total + (Number(cell.colSpan) || 1);
          }, 0);

          count = Math.max(count, rowCount);
        });

        return count;
      }

      getReferenceColumnRow(table) {
        return Array.from(table.rows).find(row => {
          return Array.from(row.cells).every(cell => (Number(cell.colSpan) || 1) === 1);
        }) || table.rows[0] || null;
      }

      resizeTableStructure(table, rows, cols) {
        while (table.rows.length < rows) {
          table.appendChild(document.createElement("tr"));
        }

        while (table.rows.length > rows) {
          table.deleteRow(table.rows.length - 1);
        }

        Array.from(table.rows).forEach((row, rowIndex) => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

          if (rowType) {
            row.dataset.wordexRowType = rowType;
          }

          if (this.shouldDecolumnizeTableRow(table, row, rowType)) {
            this.decolumnizeTableRow(table, row, rowType, cols);
            return;
          }

          this.recolumnizeTableRow(table, row, cols);

          while (row.cells.length < cols) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            row.appendChild(td);
          }

          while (row.cells.length > cols) {
            row.deleteCell(row.cells.length - 1);
          }
        });
      }

      getColumnWidths(table) {
        const row = this.getReferenceColumnRow(table);
        if (!row) return [];
        return Array.from(row.cells).map(cell => cell.style.width || "");
      }

      getRowHeights(table) {
        return Array.from(table.rows).map(row => row.style.height || row.cells[0]?.style.height || "");
      }

      applyColumnWidths(table, csv) {
        const widths = csv.split(",").map(value => value.trim());
        Array.from(table.rows).forEach(row => {
          Array.from(row.cells).forEach((cell, index) => {
            if (widths[index]) cell.style.width = widths[index];
          });
        });
      }

      applyRowHeights(table, csv) {
        const heights = csv.split(",").map(value => value.trim());
        Array.from(table.rows).forEach((row, index) => {
          if (heights[index]) {
            row.style.height = heights[index];
            Array.from(row.cells).forEach(cell => {
              cell.style.height = heights[index];
            });
          }
        });
      }

      applyFontFamily(fontFamily) {
        this.applyFormatting({
          fontFamily
        });
      }

      applyFontSize(fontSize) {
        this.applyFormatting({
          fontSize
        });
      }

      applyTextColor(color) {
        this.applyFormatting({
          color
        });
      }

      toggleBold() {
        this.applyFormatting({ fontWeight: "bold" });
      }

      toggleItalic() {
        this.applyFormatting({ fontStyle: "italic" });
      }

      toggleUnderline() {
        this.applyFormatting({ textDecoration: "underline" });
      }

      clearTextEmphasis() {
        if (this.clearTextEmphasisFromSelectedText()) {
          return;
        }

        if (this.selectedObject) {
          this.clearTextEmphasisFromElement(this.selectedObject);

          if (this.isWordexTableObject(this.selectedObject)) {
            this.selectedObject.querySelectorAll("td").forEach(cell => {
              this.clearTextEmphasisFromElement(cell);
            });
          }

          this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.clearTextEmphasisFromElement(paragraph);

          const block = this.findBlockById(paragraph.dataset.blockId);

          if (block) {
            block.style.fontWeight = "normal";
            block.style.fontStyle = "normal";
            block.style.textDecoration = "none";
            block.html = this.getCleanInnerHtml(paragraph);
          }

          this.syncParagraphElement(paragraph);
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }
      }

      clearTextEmphasisFromSelectedText() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          O sublinhado pode estar num span ancestral. Nesse caso, limpar apenas
          o trecho extraído não basta, porque o texto continua dentro do ancestral
          sublinhado. O removeFormat nativo quebra essa estrutura antes.
        */
        document.execCommand("removeFormat", false, null);
        document.execCommand("unlink", false, null);

        const cleanRange = selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : range;

        const container = cleanRange.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? cleanRange.commonAncestorContainer
          : cleanRange.commonAncestorContainer.parentElement;

        const cleanupRoot = container?.closest?.(".paragraph, td, .wordex-textbox") || paragraph;

        this.clearTextEmphasisFromElement(cleanupRoot);
        this.removeEmptyInlineStyleElements(cleanupRoot);

        this.selectedParagraphId = paragraph.dataset.blockId;
        this.selectedBlockId = paragraph.dataset.blockId;
        this.syncParagraphElement(paragraph);
        this.renderSelection();
        this.saveUndoStateIfChanged();

        return true;
      }

      clearTextEmphasisFromElement(element) {
        if (!element) return;

        const clearElement = node => {
          if (!(node instanceof Element)) return;

          node.style.fontWeight = "normal";
          node.style.fontStyle = "normal";
          node.style.textDecoration = "none";
          node.style.textDecorationLine = "none";
          node.style.textDecorationStyle = "";
          node.style.textDecorationColor = "";

          node.removeAttribute("face");
        };

        clearElement(element);

        element.querySelectorAll("*").forEach(clearElement);

        /*
          Tags semânticas de ênfase continuam prevalecendo em alguns casos.
          Por isso, ao usar Normal, elas são desfeitas preservando o conteúdo.
        */
        Array.from(element.querySelectorAll("b, strong, i, em, u")).forEach(node => {
          node.replaceWith(...Array.from(node.childNodes));
        });
      }

      removeEmptyInlineStyleElements(root) {
        if (!root) return;

        Array.from(root.querySelectorAll("span")).forEach(span => {
          const style = span.getAttribute("style") || "";

          if (
            style.replace(/\s/g, "") === "" ||
            style.replace(/\s/g, "") === "font-weight:normal;font-style:normal;text-decoration:none;text-decoration-line:none;"
          ) {
            span.replaceWith(...Array.from(span.childNodes));
          }
        });
      }

      getBorderSettings() {
        const color = document.getElementById("borderColor")?.value || "#000000";
        const width = document.getElementById("borderWidth")?.value || "1px";
        const style = document.getElementById("borderStyle")?.value || "solid";
        const radius = document.getElementById("borderRadius")?.value || "0";

        return {
          color,
          width,
          style,
          radius
        };
      }

      applyBorderStyle(element, settings = this.getBorderSettings()) {
        if (!element) return;

        /*
          v242: borda precisa funcionar também em textbox, imagem, gráfico e
          parágrafo. Alguns desses elementos possuem borda/outline definidos no
          CSS do editor; por isso usamos setProperty(..., "important") para que
          a escolha do usuário prevaleça visualmente e também no HTML salvo.
        */
        if (settings.width === "0" || settings.style === "none") {
          this.clearBorderStyle(element);
          return;
        }

        element.style.setProperty(
          "border",
          `${settings.width} ${settings.style} ${settings.color}`,
          "important"
        );
        element.style.setProperty("border-radius", settings.radius, "important");

        /*
          Border-radius em tabela só funciona de forma decente com separate.
        */
        if (element.matches("table")) {
          element.style.borderCollapse = "separate";
          element.style.borderSpacing = "0";
          element.style.overflow = "hidden";
        }
      }

      clearBorderStyle(element) {
        if (!element) return;

        /*
          Não basta remover a borda inline: vários elementos do editor têm uma
          borda padrão no CSS. Para "Sem Borda", gravamos border: none.
        */
        element.style.setProperty("border", "none", "important");
        element.style.removeProperty("border-radius");

        if (element.matches("table")) {
          element.style.borderCollapse = "collapse";
          element.style.borderSpacing = "";
          element.style.overflow = "";
        }
      }

      applyBorderToCurrent() {
        if (this.selectedObject?.matches?.(".wordex-table") && this.selectedTableMode) {
          this.applyBorderToSelectedTableComponent();
          return;
        }

        if (this.selectedCell) {
          this.applyBorderToSelectedTableCell();
          return;
        }

        if (this.selectedObject) {
          this.applyBorderStyle(this.selectedObject);
          this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.applyBorderStyle(paragraph);
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          return;
        }

        alert("Selecione um parágrafo, imagem, tabela ou célula.");
      }

      forEachSelectedTableTarget(mode, callback) {
        const context = this.getSelectedTableContext();
        if (!context) return null;

        if (mode === "cell") {
          callback(context.cell);
        } else if (mode === "row") {
          Array.from(context.row.cells).forEach(callback);
        } else if (mode === "column") {
          Array.from(context.table.rows).forEach(row => {
            const cell = row.cells[context.columnIndex];
            if (cell) callback(cell);
          });
        } else if (mode === "table") {
          callback(context.table);
          context.table.querySelectorAll("td").forEach(callback);
        }

        return context;
      }

      applyBorderToSelectedTableComponent() {
        const mode = this.selectedTableMode || "cell";
        const handlers = {
          table: () => this.applyBorderToSelectedTable(),
          row: () => this.applyBorderToSelectedTableRow(),
          column: () => this.applyBorderToSelectedTableColumn(),
          cell: () => this.applyBorderToSelectedTableCell()
        };

        (handlers[mode] || handlers.cell)();
      }

      applyBorderToSelectedTableCell() {
        this.applyBorderToSelectedTableScope("cell");
      }

      applyBorderToSelectedTableRow() {
        this.applyBorderToSelectedTableScope("row");
      }

      applyBorderToSelectedTableColumn() {
        this.applyBorderToSelectedTableScope("column");
      }

      syncAndSelectTableComponent(context, mode) {
        if (!context?.table) return;
        this.syncObjectAfterChange(context.table);
        this.selectTableComponent(context.table, context.cell, mode);
      }

      applyBorderToSelectedTableScope(mode) {
        const context = this.forEachSelectedTableTarget(mode, cell => this.applyBorderStyle(cell));
        if (!context) return;

        this.syncAndSelectTableComponent(context, mode);
      }

      applyBorderToSelectedTable() {
        const context = this.forEachSelectedTableTarget("table", element => {
          this.applyBorderStyle(element);
        });

        if (context) {
          this.syncAndSelectTableComponent(context, "table");
          return;
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          this.applyBorderStyle(this.selectedObject);
          this.selectedObject.querySelectorAll("td").forEach(cell => {
            this.applyBorderStyle(cell);
          });
          this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
          return;
        }

        alert("Selecione uma tabela ou célula.");
      }


      toggleBorderDropdown(event) {
        event.preventDefault();
        event.stopPropagation();

        const menu = document.getElementById("wordexBorderMenu");
        const dropdown = event.currentTarget.closest(".wordex-border-dropdown");

        if (!menu || !dropdown) return;

        const wasOpen = menu.classList.contains("is-open");
        this.closeBorderDropdown();

        if (wasOpen) return;

        const rect = dropdown.getBoundingClientRect();
        const menuWidth = 252;
        const left = Math.max(4, Math.min(rect.left, window.innerWidth - menuWidth - 8));
        const top = rect.bottom + 2;

        menu.style.left = left + "px";
        menu.style.top = top + "px";
        menu.classList.add("is-open");
      }

      closeBorderDropdown() {
        const menu = document.getElementById("wordexBorderMenu");
        if (!menu) return;

        menu.classList.remove("is-open");
      }

      getBorderLineCss(settings = this.getBorderSettings()) {
        if (!settings || settings.width === "0" || settings.style === "none") {
          return "";
        }

        return `${settings.width} ${settings.style} ${settings.color}`;
      }

      setBorderEdge(element, edge, lineCss) {
        if (!element || !edge) return;

        const property = "border" + edge.charAt(0).toUpperCase() + edge.slice(1);

        if (lineCss) {
          element.style.setProperty(property, lineCss, "important");
        } else {
          element.style.setProperty(property, "none", "important");
        }
      }

      clearCellBorders(cell) {
        if (!cell) return;

        cell.style.setProperty("border", "none", "important");
        cell.style.setProperty("border-top", "none", "important");
        cell.style.setProperty("border-right", "none", "important");
        cell.style.setProperty("border-bottom", "none", "important");
        cell.style.setProperty("border-left", "none", "important");
        cell.style.removeProperty("border-radius");
      }

      getCurrentBoxBorderTarget() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          !this.isWordexTableObject(this.selectedObject)
        ) {
          return {
            kind: "object",
            element: this.selectedObject
          };
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph && this.documentElement.contains(paragraph)) {
          return {
            kind: "paragraph",
            element: paragraph
          };
        }

        return null;
      }

      applyBorderPresetToBoxElement(element, preset, settings = this.getBorderSettings()) {
        if (!element) return false;

        const lineCss = this.getBorderLineCss(settings);

        if (preset === "none") {
          this.clearBorderStyle(element);
          return true;
        }

        if (preset === "all" || preset === "outside") {
          this.applyBorderStyle(element, settings);
          return true;
        }

        if (["top", "right", "bottom", "left"].includes(preset)) {
          this.setBorderEdge(element, preset, lineCss);
          element.style.setProperty("border-radius", settings.radius, "important");
          return true;
        }

        return false;
      }

      syncBorderTargetAfterChange(target) {
        if (!target?.element) return;

        if (target.kind === "object") {
          this.syncObjectAfterChangeAndKeepSelected(target.element);
          return;
        }

        if (target.kind === "paragraph") {
          this.syncParagraphElement(target.element);
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }
      }

      getCurrentMarginTarget() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject)
        ) {
          if (
            this.isWordexTableObject(this.selectedObject) &&
            this.selectedTableMode &&
            this.selectedTableMode !== "table"
          ) {
            return null;
          }

          return {
            kind: "object",
            element: this.selectedObject
          };
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph && this.documentElement.contains(paragraph)) {
          const wrapper = paragraph.closest(".paragraph-block");

          if (wrapper) {
            return {
              kind: "paragraph",
              element: wrapper
            };
          }
        }

        return null;
      }

      getSelectedMarginEdge() {
        const value = document.getElementById("wordexMarginEdge")?.value || "top";
        return ["top", "right", "bottom", "left"].includes(value) ? value : "top";
      }

      getMarginPropertyName(edge) {
        return "margin" + edge.charAt(0).toUpperCase() + edge.slice(1);
      }

      getElementMarginInMillimeters(element, edge) {
        if (!element) return 0;

        const property = this.getMarginPropertyName(edge);
        const inlineValue = element.style[property] || "";
        const computedValue = window.getComputedStyle(element)[property] || "0px";
        const value = inlineValue && inlineValue !== "auto" ? inlineValue : computedValue;

        return this.parseCssSizeToMillimeters(value);
      }

      setElementMarginInMillimeters(element, edge, valueMm) {
        if (!element) return;

        const property = this.getMarginPropertyName(edge);
        element.style[property] = this.formatMillimeters(valueMm);
      }

      adjustSelectedMargin(direction) {
        const target = this.getCurrentMarginTarget();

        if (!target) {
          alert("Selecione um parágrafo, imagem, gráfico, textbox ou a tabela inteira para alterar a margem.");
          return;
        }

        const edge = this.getSelectedMarginEdge();
        const stepMm = 1;
        const currentMm = this.getElementMarginInMillimeters(target.element, edge);
        const nextMm = Math.max(0, currentMm + (direction >= 0 ? stepMm : -stepMm));

        this.setElementMarginInMillimeters(target.element, edge, nextMm);

        if (target.kind === "object") {
          this.syncObjectAfterChangeAndKeepSelected(target.element);
          return;
        }

        if (target.kind === "paragraph") {
          const block = this.findBlockById(target.element.dataset.blockId);

          if (block) {
            block.style = block.style || {};
            block.style[this.getMarginPropertyName(edge)] = target.element.style[this.getMarginPropertyName(edge)] || "";
          }

          const paragraph = target.element.querySelector(".paragraph");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          this.renderSelection();
          this.saveUndoStateIfChanged();
        }
      }

      getCurrentTableBorderContext() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            const node = selection.getRangeAt(0).commonAncestorContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            cell = element?.closest("td") || null;
          }
        }

        if (cell && this.documentElement.contains(cell)) {
          const table = cell.closest(".wordex-table");

          if (table) {
            return {
              table,
              cell,
              row: cell.parentElement,
              columnIndex: Array.from(cell.parentElement.cells).indexOf(cell),
              mode: this.selectedTableMode || "cell"
            };
          }
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          return {
            table: this.selectedObject,
            cell: null,
            row: null,
            columnIndex: 0,
            mode: "table"
          };
        }

        return null;
      }

      getTableCellsForBorderPreset(context) {
        if (!context?.table) return [];

        const mode = context.mode || "cell";

        if (mode === "table" || !context.cell) {
          return Array.from(context.table.querySelectorAll("td"));
        }

        if (mode === "row") {
          return Array.from(context.row.cells);
        }

        if (mode === "column") {
          return Array.from(context.table.rows)
            .map(row => row.cells[context.columnIndex])
            .filter(Boolean);
        }

        return [context.cell];
      }

      getCellGridPosition(table, cell) {
        const row = cell?.parentElement;
        if (!table || !row) return { rowIndex: -1, columnIndex: -1 };

        return {
          rowIndex: Array.from(table.rows).indexOf(row),
          columnIndex: Array.from(row.cells).indexOf(cell)
        };
      }

      applyBorderPresetToCells(context, preset, settings = this.getBorderSettings()) {
        const cells = this.getTableCellsForBorderPreset(context);

        if (!context?.table || cells.length === 0) {
          return false;
        }

        const lineCss = this.getBorderLineCss(settings);
        const positions = cells.map(cell => ({ cell, ...this.getCellGridPosition(context.table, cell) }));
        const rowIndexes = positions.map(item => item.rowIndex).filter(index => index >= 0);
        const columnIndexes = positions.map(item => item.columnIndex).filter(index => index >= 0);
        const minRow = Math.min(...rowIndexes);
        const maxRow = Math.max(...rowIndexes);
        const minColumn = Math.min(...columnIndexes);
        const maxColumn = Math.max(...columnIndexes);

        const applyEdge = (cell, edge) => this.setBorderEdge(cell, edge, lineCss);

        if (preset === "none") {
          cells.forEach(cell => this.clearCellBorders(cell));
          context.table.style.border = "";
          return true;
        }

        if (preset === "all") {
          cells.forEach(cell => {
            cell.style.border = lineCss;
            cell.style.borderRadius = settings.radius;
          });
          return true;
        }

        if (["top", "right", "bottom", "left"].includes(preset)) {
          cells.forEach(cell => applyEdge(cell, preset));
          return true;
        }

        if (preset === "outside") {
          positions.forEach(item => {
            if (item.rowIndex === minRow) applyEdge(item.cell, "top");
            if (item.rowIndex === maxRow) applyEdge(item.cell, "bottom");
            if (item.columnIndex === minColumn) applyEdge(item.cell, "left");
            if (item.columnIndex === maxColumn) applyEdge(item.cell, "right");
          });
          return true;
        }

        if (preset === "inside" || preset === "insideHorizontal" || preset === "insideVertical") {
          positions.forEach(item => {
            if ((preset === "inside" || preset === "insideHorizontal") && item.rowIndex < maxRow) {
              applyEdge(item.cell, "bottom");
            }

            if ((preset === "inside" || preset === "insideVertical") && item.columnIndex < maxColumn) {
              applyEdge(item.cell, "right");
            }
          });
          return true;
        }

        return false;
      }

      applyTableBorderPreset(preset) {
        this.closeBorderDropdown();

        const context = this.getCurrentTableBorderContext();

        if (context) {
          const applied = this.applyBorderPresetToCells(context, preset);

          if (!applied) {
            alert("Opção de borda ainda não implementada.");
            return;
          }

          this.syncAndSelectTableComponent(context, context.mode || "cell");
          return;
        }

        /*
          v242: o mesmo menu de bordas também atua no objeto/parágrafo corrente.
          Bordas internas continuam exclusivas de tabela.
        */
        const target = this.getCurrentBoxBorderTarget();

        if (!target) {
          alert("Selecione uma célula, tabela, objeto ou parágrafo para aplicar essa borda.");
          return;
        }

        const applied = this.applyBorderPresetToBoxElement(target.element, preset);

        if (!applied) {
          alert("Bordas internas só se aplicam a tabelas.");
          return;
        }

        this.syncBorderTargetAfterChange(target);
      }

      toggleSelectedTableGridLines() {
        this.closeBorderDropdown();

        const context = this.getCurrentTableBorderContext();

        if (!context?.table) {
          alert("Selecione uma tabela para alternar as linhas de grade.");
          return;
        }

        context.table.classList.toggle("wordex-show-gridlines");
        this.syncAndSelectTableComponent(context, context.mode || "table");
      }

      trySelectObjectInsideTableCell(event, container = this.documentElement) {
        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object || !container.contains(object)) {
          return false;
        }

        const cell = object.closest("td");

        if (!cell || !container.contains(cell)) {
          return false;
        }

        const ownerTable = cell.closest(".wordex-table");

        /*
          Se o objeto encontrado for a própria tabela dona da célula,
          não é objeto interno: deixa o fluxo normal selecionar célula/tabela.
          Imagem, gráfico, textbox e tabela aninhada dentro da célula devem
          poder ser selecionados para configurar/redimensionar.
        */
        if (ownerTable && object === ownerTable) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        event.wordexTableClickHandled = true;

        this.selectObject(object);
        return true;
      }

      handleTableOrObjectClick(event, container, options = {}) {
        const {
          stopPropagationAtStart = false,
          stopPropagationOnCell = false,
          stopPropagationOnCellModifier = false,
          stopPropagationOnObject = false,
          stopPropagationOnObjectModifier = false,
          requireObjectInContainer = true
        } = options;

        if (event.defaultPrevented || event.wordexTableClickHandled) {
          return true;
        }

        if (stopPropagationAtStart) {
          event.stopPropagation();
        }

        if (this.trySelectObjectInsideTableCell(event, container)) {
          return true;
        }

        const cell = event.target.closest("td");

        if (cell && container.contains(cell)) {
          const table = cell.closest(".wordex-table");

          if (table) {
            if (stopPropagationOnCell) {
              event.stopPropagation();
            }

            event.wordexTableClickHandled = true;

            if (this.isPrimaryModifierPressed(event)) {
              event.preventDefault();

              if (stopPropagationOnCellModifier) {
                event.stopPropagation();
              }

              this.cycleTableComponentSelection(cell);
            } else {
              this.selectTableCell(cell);
            }

            return true;
          }
        }

        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object) {
          return false;
        }

        if (requireObjectInContainer && !container.contains(object)) {
          return false;
        }

        if (stopPropagationOnObject) {
          event.stopPropagation();
        }

        const isPrimaryModifier = this.isPrimaryModifierPressed(event);
        const isTextboxObject = object.matches(".wordex-textbox");

        /*
          v254: textbox passa a seguir a lógica da tabela:
          - clique normal edita o texto interno e não seleciona o objeto;
          - Ctrl+click seleciona o textbox como objeto para alinhar,
            redimensionar, aplicar borda, margem etc.
        */
        if (isTextboxObject && !isPrimaryModifier) {
          return false;
        }

        if (isPrimaryModifier && this.isWordexTableObject(object)) {
          event.preventDefault();
          event.wordexTableClickHandled = true;

          if (stopPropagationOnObjectModifier) {
            event.stopPropagation();
          }

          const cycleCell = this.getCellForTableComponentCycle(object, event.target);

          if (cycleCell) {
            this.cycleTableComponentSelection(cycleCell);
          } else {
            this.selectTableComponent(object, null, "table");
          }
        } else {
          if (isPrimaryModifier) {
            event.preventDefault();

            if (stopPropagationOnObjectModifier) {
              event.stopPropagation();
            }
          }

          this.selectObject(object);
        }

        return true;
      }

      selectTableCell(cell) {
        if (!cell) return;

        const table = cell.closest(".wordex-table");

        if (!table) return;

        this.selectTableComponent(table, cell, "cell");
      }

      getCellForTableComponentCycle(table, target) {
        if (!table) return null;

        const targetElement = target && target.nodeType === Node.ELEMENT_NODE
          ? target
          : target?.parentElement;

        const targetCell = targetElement?.closest?.("td") || null;

        if (targetCell && table.contains(targetCell)) {
          return targetCell;
        }

        if (this.selectedCell && table.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        return table.rows?.[0]?.cells?.[0] || null;
      }

      cycleTableComponentSelection(cell) {
        if (!cell) return;

        const table = cell.closest(".wordex-table");

        if (!table) return;

        const currentMode =
          this.selectedObject === table
            ? (this.selectedTableMode || table.dataset.wordexSelectionMode || "cell")
            : (table.dataset.wordexSelectionMode || "cell");

        let nextMode = "table";

        if (currentMode === "table") {
          nextMode = "row";
        } else if (currentMode === "row") {
          nextMode = "column";
        } else if (currentMode === "column") {
          nextMode = "table";
        } else {
          /*
            Modo cell ou indefinido: primeiro Ctrl+clique sobe para tabela.
          */
          nextMode = "table";
        }

        this.selectTableComponent(table, cell, nextMode);
      }

      selectTableComponent(table, cell, mode) {
        if (!table) return;

        this.selectedObject = table;
        this.selectedCell = cell || this.selectedCell;
        this.selectedTableMode = mode || "table";
        table.dataset.wordexSelectionMode = this.selectedTableMode;
        this.selectedTableRow = cell ? cell.parentElement : null;
        this.selectedTableColumnIndex = cell && cell.parentElement
          ? Array.from(cell.parentElement.cells).indexOf(cell)
          : null;

        if (this.selectedTableMode !== "cell") {
          const selection = window.getSelection();

          if (selection) {
            selection.removeAllRanges();
          }

          this.savedRange = null;
        }

        const paragraph = table.closest(".paragraph");
        const block = table.closest(".paragraph-block, .object-block");
        const region = table.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.renderSelection();
      }

      normalizeTableRowType(rowType) {
        const value = String(rowType || "").trim();

        /*
          Compatibilidade:
          - TableHeader deixou de existir como tipo especial e vira GroupHeader.
          - TableFooter deixou de existir como tipo especial e vira GroupFooter.
          Como ROOT também é grupo, cabeçalho/rodapé geral são apenas
          GroupHeader/GroupFooter do ROOT.
        */
        if (value === "TableHeader") {
          return "GroupHeader";
        }

        if (value === "TableFooter") {
          return "GroupFooter";
        }

        return value;
      }

      normalizeLegacyTableFooterRows(container) {
        if (!container) return;

        container.querySelectorAll?.('tr[data-wordex-row-type="TableHeader"]').forEach(row => {
          row.dataset.wordexRowType = "GroupHeader";
          this.updateTableRowTypeLabel(row);
        });

        container.querySelectorAll?.('tr[data-wordex-row-type="TableFooter"]').forEach(row => {
          row.dataset.wordexRowType = "GroupFooter";
          this.updateTableRowTypeLabel(row);
        });
      }

      getTableRowDatasource(row) {
        return String(row?.dataset?.wordexDatasource || "").trim();
      }

      isTableRowEnabled(row) {
        return row?.dataset?.wordexEnabled !== "false";
      }

      setTableRowEnabled(row, enabled) {
        if (!row) return;

        if (enabled === false) {
          row.dataset.wordexEnabled = "false";
        } else {
          delete row.dataset.wordexEnabled;
        }

        this.updateTableRowTypeLabel(row);
      }

      getTableRowTypeLabel(row) {
        if (!row) return "";

        const parts = [];
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
        const datasource = this.getTableRowDatasource(row);

        if (rowType) parts.push(rowType);
        if (datasource) parts.push("ds=" + datasource);
        if (!this.isTableRowEnabled(row)) parts.push("Enabled=false");

        return parts.join(" | ");
      }

      updateTableRowTypeLabel(row) {
        if (!row) return;

        const label = this.getTableRowTypeLabel(row);

        Array.from(row.cells || []).forEach(cell => {
          if (label) {
            cell.dataset.rowTypeLabel = label;
          } else {
            delete cell.dataset.rowTypeLabel;
          }
        });
      }

      shouldDecolumnizeTableRow(table, row, rowType) {
        /*
          A descolunização pertence ao tipo da linha, não à posição.
          Qualquer linha GroupHeader vira uma célula única
          com colspan total.
        */
        rowType = this.normalizeTableRowType(rowType);
        return rowType === "GroupHeader";
      }

      isCellHtmlEmpty(html) {
        const text = String(html || "")
          .replace(/<br\s*\/?\s*>/gi, "")
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      decolumnizeTableRow(table, row, rowType, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const columnCount = Math.max(
          1,
          Number(totalColumns) || this.getTableColumnCount(table)
        );

        const firstCell = row.cells[0];
        const extraCells = Array.from(row.cells).slice(1);

        /*
          Preserva algum conteúdo que eventualmente exista nas demais células,
          antes de remover as células excedentes.
        */
        extraCells.forEach(cell => {
          if (!this.isCellHtmlEmpty(cell.innerHTML)) {
            if (!this.isCellHtmlEmpty(firstCell.innerHTML)) {
              firstCell.insertAdjacentHTML("beforeend", "<br>");
            }

            firstCell.insertAdjacentHTML("beforeend", cell.innerHTML);
          }

          cell.remove();
        });

        firstCell.colSpan = columnCount;
        firstCell.contentEditable = "true";
        firstCell.dataset.rowTypeLabel = rowType;

        row.dataset.wordexDecolumnized = "1";
        row.dataset.wordexOriginalColumnCount = String(columnCount);
      }

      recolumnizeTableRow(table, row, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const firstCell = row.cells[0];
        const columnCount = Math.max(
          1,
          Number(totalColumns) ||
            Number(row.dataset.wordexOriginalColumnCount) ||
            Number(firstCell.colSpan) ||
            this.getTableColumnCount(table)
        );

        firstCell.colSpan = 1;

        delete row.dataset.wordexDecolumnized;
        delete row.dataset.wordexOriginalColumnCount;

        while (row.cells.length < columnCount) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          row.appendChild(td);
        }
      }

      normalizeTableRowColumnsForType(table, row, rowType) {
        if (!table || !row) return;

        if (this.shouldDecolumnizeTableRow(table, row, rowType)) {
          this.decolumnizeTableRow(table, row, rowType);
          return;
        }

        this.recolumnizeTableRow(table, row);
      }

      getSelectedTableRowContext() {
        const context = this.getSelectedTableContext();

        if (!context) return null;

        return {
          table: context.table,
          row: context.row,
          cell: context.cell,
          rowIndex: Array.from(context.table.rows).indexOf(context.row)
        };
      }

      getAllowedTableRowTypesForRow(table, row) {
        return ["ColumnHeader", "GroupHeader", "Detail", "GroupFooter"];
      }

      parseTruthyText(value) {
        return ["true", "1", "sim", "s", "yes", "y"].includes(String(value || "").trim().toLowerCase());
      }

      isValidBooleanText(value) {
        return ["true", "false", "1", "0", "sim", "não", "nao", "s", "n", "yes", "no", "y"]
          .includes(String(value || "").trim().toLowerCase());
      }

      finalizeSelectedTableRowChange(context) {
        if (!context?.row) return;
        this.updateTableRowTypeLabel(context.row);
        this.syncAndSelectTableComponent(context, "row");
        this.syncTableRowTypeToolbar();
      }

      applySelectedTableRowType(rowType) {
        rowType = this.normalizeTableRowType(rowType);

        if (!rowType) return;

        const context = this.getSelectedTableRowContext();

        if (!context) return;

        const allowed = this.getAllowedTableRowTypesForRow(context.table, context.row);

        if (!allowed.includes(rowType)) {
          alert("Tipo de linha inválido para esta posição.");

          this.syncTableRowTypeToolbar();
          return;
        }

        context.row.dataset.wordexRowType = rowType;

        this.normalizeTableRowColumnsForType(context.table, context.row, rowType);
        this.finalizeSelectedTableRowChange(context);
      }

      clearSelectedTableRowType() {
        const context = this.getSelectedTableRowContext();

        if (!context) return;

        delete context.row.dataset.wordexRowType;

        this.normalizeTableRowColumnsForType(context.table, context.row, "");
        this.finalizeSelectedTableRowChange(context);
      }

      configureSelectedTableRow() {
        const context = this.getSelectedTableRowContext();

        if (!context) return;

        const datasource = prompt(
          "Datasource da linha (nome da coleção; vazio = contexto atual):",
          this.getTableRowDatasource(context.row)
        );

        if (datasource === null) return;

        const enabledText = prompt(
          "Enabled da linha? Use true ou false:",
          this.isTableRowEnabled(context.row) ? "true" : "false"
        );

        if (enabledText === null) return;

        if (!this.isValidBooleanText(enabledText)) {
          alert("Enabled inválido. Use true ou false.");
          return;
        }

        const isEnabled = this.parseTruthyText(enabledText);

        if (datasource.trim()) {
          context.row.dataset.wordexDatasource = datasource.trim();
        } else {
          delete context.row.dataset.wordexDatasource;
        }

        this.setTableRowEnabled(context.row, isEnabled);
        this.finalizeSelectedTableRowChange(context);
      }

      syncTableRowTypeToolbar() {
        const select = document.getElementById("tableRowType");

        if (!select) return;

        const context = this.getSelectedTableRowContextWithoutAlert();

        select.disabled = !context;

        Array.from(select.options).forEach(option => {
          if (!option.value) {
            option.disabled = false;
            return;
          }

          option.disabled = context
            ? !this.getAllowedTableRowTypesForRow(context.table, context.row).includes(option.value)
            : false;
        });

        const currentRowType = context?.row
          ? this.normalizeTableRowType(context.row.dataset.wordexRowType || "")
          : "";

        if (context?.row && currentRowType !== (context.row.dataset.wordexRowType || "")) {
          context.row.dataset.wordexRowType = currentRowType;
        }
