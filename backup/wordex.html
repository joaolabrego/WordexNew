      static loadPdfTemplate() {
        if (WordexEditor.pdfTemplateCache) {
          return WordexEditor.pdfTemplateCache;
        }

        const template = window.WORDEX_PDF_TEMPLATE;

        if (!template) {
          throw new Error(
            "wordex-pdf.html não foi carregado. Mantenha o arquivo na mesma pasta de WORDEX.html."
          );
        }

        WordexEditor.pdfTemplateCache = String(template);
        return WordexEditor.pdfTemplateCache;
      }

      applyPagedTemplatePlaceholders(template, values) {
        return String(template || "").replace(/@@([A-Z0-9_]+)@@/g, (match, key) => {
          if (!Object.prototype.hasOwnProperty.call(values, key)) {
            return match;
          }

          return String(values[key] ?? "");
        });
      }

      buildGeneratedReportHtml(data) {
        const pagedTemplate = WordexEditor.loadPagedTemplate();
        const documentClone = this.buildGeneratedDocumentClone(data);
        const headerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".header-template");
        const footerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".footer-template");

        /*
          Defesa extra: header/footer nunca podem permanecer no source paginado.
          Eles pertencem ao chrome de página e são reinjetados uma vez por página
          depois que o Pagex monta as páginas.
        */
        this.removeGeneratedHeaderFooterRegionsFromSource(documentClone);
        const page = this.getPageSettings();
        // O body paginado respeita a altura real do chrome header/footer.
        // A toolbar continua servindo como mínimo manual, mas o HTML gerado
        // aumenta automaticamente o chrome quando o conteúdo exigir.
        const minimumHeaderChromeMm = this.parseCssSizeToMillimeters(page.marginTop || "25mm");
        const minimumFooterChromeMm = this.parseCssSizeToMillimeters(page.marginBottom || "20mm");
        const measuredHeaderChromeMm = headerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(headerTemplateHtml, "header-template", minimumHeaderChromeMm)
          : 0;
        const measuredFooterChromeMm = footerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(footerTemplateHtml, "footer-template", minimumFooterChromeMm)
          : 0;
        const fixedHeaderChromeMm = headerTemplateHtml
          ? Math.max(minimumHeaderChromeMm, measuredHeaderChromeMm)
          : minimumHeaderChromeMm;
        const fixedFooterChromeMm = footerTemplateHtml
          ? Math.max(minimumFooterChromeMm, measuredFooterChromeMm)
          : minimumFooterChromeMm;
        const generatedPage = {
          ...page,
          marginTop: headerTemplateHtml
            ? this.formatMillimeters(fixedHeaderChromeMm)
            : page.marginTop,
          marginBottom: footerTemplateHtml
            ? this.formatMillimeters(fixedFooterChromeMm)
            : page.marginBottom
        };
        const pageMetrics = {
          marginLeftMm: this.parseCssSizeToMillimeters(page.marginLeft),
          marginRightMm: this.parseCssSizeToMillimeters(page.marginRight)
        };
        const title = this.escapeHtml("Relatório Wordex montado");
        const pageAtRule = this.getGeneratedPageAtRule(generatedPage);
        const watermark = this.getGeneratedWatermarkSettings();

        documentClone.style.width = generatedPage.width;
        documentClone.style.minHeight = generatedPage.height;
        documentClone.style.margin = "0 auto";
        documentClone.style.boxSizing = "border-box";

        this.injectContinuousWatermarkPreview(
          documentClone,
          watermark,
          "wordex-generated-continuous-watermark"
        );

        const pagexConfig = JSON.stringify({
          headerTemplateHtml: headerTemplateHtml || "",
          footerTemplateHtml: footerTemplateHtml || "",
          watermarkConfig: watermark || null,
          pdfFileName: this.getSuggestedReportPdfFileName(),
          pdfTitle: String(document.title || "Relatório Wordex").trim(),
          pageConfig: {
            width: generatedPage.width,
            height: generatedPage.height,
            marginLeftMm: pageMetrics.marginLeftMm,
            marginRightMm: pageMetrics.marginRightMm
          }
        }).replace(/<\//g, "<\\/");

        return this.applyPagedTemplatePlaceholders(pagedTemplate, {
          WORDEX_TITLE: title,
          WORDEX_PAGE_WIDTH: generatedPage.width,
          WORDEX_PAGE_MIN_HEIGHT: generatedPage.height,
          WORDEX_PAGE_MARGIN_LEFT: page.marginLeft || "15mm",
          WORDEX_PAGE_MARGIN_RIGHT: page.marginRight || "15mm",
          WORDEX_PAGE_AT_RULE: pageAtRule,
          WORDEX_SOURCE_HTML: documentClone.outerHTML,
          WORDEX_PAGEX_CONFIG: pagexConfig,
          WORDEX_PDF_TEMPLATE_BOOT: `<textarea id="wordex-pdf-template-store" hidden style="display:none">${this.escapeHtml(WordexEditor.loadPdfTemplate())}</textarea><script>window.WORDEX_PDF_TEMPLATE=document.getElementById("wordex-pdf-template-store").value;<\/script>`
        });
      }

      regionHasPrintableContent(region) {
        if (!region) {
          return false;
        }

        return region.querySelector(".paragraph-block, .object-block") !== null;
      }

      extractGeneratedRegionTemplateHtml(container, selector) {
        const region = container?.querySelector(selector);

        if (!this.regionHasPrintableContent(region)) {
          return "";
        }

        const html = region.outerHTML;
        region.remove();
        return html;
      }

      removeGeneratedHeaderFooterRegionsFromSource(container) {
        if (!container) return;

        container.querySelectorAll(
          ".header-template, .footer-template"
        ).forEach(node => node.remove());
      }

      getGeneratedPageAtRule(page) {
        return `@page {
  size: ${page.width} ${page.height};
  margin: ${this.getPageMarginCss(page)};
}`;
      }

      buildGeneratedDocumentClone(data) {
        const clone = this.documentElement.cloneNode(true);
        const hasReportData = data !== undefined && data !== null;

        clone.querySelectorAll(".document-title, .empty").forEach(node => node.remove());
        this.removeEditorSelectionMarks(clone);

        if (hasReportData) {
          const rootCollection = this.normalizeRootCollection(data);
          const firstRootItem = rootCollection.length > 0 ? rootCollection[0] : {};
          const rootScope = this.createDataScope(firstRootItem, "ROOT", firstRootItem, null);

          /*
            O ROOT é sempre tratado como coleção. O uso recomendado é uma única
            linha em ROOT, mas duas ou mais linhas serão processadas normalmente
            pelo mesmo forEach dos demais grupos.
          */
          this.expandTablesWithData(clone, rootCollection, null);
          this.resolveMacrosInElement(clone, [rootScope]);
          this.materializeDynamicImages(clone, [rootScope]);
        }

        this.cleanGeneratedDocumentNode(clone);
        this.markGeneratedPaginationAtoms(clone);

        return clone;
      }

      markGeneratedPaginationAtoms(container) {
        if (!container) return;

        const atomicObjectSelector = ".dynamic-image-box, .wordex-chart-box, .wordex-textbox";

        container.querySelectorAll(atomicObjectSelector).forEach(object => {
          object.classList.add("wordex-atomic-object");

          const paragraphBlock = object.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-atomic-block");
          }
        });

        container.querySelectorAll("table.wordex-table").forEach(table => {
          table.classList.add("wordex-paginable-table");

          const paragraphBlock = table.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-table-block");
          }
        });
      }

      normalizeRootCollection(data) {
        if (Array.isArray(data)) {
          return data;
        }

        if (data === undefined || data === null) {
          return [];
        }

        return [data];
      }

      removeEditorSelectionMarks(container) {
        this.clearEditorSelectionMarks(container);
      }

      cleanGeneratedDocumentNode(container) {
        if (!container) return;

        this.normalizeLegacyTableFooterRows(container);

        container.querySelectorAll("*").forEach(element => {
          element.removeAttribute("contenteditable");
          element.removeAttribute("data-row-type-label");
          element.removeAttribute("data-wordex-datasource");
          element.removeAttribute("data-wordex-enabled");
          element.removeAttribute("data-wordex-generated");
          element.classList.remove(
            ...WordexEditor.editorSelectionClasses,
            "is-empty"
          );
        });

        container.querySelectorAll("tr[data-wordex-row-type]").forEach(row => {
          delete row.dataset.wordexRowType;
          delete row.dataset.wordexDatasource;
          delete row.dataset.wordexEnabled;
          delete row.dataset.wordexDecolumnized;
          delete row.dataset.wordexOriginalColumnCount;
        });
      }

      expandTablesWithData(container, rootData, inheritedScopes = null) {
        if (!container) return;

        const rootCollection = this.normalizeRootCollection(rootData);
        const scopes = inheritedScopes || [
          this.createDataScope(rootCollection[0] || {}, "ROOT", rootCollection[0] || {}, null)
        ];

        Array.from(container.querySelectorAll("table.wordex-table")).forEach(table => {
          this.expandTableWithData(table, rootCollection, scopes);
        });
      }

      expandTableWithData(table, rootData, rootScopes) {
        if (!table || table.dataset.wordexGenerated === "1") return;

        this.normalizeLegacyTableFooterRows(table);

        const rows = Array.from(table.rows);

        if (rows.length === 0) {
          return;
        }

        const reportMap = this.buildTableReportMap(table, rows);
        const rootCollection = Array.isArray(rootData) ? rootData : this.normalizeRootCollection(rootData);
        const expandedRows = this.renderTableReportMap(reportMap, rootCollection, rootScopes);

        table.innerHTML = "";
        expandedRows.forEach(row => table.appendChild(row));
        table.dataset.wordexGenerated = "1";
      }

      buildTableReportMap(table, rows) {
        const datasource = String(table?.dataset?.wordexDatasource || "ROOT").trim() || "ROOT";
        const entries = rows.map((row, index) => this.createTableReportMapEntry(row, index));
        const rootGroup = this.createTableReportMapGroup(datasource, null, true);
        const nextIndex = this.consumeTableReportGroup(rootGroup, entries, 0);

        if (nextIndex < entries.length) {
          const extra = entries[nextIndex];
          throw new Error(
            `Estrutura da tabela inválida: linha ${extra.index + 1} apareceu depois do fechamento do grupo ROOT.`
          );
        }

        return rootGroup;
      }

      createTableReportMapEntry(row, index) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (rowType && rowType !== (row.dataset.wordexRowType || "")) {
          row.dataset.wordexRowType = rowType;
          this.updateTableRowTypeLabel(row);
        }

        return {
          kind: "row",
          row,
          index,
          rowType,
          datasource: this.getTableRowDatasource(row),
          enabled: this.isTableRowEnabled(row),
          isPhantom: false
        };
      }

      createTableReportMapGroup(datasource, headerEntry = null, isRoot = false) {
        return {
          kind: "group",
          datasource: String(datasource || (isRoot ? "ROOT" : "")).trim(),
          isRoot: !!isRoot,
          headers: headerEntry ? [headerEntry] : [],
          body: [],
          footer: null,
          phantomFooter: false
        };
      }

      consumeTableReportGroup(group, entries, startIndex) {
        let index = startIndex;
        let detailMode = false;
        let footerMode = false;

        while (index < entries.length) {
          const entry = entries[index];
          const rowType = entry.rowType;

          if (!rowType) {
            group.body.push(entry);
            index++;
            continue;
          }

          if (rowType === "ColumnHeader") {
            if (detailMode || footerMode) {
              throw new Error(
                `Estrutura da tabela inválida: ColumnHeader na linha ${entry.index + 1} apareceu depois de Detail/GroupFooter. Depois de Detail só são aceitos Detail, GroupFooter ou linha sem tipo; depois do primeiro GroupFooter só são aceitos GroupFooter ou linha sem tipo.`
              );
            }

            group.body.push(entry);
            index++;
            continue;
          }

          if (rowType === "Detail") {
            if (footerMode) {
              throw new Error(
                `Estrutura da tabela inválida: Detail na linha ${entry.index + 1} apareceu depois de GroupFooter. Depois do primeiro GroupFooter só são aceitos GroupFooter ou linha sem tipo.`
              );
            }

            group.body.push(entry);
            detailMode = true;
            index++;
            continue;
          }

          if (rowType === "GroupFooter") {
            group.footer = entry;
            return index + 1;
          }

          if (rowType === "GroupHeader") {
            if (detailMode || footerMode) {
              throw new Error(
                `Estrutura da tabela inválida: GroupHeader na linha ${entry.index + 1} apareceu depois de Detail/GroupFooter. Depois de Detail só são aceitos Detail, GroupFooter ou linha sem tipo; depois do primeiro GroupFooter só são aceitos GroupFooter ou linha sem tipo.`
              );
            }

            const datasource = String(entry.datasource || "").trim();
            const belongsToCurrentGroup = !datasource || datasource === group.datasource;

            if (belongsToCurrentGroup && group.body.length === 0) {
              group.headers.push(entry);
              index++;
              continue;
            }

            if (!datasource) {
              throw new Error(
                `Estrutura da tabela inválida: GroupHeader na linha ${entry.index + 1} precisa de datasource para abrir subgrupo.`
              );
            }

            const childGroup = this.createTableReportMapGroup(datasource, entry, false);
            index = this.consumeTableReportGroup(childGroup, entries, index + 1);
            group.body.push(childGroup);
            footerMode = true;
            continue;
          }

          throw new Error(`Tipo de linha inválido na linha ${entry.index + 1}: ${rowType}`);
        }

        group.footer = this.createPhantomGroupFooterEntry(entries.length);
        group.phantomFooter = true;
        return index;
      }

      createPhantomGroupFooterEntry(index) {
        return {
          kind: "row",
          row: null,
          index,
          rowType: "GroupFooter",
          datasource: "",
          enabled: false,
          isPhantom: true
        };
      }

      renderTableReportMap(reportMap, rootCollection, rootScopes) {
        const rootItems = this.createInitialReportItems(reportMap.datasource, rootCollection, rootScopes);
        const expandedRows = [];

        rootItems.forEach(item => {
          expandedRows.push(...this.renderReportGroup(reportMap, item));
        });

        return expandedRows;
      }

      createInitialReportItems(datasource, rootCollection, rootScopes) {
        const tableDatasource = String(datasource || "ROOT").trim() || "ROOT";
        const roots = this.normalizeRootCollection(rootCollection);
        const items = [];

        if (tableDatasource === "ROOT") {
          roots.forEach(rootItem => {
            items.push({
              value: rootItem,
              root: rootItem,
              collectionName: "ROOT"
            });
          });

          return items;
        }

        roots.forEach(rootItem => {
          this.resolveDatasourceItems(rootItem, tableDatasource, rootItem).forEach(child => {
            items.push({
              value: child.value,
              root: rootItem,
              collectionName: this.getDatasourceCollectionName(tableDatasource)
            });
          });
        });

        return items;
      }

      renderReportGroup(group, item) {
        const rows = [];
        const scope = this.createDataScope(
          item.value,
          group.datasource || item.collectionName || "ROOT",
          item.root,
          null
        );

        group.headers.forEach(entry => {
          rows.push(...this.renderReportMapRow(entry, item.value, item.root, scope, {
            ignoreDatasource: true
          }));
        });

        group.body.forEach(entry => {
          if (entry.kind === "group") {
            const childItems = this.resolveDatasourceItems(item.value, entry.datasource, item.root);

            childItems.forEach(childItem => {
              rows.push(...this.renderReportGroup(entry, {
                value: childItem.value,
                root: item.root,
                collectionName: this.getDatasourceCollectionName(entry.datasource)
              }));
            });

            return;
          }

          if (entry.rowType === "Detail") {
            rows.push(...this.renderDetailMapRow(entry, item.value, item.root));
            return;
          }

          rows.push(...this.renderReportMapRow(entry, item.value, item.root, scope));
        });

        if (group.footer) {
          rows.push(...this.renderReportMapRow(group.footer, item.value, item.root, scope, {
            ignoreDatasource: group.footer.datasource === group.datasource
          }));
        }

        return rows;
      }

      renderDetailMapRow(entry, currentValue, rootData) {
        if (!entry.enabled) return [];

        const datasource = String(entry.datasource || "").trim();

        if (!datasource) {
          const scope = this.createDataScope(currentValue, "", rootData, null);
          return [this.cloneReportMapRow(entry.row, scope, rootData)];
        }

        return this.resolveDatasourceItems(currentValue, datasource, rootData).map(item => {
          const scope = this.createDataScope(
            item.value,
            this.getDatasourceCollectionName(datasource),
            rootData,
            null
          );

          return this.cloneReportMapRow(entry.row, scope, rootData);
        });
      }

      renderReportMapRow(entry, currentValue, rootData, currentScope, options = {}) {
        if (!entry || !entry.enabled || entry.isPhantom || !entry.row) {
          return [];
        }

        const datasource = String(entry.datasource || "").trim();

        if (datasource && !options.ignoreDatasource) {
          const items = this.resolveDatasourceItems(currentValue, datasource, rootData);

          return items.map(item => {
            const scope = this.createDataScope(
              item.value,
              this.getDatasourceCollectionName(datasource),
              rootData,
              null
            );

            return this.cloneReportMapRow(entry.row, scope, rootData);
          });
        }

        return [this.cloneReportMapRow(entry.row, currentScope, rootData)];
      }

      cloneReportMapRow(row, scope, rootData) {
        const clone = row.cloneNode(true);

        this.expandTablesWithData(clone, rootData, [scope]);
        this.resolveMacrosInElement(clone, [scope]);
        this.materializeDynamicImages(clone, [scope]);

        return clone;
      }

      resolveDatasourceItems(currentValue, datasource, rootData) {
        const value = this.resolveDatasourceValue(currentValue, datasource, rootData);

        if (Array.isArray(value)) {
          return value.map(item => ({ value: item }));
        }

        if (value && typeof value === "object") {
          if (Array.isArray(value.$items)) {
            return value.$items.map(item => ({ value: item }));
          }

          if (Array.isArray(value.items)) {
            return value.items.map(item => ({ value: item }));
          }

          return [{ value }];
        }

        return [];
      }

      resolveDatasourceValue(currentValue, datasource, rootData) {
        const sourceName = String(datasource || "").trim();

        if (!sourceName || sourceName === "." || sourceName === "$item") {
          return currentValue;
        }

        if (sourceName === "ROOT" || sourceName === "$root") {
          return rootData;
        }

        const parts = sourceName
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return this.getValueByPath(currentValue, parts);
      }

      getDatasourceCollectionName(datasource) {
        const parts = String(datasource || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return parts.length > 0 ? parts[parts.length - 1] : "";
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveMacrosInElement(clone, scopes);
        this.materializeDynamicImages(clone, scopes);
        return clone;
      }

      inferGroupCollectionNameFromRows(rows, currentValue) {
        const arrays = this.getArrayProperties(currentValue);

        if (arrays.length === 0) return null;

        const groupRows = rows.filter(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
          return rowType === "GroupHeader" || rowType === "GroupFooter";
        });

        const macroPaths = groupRows.length > 0
          ? groupRows.flatMap(row => this.collectMacroPaths(row))
          : rows.flatMap(row => this.collectMacroPaths(row));

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveMacrosInElement(clone, scopes);
        this.materializeDynamicImages(clone, scopes);
        return clone;
      }

      inferGroupCollectionName(table, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = this.collectMacroPaths(table);

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferRootDetailCollectionName(detailRows, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferDetailCollectionName(detailRows, groupItem) {
        const arrays = this.getArrayProperties(groupItem);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      findCollectionNameReferencedByMacros(collections, macroPaths) {
        for (const item of collections) {
          const singular = this.singularizeCollectionName(item.name);

          if (macroPaths.some(path => path === item.name || path.startsWith(item.name + "."))) {
            return item.name;
          }

          if (singular && macroPaths.some(path => path === singular || path.startsWith(singular + "."))) {
            return item.name;
          }
        }

        return null;
      }

      getArrayProperties(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) return [];

        return Object.keys(value)
          .filter(key => Array.isArray(value[key]))
          .map(key => ({ name: key, value: value[key] }));
      }

      isTotalCollectionName(name) {
        return /^Totais/i.test(String(name || ""));
      }

      getCollectionFromValue(value, collectionName) {
        if (!value || !collectionName || !Array.isArray(value[collectionName])) {
          return [];
        }

        return value[collectionName];
      }

      collectMacroPaths(element) {
        const paths = [];
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);

        while (walker.nextNode()) {
          const text = walker.currentNode.nodeValue || "";
          const matches = text.matchAll(/{{\s*([^{}]+?)\s*}}/g);

          for (const match of matches) {
            paths.push(match[1].trim());
          }
        }

        if (element.attributes) {
          Array.from(element.attributes).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        }

        element.querySelectorAll?.("*").forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        });

        return paths;
      }

      resolveMacrosInElement(element, scopes) {
        if (!element) return;

        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
        const textNodes = [];

        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(node => {
          node.nodeValue = this.resolveMacrosInText(node.nodeValue || "", scopes);
        });

        const allElements = [element, ...Array.from(element.querySelectorAll?.("*") || [])];

        allElements.forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            if (!String(attribute.value || "").includes("{{")) return;
            child.setAttribute(attribute.name, this.resolveMacrosInText(attribute.value, scopes));
          });
        });
      }

      materializeDynamicImages(container, scopes) {
        if (!container) return;

        container.querySelectorAll(".dynamic-image-box").forEach(box => {
          this.materializeDynamicImageBox(box, scopes);
        });
      }

      materializeDynamicImageBox(box, scopes) {
        if (!box || box.dataset.wordexMaterialized === "1") return;

        const fieldName = String(box.dataset.fieldName || "").trim();
        let imageSrc = "";

        if (fieldName) {
          imageSrc = this.stringifyResolvedValue(this.resolveDataPath(fieldName, scopes)).trim();
        }

        if (!imageSrc) {
          imageSrc = String(box.textContent || "")
            .replace(/^\s*Imagem\s*/i, "")
            .trim();
        }

        if (!imageSrc) {
          box.innerHTML = "";
          box.dataset.wordexMaterialized = "1";
          return;
        }

        const img = document.createElement("img");
        img.src = imageSrc;
        img.alt = fieldName || "Imagem";
        img.draggable = false;

        box.innerHTML = "";
        box.appendChild(img);
        box.dataset.wordexMaterialized = "1";
      }

      resolveMacrosInText(text, scopes) {
        return String(text || "").replace(/{{\s*([^{}]+?)\s*}}/g, (_match, path) => {
          return this.escapeHtml(this.stringifyResolvedValue(this.resolveDataPath(path, scopes)));
        });
      }

      resolveDataPath(path, scopes) {
        const parts = String(path || "")
          .trim()
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) return "";

        for (const scope of scopes || []) {
          const value = this.getValueByPath(scope, parts);

          if (value !== undefined && value !== null) {
            return value;
          }
        }

        return "";
      }

      getValueByPath(source, parts) {
        let value = source;
        let previousPart = "";

        for (const part of parts) {
          if (value === undefined || value === null) return undefined;

          if (Array.isArray(value)) {
            if (/^\d+$/.test(part)) {
              value = value[Number(part)];
              previousPart = part;
              continue;
            }

            /*
              Coleções normais nunca são reduzidas automaticamente ao primeiro item.
              Assim, {{Produtos.Nome}} não pega o primeiro produto por acidente fora do
              contexto Detail/Produto corrente.

              A exceção deliberada são coleções de totais, como TotaisProdutos, porque
              elas representam um resumo do grupo corrente e só são usadas quando o
              template as referencia explicitamente, normalmente no GroupFooter.
            */
            if (this.isTotalCollectionName(previousPart)) {
              value = value.length > 0 ? value[0]?.[part] : undefined;
              previousPart = part;
              continue;
            }

            return undefined;
          }

          if (typeof value !== "object") {
            return undefined;
          }

          if (Object.prototype.hasOwnProperty.call(value, part)) {
            value = value[part];
            previousPart = part;
          } else {
            return undefined;
          }
        }

        return value;
      }

      stringifyResolvedValue(value) {
        if (value === undefined || value === null) return "";
        if (Array.isArray(value)) return value.map(item => this.stringifyResolvedValue(item)).join(", ");
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      }

      createDataScope(value, collectionName, rootData, parentValue, parentCollectionName = "") {
        /*
          Cada escopo representa a linha corrente de um nível do JSON.
          O nome plural da coleção e sua forma singular apontam para essa linha.

          Exemplos:
          - collectionName = "Clientes"  => Cliente.Nome é o cliente corrente.
          - collectionName = "Produtos"  => Produto.Nome é o produto corrente.

          A resolução usa uma pilha de escopos, sempre do mais interno para o mais externo.
        */
        const scope = {};

        if (value && typeof value === "object" && !Array.isArray(value)) {
          Object.assign(scope, value);
        }

        scope.$value = value;
        scope.$item = value;
        scope.$root = rootData;
        scope.$collectionName = collectionName || "";

        if (parentValue !== undefined && parentValue !== null) {
          scope.$parent = parentValue;

          if (parentCollectionName) {
            scope[parentCollectionName] = parentValue;

            const parentSingular = this.singularizeCollectionName(parentCollectionName);

            if (parentSingular && parentSingular !== parentCollectionName) {
              scope[parentSingular] = parentValue;
            }
          }
        }

        if (collectionName) {
          scope[collectionName] = value;

          const singular = this.singularizeCollectionName(collectionName);

          if (singular && singular !== collectionName) {
            scope[singular] = value;
          }
        }

        return scope;
      }

      singularizeCollectionName(name) {
        const text = String(name || "").trim();

        if (!text) return "";
        if (text.endsWith("ões")) return text.slice(0, -3) + "ão";
        if (text.endsWith("ães")) return text.slice(0, -3) + "ãe";
        if (text.endsWith("is")) return text.slice(0, -2) + "il";
        if (text.endsWith("es")) return text.slice(0, -2);
        if (text.endsWith("s")) return text.slice(0, -1);

        return text;
      }

      chooseJsonFile() {
        const input = document.getElementById("jsonFileInput");

        if (!input) {
          alert("Input de JSON não encontrado.");
          return;
        }

        input.click();
      }

      loadJsonFile(file) {
        if (!file) return;

        const reader = new FileReader();

        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result || "").replace(/^\uFEFF/, ""));
            this.reportData = data;
            this.reportDataFileName = file.name || "JSON carregado";
            alert("JSON carregado: " + this.reportDataFileName);
          } catch (error) {
            this.reportData = null;
            this.reportDataFileName = "";
            alert("Erro ao carregar JSON: " + error.message);
          }
        };

        reader.onerror = () => {
          alert("Não foi possível ler o arquivo JSON.");
        };

        reader.readAsText(file, "utf-8");
      }

      clearJsonData() {
        this.reportData = null;
        this.reportDataFileName = "";
        alert("JSON limpo.");
      }

      escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    }

    const wordex = new WordexEditor("document");
  </script>
</body>
</html>
