window.WORDEX_PDF_TEMPLATE = `<!DOCTYPE html>

  <style>

    body {

    }

    #wordex-pdf-capture-host .pagex-header,
    #wordex-pdf-capture-host .pagex-body,
    #wordex-pdf-capture-host .pagex-footer,
    #wordex-pdf-capture-host .header-template,

    .wordex-pdf-viewer embed,

    @media print {
      @page {
        size: A4;

        box-shadow: none !important;
        margin: 0 !important;
        overflow: hidden !important;
        box-sizing: border-box !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        break-after: auto !important;
        page-break-after: auto !important;
      }

      #wordex-pagex-source .pagex-page + .pagex-page,
      .pagex-page + .pagex-page {
        break-before: page !important;
        page-break-before: always !important;
      }

      #wordex-pagex-source .pagex-header,
      .pagex-header {
        grid-row: 1 !important;
        overflow: hidden !important;

        grid-row: 3 !important;
        overflow: hidden !important;

      .pagex-footer {
        grid-row: 5 !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-end !important;
        align-self: end !important;
      }

      #wordex-pagex-source .pagex-body .body-flow,
      .pagex-body .body-flow {
        min-height: 0 !important;

  </style>

</head>
<body>
  <div class="wordex-pdf-toolbar">
    <div class="wordex-pdf-toolbar-title" id="wordex-pdf-title">Relatório PDF</div>
    <div class="wordex-pdf-toolbar-actions">
      <button type="button" class="primary" id="wordex-pdf-print" disabled title="Imprimir">Imprimir</button>
      <button type="button" class="primary" id="wordex-pdf-save" disabled title="Salvar PDF">Salvar PDF</button>
      <button type="button" id="wordex-pdf-close" title="Fechar">Fechar</button>
    </div>
    <div class="wordex-pdf-status" id="wordex-pdf-status">Preparando geração do PDF...</div>
  </div>
  <div class="wordex-pdf-stage" id="wordex-pdf-stage">
    <div class="wordex-pdf-empty" id="wordex-pdf-empty">Gerando PDF a partir do relatório paginado...</div>
  </div>
  <div id="wordex-pagex-source" aria-hidden="true">@@WORDEX_PAGEX_HTML@@</div>
  <div id="wordex-pdf-capture-host" aria-hidden="true"></div>
  <script type="application/json" id="wordex-pdf-config">@@WORDEX_PDF_CONFIG@@</script>
  <script>
    (function () {
      var config = {};
      var titleNode = document.getElementById("wordex-pdf-title");
      var statusNode = document.getElementById("wordex-pdf-status");
      var stageNode = document.getElementById("wordex-pdf-stage");
      var emptyNode = document.getElementById("wordex-pdf-empty");
      var printButton = document.getElementById("wordex-pdf-print");
      var saveButton = document.getElementById("wordex-pdf-save");
      var closeButton = document.getElementById("wordex-pdf-close");

      var pdfDataUrl = "";
      var pdfBlob = null;
      var pdfFileName = "Relatorio.pdf";

      try {
        config = JSON.parse(document.getElementById("wordex-pdf-config").textContent || "{}") || {};
      } catch (error) {
        config = {};
      }

      pdfFileName = sanitizeFileName(config.fileName || "Relatorio.pdf");
      var pdfTitle = String(config.title || pdfFileName.replace(/\\.pdf$/i, "")).trim();

      if (titleNode) titleNode.textContent = pdfTitle;
      document.title = pdfTitle + " - Wordex PDF";

      function sanitizeFileName(value) {
        var name = String(value || "").trim().replace(/[\\\\/:*?"<>|]+/g, "_");
        if (!name) return "Relatorio.pdf";
        if (!/\\.pdf$/i.test(name)) name += ".pdf";
        return name;
      }

      function setStatus(message, isError) {
        if (!statusNode) return;
        statusNode.textContent = message;
        statusNode.classList.toggle("is-error", !!isError);
      }

      function waitForImagesInNode(node, timeoutMs) {
        var images = node ? Array.prototype.slice.call(node.querySelectorAll("img")) : [];
        if (images.length === 0) return Promise.resolve();
        var tasks = images.map(function (img) {
          if (img.complete) return Promise.resolve();
          return new Promise(function (resolve) {
            function done() {
              img.removeEventListener("load", done);
              img.removeEventListener("error", done);
              resolve();
            }
            img.addEventListener("load", done, { once: true });
            img.addEventListener("error", done, { once: true });
          });
        });
        return Promise.race([
          Promise.allSettled(tasks),
          new Promise(function (resolve) {
            setTimeout(resolve, timeoutMs || 8000);
          })
        ]).then(function () {});
      }

      function normalizeBlankText(text) {
        return String(text || "")
          .replace(/\\u200B/g, "")
          .replace(/\\u00A0/g, " ")
          .replace(/\\s+/g, "")
          .trim();
      }

      function pageHasVisualObject(page) {
        if (!page) return false;
        return !!page.querySelector(".pagex-body table, .pagex-body img, .pagex-body svg, .pagex-body canvas, .pagex-body .dynamic-image-box, .pagex-body .wordex-table, .pagex-body .wordex-chart-box, .pagex-body .wordex-textbox");
      }

      function isTrailingPageBlank(page) {
        if (!page) return true;
        if (pageHasVisualObject(page)) return false;
        return normalizeBlankText(page.innerText || page.textContent || "") === "";
      }

      function removeTrailingBlankPages(pages) {
        var result = Array.prototype.slice.call(pages || []);
        while (result.length > 1 && isTrailingPageBlank(result[result.length - 1])) {
          var removed = result.pop();
          if (removed && removed.parentNode) {
            removed.parentNode.removeChild(removed);
          }
        }
        return result;
      }

      function getJsPdfConstructor() {
        return window.jspdf && window.jspdf.jsPDF;
      }

      function getPageMetrics(page) {
        var rect = page.getBoundingClientRect();
        var widthPx = rect.width;
        var heightPx = rect.height;

        if (widthPx < 1 || heightPx < 1) {
          var style = window.getComputedStyle(page);
          widthPx = parseFloat(style.width) || 0;
          heightPx = parseFloat(style.height) || 0;
        }

        if (widthPx < 1 || heightPx < 1) {
          widthPx = 794;
          heightPx = 1123;
        }

        return {
          widthPt: widthPx * 0.75,
          heightPt: heightPx * 0.75,
          widthPx: widthPx,
          heightPx: heightPx
        };
      }

      function renderPdfViewer() {
        if (!pdfDataUrl) {
          if (emptyNode) emptyNode.textContent = "Não foi possível gerar o PDF.";
          if (printButton) printButton.disabled = true;
          if (saveButton) saveButton.disabled = true;
          return;
        }

        if (emptyNode) emptyNode.remove();

        var viewer = document.createElement("div");
        viewer.className = "wordex-pdf-viewer";

        var frame = document.createElement("iframe");
        frame.src = pdfDataUrl + "#toolbar=0&navpanes=0&view=FitH";
        frame.title = pdfFileName;

        viewer.appendChild(frame);
        stageNode.appendChild(viewer);

        if (printButton) printButton.disabled = false;
        if (saveButton) saveButton.disabled = false;
      }

      function printPdf() {
        var source = document.getElementById("wordex-pagex-source");
        if (!source || !source.querySelector(".pagex-page")) {
          alert("Conteúdo para impressão indisponível.");
          return;
        }

        removeTrailingBlankPages(source.querySelectorAll(".pagex-page"));
        window.print();
      }

      function savePdfFile() {
        if (!pdfDataUrl && !pdfBlob) return;

        var link = document.createElement("a");
        link.href = pdfDataUrl || URL.createObjectURL(pdfBlob);
        link.download = pdfFileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      function bindActions() {
        if (printButton) {
          printButton.addEventListener("click", printPdf);
        }

        if (saveButton) {
          saveButton.addEventListener("click", savePdfFile);
        }

        if (closeButton) {
          closeButton.addEventListener("click", function () {
            window.close();
          });
        }
      }

      function prepareCaptureClone(page, metrics) {
        var clone = page.cloneNode(true);
        clone.style.width = metrics.widthPx + "px";
        clone.style.height = metrics.heightPx + "px";
        clone.style.maxWidth = "none";
        clone.style.maxHeight = "none";
        clone.style.boxShadow = "none";
        clone.style.overflow = "hidden";

        clone.querySelectorAll(".pagex-header, .pagex-body, .pagex-footer, .header-template, .footer-template, .body-flow, .wordex-textbox").forEach(function (node) {
          node.style.overflow = "hidden";
          node.style.scrollbarWidth = "none";
        });

        return clone;
      }

      async function capturePagexPage(page, metrics) {
        var captureHost = document.getElementById("wordex-pdf-capture-host");
        if (!captureHost) {
          throw new Error("Área de captura indisponível.");
        }

        captureHost.innerHTML = "";
        var clone = prepareCaptureClone(page, metrics);
        captureHost.appendChild(clone);

        await (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve());
        await waitForImagesInNode(clone, 8000);

        var canvas = await window.html2canvas(clone, {
          scale: 2,
          width: metrics.widthPx,
          height: metrics.heightPx,
          useCORS: true,
          allowTaint: true,
          backgroundColor: "#ffffff",
          logging: false,
          scrollX: 0,
          scrollY: 0,
          onclone: function (doc) {
            var host = doc.getElementById("wordex-pdf-capture-host");
            if (!host) return;

            host.querySelectorAll("*").forEach(function (node) {
              node.style.overflow = "hidden";
              node.style.scrollbarWidth = "none";
            });
          }
        });

        captureHost.innerHTML = "";
        return canvas;
      }

      async function generatePdfFromPagexPages() {
        var source = document.getElementById("wordex-pagex-source");
        if (!source) {
          throw new Error("Conteúdo paginado indisponível.");
        }

        var pages = Array.prototype.slice.call(source.querySelectorAll(".pagex-page"));
        if (!pages.length) {
          throw new Error("Nenhuma página paginada foi encontrada.");
        }

        var originalPageCount = pages.length;
        pages = removeTrailingBlankPages(pages);
        if (pages.length < originalPageCount) {
          setStatus("Removida(s) " + (originalPageCount - pages.length) + " página(s) vazia(s) no final.");
        }

        await (document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve());
        await waitForImagesInNode(source, 10000);

        var JsPDF = getJsPdfConstructor();
        if (!JsPDF || !window.html2canvas) {
          throw new Error("jsPDF ou html2canvas indisponível.");
        }

        var firstMetrics = getPageMetrics(pages[0]);
        var pdf = new JsPDF({
          orientation: firstMetrics.widthPt > firstMetrics.heightPt ? "landscape" : "portrait",
          unit: "pt",
          format: [firstMetrics.widthPt, firstMetrics.heightPt],
          compress: true
        });

        for (var i = 0; i < pages.length; i++) {
          setStatus("Gerando PDF: página " + (i + 1) + " de " + pages.length + "...");
          var page = pages[i];
          var metrics = getPageMetrics(page);
          var canvas = await capturePagexPage(page, metrics);
          var imageData = canvas.toDataURL("image/jpeg", 0.95);

          if (i > 0) {
            pdf.addPage(
              [metrics.widthPt, metrics.heightPt],
              metrics.widthPt > metrics.heightPt ? "landscape" : "portrait"
            );
          }

          pdf.addImage(imageData, "JPEG", 0, 0, metrics.widthPt, metrics.heightPt);
        }

        pdfBlob = pdf.output("blob");
        pdfDataUrl = URL.createObjectURL(pdfBlob);
        renderPdfViewer();
        setStatus("PDF pronto.");
      }

      bindActions();

      generatePdfFromPagexPages().catch(function (error) {
        console.error("Wordex/jsPDF:", error);
        setStatus("Erro ao gerar PDF: " + error.message, true);
        if (emptyNode) emptyNode.textContent = "Erro ao gerar PDF: " + error.message;
      });
    }());
  </script>
</body>
</html>
`;
