<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordex - MVP Contínuo</title>

  <style id="wordex-editor-style">
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #d8d8d8;
      color: #222;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 8px;
      padding: 8px;
      background: #202020;
      color: white;
      border-bottom: 1px solid #111;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      padding: 6px;
      border: 1px solid #454545;
      border-radius: 8px;
      background: #2a2a2a;
    }

    .toolbar-title {
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border-right: 1px solid #555;
      color: #d5d5d5;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .toolbar button,
    .toolbar select,
    .toolbar input[type="color"],
    .toolbar input[type="text"] {
      border: 0;
      padding: 5px 8px;
      border-radius: 4px;
      background: #f2f2f2;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      min-height: 30px;
    }

    .toolbar button.primary {
      background: #e8f0ff;
      font-weight: bold;
    }

    .toolbar button.danger {
      background: #ffe9e9;
    }

    .toolbar input[type="color"] {
      width: 38px;
      height: 30px;
      padding: 2px;
    }

    .toolbar input[type="text"] {
      width: 62px;
      height: 30px;
      padding: 4px 6px;
    }

    .toolbar-label {
      align-self: center;
      font-size: 12px;
      color: #ddd;
      white-space: nowrap;
    }

    .toolbar select.small {
      max-width: 84px;
      padding-left: 6px;
      padding-right: 6px;
    }

    .toolbar button:hover,
    .toolbar select:hover,
    .toolbar input[type="color"]:hover,
    .toolbar input[type="text"]:hover {
      background: white;
    }

    .toolbar .compact {
      padding-left: 7px;
      padding-right: 7px;
      min-width: 30px;
    }

    .info {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 8px;
      background: #444;
      color: white;
      font-size: 13px;
    }

    .workspace { padding: 28px 0 50px; }

    .document {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 28px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,.35);
    }

    .document-title {
      padding: 8px 15mm;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      color: #555;
    }

    .region {
      padding: 10mm 15mm;
      outline: 2px solid transparent;
    }

    .region:hover { outline: 2px dashed #bbb; }
    .region.selected { outline: 2px solid #2277cc; }

    .header-template {
      min-height: 12mm;
      max-height: var(--wordex-header-footer-max-height, 89.1mm);
      overflow: auto;
      border-bottom: 1px dashed #ccc;
      background: #fcfcfc;
    }

    .header-template.is-empty {
      min-height: 8mm;
      padding-top: 3mm;
      padding-bottom: 3mm;
    }

    .body-flow { min-height: 220mm; }

    .footer-template {
      min-height: 12mm;
      max-height: var(--wordex-header-footer-max-height, 89.1mm);
      overflow: auto;
      border-top: 1px dashed #ccc;
      background: #fcfcfc;
    }

    .footer-template.is-empty {
      min-height: 8mm;
      padding-top: 3mm;
      padding-bottom: 3mm;
    }

    .empty {
      color: #aaa;
      font-size: 13px;
      font-style: italic;
      user-select: none;
    }

    .paragraph-block,
    .object-block {
      margin: 8px 0;
      position: relative;
      padding: 2px;
    }

    .object-block {
      display: flow-root;
      min-height: 0;
    }

    .paragraph-block.selected-block,
    .object-block.selected-block {
      outline: 1px solid #2277cc;
    }

    .paragraph {
      position: relative;
      min-height: 22px;
      line-height: 1.45;
      outline: 1px dashed #ddd;
      outline-offset: 1px;
      white-space: pre-wrap;
    }

    .paragraph:hover {
      outline-color: #aaa;
    }

    .paragraph:focus,
    .paragraph-block.selected-block .paragraph {
      outline-color: #2277cc;
    }

    .paragraph.is-empty::before {
      content: attr(data-empty-text);
      position: absolute;
      left: 0;
      top: 0;
      color: #aaa;
      font-style: italic;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .paragraph.is-empty:focus::before {
      color: #c2c2c2;
    }

    .paragraph::after {
      content: "";
      display: block;
      clear: both;
    }

    .dynamic-image-box {
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      border: 2px dashed #999;
      background: #f8f8f8;
      color: #555;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      user-select: none;
      min-width: 28mm;
      min-height: 18mm;
    }

    .dynamic-image-box strong,
    .wordex-chart-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #333;
    }

    .wordex-chart-box {
      display: flex;
      flex-direction: column;
      max-width: 100%;
      border: 2px dashed #777;
      background: #fafafa;
      color: #555;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      user-select: none;
      min-width: 40mm;
      min-height: 28mm;
      overflow: hidden;
      contain: layout paint;
      clear: both;
    }

    .wordex-chart-label {
      display: block;
      flex: 0 0 auto;
      line-height: 1.2;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .wordex-chart-label strong {
      font-size: 13px;
      margin-bottom: 2px;
    }

    .wordex-chart-preview {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }

    .wordex-chart-preview svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    table.wordex-table {
      max-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }

    .wordex-table td {
      border: 1px solid #444;
      padding: 5px;
      min-width: 12mm;
      min-height: 7mm;
      outline: none;
      vertical-align: top;
    }

    .selected-object {
      outline: 3px solid #e69500 !important;
      outline-offset: 2px;
    }

    .selected-cell {
      outline: 2px solid #2277cc !important;
      outline-offset: -2px;
    }

    [data-align="free"] {
      cursor: default;
    }

    .block-tools {
      display: none;
      position: absolute;
      right: 0;
      top: -26px;
      gap: 4px;
      background: white;
      padding: 3px;
      border: 1px solid #ccc;
      border-radius: 4px;
      z-index: 20;
      box-shadow: 0 2px 5px rgba(0,0,0,.18);
    }

    .paragraph-block.selected-block .block-tools,
    .object-block.selected-block .block-tools {
      display: flex;
    }

    .block-tools button {
      border: 0;
      background: #eee;
      cursor: pointer;
      padding: 2px 6px;
      font-size: 11px;
      border-radius: 3px;
    }

    .block-tools button:hover { background: #ddd; }

    .output {
      width: min(1000px, calc(100% - 40px));
      height: 240px;
      display: block;
      margin: 0 auto 40px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    .wordex-textbox {
      display: inline-block;
      max-width: 100%;
      min-width: 32mm;
      min-height: 16mm;
      padding: 6px;
      border: none !important;
      outline: 1px dashed #999 !important;
      outline-offset: 2px;
      box-shadow: 0 0 0 1px #999 inset !important;
      border-radius: 4px;
      background: #fff;
      color: #222;
      font-size: 12pt;
      line-height: 1.35;
      overflow: auto;
      white-space: pre-wrap;
      user-select: text;
    }

    .wordex-textbox:hover {
      outline-color: #777 !important;
      box-shadow: 0 0 0 1px #777 inset !important;
    }

    .wordex-textbox.selected-object {
      outline-color: #f0a000 !important;
      box-shadow: 0 0 0 2px #f0a000 inset !important;
    }

    .wordex-textbox:empty::before {
      content: "Textbox";
      color: #aaa;
      font-style: italic;
    }

@media print {
      body { background: white; }

      .toolbar,
      .output,
      .document-title,
      .block-tools {
        display: none !important;
      }

      .workspace { padding: 0; }

      .document {
        width: auto;
        min-height: auto;
        margin: 0;
        box-shadow: none;
      }

      .region,
      .region:hover,
      .region.selected,
      .paragraph,
      .wordex-textbox,
      .paragraph-block,
      .object-block,
      .paragraph-block.selected-block,
      .object-block.selected-block,
      .selected-object {
        outline: none !important;
        box-shadow: none !important;
      }
    }
  </style>

<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-title">Inserir</span>
      <button onclick="wordex.insertParagraph()">Parágrafo</button>
      <button onclick="wordex.insertDynamicImage()">Imagem</button>
      <button onclick="wordex.insertChart()">Gráfico</button>
      <button onclick="wordex.insertTextbox()">Textbox</button>
      <button onclick="wordex.insertTable()">Tabela</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Página</span>
      <select id="pageFormat" onchange="wordex.applyPageSettingsFromToolbar()"></select>
      <select id="pageOrientation" onchange="wordex.applyPageSettingsFromToolbar()">
        <option value="portrait">Retrato</option>
        <option value="landscape">Paisagem</option>
      </select>
      <span class="toolbar-label">Margens</span>
      <input id="marginTop" type="text" value="25mm" title="Margem superior" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginRight" type="text" value="15mm" title="Margem direita" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginBottom" type="text" value="20mm" title="Margem inferior" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginLeft" type="text" value="15mm" title="Margem esquerda" onchange="wordex.applyPageSettingsFromToolbar()" />
      <button onclick="wordex.applyPageSettingsFromToolbar()">Aplicar</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Texto</span>
      <select id="fontFamily" onchange="wordex.applyFontFamily(this.value)">
        <option value="Arial">Arial</option>
        <option value="Calibri">Calibri</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Verdana">Verdana</option>
        <option value="Georgia">Georgia</option>
      </select>

      <select id="fontSize" onchange="wordex.applyFontSize(this.value)">
        <option value="8pt">8</option>
        <option value="9pt">9</option>
        <option value="10pt">10</option>
        <option value="11pt">11</option>
        <option value="12pt" selected>12</option>
        <option value="14pt">14</option>
        <option value="16pt">16</option>
        <option value="18pt">18</option>
        <option value="24pt">24</option>
        <option value="36pt">36</option>
      </select>

      <button class="compact" onclick="wordex.toggleBold()"><b>N</b></button>
      <button class="compact" onclick="wordex.toggleItalic()"><i>I</i></button>
      <button class="compact" onclick="wordex.toggleUnderline()"><u>S</u></button>
      <button onclick="wordex.clearTextEmphasis()">Normal</button>
      <span class="toolbar-label">Cor</span>
      <input id="fontColor" type="color" value="#000000" onchange="wordex.applyTextColor(this.value)" />
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Alinhar</span>
      <button onclick="wordex.applyParagraphAlign('left')">Esq</button>
      <button onclick="wordex.applyParagraphAlign('center')">Centro</button>
      <button onclick="wordex.applyParagraphAlign('right')">Dir</button>
      <button onclick="wordex.applyParagraphAlign('justify')">Just</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Tabela</span>
      <button onclick="wordex.alignSelectedTableCell()">Célula</button>
      <button onclick="wordex.alignSelectedTableRow()">Linha</button>
      <button onclick="wordex.alignSelectedTableColumn()">Coluna</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Borda</span>
      <input id="borderColor" type="color" value="#000000" />
      <select id="borderWidth" class="small">
        <option value="0">0</option>
        <option value="1px" selected>1px</option>
        <option value="2px">2px</option>
        <option value="3px">3px</option>
        <option value="4px">4px</option>
        <option value="6px">6px</option>
      </select>
      <select id="borderStyle" class="small">
        <option value="solid" selected>solid</option>
        <option value="dashed">dashed</option>
        <option value="dotted">dotted</option>
        <option value="double">double</option>
        <option value="none">none</option>
      </select>
      <select id="borderRadius" class="small">
        <option value="0">0</option>
        <option value="2px">2px</option>
        <option value="4px" selected>4px</option>
        <option value="8px">8px</option>
        <option value="12px">12px</option>
        <option value="16px">16px</option>
      </select>

      <button onclick="wordex.applyBorderToCurrent()">Aplicar</button>
      <button onclick="wordex.applyBorderToSelectedTableCell()">Célula</button>
      <button onclick="wordex.applyBorderToSelectedTableRow()">Linha</button>
      <button onclick="wordex.applyBorderToSelectedTableColumn()">Coluna</button>
      <button onclick="wordex.applyBorderToSelectedTable()">Tabela</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Objeto</span>
      <button onclick="wordex.configureSelectedObject()">Configurar</button>
      <button onclick="wordex.resizeSelectedObjectBy(-10, 0)">Larg -</button>
      <button onclick="wordex.resizeSelectedObjectBy(10, 0)">Larg +</button>
      <button onclick="wordex.resizeSelectedObjectBy(0, -10)">Alt -</button>
      <button onclick="wordex.resizeSelectedObjectBy(0, 10)">Alt +</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Saída</span>
      <button onclick="wordex.exportHtml()">Exportar HTML</button>
      <button class="primary" onclick="wordex.previewPagedHtml()">Paginar</button>
      <button class="primary" onclick="window.print()">Imprimir fluxo</button>
    </div>

    <span id="info" class="info"></span>
  </div>

  <div class="workspace">
    <div id="document" class="document"></div>
  </div>

  <textarea id="output" class="output" placeholder="HTML exportado aparecerá aqui..."></textarea>

      constructor(documentId, outputId, infoId) {
        this.documentElement = document.getElementById(documentId);
        this.output = document.getElementById(outputId);
        this.info = document.getElementById(infoId);

        this.wordexDocument = {
          version: "1.43",
          mode: "continuous",
          description: "Documento contínuo. Conteúdo editável em HTML, com macros simples de relatório e margens automáticas para header/footer, texto padrão por seção e Enter criando novo parágrafo, Ctrl+setas movendo objetos e toolbar agrupado, gráfico isolado, Ctrl+setas sem invadir objetos e parágrafo vazio persistente e Backspace/Delete selecionando objetos adjacentes e excluindo se já selecionados, sem botão excluir objeto, botão de parágrafo apenas para header/footer e setas selecionando parágrafos vizinhos pela primeira/última linha visual e novos parágrafos usando fonte, tamanho e cor atuais da toolbar também no Enter e botão Parágrafo liberado para todas as seções, objeto Textbox, guias visuais permanentes e placeholder de parágrafo vazio fora do fluxo editável, guia permanente do textbox no editor e borda none removendo propriedades.",
          headerTemplate: [],
          bodyFlow: [],
          footerTemplate: [],
          page: {
            format: "A4",
            orientation: "portrait",
            width: "210mm",
            height: "297mm",
            marginTop: "25mm",
            marginRight: "15mm",
            marginBottom: "20mm",
            marginLeft: "15mm"
          }
        };

        this.selected = { region: "bodyFlow" };
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.savedRange = null;

        this.ensureRequiredParagraphs();

        document.addEventListener("selectionchange", () => {
          this.updateParagraphEmptyState(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        document.addEventListener("click", event => {
          if (!event.target.closest(".document") && !event.target.closest(".toolbar")) {
            this.clearSelection();
            this.renderSelection();
          }
        });

        this.documentElement.addEventListener("click", event => {
          const cell = event.target.closest("td");

          if (cell && this.documentElement.contains(cell)) {
            const table = cell.closest(".wordex-table");

            if (table) {
              this.selectObject(table);
              this.selectTableCell(cell);
              return;
            }
          }

          const object = event.target.closest(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox");

          if (object) {
            event.stopPropagation();
            this.selectObject(object);
          }
        });

        this.documentElement.addEventListener("dblclick", event => {
          const object = event.target.closest(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox");

          if (!object) return;

          /*
            Duplo-clique normal fica livre para o navegador:
            selecionar palavra/texto dentro da célula, por exemplo.

            Configuração do objeto só com Ctrl + duplo-clique.
          */
          if (!event.ctrlKey) {
            return;
          }

          event.preventDefault();
          event.stopPropagation();
          this.selectObject(object);
          this.configureSelectedObject();
        });

        document.addEventListener("keydown", event => {
          if (this.handleInlineObjectDelete(event)) {
            return;
          }

          if (this.handleEmptyParagraphDelete(event)) {
            return;
          }

          if (this.handleParagraphEnter(event)) {
            return;
          }

          if (this.handleParagraphBoundaryArrow(event)) {
            return;
          }

          this.handleFreeObjectKeyboard(event);
        });

        this.documentElement.addEventListener("input", event => {
          const paragraph = event.target.closest(".paragraph");
          const table = event.target.closest(".wordex-table");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          if (table) {
            this.syncStandaloneObjectFromDom(table);
          }
        });

        this.initializePageControls();
        this.applyPageSettingsToEditor();
        this.render();
      }

      initializePageControls() {
        const select = document.getElementById("pageFormat");
        if (!select) return;

        select.innerHTML = "";

        WordexEditor.paperFormatList.forEach(format => {
          const option = document.createElement("option");
          option.value = format.value;
          option.textContent = format.text;

          if (format.selected) {
            option.selected = true;
          }

          select.appendChild(option);
        });

        this.syncPageControlsFromDocument();
      }

      getPageSettings() {
        if (!this.wordexDocument.page) {
          this.wordexDocument.page = {
            format: "A4",
            orientation: "portrait",
            width: "210mm",
            height: "297mm",
            marginTop: "25mm",
            marginRight: "15mm",
            marginBottom: "20mm",
            marginLeft: "15mm"
          };
        }

        return this.wordexDocument.page;
      }

      getPaperFormat(formatValue) {
        return WordexEditor.paperFormatList.find(item => item.value === formatValue)
          || WordexEditor.paperFormatList.find(item => item.value === "A4");
      }

      syncPageControlsFromDocument() {
        const page = this.getPageSettings();

        const pageFormat = document.getElementById("pageFormat");
        const pageOrientation = document.getElementById("pageOrientation");
        const marginTop = document.getElementById("marginTop");
        const marginRight = document.getElementById("marginRight");
        const marginBottom = document.getElementById("marginBottom");
        const marginLeft = document.getElementById("marginLeft");

        if (pageFormat) pageFormat.value = page.format || "A4";
        if (pageOrientation) pageOrientation.value = page.orientation || "portrait";
        if (marginTop) marginTop.value = page.marginTop || "25mm";
        if (marginRight) marginRight.value = page.marginRight || "15mm";
        if (marginBottom) marginBottom.value = page.marginBottom || "20mm";
        if (marginLeft) marginLeft.value = page.marginLeft || "15mm";
      }

      applyPageSettingsFromToolbar() {
        const formatValue = document.getElementById("pageFormat")?.value || "A4";
        const orientation = document.getElementById("pageOrientation")?.value || "portrait";
        const format = this.getPaperFormat(formatValue);

        const page = this.getPageSettings();

        page.format = format.value;
        page.orientation = orientation;
        page.width = orientation === "landscape" ? format.height : format.width;
        page.height = orientation === "landscape" ? format.width : format.height;
        page.marginTop = this.normalizeCssSize(document.getElementById("marginTop")?.value || "25mm", "25mm");
        page.marginRight = this.normalizeCssSize(document.getElementById("marginRight")?.value || "15mm", "15mm");
        page.marginBottom = this.normalizeCssSize(document.getElementById("marginBottom")?.value || "20mm", "20mm");
        page.marginLeft = this.normalizeCssSize(document.getElementById("marginLeft")?.value || "15mm", "15mm");

        this.applyPageSettingsToEditor();
        this.updateInfo();
      }

      normalizeCssSize(value, fallback) {
        const text = String(value || "").trim();

        if (/^-?\d+(\.\d+)?(mm|cm|px|pt|in)$/.test(text)) {
          return text;
        }

        if (/^-?\d+(\.\d+)?$/.test(text)) {
          return text + "mm";
        }

        return fallback;
      }

      applyPageSettingsToEditor() {
        const page = this.getPageSettings();

        if (!this.documentElement) return;

        this.documentElement.style.width = page.width;
        this.documentElement.style.minHeight = page.height;

        const headerMax = this.getThirtyPercentOfCssSize(page.height);
        this.documentElement.style.setProperty("--wordex-header-footer-max-height", headerMax);
      }

      getThirtyPercentOfCssSize(cssSize) {
        const match = String(cssSize || "").trim().match(/^(\d+(?:\.\d+)?)(mm|cm|px|pt|in)$/);

        if (!match) return "89.1mm";

        return (Number(match[1]) * 0.30).toFixed(2).replace(/\.?0+$/, "") + match[2];
      }

      getPageSizeCss() {
        const page = this.getPageSettings();
        return `${page.width} ${page.height}`;
      }

      getCssPixelsToMillimeters(px) {
        return px / 3.7795275591;
      }

      parseCssSizeToMillimeters(value) {
        const text = String(value || "").trim();
        const match = text.match(/^(\d+(?:\.\d+)?)(mm|cm|px|pt|in)$/);

        if (!match) return 0;

        const number = Number(match[1]);
        const unit = match[2];

        if (unit === "mm") return number;
        if (unit === "cm") return number * 10;
        if (unit === "px") return this.getCssPixelsToMillimeters(number);
        if (unit === "pt") return number * 0.3527777778;
        if (unit === "in") return number * 25.4;

        return 0;
      }

      formatMillimeters(value) {
        return Math.max(0, value).toFixed(2).replace(/\.?0+$/, "") + "mm";
      }

      calculateRegionContentMargin(regionClass, minimumMm) {
        const region = this.documentElement?.querySelector(`.${regionClass}`);

        if (!region) {
          return minimumMm;
        }

        const blocks = Array.from(
          region.querySelectorAll(":scope > .paragraph-block, :scope > .object-block")
        );

        if (blocks.length === 0) {
          return minimumMm;
        }

        const regionRect = region.getBoundingClientRect();

        let top = Number.POSITIVE_INFINITY;
        let bottom = Number.NEGATIVE_INFINITY;

        blocks.forEach(block => {
          const rect = block.getBoundingClientRect();

          if (rect.width <= 0 && rect.height <= 0) return;

          top = Math.min(top, rect.top - regionRect.top);
          bottom = Math.max(bottom, rect.bottom - regionRect.top);
        });

        if (!Number.isFinite(top) || !Number.isFinite(bottom)) {
          return minimumMm;
        }

        /*
          Altura real do conteúdo + folga.
          Não usa a altura visual da região, porque ela pode ter espaço vazio
          apenas para facilitar a edição.
        */
        return Math.max(minimumMm, this.getCssPixelsToMillimeters(bottom - top) + 6);
      }

      updateHeaderFooterMarginsFromEditor() {
        const page = this.getPageSettings();

        const pageHeightMm = this.parseCssSizeToMillimeters(page.height);
        const maxMarginMm = pageHeightMm > 0 ? pageHeightMm * 0.30 : 89.1;

        const headerMm = Math.min(
          this.calculateRegionContentMargin("header-template", 12),
          maxMarginMm
        );

        const footerMm = Math.min(
          this.calculateRegionContentMargin("footer-template", 12),
          maxMarginMm
        );

        page.marginTop = this.formatMillimeters(headerMm);
        page.marginBottom = this.formatMillimeters(footerMm);

        const marginTop = document.getElementById("marginTop");
        const marginBottom = document.getElementById("marginBottom");

        if (marginTop) marginTop.value = page.marginTop;
        if (marginBottom) marginBottom.value = page.marginBottom;
      }

      getPageMarginCss() {
        const page = this.getPageSettings();
        return `${page.marginTop} ${page.marginRight} ${page.marginBottom} ${page.marginLeft}`;
      }

      createId(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 10);
      }

      ensureRequiredParagraphs() {
        /*
          O body sempre terá pelo menos um parágrafo editável.
          Header/footer continuam opcionais: quando vazios, mostram o aviso
          da própria região.
        */
        if (!Array.isArray(this.wordexDocument.bodyFlow)) {
          this.wordexDocument.bodyFlow = [];
        }

        if (this.wordexDocument.bodyFlow.length === 0) {
          this.wordexDocument.bodyFlow.push(this.createParagraph(""));
        }
      }

      isParagraphHtmlEmpty(html) {
        const source = String(html || "");

        /*
          Objeto dentro do parágrafo conta como conteúdo.
        */
        if (
          source.includes("dynamic-image-box") ||
          source.includes("wordex-table") ||
          source.includes("wordex-chart-box") ||
          source.includes("wordex-textbox")
        ) {
          return false;
        }

        /*
          Quebra de linha inserida pelo usuário é conteúdo estrutural.
          Portanto, parágrafo com <br> não deve mostrar "Parágrafo vazio".
        */
        if (/<br\s*\/?>/i.test(source)) {
          return false;
        }

        /*
          Blocos vazios criados pelo contenteditable também representam
          linhas em branco e não devem ser tratados como parágrafo inexistente.
        */
        if (/<(div|p)[^>]*>\s*(?:&nbsp;|&#160;|\u200B|\s)*<\/\1>/i.test(source)) {
          return false;
        }

        const text = source
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      updateParagraphEmptyState(paragraphElement) {
        if (!paragraphElement) return;

        const html = this.getCleanInnerHtml(paragraphElement);
        let isEmpty = this.isParagraphHtmlEmpty(html);

        /*
          Se o usuário inseriu quebras/linhas em branco, alguns navegadores
          podem normalizar o HTML de formas diferentes. Então usamos também
          a altura visual: se o parágrafo ficou maior que uma linha, ele já
          não deve exibir "Parágrafo vazio".
        */
        if (isEmpty && this.hasParagraphVisualContent(paragraphElement)) {
          isEmpty = false;
        }

        paragraphElement.classList.toggle("is-empty", isEmpty);
        paragraphElement.dataset.emptyText = "Parágrafo vazio";
      }

      hasParagraphVisualContent(paragraphElement) {
        if (!paragraphElement) return false;

        if (
          paragraphElement.querySelector(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox")
        ) {
          return true;
        }

        const style = window.getComputedStyle(paragraphElement);
        const lineHeight = Number.parseFloat(style.lineHeight) ||
          Number.parseFloat(style.fontSize) * 1.45 ||
          22;

        /*
          Tolerância pequena para não classificar um parágrafo normal vazio
          como preenchido por causa de borda/outline/subpixel.
        */
        return paragraphElement.scrollHeight > lineHeight + 6;
      }

      getDefaultParagraphTextForCurrentRegion() {
        if (this.selected.region === "headerTemplate") {
          return "Novo parágrafo header";
        }

        if (this.selected.region === "footerTemplate") {
          return "Novo parágrafo footer";
        }

        return "Novo parágrafo body";
      }

      getCurrentParagraphStyleFromToolbar() {
        return {
          fontFamily: document.getElementById("fontFamily")?.value || "Arial",
          fontSize: document.getElementById("fontSize")?.value || "12pt",
          color: document.getElementById("fontColor")?.value || "#000000"
        };
      }

      createParagraph(html = "Novo parágrafo body", style = null) {
        return {
          id: this.createId("paragraph"),
          type: "paragraph",
          html,
          style: {
            fontFamily: "Arial",
            fontSize: "12pt",
            color: "#000000",
            textAlign: "left",
            ...this.getCurrentParagraphStyleFromToolbar(),
            ...(style || {})
          }
        };
      }

      createTableHtml(rows, cols, align, width) {
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.align = align;
        table.style.width = width;

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement("tr");

          for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
        }

        this.applyAlignment(table, align);
        return table.outerHTML;
      }

      clearSelection() {
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.savedRange = null;
      }

      getSelectedBlocks() {
        return this.wordexDocument[this.selected.region];
      }

      findBlockById(blockId) {
        return this.getSelectedBlocks().find(block => block.id === blockId) || null;
      }

      getSelectedParagraphElement() {
        if (!this.selectedParagraphId) return null;

        return this.documentElement.querySelector(
          `.paragraph[data-block-id="${this.selectedParagraphId}"]`
        );
      }

      getSelectedParagraphBlock() {
        if (!this.selectedParagraphId) return null;
        return this.findBlockById(this.selectedParagraphId);
      }

      selectRegion(region) {
        this.selected.region = region;
        this.clearSelection();
        this.renderSelection();
        this.updateInfo();
      }

      selectParagraph(region, blockId) {
        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.selectedObject = null;
        this.renderSelection();
        this.updateInfo();
      }

      selectObject(object) {
        const paragraph = object.closest(".paragraph");
        const block = object.closest(".paragraph-block, .object-block");
        const region = object.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.selectedObject = object;

        if (!object.matches(".wordex-table")) {
          this.selectedCell = null;
        }

        this.renderSelection();
        this.updateInfo();
      }

      insertHeaderFooterParagraph() {
        this.insertParagraph();
      }

      insertParagraph() {
        const paragraph = this.createParagraph(
          this.getDefaultParagraphTextForCurrentRegion()
        );
        this.getSelectedBlocks().push(paragraph);
        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedObject = null;
        this.render();

        const element = this.getSelectedParagraphElement();

        if (element) {
          element.focus();
          this.placeCaretAtEnd(element);
          this.saveSelectionIfInsideParagraph();
        }
      }

      hasActiveParagraphCursor() {
        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph || !this.savedRange) return false;

        return paragraph.contains(this.savedRange.commonAncestorContainer);
      }

      ensureParagraphForInsertion() {
        if (this.hasActiveParagraphCursor()) {
          return this.getSelectedParagraphElement();
        }

        const paragraph = this.createParagraph("");
        this.getSelectedBlocks().push(paragraph);

        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedObject = null;

        this.render();

        const paragraphElement = this.getSelectedParagraphElement();

        if (paragraphElement) {
          paragraphElement.focus();
          this.placeCaretAtEnd(paragraphElement);
          this.saveSelectionIfInsideParagraph();
        }

        return paragraphElement;
      }

      insertDynamicImage() {
        const fieldName = prompt("Nome da imagem:", "Imagem");
        if (!fieldName) return;

        const align = this.askAlignment("left");
        if (!align) return;

        const width = prompt("Largura:", "80mm");
        if (!width) return;

        const height = prompt("Altura:", "45mm");
        if (!height) return;

        const paragraphElement = this.ensureParagraphForInsertion();
        if (!paragraphElement) return;

        const imageBox = this.createDynamicImageElement(fieldName, align, width, height);

        this.insertNodeInsideCurrentParagraph(imageBox);
        this.selectedObject = null;
        this.renderSelection();
        this.updateInfo();
      }

      insertChart() {
        const sourceName = prompt("Nome lógico/fonte de dados do gráfico:", "VendasPorMes");
        if (!sourceName) return;

        const chartType = this.askChartType("bar");
        if (!chartType) return;

        const align = this.askAlignment("left");
        if (!align) return;

        const width = prompt("Largura:", "100mm");
        if (!width) return;

        const height = prompt("Altura:", "60mm");
        if (!height) return;

        const paragraphElement = this.ensureParagraphForInsertion();
        if (!paragraphElement) return;

        const chartBox = this.createChartElement(sourceName, chartType, align, width, height);

        this.insertNodeInsideCurrentParagraph(chartBox);
        this.selectedObject = null;
        this.renderSelection();
        this.updateInfo();
      }

      insertTextbox() {
        const text = prompt("Texto inicial:", "Textbox");
        if (text === null) return;

        const align = this.askAlignment("left");
        if (!align) return;

        const width = prompt("Largura:", "80mm");
        if (!width) return;

        const height = prompt("Altura:", "30mm");
        if (!height) return;

        const paragraphElement = this.ensureParagraphForInsertion();
        if (!paragraphElement) return;

        const textbox = this.createTextboxElement(text, align, width, height);

        this.insertNodeInsideCurrentParagraph(textbox);
        this.selectedObject = null;
        this.renderSelection();
        this.updateInfo();
      }

      askChartType(defaultValue) {
        const value = prompt("Tipo do gráfico: bar, line, pie ou doughnut", defaultValue);

        if (!value) return null;

        const chartType = value.trim().toLowerCase();

        if (!["bar", "line", "pie", "doughnut"].includes(chartType)) {
          alert("Tipo inválido. Use bar, line, pie ou doughnut.");
          return null;
        }

        return chartType;
      }

      insertTable() {
        const rows = Number(prompt("Quantidade de linhas:", "3"));
        const cols = Number(prompt("Quantidade de colunas:", "3"));

        if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1) {
          alert("Informe uma quantidade válida de linhas e colunas.");
          return;
        }

        const align = this.askAlignment("left");
        if (!align) return;

        const width = prompt("Largura da tabela:", "80mm");
        if (!width) return;

        const paragraphElement = this.ensureParagraphForInsertion();
        if (!paragraphElement) return;

        const table = this.createTableElement(rows, cols, align, width);

        this.insertNodeInsideCurrentParagraph(table);
        this.selectedObject = null;
        this.renderSelection();
        this.updateInfo();
      }

      createDynamicImageElement(fieldName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = fieldName;
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;

        imageBox.innerHTML =
          "<span><strong>Imagem</strong>{{" +
          this.escapeHtml(fieldName) +
          "}}</span>";

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      createChartElement(sourceName, chartType, align, width, height) {
        const chartBox = document.createElement("div");
        chartBox.className = "wordex-chart-box";
        chartBox.contentEditable = "false";
        chartBox.dataset.wordexType = "chart";
        chartBox.dataset.sourceName = sourceName;
        chartBox.dataset.chartType = chartType;
        chartBox.dataset.align = align;
        chartBox.style.width = width;
        chartBox.style.height = height;

        chartBox.innerHTML = this.generateChartPlaceholderHtml(sourceName, chartType);

        this.applyAlignment(chartBox, align);
        return chartBox;
      }

      createTextboxElement(text, align, width, height) {
        const textbox = document.createElement("div");
        textbox.className = "wordex-textbox";
        textbox.contentEditable = "true";
        textbox.dataset.wordexType = "textbox";
        textbox.dataset.align = align;
        textbox.style.width = width;
        textbox.style.height = height;
        textbox.innerHTML = this.escapeHtml(text || "");

        this.applyAlignment(textbox, align);
        return textbox;
      }

      generateChartPlaceholderHtml(sourceName, chartType) {
        return `
          <span class="wordex-chart-label">
            <strong>Gráfico dinâmico</strong>
            {{${this.escapeHtml(sourceName)}}} / ${this.escapeHtml(chartType)}
          </span>
          <span class="wordex-chart-preview">
            ${this.generateChartSvg(chartType)}
          </span>
        `;
      }

      generateChartSvg(chartType) {
        if (chartType === "line") {
          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              <polyline points="14,82 48,52 84,66 120,24 156,42 192,12 208,22"
                fill="none" stroke="#555" stroke-width="4" />
              <line x1="14" y1="90" x2="208" y2="90" stroke="#bbb" stroke-width="1" />
              <line x1="14" y1="8" x2="14" y2="90" stroke="#bbb" stroke-width="1" />
            </svg>
          `;
        }

        if (chartType === "pie" || chartType === "doughnut") {
          const hole = chartType === "doughnut"
            ? '<circle cx="110" cy="50" r="22" fill="#fafafa"></circle>'
            : "";

          return `
            <svg viewBox="0 0 220 100">
              <circle cx="110" cy="50" r="42" fill="#ddd"></circle>
              <path d="M110 50 L110 8 A42 42 0 0 1 150 63 Z" fill="#aaa"></path>
              <path d="M110 50 L150 63 A42 42 0 0 1 78 78 Z" fill="#c8c8c8"></path>
              ${hole}
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="none">
            <rect x="24" y="28" width="26" height="62" fill="#bbb"></rect>
            <rect x="62" y="12" width="26" height="78" fill="#999"></rect>
            <rect x="100" y="48" width="26" height="42" fill="#ccc"></rect>
            <rect x="138" y="6" width="26" height="84" fill="#888"></rect>
            <rect x="176" y="24" width="26" height="66" fill="#aaa"></rect>
            <line x1="14" y1="90" x2="208" y2="90" stroke="#777" stroke-width="1"></line>
            <line x1="14" y1="8" x2="14" y2="90" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      createTableElement(rows, cols, align, width) {
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.align = align;
        table.style.width = width;

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement("tr");

          for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
        }

        this.applyAlignment(table, align);
        return table;
      }

      askAlignment(defaultValue) {
        const value = prompt("Alinhamento: left, right, center ou free", defaultValue);
        if (!value) return null;

        const align = value.trim().toLowerCase();

        if (!["left", "right", "center", "free"].includes(align)) {
          alert("Alinhamento inválido. Use left, right, center ou free.");
          return null;
        }

        return align;
      }

      applyAlignment(element, align) {
        element.dataset.align = align;

        element.style.float = "";
        element.style.display = "";
        element.style.margin = "";
        element.style.verticalAlign = "";
        element.style.position = "";

        const isTable = element.matches("table");
        const isChart = element.matches(".wordex-chart-box");
        const isTextbox = element.matches(".wordex-textbox");

        if (align === "left") {
          element.style.float = "left";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 10px 8px 0";
          return;
        }

        if (align === "right") {
          element.style.float = "right";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 0 8px 10px";
          return;
        }

        if (align === "center") {
          element.style.float = "none";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "8px auto";
          return;
        }

        if (align === "free") {
          element.style.float = "none";
          element.style.display = isTable ? "inline-table" : (isChart ? "flex" : (isTextbox ? "inline-block" : "inline-flex"));
          element.style.verticalAlign = "middle";
          element.style.margin = "4px";
        }
      }

      insertNodeInsideCurrentParagraph(node) {
        const paragraphElement = this.getSelectedParagraphElement();

        if (!paragraphElement) return;

        paragraphElement.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro do parágrafo, o novo objeto
          deve ser inserido DEPOIS dele, nunca dentro dele.
          Isso evita tabela/imagem/gráfico invadindo o gráfico anterior.
        */
        if (this.selectedObject && paragraphElement.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (this.savedRange && paragraphElement.contains(this.savedRange.commonAncestorContainer)) {
          range = this.savedRange.cloneRange();

          /*
            Se a seleção salva estiver dentro de um objeto, sobe para fora dele.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox");

          if (objectInSelection && paragraphElement.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(paragraphElement);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");

        range.insertNode(anchor);
        range.insertNode(node);

        /*
          Mantém um ponto de edição depois do objeto, fora da caixa.
          Isso evita que o próximo objeto seja inserido dentro do gráfico/imagem.
        */
        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToParagraph(node);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.selectedObject = null;
        this.savedRange = caretRange.cloneRange();

        this.syncParagraphElement(paragraphElement);
        this.renderSelection();
        this.updateInfo();
      }

      getMaxObjectWidthInParagraph(object, paragraph) {
        if (!object || !paragraph) return 40;

        const paragraphWidth = paragraph.clientWidth;

        const computed = window.getComputedStyle(object);
        const marginLeft = parseFloat(computed.marginLeft || "0") || 0;
        const marginRight = parseFloat(computed.marginRight || "0") || 0;

        /*
          A largura do objeto deve caber dentro da área útil do parágrafo,
          descontando margens horizontais do próprio objeto.
        */
        return Math.max(40, Math.floor(paragraphWidth - marginLeft - marginRight - 4));
      }

      limitObjectWidthToParagraph(object) {
        if (!object) return;

        if (!object.matches(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox")) return;

        const paragraph = object.closest(".paragraph");

        if (!paragraph) return;

        /*
          Precisa estar no DOM para getBoundingClientRect refletir o layout real.
        */
        const maxWidth = this.getMaxObjectWidthInParagraph(object, paragraph);
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      resizeSelectedObjectBy(deltaWidth, deltaHeight) {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        const object = this.selectedObject;
        const rect = object.getBoundingClientRect();

        const objectBlock = object.closest(".object-block");

        let newWidth = Math.max(40, Math.round(rect.width + deltaWidth));
        let newHeight = Math.max(24, Math.round(rect.height + deltaHeight));

        /*
          Se o objeto estiver fora de parágrafo, respeita o limite da área útil.
        */
        if (objectBlock) {
          const wrapperWidth = objectBlock.clientWidth;
          const currentX = Number(object.dataset.blockX || "0") || 0;
          const maxWidth = Math.max(40, wrapperWidth - currentX - 4);
          newWidth = Math.min(newWidth, maxWidth);
        }

        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          newWidth = Math.min(newWidth, this.getMaxObjectWidthInParagraph(object, paragraph));
        }

        object.style.width = newWidth + "px";

        if (object.matches(".dynamic-image-box, .wordex-chart-box, .wordex-textbox")) {
          object.style.height = newHeight + "px";
        } else if (object.matches(".wordex-table")) {
          this.resizeTableRowsByTotalHeight(object, newHeight);
        }

        this.syncObjectAfterChange(object);
        this.keepObjectSelected(object);
      }

      resizeSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        const object = this.selectedObject;
        const rect = object.getBoundingClientRect();

        const width = prompt("Largura:", Math.round(rect.width) + "px");
        if (!width) return;

        const height = prompt("Altura:", Math.round(rect.height) + "px");
        if (!height) return;

        object.style.width = width;
        this.limitObjectWidthToParagraph(object);

        if (object.matches(".dynamic-image-box, .wordex-chart-box, .wordex-textbox")) {
          object.style.height = height;
        } else if (object.matches(".wordex-table")) {
          this.resizeTableRowsByTotalHeight(object, this.parseCssSizeToPixels(height, object));
        }

        this.syncObjectAfterChange(object);
        this.keepObjectSelected(object);
      }

      parseCssSizeToPixels(value, referenceElement) {
        const text = String(value || "").trim();

        if (text.endsWith("px")) {
          return Number(text.replace("px", "")) || 0;
        }

        if (text.endsWith("mm")) {
          return (Number(text.replace("mm", "")) || 0) * 3.7795275591;
        }

        if (text.endsWith("cm")) {
          return (Number(text.replace("cm", "")) || 0) * 37.795275591;
        }

        if (text.endsWith("pt")) {
          return (Number(text.replace("pt", "")) || 0) * 1.3333333333;
        }

        const number = Number(text);
        if (Number.isFinite(number)) return number;

        return referenceElement?.getBoundingClientRect().height || 0;
      }

      configureSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        if (this.selectedObject.matches(".dynamic-image-box")) {
          this.configureImage(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-chart-box")) {
          this.configureChart(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-textbox")) {
          this.configureTextbox(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-table")) {
          this.configureTable(this.selectedObject);
        }
      }

      configureImage(imageBox) {
        const fieldName = prompt("Nome da imagem:", imageBox.dataset.fieldName || "Imagem");
        if (!fieldName) return;

        const align = this.askAlignment(imageBox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", imageBox.style.width || "80mm");
        if (!width) return;

        const height = prompt("Altura:", imageBox.style.height || "45mm");
        if (!height) return;

        imageBox.dataset.fieldName = fieldName;
        imageBox.style.width = width;
        imageBox.style.height = height;
        imageBox.innerHTML =
          "<span><strong>Imagem</strong>{{" +
          this.escapeHtml(fieldName) +
          "}}</span>";

        this.applyAlignment(imageBox, align);
        this.limitObjectWidthToParagraph(imageBox);
        this.syncObjectAfterChange(imageBox);
        this.selectObject(imageBox);
      }

      configureChart(chartBox) {
        const sourceName = prompt("Nome lógico/fonte de dados do gráfico:", chartBox.dataset.sourceName || "VendasPorMes");
        if (!sourceName) return;

        const chartType = this.askChartType(chartBox.dataset.chartType || "bar");
        if (!chartType) return;

        const align = this.askAlignment(chartBox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", chartBox.style.width || "100mm");
        if (!width) return;

        const height = prompt("Altura:", chartBox.style.height || "60mm");
        if (!height) return;

        chartBox.dataset.sourceName = sourceName;
        chartBox.dataset.chartType = chartType;
        chartBox.style.width = width;
        chartBox.style.height = height;
        chartBox.innerHTML = this.generateChartPlaceholderHtml(sourceName, chartType);

        this.applyAlignment(chartBox, align);
        this.limitObjectWidthToParagraph(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
      }

      configureTextbox(textbox) {
        const align = this.askAlignment(textbox.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura:", textbox.style.width || "80mm");
        if (!width) return;

        const height = prompt("Altura:", textbox.style.height || "30mm");
        if (!height) return;

        textbox.style.width = width;
        textbox.style.height = height;

        this.applyAlignment(textbox, align);
        this.limitObjectWidthToParagraph(textbox);
        this.syncObjectAfterChange(textbox);
        this.selectObject(textbox);
      }

      configureTable(table) {
        const align = this.askAlignment(table.dataset.align || "left");
        if (!align) return;

        const width = prompt("Largura da tabela:", table.style.width || "80mm");
        if (!width) return;

        const currentRows = table.rows.length;
        const currentCols = this.getTableColumnCount(table);

        const rows = Number(prompt("Quantidade de linhas:", String(currentRows)));
        const cols = Number(prompt("Quantidade de colunas:", String(currentCols)));

        if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1) {
          alert("Informe uma quantidade válida de linhas e colunas.");
          return;
        }

        this.resizeTableStructure(table, rows, cols);

        const defaultColWidths = this.getColumnWidths(table).join(", ");
        const colWidths = prompt(
          "Larguras das colunas, separadas por vírgula. Deixe vazio para não alterar.",
          defaultColWidths
        );

        if (colWidths !== null && colWidths.trim() !== "") {
          this.applyColumnWidths(table, colWidths);
        }

        const defaultRowHeights = this.getRowHeights(table).join(", ");
        const rowHeights = prompt(
          "Alturas das linhas, separadas por vírgula. Deixe vazio para não alterar.",
          defaultRowHeights
        );

        if (rowHeights !== null && rowHeights.trim() !== "") {
          this.applyRowHeights(table, rowHeights);
        }

        table.style.width = width;
        this.applyAlignment(table, align);
        this.limitObjectWidthToParagraph(table);
        this.syncObjectAfterChange(table);
        this.selectObject(table);
      }

      getTableColumnCount(table) {
        let count = 0;
        Array.from(table.rows).forEach(row => {
          count = Math.max(count, row.cells.length);
        });
        return count;
      }

      resizeTableStructure(table, rows, cols) {
        while (table.rows.length < rows) {
          table.appendChild(document.createElement("tr"));
        }

        while (table.rows.length > rows) {
          table.deleteRow(table.rows.length - 1);
        }

        Array.from(table.rows).forEach(row => {
          while (row.cells.length < cols) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            row.appendChild(td);
          }

          while (row.cells.length > cols) {
            row.deleteCell(row.cells.length - 1);
          }
        });
      }

      getColumnWidths(table) {
        const firstRow = table.rows[0];
        if (!firstRow) return [];
        return Array.from(firstRow.cells).map(cell => cell.style.width || "");
      }

      getRowHeights(table) {
        return Array.from(table.rows).map(row => row.style.height || row.cells[0]?.style.height || "");
      }

      applyColumnWidths(table, csv) {
        const widths = csv.split(",").map(value => value.trim());
        Array.from(table.rows).forEach(row => {
          Array.from(row.cells).forEach((cell, index) => {
            if (widths[index]) cell.style.width = widths[index];
          });
        });
      }

      applyRowHeights(table, csv) {
        const heights = csv.split(",").map(value => value.trim());
        Array.from(table.rows).forEach((row, index) => {
          if (heights[index]) {
            row.style.height = heights[index];
            Array.from(row.cells).forEach(cell => {
              cell.style.height = heights[index];
            });
          }
        });
      }

      applyFontFamily(fontFamily) {
        this.applyFormatting({
          fontFamily
        });
      }

      applyFontSize(fontSize) {
        this.applyFormatting({
          fontSize
        });
      }

      applyTextColor(color) {
        this.applyFormatting({
          color
        });
      }

      toggleBold() {
        this.applyFormatting({
          fontWeight: "bold"
        });
      }

      removeBold() {
        this.applyFormatting({
          fontWeight: "normal"
        });
      }

      toggleItalic() {
        this.applyFormatting({
          fontStyle: "italic"
        });
      }

      removeItalic() {
        this.applyFormatting({
          fontStyle: "normal"
        });
      }

      toggleUnderline() {
        this.applyFormatting({
          textDecoration: "underline"
        });
      }

      removeUnderline() {
        this.applyFormatting({
          textDecoration: "none"
        });
      }

      clearTextEmphasis() {
        this.applyFormatting({
          fontWeight: "normal",
          fontStyle: "normal",
          textDecoration: "none"
        });
      }

      getBorderSettings() {
        const color = document.getElementById("borderColor")?.value || "#000000";
        const width = document.getElementById("borderWidth")?.value || "1px";
        const style = document.getElementById("borderStyle")?.value || "solid";
        const radius = document.getElementById("borderRadius")?.value || "0";

        return {
          color,
          width,
          style,
          radius
        };
      }

      applyBorderStyle(element, settings = this.getBorderSettings()) {
        if (!element) return;

        /*
          Estilo none ou espessura 0 não aplica "border: none".
          Remove de fato as propriedades de borda do elemento.
        */
        if (settings.width === "0" || settings.style === "none") {
          this.clearBorderStyle(element);
          return;
        }

        element.style.border = `${settings.width} ${settings.style} ${settings.color}`;
        element.style.borderRadius = settings.radius;

        /*
          Border-radius em tabela só funciona de forma decente com separate.
        */
        if (element.matches("table")) {
          element.style.borderCollapse = "separate";
          element.style.borderSpacing = "0";
          element.style.overflow = "hidden";
        }
      }

      clearBorderStyle(element) {
        if (!element) return;

        element.style.border = "";
        element.style.borderRadius = "";

        if (element.matches("table")) {
          element.style.borderCollapse = "collapse";
          element.style.borderSpacing = "";
          element.style.overflow = "";
        }
      }

      applyBorderToCurrent() {
        if (this.selectedCell) {
          this.applyBorderToSelectedTableCell();
          return;
        }

        if (this.selectedObject) {
          this.applyBorderStyle(this.selectedObject);
          this.syncObjectAfterChange(this.selectedObject);
          this.keepObjectSelected(this.selectedObject);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.applyBorderStyle(paragraph);
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          this.updateInfo();
          return;
        }

        alert("Selecione um parágrafo, imagem, tabela ou célula.");
      }

      clearBorderFromCurrent() {
        if (this.selectedCell) {
          this.clearBorderStyle(this.selectedCell);
          const table = this.selectedCell.closest(".wordex-table");
          if (table) {
            this.syncObjectAfterChange(table);
            this.selectObject(table);
            this.selectTableCell(this.selectedCell);
          }
          return;
        }

        if (this.selectedObject) {
          this.clearBorderStyle(this.selectedObject);

          if (this.selectedObject.matches(".wordex-table")) {
            this.selectedObject.querySelectorAll("td").forEach(cell => {
              this.clearBorderStyle(cell);
            });
          }

          this.syncObjectAfterChange(this.selectedObject);
          this.keepObjectSelected(this.selectedObject);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.clearBorderStyle(paragraph);
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          this.updateInfo();
          return;
        }

        alert("Selecione um parágrafo, imagem, tabela ou célula.");
      }

      applyBorderToSelectedTableCell() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        this.applyBorderStyle(context.cell);
        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      applyBorderToSelectedTableRow() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        Array.from(context.row.cells).forEach(cell => {
          this.applyBorderStyle(cell);
        });

        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      applyBorderToSelectedTableColumn() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        Array.from(context.table.rows).forEach(row => {
          const cell = row.cells[context.columnIndex];

          if (cell) {
            this.applyBorderStyle(cell);
          }
        });

        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      applyBorderToSelectedTable() {
        const context = this.getSelectedTableContext();

        if (context) {
          this.applyBorderStyle(context.table);

          context.table.querySelectorAll("td").forEach(cell => {
            this.applyBorderStyle(cell);
          });

          this.selectObject(context.table);
          this.selectTableCell(context.cell);
          this.syncObjectAfterChange(context.table);
          return;
        }

        if (this.selectedObject && this.selectedObject.matches(".wordex-table")) {
          this.applyBorderStyle(this.selectedObject);

          this.selectedObject.querySelectorAll("td").forEach(cell => {
            this.applyBorderStyle(cell);
          });

          this.syncObjectAfterChange(this.selectedObject);
          this.keepObjectSelected(this.selectedObject);
          return;
        }

        alert("Selecione uma tabela ou célula.");
      }

      selectTableCell(cell) {
        if (!cell) return;

        this.selectedCell = cell;

        const table = cell.closest(".wordex-table");

        if (table) {
          this.selectedObject = table;
        }

        this.renderSelection();
        this.updateInfo();
      }

      askTableAlignment() {
        const value = prompt("Alinhamento: left, center, right ou justify", "left");

        if (!value) return null;

        const align = value.trim().toLowerCase();

        if (!["left", "center", "right", "justify"].includes(align)) {
          alert("Alinhamento inválido. Use left, center, right ou justify.");
          return null;
        }

        return align;
      }

      getSelectedTableContext() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            const node = selection.getRangeAt(0).commonAncestorContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            cell = element?.closest("td") || null;
          }
        }

        if (!cell) {
          alert("Selecione uma célula da tabela.");
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          alert("A célula selecionada não pertence a uma tabela Wordex.");
          return null;
        }

        return {
          table,
          cell,
          row: cell.parentElement,
          columnIndex: Array.from(cell.parentElement.cells).indexOf(cell)
        };
      }

      alignSelectedTableCell() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        const align = this.askTableAlignment();
        if (!align) return;

        context.cell.style.textAlign = align;

        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      alignSelectedTableRow() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        const align = this.askTableAlignment();
        if (!align) return;

        Array.from(context.row.cells).forEach(cell => {
          cell.style.textAlign = align;
        });

        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      alignSelectedTableColumn() {
        const context = this.getSelectedTableContext();
        if (!context) return;

        const align = this.askTableAlignment();
        if (!align) return;

        Array.from(context.table.rows).forEach(row => {
          const cell = row.cells[context.columnIndex];

          if (cell) {
            cell.style.textAlign = align;
          }
        });

        this.selectObject(context.table);
        this.selectTableCell(context.cell);
        this.syncObjectAfterChange(context.table);
      }

      applyParagraphAlign(align) {
        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          paragraph.style.textAlign = align;

          const block = this.findBlockById(paragraph.dataset.blockId);
          if (block) {
            block.style.textAlign = align;
            block.html = this.getCleanInnerHtml(paragraph);
          }

          this.updateInfo();
          return;
        }

        if (this.selectedObject) {
          const objectBlock = this.selectedObject.closest(".object-block");

          if (objectBlock) {
            this.applyAlignment(this.selectedObject, align === "justify" ? "left" : align);
            this.syncStandaloneObjectFromDom(this.selectedObject);
            this.keepObjectSelected(this.selectedObject);
          }
        }
      }

      applyFormatting(style) {
        if (this.applyFormattingToSelectedText(style)) {
          return;
        }

        if (this.selectedObject) {
          this.applyFormattingToSelectedObject(style);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.applyFormattingToParagraph(paragraph, style);
        }
      }

      applyFormattingToSelectedText(style) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        const span = document.createElement("span");
        this.applyStyleObject(span, style);

        try {
          range.surroundContents(span);
        } catch {
          const contents = range.extractContents();
          span.appendChild(contents);
          range.insertNode(span);
        }

        selection.removeAllRanges();

        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        selection.addRange(newRange);

        this.selectedParagraphId = paragraph.dataset.blockId;
        this.selectedBlockId = paragraph.dataset.blockId;
        this.syncParagraphElement(paragraph);
        this.renderSelection();
        this.updateInfo();

        return true;
      }

      applyFormattingToParagraph(paragraph, style) {
        this.applyStyleObject(paragraph, style);

        const block = this.findBlockById(paragraph.dataset.blockId);

        if (block) {
          block.style.fontFamily = paragraph.style.fontFamily || block.style.fontFamily;
          block.style.fontSize = paragraph.style.fontSize || block.style.fontSize;
          block.style.color = paragraph.style.color || block.style.color || "#000000";
          block.style.textAlign = paragraph.style.textAlign || block.style.textAlign;
          block.html = this.getCleanInnerHtml(paragraph);
        }

        this.renderSelection();
        this.updateInfo();
      }

      applyFormattingToSelectedObject(style) {
        const object = this.selectedObject;

        if (!object) return;

        /*
          Imagem: fonte/cor afetam apenas o rótulo visual do marcador.
          Tabela: fonte/cor afetam o conteúdo das células.
        */
        this.applyStyleObject(object, style);

        if (object.matches(".wordex-table")) {
          object.querySelectorAll("td").forEach(cell => {
            this.applyStyleObject(cell, style);
          });
        }

        this.syncObjectAfterChange(object);
        this.keepObjectSelected(object);
      }

      applyStyleObject(element, style) {
        if (!element || !style) return;

        Object.entries(style).forEach(([key, value]) => {
          element.style[key] = value;
        });
      }

      handleInlineObjectDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        /*
          Dentro de célula de tabela ou textbox, Backspace/Delete continua sendo edição
          normal do conteúdo.
        */
        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        /*
          Se já há um objeto selecionado, Backspace/Delete exclui esse objeto.
          Isso dá o comportamento em dois tempos:
          1ª tecla seleciona o objeto
          2ª tecla exclui.
        */
        if (this.selectedObject && this.documentElement.contains(this.selectedObject)) {
          event.preventDefault();
          event.stopPropagation();

          this.deleteSelectedObject();
          return true;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        const result = this.findAdjacentObjectAtCaret(paragraph, range, event.key);

        if (!result || !result.object || !result.marker) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        /*
          Não exclui de imediato. Primeiro seleciona o objeto.
          Isso evita surpresas e também resolve melhor objetos centralizados
          ou alinhados à direita, que não se comportam como texto comum.
        */
        this.placeCaretAtMarker(result.marker);
        result.marker.remove();

        this.selectObject(result.object);

        return true;
      }

      findAdjacentObjectAtCaret(paragraph, range, key) {
        const marker = document.createElement("span");
        marker.dataset.wordexCaretMarker = "1";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "0";
        marker.style.overflow = "hidden";
        marker.appendChild(document.createTextNode("\u200B"));

        const workRange = range.cloneRange();
        workRange.insertNode(marker);

        const units = this.getParagraphDeletionUnits(paragraph, marker);
        const index = units.indexOf(marker);

        if (index < 0) {
          marker.remove();
          return null;
        }

        const step = key === "Backspace" ? -1 : 1;

        for (let i = index + step; i >= 0 && i < units.length; i += step) {
          const current = units[i];

          if (this.isWordexInlineObject(current)) {
            return {
              object: current,
              marker
            };
          }

          if (current.nodeType === Node.TEXT_NODE) {
            /*
              Textos técnicos invisíveis não contam como conteúdo.
              Texto real interrompe a busca, deixando o navegador apagar texto normalmente.
            */
            const text = current.nodeValue
              .replace(/\u200B/g, "")
              .replace(/\uFEFF/g, "")
              .replace(/\s/g, "");

            if (text.length === 0) {
              continue;
            }

            break;
          }

          /*
            BRs e spans vazios podem existir como sobras de edição;
            não devem impedir a seleção do objeto adjacente.
          */
          if (
            current.nodeType === Node.ELEMENT_NODE &&
            (
              current.tagName === "BR" ||
              current.dataset.wordexCaretMarker === "1" ||
              current.textContent.replace(/\u200B/g, "").trim() === ""
            )
          ) {
            continue;
          }

          break;
        }

        marker.remove();
        return null;
      }

      getParagraphDeletionUnits(paragraph, marker) {
        const units = [];

        const walk = node => {
          if (node === marker) {
            units.push(node);
            return;
          }

          if (node.nodeType === Node.TEXT_NODE) {
            units.push(node);
            return;
          }

          if (node.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          if (this.isWordexInlineObject(node)) {
            units.push(node);
            return;
          }

          /*
            Não entra no conteúdo interno dos objetos.
          */
          if (node.closest && node.closest(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox")) {
            return;
          }

          /*
            BR conta como unidade vazia atravessável.
          */
          if (node.tagName === "BR") {
            units.push(node);
            return;
          }

          Array.from(node.childNodes).forEach(child => walk(child));
        };

        Array.from(paragraph.childNodes).forEach(child => walk(child));

        return units;
      }

      isWordexInlineObject(node) {
        return Boolean(
          node &&
          node.nodeType === Node.ELEMENT_NODE &&
          node.matches(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox")
        );
      }

      placeCaretAtMarker(marker) {
        const selection = window.getSelection();
        const range = document.createRange();

        range.setStartBefore(marker);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      handleEmptyParagraphDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }
