        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        if (
          !this.isParagraphHtmlEmpty(this.getCleanInnerHtml(paragraph)) ||
          this.hasParagraphVisualContent(paragraph)
        ) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.deleteEmptyParagraph(paragraph);
        return true;
      }

      deleteEmptyParagraph(paragraphElement) {
        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        blocks.splice(index, 1);

        this.ensureRequiredParagraphs();

        let targetBlock = null;

        if (blocks.length > 0) {
          targetBlock = blocks[Math.min(index, blocks.length - 1)];
        }

        this.selected.region = region;
        this.selectedObject = null;
        this.selectedCell = null;

        if (targetBlock && targetBlock.type === "paragraph") {
          this.selectedParagraphId = targetBlock.id;
          this.selectedBlockId = targetBlock.id;
        } else {
          this.selectedParagraphId = null;
          this.selectedBlockId = null;
        }

        this.render();

        const targetElement = this.getSelectedParagraphElement();

        if (targetElement) {
          targetElement.focus();

          if (this.isParagraphHtmlEmpty(this.getCleanInnerHtml(targetElement))) {
            this.placeCaretAtStart(targetElement);
          } else {
            this.placeCaretAtEnd(targetElement);
          }

          this.saveSelectionIfInsideParagraph();
        }
      }

      handleParagraphEnter(event) {
        if (event.key !== "Enter") {
          return false;
        }

        /*
          Shift+Enter continua disponível para quebra de linha interna,
          caso seja necessário em algum ponto.
        */
        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          Dentro de célula de tabela ou textbox, Enter deve continuar sendo comportamento
          do próprio conteúdo, não criação de novo parágrafo externo.
        */
        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.splitParagraphAtCaret(paragraph);
        return true;
      }

      splitParagraphAtCaret(paragraphElement) {
        if (!paragraphElement) return;

        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        const currentBlock = blocks[index];

        let afterHtml = "";

        const selection = window.getSelection();

        if (
          selection &&
          selection.rangeCount > 0 &&
          paragraphElement.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          const range = selection.getRangeAt(0);

          /*
            Se houver texto selecionado, ele é removido antes da divisão.
          */
          if (!range.collapsed) {
            range.deleteContents();
          }

          const afterRange = document.createRange();
          afterRange.selectNodeContents(paragraphElement);
          afterRange.setStart(range.startContainer, range.startOffset);

          const afterFragment = afterRange.extractContents();
          afterHtml = this.fragmentToHtml(afterFragment);
        }

        /*
          Depois de extrair o conteúdo posterior ao cursor,
          o parágrafo atual fica apenas com a parte anterior.
        */
        this.syncParagraphElement(paragraphElement);

        /*
          O novo parágrafo deve nascer com a configuração atual da toolbar,
          não com o estilo do parágrafo anterior.
        */
        const newParagraph = this.createParagraph(afterHtml);

        blocks.splice(index + 1, 0, newParagraph);

        this.selected.region = region;
        this.selectedParagraphId = newParagraph.id;
        this.selectedBlockId = newParagraph.id;
        this.selectedObject = null;
        this.selectedCell = null;

        this.render();

        const newElement = this.getSelectedParagraphElement();

        if (newElement) {
          newElement.focus();
          this.placeCaretAtStart(newElement);
          this.saveSelectionIfInsideParagraph();
        }
      }

      fragmentToHtml(fragment) {
        const container = document.createElement("div");
        container.appendChild(fragment);
        return container.innerHTML;
      }

      handleParagraphBoundaryArrow(event) {
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") {
          return false;
        }

        /*
          Ctrl+setas continuam reservadas para movimentar objetos/blocos.
        */
        if (event.ctrlKey || event.altKey || event.metaKey || event.shiftKey) {
          return false;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (paragraph.closest("td")) {
          return false;
        }

        const lineInfo = this.getCaretVisualLineInfo(paragraph, range);

        if (!lineInfo) {
          return false;
        }

        if (event.key === "ArrowUp" && !lineInfo.isFirstLine) {
          return false;
        }

        if (event.key === "ArrowDown" && !lineInfo.isLastLine) {
          return false;
        }

        const currentBlock = paragraph.closest(".paragraph-block");

        if (!currentBlock) {
          return false;
        }

        const targetBlock = event.key === "ArrowUp"
          ? this.findSiblingParagraphBlock(currentBlock, "previous")
          : this.findSiblingParagraphBlock(currentBlock, "next");

        if (!targetBlock) {
          return false;
        }

        const targetParagraph = targetBlock.querySelector(".paragraph");

        if (!targetParagraph) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        const region = targetBlock.closest(".region")?.dataset.region || this.selected.region;
        const blockId = targetBlock.dataset.blockId;

        this.selectParagraph(region, blockId);
        targetParagraph.focus();

        if (event.key === "ArrowUp") {
          this.placeCaretAtEnd(targetParagraph);
        } else {
          this.placeCaretAtStart(targetParagraph);
        }

        this.saveSelectionIfInsideParagraph();
        return true;
      }

      findSiblingParagraphBlock(currentBlock, direction) {
        let sibling = direction === "previous"
          ? currentBlock.previousElementSibling
          : currentBlock.nextElementSibling;

        while (sibling) {
          if (sibling.classList.contains("paragraph-block")) {
            return sibling;
          }

          sibling = direction === "previous"
            ? sibling.previousElementSibling
            : sibling.nextElementSibling;
        }

        return null;
      }

      getCaretVisualLineInfo(paragraph, range) {
        /*
          Detecta a linha visual real do caret.
          Isso é diferente de início/fim lógico do parágrafo.
          Exemplo: em um parágrafo quebrado em 3 linhas, seta para cima
          só vai ao parágrafo anterior se o caret estiver na primeira linha visual.
        */
        const marker = document.createElement("span");
        marker.dataset.wordexCaretLineMarker = "1";
        marker.textContent = "\u200B";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "1em";
        marker.style.overflow = "hidden";
        marker.style.verticalAlign = "baseline";

        const markerRange = range.cloneRange();
        markerRange.insertNode(marker);

        const caretRect = marker.getBoundingClientRect();

        const paragraphRange = document.createRange();
        paragraphRange.selectNodeContents(paragraph);

        const rects = Array.from(paragraphRange.getClientRects())
          .filter(rect => rect.width > 0 && rect.height > 0);

        marker.remove();

        if (!caretRect || caretRect.height === 0) {
          return null;
        }

        if (rects.length === 0) {
          return {
            isFirstLine: true,
            isLastLine: true
          };
        }

        /*
          Agrupa retângulos por linha visual, porque getClientRects()
          pode retornar vários retângulos na mesma linha.
        */
        const tolerance = 3;
        const lines = [];

        rects.forEach(rect => {
          let line = lines.find(item => Math.abs(item.top - rect.top) <= tolerance);

          if (!line) {
            line = {
              top: rect.top,
              bottom: rect.bottom
            };
            lines.push(line);
          } else {
            line.top = Math.min(line.top, rect.top);
            line.bottom = Math.max(line.bottom, rect.bottom);
          }
        });

        lines.sort((a, b) => a.top - b.top);

        const firstLine = lines[0];
        const lastLine = lines[lines.length - 1];

        return {
          isFirstLine: Math.abs(caretRect.top - firstLine.top) <= tolerance ||
            (caretRect.top >= firstLine.top - tolerance && caretRect.top <= firstLine.bottom + tolerance),

          isLastLine: Math.abs(caretRect.top - lastLine.top) <= tolerance ||
            (caretRect.top >= lastLine.top - tolerance && caretRect.top <= lastLine.bottom + tolerance)
        };
      }

      handleFreeObjectKeyboard(event) {
        const arrows = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"];
        if (!arrows.includes(event.key)) return;

        /*
          Setas comuns ficam para navegação normal.
          Movimentação de objetos/blocos só com Ctrl + seta.
        */
        if (!event.ctrlKey) return;

        /*
          Se houver imagem/tabela selecionada, ela tem prioridade.
        */
        if (this.selectedObject) {
          const paragraph = this.selectedObject.closest(".paragraph");
          const objectBlock = this.selectedObject.closest(".object-block");

          if (!paragraph && !objectBlock) return;

          event.preventDefault();

          const step = event.shiftKey ? 80 : 24;

          /*
            Se o objeto está dentro de um parágrafo e o usuário usa Ctrl+seta,
            assumimos que ele quer movimentação livre dentro do texto.
            Então convertemos o alinhamento para "free" automaticamente.
          */
          if (paragraph && this.selectedObject.dataset.align !== "free") {
            this.applyAlignment(this.selectedObject, "free");
            this.syncObjectAfterChange(this.selectedObject);
          }

          if (!paragraph && objectBlock) {
            if (event.key === "ArrowLeft") {
              this.moveStandaloneObjectHorizontally(-step);
            } else if (event.key === "ArrowRight") {
              this.moveStandaloneObjectHorizontally(step);
            } else if (event.key === "ArrowUp") {
              this.moveObjectBlockVertically("up");
            } else if (event.key === "ArrowDown") {
              this.moveObjectBlockVertically("down");
            }

            return;
          }

          if (event.key === "ArrowLeft") {
            this.moveInlineFreeObjectHorizontally("left", step);
          } else if (event.key === "ArrowRight") {
            this.moveInlineFreeObjectHorizontally("right", step);
          } else if (event.key === "ArrowUp") {
            this.moveObjectBlockVertically("up");
          } else if (event.key === "ArrowDown") {
            this.moveObjectBlockVertically("down");
          }

          return;
        }

        /*
          Sem objeto selecionado: Ctrl + ↑/↓ move o parágrafo/bloco selecionado.
        */
        if (this.selectedBlockId && (event.key === "ArrowUp" || event.key === "ArrowDown")) {
          event.preventDefault();

          this.moveSelectedBlockVertically(
            event.key === "ArrowUp" ? "up" : "down"
          );
        }
      }

      moveSelectedBlockVertically(direction) {
        if (!this.selectedBlockId) return;

        const blocks = this.wordexDocument[this.selected.region];
        const index = blocks.findIndex(block => block.id === this.selectedBlockId);

        if (index < 0) return;

        const newIndex = direction === "up" ? index - 1 : index + 1;

        if (newIndex < 0 || newIndex >= blocks.length) return;

        const [block] = blocks.splice(index, 1);
        blocks.splice(newIndex, 0, block);

        this.selectedBlockId = block.id;

        if (block.type === "paragraph") {
          this.selectedParagraphId = block.id;
          this.selectedObject = null;
        } else {
          this.selectedParagraphId = null;
        }

        this.render();

        if (block.type === "paragraph") {
          const paragraph = this.getSelectedParagraphElement();

          if (paragraph) {
            paragraph.focus();
            this.placeCaretAtEnd(paragraph);
            this.selectParagraph(this.selected.region, block.id);
          }
        } else {
          const rendered = this.documentElement.querySelector(
            `.object-block[data-block-id="${block.id}"] .dynamic-image-box, .object-block[data-block-id="${block.id}"] .wordex-table, .object-block[data-block-id="${block.id}"] .wordex-chart-box`
          );

          if (rendered) {
            this.keepObjectSelected(rendered);
          }
        }
      }

      moveStandaloneObjectHorizontally(delta) {
        const object = this.selectedObject;
        if (!object) return;

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const wrapperRect = wrapper.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();

        const wrapperWidth = wrapper.clientWidth;
        const objectWidth = objectRect.width;

        /*
          Usa a posição visual atual.
          Assim funciona também quando o objeto estava com float:right ou centralizado.
        */
        const currentVisualX = Math.round(objectRect.left - wrapperRect.left);

        const minX = 0;
        const maxX = Math.max(0, Math.floor(wrapperWidth - objectWidth - 4));

        const current = this.clamp(currentVisualX, minX, maxX);
        const next = this.clamp(current + delta, minX, maxX);

        /*
          Fora de parágrafo, não há texto para circundar.
          Então o objeto passa a ser posicionado por margem, não por float.
        */
        object.style.float = "none";
        object.style.display = object.matches("table") ? "table" : "flex";
        object.style.marginLeft = next + "px";
        object.style.marginRight = "8px";

        object.dataset.blockX = String(next);

        this.syncStandaloneObjectFromDom(object);
        this.keepObjectSelected(object);
      }

      clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      moveInlineFreeObjectHorizontally(direction, step) {
        const object = this.selectedObject;
        const paragraph = object.closest(".paragraph");

        if (!paragraph) return;

        const position = direction === "left"
          ? this.findTextPositionBeforeObject(paragraph, object, step)
          : this.findTextPositionAfterObject(paragraph, object, step);

        if (!position) return;

        object.classList.remove("selected-object");
        object.remove();

        this.insertObjectIntoTextNode(position.node, position.offset, object);

        this.syncParagraphElement(paragraph);
        this.keepObjectSelected(object);
      }

      moveObjectBlockVertically(direction) {
        const object = this.selectedObject;
        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          const currentBlock = paragraph.closest(".paragraph-block");
          const targetBlock = direction === "up"
            ? currentBlock.previousElementSibling
            : currentBlock.nextElementSibling;

          if (!targetBlock || !targetBlock.classList.contains("paragraph-block")) return;

          const targetParagraph = targetBlock.querySelector(".paragraph");
          if (!targetParagraph) return;

          object.classList.remove("selected-object");
          object.remove();

          if (direction === "up") {
            targetParagraph.appendChild(object);
          } else {
            targetParagraph.insertBefore(object, targetParagraph.firstChild);
          }

          this.syncParagraphElement(paragraph);
          this.syncParagraphElement(targetParagraph);
          this.keepObjectSelected(object);
          return;
        }

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const region = wrapper.closest(".region");
        const blocks = this.wordexDocument[region.dataset.region];
        const index = blocks.findIndex(block => block.id === wrapper.dataset.blockId);
        const newIndex = direction === "up" ? index - 1 : index + 1;

        if (index < 0 || newIndex < 0 || newIndex >= blocks.length) return;

        const [block] = blocks.splice(index, 1);
        blocks.splice(newIndex, 0, block);

        this.selectedBlockId = block.id;
        this.render();

        const rendered = this.documentElement.querySelector(
          `.object-block[data-block-id="${block.id}"] .dynamic-image-box, .object-block[data-block-id="${block.id}"] .wordex-table`
        );

        if (rendered) this.selectObject(rendered);
      }

      getMovableTextNodes(paragraph, object) {
        const walker = document.createTreeWalker(
          paragraph,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode: node => {
              const parent = node.parentElement;
              if (!parent) return NodeFilter.FILTER_REJECT;

              if (
                parent.closest(".dynamic-image-box") ||
                parent.closest(".wordex-table") ||
                parent.closest(".wordex-chart-box") ||
                parent.closest(".wordex-textbox") ||
                parent.closest(".inline-field")
              ) {
                return NodeFilter.FILTER_REJECT;
              }

              if (!node.nodeValue || node.nodeValue.length === 0) {
                return NodeFilter.FILTER_REJECT;
              }

              return NodeFilter.FILTER_ACCEPT;
            }
          }
        );

        const nodes = [];
        let node;

        while ((node = walker.nextNode())) {
          nodes.push(node);
        }

        return nodes;
      }

      findTextPositionBeforeObject(paragraph, object, step) {
        const nodes = this.getMovableTextNodes(paragraph, object)
          .filter(node => node.compareDocumentPosition(object) & Node.DOCUMENT_POSITION_FOLLOWING);

        let remaining = step;

        for (let i = nodes.length - 1; i >= 0; i--) {
          const node = nodes[i];
          const length = node.nodeValue.length;

          if (remaining <= length) {
            return { node, offset: Math.max(0, length - remaining) };
          }

          remaining -= length;
        }

        if (nodes.length > 0) return { node: nodes[0], offset: 0 };

        return null;
      }

      findTextPositionAfterObject(paragraph, object, step) {
        const nodes = this.getMovableTextNodes(paragraph, object)
          .filter(node => object.compareDocumentPosition(node) & Node.DOCUMENT_POSITION_FOLLOWING);

        let remaining = step;

        for (const node of nodes) {
          const length = node.nodeValue.length;

          if (remaining <= length) {
            return { node, offset: Math.min(length, remaining) };
          }

          remaining -= length;
        }

        if (nodes.length > 0) {
          const last = nodes[nodes.length - 1];
          return { node: last, offset: last.nodeValue.length };
        }

        return null;
      }

      insertObjectIntoTextNode(textNode, offset, object) {
        const parent = textNode?.parentNode;

        if (!parent) return;

        /*
          Defesa extra:
          Ctrl+setas nunca pode mover um objeto para dentro de outro objeto.
          O caso que causava invasão era texto interno do gráfico sendo usado
          como ponto de inserção.
        */
        const parentElement = parent.nodeType === Node.ELEMENT_NODE
          ? parent
          : parent.parentElement;

        if (
          parentElement?.closest?.(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox")
        ) {
          return;
        }

        const text = textNode.nodeValue;
        const before = text.slice(0, offset);
        const after = text.slice(offset);

        const beforeNode = document.createTextNode(before);
        const afterNode = document.createTextNode(after);

        parent.insertBefore(beforeNode, textNode);
        parent.insertBefore(object, textNode);
        parent.insertBefore(afterNode, textNode);
        parent.removeChild(textNode);
      }

      keepObjectSelected(object) {
        if (!object) return;

        this.selectObject(object);

        const selection = window.getSelection();
        if (selection) {
          selection.removeAllRanges();
        }

        /*
          Alguns elementos, especialmente tabela com células editáveis,
          fazem o navegador tentar devolver o foco ao texto/célula após a movimentação.
          Este reforço mantém o objeto selecionado visualmente e logicamente.
        */
        setTimeout(() => {
          if (!this.documentElement.contains(object)) return;

          this.selectedObject = object;

          const paragraph = object.closest(".paragraph");
          const block = object.closest(".paragraph-block, .object-block");
          const region = object.closest(".region");

          if (region) {
            this.selected.region = region.dataset.region;
          }

          if (paragraph) {
            this.selectedParagraphId = paragraph.dataset.blockId;
            this.selectedBlockId = paragraph.dataset.blockId;
          } else if (block) {
            this.selectedParagraphId = null;
            this.selectedBlockId = block.dataset.blockId;
          }

          this.renderSelection();
          this.updateInfo();
        }, 0);
      }

      setCaretAfterObject(object) {
        const selection = window.getSelection();
        const caretRange = document.createRange();

        caretRange.setStartAfter(object);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.savedRange = caretRange.cloneRange();
      }

      deleteSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        const paragraph = this.selectedObject.closest(".paragraph");
        const objectBlock = this.selectedObject.closest(".object-block");

        if (paragraph) {
          this.selectedObject.remove();
          this.selectedObject = null;
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          return;
        }

        if (objectBlock) {
          this.deleteBlock(this.selected.region, objectBlock.dataset.blockId);
        }
      }

      deleteBlock(region, blockId) {
        const blocks = this.wordexDocument[region];
        const index = blocks.findIndex(block => block.id === blockId);

        if (index >= 0) {
          blocks.splice(index, 1);
        }

        this.ensureRequiredParagraphs();

        this.clearSelection();
        this.render();
      }

      syncObjectAfterChange(object) {
        const paragraph = object.closest(".paragraph");
        const objectBlock = object.closest(".object-block");

        if (paragraph) {
          this.syncParagraphElement(paragraph);
          return;
        }

        if (objectBlock) {
          this.syncStandaloneObjectFromDom(object);
        }
      }

      syncParagraphElement(paragraphElement) {
        if (!paragraphElement) return;

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (block) {
          this.updateParagraphEmptyState(paragraphElement);
          block.html = this.getCleanInnerHtml(paragraphElement);
        }
      }

      syncStandaloneObjectFromDom(object) {
        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const block = this.findBlockById(wrapper.dataset.blockId);
        if (!block) return;

        if (block.type === "dynamicImage") {
          block.fieldName = object.dataset.fieldName;
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.height = object.style.height;
          block.blockX = object.dataset.blockX || "0";
        } else if (block.type === "chart") {
          block.sourceName = object.dataset.sourceName;
          block.chartType = object.dataset.chartType;
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.height = object.style.height;
          block.html = this.getCleanOuterHtml(object);
        } else if (block.type === "table") {
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.blockX = object.dataset.blockX || "0";
          block.html = this.getCleanOuterHtml(object);
        }
      }

      getCleanInnerHtml(paragraphElement) {
        const clone = paragraphElement.cloneNode(true);

        clone.querySelectorAll(".selected-object").forEach(element => {
          element.classList.remove("selected-object");
        });

        clone.querySelectorAll(".selected-cell").forEach(element => {
          element.classList.remove("selected-cell");
        });

        return clone.innerHTML;
      }

      getCleanOuterHtml(element) {
        const clone = element.cloneNode(true);
        clone.classList.remove("selected-object");

        clone.querySelectorAll(".selected-cell").forEach(item => {
          item.classList.remove("selected-cell");
        });

        return clone.outerHTML;
      }

      saveSelectionIfInsideParagraph() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const paragraphElement = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraphElement) return;

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.savedRange = range.cloneRange();
      }

      findParagraphElementFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        return element.closest(".paragraph");
      }

      placeCaretAtStart(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEnd(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEndIfNoSelection(element) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          this.placeCaretAtEnd(element);
          return;
        }

        const range = selection.getRangeAt(0);

        if (!element.contains(range.commonAncestorContainer)) {
          this.placeCaretAtEnd(element);
        }
      }

      normalizeAllObjectsIntoParagraphs() {
        ["headerTemplate", "bodyFlow", "footerTemplate"].forEach(region => {
          this.wordexDocument[region] = this.wordexDocument[region].map(block => {
            if (block.type === "paragraph") {
              return block;
            }

            return this.convertObjectBlockToParagraph(block);
          });
        });
      }

      convertObjectBlockToParagraph(block) {
        let html = "";

        if (block.type === "dynamicImage") {
          const image = this.createDynamicImageElement(
            block.fieldName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "table") {
          html = (block.html || this.createTableHtml(1, 1, block.align || "left", block.width || "80mm")) + "\u200B";
        }

        return {
          id: block.id || this.createId("paragraph"),
          type: "paragraph",
          html,
          style: {
            fontFamily: "Arial",
            fontSize: "12pt",
            textAlign: "left"
          }
        };
      }

      render() {
        this.normalizeAllObjectsIntoParagraphs();
        this.documentElement.innerHTML = "";

        const title = document.createElement("div");
        title.className = "document-title";
        const page = this.getPageSettings();
        title.textContent = `Wordex — ${page.format} ${page.orientation === "landscape" ? "paisagem" : "retrato"} — ${page.width} x ${page.height}`;
        this.documentElement.appendChild(title);

        this.documentElement.appendChild(
          this.renderRegion("headerTemplate", "header-template", "Modelo de cabeçalho")
        );

        this.documentElement.appendChild(
          this.renderRegion("bodyFlow", "body-flow", "Corpo contínuo")
        );

        this.documentElement.appendChild(
          this.renderRegion("footerTemplate", "footer-template", "Modelo de rodapé")
        );

        this.renderSelection();
        this.updateInfo();
      }

      renderRegion(region, cssClass, emptyText) {
        const regionElement = document.createElement("section");
        regionElement.className = "region " + cssClass;
        regionElement.dataset.region = region;

        if (this.wordexDocument[region].length === 0) {
          regionElement.classList.add("is-empty");
        }

        regionElement.addEventListener("click", event => {
          event.stopPropagation();

          if (event.target === regionElement || event.target.classList.contains("empty")) {
            this.selectRegion(region);
          }
        });

        const blocks = this.wordexDocument[region];

        if (blocks.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = emptyText + " vazio";
          regionElement.appendChild(empty);
        }

        blocks.forEach(block => {
          if (block.type !== "paragraph") {
            block = this.convertObjectBlockToParagraph(block);
          }

          regionElement.appendChild(this.renderParagraphBlock(region, block));
        });

        return regionElement;
      }

      renderParagraphBlock(region, block) {
        const wrapper = document.createElement("div");
        wrapper.className = "paragraph-block";
        wrapper.dataset.blockId = block.id;

        wrapper.addEventListener("click", event => {
          event.stopPropagation();

          const object = event.target.closest(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox");

          if (object && wrapper.contains(object)) {
            this.selectObject(object);
            return;
          }

          this.selectParagraph(region, block.id);
        });

        /*
          Parágrafos não têm mais botão Excluir.
          Eles são removidos com Backspace/Delete quando estiverem vazios.
        */

        const paragraph = document.createElement("div");
        paragraph.className = "paragraph";
        paragraph.contentEditable = "true";
        paragraph.dataset.blockId = block.id;
        paragraph.dataset.emptyText = "Parágrafo vazio";
        paragraph.innerHTML = block.html || "";

        paragraph.classList.toggle("is-empty", this.isParagraphHtmlEmpty(block.html));

        requestAnimationFrame(() => {
          paragraph.querySelectorAll(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox").forEach(object => {
            this.limitObjectWidthToParagraph(object);
            this.syncParagraphElement(paragraph);
          });
        });

        paragraph.style.fontFamily = block.style.fontFamily;
        paragraph.style.fontSize = block.style.fontSize;
        paragraph.style.color = block.style.color || "#000000";
        paragraph.style.textAlign = block.style.textAlign;

        paragraph.addEventListener("focus", () => {
          this.selectParagraph(region, block.id);
          this.placeCaretAtEndIfNoSelection(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("click", event => {
          const cell = event.target.closest("td");

          if (cell && paragraph.contains(cell)) {
            const table = cell.closest(".wordex-table");
            if (table) {
              this.selectObject(table);
              this.selectTableCell(cell);
              return;
            }
          }

          const object = event.target.closest(".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox");

          if (object && paragraph.contains(object)) {
            this.selectObject(object);
            return;
          }

          this.selectParagraph(region, block.id);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("keyup", () => {
          this.updateParagraphEmptyState(paragraph);
          this.saveSelectionIfInsideParagraph();
          block.html = this.getCleanInnerHtml(paragraph);
        });

        paragraph.addEventListener("mouseup", () => {
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("input", () => {
          this.updateParagraphEmptyState(paragraph);
          block.html = this.getCleanInnerHtml(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        wrapper.appendChild(paragraph);

        return wrapper;
      }

      renderBlockTools(region, block, title) {
        const tools = document.createElement("div");
        tools.className = "block-tools";

        const deleteButton = document.createElement("button");
        deleteButton.textContent = "Excluir";
        deleteButton.title = title;
        deleteButton.addEventListener("click", event => {
          event.stopPropagation();
          this.deleteBlock(region, block.id);
        });

        tools.appendChild(deleteButton);
        return tools;
      }

      renderSelection() {
        this.documentElement.querySelectorAll(".region").forEach(regionElement => {
          regionElement.classList.toggle(
            "selected",
            regionElement.dataset.region === this.selected.region
          );
        });

        this.documentElement.querySelectorAll(".paragraph-block, .object-block").forEach(blockElement => {
          blockElement.classList.toggle(
            "selected-block",
            blockElement.dataset.blockId === this.selectedBlockId
          );
        });

        this.documentElement.querySelectorAll(".selected-object").forEach(element => {
          element.classList.remove("selected-object");
        });

        this.documentElement.querySelectorAll(".selected-cell").forEach(element => {
          element.classList.remove("selected-cell");
        });

        if (this.selectedObject && this.documentElement.contains(this.selectedObject)) {
          this.selectedObject.classList.add("selected-object");
        }

        if (this.selectedCell && this.documentElement.contains(this.selectedCell)) {
          this.selectedCell.classList.add("selected-cell");
        }
      }

      resizeTableRowsByTotalHeight(table, totalHeight) {
        const rows = Array.from(table.rows);
        if (rows.length === 0) return;

        const rowHeight = Math.max(18, Math.floor(totalHeight / rows.length));

        rows.forEach(row => {
          row.style.height = rowHeight + "px";

          Array.from(row.cells).forEach(cell => {
            cell.style.height = rowHeight + "px";
          });
        });
      }

      updateInfo() {
        const names = {
          headerTemplate: "modelo de cabeçalho",
          bodyFlow: "corpo contínuo",
          footerTemplate: "modelo de rodapé"
        };

        let objectInfo = "";

        if (this.selectedObject) {
          objectInfo = this.selectedObject.matches(".dynamic-image-box")
            ? " / imagem selecionada"
            : this.selectedObject.matches(".wordex-chart-box")
              ? " / gráfico selecionado"
              : " / tabela selecionada";

          if (this.selectedCell) {
            objectInfo += " / célula selecionada";
          }

          if (this.selectedObject.closest(".paragraph")) {
            objectInfo += " / conteúdo do parágrafo";
          }
        }

        const paragraphInfo = this.selectedParagraphId && !objectInfo
          ? " / parágrafo selecionado / pode digitar texto"
          : "";

        const page = this.getPageSettings();
        this.info.textContent =
          "Selecionado: " + names[this.selected.region] + paragraphInfo + objectInfo +
          " / Página: " + page.format + " " + (page.orientation === "landscape" ? "paisagem" : "retrato");
      }

      exportHtml() {
        const paragraph = this.getSelectedParagraphElement();
        if (paragraph) this.syncParagraphElement(paragraph);

        if (this.selectedObject) this.syncObjectAfterChange(this.selectedObject);

        this.output.value = this.generateHtml();
      }

      getExportCss() {
        return document.getElementById("wordex-report-style")?.textContent || "";
      }

      previewPagedHtml() {
        const pagedHtml = this.generatePagedHtml();

        /*
          Não usamos document.write para injetar o HTML paginado,
          porque navegadores podem bloquear scripts externos escritos dessa forma.
          Com Blob URL, o HTML abre como uma página normal e o Paged.js carrega melhor.
        */
        const blob = new Blob([pagedHtml], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const win = window.open(url, "_blank");

        if (!win) {
          URL.revokeObjectURL(url);
          alert("O navegador bloqueou a janela de paginação.");
          return;
        }

        setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 60000);
      }

      getPagedCss() {
        const page = this.getPageSettings();

        return `
          @page {
            size: ${this.getPageSizeCss()};
            margin: ${this.getPageMarginCss()};

            @top-center {
              content: element(wordexHeader);
            }

            @bottom-center {
              content: element(wordexFooter);
            }
          }

          body.wordex-paged {
            margin: 0;
            background: #ddd;
            font-family: Arial, sans-serif;
            color: #222;
          }

          body.wordex-paged .document {
            width: auto;
            min-height: auto;
            margin: 0;
            background: white;
            box-shadow: none;
          }

          body.wordex-paged .region,
          body.wordex-paged .header-template,
          body.wordex-paged .body-flow,
          body.wordex-paged .footer-template {
            padding: 0;
          }

          /*
            Cabeçalho/rodapé fora de .document. Seletores SEM "body" no running():
            o Paged.js busca no fragmento do <template> (filhos diretos, sem <body>).
          */
          .header-template {
            position: running(wordexHeader);
            border: none;
            background: transparent;
            min-height: auto;
            max-height: none;
            overflow: visible;
          }

          .footer-template {
            position: running(wordexFooter);
            border: none;
            background: transparent;
            min-height: auto;
            max-height: none;
            overflow: visible;
          }

          /*
            Esconder cópias no miolo (não nas margens .pagedjs_margin-*).
          */
          body.wordex-paged .pagedjs_page_content .header-template,
          body.wordex-paged .pagedjs_page_content .footer-template {
            display: none !important;
          }

          @media print {
            body.wordex-paged > .header-template,
            body.wordex-paged > .footer-template {
              display: none !important;
            }

            body.wordex-paged .pagedjs_margin-top-center,
            body.wordex-paged .pagedjs_margin-bottom-center,
            body.wordex-paged .pagedjs_margin-top-center .pagedjs_margin-content,
            body.wordex-paged .pagedjs_margin-bottom-center .pagedjs_margin-content {
              display: block !important;
              visibility: visible !important;
            }
          }

          body.wordex-paged .body-flow {
            min-height: auto;
          }

          .wordex-page-number::after {
            content: counter(page);
          }

          .wordex-page-count::after {
            content: counter(pages);
          }



          body.wordex-paged .paragraph-block,
          body.wordex-paged .object-block {
            break-inside: avoid;
          }

          /*
            Fundo branco forçado na estrutura real criada pelo Paged.js.
            O cinza deve aparecer apenas fora da folha.
          */
          body.wordex-paged .pagedjs_page,
          body.wordex-paged .pagedjs_pagebox,
          body.wordex-paged .pagedjs_sheet,
          body.wordex-paged .pagedjs_bleed,
          body.wordex-paged .pagedjs_area,
          body.wordex-paged .pagedjs_margin,
          body.wordex-paged [class^="pagedjs_margin-"],
          body.wordex-paged [class*=" pagedjs_margin-"],
          body.wordex-paged .pagedjs_margin-content {
            background: white !important;
          }

          @media screen {
            body.wordex-paged .pagedjs_pages {
              margin: 20px auto;
            }

            /*
              O fundo externo continua cinza pelo body.
              A folha inteira, incluindo header/footer/margens, fica branca.
            */
            body.wordex-paged .pagedjs_page,
            body.wordex-paged .pagedjs_sheet,
            body.wordex-paged .pagedjs_area,
            body.wordex-paged .pagedjs_margin-top,
            body.wordex-paged .pagedjs_margin-bottom,
            body.wordex-paged .pagedjs_margin-left,
            body.wordex-paged .pagedjs_margin-right,
            body.wordex-paged .pagedjs_margin-top-center,
            body.wordex-paged .pagedjs_margin-bottom-center {
              background: white;
            }

            body.wordex-paged .pagedjs_page {
              background: white !important;
              box-shadow: 0 0 10px rgba(0,0,0,.35);
              margin: 0 auto 20px;
            }
          }
        `;
      }

      generateHtml() {
        return this.buildExportedHtml({ paged: false });
      }

      generatePagedHtml() {
        return this.buildExportedHtml({ paged: true });
      }

      applyReportMacros(html, { paged = false } = {}) {
        const now = new Date();

        const date = now.toLocaleDateString("pt-BR");
        const time = now.toLocaleTimeString("pt-BR", {
          hour: "2-digit",
          minute: "2-digit"
        });
        const dateTime = `${date} ${time}`;

        let result = String(html || "");

        result = result.replaceAll("{{today}}", date);
        result = result.replaceAll("{{date}}", date);
        result = result.replaceAll("{{time}}", time);
        result = result.replaceAll("{{now}}", dateTime);
        result = result.replaceAll("{{datetime}}", dateTime);

        /*
          Página e total de páginas só fazem sentido no HTML paginado.
          No Paged.js, viram spans preenchidos por CSS counters.
        */
        if (paged) {
          result = result.replaceAll("{{page}}", '<span class="wordex-page-number"></span>');
          result = result.replaceAll("{{pages}}", '<span class="wordex-page-count"></span>');
        }

        return result;
      }

      buildExportedHtml({ paged = false } = {}) {
        if (paged) {
          this.updateHeaderFooterMarginsFromEditor();
        }

        const page = this.getPageSettings();
        const headerHtml = this.applyReportMacros(
          this.generateOptionalRegionHtml(
            "header",
            "region header-template",
            this.wordexDocument.headerTemplate
          ),
          { paged }
        );
        const bodyHtml = this.applyReportMacros(
          this.generateRegionHtml(this.wordexDocument.bodyFlow),
          { paged }
        );
        const footerHtml = this.applyReportMacros(
          this.generateOptionalRegionHtml(
            paged ? "div" : "footer",
            "region footer-template",
            this.wordexDocument.footerTemplate
          ),
          { paged }
        );
        const pageDataAttrs = `
    data-page-format="${page.format}"
    data-page-orientation="${page.orientation}"
    data-page-width="${page.width}"
    data-page-height="${page.height}"
    data-margin-top="${page.marginTop}"
    data-margin-right="${page.marginRight}"
    data-margin-bottom="${page.marginBottom}"
    data-margin-left="${page.marginLeft}"`;
        const extraStyle = paged
          ? this.getPagedCss()
          : `
    .document {
      width: ${page.width};
      min-height: ${page.height};
    }`;
        const pagedScript = paged
          ? `  <script src="https://cdn.jsdelivr.net/npm/pagedjs/dist/paged.polyfill.js"><\/script>
  <script>
    function wordexCleanupPagedOutput() {
      document.querySelectorAll(
        "body.wordex-paged .pagedjs_page_content .header-template, " +
        "body.wordex-paged .pagedjs_page_content .footer-template"
      ).forEach(node => node.remove());
    }

    class WordexPagedCleanup extends (window.Paged && Paged.Handler ? Paged.Handler : class {}) {
      afterRendered() {
        wordexCleanupPagedOutput();
      }
    }

    if (window.Paged && Paged.registerHandlers) {
      Paged.registerHandlers(WordexPagedCleanup);
    }

    window.addEventListener("load", () => {
      if (window.PagedPolyfill && PagedPolyfill.on) {
        PagedPolyfill.on("rendered", wordexCleanupPagedOutput);
      }
    });
  <\/script>\n`
          : "";

        return `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>${paged ? "Documento Wordex Paginado" : "Documento Wordex"}</title>
  <style>
    ${this.getExportCss()}
    ${extraStyle}
  </style>
${pagedScript}</head>
<body${paged ? ' class="wordex-paged"' : ""}>
${paged
  ? `${headerHtml}
  ${footerHtml}
  <div class="document"
    data-wordex-mode="paged"${pageDataAttrs}>
    <main class="region body-flow">
      ${bodyHtml}
    </main>
  </div>`
  : `<div class="document"
    data-wordex-mode="continuous"${pageDataAttrs}>
    ${headerHtml}
    <main class="region body-flow">
      ${this.generateRegionHtml(this.wordexDocument.bodyFlow)}
    </main>
    ${footerHtml}
  </div>`}
</body>
</html>`;
      }

      generateOptionalRegionHtml(tagName, className, blocks) {
        if (!blocks || blocks.length === 0) {
          return "";
        }

        return `<${tagName} class="${className}">
      ${this.generateRegionHtml(blocks)}
    </${tagName}>`;
      }

      generateRegionHtml(blocks) {
        return blocks.map(block => this.generateBlockHtml(block)).join("\n");
      }

      generateBlockHtml(block) {
        if (block.type === "paragraph") {
          return `<div class="paragraph" style="font-family:${this.escapeAttribute(block.style.fontFamily)};font-size:${this.escapeAttribute(block.style.fontSize)};color:${this.escapeAttribute(block.style.color || "#000000")};text-align:${this.escapeAttribute(block.style.textAlign)};">${block.html || ""}</div>`;
        }

        if (block.type === "dynamicImage") {
          const image = this.createDynamicImageElement(block.fieldName, block.align, block.width, block.height);
          image.dataset.blockX = block.blockX || "0";
          image.style.marginLeft = Math.max(0, Number(block.blockX || "0") || 0) + "px";
          return image.outerHTML;
        }

        if (block.type === "chart") {
          const chart = this.createChartElement(
            block.sourceName || "Dados",
            block.chartType || "bar",
            block.align || "left",
            block.width || "100mm",
            block.height || "60mm"
          );

          return chart.outerHTML;
        }

        if (block.type === "textbox") {
          const textbox = this.createTextboxElement(
            block.html || "",
            block.align || "left",
            block.width || "80mm",
            block.height || "30mm"
          );

          return textbox.outerHTML;
        }

        if (block.type === "table") {
          return block.html || "";
        }

        return "";
      }

      escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      escapeAttribute(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
    }

    const wordex = new WordexEditor("document", "output", "info");
  </script>
</body>
</html>
