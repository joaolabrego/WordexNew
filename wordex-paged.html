  <body class="wordex-generated-report">
    <div class="wordex-paged-toolbar" id="wordex-paged-toolbar">
      <div class="wordex-paged-toolbar-title" id="wordex-paged-title">@@WORDEX_TITLE@@</div>
      <div class="wordex-paged-toolbar-actions">
        <button type="button" id="wordex-paged-save-html" disabled title="Salvar HTML montado">Salvar HTML</button>
        <button type="button" id="wordex-paged-pdf" class="primary" disabled title="Gerar PDF">Gerar PDF</button>
        <button type="button" id="wordex-paged-close" title="Fechar">Fechar</button>
      </div>
      <div class="wordex-paged-status" id="wordex-paged-status">Paginando relatório...</div>
    </div>
    <div class="wordex-paged-stage" id="wordex-paged-stage">
      <div id="wordex-report-source" class="workspace">
        @@WORDEX_SOURCE_HTML@@
      </div>
      <div id="wordex-pagex-output"></div>
    </div>
    <script type="application/json"
      id="wordex-pagex-config">@@WORDEX_PAGEX_CONFIG@@</script>
    @@WORDEX_PDF_TEMPLATE_BOOT@@
    <script>
    (function () {
      var config = JSON.parse(document.getElementById("wordex-pagex-config").textContent || "{}");
      var headerTemplateHtml = config.headerTemplateHtml || "";
      var footerTemplateHtml = config.footerTemplateHtml || "";
      var watermarkConfig = config.watermarkConfig || null;
      var pageConfig = config.pageConfig || {};
      var pagedTitleNode = document.getElementById("wordex-paged-title");
      var pagedStatusNode = document.getElementById("wordex-paged-status");
      var pagedTitle = String(config.pdfTitle || document.title || "Relatório Wordex").trim();

      if (pagedTitleNode) {
        pagedTitleNode.textContent = pagedTitle;
      }

      document.title = pagedTitle;

      function setPagedStatus(message, isError) {
        if (!pagedStatusNode) return;
        pagedStatusNode.textContent = message;
        pagedStatusNode.classList.toggle("is-error", !!isError);
      }

      function mm(value) {
        return Math.max(0, Number(value) || 0).toFixed(2).replace(/\\.?0+$/, "") + "mm";
      }

      function htmlToElement(html) {
        if (!html) return null;
        var tpl = document.createElement("template");
        tpl.innerHTML = String(html || "").trim();
        return tpl.content.firstElementChild;
      }

      function waitForImages(node, timeoutMs) {
        var images = node ? Array.prototype.slice.call(node.querySelectorAll("img")) : [];
        if (!images.length) return Promise.resolve();
        var tasks = images.map(function (img) {
          if (img.complete) return Promise.resolve();
          return new Promise(function (resolve) {
            function done() {
              img.removeEventListener("load", done);
              img.removeEventListener("error", done);
              resolve();
            }
            img.addEventListener("load", done, { once: true });
            img.addEventListener("error", done, { once: true });
          });
        });
        return Promise.race([
          Promise.allSettled(tasks),
          new Promise(function (resolve) {
            setTimeout(resolve, timeoutMs || 8000);
          })
        ]).then(function () {});
      }

      function waitForResources(node) {
        var fontsReady = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();
        return Promise.race([
          Promise.allSettled([fontsReady, waitForImages(node, 8000)]),
          new Promise(function (resolve) {
            setTimeout(resolve, 8000);
          })
        ]).then(function () {});
      }

      function addPagexCss() {
        var style = document.createElement("style");
        style.id = "wordex-pagex-style";
        var pageHeight = pageConfig.height || "297mm";
        style.textContent = [
          "body.wordex-generated-report { margin:0; background:#d8d8d8; }",
          "#wordex-report-source { display:none !important; }",
          "#wordex-pagex-output { display:block; }",
          ".pagex-pages { display:flex; flex-direction:column; align-items:center; gap:18px; padding:18px 0; background:#d8d8d8; }",
          ".pagex-page { position:relative; width:" + pageConfig.width + "; height:" + pageHeight + "; background:white; box-shadow:0 0 10px rgba(0,0,0,.35); overflow:hidden; box-sizing:border-box; display:flex; flex-direction:column; }",
          ".pagex-header,.pagex-footer,.pagex-body { position:relative; z-index:1; box-sizing:border-box; margin-left:" + mm(pageConfig.marginLeftMm) + "; margin-right:" + mm(pageConfig.marginRightMm) + "; min-height:0; min-width:0; }",
          ".pagex-header { flex:0 0 auto; overflow:visible; padding-top:1mm; margin-top:0; margin-bottom:0; }",
          ".pagex-body { flex:0 0 auto; min-height:0; overflow:hidden; margin-top:-8px; }",
          ".pagex-footer { flex:0 0 auto; overflow:visible; padding-bottom:1mm; display:flex; flex-direction:column; justify-content:flex-end; }",
          ".pagex-body .body-flow { min-height:0 !important; padding:0 !important; margin:0 !important; }",
          ".pagex-header .header-template,.pagex-footer .footer-template { padding:0 !important; margin:0 !important; border:none !important; background:transparent !important; overflow:visible !important; max-height:none !important; min-height:0 !important; }",
          ".pagex-body .paragraph-block,.pagex-body .object-block { break-inside:avoid; page-break-inside:avoid; }",
          ".pagex-header .paragraph-block,.pagex-header .object-block,.pagex-footer .paragraph-block,.pagex-footer .object-block { margin:8px 0; padding:2px; }",
          ".pagex-watermark { position:absolute; inset:0; z-index:2; pointer-events:none; user-select:none; display:flex; align-items:center; justify-content:center; overflow:visible; }",
          ".pagex-watermark img { display:block; width:auto; height:auto; max-width:80%; max-height:80%; object-fit:contain; }",
          "@media print { .pagex-pages { display:block; padding:0; background:white; gap:0; } .pagex-page { box-shadow:none; margin:0; page-break-after:always; } .pagex-page:last-child { page-break-after:auto; } }"
        ].join("\\n");
        document.head.appendChild(style);
      }

      function cleanSource(source) {
        if (!source) return;
        source.querySelectorAll(".wordex-continuous-watermark,.header-template,.footer-template").forEach(function (node) {
          node.remove();
        });
      }

      function createWatermark() {
        if (!watermarkConfig || !watermarkConfig.imageSrc) return null;
        var watermark = document.createElement("div");
        watermark.className = "pagex-watermark";
        watermark.style.opacity = String(Math.max(0, Math.min(1, Number(watermarkConfig.opacity) || 0.12)));
        var img = document.createElement("img");
        img.src = String(watermarkConfig.imageSrc || "");
        img.alt = String(watermarkConfig.imageName || "Marca d'água");
        img.draggable = false;
        img.style.width = String(watermarkConfig.width || "160mm");
        img.style.maxWidth = "80%";
        img.style.maxHeight = "80%";
        watermark.appendChild(img);
        return watermark;
      }

      function createPage(pages) {
        var page = document.createElement("div");
        page.className = "pagex-page";
        var watermark = createWatermark();
        var header = document.createElement("div");
        header.className = "pagex-header";
        var headerEl = htmlToElement(headerTemplateHtml);
        if (headerEl) header.appendChild(headerEl);
        var body = document.createElement("div");
        body.className = "pagex-body";
        var bodyFlow = document.createElement("div");
        bodyFlow.className = "region body-flow";
        body.appendChild(bodyFlow);
        var footer = document.createElement("div");
        footer.className = "pagex-footer";
        var footerEl = htmlToElement(footerTemplateHtml);
        if (footerEl) footer.appendChild(footerEl);
        page.appendChild(header);
        page.appendChild(body);
        page.appendChild(footer);
        if (watermark) page.appendChild(watermark);
        pages.appendChild(page);
        return { page: page, body: body, bodyFlow: bodyFlow };
      }

      function syncPageBodyArea(pageEl) {
        var body = pageEl.querySelector(".pagex-body");
        var header = pageEl.querySelector(".pagex-header");
        var footer = pageEl.querySelector(".pagex-footer");
        if (!body) return;

        void pageEl.offsetHeight;

        var pageHeight = pageEl.clientHeight;
        var headerHeight = header ? header.offsetHeight : 0;
        var footerHeight = footer ? footer.offsetHeight : 0;
        var headerMarginTop = header ? (parseFloat(window.getComputedStyle(header).marginTop) || 0) : 0;
        var headerMarginBottom = header ? (parseFloat(window.getComputedStyle(header).marginBottom) || 0) : 0;
        var bodyMarginTop = parseFloat(window.getComputedStyle(body).marginTop) || 0;
        var bodyMarginBottom = parseFloat(window.getComputedStyle(body).marginBottom) || 0;
        var available = Math.max(0, pageHeight - headerHeight - footerHeight - headerMarginTop - headerMarginBottom - bodyMarginTop - bodyMarginBottom);

        body.style.flex = "0 0 auto";
        body.style.height = available + "px";
        body.style.minHeight = "0";
        body.style.maxHeight = available + "px";
      }

      function layoutBlockChartOverlays(block) {
        if (!block) return;

        Array.prototype.slice.call(block.querySelectorAll(".wordex-chart-box")).forEach(function (chartBox) {
          layoutChartBarValueLabels(chartBox);
          layoutChartCategoryLabels(chartBox);
        });
      }

      function tightenMainObjectBlockHeights(block) {
        if (!block) {
          return;
        }

        var paragraph = block.querySelector(".paragraph");

        if (!paragraph) {
          return;
        }

        var mainObjects = block.querySelectorAll(".dynamic-image-box, .wordex-chart-box, .wordex-textbox");

        if (mainObjects.length !== 1) {
          return;
        }

        var object = mainObjects[0];
        var paragraphRect = paragraph.getBoundingClientRect();
        var objectRect = object.getBoundingClientRect();

        if (!objectRect.height) {
          return;
        }

        var blockY = paragraphRect.height > 0
          ? Math.max(0, Math.round(objectRect.top - paragraphRect.top))
          : (Number.parseInt(object.style.top, 10) || Number.parseInt(object.dataset.blockY, 10) || 0);
        var neededHeight = blockY + Math.ceil(objectRect.height) + 4;

        paragraph.style.minHeight = Math.max(18, neededHeight) + "px";
        block.style.minHeight = "";
      }

      function tightenAllMainObjectBlockHeights(root) {
        if (!root) {
          return;
        }

        Array.prototype.slice.call(root.querySelectorAll(".paragraph-block, .object-block")).forEach(function (block) {
          layoutBlockChartOverlays(block);
          tightenMainObjectBlockHeights(block);
        });
      }

      function collectNodePaintRects(nodes, rects) {
        Array.prototype.forEach.call(nodes || [], function (node) {
          var rect = node.getBoundingClientRect();

          if (rect.width > 0 || rect.height > 0) {
            rects.push(rect);
          }
        });
      }

      function getBlockLayoutBounds(block) {
        if (!block) {
          return { top: 0, bottom: 0, height: 0 };
        }

        void block.offsetHeight;

        var rects = [block.getBoundingClientRect()];

        collectNodePaintRects(block.querySelectorAll(
          ".dynamic-image-box, .wordex-chart-box, .wordex-textbox, table.wordex-table, [data-align='free']"
        ), rects);

        var top = Math.min.apply(null, rects.map(function (rect) { return rect.top; }));
        var bottom = Math.max.apply(null, rects.map(function (rect) { return rect.bottom; }));

        return {
          top: top,
          bottom: bottom,
          height: bottom - top
        };
      }

      function bodyHasBlockOverlap(body) {
        var flow = body.querySelector(".body-flow");

        if (!flow || flow.children.length < 2) {
          return false;
        }

        var children = Array.prototype.slice.call(flow.children);
        var previousMaxBottom = null;

        for (var i = 0; i < children.length; i++) {
          layoutBlockChartOverlays(children[i]);
          var bounds = getBlockLayoutBounds(children[i]);

          if (previousMaxBottom !== null && bounds.top < previousMaxBottom - 0.5) {
            return true;
          }

          previousMaxBottom = Math.max(previousMaxBottom || bounds.bottom, bounds.bottom);
        }

        return false;
      }

      function getBodyVisualBottom(body) {
        var flow = body.querySelector(".body-flow");

        if (!flow) {
          return 0;
        }

        var bodyRect = body.getBoundingClientRect();
        var bottom = bodyRect.top;

        Array.prototype.slice.call(flow.children).forEach(function (block) {
          layoutBlockChartOverlays(block);
          var bounds = getBlockLayoutBounds(block);
          bottom = Math.max(bottom, bounds.bottom);
        });

        return bottom - bodyRect.top;
      }

      function overflows(body) {
        void body.offsetHeight;

        if (body.scrollWidth > body.clientWidth + 1) {
          return true;
        }

        var maxHeight = parseFloat(body.style.maxHeight);
        if (!isFinite(maxHeight) || maxHeight <= 0) {
          maxHeight = body.clientHeight;
        }

        if (body.scrollHeight > maxHeight + 0.5) {
          return true;
        }

        if (getBodyVisualBottom(body) > maxHeight + 0.5) {
          return true;
        }

        if (bodyHasBlockOverlap(body)) {
          return true;
        }

        return false;
      }

      function getChartSvgViewBox(svg) {
        var attr = String(svg && svg.getAttribute ? svg.getAttribute("viewBox") || "" : "").trim();
        var parts = attr.split(/\s+/).map(Number);

        if (parts.length >= 4 && parts[2] > 0 && parts[3] > 0) {
          return { x: parts[0] || 0, y: parts[1] || 0, width: parts[2], height: parts[3] };
        }

        var base = svg && svg.viewBox ? svg.viewBox.baseVal : null;

        if (base && base.width > 0 && base.height > 0) {
          return { x: base.x || 0, y: base.y || 0, width: base.width, height: base.height };
        }

        return { x: 0, y: 0, width: 220, height: 100 };
      }

      function viewBoxPercentX(svg, x) {
        var viewBox = getChartSvgViewBox(svg);
        return ((Number(x) - viewBox.x) / viewBox.width) * 100;
      }

      function viewBoxPercentY(svg, y) {
        var viewBox = getChartSvgViewBox(svg);
        return ((Number(y) - viewBox.y) / viewBox.height) * 100;
      }

      function measureViewBoxWidthPx(svg, preview, widthViewBox) {
        var viewBox = getChartSvgViewBox(svg);
        var rect = preview ? preview.getBoundingClientRect() : null;

        if (!rect || !viewBox.width) return 0;

        return (Number(widthViewBox) || 0) * rect.width / viewBox.width;
      }

      function getChartViewBoxRenderedRect(svg, preview) {
        var viewBox = getChartSvgViewBox(svg);
        var previewRect = preview ? preview.getBoundingClientRect() : null;

        if (!previewRect || !viewBox.width || !viewBox.height) {
          return {
            left: 0,
            top: 0,
            width: preview ? preview.clientWidth : 0,
            height: preview ? preview.clientHeight : 0,
            scale: 1,
            viewBox: viewBox
          };
        }

        /*
          O SVG usa preserveAspectRatio="xMidYMid meet".
          Portanto, quando o preview é mais alto que o viewBox, sobra uma
          faixa vertical em cima/baixo. Percentual puro ignora essa faixa e
          joga os labels para longe das barras.
        */
        var scale = Math.min(previewRect.width / viewBox.width, previewRect.height / viewBox.height);
        var renderedWidth = viewBox.width * scale;
        var renderedHeight = viewBox.height * scale;

        return {
          left: (previewRect.width - renderedWidth) / 2,
          top: (previewRect.height - renderedHeight) / 2,
          width: renderedWidth,
          height: renderedHeight,
          scale: scale,
          viewBox: viewBox
        };
      }

      function mapChartViewBoxToPreviewBox(svg, preview, x, y) {
        if (svg && svg.createSVGPoint && typeof svg.getScreenCTM === "function" && preview && preview.isConnected) {
          var matrix = svg.getScreenCTM();
          var previewRect = preview.getBoundingClientRect();

          if (matrix && previewRect.width > 0 && previewRect.height > 0) {
            var point = svg.createSVGPoint();
            point.x = Number(x) || 0;
            point.y = Number(y) || 0;
            var mapped = point.matrixTransform(matrix);

            return {
              left: mapped.x - previewRect.left,
              top: mapped.y - previewRect.top,
              scale: getChartViewBoxRenderedRect(svg, preview).scale

          }
        }

        var box = getChartViewBoxRenderedRect(svg, preview);
        var viewBox = box.viewBox;

        return {

          top: box.top + ((Number(y) - viewBox.y) * box.scale),
          scale: box.scale
        };

      function mapChartPointToPreview(svg, preview, x, y) {
        var mapped = mapChartViewBoxToPreviewBox(svg, preview, x, y);

        if (!mapped || !isFinite(mapped.left) || !isFinite(mapped.top)) {
          return null;
        }

        return mapped;
      }

      function layoutChartBarValueLabels(chartBox) {
        var preview = chartBox ? chartBox.querySelector(".wordex-chart-preview") : null;
        var svg = preview ? preview.querySelector("svg") : null;
        var panel = preview ? preview.querySelector(".wordex-chart-value-labels") : null;

        if (!preview || !svg || !panel) {
          return;
        }

        var anchors = Array.prototype.slice.call(svg.querySelectorAll(".wordex-chart-bar, .wordex-chart-line-point"));
        var labels = Array.prototype.slice.call(panel.querySelectorAll(".wordex-chart-value-label"));
        var seriesCount = Number(panel.dataset.seriesCount) || 1;
        var zeroY = Number(panel.dataset.viewboxZeroY);
        var defaultSpanViewbox = Number(panel.dataset.anchorSpanViewbox);
        var chartValueLabelGapPx = 5;

        if (!anchors.length || anchors.length !== labels.length) {
          return;
        }

        var hasHorizontalStacked = anchors.some(function (anchor) {
          return anchor.dataset.horizontal === "1" && anchor.dataset.stacked === "1";
        });

        if (hasHorizontalStacked) {
          var gapPx = chartValueLabelGapPx;
          var slotPx = 42;
          var labelGapPx = 16;
          var categoryCount = Math.ceil(labels.length / Math.max(seriesCount, 1));

          labels.forEach(function (label) {
            label.classList.remove("is-hidden", "is-horizontal-bar", "is-horizontal-stacked", "is-vertical-stacked");
            label.classList.add("is-horizontal-stacked");
            label.style.visibility = "visible";
            label.style.position = "absolute";
            label.style.display = "inline-block";
            label.style.whiteSpace = "nowrap";
            label.style.textAlign = "left";
            label.style.writingMode = "horizontal-tb";
            label.style.textOrientation = "mixed";
            label.style.transform = "translate(0, -100%)";
            label.style.transformOrigin = "left top";
            label.style.margin = "0";
            label.style.padding = "0";
            label.style.lineHeight = "1";
          });

          for (var categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
            var startIndex = categoryIndex * seriesCount;
            var groupAnchors = anchors.slice(startIndex, startIndex + seriesCount);
            var groupLabels = labels.slice(startIndex, startIndex + seriesCount);
            var mappedRects = [];

            groupAnchors.forEach(function (anchor) {
              if (!anchor || anchor.dataset.horizontal !== "1" || anchor.dataset.stacked !== "1") {
                return;
              }

              var x = Number(anchor.getAttribute("x")) || 0;
              var y = Number(anchor.getAttribute("y")) || 0;
              var width = Number(anchor.getAttribute("width")) || 0;
              var height = Number(anchor.getAttribute("height")) || 0;
              var leftPoint = mapChartPointToPreview(svg, preview, x, y + height / 2);
              var rightPoint = mapChartPointToPreview(svg, preview, x + width, y + height / 2);
              var topPoint = mapChartPointToPreview(svg, preview, x, y);

              if (!leftPoint || !rightPoint || !topPoint) {
                return;
              }

              mappedRects.push({
                anchor: anchor,
                left: Math.min(leftPoint.left, rightPoint.left),
                right: Math.max(leftPoint.left, rightPoint.left),
                top: topPoint.top,
                negative: anchor.dataset.negative === "1"
              });
            });

            if (!mappedRects.length) {
              groupLabels.forEach(function (label) {
                if (label) label.classList.add("is-hidden");
              });
              continue;
            }

            var top = Math.min.apply(null, mappedRects.map(function (item) { return item.top; }));
            var zeroPoint = mapChartPointToPreview(svg, preview, isFinite(zeroY) ? zeroY : 0, 0);
            var zeroX = zeroPoint
              ? zeroPoint.left
              : mappedRects.reduce(function (sum, item) {
                  return sum + (item.left + item.right) / 2;
                }, 0) / mappedRects.length;

            var positiveLabelItems = [];
            var negativeLabelItems = [];

            groupLabels.forEach(function (label, seriesIndex) {
              var anchor = groupAnchors[seriesIndex];

              if (!label || !anchor) {
                return;
              }

              var item = { label: label, seriesIndex: seriesIndex };

              if (anchor.dataset.negative === "1") {
                negativeLabelItems.push(item);
              } else {
                positiveLabelItems.push(item);
              }
            });

            var positiveCursorX = zeroX + gapPx;

            positiveLabelItems.forEach(function (item) {
              var label = item.label;

              label.classList.remove("is-hidden");
              label.style.top = top + "px";
              label.style.left = positiveCursorX + "px";
              label.style.textAlign = "left";
              label.style.transform = "translate(0, -100%)";

              positiveCursorX += (label.offsetWidth || slotPx) + labelGapPx;
            });

            var negativeCursorRight = zeroX - gapPx;

            /*
              Negativos: seguem a ordem visual da barra da esquerda para a direita.
              O último percentual negativo fica com sua borda direita a 5px do eixo.
            */
            negativeLabelItems.forEach(function (item) {
              var label = item.label;
              var width = label.offsetWidth || slotPx;

              label.classList.remove("is-hidden");
              label.style.top = top + "px";
              label.style.left = (negativeCursorRight - width) + "px";
              label.style.textAlign = "left";
              label.style.transform = "translate(0, -100%)";

              negativeCursorRight -= width + labelGapPx;
            });
          }

          return;
        }

        var hasVerticalStacked = anchors.some(function (anchor) {
          return anchor.dataset.stacked === "1" && anchor.dataset.horizontal !== "1";
        });

        if (hasVerticalStacked) {
          var vGapPx = chartValueLabelGapPx;
          var vSlotPx = 42;
          var vLabelGapPx = 16;
          var vCategoryCount = Math.ceil(labels.length / Math.max(seriesCount, 1));

          labels.forEach(function (label) {
            label.classList.remove("is-hidden", "is-horizontal-bar", "is-horizontal-stacked", "is-vertical-stacked");
            label.classList.add("is-vertical-stacked");
            label.style.visibility = "visible";
            label.style.position = "absolute";
            label.style.display = "inline-block";
            label.style.whiteSpace = "nowrap";
            label.style.textAlign = "left";
            label.style.writingMode = "horizontal-tb";
            label.style.textOrientation = "mixed";
            label.style.transform = "translate(0, -100%)";
            label.style.transformOrigin = "left top";
            label.style.margin = "0";
            label.style.padding = "0";
            label.style.lineHeight = "1";
          });

          for (var vCategoryIndex = 0; vCategoryIndex < vCategoryCount; vCategoryIndex++) {
            var vStartIndex = vCategoryIndex * seriesCount;
            var vGroupAnchors = anchors.slice(vStartIndex, vStartIndex + seriesCount);
            var vGroupLabels = labels.slice(vStartIndex, vStartIndex + seriesCount);
            var vMappedRects = [];

            vGroupAnchors.forEach(function (anchor) {
              if (!anchor || anchor.dataset.stacked !== "1" || anchor.dataset.horizontal === "1") {
                return;
              }

              var x = Number(anchor.getAttribute("x")) || 0;
              var y = Number(anchor.getAttribute("y")) || 0;
              var width = Number(anchor.getAttribute("width")) || 0;
              var height = Number(anchor.getAttribute("height")) || 0;
              var centerPoint = mapChartPointToPreview(svg, preview, x + width / 2, y);
              var bottomPoint = mapChartPointToPreview(svg, preview, x + width / 2, y + height);

              if (!centerPoint || !bottomPoint) {
                return;
              }

              vMappedRects.push({
                anchor: anchor,
                x: centerPoint.left,
                top: Math.min(centerPoint.top, bottomPoint.top),
                bottom: Math.max(centerPoint.top, bottomPoint.top),
                negative: anchor.dataset.negative === "1"
              });
            });

            if (!vMappedRects.length) {
              vGroupLabels.forEach(function (label) {
                if (label) label.classList.add("is-hidden");
              });
              continue;
            }

            var zeroPointV = mapChartPointToPreview(svg, preview, 0, isFinite(zeroY) ? zeroY : 0);
            var zeroTop = zeroPointV
              ? zeroPointV.top
              : Math.max.apply(null, vMappedRects.map(function (item) { return item.bottom; }));

            var positiveRects = vMappedRects.filter(function (item) { return !item.negative; });
            var negativeRects = vMappedRects.filter(function (item) { return item.negative; });
            var positiveTop = positiveRects.length
              ? Math.min.apply(null, positiveRects.map(function (item) { return item.top; })) - vGapPx
              : zeroTop - vGapPx;
            var negativeTop = zeroTop - vGapPx;
            var baseX = vMappedRects.reduce(function (sum, item) { return sum + item.x; }, 0) / vMappedRects.length;

            var vPositiveLabelItems = [];
            var vNegativeLabelItems = [];

            vGroupLabels.forEach(function (label, seriesIndex) {
              var anchor = vGroupAnchors[seriesIndex];

              if (!label || !anchor) {
                return;
              }

              var item = { label: label, seriesIndex: seriesIndex };

              if (anchor.dataset.negative === "1") {
                vNegativeLabelItems.push(item);
              } else {
                vPositiveLabelItems.push(item);
              }
            });

            var placeCenteredRow = function (items, rowTop) {
              if (!items.length) {
                return;
              }

              var widths = items.map(function (item) { return item.label.offsetWidth || vSlotPx; });
              var totalWidth = widths.reduce(function (sum, width) { return sum + width; }, 0) +
                vLabelGapPx * Math.max(items.length - 1, 0);
              var cursorX = baseX - totalWidth / 2;

              items.forEach(function (item, index) {
                var label = item.label;

                label.classList.remove("is-hidden");
                label.style.top = rowTop + "px";
                label.style.left = cursorX + "px";
                label.style.textAlign = "left";
                label.style.transform = "translate(0, -100%)";

                cursorX += widths[index] + vLabelGapPx;
              });
            };

            if (vPositiveLabelItems.length && vNegativeLabelItems.length) {
              placeCenteredRow(
                vNegativeLabelItems.slice().reverse().concat(vPositiveLabelItems),
                positiveTop
              );
            } else {
              placeCenteredRow(vPositiveLabelItems, positiveTop);
              placeCenteredRow(vNegativeLabelItems.slice().reverse(), negativeTop);
            }
          }

          return;
        }

        labels.forEach(function (label) {
          label.classList.remove("is-hidden", "is-horizontal-bar", "is-horizontal-stacked", "is-vertical-stacked");
          label.style.visibility = "visible";
          label.style.position = "absolute";
          label.style.display = "inline-block";
          label.style.whiteSpace = "nowrap";
          label.style.textAlign = "center";
          label.style.writingMode = "horizontal-tb";
          label.style.textOrientation = "mixed";
        });

        anchors.forEach(function (anchor, index) {
          var label = labels[index];
          if (!label) return;

          var centerX = 0;
          var anchorY = 0;
          var spanViewbox = defaultSpanViewbox;
          var isLinePoint = anchor.classList.contains("wordex-chart-line-point");
          var isNegative = anchor.dataset.negative === "1";
          var isHorizontalBar = !isLinePoint && anchor.dataset.horizontal === "1";

          if (isLinePoint) {
            centerX = Number(anchor.getAttribute("cx")) || 0;
            var pointY = Number(anchor.getAttribute("cy")) || 0;
            anchorY = isNegative && isFinite(zeroY) ? zeroY : pointY;
          } else {
            var barX = Number(anchor.getAttribute("x")) || 0;
            var barWidth = Number(anchor.getAttribute("width")) || 0;
            var barY = Number(anchor.getAttribute("y")) || 0;
            var barHeight = Number(anchor.getAttribute("height")) || 0;

            if (isHorizontalBar) {
              var isStacked = anchor.dataset.stacked === "1";
              centerX = isStacked
                ? (isNegative ? barX : barX + barWidth)
                : (isFinite(zeroY) ? zeroY : (isNegative ? barX + barWidth : barX));
              anchorY = barY + barHeight / 2;
              spanViewbox = barHeight;
            } else {
              centerX = barX + barWidth / 2;
              anchorY = isNegative && isFinite(zeroY) ? zeroY : barY;
              spanViewbox = barWidth;
            }
          }

          var mapped = mapChartViewBoxToPreviewBox(svg, preview, centerX, anchorY);

          if (isHorizontalBar) {
            label.classList.add("is-horizontal-bar");
            label.style.transform = "translate(0, -50%)";
            label.style.transformOrigin = "left center";
            label.style.left = (mapped.left + (isNegative ? chartValueLabelGapPx : -chartValueLabelGapPx - label.offsetWidth)) + "px";
            label.style.top = mapped.top + "px";
          } else {
            label.style.transform = "translate(-50%, -50%) rotate(270deg)";
            label.style.transformOrigin = "center center";
            var rotatedVisualHeight = label.offsetWidth || 0;
            var offsetPx = rotatedVisualHeight / 2 + chartValueLabelGapPx;

            label.style.left = mapped.left + "px";
            label.style.top = (mapped.top - offsetPx) + "px";
          }

          var spanPx = isFinite(spanViewbox) ? spanViewbox * mapped.scale : 20 * mapped.scale;
          var bounds = label.getBoundingClientRect();
          var labelSpanPx = Math.max(bounds.width, bounds.height, 1);

          if (spanPx > 0 && (spanPx < 22 || labelSpanPx > spanPx * 1.35)) {
            label.classList.add("is-hidden");
          }
        });
      }

      function layoutChartCategoryLabels(chartBox) {

      function layoutAllChartOverlays(root) {
        if (!root) return;

          layoutChartBarValueLabels(chartBox);

        requestAnimationFrame(function () {
          layoutAllChartOverlays(root);

          requestAnimationFrame(function () {
            layoutAllChartOverlays(root);

        setTimeout(function () { layoutAllChartOverlays(root); }, 80);

      function paginateBlocks(source, output) {
        var originalBody = source.querySelector(".body-flow");
        if (!originalBody) return;
        output.innerHTML = "";
        var pages = document.createElement("div");
        pages.className = "pagex-pages";
        output.appendChild(pages);
        var blocks = Array.prototype.slice.call(originalBody.children).filter(function (node) {
          return node.nodeType === 1;
        });
        var current = createPage(pages);
        syncPageBodyArea(current.page);
        blocks.forEach(function (block) {
          var clone = block.cloneNode(true);
          current.bodyFlow.appendChild(clone);
          layoutBlockChartOverlays(clone);
          tightenMainObjectBlockHeights(clone);
          if (overflows(current.body) && current.bodyFlow.children.length > 1) {
            clone.remove();
            current = createPage(pages);
            syncPageBodyArea(current.page);
            current.bodyFlow.appendChild(clone);
          }
          if (overflows(current.body) && current.bodyFlow.children.length === 1) {
            clone.classList.add("wordex-pagex-block-too-large");
            clone.style.outline = "1px dashed #c00";
          }
        });
      }

      async function startPagex() {
        var source = document.getElementById("wordex-report-source");
        var output = document.getElementById("wordex-pagex-output");
        if (!source || !output) return;
        cleanSource(source);
        addPagexCss();
        await waitForResources(source);
        tightenAllMainObjectBlockHeights(source);
        paginateBlocks(source, output);
        scheduleChartOverlayRelayout(output);
        tightenAllMainObjectBlockHeights(output);
        await waitForResources(output);
        tightenAllMainObjectBlockHeights(source);
        paginateBlocks(source, output);
        scheduleChartOverlayRelayout(output);
        tightenAllMainObjectBlockHeights(output);
        document.body.classList.add("wordex-pagex-ready");
        document.documentElement.classList.add("wordex-pagex-ready");
        var pageCount = output.querySelectorAll(".pagex-page").length;
        setPagedStatus(pageCount === 1 ? "1 página pronta." : pageCount + " páginas prontas.");
        var pdfButton = document.getElementById("wordex-paged-pdf");
        var saveHtmlButton = document.getElementById("wordex-paged-save-html");
        if (pdfButton) pdfButton.disabled = false;
        if (saveHtmlButton) saveHtmlButton.disabled = false;
      }

      function applyTemplatePlaceholders(template, values) {
        return String(template || "").replace(/@@([A-Z0-9_]+)@@/g, function (match, key) {
          if (!Object.prototype.hasOwnProperty.call(values, key)) {
            return match;
          }

          return String(values[key] ?? "");
        });
      }

      function collectReportStyles() {
        var styleNode = document.getElementById("wordex-report-styles");
        return styleNode ? styleNode.textContent + "\\n" : "";
      }

      function readPagexConfig() {
        try {
          return JSON.parse(document.getElementById("wordex-pagex-config").textContent || "{}") || {};
        } catch (error) {
          return {};
        }
      }

      function sanitizeHtmlFileName(value) {
        var name = String(value || "").trim().replace(/[\\\\/:*?"<>|]+/g, "_");
        if (!name) return "Relatorio.html";
        if (!/\\.html$/i.test(name)) name += ".html";
        return name;
      }

      function saveMountedHtml() {
        if (!document.body.classList.contains("wordex-pagex-ready")) {
          alert("Aguarde a paginação terminar.");
          return;
        }

        var pagexOutput = document.getElementById("wordex-pagex-output");
        scheduleChartOverlayRelayout(pagexOutput);
        var config = readPagexConfig();
        var fileName = sanitizeHtmlFileName(config.htmlFileName || "Relatorio.html");
        var html = "<!DOCTYPE html>\\n" + document.documentElement.outerHTML;
        var blob = new Blob([html], { type: "text/html;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");

        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 1000);

        setPagedStatus("HTML salvo: " + fileName);
      }

      function fetchImageAsDataUrl(url) {
        var src = String(url || "").trim();

        if (!src || src.indexOf("data:") === 0) {
          return Promise.resolve("");
        }

        return fetch(src, {
          mode: "cors",
          credentials: "omit",
          cache: "force-cache"
        })
          .then(function (response) {
            if (!response.ok) {
              return "";
            }

            return response.blob();
          })
          .then(function (blob) {
            if (!blob || String(blob.type || "").indexOf("image/") !== 0) {
              return "";
            }

            return new Promise(function (resolve) {
              var reader = new FileReader();
              reader.onload = function () {
                resolve(String(reader.result || ""));
              };
              reader.onerror = function () {
                resolve("");
              };
              reader.readAsDataURL(blob);
            });
          })
          .catch(function () {
            return "";
          });
      }

      function rasterizeLoadedImageElement(img) {
        if (!img || !img.naturalWidth || !img.naturalHeight) {
          return "";
        }

        try {
          var canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext("2d").drawImage(img, 0, 0);
          return canvas.toDataURL("image/png");
        } catch (error) {
          return "";
        }
      }

      function loadImageAsDataUrl(url, useCrossOrigin) {
        return new Promise(function (resolve) {
          var src = String(url || "").trim();
          if (!src) {
            resolve("");
            return;
          }
          if (src.indexOf("data:") === 0) {
            resolve(src);
            return;
          }

          var img = new Image();
          if (useCrossOrigin) {
            img.crossOrigin = "anonymous";
          }

          img.onload = function () {
            resolve(rasterizeLoadedImageElement(img));
          };

          img.onerror = function () {
            resolve("");
          };

          img.src = src;
        });
      }

      function isProbablyCrossOriginUrl(url) {
        var src = String(url || "").trim();
        if (!src || src.indexOf("data:") === 0 || src.indexOf("blob:") === 0) {
          return false;
        }

        try {
          return new URL(src, window.location.href).origin !== window.location.origin;
        } catch (error) {
          return /^https?:/i.test(src);
        }
      }

      function omitUnembeddableImage(cloneImg, src) {
        if (!cloneImg) return;
        cloneImg.removeAttribute("src");
        cloneImg.removeAttribute("crossorigin");
        cloneImg.setAttribute("data-wordex-pdf-omitted", "1");
        cloneImg.style.visibility = "hidden";
        cloneImg.style.display = "none";
      }

      function resolveMappedImageDataUrl(src, imageDataUrlMap) {
        var text = String(src || "").trim();
        var map = imageDataUrlMap || {};

        if (!text) {
          return "";
        }

        if (map[text] && String(map[text]).indexOf("data:") === 0) {
          return String(map[text]);
        }

        return "";
      }

      async function preparePagexHtmlForPdf(root, imageDataUrlMap) {
        if (!root) return "";

        var clone = root.cloneNode(true);
        var liveImgs = root.querySelectorAll("img");
        var cloneImgs = clone.querySelectorAll("img");
        var tasks = [];

        for (var i = 0; i < liveImgs.length; i++) {
          (function (liveImg, cloneImg) {
            if (!cloneImg) return;

            tasks.push((async function () {
              var src = String(cloneImg.getAttribute("src") || liveImg.currentSrc || liveImg.src || "").trim();
              var mappedDataUrl = resolveMappedImageDataUrl(src, imageDataUrlMap);

              if (mappedDataUrl) {
                cloneImg.setAttribute("src", mappedDataUrl);
                cloneImg.removeAttribute("crossorigin");
                return;
              }

              var dataUrl = rasterizeLoadedImageElement(liveImg);
              if (dataUrl) {
                cloneImg.setAttribute("src", dataUrl);
                cloneImg.removeAttribute("crossorigin");
                return;
              }

              if (!src || src.indexOf("data:") === 0) return;

              if (isProbablyCrossOriginUrl(src)) {
                var fetchedDataUrl = await fetchImageAsDataUrl(src);
                if (fetchedDataUrl) {
                  cloneImg.setAttribute("src", fetchedDataUrl);
                  cloneImg.removeAttribute("crossorigin");
                  return;
                }

                omitUnembeddableImage(cloneImg, src);
                return;
              }

              var corsDataUrl = await loadImageAsDataUrl(src, true);
              if (corsDataUrl) {
                cloneImg.setAttribute("src", corsDataUrl);
                cloneImg.removeAttribute("crossorigin");
                return;
              }

              omitUnembeddableImage(cloneImg, src);
            })());
          })(liveImgs[i], cloneImgs[i]);
        }

        await Promise.all(tasks);
        return clone.innerHTML;
      }

      async function buildPdfViewerHtml(options) {
        var template = window.WORDEX_PDF_TEMPLATE;
        if (!template) {
          throw new Error("Template PDF indisponível. Volte ao editor e clique em Montar HTML novamente.");
        }

        if (!document.body.classList.contains("wordex-pagex-ready")) {
          throw new Error("Aguarde a paginação terminar.");
        }

        options = options || {};
        var pagexOutput = document.getElementById("wordex-pagex-output");
        var pagexStyle = document.getElementById("wordex-pagex-style");
        var config = readPagexConfig();
        var pdfTitle = String(config.pdfTitle || document.title || "Relatório Wordex").trim();
        var pdfFileName = String(config.pdfFileName || "Relatorio.pdf").trim();
        var imageDataUrlMap = config.imageDataUrlMap || {};
        var pdfConfig = JSON.stringify({
          fileName: pdfFileName,
          title: pdfTitle,
          imageDataUrlMap: imageDataUrlMap,
          returnBase64: !!options.returnBase64
        }).split("<\\\/").join("<\\\\/");

        var pagexHtml = "";

        if (pagexOutput) {
          scheduleChartOverlayRelayout(pagexOutput);
          await waitForImages(pagexOutput, 10000);
          pagexHtml = await preparePagexHtmlForPdf(pagexOutput, imageDataUrlMap);
        }

        return applyTemplatePlaceholders(template, {
          WORDEX_TITLE: pdfTitle,
          WORDEX_PDF_CONFIG: pdfConfig,
          WORDEX_PAGEX_HTML: pagexHtml,
          WORDEX_PAGEX_STYLE: pagexStyle ? pagexStyle.textContent : "",
          WORDEX_REPORT_STYLES: collectReportStyles()
        });
      }

      async function openPdfViewerTab() {
        try {
          var html = await buildPdfViewerHtml();
          var blob = new Blob([html], { type: "text/html;charset=utf-8" });
          var url = URL.createObjectURL(blob);
          var opened = window.open(url, "_blank");

          if (!opened) {
            window.location.href = url;
          }
        } catch (error) {
          alert(error.message);
        }
      }

      window.wordexBuildPdfHtml = buildPdfViewerHtml;

      function bindPagedToolbarActions() {
        var saveHtmlButton = document.getElementById("wordex-paged-save-html");
        var pdfButton = document.getElementById("wordex-paged-pdf");
        var closeButton = document.getElementById("wordex-paged-close");

        if (saveHtmlButton) {
          saveHtmlButton.addEventListener("click", saveMountedHtml);
        }

        if (pdfButton) {
          pdfButton.addEventListener("click", function () {
            openPdfViewerTab().catch(function (error) {
              alert("Erro ao gerar PDF: " + error.message);
            });
          });
        }

        if (closeButton) {
          closeButton.addEventListener("click", function () {
            window.close();
          });
        }
      }

      function initPagedDocument() {
        bindPagedToolbarActions();
        startPagex();
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initPagedDocument);
      } else {
        initPagedDocument();
      }
    }());
  </script>
  </body>
</html>
`;
