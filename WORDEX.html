        }

        return {
          source: "Wordex",
          kind: "blocks",
          version: "1.0",
          createdAt: new Date().toISOString(),
          region: context.region,
          blocks: [this.cloneBlockForClipboard(context.block)]
        };
      }

      serializeWordexClipboardPayload(payload) {
        return this.getWordexClipboardMarker() + "\n" + JSON.stringify(payload);
      }

      parseWordexClipboardText(text) {
        const source = String(text || "");
        const marker = this.getWordexClipboardMarker();

        if (!source.startsWith(marker)) {
          return null;
        }

        try {
          const payload = JSON.parse(source.slice(marker.length).trim());

          if (
            payload &&
            payload.source === "Wordex" &&
            payload.kind === "blocks" &&
            Array.isArray(payload.blocks)
          ) {
            return payload;
          }
        } catch (error) {
          console.warn("Clipboard Wordex inválido.", error);
        }

        return null;
      }

      copyPayloadToClipboardEvent(event, payload) {
        if (!event?.clipboardData || !payload) return false;

        const text = this.serializeWordexClipboardPayload(payload);
        event.clipboardData.setData("text/plain", text);
        event.clipboardData.setData("application/x-wordex-blocks", text);
        event.preventDefault();

        return true;
      }

      handleWordexCopyEvent(event) {
        if (this.hasNonCollapsedSelectionInsideEditor()) {
          return;
        }

        const payload = this.createWordexClipboardPayload();

        if (payload) {
          this.copyPayloadToClipboardEvent(event, payload);
        }
      }

      handleWordexCutEvent(event) {
        if (this.hasNonCollapsedSelectionInsideEditor()) {
          return;
        }

        const payload = this.createWordexClipboardPayload();

        if (this.copyPayloadToClipboardEvent(event, payload)) {
          this.removeSelectedWordexBlockAfterCut();
        }
      }

      handleWordexPasteEvent(event) {
        const text = event.clipboardData?.getData("application/x-wordex-blocks") ||
          event.clipboardData?.getData("text/plain") || "";

        const payload = this.parseWordexClipboardText(text);

        if (!payload) {
          return;
        }

        event.preventDefault();
        this.insertWordexClipboardPayload(payload);
      }

      removeSelectedWordexBlockAfterCut() {
        const context = this.getSelectedBlockContext();

        if (!context) return;

        context.blocks.splice(context.index, 1);
        this.ensureRequiredParagraphs();

        const remainingBlocks = this.wordexDocument[context.region] || [];
        const target = remainingBlocks[Math.min(context.index, remainingBlocks.length - 1)] ||
          remainingBlocks[context.index - 1] ||
          remainingBlocks.find(block => block.type === "paragraph") ||
          null;

        this.selected.region = context.region;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        if (target) {
          this.selectedBlockId = target.id;
          this.selectedParagraphId = target.type === "paragraph" ? target.id : null;
        } else {
          this.selectedBlockId = null;
          this.selectedParagraphId = null;
        }

        this.render();
        this.saveUndoStateIfChanged();
      }

      insertWordexClipboardPayload(payload) {
        if (!payload || !Array.isArray(payload.blocks) || payload.blocks.length === 0) {
          return;
        }

        this.syncCurrentEditingState();

        const context = this.getSelectedBlockContext();
        const targetRegion = context?.region || this.selected.region || "bodyFlow";

        if (!Array.isArray(this.wordexDocument[targetRegion])) {
          this.wordexDocument[targetRegion] = [];
        }

        const blocks = this.wordexDocument[targetRegion];
        const insertIndex = context ? context.index + 1 : blocks.length;
        const newBlocks = payload.blocks.map(block => this.cloneBlockForPaste(block));

        blocks.splice(insertIndex, 0, ...newBlocks);
        this.ensureRequiredParagraphs();

        const lastBlock = newBlocks[newBlocks.length - 1];
        this.selected.region = targetRegion;
        this.selectedBlockId = lastBlock.id;
        this.selectedParagraphId = lastBlock.type === "paragraph" ? lastBlock.id : null;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        this.render();

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.focusParagraphForTyping(paragraph);
        }

        this.saveUndoStateIfChanged();
      }

      deleteSelectedParagraph() {
        if (!this.selectedParagraphId) {
          alert("Selecione um parágrafo para excluir.");
          return;
        }

        this.syncCurrentEditingState();

        let region = this.selected.region;
        let blocks = this.wordexDocument[region] || [];
        let index = blocks.findIndex(block => block.id === this.selectedParagraphId);

        /*
          Segurança: se a região atual estiver defasada, procura o parágrafo
          nas três regiões.
        */
        if (index < 0) {
          for (const candidateRegion of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
            const candidateBlocks = this.wordexDocument[candidateRegion] || [];
            const candidateIndex = candidateBlocks.findIndex(block => block.id === this.selectedParagraphId);

            if (candidateIndex >= 0) {
              region = candidateRegion;
              blocks = candidateBlocks;
              index = candidateIndex;
              break;
            }
          }
        }

        if (index < 0) {
          alert("Parágrafo não encontrado.");
          return;
        }

        blocks.splice(index, 1);
        this.ensureRequiredParagraphs();

        let targetBlock = null;

        if (region === "bodyFlow") {
          const bodyBlocks = this.wordexDocument.bodyFlow || [];
          targetBlock =
            bodyBlocks[Math.min(index, bodyBlocks.length - 1)] ||
            bodyBlocks.find(block => block.type === "paragraph") ||
            null;
        } else {
          targetBlock =
            blocks[Math.min(index, blocks.length - 1)] ||
            blocks.find(block => block.type === "paragraph") ||
            null;
        }

        this.selected.region = region;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        if (targetBlock && targetBlock.type === "paragraph") {
          this.selectedParagraphId = targetBlock.id;
          this.selectedBlockId = targetBlock.id;
        } else {
          this.selectedParagraphId = null;
          this.selectedBlockId = null;
        }

        this.render();

        const targetElement = this.getSelectedParagraphElement();

        if (targetElement) {
          this.focusParagraphForTyping(targetElement, { placement: "end" });
        }
      }

      hasActiveParagraphCursor() {
        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph || !this.savedRange) return false;

        return paragraph.contains(this.savedRange.commonAncestorContainer);
      }

      isMainObjectNode(node) {
        return !!node?.matches?.(WordexEditor.mainObjectSelector);
      }

      isTextboxNode(node) {
        return !!node?.matches?.(".wordex-textbox");
      }

      paragraphHasMainObject(paragraphElement) {
        return !!paragraphElement?.querySelector(WordexEditor.mainObjectSelector);
      }

      getSelectedObjectParagraphElement() {
        if (this.selectedObject) {
          const paragraph = this.selectedObject.closest(".paragraph");

          if (paragraph && this.paragraphHasMainObject(paragraph)) {
            return paragraph;
          }
        }

        const selectedParagraph = this.getSelectedParagraphElement();

        if (selectedParagraph && this.paragraphHasMainObject(selectedParagraph)) {
          return selectedParagraph;
        }

        return null;
      }

      getSubParagraphInsertionTarget(options = {}) {
        const target = this.createSubParagraphForObjectInsertion(options);

        if (!target) {
          return null;
        }

        return target;
      }

      isSubParagraphEmptyForObjectInsertion(subParagraphElement) {
        if (!subParagraphElement?.matches?.(WordexEditor.subParagraphSelector)) {
          return false;
        }

        if (subParagraphElement.querySelector(WordexEditor.mainObjectSelector)) {
          return false;
        }

        return this.isParagraphVisuallyEmptyHtml(
          this.getCleanSubParagraphHtml(subParagraphElement)
        );
      }

      createSubParagraphForObjectInsertion(options = {}) {
        const shouldAlert = options.alert !== false;
        const paragraphElement = this.getSelectedParagraphElement();

        if (!paragraphElement || !this.selectedParagraphId) {
          if (shouldAlert) {
            alert("Selecione um parágrafo para inserir o objeto.");
          }

          return null;
        }

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (!block) {
          return null;
        }

        this.normalizeParagraphBlock(block);

        if (!this.paragraphContainerSelected && this.selectedSubParagraphId) {
          const selectedSub = paragraphElement.querySelector(
            `${WordexEditor.subParagraphSelector}[data-sub-paragraph-id="${this.selectedSubParagraphId}"]`
          );

          if (selectedSub && this.isSubParagraphEmptyForObjectInsertion(selectedSub)) {
            const regionElement = paragraphElement.closest(".region");

            return {
              paragraphElement,
              subParagraphElement: selectedSub,
              region: regionElement?.dataset?.region || this.selected.region
            };
          }
        }

        const emptySubs = this.getParagraphDirectSubParagraphElements(paragraphElement)
          .filter(sub => this.isSubParagraphEmptyForObjectInsertion(sub));

        if (emptySubs.length === 1) {
          const regionElement = paragraphElement.closest(".region");

          return {
            paragraphElement,
            subParagraphElement: emptySubs[0],
            region: regionElement?.dataset?.region || this.selected.region
          };
        }

        const referenceSub = block.subParagraphs[block.subParagraphs.length - 1];
        const newSub = this.createSubParagraph("", this.pickSubParagraphStyleForNewColumn(referenceSub?.style));

        block.subParagraphs.push(newSub);
        this.equalizeSubParagraphWidthsInBlock(block);

        const regionElement = paragraphElement.closest(".region");

        if (regionElement) {
          this.selected.region = regionElement.dataset.region;
        }

        this.selectedParagraphId = block.id;
        this.selectedBlockId = block.id;
        this.selectedSubParagraphId = newSub.id;
        this.paragraphContainerSelected = false;
        this.render();

        const refreshedParagraph = this.getSelectedParagraphElement();
        const subParagraphElement = refreshedParagraph?.querySelector(
          `${WordexEditor.subParagraphSelector}[data-sub-paragraph-id="${newSub.id}"]`
        );

        if (!refreshedParagraph || !subParagraphElement) {
          if (shouldAlert) {
            alert("Não foi possível criar o subparágrafo para o objeto.");
          }

          return null;
        }

        return {
          paragraphElement: refreshedParagraph,
          subParagraphElement,
          region: regionElement?.dataset?.region || this.selected.region
        };
      }

      ensureParagraphForInsertion() {
        const target = this.getSubParagraphInsertionTarget();

        return target?.paragraphElement || null;
      }

      insertMainObjectInNewParagraph(node) {
        const target = this.getSubParagraphInsertionTarget();

        if (!target) {
          return;
        }

        this.insertNodeInsideSubParagraph(
          node,
          target.subParagraphElement,
          target.paragraphElement
        );
      }

      getTextboxInsertionTarget() {
        const paragraphElement = this.getSelectedObjectParagraphElement();

        if (!paragraphElement) {
          return null;
        }

        const resolveSub = subParagraphElement => {
          if (
            !subParagraphElement ||
            !paragraphElement.contains(subParagraphElement) ||
            !subParagraphElement.querySelector(WordexEditor.mainObjectSelector)
          ) {
            return null;
          }

          const regionElement = paragraphElement.closest(".region");

          return {
            paragraphElement,
            subParagraphElement,
            region: regionElement?.dataset?.region || this.selected.region
          };
        };

        if (
          this.selectedObject?.matches?.(WordexEditor.mainObjectSelector) &&
          paragraphElement.contains(this.selectedObject)
        ) {
          const target = resolveSub(
            this.selectedObject.closest(WordexEditor.subParagraphSelector)
          );

          if (target) {
            return target;
          }
        }

        const selectedSub = this.getSelectedSubParagraphElement();

        if (
          this.selectedSubParagraphId &&
          !this.paragraphContainerSelected &&
          selectedSub &&
          paragraphElement.contains(selectedSub)
        ) {
          if (!selectedSub.querySelector(WordexEditor.mainObjectSelector)) {
            return { emptySubParagraphSelected: true };
          }

          return resolveSub(selectedSub);
        }

        if (this.paragraphContainerSelected || !this.selectedSubParagraphId) {
          for (const subParagraphElement of paragraphElement.querySelectorAll(
            WordexEditor.subParagraphSelector
          )) {
            const target = resolveSub(subParagraphElement);

            if (target) {
              return target;
            }
          }
        }

        return null;
      }

      insertTextboxIntoObjectParagraph(node) {
        const paragraphElement = this.getSelectedObjectParagraphElement();

        if (!paragraphElement) {
          alert("Selecione um parágrafo com objeto (imagem, histograma ou tabela) para inserir o textbox.");
          return;
        }

        if (!this.selectedParagraphId) {
          alert("Selecione um parágrafo para inserir o textbox.");
          return;
        }

        if (paragraphElement.dataset.blockId !== this.selectedParagraphId) {
          alert("Selecione o parágrafo do objeto antes de inserir o textbox.");
          return;
        }

        const target = this.getTextboxInsertionTarget();

        if (target?.emptySubParagraphSelected) {
          alert(
            "O textbox só pode ser inserido no subparágrafo do objeto. Selecione a coluna com imagem, histograma ou tabela."
          );
          return;
        }

        if (!target?.subParagraphElement) {
          alert("Selecione o subparágrafo que contém o objeto (imagem, histograma ou tabela).");
          return;
        }

        this.insertNodeInsideObjectParagraph(
          node,
          target.subParagraphElement,
          target.paragraphElement
        );
      }

      insertNodeInsideObjectParagraph(node, subParagraphElement, paragraphElement) {
        if (!paragraphElement || !subParagraphElement || !node) {
          return;
        }

        this.saveUndoCheckpointForParagraph(paragraphElement);
        this.applyAlignment(node, "free");
        subParagraphElement.appendChild(node);
        this.applyObjectFreePosition(node, subParagraphElement, 0, 0);
        this.updateFreeContainerBounds(subParagraphElement);
        this.limitObjectWidthToParagraph(node);
        this.selectedSubParagraphId = subParagraphElement.dataset.subParagraphId;
        this.syncParagraphElement(paragraphElement);
        this.selectObject(node);
        this.saveUndoStateIfChanged();
      }

      normalizeMacroName(value) {
        const text = String(value || "").trim();
        const match = text.match(/^\{\{\s*(.*?)\s*\}\}$/);
        return (match ? match[1] : text).trim();
      }

      formatMacroName(value, fallback = "Macro") {
        const name = this.normalizeMacroName(value) || fallback;
        return "{{" + name + "}}";
      }

      getSelectedJsonCollectionName() {
        const collectionSelect = document.getElementById("jsonCollection");
        const value = String(collectionSelect?.value || "").trim();
        return value || "ROOT";
      }

      getSelectedJsonMacroName() {
        const fieldSelect = document.getElementById("jsonMacroField");
        return this.normalizeMacroName(fieldSelect?.value || "");
      }

      getJsonMacroCollectionOptions() {
        return this.getAllReportDatasources().map(item => ({
          name: item.path,
          label: item.label
        }));
      }

      getLockedTableCollectionOptions(collectionName) {
        const normalized = String(collectionName || "ROOT").trim() || "ROOT";
        const match = this.getJsonMacroCollectionOptions().find(item => item.name === normalized);

        return [{
          name: normalized,
          label: match?.label || normalized
        }];
      }

      getTableRowMacroCollectionName(table, row) {
        const rowDatasource = this.getTableRowDatasource(row);

        if (rowDatasource) {
          return rowDatasource;
        }

        return "ROOT";
      }

      getTableCollectionName(cell) {
        const table = cell?.closest?.("table.wordex-table");

        if (!table) {
          return "ROOT";
        }

        const row = cell?.closest?.("tr");

        if (row) {
          return this.getTableRowMacroCollectionName(table, row);
        }

        return "ROOT";
      }

      getImageMacroContext(target = null) {
        if (!target) {
          const cell = this.getSelectedCellForInsertion();
          const table = cell?.closest?.("table.wordex-table") || null;

          if (table) {
            return {
              collectionName: this.getTableCollectionName(cell),
              inTableCell: true,
              table
            };
          }

          return { collectionName: "ROOT", inTableCell: false, table: null };
        }

        const node = target.matches?.(".dynamic-image-box, td")
          ? target
          : (target.closest?.(".dynamic-image-box, td") || target);
        const cell = node.matches?.("td") ? node : node.closest?.("td");
        const table = cell?.closest?.("table.wordex-table") || null;

        if (table) {
          return {
            collectionName: this.getTableCollectionName(cell),
            inTableCell: true,
            table
          };
        }

        return { collectionName: "ROOT", inTableCell: false, table: null };
      }

      getChartMacroContext(target = null) {
        if (!target) {
          const cell = this.getSelectedCellForInsertion();
          const table = cell?.closest?.("table.wordex-table") || null;

          if (table) {
            return {
              collectionName: this.getTableCollectionName(cell),
              inTableCell: true,
              table
            };
          }

          return { collectionName: "ROOT", inTableCell: false, table: null };
        }

        const node = target.matches?.(".wordex-chart-box, td")
          ? target
          : (target.closest?.(".wordex-chart-box, td") || target);
        const cell = node.matches?.("td") ? node : node.closest?.("td");
        const table = cell?.closest?.("table.wordex-table") || null;

        if (table) {
          return {
            collectionName: this.getTableCollectionName(cell),
            inTableCell: true,
            table
          };
        }

        return { collectionName: "ROOT", inTableCell: false, table: null };
      }

      isChartHistogramCollectionName(collectionName) {
        const name = String(collectionName || "").trim();

        if (!name || name === "ROOT") {
          return false;
        }

        const root = this.getReportDataRootRecord();

        if (!root || name.includes(".")) {
          return false;
        }

        return this.isHistogramChartSource(root[name]);
      }

      getReportChartCollectionOptions(context) {
        if (!this.getReportDataRootRecord()) {
          return [];
        }

        if (context?.inTableCell && context.collectionName) {
          return this.getLockedTableCollectionOptions(context.collectionName);
        }

        const options = [{ name: "ROOT", label: "ROOT" }];

        this.getReportDatasourcesInParent("ROOT", "graph").forEach(item => {
          options.push({ name: item.path, label: item.label });
        });

        return options;
      }

      isImageMacroToolbarActive() {
        const image = this.selectedObject;

        if (!image?.matches?.(".dynamic-image-box") || !this.documentElement.contains(image)) {
          return false;
        }

        if (image.classList.contains("selected-object")) {
          return true;
        }

        if (document.activeElement?.closest?.(".dynamic-image-box") === image) {
          return true;
        }

        const selection = window.getSelection();

        if (!selection?.rangeCount) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !!element && image.contains(element);
      }

      isChartMacroToolbarActive() {
        const chartBox = this.selectedObject;

        if (!chartBox?.matches?.(".wordex-chart-box") || !this.documentElement.contains(chartBox)) {
          return false;
        }

        if (chartBox.classList.contains("selected-object")) {
          return true;
        }

        if (document.activeElement?.closest?.(".wordex-chart-box") === chartBox) {
          return true;
        }

        const selection = window.getSelection();

        if (!selection?.rangeCount) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !!element && chartBox.contains(element);
      }

      syncJsonMacroPickerForChartContext(options = {}) {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const hasData = !!this.getReportDataRootRecord();
        const context = this.getChartMacroContext(this.selectedObject);
        const sourceName = String(this.selectedObject?.dataset?.sourceName || "").trim();
        const preferredCollection = context.inTableCell
          ? context.collectionName
          : (this.isChartHistogramCollectionName(sourceName) ? sourceName : "ROOT");

        this.jsonMacroKindFilter = null;

        if (collectionSelect) {
          if (hasData) {
            const collections = this.getReportChartCollectionOptions(context);
            const nextCollection = this.renderJsonCollectionSelect(
              collectionSelect,
              collections,
              preferredCollection,
              { force: !!options.forceCollectionRebuild }
            );

            collectionSelect.disabled = context.inTableCell;
            this.populateJsonMacroFieldSelect(nextCollection, { mode: "chart" });

            if (
              fieldSelect &&
              !this.isChartHistogramCollectionName(nextCollection) &&
              sourceName
            ) {
              this.suppressJsonMacroAutoInsert = true;
              fieldSelect.value = [...fieldSelect.options].some(option => option.value === sourceName)
                ? sourceName
                : "";
              this.suppressJsonMacroAutoInsert = false;
            }
          } else {
            collectionSelect.innerHTML = '<option value="">Coleção</option>';
            collectionSelect.disabled = true;
          }
        }

        if (fieldSelect && !hasData) {
          fieldSelect.innerHTML = '<option value="">Histograma</option>';
          fieldSelect.disabled = true;
        }
      }

      getAllowedImageMacroFields(context) {
        const collectionName = context?.collectionName || "ROOT";

        return this.getMacroFieldsForCollection(collectionName, {
          allowedKinds: WordexEditor.imageMacroKinds
        });
      }

      getImageDialogCollectionOptions(context) {
        const collectionName = context?.collectionName || "ROOT";
        const items = context?.table
          ? this.getLockedTableCollectionOptions(collectionName)
          : this.getReportDataCollections();

        return items.map(item => ({
          path: item.name,
          label: item.label
        }));
      }

      renderImageFieldOptions(collectionName, selectedValue = "") {
        const sample = this.getSampleValueForCollection(collectionName);
        const fields = this.getMacroFieldsForCollection(collectionName, {
          allowedKinds: WordexEditor.imageMacroKinds
        });

        return fields.map(fieldName => {
          const selected = fieldName === selectedValue ? " selected" : "";
          const label = sample
            ? this.formatMacroFieldOption(fieldName, sample)
            : fieldName;

          return `<option value="${this.escapeHtml(fieldName)}"${selected}>${this.escapeHtml(label)}</option>`;
        }).join("");
      }

      isAllowedImageMacroField(macroField, context) {
        const normalized = this.normalizeMacroName(macroField);

        if (!normalized) {
          return false;
        }

        return this.getAllowedImageMacroFields(context).includes(normalized);
      }

      syncJsonMacroPickerForImageContext(context) {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const collectionName = context?.collectionName || "ROOT";
        const hasData = !!this.getReportDataRootRecord();

        if (collectionSelect) {
          if (hasData) {
            const collections = context.table
              ? this.getLockedTableCollectionOptions(collectionName)
              : this.getReportDataCollections();

            this.renderJsonCollectionSelect(collectionSelect, collections, collectionName);
          } else {
            collectionSelect.innerHTML = '<option value="ROOT">ROOT</option>';
          }

          collectionSelect.value = collectionName;
          collectionSelect.disabled = true;
        }

        if (fieldSelect) {
          fieldSelect.disabled = !hasData;

          if (hasData) {
            this.populateJsonMacroFieldSelect(collectionName, {
              allowedKinds: WordexEditor.imageMacroKinds
            });
          } else {
            fieldSelect.innerHTML = '<option value="">Campo</option>';
          }
        }
      }

      releaseJsonMacroPickerFromImageContext() {
        this.jsonMacroKindFilter = null;
        this.updateJsonMacroToolbar();
      }

      isObjectParagraphMacroContext() {
        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        const objectParagraph = this.getSelectedObjectParagraphElement();

        if (objectParagraph && this.documentElement.contains(objectParagraph)) {
          return true;
        }

        if (!this.selectedBlockId || this.selectedParagraphId) {
          return false;
        }

        const block = this.findBlockById(this.selectedBlockId);

        if (!block || block.type === "paragraph") {
          return false;
        }

        if (this.selectedObject?.matches?.(".wordex-table")) {
          return false;
        }

        return block.type === "chart" ||
          block.type === "dynamicImage" ||
          block.type === "staticImage";
      }

      getTextboxFromRange(range) {
        if (!range) {
          return null;
        }

        const node = range.commonAncestorContainer;
        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        const textbox = element?.closest?.(".wordex-textbox") || null;

        return textbox && this.documentElement.contains(textbox) ? textbox : null;
      }

      getTextboxForMacroInsertion() {
        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          return activeTextbox;
        }

        if (
          this.macroInsertionTargetTextbox?.matches?.(".wordex-textbox") &&
          this.documentElement.contains(this.macroInsertionTargetTextbox)
        ) {
          return this.macroInsertionTargetTextbox;
        }

        const textboxFromSavedRange = this.getTextboxFromRange(this.savedRange);

        if (textboxFromSavedRange) {
          return textboxFromSavedRange;
        }

        const selection = window.getSelection();

        if (selection?.rangeCount) {
          const textboxFromSelection = this.getTextboxFromRange(selection.getRangeAt(0));

          if (textboxFromSelection) {
            return textboxFromSelection;
          }
        }

        if (
          this.selectedObject?.matches?.(".wordex-textbox") &&
          this.documentElement.contains(this.selectedObject)
        ) {
          return this.selectedObject;
        }

        return null;
      }

      prepareMacroInsertionTarget(event) {
        const textbox = this.getTextboxForMacroInsertion();

        if (textbox) {
          this.macroInsertionTargetTextbox = textbox;
        }

        event?.stopPropagation?.();
      }

      isTextboxMacroInsertionActive() {
        return !!this.getTextboxForMacroInsertion();
      }

      isParagraphSelectedForMacroContext() {
        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        if (this.isObjectParagraphMacroContext()) {
          if (this.isImageMacroToolbarActive() || this.isChartMacroToolbarActive()) {
            return false;
          }

          return this.isTextboxMacroInsertionActive();
        }

        if (!this.selectedParagraphId) {
          return false;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (this.paragraphHasMainObject(paragraph)) {
          return this.isTextboxMacroInsertionActive();
        }

        const selection = window.getSelection();
        const range = selection?.rangeCount ? selection.getRangeAt(0) : this.savedRange;

        if (range && this.getTableCellFromRange(range)) {
          return false;
        }

        return true;
      }

      isParagraphMacroToolbarActive() {
        if (this.isImageMacroToolbarActive()) {
          return false;
        }

        if (this.isChartMacroToolbarActive()) {
          return false;
        }

        if (this.getActiveTableForMacroContext()) {
          return false;
        }

        return this.isParagraphSelectedForMacroContext();
      }

      syncJsonMacroPickerForParagraphContext() {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const hasData = !!this.getReportDataRootRecord();

        this.jsonMacroKindFilter = null;

        if (collectionSelect) {
          if (hasData) {
            this.renderJsonCollectionSelect(
              collectionSelect,
              [{ name: "ROOT", label: "ROOT" }],
              "ROOT"
            );
          } else {
            collectionSelect.innerHTML = '<option value="ROOT">ROOT</option>';
          }

          collectionSelect.value = "ROOT";
          collectionSelect.disabled = true;
        }

        if (fieldSelect) {
          fieldSelect.disabled = false;
          this.populateJsonMacroFieldSelect("ROOT", { includeSystemMacros: true });
        }
      }

      requireAllowedImageMacroField(context, message) {
        if (!this.getReportDataRootRecord()) {
          return null;
        }

        const macroField = this.getSelectedJsonMacroName();

        if (!macroField) {
          if (message) {
            alert(message);
          }

          return null;
        }

        if (!this.isAllowedImageMacroField(macroField, context)) {
          const scopeLabel = context.inTableCell
            ? `coleção ${context.collectionName}`
            : "ROOT";

          alert(
            `A imagem só aceita macros do tipo image em ${scopeLabel}. ` +
            `Selecione um campo válido na toolbar Dados.`
          );
          return null;
        }

        return macroField;
      }

      closeInsertDynamicImageDialog() {
        if (this.insertDynamicImageDialogBackdrop?.parentNode) {
          this.insertDynamicImageDialogBackdrop.parentNode.removeChild(this.insertDynamicImageDialogBackdrop);
        }

        this.insertDynamicImageDialogBackdrop = null;
      }

      openInsertDynamicImageDialog() {
        const context = this.getImageMacroContext();
        const collectionName = context.collectionName || "ROOT";
        const collections = this.getImageDialogCollectionOptions(context);
        const imageFields = this.getAllowedImageMacroFields(context);

        if (!imageFields.length) {
          const scopeLabel = context.inTableCell ? context.collectionName : "ROOT";
          alert(`Nenhum campo image disponível em ${scopeLabel}.`);
          return;
        }

        this.closeInsertDynamicImageDialog();

        const defaultField = imageFields.length === 1 ? imageFields[0] : "";
        const backdrop = document.createElement("div");
        backdrop.className = "wordex-chart-data-dialog-backdrop";
        backdrop.innerHTML = `
          <div class="wordex-chart-data-dialog" role="dialog" aria-modal="true" aria-labelledby="wordex-insert-image-title">
            <h2 id="wordex-insert-image-title">Inserir Imagem (JSON)</h2>
            <div class="wordex-chart-data-dialog-fields">
              <label>Coleção
                <select id="wordexInsertImageCollection" ${context.table || !context.inTableCell ? "disabled" : ""}>
                  ${this.renderCollectionPathOptions(collections, collectionName)}
                </select>
              </label>
              <label>Campo image
                <select id="wordexInsertImageField">
                  <option value="">Selecione...</option>
                  ${this.renderImageFieldOptions(collectionName, defaultField)}
                </select>
              </label>
            </div>
            <div class="wordex-chart-data-dialog-actions">
              <button type="button" id="wordexInsertImageCancel">Cancelar</button>
              <button type="button" class="primary" id="wordexInsertImageConfirm">Inserir</button>
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);
        this.insertDynamicImageDialogBackdrop = backdrop;

        const collectionSelect = backdrop.querySelector("#wordexInsertImageCollection");
        const fieldSelect = backdrop.querySelector("#wordexInsertImageField");

        const refreshImageFields = () => {
          const nextCollection = String(collectionSelect?.value || collectionName).trim() || collectionName;
          const fields = this.getMacroFieldsForCollection(nextCollection, {
            allowedKinds: WordexEditor.imageMacroKinds
          });
          const previousValue = String(fieldSelect?.value || "").trim();

          if (!fieldSelect) {
            return;
          }

          fieldSelect.innerHTML = fields.length
            ? `<option value="">Selecione...</option>${this.renderImageFieldOptions(
              nextCollection,
              fields.includes(previousValue) ? previousValue : (fields.length === 1 ? fields[0] : "")
            )}`
            : '<option value="">Nenhum campo image</option>';
        };

        collectionSelect?.addEventListener("change", () => {
          const nextCollection = String(collectionSelect.value || "ROOT").trim() || "ROOT";

          if (!context.inTableCell && nextCollection !== "ROOT") {
            collectionSelect.value = "ROOT";
            alert("Imagens fora de tabela só podem vir de ROOT.");
            return;
          }

          if (context.inTableCell && nextCollection !== context.collectionName) {
            collectionSelect.value = context.collectionName;
            alert(`Imagens neste contexto só podem vir da coleção ${context.collectionName}.`);
            return;
          }

          refreshImageFields();
        });

        backdrop.querySelector("#wordexInsertImageCancel")?.addEventListener("click", () => {
          this.closeInsertDynamicImageDialog();
        });

        backdrop.addEventListener("click", event => {
          if (event.target === backdrop) {
            this.closeInsertDynamicImageDialog();
          }
        });

        backdrop.querySelector("#wordexInsertImageConfirm")?.addEventListener("click", () => {
          const macroField = String(fieldSelect?.value || "").trim();
          const selectedCollection = String(collectionSelect?.value || collectionName).trim() || collectionName;
          const confirmContext = {
            ...context,
            collectionName: selectedCollection
          };

          if (!macroField) {
            alert("Selecione um campo image.");
            return;
          }

          if (!this.isAllowedImageMacroField(macroField, confirmContext)) {
            alert("Campo image inválido para o contexto atual.");
            return;
          }

          this.closeInsertDynamicImageDialog();

          const image = this.createDynamicImageElement(macroField, "left", "80mm", "45mm");
          this.insertNodeAtCurrentInsertionPoint(image);

          if (image.isConnected) {
            this.prefetchReportImageDataUrls(this.reportData)
              .then(() => this.previewDynamicImageBox(image))
              .catch(() => this.previewDynamicImageBox(image));
          }
        });
      }

      insertDynamicImage() {
        if (!this.getReportDataRootRecord()) {
          alert("Carregue o JSON antes de inserir imagem.");
          return;
        }

        this.openInsertDynamicImageDialog();
      }

      applyMacroFieldToImageBox(imageBox, macroField) {
        if (!imageBox?.matches?.(".dynamic-image-box") || !macroField) {
          return null;
        }

        const context = this.getImageMacroContext(imageBox);

        if (!this.isAllowedImageMacroField(macroField, context)) {
          const scopeLabel = context.inTableCell
            ? `coleção ${context.collectionName}`
            : "ROOT";

          alert(
            `Esta imagem só aceita macros do tipo image em ${scopeLabel}.`
          );
          this.syncJsonMacroPickerForImageContext(context);
          return null;
        }

        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = macroField;
        delete imageBox.dataset.imageName;
        delete imageBox.dataset.wordexMaterialized;
        imageBox.innerHTML = "{{" + this.escapeHtml(macroField) + "}}";

        const cell = imageBox.closest("td");

        if (cell) {
          this.fitObjectInTableCell(imageBox, cell);
        } else {
          this.limitObjectWidthToParagraph(imageBox);

          const paragraph = imageBox.closest(".paragraph");

          if (paragraph) {
            this.updateFreeContainerBounds(paragraph);
          }
        }

        this.syncObjectAfterChange(imageBox);
        this.previewDynamicImageBox(imageBox);
        this.selectObject(imageBox);
        return imageBox;
      }

      insertChart() {
        const chartType = this.getSelectedChartInsertType();
        const chartMode = this.getSelectedChartMode();
        const chartBox = this.createChartElement("", chartType, "left", "100mm", "60mm");

        chartBox.dataset.chartMode = chartMode;

        this.insertNodeAtCurrentInsertionPoint(chartBox);
      }

      getSelectedChartInsertType() {
        return document.getElementById("chartHorizontal")?.checked ? "hbar" : "bar";
      }

      getSelectedChartMode() {
        return String(document.getElementById("chartMode")?.value || "normal");
      }

      applyChartTypeFromToolbar() {
        const chartBox = this.getLiveSelectedObject?.();

        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        chartBox.dataset.chartType = this.getSelectedChartInsertType();
        this.updateChartBoxPresentation(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
      }



      applyChartModeFromToolbar() {
        const chartBox = this.getLiveSelectedObject?.();

        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        chartBox.dataset.chartMode = this.getSelectedChartMode();
        this.updateChartBoxPresentation(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
      }
      getChartTextStyle(chartBox) {
        return {
          fontFamily: chartBox?.dataset?.chartFontFamily || chartBox?.style?.fontFamily || "Arial",
          fontSize: chartBox?.dataset?.chartFontSize || chartBox?.style?.fontSize || "12pt",
          color: chartBox?.dataset?.chartFontColor || chartBox?.style?.color || "#444444",
          fontWeight: chartBox?.dataset?.chartFontWeight || chartBox?.style?.fontWeight || "normal",
          fontStyle: chartBox?.dataset?.chartFontStyle || chartBox?.style?.fontStyle || "normal",
          textDecoration: chartBox?.dataset?.chartTextDecoration ||
            chartBox?.style?.textDecorationLine ||
            chartBox?.style?.textDecoration ||
            "none"
        };
      }

      applyChartTextStyle(chartBox, style = {}) {
        if (!chartBox?.matches?.(".wordex-chart-box") || !style) {
          return;
        }

        const current = this.getChartTextStyle(chartBox);
        const next = { ...current, ...style };

        chartBox.dataset.chartFontFamily = String(next.fontFamily || "Arial");
        chartBox.dataset.chartFontSize = String(next.fontSize || "12pt");
        chartBox.dataset.chartFontColor = String(next.color || "#444444");
        chartBox.dataset.chartFontWeight = String(next.fontWeight || "normal");
        chartBox.dataset.chartFontStyle = String(next.fontStyle || "normal");
        chartBox.dataset.chartTextDecoration = String(next.textDecoration || "none");

        [
          "font-family",
          "font-size",
          "color",
          "font-weight",
          "font-style",
          "text-decoration",
          "text-decoration-line"
        ].forEach(property => {
          chartBox.style.removeProperty(property);
        });
      }

      migrateChartTextStyleFromInline(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        const hasInlineTypography = !!(
          chartBox.style.fontFamily ||
          chartBox.style.fontSize ||
          chartBox.style.color ||
          chartBox.style.fontWeight ||
          chartBox.style.fontStyle ||
          chartBox.style.textDecoration ||
          chartBox.style.textDecorationLine
        );

        if (!hasInlineTypography) {
          return;
        }

        this.applyChartTextStyle(chartBox, {
          fontFamily: chartBox.style.fontFamily,
          fontSize: chartBox.style.fontSize,
          color: chartBox.style.color,
          fontWeight: chartBox.style.fontWeight,
          fontStyle: chartBox.style.fontStyle,
          textDecoration: chartBox.style.textDecorationLine || chartBox.style.textDecoration
        });
      }

      normalizeFontFamilyForSelect(fontFamily) {
        const primary = String(fontFamily || "Arial")
          .split(",")[0]
          .trim()
          .replace(/^['"]|['"]$/g, "");
        const select = document.getElementById("fontFamily");

        if (select && Array.from(select.options).some(option => option.value === primary)) {
          return primary;
        }

        return "Arial";
      }

      normalizeFontSizeForSelect(fontSize) {
        const value = String(fontSize || "12pt").trim();
        const select = document.getElementById("fontSize");

        if (select && Array.from(select.options).some(option => option.value === value)) {
          return value;
        }

        const pt = Number.parseFloat(value.replace("pt", "").replace(",", "."));

        if (Number.isFinite(pt)) {
          return `${Math.round(pt)}pt`;
        }

        return "12pt";
      }

      normalizeColorForInput(color) {
        const value = String(color || "#444444").trim();

        if (/^#[0-9a-f]{3,8}$/i.test(value)) {
          if (value.length === 4) {
            return `#${value[1]}${value[1]}${value[2]}${value[2]}${value[3]}${value[3]}`;
          }

          return value;
        }

        const match = value.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/i);

        if (match) {
          return `#${[match[1], match[2], match[3]]
            .map(part => Number(part).toString(16).padStart(2, "0"))
            .join("")}`;
        }

        return "#444444";
      }

      normalizeBorderWidthForSelect(width) {
        const select = document.getElementById("borderWidth");
        const value = String(width || "1px").trim().toLowerCase();
        const px = Math.round(parseFloat(value.replace("px", "")) || 0);
        const candidate = px <= 0 ? "0" : `${px}px`;

        if (select && Array.from(select.options).some(option => option.value === candidate)) {
          return candidate;
        }

        return "1px";
      }

      normalizeBorderStyleForSelect(style) {
        const select = document.getElementById("borderStyle");
        const value = String(style || "solid").trim().toLowerCase();

        if (select && Array.from(select.options).some(option => option.value === value)) {
          return value;
        }

        return "solid";
      }

      normalizeBorderRadiusForSelect(radius) {
        const select = document.getElementById("borderRadius");
        const normalized = this.normalizeBorderRadius(radius) || "0";

        if (select && Array.from(select.options).some(option => option.value === normalized)) {
          return normalized;
        }

        return normalized === "0" ? "0" : "4px";
      }

      readBorderSettingsFromElement(element) {
        if (!element) {
          return null;
        }

        const computed = window.getComputedStyle(element);

        for (const edge of ["top", "right", "bottom", "left"]) {
          const edgeName = edge.charAt(0).toUpperCase() + edge.slice(1);
          const width = computed[`border${edgeName}Width`];
          const style = computed[`border${edgeName}Style`];
          const color = computed[`border${edgeName}Color`];

          if ((parseFloat(width) || 0) > 0 && style && style !== "none") {
            return {
              width,
              style,
              color: this.normalizeColorForInput(color),
              radius: element.style.getPropertyValue("border-radius") || computed.borderRadius || "0"
            };
          }
        }

        const shorthand = element.style.getPropertyValue("border").trim();

        if (shorthand && !/^none$/i.test(shorthand)) {
          const parts = shorthand.split(/\s+/);

          return {
            width: parts[0] || "1px",
            style: parts[1] || "solid",
            color: this.normalizeColorForInput(parts[2] || "#000000"),
            radius: element.style.getPropertyValue("border-radius") || computed.borderRadius || "0"
          };
        }

        return null;
      }

      getChartBarValueLabel(cell) {
        const text = String(cell?.text ?? cell?.label ?? "").trim();

        if (text) {
          return text;
        }

        return this.formatChartAxisValue(cell?.value ?? 0);
      }

      getChartOverlayFontFamily(chartStyle) {
        return String(chartStyle?.fontFamily || "Arial")
          .split(",")[0]
          .trim()
          .replace(/^['"]|['"]$/g, "") || "Arial";
      }

      buildChartOverlayLabelStyle(chartStyle) {
        const fontFamily = this.escapeHtml(this.getChartOverlayFontFamily(chartStyle));
        const fontSize = this.escapeHtml(this.normalizeFontSizeForSelect(chartStyle?.fontSize));
        const color = this.escapeHtml(this.normalizeColorForInput(chartStyle?.color || "#444444"));
        const fontWeight = String(chartStyle?.fontWeight || "normal").trim();
        const fontStyle = String(chartStyle?.fontStyle || "normal").trim();
        const textDecoration = String(
          chartStyle?.textDecoration || chartStyle?.textDecorationLine || "none"
        ).trim().toLowerCase();
        const weight = fontWeight === "bold" || Number(fontWeight) >= 600 ? "font-weight:bold;" : "";
        const style = fontStyle === "italic" ? "font-style:italic;" : "";
        const decoration = textDecoration.includes("underline")
          ? "text-decoration:underline;text-decoration-line:underline;"
          : "";

        return `font-family:${fontFamily};font-size:${fontSize};color:${color};${weight}${style}${decoration}`;
      }

      buildChartValueLabelStyle(chartStyle) {
        const pt = Number.parseFloat(String(chartStyle?.fontSize || "12pt").replace("pt", "").replace(",", ".")) || 12;
        const valuePt = Math.max(7, Math.round(pt * 0.75));

        return this.buildChartOverlayLabelStyle({
          ...chartStyle,
          fontSize: `${valuePt}pt`
        });
      }

      getChartValueLabelGapPx() {
        return 5;
      }

      getChartMinBarWidthForValueLabelPx() {
        return 22;
      }

      measureViewBoxDistancePx(svg, preview, dx, dy = 0) {
        const start = this.mapChartViewBoxToPreview(svg, preview, 0, 0);
        const end = this.mapChartViewBoxToPreview(svg, preview, dx, dy);

        if (!start || !end) {
          return 0;
        }

        return Math.hypot(end.left - start.left, end.top - start.top);
      }

      getChartOverlayRectCenterX(rect) {
        return rect.left + rect.width / 2;
      }

      shouldShowChartBarValueLabel(label, barWidthPx) {
        const minWidth = this.getChartMinBarWidthForValueLabelPx();

        if (barWidthPx < minWidth) {
          return false;
        }

        label.style.visibility = "visible";
        const bounds = label.getBoundingClientRect();
        const labelSpanPx = Math.max(bounds.width, bounds.height, 1);

        return labelSpanPx <= barWidthPx * 1.35;
      }

      chartOverlayRectsOverlap(a, b, padding = 3) {
        return !(
          a.right + padding < b.left ||
          b.right + padding < a.left ||
          a.bottom + padding < b.top ||
          b.bottom + padding < a.top
        );
      }

      resolveChartValueLabelCollisions(anchors, labels, seriesCount, zeroY = NaN) {
        const count = Math.max(Number(seriesCount) || 1, 1);
        const categoryCount = Math.ceil(labels.length / count);

        for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
          const group = [];

          for (let seriesIndex = 0; seriesIndex < count; seriesIndex++) {
            const index = categoryIndex * count + seriesIndex;
            const label = labels[index];
            const anchor = anchors[index];

            if (!label || !anchor || label.classList.contains("is-hidden")) {
              continue;
            }

            group.push({
              label,
              barHeight: this.getChartValueAnchorHeight(anchor, zeroY),
              absValue: Math.abs(Number(anchor.querySelector("title")?.textContent) || 0)
            });
          }

          group.sort((left, right) => {
            return this.getChartOverlayRectCenterX(left.label.getBoundingClientRect()) -
              this.getChartOverlayRectCenterX(right.label.getBoundingClientRect());
          });

          const kept = [];

          group.forEach(item => {
            const rect = item.label.getBoundingClientRect();
            const overlapIndex = kept.findIndex(entry => this.chartOverlayRectsOverlap(entry.rect, rect, 2));

            if (overlapIndex < 0) {
              kept.push({ ...item, rect });
              return;
            }

            const current = kept[overlapIndex];

            if (item.absValue > current.absValue || (item.absValue === current.absValue && item.barHeight > current.barHeight)) {
              current.label.classList.add("is-hidden");
              kept[overlapIndex] = { ...item, rect };
            } else {
              item.label.classList.add("is-hidden");
            }
          });
        }
      }

      getChartCategoryLabelY() {
        return 93;
      }

      getChartPlotBottomLimit() {
        return this.getChartCategoryLabelY() - 9;
      }

      mapChartViewBoxToPreview(svg, preview, x, y) {
        const viewBox = this.getChartSvgViewBox(svg);

        if (svg?.createSVGPoint && typeof svg.getScreenCTM === "function" && preview?.isConnected) {
          const matrix = svg.getScreenCTM();
          const previewRect = preview.getBoundingClientRect();

          if (matrix && previewRect.width > 0 && previewRect.height > 0) {
            const point = svg.createSVGPoint();
            point.x = x;
            point.y = y;
            const mapped = point.matrixTransform(matrix);

            return {
              unit: "px",
              left: mapped.x - previewRect.left,
              top: mapped.y - previewRect.top
            };
          }
        }

        if (!Number.isFinite(x) || !Number.isFinite(y) || !viewBox.width || !viewBox.height) {
          return null;
        }

        return {
          unit: "percent",
          left: (x / viewBox.width) * 100,
          top: (y / viewBox.height) * 100
        };
      }

      getChartSvgViewBox(svg) {
        const base = svg?.viewBox?.baseVal;

        if (base && base.width > 0 && base.height > 0) {
          return { width: base.width, height: base.height };
        }

        const parts = String(svg?.getAttribute?.("viewBox") || "0 0 220 100")
          .trim()
          .split(/\s+/);

        return {
          width: Number(parts[2]) || 220,
          height: Number(parts[3]) || 100
        };
      }

      formatChartOverlayPosition(mapped) {
        if (!mapped) {
          return null;
        }

        const suffix = mapped.unit === "percent" ? "%" : "px";

        return {
          left: `${mapped.left}${suffix}`,
          top: `${mapped.top}${suffix}`
        };
      }

      layoutChartOverlaysNow(chartBox) {
        this.applyChartLegendPanelPosition(chartBox);
        this.layoutChartBarValueLabels(chartBox);
        this.layoutChartCategoryLabels(chartBox);
      }

      layoutGeneratedReportCharts(documentRoot) {
        if (!documentRoot) {
          return;
        }

        const charts = documentRoot.querySelectorAll(".wordex-chart-box");

        if (!charts.length) {
          return;
        }

        const measureBox = this.createChromeMeasureBox(this.getGeneratedContentWidthMm());
        measureBox.appendChild(documentRoot);

        try {
          charts.forEach(chartBox => {
            this.layoutChartOverlaysNow(chartBox);
          });
          this.syncGeneratedFreeContainerBounds(documentRoot);
        } finally {
          if (measureBox.parentNode) {
            measureBox.parentNode.removeChild(measureBox);
          }
        }
      }

      getChartValueAnchorHeight(anchor, zeroY) {
        if (anchor?.classList?.contains("wordex-chart-line-point")) {
          const cy = Number(anchor.getAttribute("cy")) || 0;
          const axisY = Number.isFinite(zeroY) ? zeroY : cy;

          return Math.abs(cy - axisY);
        }

        return Number(anchor.getAttribute("height")) || 0;
      }

      layoutChartBarValueLabels(chartBox) {
        const preview = chartBox?.querySelector?.(".wordex-chart-preview");
        const svg = preview?.querySelector?.("svg");
        const panel = preview?.querySelector?.(".wordex-chart-value-labels");

        if (!preview || !svg || !panel) {
          return;
        }

        const anchors = Array.from(svg.querySelectorAll(".wordex-chart-bar, .wordex-chart-line-point"));
        const labels = Array.from(panel.querySelectorAll(".wordex-chart-value-label"));
        const seriesCount = Number(panel.dataset.seriesCount) || 1;
        const zeroY = Number(panel.dataset.viewboxZeroY);
        const defaultSpanViewbox = Number(panel.dataset.anchorSpanViewbox);

        if (!anchors.length || anchors.length !== labels.length) {
          return;
        }

        /*
          v49: no histograma horizontal acumulado/misto, os percentuais não ficam
          dentro dos segmentos. Eles viram uma pequena legenda percentual sobre
          a própria barra/categoria, posicionada ao lado do eixo/barra:
          - se houver positivo na categoria, fica à direita da maior extensão positiva;
          - se só houver negativos, fica à esquerda da maior extensão negativa.
        */
        const hasHorizontalStacked = anchors.some(anchor =>
          anchor.dataset.horizontal === "1" && anchor.dataset.stacked === "1"
        );

        if (hasHorizontalStacked) {
          const gapPx = this.getChartValueLabelGapPx();
          const slotPx = 42;
          const categoryCount = Math.ceil(labels.length / Math.max(seriesCount, 1));

          labels.forEach(label => {
            label.classList.remove("is-hidden");
            label.style.visibility = "visible";
            label.style.position = "absolute";
            label.style.display = "inline-block";
            label.style.whiteSpace = "nowrap";
            label.style.textAlign = "left";
            label.style.writingMode = "horizontal-tb";
            label.style.textOrientation = "mixed";
            label.style.transform = "translate(0, -50%)";
            label.style.transformOrigin = "left center";
            label.style.margin = "0";
            label.style.padding = "0";
            label.style.lineHeight = "1";
          });

          for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
            const startIndex = categoryIndex * seriesCount;
            const groupAnchors = anchors.slice(startIndex, startIndex + seriesCount);
            const groupLabels = labels.slice(startIndex, startIndex + seriesCount);

            const mappedRects = groupAnchors.map(anchor => {
              if (!anchor || anchor.dataset.horizontal !== "1" || anchor.dataset.stacked !== "1") {
                return null;
              }

              const x = Number(anchor.getAttribute("x")) || 0;
              const y = Number(anchor.getAttribute("y")) || 0;
              const width = Number(anchor.getAttribute("width")) || 0;
              const height = Number(anchor.getAttribute("height")) || 0;
              const leftPoint = this.mapChartViewBoxToPreview(svg, preview, x, y + height / 2);
              const rightPoint = this.mapChartViewBoxToPreview(svg, preview, x + width, y + height / 2);
              const topPoint = this.mapChartViewBoxToPreview(svg, preview, x, y);

              if (!leftPoint || !rightPoint || !topPoint || leftPoint.unit !== "px" || rightPoint.unit !== "px" || topPoint.unit !== "px") {
                return null;
              }

              return {
                anchor,
                left: Math.min(leftPoint.left, rightPoint.left),
                right: Math.max(leftPoint.left, rightPoint.left),
                centerTop: leftPoint.top,
                top: topPoint.top,
                negative: anchor.dataset.negative === "1"
              };
            }).filter(Boolean);

            if (!mappedRects.length) {
              groupLabels.forEach(label => label?.classList?.add("is-hidden"));
              continue;
            }

            /*
              A legenda percentual deve ficar sobre a barra, não dentro dela.
              Sem afastamento vertical extra: encosta visualmente no topo da barra.
            */
            const top = Math.min(...mappedRects.map(item => item.top));
            const zeroPoint = this.mapChartViewBoxToPreview(svg, preview, Number.isFinite(zeroY) ? zeroY : 0, 0);
            const zeroX = zeroPoint && zeroPoint.unit === "px"
              ? zeroPoint.left
              : mappedRects.reduce((sum, item) => sum + (item.left + item.right) / 2, 0) / mappedRects.length;

            /*
              v52:
              - percentuais positivos à direita do eixo, do primeiro para o último;
              - percentuais negativos à esquerda do eixo, do último para o primeiro;
              - quando houver positivos e negativos, mostra os dois lados.
            */
            const positiveLabelItems = [];
            const negativeLabelItems = [];

            groupLabels.forEach((label, seriesIndex) => {
              const anchor = groupAnchors[seriesIndex];

              if (!label || !anchor) {
                return;
              }

              const item = { label, seriesIndex };

              if (anchor.dataset.negative === "1") {
                negativeLabelItems.push(item);
              } else {
                positiveLabelItems.push(item);
              }
            });

            const labelGapPx = 16;
            let positiveCursorX = zeroX + gapPx;

            positiveLabelItems.forEach(item => {
              const label = item.label;

              label.classList.remove("is-hidden");
              label.style.top = `${top}px`;
              label.style.left = `${positiveCursorX}px`;
              label.style.textAlign = "left";
              label.style.transform = "translate(0, -100%)";

              positiveCursorX += (label.offsetWidth || slotPx) + labelGapPx;
            });

            /*
              Negativos: seguem a ordem visual da barra da esquerda para a direita.
              O último percentual negativo fica com sua borda direita a 5px do eixo.
            */
            const negativeOrdered = negativeLabelItems.slice().reverse();
            let negativeCursorRight = zeroX - gapPx;

            negativeOrdered.slice().reverse().forEach(item => {
              const label = item.label;
              const width = label.offsetWidth || slotPx;

              label.classList.remove("is-hidden");
              label.style.top = `${top}px`;
              label.style.left = `${negativeCursorRight - width}px`;
              label.style.textAlign = "left";
              label.style.transform = "translate(0, -100%)";

              negativeCursorRight -= width + labelGapPx;
            });
          }

          return;
        }

        const hasVerticalStacked = anchors.some(anchor =>
          anchor.dataset.stacked === "1" && anchor.dataset.horizontal !== "1"
        );

        if (hasVerticalStacked) {
          const gapPx = this.getChartValueLabelGapPx();
          const labelGapPx = 16;
          const categoryCount = Math.ceil(labels.length / Math.max(seriesCount, 1));

          labels.forEach(label => {
            label.classList.remove("is-hidden");
            label.style.visibility = "visible";
            label.style.position = "absolute";
            label.style.display = "inline-block";
            label.style.whiteSpace = "nowrap";
            label.style.textAlign = "left";
            label.style.writingMode = "horizontal-tb";
            label.style.textOrientation = "mixed";
            label.style.transform = "translate(0, -100%)";
            label.style.transformOrigin = "left top";
            label.style.margin = "0";
            label.style.padding = "0";
            label.style.lineHeight = "1";
          });

          for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
            const startIndex = categoryIndex * seriesCount;
            const groupAnchors = anchors.slice(startIndex, startIndex + seriesCount);
            const groupLabels = labels.slice(startIndex, startIndex + seriesCount);

            const mappedRects = groupAnchors.map(anchor => {
              if (!anchor || anchor.dataset.stacked !== "1" || anchor.dataset.horizontal === "1") {
                return null;
              }

              const x = Number(anchor.getAttribute("x")) || 0;
              const y = Number(anchor.getAttribute("y")) || 0;
              const width = Number(anchor.getAttribute("width")) || 0;
              const height = Number(anchor.getAttribute("height")) || 0;
              const centerPoint = this.mapChartViewBoxToPreview(svg, preview, x + width / 2, y);
              const bottomPoint = this.mapChartViewBoxToPreview(svg, preview, x + width / 2, y + height);

              if (!centerPoint || !bottomPoint || centerPoint.unit !== "px" || bottomPoint.unit !== "px") {
                return null;
              }

              return {
                anchor,
                x: centerPoint.left,
                top: Math.min(centerPoint.top, bottomPoint.top),
                bottom: Math.max(centerPoint.top, bottomPoint.top),
                negative: anchor.dataset.negative === "1"
              };
            }).filter(Boolean);

            if (!mappedRects.length) {
              groupLabels.forEach(label => label?.classList?.add("is-hidden"));
              continue;
            }

            const zeroPoint = this.mapChartViewBoxToPreview(svg, preview, 0, Number.isFinite(zeroY) ? zeroY : 0);
            const zeroTop = zeroPoint && zeroPoint.unit === "px"
              ? zeroPoint.top
              : Math.max(...mappedRects.map(item => item.bottom));

            const positiveRects = mappedRects.filter(item => !item.negative);
            const negativeRects = mappedRects.filter(item => item.negative);
            const positiveTop = positiveRects.length
              ? Math.min(...positiveRects.map(item => item.top)) - gapPx
              : zeroTop - gapPx;
            const negativeTop = zeroTop - gapPx;
            const baseX = mappedRects.reduce((sum, item) => sum + item.x, 0) / mappedRects.length;

            const positiveLabelItems = [];
            const negativeLabelItems = [];

            groupLabels.forEach((label, seriesIndex) => {
              const anchor = groupAnchors[seriesIndex];

              if (!label || !anchor) {
                return;
              }

              const item = { label, seriesIndex };

              if (anchor.dataset.negative === "1") {
                negativeLabelItems.push(item);
              } else {
                positiveLabelItems.push(item);
              }
            });

            const placeCenteredRow = (items, top) => {
              if (!items.length) {
                return;
              }

              const widths = items.map(item => item.label.offsetWidth || slotPx);
              const totalWidth = widths.reduce((sum, width) => sum + width, 0) + labelGapPx * Math.max(items.length - 1, 0);
              let cursorX = baseX - totalWidth / 2;

              items.forEach((item, index) => {
                const label = item.label;

                label.classList.remove("is-hidden");
                label.style.top = `${top}px`;
                label.style.left = `${cursorX}px`;
                label.style.textAlign = "left";
                label.style.transform = "translate(0, -100%)";

                cursorX += widths[index] + labelGapPx;
              });
            };

            /*
              v55:
              - se houver positivos e negativos na mesma categoria, a legenda completa
                fica acima da barra positiva, a 5px do topo;
              - nessa situação, os negativos aparecem do último para o primeiro
                e depois entram os positivos.
              Exemplo: 50% 33,3% 16,7%.
            */
            if (positiveLabelItems.length && negativeLabelItems.length) {
              placeCenteredRow(
                negativeLabelItems.slice().reverse().concat(positiveLabelItems),
                positiveTop
              );
            } else {
              placeCenteredRow(positiveLabelItems, positiveTop);
              placeCenteredRow(negativeLabelItems.slice().reverse(), negativeTop);
            }
          }

          return;
        }

        anchors.forEach((anchor, index) => {
          const label = labels[index];

          if (!label) {
            return;
          }

          const isLinePoint = anchor.classList.contains("wordex-chart-line-point");
          const isNegative = anchor.dataset.negative === "1";
          const gapPx = this.getChartValueLabelGapPx();
          let centerX = 0;
          let anchorY = 0;
          let spanViewbox = defaultSpanViewbox;

          const isHorizontalBar = !isLinePoint && anchor.dataset.horizontal === "1";

          if (isLinePoint) {
            centerX = Number(anchor.getAttribute("cx")) || 0;
            const pointY = Number(anchor.getAttribute("cy")) || 0;
            anchorY = isNegative && Number.isFinite(zeroY) ? zeroY : pointY;
          } else {
            const barX = Number(anchor.getAttribute("x")) || 0;
            const barWidth = Number(anchor.getAttribute("width")) || 0;
            const barY = Number(anchor.getAttribute("y")) || 0;
            const barHeight = Number(anchor.getAttribute("height")) || 0;

            if (isHorizontalBar) {
              const isStacked = anchor.dataset.stacked === "1";
              centerX = isStacked
                ? (isNegative ? barX : barX + barWidth)
                : (Number.isFinite(zeroY) ? zeroY : (isNegative ? barX + barWidth : barX));
              anchorY = barY + barHeight / 2;
              spanViewbox = barHeight;
            } else {
              centerX = barX + barWidth / 2;
              anchorY = isNegative && Number.isFinite(zeroY) ? zeroY : barY;
              spanViewbox = barWidth;
            }
          }

          const spanPx = this.measureViewBoxDistancePx(
            svg,
            preview,
            Number.isFinite(spanViewbox) ? spanViewbox : 20,
            isHorizontalBar ? spanViewbox : 0
          );
          const mapped = this.mapChartViewBoxToPreview(svg, preview, centerX, anchorY);

          label.classList.remove("is-hidden");
          label.style.visibility = "visible";

          if (!mapped) {
            label.classList.add("is-hidden");
            return;
          }

          if (isHorizontalBar) {
            label.style.transform = "translate(0, -50%)";
            label.style.transformOrigin = "left center";
            label.style.left = `${mapped.left + (isNegative ? gapPx : -gapPx - label.offsetWidth)}px`;
            label.style.top = `${mapped.top}px`;
          } else {
            label.style.transform = "translate(-50%, -50%) rotate(270deg)";
            label.style.transformOrigin = "center center";
            const position = this.formatChartOverlayPosition(mapped);

            label.style.left = position.left;

            if (mapped.unit === "percent") {
              const gapViewBox = 1.5;
              const anchorMapped = this.mapChartViewBoxToPreview(
                svg,
                preview,
                centerX,
                Math.max(0, anchorY - gapViewBox)
              );
              const anchorPosition = this.formatChartOverlayPosition(anchorMapped);

              label.style.top = anchorPosition?.top || position.top;
            } else {
              const rotatedVisualHeight = label.offsetWidth || 0;
              const labelCenterY = mapped.top - gapPx - rotatedVisualHeight / 2;

              label.style.top = `${labelCenterY}px`;
            }
          }

          if (!this.shouldShowChartBarValueLabel(label, spanPx)) {
            label.classList.add("is-hidden");
          }
        });

      computeBarChartLayout(chartData, chartStyle = null, seriesColors = null) {
        const payload = this.normalizeChartPayload(chartData);
        const categoryLabels = this.getChartCategoryLabels(chartData);
        const categoryCount = Math.max(categoryLabels.length, payload?.Items?.length || 0, 1);
        const seriesCount = this.getChartSeriesCount(chartData);
        const barSeriesColors = Array.isArray(seriesColors) && seriesColors.length
          ? seriesColors
          : this.getDefaultChartSeriesColors();
        const plotLeft = 14;
        const plotRight = 208;
        const plotWidth = plotRight - plotLeft;
        const groupGap = 12;
        const innerGap = 2;
        const plotTop = 8;
        const categoryAnchorY = this.getChartCategoryLabelY();
        const plotBottomLimit = this.getChartPlotBottomLimit();
        const allValues = this.getAllChartNumericValues(chartData);
        const maxPositive = Math.max(0, ...allValues, 0);
        const maxNegative = Math.abs(Math.min(0, ...allValues, 0));
        const availableHeight = plotBottomLimit - plotTop;
        let zeroY = plotBottomLimit;
        let posBarHeight = availableHeight;
        let negBarHeight = 0;

        if (maxNegative > 0 && maxPositive > 0) {
          posBarHeight = availableHeight * (maxPositive / (maxPositive + maxNegative));
          negBarHeight = availableHeight - posBarHeight;
          zeroY = plotTop + posBarHeight;
        } else if (maxNegative > 0) {
          zeroY = plotTop;
          posBarHeight = 0;
          negBarHeight = availableHeight;
        }

        const scalePositive = maxPositive > 0 ? maxPositive : 1;
        const scaleNegative = maxNegative > 0 ? maxNegative : 1;
        const availableWidth = plotWidth - groupGap * (categoryCount + 1);
        const groupWidth = availableWidth / categoryCount;
        const barWidth = Math.max(3, (groupWidth - innerGap * Math.max(seriesCount - 1, 0)) / seriesCount);
        const bars = [];
        const valueLabels = [];

        for (let categoryIndex = 0; categoryIndex < categoryCount; categoryIndex++) {
          const groupX = plotLeft + groupGap + categoryIndex * (groupWidth + groupGap);
          const item = payload?.Items?.[categoryIndex] || { values: [] };

          for (let seriesIndex = 0; seriesIndex < seriesCount; seriesIndex++) {
            const cell = item.values?.[seriesIndex] || { value: 0 };
            const value = this.toChartNumericValue(cell.value);
            let height = 0;
            let y = zeroY;
            let negativeAttr = "";

            if (value > 0) {
              height = Math.max(1, posBarHeight * value / scalePositive);
              y = zeroY - height;
            } else if (value < 0) {
              height = Math.max(1, negBarHeight * Math.abs(value) / scaleNegative);
              y = zeroY;
              negativeAttr = ' data-negative="1"';
            }

            bars.push(
              `<rect class="wordex-chart-bar" data-series-index="${seriesIndex}"${negativeAttr} x="${groupX + seriesIndex * (barWidth + innerGap)}" y="${y}" width="${barWidth}" height="${height}" fill="${barSeriesColors[seriesIndex % barSeriesColors.length]}"><title>${this.escapeHtml(this.formatChartNumericTooltip(value))}</title></rect>`
            );

            valueLabels.push(this.getChartBarValueLabel(cell));
          }
        }

        const categoryLabelSpecs = categoryLabels.map((label, index) => {
          if (!label) {
            return null;
          }

          const groupX = plotLeft + groupGap + index * (groupWidth + groupGap);
          const x = groupX + groupWidth / 2;

          return { label, x, y: categoryAnchorY };
        }).filter(Boolean);

        return {
          bars,
          valueLabels,
          categoryLabelSpecs,
          plotLeft,
          plotRight,
          plotTop,
          plotBottomLimit,
          axisY: zeroY,
          groupWidth
        };
      }

      getNormalizedChartMode(chartMode) {
        const mode = String(chartMode || "normal").trim().toLowerCase();

      computeHistogramLayout(chartType, chartData, chartStyle = null, seriesColors = null, chartMode = "normal") {
        const mode = this.getNormalizedChartMode(chartMode);

        if (chartType === "hbar") {
          return mode === "normal"
            ? this.computeHorizontalBarChartLayout(chartData, chartStyle, seriesColors)
            : this.computeHorizontalStackedBarChartLayout(chartData, chartStyle, seriesColors, mode);
        }

        return mode === "normal"
          ? this.computeBarChartLayout(chartData, chartStyle, seriesColors)
          : this.computeVerticalStackedBarChartLayout(chartData, chartStyle, seriesColors, mode);
      }

      getChartStackRange(chartData, mode = "stacked") {
        const payload = this.normalizeChartPayload(chartData);
        const items = Array.isArray(payload?.Items) ? payload.Items : [];
        let min = 0;
        let max = 0;

        items.forEach(item => {
          const values = Array.isArray(item?.values) ? item.values : [];

          if (mode === "mixed") {
            const positive = values.reduce((sum, cell) => {
              const value = this.toChartNumericValue(cell?.value);
              return value > 0 ? sum + value : sum;
            }, 0);
            const negative = values.reduce((sum, cell) => {
              const value = this.toChartNumericValue(cell?.value);
              return value < 0 ? sum + value : sum;
            }, 0);

            max = Math.max(max, positive);
            min = Math.min(min, negative);
            return;
          }

          let current = 0;
          values.forEach(cell => {
            current += this.toChartNumericValue(cell?.value);
            max = Math.max(max, current);
            min = Math.min(min, current);
          });
        });

        if (max === 0 && min === 0) {
          max = 1;
        }

        return { min, max };
      }

      getChartStackPercentLabel(cell, item, mode = "stacked") {
        const value = this.toChartNumericValue(cell?.value);
        const values = Array.isArray(item?.values) ? item.values : [];
        const total = values.reduce((sum, currentCell) => {
          return sum + Math.abs(this.toChartNumericValue(currentCell?.value));
        }, 0);

        if (!total || !Number.isFinite(total)) {
          return "";
        }

        const percent = Math.abs(value) * 100 / total;
        const rounded = Math.round(percent * 10) / 10;
        const text = Number.isInteger(rounded)
          ? String(rounded)
          : String(rounded).replace(".", ",");

        return text + "%";
      }

      mapChartStackValue(value, min, max, startPx, endPx) {
        const range = max - min || 1;
        const ratio = (value - min) / range;

        return startPx + ratio * (endPx - startPx);
      }

      parseChartLocaleNumber(raw) {
        if (raw === null || raw === undefined || raw === "") {
          return NaN;
        }

        if (typeof raw === "number") {
          return Number.isFinite(raw) ? raw : NaN;
        }

        let text = String(raw).trim()
          .replace(/\u00A0/g, "")
          .replace(/\s/g, "");

        if (!text) {
          return NaN;
        }

        text = text.replace(/[^0-9,.\-+]/g, "");

        if (!text || text === "-" || text === "+" || text === "-." || text === "+.") {
          return NaN;
        }
