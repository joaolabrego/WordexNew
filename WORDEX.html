            drag.block.subParagraphs[subIndex].style.width = width;
          }
        });

        this.positionObjectResizeOverlay();
      }

      applyParagraphContainerResizeFromDrag(drag, dx, dy) {
        if (!drag?.paragraph) {
          return;
        }

        const handle = drag.handleName || "se";
        const wrapperWidth = drag.wrapper?.clientWidth || drag.startWidth || 1;

        if (handle.includes("e") || handle.includes("w")) {
          const signedDx = handle.includes("w") ? -dx : dx;
          let nextPercent = drag.startWidthPercent + (signedDx / wrapperWidth) * 100;
          nextPercent = this.clamp(nextPercent, 20, 100);
          drag.paragraph.style.width = nextPercent.toFixed(2) + "%";

          if (drag.block) {
            drag.block.style = drag.block.style || {};
            drag.block.style.width = drag.paragraph.style.width;
          }
        }

        if (handle.includes("s") || handle.includes("n")) {
          const signedDy = handle.includes("n") ? -dy : dy;
          const nextHeight = Math.max(24, Math.round(drag.startMinHeight + signedDy));
          drag.paragraph.style.minHeight = nextHeight + "px";

          if (drag.block) {
            drag.block.style = drag.block.style || {};
            drag.block.style.minHeight = drag.paragraph.style.minHeight;
          }
        }

        this.positionObjectResizeOverlay();
      }

      applyTableComponentResizeFromDrag(drag, dx, dy) {
        if (!drag || !this.isInDocument(drag.table)) return;

        const handle = drag.handleName || "se";
        const mode = drag.mode;

        if (mode === "row") {
          let newHeight = drag.startHeight;

          if (handle.includes("s")) {
            newHeight = drag.startHeight + dy;
          } else if (handle.includes("n")) {
            newHeight = drag.startHeight - dy;
          }

          newHeight = Math.max(18, Math.round(newHeight));
          drag.row.style.height = newHeight + "px";
          Array.from(drag.row.cells).forEach(cell => {
            cell.style.height = newHeight + "px";
          });
        } else if (mode === "column") {
          /*
            Coluna: movimento horizontal do mouse segue a largura —
            direita aumenta, esquerda diminui (qualquer alça).
          */
          let newWidth = drag.startWidth + dx;

          newWidth = Math.max(24, Math.round(newWidth));
          const columnIndices = Number.isInteger(drag.columnIndex)
            ? [drag.columnIndex]
            : [];

          Array.from(drag.table.rows).forEach(row => {
            columnIndices.forEach(columnIndex => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                slot.cell.style.width = newWidth + "px";
              }
            });
          });
        }

        this.syncObjectAfterChange(drag.table);
        this.syncFreeContainerBoundsForObject(drag.table);
        this.positionObjectResizeOverlay();
      }

      handleObjectResizePointerMove(event) {
        if (!this.resizeDrag) return;

        const drag = this.resizeDrag;

        if (drag.kind === "sub-paragraph") {
          if (!this.isInDocument(drag.paragraph)) {
            this.handleObjectResizePointerUp(event);
            return;
          }

          event.preventDefault();
          const dx = event.clientX - drag.startClientX;
          this.applySubParagraphResizeFromDrag(drag, dx);
          return;
        }

        if (drag.kind === "paragraph-container") {
          if (!this.isInDocument(drag.paragraph)) {
            this.handleObjectResizePointerUp(event);
            return;
          }

          event.preventDefault();
          const dx = event.clientX - drag.startClientX;
          const dy = event.clientY - drag.startClientY;
          this.applyParagraphContainerResizeFromDrag(drag, dx, dy);
          return;
        }

        if (drag.kind === "table-component") {
          if (!this.isInDocument(drag.table)) {
            this.handleObjectResizePointerUp(event);
            return;
          }

          event.preventDefault();

          const dx = event.clientX - drag.startClientX;
          const dy = event.clientY - drag.startClientY;
          this.applyTableComponentResizeFromDrag(drag, dx, dy);
          return;
        }

        if (!this.isInDocument(drag.object)) {
          this.handleObjectResizePointerUp(event);
          return;
        }

        event.preventDefault();

        const dx = event.clientX - drag.startClientX;
        const dy = event.clientY - drag.startClientY;
        const handle = drag.handleName;

        let newWidth = drag.startWidth;
        let newHeight = drag.startHeight;

        if (handle.includes("e")) {
          newWidth = drag.startWidth + dx;
        } else if (handle.includes("w")) {
          newWidth = drag.startWidth - dx;

          if (drag.objectBlock) {
            const minWidth = this.getObjectMinimumSize(drag.object).width;
            const maxX = Math.max(0, drag.startBlockX + drag.startWidth - minWidth);
            const nextX = this.clamp(drag.startBlockX + dx, 0, maxX);

            newWidth = drag.startWidth + (drag.startBlockX - nextX);

            drag.object.style.float = "none";
            drag.object.style.display = drag.object.matches("table") ? "table" : "flex";
            drag.object.style.marginLeft = nextX + "px";
            drag.object.style.marginRight = "8px";
            drag.object.dataset.blockX = String(nextX);
          }
        }

        if (handle.includes("s")) {
          newHeight = drag.startHeight + dy;
        } else if (handle.includes("n")) {
          newHeight = drag.startHeight - dy;
        }

        this.applyObjectSizeInPixels(drag.object, newWidth, newHeight);

        const cell = drag.object.closest("td");
        const subParagraph = drag.object.closest(WordexEditor.subParagraphSelector);

        if (drag.object.matches(".wordex-textbox")) {
          this.refreshTextboxSizeAfterResize(drag.object);
        } else if (cell) {
          this.clampObjectInsideContainer(drag.object, cell);
        } else if (subParagraph) {
          this.clampObjectPositionInsideSubParagraph(drag.object, subParagraph);
        }
      }

      handleObjectResizePointerUp(event) {
        if (!this.resizeDrag) return;

        const drag = this.resizeDrag;
        this.resizeDrag = null;
        document.body.classList.remove("wordex-resizing");

        if (drag.kind === "sub-paragraph") {
          if (this.isInDocument(drag.paragraph)) {
            this.syncParagraphElement(drag.paragraph);
            this.renderSelection();
            this.saveUndoStateIfChanged();
            this.positionObjectResizeOverlay();
          }

          return;
        }

        if (drag.kind === "paragraph-container") {
          if (this.isInDocument(drag.paragraph)) {
            this.syncParagraphElement(drag.paragraph);
            this.renderSelection();
            this.saveUndoStateIfChanged();
            this.positionObjectResizeOverlay();
          }

          return;
        }

        if (drag.kind === "table-component") {
          if (this.isInDocument(drag.table)) {
            this.syncAndSelectTableComponent(drag, drag.mode);
            this.syncFreeContainerBoundsForObject(drag.table);
            this.positionObjectResizeOverlay();
          }

          return;
        }

        const object = drag.object;

        if (this.isInDocument(object)) {
          if (object.matches(".wordex-textbox")) {
            this.refreshTextboxSizeAfterResize(object);
          }

          this.syncObjectAfterChangeAndKeepSelected(object);
          this.positionObjectResizeOverlay();
        }
      }



      configureSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, histograma, textbox ou tabela.");
          return;
        }

        if (this.selectedObject.matches(".dynamic-image-box")) {
          this.configureImage(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-chart-box")) {
          this.configureChart(this.selectedObject);
          return;
        }

        if (this.selectedObject.matches(".wordex-textbox")) {
          return;
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          this.configureTable(this.selectedObject);
        }
      }

      configureImage(imageBox) {
        const align = this.askAlignment(imageBox.dataset.align || "left");
        if (!align) return;

        const context = this.getImageMacroContext(imageBox);
        this.syncJsonMacroPickerForImageContext(context);

        const macroField = this.requireAllowedImageMacroField(context, null);
        const staticImage = this.getStaticImageAsset();

        if (macroField && this.getReportDataRootRecord()) {
          this.applyMacroFieldToImageBox(imageBox, macroField);
          this.applyAlignment(imageBox, align);
          return;
        }

        if (staticImage) {
          const rebuilt = this.assignStaticImageToBox(
            imageBox,
            staticImage.imageSrc,
            staticImage.imageName
          );

          if (rebuilt) {
            this.applyAlignment(rebuilt, align);
          }

          return;
        }

        this.applyAlignment(imageBox, align);
        this.limitObjectWidthToParagraph(imageBox);
        this.syncObjectAfterChange(imageBox);
        this.selectObject(imageBox);
      }

      configureChart(chartBox) {
        const chartType = this.getSelectedChartInsertType();
        const align = this.askAlignment(chartBox.dataset.align || "left");

        if (!align) {
          return;
        }

        chartBox.dataset.chartType = chartType;

        let importedFromMacro = false;

        if (this.getReportDataRootRecord()) {
          const context = this.getChartMacroContext(chartBox);
          this.syncJsonMacroPickerForChartContext({ forceCollectionRebuild: true });

          const collectionName = this.getSelectedJsonCollectionName();
          const sourceName = (
            !context.inTableCell && this.isChartHistogramCollectionName(collectionName)
          )
            ? collectionName
            : String(document.getElementById("jsonMacroField")?.value || "").trim();

          if (sourceName) {
            this.applyMacroFieldToChartBox(chartBox, sourceName);
            importedFromMacro = true;
          } else {
            delete chartBox.dataset.sourceName;
          }
        }

        if (!importedFromMacro) {
          this.updateChartBoxPresentation(chartBox);
        }
        this.applyAlignment(chartBox, align);
        this.limitObjectWidthToParagraph(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
      }

      configureTextbox(textbox) {
        const align = this.askAlignment(textbox.dataset.align || "left");
        if (!align) return;

        this.applyAlignment(textbox, align);
        this.limitObjectWidthToParagraph(textbox);
        this.syncObjectAfterChange(textbox);
        this.selectObject(textbox);
      }

      configureTable(table) {
        const sequence = ["left", "center", "right"];
        const current = table.dataset.align === "free" ? "left" : (table.dataset.align || "left");
        const currentIndex = Math.max(0, sequence.indexOf(current));
        const nextAlign = sequence[(currentIndex + 1) % sequence.length];

        this.applyAlignment(table, nextAlign);
        this.limitObjectWidthToParagraph(table);
        this.syncObjectAfterChange(table);
        this.selectObject(table);
      }

      getTableColumnCount(table) {
        let count = 0;

        Array.from(table.rows).forEach(row => {
          const rowCount = Array.from(row.cells).reduce((total, cell) => {
            return total + (Number(cell.colSpan) || 1);
          }, 0);

          count = Math.max(count, rowCount);
        });

        return count;
      }







      applyFontFamily(fontFamily) {
        this.applyFormatting({
          fontFamily
        });
      }

      applyFontSize(fontSize) {
        this.applyFormatting({
          fontSize
        });
      }

      applyTextColor(color) {
        this.applyFormatting({
          color
        });
      }

      onFontColorInput(color) {
        this.deferFormattingUndo = true;
        this.applyTextColor(color);
      }

      onFontColorChange(color) {
        this.deferFormattingUndo = false;
        this.applyTextColor(color);
      }

      onBorderColorInput(color) {
        this.deferFormattingUndo = true;
        this.applyBorderColorFromToolbar(color);
      }

      onBorderColorChange(color) {
        this.deferFormattingUndo = false;
        this.applyBorderColorFromToolbar(color);
      }

      onBorderWidthChange() {
        this.applyBorderAppearanceFromToolbar();
      }

      onBorderStyleChange() {
        this.applyBorderAppearanceFromToolbar();
      }

      onBorderRadiusChange() {
        this.applyBorderAppearanceFromToolbar();
      }

      applyBorderAppearanceFromToolbar() {
        const settings = this.getBorderSettings();
        const tableContext = this.getCurrentTableBorderContext();

        if (tableContext && this.refreshBorderAppearanceOnTableContext(tableContext, settings)) {
          this.syncAndSelectTableComponent(tableContext, tableContext.mode || "cell");
          return;
        }

        const target = this.getCurrentBoxBorderTarget();

        if (!target?.element) {
          return;
        }

        if (this.refreshBorderAppearanceOnElement(target.element, settings)) {
          this.syncBorderTargetAfterChange(target);
        }
      }

      refreshBorderAppearanceOnTableContext(context, settings = this.getBorderSettings()) {
        if (!context?.table) {
          return false;
        }

        const cells = this.getTableCellsForBorderPreset(context);
        let updated = false;

        cells.forEach(cell => {
          if (this.refreshBorderAppearanceOnElement(cell, settings)) {
            updated = true;
          }
        });

        if (this.refreshBorderAppearanceOnElement(context.table, settings)) {
          updated = true;
        }

        return updated;
      }

      refreshBorderAppearanceOnElement(element, settings = this.getBorderSettings()) {
        if (!element) {
          return false;
        }

        const lineCss = this.getBorderLineCss(settings);

        if (!lineCss || !this.elementHasVisibleUserBorder(element)) {
          return false;
        }

        const shorthand = element.style.getPropertyValue("border").trim();

        if (shorthand && !/^none$/i.test(shorthand)) {
          this.applyBorderStyle(element, settings);
          return true;
        }

        let updated = false;

        ["top", "right", "bottom", "left"].forEach(edge => {
          if (!this.elementHasVisibleBorderOnEdge(element, edge)) {
            return;
          }

          this.setBorderEdge(element, edge, lineCss);
          updated = true;
        });

        if (!updated) {
          return false;
        }

        const radius = this.normalizeBorderRadius(settings.radius);

        if (radius) {
          element.style.setProperty("border-radius", radius, "important");
        }

        if (element.matches?.(WordexEditor.subParagraphSelector)) {
          this.syncSubParagraphEditorOutline(element);
        }

        if (this.isChartBorderElement(element)) {
          this.markChartBorderExplicit(element, true);
        }

        if (element.matches?.(".wordex-textbox")) {
          this.refreshTextboxLayoutAfterBorderChange(element);
        }

        return true;
      }

      applyBorderColorFromToolbar(color = null) {
        const settings = this.getBorderSettings();

        if (color) {
          settings.color = color;
        }

        const tableContext = this.getCurrentTableBorderContext();

        if (tableContext && this.refreshBorderColorOnTableContext(tableContext, settings)) {
          this.syncAndSelectTableComponent(tableContext, tableContext.mode || "cell");
          return;
        }

        const target = this.getCurrentBoxBorderTarget();

        if (!target?.element) {
          return;
        }

        if (this.refreshBorderColorOnElement(target.element, settings)) {
          this.syncBorderTargetAfterChange(target);
        }
      }

      refreshBorderColorOnTableContext(context, settings = this.getBorderSettings()) {
        if (!context?.table) {
          return false;
        }

        const cells = this.getTableCellsForBorderPreset(context);
        let updated = false;

        cells.forEach(cell => {
          if (this.refreshBorderColorOnElement(cell, settings)) {
            updated = true;
          }
        });

        if (this.refreshBorderColorOnElement(context.table, settings)) {
          updated = true;
        }

        return updated;
      }

      refreshBorderColorOnElement(element, settings = this.getBorderSettings()) {
        if (!element) {
          return false;
        }

        const lineCss = this.getBorderLineCss(settings);

        if (!lineCss || !this.elementHasVisibleUserBorder(element)) {
          return false;
        }

        const shorthand = element.style.getPropertyValue("border").trim();

        if (shorthand && !/^none$/i.test(shorthand)) {
          this.applyBorderStyle(element, settings);
          return true;
        }

        let updated = false;

        ["top", "right", "bottom", "left"].forEach(edge => {
          if (!this.elementHasVisibleBorderOnEdge(element, edge)) {
            return;
          }

          this.setBorderEdge(element, edge, lineCss);
          updated = true;
        });

        if (!updated) {
          return false;
        }

        if (element.matches?.(WordexEditor.subParagraphSelector)) {
          this.syncSubParagraphEditorOutline(element);
        }

        if (this.isChartBorderElement(element)) {
          this.markChartBorderExplicit(element, true);
        }

        if (element.matches?.(".wordex-textbox")) {
          this.refreshTextboxLayoutAfterBorderChange(element);
        }

        return true;
      }

      toggleBold() {
        this.applyFormatting({ fontWeight: "bold" });
      }

      toggleItalic() {
        this.applyFormatting({ fontStyle: "italic" });
      }

      toggleUnderline() {
        this.applyFormatting({ textDecoration: "underline" });
      }

      clearTextEmphasis() {
        if (this.clearTextEmphasisFromSelectedText()) {
          return;
        }

        if (this.clearTextEmphasisFromActiveTableCell()) {
          return;
        }

        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          this.clearTextEmphasisFromElement(activeTextbox);
          this.removeEmptyInlineStyleElements(activeTextbox);

          const paragraph = activeTextbox.closest(".paragraph");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
            this.refreshLayoutAfterTextContentChange(paragraph, { textbox: activeTextbox });
          } else {
            this.syncObjectAfterChangeAndKeepSelected(activeTextbox);
          }

          this.renderSelection();
          this.saveUndoStateIfChanged();
          return;
        }

        if (this.selectedObject) {
          if (this.isWordexTableObject(this.selectedObject)) {
            this.clearTextEmphasisFromElement(this.selectedObject);
            this.selectedObject.querySelectorAll("td").forEach(cell => {
              this.clearTextEmphasisFromElement(cell);
            });
            this.syncTableLayoutAfterTextFormatting(this.selectedObject);
            this.keepObjectSelected(this.selectedObject);
            return;
          }

          if (this.selectedObject.matches(".wordex-textbox")) {
            this.clearTextEmphasisFromElement(this.selectedObject);
            this.selectedObject.querySelectorAll("span, strong, em, b, i, u, font").forEach(node => {
              this.clearTextEmphasisFromElement(node);
            });
            this.removeEmptyInlineStyleElements(this.selectedObject);

            const paragraph = this.selectedObject.closest(".paragraph");

            if (paragraph) {
              this.syncParagraphElement(paragraph);
              this.refreshLayoutAfterTextContentChange(paragraph, { textbox: this.selectedObject });
            } else {
              this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
            }

            this.renderSelection();
            this.saveUndoStateIfChanged();
            return;
          }

          this.clearTextEmphasisFromElement(this.selectedObject);
          this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          const subParagraph =
            this.getSelectedSubParagraphElement() ||
            paragraph.querySelector(WordexEditor.subParagraphSelector);

          if (subParagraph) {
            this.clearTextEmphasisFromElement(subParagraph);
          }

          const block = this.findBlockById(paragraph.dataset.blockId);

          if (block) {
            const subBlock = block.subParagraphs?.find(item => item.id === subParagraph?.dataset?.subParagraphId);

            if (subBlock?.style) {
              subBlock.style.fontWeight = "normal";
              subBlock.style.fontStyle = "normal";
              subBlock.style.textDecoration = "none";
            }
          }

          this.syncParagraphElement(paragraph);
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }
      }

      clearTextEmphasisFromSelectedText() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        const textbox = this.getTextboxFromRange(range);

        /*
          O sublinhado pode estar num span ancestral. Nesse caso, limpar apenas
          o trecho extraído não basta, porque o texto continua dentro do ancestral
          sublinhado. O removeFormat nativo quebra essa estrutura antes.
        */
        document.execCommand("removeFormat", false, null);
        document.execCommand("unlink", false, null);

        const cleanRange = selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : range;

        if (textbox) {
          this.clearTextEmphasisInRange(cleanRange, textbox);
          this.removeEmptyInlineStyleElements(textbox);
          this.syncParagraphElement(paragraph);
          this.refreshLayoutAfterTextContentChange(paragraph, { textbox });
          this.renderSelection();
          this.saveUndoStateIfChanged();
          return true;
        }

        const container = cleanRange.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? cleanRange.commonAncestorContainer
          : cleanRange.commonAncestorContainer.parentElement;

        const cleanupRoot = container?.closest?.(".paragraph, td") || paragraph;

        this.clearTextEmphasisFromElement(cleanupRoot);
        this.removeEmptyInlineStyleElements(cleanupRoot);

        this.selectedParagraphId = paragraph.dataset.blockId;
        this.selectedBlockId = paragraph.dataset.blockId;

        const activeCell = cleanupRoot?.matches?.("td")
          ? cleanupRoot
          : cleanupRoot?.closest?.("td");

        if (activeCell && paragraph.contains(activeCell)) {
          this.syncTableLayoutAfterCellContentChange([activeCell]);
          this.renderSelection();
          return true;
        }

        this.syncParagraphElement(paragraph);
        this.renderSelection();
        this.saveUndoStateIfChanged();

        return true;
      }

      clearTextEmphasisFromElement(element) {
        if (!element) return;

        const clearElement = node => {
          if (!(node instanceof Element)) return;

          node.style.fontWeight = "normal";
          node.style.fontStyle = "normal";
          node.style.textDecoration = "none";
          node.style.textDecorationLine = "none";
          node.style.textDecorationStyle = "";
          node.style.textDecorationColor = "";

          node.removeAttribute("face");
        };

        clearElement(element);

        element.querySelectorAll("*").forEach(clearElement);

        /*
          Tags semânticas de ênfase continuam prevalecendo em alguns casos.
          Por isso, ao usar Normal, elas são desfeitas preservando o conteúdo.
        */
        Array.from(element.querySelectorAll("b, strong, i, em, u")).forEach(node => {
          node.replaceWith(...Array.from(node.childNodes));
        });
      }

      clearTextEmphasisInRange(range, root) {
        if (!range || !root) {
          return;
        }

        const elements = [];
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT);

        let node = walker.currentNode;

        while (node) {
          if (typeof range.intersectsNode === "function" && range.intersectsNode(node)) {
            elements.push(node);
          }

          node = walker.nextNode();
        }

        elements.reverse().forEach(element => {
          if (element.matches("b, strong, i, em, u")) {
            element.replaceWith(...Array.from(element.childNodes));
            return;
          }

          if (element === root) {
            return;
          }

          element.style.fontWeight = "";
          element.style.fontStyle = "";
          element.style.textDecoration = "";
          element.style.textDecorationLine = "";
          element.style.textDecorationStyle = "";
          element.style.textDecorationColor = "";
          element.removeAttribute("face");
        });
      }

      removeEmptyInlineStyleElements(root) {
        if (!root) return;

        Array.from(root.querySelectorAll("span")).forEach(span => {
          const style = span.getAttribute("style") || "";

          if (
            style.replace(/\s/g, "") === "" ||
            style.replace(/\s/g, "") === "font-weight:normal;font-style:normal;text-decoration:none;text-decoration-line:none;"
          ) {
            span.replaceWith(...Array.from(span.childNodes));
          }
        });
      }

      getBorderSettings() {
        const color = document.getElementById("borderColor")?.value || "#000000";
        const width = document.getElementById("borderWidth")?.value || "1px";
        const style = document.getElementById("borderStyle")?.value || "solid";
        const radius = document.getElementById("borderRadius")?.value || "0";

        return {
          color,
          width,
          style,
          radius
        };
      }

      static getChartDefaultBorderSettings() {
        return {
          color: "#000000",
          width: "1px",
          style: "solid",
          radius: "0"
        };
      }

      isChartBorderElement(element) {
        return !!element?.matches?.(".wordex-chart-box");
      }

      chartHasVisibleBorder(element) {
        if (!element) {
          return false;
        }

        const computed = window.getComputedStyle(element);
        const widths = [
          computed.borderTopWidth,
          computed.borderRightWidth,
          computed.borderBottomWidth,
          computed.borderLeftWidth
        ].map(value => parseFloat(value) || 0);

        if (!widths.some(width => width > 0)) {
          return false;
        }

        return ["top", "right", "bottom", "left"].some(edge => {
          const style = computed[`border${edge.charAt(0).toUpperCase()}${edge.slice(1)}Style`];
          return style && style !== "none" && style !== "hidden";
        });
      }

      elementHasExplicitNoBorder(element) {
        if (!element?.style) {
          return false;
        }

        const shorthand = element.style.getPropertyValue("border").trim().toLowerCase();

        if (shorthand === "none") {
          return true;
        }

        const edges = ["top", "right", "bottom", "left"].map(edge =>
          element.style.getPropertyValue(`border-${edge}`).trim().toLowerCase()
        );

        return edges.length > 0 && edges.every(value => value === "none");
      }

      ensureChartEssentialBorder(element, settings = WordexEditor.getChartDefaultBorderSettings()) {
        if (!this.isChartBorderElement(element)) {
          return;
        }

        if (element.dataset.wordexBorderNone === "1" || this.elementHasExplicitNoBorder(element)) {
          element.dataset.wordexBorderNone = "1";
          return;
        }

        if (this.chartHasVisibleBorder(element)) {
          return;
        }

        this.applyBorderStyle(element, settings);
      }

      markChartBorderExplicit(element, hasBorder) {
        if (!this.isChartBorderElement(element)) {
          return;
        }

        if (hasBorder) {
          delete element.dataset.wordexBorderNone;
        } else {
          element.dataset.wordexBorderNone = "1";
        }
      }

      clearBoxBorderShorthand(element) {
        if (!element) {
          return;
        }

        element.style.removeProperty("border");
      }

      expandBoxBorderShorthandToEdges(element) {
        if (!element) {
          return;
        }

        const shorthand = element.style.getPropertyValue("border").trim();

        if (!shorthand || shorthand.toLowerCase() === "none") {
          return;
        }

        ["top", "right", "bottom", "left"].forEach(edge => {
          const existing = element.style.getPropertyValue(`border-${edge}`).trim();

          if (!existing) {
            element.style.setProperty(`border-${edge}`, shorthand, "important");
          }
        });
        element.style.removeProperty("border");
      }

      applyStoredBorderEdgesToElement(element, style = {}) {
        if (!element) {
          return;
        }

        const edgeKeys = ["Top", "Right", "Bottom", "Left"];
        const hasPerEdge = edgeKeys.some(edge => style[`border${edge}`]);

        if (hasPerEdge) {
          element.style.removeProperty("border");
          edgeKeys.forEach(edge => {
            const key = `border${edge}`;
            const cssKey = `border-${edge.toLowerCase()}`;
            const value = style[key];

            if (value) {
              element.style.setProperty(cssKey, value, "important");
            } else {
              element.style.setProperty(cssKey, "none", "important");
            }
          });
          this.syncSubParagraphEditorOutline(element);
          return;
        }

        if (style.border) {
          element.style.setProperty("border", style.border, "important");
          edgeKeys.forEach(edge => {
            element.style.removeProperty(`border-${edge.toLowerCase()}`);
          });
        } else {
          element.style.removeProperty("border");
          edgeKeys.forEach(edge => {
            element.style.removeProperty(`border-${edge.toLowerCase()}`);
          });
        }

        this.syncSubParagraphEditorOutline(element);
      }

      extractBorderEdgeStylesFromElement(element) {
        const edges = {};

        if (!element) {
          return edges;
        }

        ["top", "right", "bottom", "left"].forEach(edge => {
          const value = element.style.getPropertyValue(`border-${edge}`);

          if (value) {
            edges[`border${edge.charAt(0).toUpperCase()}${edge.slice(1)}`] = value;
          }
        });

        return edges;
      }

      elementHasVisibleBorderOnEdge(element, edge) {
        if (!element) {
          return false;
        }

        const edgeName = String(edge || "").charAt(0).toUpperCase() + String(edge || "").slice(1);
        const computed = window.getComputedStyle(element);
        const width = parseFloat(computed[`border${edgeName}Width`]) || 0;
        const lineStyle = computed[`border${edgeName}Style`];

        return width > 0 && lineStyle && lineStyle !== "none";
      }

      elementHasVisibleUserBorder(element) {
        return ["top", "right", "bottom", "left"].some(edge =>
          this.elementHasVisibleBorderOnEdge(element, edge)
        );
      }

      elementHasFullUserBorder(element) {
        return ["top", "right", "bottom", "left"].every(edge =>
          this.elementHasVisibleBorderOnEdge(element, edge)
        );
      }

      ensureSubParagraphEditorGuides(element) {
        let guides = element.querySelector(":scope > .wordex-sub-paragraph-editor-guides");

        if (!guides) {
          guides = document.createElement("div");
          guides.className = "wordex-sub-paragraph-editor-guides";
          guides.setAttribute("aria-hidden", "true");
          element.insertBefore(guides, element.firstChild);
        }

        return guides;
      }

      removeSubParagraphEditorGuides(element) {
        element?.querySelectorAll(":scope > .wordex-sub-paragraph-editor-guides").forEach(node => node.remove());
      }

      syncSubParagraphEditorOutline(element) {
        if (!element?.matches?.(WordexEditor.subParagraphSelector)) {
          return;
        }

        if (this.subParagraphHostsMainLayoutObject(element)) {
          this.removeSubParagraphEditorGuides(element);
          element.classList.remove("wordex-has-user-border", "wordex-has-full-user-border");
          return;
        }

        const edges = ["top", "right", "bottom", "left"];
        const borderedEdges = edges.filter(edge => this.elementHasVisibleBorderOnEdge(element, edge));
        const hasUserBorder = borderedEdges.length > 0;
        const hasFullUserBorder = borderedEdges.length === edges.length;

        element.classList.toggle("wordex-has-user-border", hasUserBorder);
        element.classList.toggle("wordex-has-full-user-border", hasFullUserBorder);

        if (!hasUserBorder || hasFullUserBorder) {
          this.removeSubParagraphEditorGuides(element);
          return;
        }

        const guides = this.ensureSubParagraphEditorGuides(element);

        edges.forEach(edge => {
          const cssEdge = `border-${edge}`;

          if (borderedEdges.includes(edge)) {
            guides.style.removeProperty(cssEdge);
            return;
          }

          guides.style.setProperty(cssEdge, "1px dashed", "important");
        });
      }

      normalizeBorderRadius(radius) {
        const value = String(radius ?? "0").trim();

        if (!value || value === "0" || value === "0px") {
          return "";
        }

        return value;
      }

      prepareTableForCellBorderRadius(table, radius) {
        const normalizedRadius = this.normalizeBorderRadius(radius);

        if (!table || !normalizedRadius) {
          return;
        }

        table.style.setProperty("border-collapse", "separate", "important");
        table.style.setProperty("border-spacing", "0", "important");
        table.style.setProperty("overflow", "hidden", "important");
        table.dataset.wordexBorderRadius = "1";
      }

      maybeResetTableBorderCollapse(table) {
        if (!table) {
          return;
        }

        const hasRadius = Array.from(table.querySelectorAll("td")).some(cell => {
          return !!(
            cell.style.borderRadius ||
            cell.style.borderTopLeftRadius ||
            cell.style.borderTopRightRadius ||
            cell.style.borderBottomLeftRadius ||
            cell.style.borderBottomRightRadius
          );
        });

        if (hasRadius) {
          return;
        }

        table.style.removeProperty("border-collapse");
        table.style.removeProperty("border-spacing");
        table.style.removeProperty("overflow");
        delete table.dataset.wordexBorderRadius;
      }

      clearCellBorderRadius(cell) {
        if (!cell) {
          return;
        }

        cell.style.removeProperty("border-radius");
        cell.style.removeProperty("border-top-left-radius");
        cell.style.removeProperty("border-top-right-radius");
        cell.style.removeProperty("border-bottom-left-radius");
        cell.style.removeProperty("border-bottom-right-radius");
      }

      applyCellBorderRadiusForBounds(cell, radius, bounds) {
        const normalizedRadius = this.normalizeBorderRadius(radius);

        this.clearCellBorderRadius(cell);

        if (!normalizedRadius) {
          return;
        }

        if (!bounds) {
          cell.style.setProperty("border-radius", normalizedRadius, "important");
          return;
        }

        const { rowIndex, columnIndex, minRow, maxRow, minColumn, maxColumn } = bounds;

        if (rowIndex === minRow && columnIndex === minColumn) {
          cell.style.setProperty("border-top-left-radius", normalizedRadius, "important");
        }

        if (rowIndex === minRow && columnIndex === maxColumn) {
          cell.style.setProperty("border-top-right-radius", normalizedRadius, "important");
        }

        if (rowIndex === maxRow && columnIndex === minColumn) {
          cell.style.setProperty("border-bottom-left-radius", normalizedRadius, "important");
        }

        if (rowIndex === maxRow && columnIndex === maxColumn) {
          cell.style.setProperty("border-bottom-right-radius", normalizedRadius, "important");
        }
      }

      applyCellBorderRadiusForEdge(cell, preset, radius, bounds) {
        const normalizedRadius = this.normalizeBorderRadius(radius);

        if (!cell || !normalizedRadius || !bounds) {
          return;
        }

        const { rowIndex, columnIndex, minRow, maxRow, minColumn, maxColumn } = bounds;

        if (preset === "top" && rowIndex === minRow) {
          if (columnIndex === minColumn) {
            cell.style.setProperty("border-top-left-radius", normalizedRadius, "important");
          }

          if (columnIndex === maxColumn) {
            cell.style.setProperty("border-top-right-radius", normalizedRadius, "important");
          }
        }

        if (preset === "bottom" && rowIndex === maxRow) {
          if (columnIndex === minColumn) {
            cell.style.setProperty("border-bottom-left-radius", normalizedRadius, "important");
          }

          if (columnIndex === maxColumn) {
            cell.style.setProperty("border-bottom-right-radius", normalizedRadius, "important");
          }
        }

        if (preset === "left" && columnIndex === minColumn) {
          if (rowIndex === minRow) {
            cell.style.setProperty("border-top-left-radius", normalizedRadius, "important");
          }

          if (rowIndex === maxRow) {
            cell.style.setProperty("border-bottom-left-radius", normalizedRadius, "important");
          }
        }

        if (preset === "right" && columnIndex === maxColumn) {
          if (rowIndex === minRow) {
            cell.style.setProperty("border-top-right-radius", normalizedRadius, "important");
          }

          if (rowIndex === maxRow) {
            cell.style.setProperty("border-bottom-right-radius", normalizedRadius, "important");
          }
        }
      }

      applyBorderStyle(element, settings = this.getBorderSettings()) {
        if (!element) return;

        /*
          v242: borda precisa funcionar também em textbox, imagem, histograma e
          parágrafo. Alguns desses elementos possuem borda/outline definidos no
          CSS do editor; por isso usamos setProperty(..., "important") para que
          a escolha do usuário prevaleça visualmente e também no HTML salvo.
        */
        if (settings.width === "0" || settings.style === "none") {
          this.clearBorderStyle(element);
          return;
        }

        this.clearBoxBorderShorthand(element);
        element.style.setProperty(
          "border",
          `${settings.width} ${settings.style} ${settings.color}`,
          "important"
        );
        this.markChartBorderExplicit(element, true);

        if (element.matches("td")) {
          const table = element.closest(".wordex-table");
          const normalizedRadius = this.normalizeBorderRadius(settings.radius);

          if (table && normalizedRadius) {
            this.prepareTableForCellBorderRadius(table, normalizedRadius);
            element.style.setProperty("border-radius", normalizedRadius, "important");
          } else {
            element.style.setProperty("border-radius", settings.radius, "important");
          }
        } else {
          element.style.setProperty("border-radius", settings.radius, "important");
        }

        /*
          Border-radius em tabela só funciona de forma decente com separate.
        */
        if (element.matches("table")) {
          element.style.borderCollapse = "separate";
          element.style.borderSpacing = "0";
          element.style.overflow = "hidden";

          if (this.normalizeBorderRadius(settings.radius)) {
            element.dataset.wordexBorderRadius = "1";
          }
        }

        if (element.matches(".wordex-textbox")) {
          this.refreshTextboxLayoutAfterBorderChange(element);
        }

        this.syncSubParagraphEditorOutline(element);
      }

      clearBorderStyle(element) {
        if (!element) return;

        /*
          Não basta remover a borda inline: vários elementos do editor têm uma
          borda padrão no CSS. Para "Sem Borda", gravamos border: none em todos
          os lados para vencer shorthand e longhands anteriores.
        */
        element.style.setProperty("border", "none", "important");
        element.style.setProperty("border-top", "none", "important");
        element.style.setProperty("border-right", "none", "important");
        element.style.setProperty("border-bottom", "none", "important");
        element.style.setProperty("border-left", "none", "important");
        element.style.removeProperty("border-radius");
        this.markChartBorderExplicit(element, false);

        if (element.matches("td")) {
          this.clearCellBorderRadius(element);
          this.maybeResetTableBorderCollapse(element.closest(".wordex-table"));
        }

        if (element.matches("table")) {
          element.style.borderCollapse = "collapse";
          element.style.borderSpacing = "";
          element.style.overflow = "";
          delete element.dataset.wordexBorderRadius;
        }

        if (element.matches(".wordex-textbox")) {
          this.refreshTextboxLayoutAfterBorderChange(element);
        }

        this.syncSubParagraphEditorOutline(element);
      }


      forEachSelectedTableTarget(mode, callback) {
        const context = this.getSelectedTableContext();
        if (!context) return null;

        if (mode === "cell") {
          this.getSelectedTableCells().forEach(callback);
        } else if (mode === "row") {
          const rowIndices = this.getSelectedTableRowIndices().length
            ? this.getSelectedTableRowIndices()
            : [this.getTableRowIndex(context.table, context.row)];

          rowIndices.forEach(rowIndex => {
            const row = context.table.rows[rowIndex];

            if (row) {
              Array.from(row.cells).forEach(callback);
            }
          });
        } else if (mode === "column") {
          const columnIndices = this.getSelectedTableColumnIndices().length
            ? this.getSelectedTableColumnIndices()
            : [context.columnIndex];

          Array.from(context.table.rows).forEach(row => {
            columnIndices.forEach(columnIndex => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                callback(slot.cell);
              }
            });
          });
        } else if (mode === "table") {
          callback(context.table);
          context.table.querySelectorAll("td").forEach(callback);
        }

        return context;
      }

      applyBorderToSelectedTableComponent() {
        const mode = this.selectedTableMode || "cell";
        const handlers = {
          table: () => this.applyBorderToSelectedTable(),
          row: () => this.applyBorderToSelectedTableRow(),
          column: () => this.applyBorderToSelectedTableColumn(),
          cell: () => this.applyBorderToSelectedTableCell()
        };

        (handlers[mode] || handlers.cell)();
      }

      applyBorderToSelectedTableCell() {
        this.applyBorderToSelectedTableScope("cell");
      }

      applyBorderToSelectedTableRow() {
        this.applyBorderToSelectedTableScope("row");
      }

      applyBorderToSelectedTableColumn() {
        this.applyBorderToSelectedTableScope("column");
      }

      syncAndSelectTableComponent(context, mode) {
        if (!context?.table) return;
        this.syncObjectAfterChange(context.table);
        this.syncFreeContainerBoundsForObject(context.table);
        this.selectTableComponent(context.table, context.cell, mode);
      }

      applyBorderToSelectedTableScope(mode) {
        const context = this.forEachSelectedTableTarget(mode, cell => this.applyBorderStyle(cell));
        if (!context) return;

        this.syncAndSelectTableComponent(context, mode);
      }

      applyBorderToSelectedTable() {
        const context = this.forEachSelectedTableTarget("table", element => {
          this.applyBorderStyle(element);
        });

        if (context) {
          this.syncAndSelectTableComponent(context, "table");
          return;
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          this.applyBorderStyle(this.selectedObject);
          this.selectedObject.querySelectorAll("td").forEach(cell => {
            this.applyBorderStyle(cell);
          });
          this.syncFreeContainerBoundsForObject(this.selectedObject);
          this.syncObjectAfterChangeAndKeepSelected(this.selectedObject);
          return;
        }

        alert("Selecione uma tabela ou célula.");
      }


      toggleBorderDropdown(event) {
        event.preventDefault();
        event.stopPropagation();

        const menu = document.getElementById("wordexBorderMenu");
        const dropdown = event.currentTarget.closest(".wordex-border-dropdown");

        if (!menu || !dropdown) return;

        const wasOpen = menu.classList.contains("is-open");
        this.closeBorderDropdown();

        if (wasOpen) return;

        const rect = dropdown.getBoundingClientRect();
        const menuWidth = 252;
        const left = Math.max(4, Math.min(rect.left, window.innerWidth - menuWidth - 8));
        const top = rect.bottom + 2;

        menu.style.left = left + "px";
        menu.style.top = top + "px";
        menu.classList.add("is-open");
      }

      closeBorderDropdown() {
        const menu = document.getElementById("wordexBorderMenu");
        if (!menu) return;

        menu.classList.remove("is-open");
      }

      getBorderLineCss(settings = this.getBorderSettings()) {
        if (!settings || settings.width === "0" || settings.style === "none") {
          return "";
        }

        return `${settings.width} ${settings.style} ${settings.color}`;
      }

      setBorderEdge(element, edge, lineCss) {
        if (!element || !edge) return;

        const property = `border-${edge}`;

        if (lineCss) {
          element.style.setProperty(property, lineCss, "important");
        } else {
          element.style.setProperty(property, "none", "important");
        }
      }

      clearCellBorders(cell) {
        if (!cell) return;

        cell.style.setProperty("border", "none", "important");
        cell.style.setProperty("border-top", "none", "important");
        cell.style.setProperty("border-right", "none", "important");
        cell.style.setProperty("border-bottom", "none", "important");
        cell.style.setProperty("border-left", "none", "important");
        this.clearCellBorderRadius(cell);
      }

      getCurrentBoxBorderTarget() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          !this.isWordexTableObject(this.selectedObject)
        ) {
          return {
            kind: "object",
            element: this.selectedObject
          };
        }

        if (this.paragraphContainerSelected) {
          const paragraph = this.getSelectedParagraphElement();

          if (paragraph && this.documentElement.contains(paragraph)) {
            return {
              kind: "paragraph-container",
              element: paragraph
            };
          }
        }

        const subParagraph = this.getSelectedSubParagraphElement();

        if (subParagraph && this.documentElement.contains(subParagraph)) {
          return {
            kind: "sub-paragraph",
            element: subParagraph
          };
        }

        return null;
      }

      applyBorderPresetToBoxElement(element, preset, settings = this.getBorderSettings()) {
        if (!element) return false;

        const lineCss = this.getBorderLineCss(settings);

        if (preset === "none") {
          this.clearBorderStyle(element);
          return true;
        }

        if (preset === "all" || preset === "outside") {
          this.applyBorderStyle(element, settings);
          return true;
        }

        if (["top", "right", "bottom", "left"].includes(preset)) {
          this.expandBoxBorderShorthandToEdges(element);
          this.setBorderEdge(element, preset, lineCss);
          element.style.setProperty("border-radius", settings.radius, "important");
          this.markChartBorderExplicit(element, !!lineCss);

          if (element.matches(".wordex-textbox")) {
            this.refreshTextboxLayoutAfterBorderChange(element);
          }

          this.syncSubParagraphEditorOutline(element);
          return true;
        }

        return false;
      }

      syncBorderTargetAfterChange(target) {
        if (!target?.element) return;

        if (target.kind === "object") {
          this.syncObjectAfterChangeAndKeepSelected(target.element);
          return;
        }

        if (target.kind === "sub-paragraph" || target.kind === "paragraph-container") {
          const paragraph = target.element.closest(".paragraph") || target.element;
          this.syncParagraphElement(paragraph);
          this.renderSelection();

          if (!this.deferFormattingUndo) {
            this.saveUndoStateIfChanged();
          }
        }
      }

      getCurrentMarginTarget() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject)
        ) {
          if (
            this.isWordexTableObject(this.selectedObject) &&
            this.selectedTableMode &&
            this.selectedTableMode !== "table"
          ) {
            return null;
          }

          return {
            kind: "object",
            element: this.selectedObject
          };
        }

        const subParagraph = this.getSelectedSubParagraphElement();

        if (subParagraph && this.documentElement.contains(subParagraph) && !this.paragraphContainerSelected) {
          return {
            kind: "sub-paragraph",
            element: subParagraph
          };
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph && this.documentElement.contains(paragraph)) {
          const wrapper = paragraph.closest(".paragraph-block");

          if (wrapper) {
            return {
              kind: "paragraph",
              element: wrapper
            };
          }
        }

        return null;
      }

      getSelectedMarginEdge() {
        const value = document.getElementById("wordexMarginEdge")?.value || "top";
        return ["top", "right", "bottom", "left"].includes(value) ? value : "top";
      }

      getMarginPropertyName(edge) {
        return "margin" + edge.charAt(0).toUpperCase() + edge.slice(1);
      }

      getElementMarginInMillimeters(element, edge) {
        if (!element) return 0;

        const property = this.getMarginPropertyName(edge);
        const inlineValue = element.style[property] || "";
        const computedValue = window.getComputedStyle(element)[property] || "0px";
        const value = inlineValue && inlineValue !== "auto" ? inlineValue : computedValue;

        return this.parseCssSizeToMillimeters(value);
      }

      setElementMarginInMillimeters(element, edge, valueMm) {
        if (!element) return;

        const property = this.getMarginPropertyName(edge);
        element.style[property] = this.formatMillimeters(valueMm);
      }

      adjustSelectedMargin(direction) {
        const target = this.getCurrentMarginTarget();

        if (!target) {
          alert("Selecione um parágrafo para alterar a margem de parágrafo.");
          return;
        }

        const edge = this.getSelectedMarginEdge();
        const stepMm = 1;
        const currentMm = this.getElementMarginInMillimeters(target.element, edge);
        const nextMm = Math.max(0, currentMm + (direction >= 0 ? stepMm : -stepMm));

        this.setElementMarginInMillimeters(target.element, edge, nextMm);

        if (target.kind === "object") {
          this.syncObjectAfterChangeAndKeepSelected(target.element);
          return;
        }

        if (target.kind === "sub-paragraph") {
          const paragraph = target.element.closest(".paragraph");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          this.renderSelection();
          this.saveUndoStateIfChanged();
          return;
        }

        if (target.kind === "paragraph") {
          const block = this.findBlockById(target.element.dataset.blockId);

          if (block) {
            block.style = block.style || {};
            block.style[this.getMarginPropertyName(edge)] = target.element.style[this.getMarginPropertyName(edge)] || "";
          }

          const paragraph = target.element.querySelector(".paragraph");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          this.renderSelection();
          this.saveUndoStateIfChanged();
        }
      }

      getCurrentTableBorderContext() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          !this.isWordexTableObject(this.selectedObject)
        ) {
          return null;
        }

        if (this.paragraphContainerSelected) {
          return null;
        }

        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            const node = selection.getRangeAt(0).commonAncestorContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            cell = element?.closest("td") || null;
          }
        }

        if (cell && this.documentElement.contains(cell)) {
          const table = cell.closest(".wordex-table");

          if (table) {
            return {
              table,
              cell,
              row: cell.parentElement,
              columnIndex: Array.from(cell.parentElement.cells).indexOf(cell),
              mode: this.selectedTableMode || "cell"
            };
          }
        }

        if (this.isWordexTableObject(this.selectedObject)) {
          return {
            table: this.selectedObject,
            cell: null,
            row: null,
            columnIndex: 0,
            mode: "table"
          };
        }

        return null;
      }

      getTableCellsForBorderPreset(context) {
        if (!context?.table) return [];

        const mode = context.mode || "cell";

        if (mode === "table" || !context.cell) {
          return Array.from(context.table.querySelectorAll("td"));
        }

        if (mode === "row") {
          return Array.from(context.row.cells);
        }

        if (mode === "column") {
          return Array.from(context.table.rows)
            .map(row => row.cells[context.columnIndex])
            .filter(Boolean);
        }

        return [context.cell];
      }

      getCellGridPosition(table, cell) {
        const row = cell?.parentElement;
        if (!table || !row) return { rowIndex: -1, columnIndex: -1 };

        return {
          rowIndex: Array.from(table.rows).indexOf(row),
          columnIndex: Array.from(row.cells).indexOf(cell)
        };
      }

      applyBorderPresetToCells(context, preset, settings = this.getBorderSettings()) {
        const cells = this.getTableCellsForBorderPreset(context);

        if (!context?.table || cells.length === 0) {
          return false;
        }

        const lineCss = this.getBorderLineCss(settings);
        const positions = cells.map(cell => ({ cell, ...this.getCellGridPosition(context.table, cell) }));
        const rowIndexes = positions.map(item => item.rowIndex).filter(index => index >= 0);
        const columnIndexes = positions.map(item => item.columnIndex).filter(index => index >= 0);
        const minRow = Math.min(...rowIndexes);
        const maxRow = Math.max(...rowIndexes);
        const minColumn = Math.min(...columnIndexes);
        const maxColumn = Math.max(...columnIndexes);

        const applyEdge = (cell, edge) => this.setBorderEdge(cell, edge, lineCss);
        const bounds = {
          minRow,
          maxRow,
          minColumn,
          maxColumn
        };

        if (preset === "none") {
          cells.forEach(cell => this.clearCellBorders(cell));
          context.table.style.border = "";
          this.maybeResetTableBorderCollapse(context.table);
          return true;
        }

        if (preset === "all") {
          if (this.normalizeBorderRadius(settings.radius)) {
            this.prepareTableForCellBorderRadius(context.table, settings.radius);
          }

          positions.forEach(item => {
            item.cell.style.setProperty("border", lineCss, "important");
            this.applyCellBorderRadiusForBounds(item.cell, settings.radius, {
              rowIndex: item.rowIndex,
              columnIndex: item.columnIndex,
              ...bounds
            });
          });
          return true;
        }

        if (["top", "right", "bottom", "left"].includes(preset)) {
          if (this.normalizeBorderRadius(settings.radius)) {
            this.prepareTableForCellBorderRadius(context.table, settings.radius);
          }

          cells.forEach(cell => applyEdge(cell, preset));
          positions.forEach(item => {
            this.applyCellBorderRadiusForEdge(item.cell, preset, settings.radius, {
              rowIndex: item.rowIndex,
              columnIndex: item.columnIndex,
              ...bounds
            });
          });
          return true;
        }

        if (preset === "outside") {
          positions.forEach(item => {
            if (item.rowIndex === minRow) applyEdge(item.cell, "top");
            if (item.rowIndex === maxRow) applyEdge(item.cell, "bottom");
            if (item.columnIndex === minColumn) applyEdge(item.cell, "left");
            if (item.columnIndex === maxColumn) applyEdge(item.cell, "right");
          });
          return true;
        }

        if (preset === "inside" || preset === "insideHorizontal" || preset === "insideVertical") {
          positions.forEach(item => {
            if ((preset === "inside" || preset === "insideHorizontal") && item.rowIndex < maxRow) {
              applyEdge(item.cell, "bottom");
            }

            if ((preset === "inside" || preset === "insideVertical") && item.columnIndex < maxColumn) {
              applyEdge(item.cell, "right");
            }
          });
          return true;
        }

        return false;
      }

      applyTableBorderPreset(preset) {
        this.closeBorderDropdown();

        const target = this.getCurrentBoxBorderTarget();

        if (
          target &&
          (
            target.kind === "paragraph-container" ||
            target.kind === "sub-paragraph" ||
            (target.kind === "object" && !this.isWordexTableObject(target.element))
          )
        ) {
          const applied = this.applyBorderPresetToBoxElement(target.element, preset);

          if (!applied) {
            alert("Bordas internas só se aplicam a tabelas.");
            return;
          }

          this.syncBorderTargetAfterChange(target);
          return;
        }

        const context = this.getCurrentTableBorderContext();

        if (context) {
          const applied = this.applyBorderPresetToCells(context, preset);

          if (!applied) {
            alert("Opção de borda ainda não implementada.");
            return;
          }

          this.syncAndSelectTableComponent(context, context.mode || "cell");
          return;
        }

        if (target) {
          const applied = this.applyBorderPresetToBoxElement(target.element, preset);

          if (!applied) {
            alert("Bordas internas só se aplicam a tabelas.");
            return;
          }

          this.syncBorderTargetAfterChange(target);
          return;
        }

        alert("Selecione uma célula, tabela, objeto ou parágrafo para aplicar essa borda.");
      }


      trySelectObjectInsideTableCell(event, container = this.documentElement) {
        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object || !container.contains(object)) {
          return false;
        }

        const cell = object.closest("td");

        if (!cell || !container.contains(cell)) {
          return false;
        }

        const ownerTable = cell.closest(".wordex-table");

        /*
          Se o objeto encontrado for a própria tabela dona da célula,
          não é objeto interno: deixa o fluxo normal selecionar célula/tabela.
          Imagem, histograma, textbox e tabela aninhada dentro da célula devem
          poder ser selecionados para configurar/redimensionar.
        */
        if (ownerTable && object === ownerTable) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        event.wordexTableClickHandled = true;

        this.selectObject(object);
        return true;
      }

      handleTableOrObjectClick(event, container, options = {}) {
        const {
          stopPropagationAtStart = false,
          stopPropagationOnCell = false,
          stopPropagationOnCellModifier = false,
          stopPropagationOnObject = false,
          stopPropagationOnObjectModifier = false,
          requireObjectInContainer = true
        } = options;

        if (event.defaultPrevented || event.wordexTableClickHandled) {
          return true;
        }

        if (stopPropagationAtStart) {
          event.stopPropagation();
        }

        if (this.trySelectObjectInsideTableCell(event, container)) {
          return true;
        }

        const cell = event.target.closest("td");

        if (cell && container.contains(cell)) {
          const table = cell.closest(".wordex-table");

          if (table) {
            if (stopPropagationOnCell) {
              event.stopPropagation();
            }

            event.wordexTableClickHandled = true;

            if (event.shiftKey) {
              event.preventDefault();

              if (stopPropagationOnCellModifier || stopPropagationOnCell) {
                event.stopPropagation();
              }

              this.handleTableShiftSelection(table, cell);
              return true;
            }

            if (this.isPrimaryModifierPressed(event)) {
              event.preventDefault();

              if (stopPropagationOnCellModifier) {
                event.stopPropagation();
              }

              this.cycleTableComponentSelection(cell);
              return true;
            }

            /*
              Após arrastar a tabela, ignorar o click fantasma.
              Clique normal com tabela selecionada (modo table) entra na célula
              para editar texto/macros; o arrasto usa mousedown + movimento.
            */
            if (this.inlineObjectDragSuppressClickClear) {
              return true;
            }

            this.enterTableCellEditMode(cell);
            return true;
          }
        }

        const object = event.target.closest(WordexEditor.objectSelector);

        if (!object) {
          return false;
        }

        if (requireObjectInContainer && !container.contains(object)) {
          return false;
        }

        if (stopPropagationOnObject) {
          event.stopPropagation();
        }

        const isPrimaryModifier = this.isPrimaryModifierPressed(event);
        const isTextboxObject = object.matches(".wordex-textbox");

        /*
          v254: textbox passa a seguir a lógica da tabela:
          - clique normal edita o texto interno e não seleciona o objeto;
          - Ctrl+click seleciona o textbox como objeto para alinhar,
            redimensionar, aplicar borda, margem etc.
        */
        if (isTextboxObject && !isPrimaryModifier) {
          if (this.selectedObject === object) {
            this.selectedObject = null;
            this.renderSelection();
          }

          return false;
        }

        if (isPrimaryModifier && this.isWordexTableObject(object)) {
          event.preventDefault();
          event.wordexTableClickHandled = true;

          if (stopPropagationOnObjectModifier) {
            event.stopPropagation();
          }

          const cycleCell = this.getCellForTableComponentCycle(object, event.target);

          if (cycleCell) {
            this.cycleTableComponentSelection(cycleCell);
          } else {
            const fallbackCell = object.rows?.[1]?.cells?.[0] || object.rows?.[0]?.cells?.[0] || null;

            if (fallbackCell) {
              this.cycleTableComponentSelection(fallbackCell);
            } else {
              this.selectObject(object);
            }
          }
        } else {
          if (isPrimaryModifier) {
            event.preventDefault();

            if (stopPropagationOnObjectModifier) {
              event.stopPropagation();
            }
          }

          this.selectObject(object);
        }

        return true;
      }

      clearTableComponentSelectionState() {
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.selectedTableRowIndices = [];
        this.selectedTableColumnIndices = [];
        this.selectedTableCells = [];
        this.tableSelectionAnchor = null;
      }

      isTableComponentSelectionActive(table) {
        return !!(
          table &&
          this.selectedObject === table &&
          this.selectedTableMode &&
          (
            this.selectedTableMode === "table" ||
            this.selectedTableMode === "row" ||
            this.selectedTableMode === "column" ||
            (this.selectedTableMode === "cell" && this.getSelectedTableCells().length > 0)
          )
        );
      }

      focusTableCellForEditing(cell) {
        if (!cell || !this.documentElement.contains(cell)) {
          return;
        }

        cell.focus({ preventScroll: true });

        const selection = window.getSelection();

        if (!selection) {
          return;
        }

        if (
          selection.rangeCount > 0 &&
          cell.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          this.savedRange = selection.getRangeAt(0).cloneRange();
          return;
        }

        const range = document.createRange();
        range.selectNodeContents(cell);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);
        this.savedRange = range.cloneRange();
      }

      prepareTableCellForEditing(cell) {
        if (!cell) {
          return;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          return;
        }

        this.selectedObject = null;
        this.clearTableComponentSelectionState();
        this.selectedCell = cell;
        this.macroPickerActiveTable = table;
        table.dataset.wordexSelectionMode = "cell";
        this.focusTableCellForEditing(cell);
        this.renderSelection();
      }

      enterTableCellEditMode(cell) {
        if (!cell) {
          return;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          return;
        }

        this.selectedObject = null;
        this.clearTableComponentSelectionState();
        this.selectedCell = cell;
        this.macroPickerActiveTable = table;
        table.dataset.wordexSelectionMode = "cell";

        const paragraph = table.closest(".paragraph");
        const region = table.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        }

        this.focusTableCellForEditing(cell);
        this.renderSelection();
      }

      selectTableCell(cell) {
        this.enterTableCellEditMode(cell);
      }

      handleTableShiftSelection(table, cell) {
        if (!table || !cell) {
          return;
        }

        const hasCellSelection =
          this.selectedObject === table &&
          this.selectedTableMode === "cell" &&
          this.getSelectedTableCells().length > 0;
        const canExtend =
          hasCellSelection &&
          !!this.resolveTableSelectionAnchor(table, cell, "cell");

        if (canExtend) {
          this.extendTableSelectionFromCell(cell);
          return;
        }

        this.selectTableComponent(table, cell, "cell", { cells: [cell] });
      }

      getCellForTableComponentCycle(table, target) {
        if (!table) return null;

        const targetElement = target && target.nodeType === Node.ELEMENT_NODE
          ? target
          : target?.parentElement;

        const targetCell = targetElement?.closest?.("td") || null;

        if (targetCell && table.contains(targetCell)) {
          return targetCell;
        }

        if (this.selectedCell && table.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        return table.rows?.[0]?.cells?.[0] || null;
      }

      cycleTableComponentSelection(cell) {
        if (!cell) return;

        const table = cell.closest(".wordex-table");

        if (!table) return;

        const isTableActive = this.selectedObject === table;
        const currentMode = isTableActive
          ? (this.selectedTableMode || table.dataset.wordexSelectionMode || "table")
          : null;

        let nextMode = "table";

        if (!isTableActive || !currentMode || currentMode === "cell") {
          nextMode = "table";
        } else if (currentMode === "table") {
          nextMode = "row";
        } else if (currentMode === "row") {
          nextMode = "column";
        } else if (currentMode === "column") {
          nextMode = "table";
        }

        this.selectTableComponent(table, cell, nextMode);
      }

      getTableRowIndex(table, row) {
        return Array.from(table?.rows || []).indexOf(row);
      }

      getCellLogicalColumnIndex(row, cell) {
        let logical = 0;

        for (const current of Array.from(row?.cells || [])) {
          if (current === cell) {
            return logical;
          }

          logical += Number(current.colSpan) || 1;
        }

        return -1;
      }

      getTableCellAtLogicalColumn(row, logicalCol) {
        let logical = 0;

        for (const cell of Array.from(row?.cells || [])) {
          const span = Number(cell.colSpan) || 1;

          if (logicalCol >= logical && logicalCol < logical + span) {
            return { cell, logicalStart: logical, span };
          }

          logical += span;
        }

        return null;
      }

      normalizeContiguousIndices(indices = []) {
        return [...new Set(indices.filter(index => Number.isInteger(index) && index >= 0))].sort(
          (left, right) => left - right
        );
      }


      getSelectedTableRowIndices() {
        if (this.selectedTableRowIndices?.length) {
          return this.normalizeContiguousIndices(this.selectedTableRowIndices);
        }

        if (this.selectedTableRow && this.selectedObject?.rows) {
          const rowIndex = this.getTableRowIndex(this.selectedObject, this.selectedTableRow);

          return rowIndex >= 0 ? [rowIndex] : [];
        }

        return [];
      }

      getSelectedTableColumnIndices() {
        if (this.selectedTableColumnIndices?.length) {
          return this.normalizeContiguousIndices(this.selectedTableColumnIndices);
        }

        if (Number.isInteger(this.selectedTableColumnIndex)) {
          return [this.selectedTableColumnIndex];
        }

        return [];
      }

      getSelectedTableCells() {
        if (this.selectedTableCells?.length) {
          return this.selectedTableCells.filter(cell => cell?.isConnected);
        }

        if (this.selectedCell?.isConnected) {
          return [this.selectedCell];
        }

        return [];
      }

      isStructuralTableRowForMerge(row) {
        const rowType = this.normalizeTableRowType(row?.dataset?.wordexRowType || "");

        return rowType === "TableHeader" || rowType === "Detail";
      }

      isCellMergeRowEligible(row) {
        return !this.isStructuralTableRowForMerge(row);
      }

      getTableSelectionAnchorFromCell(table, cell, mode) {
        const row = cell?.parentElement;

        if (!row || !table) {
          return null;
        }

        return {
          mode,
          rowIndex: this.getTableRowIndex(table, row),
          logicalCol: this.getCellLogicalColumnIndex(row, cell),
          cell
        };
      }

      resolveTableSelectionAnchor(table, cell, mode) {
        if (
          this.tableSelectionAnchor &&
          this.tableSelectionAnchor.mode === mode &&
          Number.isInteger(this.tableSelectionAnchor.rowIndex) &&
          Number.isInteger(this.tableSelectionAnchor.logicalCol)
        ) {
          return this.tableSelectionAnchor;
        }

        if (mode === "row") {
          const rowIndices = this.getSelectedTableRowIndices();

          if (rowIndices.length) {
            const anchorRow = table.rows[rowIndices[0]];
            const anchorCell = anchorRow?.cells?.[0] || cell;

            return this.getTableSelectionAnchorFromCell(table, anchorCell, mode);
          }
        }

        if (mode === "column") {
          const columnIndices = this.getSelectedTableColumnIndices();

          if (columnIndices.length) {
            const logicalCol = columnIndices[0];
            const anchorRow = cell.parentElement || table.rows[0];
            const slot = this.getTableCellAtLogicalColumn(anchorRow, logicalCol);

            return {
              mode,
              rowIndex: this.getTableRowIndex(table, anchorRow),
              logicalCol,
              cell: slot?.cell || cell
            };
          }
        }

        if (mode === "cell") {
          const cells = this.getSelectedTableCells();

          if (cells.length) {
            return this.getTableSelectionAnchorFromCell(table, cells[0], mode);
          }
        }

        return this.getTableSelectionAnchorFromCell(table, this.selectedCell || cell, mode);
      }

      extendTableSelectionFromCell(cell) {
        const table = cell?.closest?.(".wordex-table");

        if (!table || !cell) {
          return;
        }

        const mode = (!this.selectedTableMode || this.selectedTableMode === "table")
          ? "row"
          : this.selectedTableMode;

        if (this.selectedObject !== table) {
          this.selectTableComponent(table, cell, mode);
          return;
        }

        const row = cell.parentElement;
        const rowIndex = this.getTableRowIndex(table, row);
        const logicalCol = this.getCellLogicalColumnIndex(row, cell);
        const anchor = this.resolveTableSelectionAnchor(table, cell, mode);

        if (mode === "row") {
          const from = Math.min(anchor.rowIndex, rowIndex);
          const to = Math.max(anchor.rowIndex, rowIndex);
          const rowIndices = [];

          for (let index = from; index <= to; index++) {
            rowIndices.push(index);
          }

          this.selectTableComponent(table, cell, "row", {
            rowIndices,
            setAnchor: false
          });
          return;
        }

        if (mode === "column") {
          const from = Math.min(anchor.logicalCol, logicalCol);
          const to = Math.max(anchor.logicalCol, logicalCol);
          const columnIndices = [];

          for (let index = from; index <= to; index++) {
            columnIndices.push(index);
          }

          this.selectTableComponent(table, cell, "column", {
            columnIndices,
            setAnchor: false
          });
          return;
        }

        const fromRow = Math.min(anchor.rowIndex, rowIndex);
        const toRow = Math.max(anchor.rowIndex, rowIndex);
        const fromCol = Math.min(anchor.logicalCol, logicalCol);
        const toCol = Math.max(anchor.logicalCol, logicalCol);
        const cells = [];

        for (let currentRowIndex = fromRow; currentRowIndex <= toRow; currentRowIndex++) {
          const currentRow = table.rows[currentRowIndex];

          if (!currentRow) {
            continue;
          }

          for (let currentCol = fromCol; currentCol <= toCol; currentCol++) {
            const slot = this.getTableCellAtLogicalColumn(currentRow, currentCol);

            if (slot?.cell && !cells.includes(slot.cell)) {
              cells.push(slot.cell);
            }
          }
        }

        this.selectTableComponent(table, cell, "cell", {
          cells,
          setAnchor: false
        });
      }

      selectTableComponent(table, cell, mode, options = {}) {
        if (!table) return;

        const normalizedMode = mode || "table";
        const row = cell?.parentElement || null;
        const rowIndex = row ? this.getTableRowIndex(table, row) : -1;
        const logicalCol = row && cell ? this.getCellLogicalColumnIndex(row, cell) : null;

        this.selectedObject = table;
        this.selectedCell = cell || this.selectedCell;
        this.selectedTableMode = normalizedMode;
        table.dataset.wordexSelectionMode = this.selectedTableMode;
        this.selectedTableRow = row;
        this.selectedTableColumnIndex = logicalCol;

        if (normalizedMode === "row" && rowIndex >= 0) {
          this.selectedTableRowIndices = this.normalizeContiguousIndices(
            options.rowIndices || [rowIndex]
          );
          this.selectedTableColumnIndices = [];
          this.selectedTableCells = [];
        } else if (normalizedMode === "column" && Number.isInteger(logicalCol)) {
          this.selectedTableColumnIndices = this.normalizeContiguousIndices(
            options.columnIndices || [logicalCol]
          );
          this.selectedTableRowIndices = [];
          this.selectedTableCells = [];
        } else if (normalizedMode === "cell" && cell) {
          this.selectedTableCells = (options.cells || [cell]).filter(Boolean);
          this.selectedTableRowIndices = [];
          this.selectedTableColumnIndices = [];
        } else if (normalizedMode === "table") {
          this.selectedTableRowIndices = [];
