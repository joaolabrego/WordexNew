        this.documentElement.style.setProperty("--wordex-page-margin-left", page.marginLeft || "15mm");
        this.documentElement.style.setProperty("--wordex-page-margin-right", page.marginRight || "15mm");

        this.syncDocumentTitleBar();
        this.schedulePageLayoutOverlayRefresh({ syncObjects: true });
      }

      syncDocumentTitleBar() {
        if (!this.documentTitleElement) {
          return;
        }

        const page = this.getPageSettings();
        this.documentTitleElement.textContent =
          `Wordex — ${page.format} ${page.orientation === "landscape" ? "paisagem" : "retrato"} — ${page.width} x ${page.height}`;
        this.updateDocumentJsonStatus();
      }

      getCssPixelsToMillimeters(px) {
        return px / 3.7795275591;
      }

      parseCssSizeToMillimeters(value) {
        const text = String(value || "").trim();
        const match = text.match(/^(\d+(?:\.\d+)?)(mm|cm|px|pt|in)$/);

        if (!match) return 0;

        const number = Number(match[1]);
        const unit = match[2];

        if (unit === "mm") return number;
        if (unit === "cm") return number * 10;
        if (unit === "px") return this.getCssPixelsToMillimeters(number);
        if (unit === "pt") return number * 0.3527777778;
        if (unit === "in") return number * 25.4;

        return 0;
      }

      parseCssSizeToPixels(value) {
        const mm = this.parseCssSizeToMillimeters(value);

        if (mm <= 0) {
          return 0;
        }

        return Math.round(mm * 3.7795275591);
      }

      formatMillimeters(value) {
        return Math.max(0, value).toFixed(2).replace(/\.?0+$/, "") + "mm";
      }

      createChromeMeasureBox(contentWidthMm) {
        const measureBox = document.createElement("div");
        measureBox.className = "wordex-generated-report wordex-chrome-measure";
        measureBox.style.cssText = [
          "position: fixed",
          "left: -100000px",
          "top: 0",
          "visibility: hidden",
          "pointer-events: none",
          "width: " + this.formatMillimeters(contentWidthMm),
          "box-sizing: border-box",
          "z-index: -1"
        ].join(";");
        document.body.appendChild(measureBox);
        return measureBox;
      }

      getGeneratedContentWidthMm() {
        const page = this.getPageSettings();
        const pageWidthMm = this.parseCssSizeToMillimeters(page.width);
        const marginLeftMm = this.parseCssSizeToMillimeters(page.marginLeft);
        const marginRightMm = this.parseCssSizeToMillimeters(page.marginRight);
        return Math.max(20, pageWidthMm - marginLeftMm - marginRightMm);
      }

      measureGeneratedRegionHtmlMargin(regionHtml, regionClass, minimumMm) {
        if (!regionHtml) {
          return minimumMm;
        }

        const contentWidthMm = this.getGeneratedContentWidthMm();
        const measureBox = this.createChromeMeasureBox(contentWidthMm);
        measureBox.innerHTML = String(regionHtml || "");

        try {
          const region = measureBox.querySelector("." + regionClass);

          if (!region) {
            return minimumMm;
          }

          region.style.width = "100%";
          region.style.maxHeight = "none";
          region.style.minHeight = "0";
          region.style.height = "auto";
          region.style.overflow = "visible";
          region.style.padding = "0";
          region.style.margin = "0";
          region.style.border = "0";
          region.style.background = "transparent";
          region.style.display = "block";
          region.style.boxSizing = "border-box";

          const blocks = Array.from(
            region.querySelectorAll(".paragraph-block, .object-block")
          );

          if (blocks.length === 0) {
            return minimumMm;
          }

          const regionRect = region.getBoundingClientRect();
          let top = Number.POSITIVE_INFINITY;
          let bottom = Number.NEGATIVE_INFINITY;

          blocks.forEach(block => {
            block.style.marginTop = "8px";
            block.style.marginBottom = "8px";
            block.style.paddingTop = "2px";
            block.style.paddingBottom = "2px";
            const rect = block.getBoundingClientRect();

            if (rect.width <= 0 && rect.height <= 0) return;

            const style = window.getComputedStyle(block);
            const marginTop = Number.parseFloat(style.marginTop) || 0;
            const marginBottom = Number.parseFloat(style.marginBottom) || 0;

            top = Math.min(top, rect.top - regionRect.top - marginTop);
            bottom = Math.max(bottom, rect.bottom - regionRect.top + marginBottom);
          });

          if (!Number.isFinite(top) || !Number.isFinite(bottom)) {
            return minimumMm;
          }

          const measuredPx = Math.max(0, bottom - top);

          /*
            Mede somente o conteúdo real do chrome. A folga de 3mm da borda
            física é aplicada pelo wrapper Pagex; aqui somamos apenas uma
            pequena reserva para subpixel/fonte.
          */
          return Math.max(minimumMm, this.getCssPixelsToMillimeters(measuredPx) + 1);
        } finally {
          measureBox.remove();
        }
      }

      getPageMarginCss(page = null) {
        const settings = page || this.getPageSettings();
        return `${settings.marginTop} ${settings.marginRight} ${settings.marginBottom} ${settings.marginLeft}`;
      }

      createId(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 10);
      }

      ensureRequiredParagraphs() {
        /*
          Todas as regiões principais devem ter ao menos um parágrafo estrutural.
          A edição de texto acontece nos subparágrafos, não no contêiner .paragraph.
        */
        ["headerTemplate", "bodyFlow", "footerTemplate"].forEach(region => {
          if (!Array.isArray(this.wordexDocument[region])) {
            this.wordexDocument[region] = [];
          }

          if (this.wordexDocument[region].length === 0) {
            this.wordexDocument[region].push(this.createParagraph(""));
          }

          this.wordexDocument[region] = this.wordexDocument[region].map(block =>
            block.type === "paragraph" ? this.normalizeParagraphBlock(block) : block
          );
        });
      }

      isParagraphHtmlEmpty(html) {
        const source = String(html || "");

        /*
          Objeto dentro do parágrafo conta como conteúdo.
        */
        if (
          source.includes("dynamic-image-box") ||
          source.includes("wordex-table") ||
          source.includes("wordex-chart-box") ||
          source.includes("wordex-textbox")
        ) {
          return false;
        }

        /*
          Quebra de linha inserida pelo usuário é conteúdo estrutural.
          Portanto, parágrafo com <br> não deve mostrar "Parágrafo vazio".
        */
        if (/<br\s*\/?>/i.test(source)) {
          return false;
        }

        /*
          Blocos vazios criados pelo contenteditable também representam
          linhas em branco e não devem ser tratados como parágrafo inexistente.
        */
        if (/<(div|p)[^>]*>\s*(?:&nbsp;|&#160;|\u200B|\s)*<\/\1>/i.test(source)) {
          return false;
        }

        const text = source
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      isParagraphVisuallyEmptyHtml(html) {
        const source = String(html || "");

        /*
          Vazio visual do editor.
          Diferente de isParagraphHtmlEmpty(), aqui um <br> deixado pelo
          contenteditable ao apagar tudo deve ser tratado como parágrafo vazio,
          para que o placeholder "Parágrafo vazio" apareça corretamente.
        */
        if (
          source.includes("dynamic-image-box") ||
          source.includes("wordex-table") ||
          source.includes("wordex-chart-box") ||
          source.includes("wordex-textbox")
        ) {
          return false;
        }

        const template = document.createElement("template");
        template.innerHTML = source;

        template.content.querySelectorAll("br").forEach(element => element.remove());

        const text = template.content.textContent
          .replace(/\u200B/g, "")
          .replace(/\u00A0/g, " ")
          .trim();

        return text.length === 0;
      }

      hasParagraphVisualContent(paragraphElement) {
        if (!paragraphElement) return false;

        if (
          paragraphElement.querySelector(WordexEditor.objectSelector)
        ) {
          return true;
        }

        const style = window.getComputedStyle(paragraphElement);
        const lineHeight = Number.parseFloat(style.lineHeight) ||
          Number.parseFloat(style.fontSize) * 1.45 ||
          22;

        /*
          Tolerância pequena para não classificar um parágrafo normal vazio
          como preenchido por causa de borda/outline/subpixel.
        */
        return paragraphElement.scrollHeight > lineHeight + 6;
      }

      getParagraphLabelForRegion(region) {
        if (region === "headerTemplate") {
          return "header";
        }

        if (region === "footerTemplate") {
          return "footer";
        }

        return "body";
      }

      getNextParagraphSequenceForRegion(region) {
        const blocks = Array.isArray(this.wordexDocument?.[region])
          ? this.wordexDocument[region]
          : [];

        return blocks.filter(block => block && block.type === "paragraph").length + 1;
      }

      getDefaultParagraphTextForCurrentRegion() {
        const region = this.selected.region || "bodyFlow";
        const label = this.getParagraphLabelForRegion(region);
        const sequence = this.getNextParagraphSequenceForRegion(region);

        return `Novo parágrafo ${label} ${sequence}`;
      }

      getDefaultParagraphTextStyle() {
        return {
          fontFamily: "Arial",
          fontSize: "12pt",
          color: "#000000"
        };
      }

      getParagraphBlockTextStyle(block) {
        const defaults = this.getDefaultParagraphTextStyle();

        if (!block?.style && !block?.subParagraphs?.length) {
          return { ...defaults };
        }

        this.normalizeParagraphBlock(block);
        return this.getSubParagraphBlockStyle(block);
      }

      getCurrentToolbarTextStyle() {
        const defaults = this.getDefaultParagraphTextStyle();

        return {
          fontFamily: document.getElementById("fontFamily")?.value || defaults.fontFamily,
          fontSize: document.getElementById("fontSize")?.value || defaults.fontSize,
          color: document.getElementById("fontColor")?.value || defaults.color
        };
      }

      getCurrentParagraphStyleFromToolbar() {
        const defaults = this.getDefaultParagraphTextStyle();
        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          const block = this.findBlockById(paragraph.dataset.blockId);

          if (block) {
            return this.getParagraphBlockTextStyle(block);
          }
        }

        /*
          Com objeto selecionado (gráfico, imagem, textbox), a toolbar reflete o
          objeto — mas parágrafos novos devem manter a tipografia do parágrafo
          hospedeiro, não a do objeto.
        */
        if (this.selectedObject) {
          const hostParagraph = this.selectedObject.closest(".paragraph");
          const hostBlock = hostParagraph
            ? this.findBlockById(hostParagraph.dataset.blockId)
            : null;

          if (hostBlock) {
            return this.getParagraphBlockTextStyle(hostBlock);
          }

          return { ...defaults };
        }

        return this.getCurrentToolbarTextStyle();
      }

      applyInitialTextStyleToTable(table) {
        if (!this.isWordexTableObject(table)) {
          return;
        }

        const style = this.getCurrentToolbarTextStyle();
        this.applyStyleObject(table, style);
        table.querySelectorAll("td").forEach(cell => {
          this.applyFormattingToTableCellContent(cell, style);
        });
      }

      getDefaultParagraphContainerStyle() {
        return {
          marginTop: "",
          marginRight: "",
          marginBottom: "",
          marginLeft: "",
          width: "100%",
          minHeight: ""
        };
      }

      stripParagraphContainerBorderStyles(style = {}) {
        ["border", "borderRadius", "borderTop", "borderRight", "borderBottom", "borderLeft"].forEach(key => {
          delete style[key];
        });

        return style;
      }

      pickTypographyStyleForNewParagraph(style = {}) {
        const picked = { ...this.getDefaultParagraphTextStyle() };
        const keys = [
          "fontFamily",
          "fontSize",
          "color",
          "textAlign",
          "fontWeight",
          "fontStyle",
          "textDecoration"
        ];

        keys.forEach(key => {
          if (style[key]) {
            picked[key] = style[key];
          }
        });

        return picked;
      }

      pickSubParagraphStyleForNewColumn(referenceStyle = {}) {
        return {
          ...this.getDefaultSubParagraphStyle(),
          ...this.pickTypographyStyleForNewParagraph(referenceStyle)
        };
      }

      getTypographyStyleForNewParagraph() {
        return this.pickTypographyStyleForNewParagraph(this.getCurrentParagraphStyleFromToolbar());
      }

      createParagraph(html = "Novo parágrafo body", style = null) {
        const textStyle = this.getTypographyStyleForNewParagraph();
        const containerStyle = this.stripParagraphContainerBorderStyles({
          ...this.getDefaultParagraphContainerStyle(),
          ...(style || {})
        });

        const paragraph = {
          id: this.createId("paragraph"),
          type: "paragraph",
          style: containerStyle,
          subParagraphs: [
            this.createSubParagraph(String(html || ""), {
              ...textStyle,
              width: "100%"
            })
          ]
        };

        this.ensureSubParagraphWidthsInBlock(paragraph);
        return paragraph;
      }

      getDefaultSubParagraphStyle() {
        return {
          fontFamily: "Arial",
          fontSize: "12pt",
          color: "#000000",
          textAlign: "left",
          width: "100%"
        };
      }

      createSubParagraph(html = "", style = null) {
        return {
          id: this.createId("subparagraph"),
          html: String(html || ""),
          style: {
            ...this.getDefaultSubParagraphStyle(),
            ...(style || {})
          }
        };
      }

      getSubParagraphStylePropertyKeys() {
        return [
          "fontFamily",
          "fontSize",
          "color",
          "textAlign",
          "fontWeight",
          "fontStyle",
          "textDecoration",
          "border",
          "borderRadius",
          "borderTop",
          "borderRight",
          "borderBottom",
          "borderLeft",
          "marginTop",
          "marginRight",
          "marginBottom",
          "marginLeft",
          "paddingTop",
          "paddingRight",
          "paddingBottom",
          "paddingLeft",
          "width"
        ];
      }

      normalizeParagraphBlock(block) {
        if (!block || block.type !== "paragraph") {
          return block;
        }

        block.style = block.style || {};

        if (Array.isArray(block.subParagraphs) && block.subParagraphs.length > 0) {
          block.subParagraphs = block.subParagraphs.map(sub => ({
            id: sub.id || this.createId("subparagraph"),
            html: String(sub.html || ""),
            style: {
              ...this.getDefaultSubParagraphStyle(),
              ...(sub.style || {})
            }
          }));
          this.ensureSubParagraphWidthsInBlock(block);
          delete block.html;
          return block;
        }

        const legacyStyle = {
          ...this.getDefaultSubParagraphStyle()
        };

        this.getSubParagraphStylePropertyKeys().forEach(key => {
          if (block.style[key]) {
            legacyStyle[key] = block.style[key];
          }
        });

        if (block.style.border) {
          legacyStyle.border = block.style.border;
        }

        if (block.style.borderRadius) {
          legacyStyle.borderRadius = block.style.borderRadius;
        }

        if (block.style.textAlign) {
          legacyStyle.textAlign = block.style.textAlign;
        }

        const legacyHtml = String(block.html || "");

        block.subParagraphs = [
          this.createSubParagraph(legacyHtml, legacyStyle)
        ];

        if (!block.style.width) {
          block.style.width = "100%";
        }

        this.getSubParagraphStylePropertyKeys().forEach(key => {
          if (key !== "width") {
            delete block.style[key];
          }
        });

        delete block.html;
        this.ensureSubParagraphWidthsInBlock(block);
        return block;
      }

      ensureParagraphHasSubParagraphs(block) {
        if (!block || block.type !== "paragraph") {
          return block;
        }

        this.normalizeParagraphBlock(block);
        return block;
      }

      ensureSubParagraphWidthsInBlock(block) {
        if (!block?.subParagraphs?.length) {
          block.subParagraphs = [this.createSubParagraph("", { width: "100%" })];
          return;
        }

        if (block.subParagraphs.length === 1) {
          block.subParagraphs[0].style = {
            ...this.getDefaultSubParagraphStyle(),
            ...(block.subParagraphs[0].style || {}),
            width: "100%"
          };
          return;
        }

        const equalWidth = (100 / block.subParagraphs.length).toFixed(4) + "%";

        block.subParagraphs.forEach(sub => {
          sub.style = sub.style || {};

          if (!sub.style.width) {
            sub.style.width = equalWidth;
          }
        });
      }

      getParagraphDirectSubParagraphElements(paragraphElement) {
        if (!paragraphElement) {
          return [];
        }

        return Array.from(paragraphElement.children).filter(child =>
          child.matches(WordexEditor.subParagraphSelector)
        );
      }

      applySubParagraphLayoutFromBlock(paragraphElement, block) {
        if (!paragraphElement || !block?.subParagraphs?.length) {
          return;
        }

        const subElements = this.getParagraphDirectSubParagraphElements(paragraphElement);

        block.subParagraphs.forEach((subBlock, index) => {
          const subElement = subElements[index];

          if (!subElement) {
            return;
          }

          const style = { ...subBlock.style };

          if (block.subParagraphs.length === 1) {
            style.width = "100%";
          }

          this.applySubParagraphElementStyles(subElement, style);
        });
      }

      ensureParagraphDomHasSubParagraphs(paragraphElement) {
        if (!paragraphElement?.matches?.(".paragraph")) {
          return;
        }

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (!block) {
          return;
        }

        this.ensureParagraphHasSubParagraphs(block);

        let directSubs = this.getParagraphDirectSubParagraphElements(paragraphElement);

        if (directSubs.length === 0) {
          const subBlock = block.subParagraphs[0];
          const subElement = document.createElement("div");
          subElement.className = "wordex-sub-paragraph";
          subElement.dataset.subParagraphId = subBlock.id;
          subElement.dataset.emptyText = "Subparágrafo vazio";
          subElement.contentEditable = "true";

          while (paragraphElement.firstChild) {
            subElement.appendChild(paragraphElement.firstChild);
          }

          if (!subElement.innerHTML && subBlock.html) {
            subElement.innerHTML = subBlock.html;
          }

          paragraphElement.appendChild(subElement);
          directSubs = [subElement];
        }

        while (directSubs.length < block.subParagraphs.length) {
          const subBlock = block.subParagraphs[directSubs.length];
          const subElement = document.createElement("div");
          subElement.className = "wordex-sub-paragraph";
          subElement.dataset.subParagraphId = subBlock.id;
          subElement.dataset.emptyText = "Subparágrafo vazio";
          subElement.contentEditable = "true";
          subElement.innerHTML = subBlock.html || "";
          paragraphElement.appendChild(subElement);
          directSubs.push(subElement);
        }

        this.applySubParagraphLayoutFromBlock(paragraphElement, block);

        this.configureParagraphEditingSurface(paragraphElement);

        if (directSubs.length === 1) {
          this.updateSubParagraphEmptyState(directSubs[0]);
        } else {
          directSubs.forEach(sub => this.updateSubParagraphEmptyState(sub));
        }
      }

      equalizeSubParagraphWidthsInBlock(block) {
        this.normalizeParagraphBlock(block);
        const equalWidth = (100 / block.subParagraphs.length).toFixed(4) + "%";

        block.subParagraphs.forEach(sub => {
          sub.style.width = equalWidth;
        });
      }

      parseSubParagraphWidthPercent(value, fallbackCount = 1) {
        const match = String(value || "").trim().match(/^([\d.]+)\s*%$/);

        if (match) {
          return parseFloat(match[1]);
        }

        return 100 / Math.max(1, fallbackCount);
      }

      applySubParagraphElementStyles(element, style = {}) {
        if (!element) return;

        const defaults = this.getDefaultSubParagraphStyle();

        element.style.fontFamily = style.fontFamily || defaults.fontFamily;
        element.style.fontSize = style.fontSize || defaults.fontSize;
        element.style.color = style.color || defaults.color;
        element.style.textAlign = style.textAlign || defaults.textAlign;

        ["fontWeight", "fontStyle", "textDecoration"].forEach(key => {
          element.style[key] = style[key] || "";
        });

        ["marginTop", "marginRight", "marginBottom", "marginLeft", "paddingTop", "paddingRight", "paddingBottom", "paddingLeft"].forEach(key => {
          element.style[key] = style[key] || "";
        });

        const width = style.width || defaults.width;
        element.style.flex = `0 0 ${width}`;
        element.style.width = width;
        element.style.maxWidth = width;
        element.style.minHeight = style.minHeight || "";

        this.applyStoredBorderEdgesToElement(element, style);

        if (style.borderRadius) {
          element.style.setProperty("border-radius", style.borderRadius, "important");
        } else {
          element.style.removeProperty("border-radius");
        }

        this.syncSubParagraphEditorOutline(element);
      }

      applyParagraphContainerElementStyles(element, blockStyle = {}) {
        if (!element) return;

        element.style.width = blockStyle.width || "100%";
        element.style.minHeight = blockStyle.minHeight || "";
        element.style.textAlign = blockStyle.textAlign || "";

        this.applyStoredBorderEdgesToElement(element, blockStyle);

        if (blockStyle.borderRadius) {
          element.style.setProperty("border-radius", blockStyle.borderRadius, "important");
        } else {
          element.style.removeProperty("border-radius");
        }
      }

      extractParagraphContainerStyleFromElement(element) {
        if (!element) {
          return {};
        }

        const style = {
          width: element.style.width || "100%",
          minHeight: element.style.minHeight || ""
        };

        if (element.style.textAlign) {
          style.textAlign = element.style.textAlign;
        }

        const border = element.style.getPropertyValue("border");

        if (border) {
          style.border = border;
        }

        ["top", "right", "bottom", "left"].forEach(edge => {
          const value = element.style.getPropertyValue(`border-${edge}`);

          if (value) {
            style[`border${edge.charAt(0).toUpperCase()}${edge.slice(1)}`] = value;
          }
        });

        const borderRadius = element.style.getPropertyValue("border-radius");

        if (borderRadius) {
          style.borderRadius = borderRadius;
        }

        return style;
      }

      syncParagraphContainerStyleToBlock(paragraphElement, block) {
        if (!paragraphElement || !block) {
          return;
        }

        block.style = block.style || {};

        const containerStyle = this.extractParagraphContainerStyleFromElement(paragraphElement);

        block.style.width = containerStyle.width || block.style.width || "100%";
        block.style.minHeight = containerStyle.minHeight || "";

        if (containerStyle.textAlign) {
          block.style.textAlign = containerStyle.textAlign;
        } else {
          delete block.style.textAlign;
        }

        ["border", "borderRadius", "borderTop", "borderRight", "borderBottom", "borderLeft"].forEach(key => {
          if (containerStyle[key]) {
            block.style[key] = containerStyle[key];
          } else {
            delete block.style[key];
          }
        });
      }

      extractSubParagraphStyleFromElement(element) {
        if (!element) {
          return { ...this.getDefaultSubParagraphStyle() };
        }

        const style = {
          fontFamily: element.style.fontFamily || "Arial",
          fontSize: element.style.fontSize || "12pt",
          color: element.style.color || "#000000",
          textAlign: element.style.textAlign || "left",
          width: element.style.width || element.style.flexBasis || "100%"
        };

        ["fontWeight", "fontStyle", "textDecoration", "marginTop", "marginRight", "marginBottom", "marginLeft", "paddingTop", "paddingRight", "paddingBottom", "paddingLeft"].forEach(key => {
          if (element.style[key]) {
            style[key] = element.style[key];
          }
        });

        const border = element.style.getPropertyValue("border");
        const borderRadius = element.style.getPropertyValue("border-radius");

        if (border) {
          style.border = border;
        }

        Object.assign(style, this.extractBorderEdgeStylesFromElement(element));

        if (borderRadius) {
          style.borderRadius = borderRadius;
        }

        if (element.style.minHeight) {
          style.minHeight = element.style.minHeight;
        }

        return style;
      }

      findSubParagraphElementFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;

        if (!element) return null;

        return element.closest(WordexEditor.subParagraphSelector);
      }

      getSelectedSubParagraphElement() {
        if (!this.selectedSubParagraphId) {
          return null;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph) {
          return null;
        }

        return paragraph.querySelector(
          `${WordexEditor.subParagraphSelector}[data-sub-paragraph-id="${this.selectedSubParagraphId}"]`
        );
      }

      getSubParagraphBlockStyle(block, subParagraphId = this.selectedSubParagraphId) {
        this.normalizeParagraphBlock(block);
        const sub = block.subParagraphs.find(item => item.id === subParagraphId) || block.subParagraphs[0];

        return {
          ...this.getDefaultSubParagraphStyle(),
          ...(sub?.style || {})
        };
      }

      selectSubParagraph(region, blockId, subParagraphId, options = {}) {
        this.clearParagraphBlockMoveSelection();
        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.selectedSubParagraphId = subParagraphId;
        this.paragraphContainerSelected = false;

        if (!options.preserveTableSelection) {
          this.selectedObject = null;
          this.selectedCell = null;
          this.clearTableSelectionState();
          this.macroPickerActiveTable = null;
          this.releaseJsonMacroPickerFromImageContext();
        }

        this.renderSelection();
        requestAnimationFrame(() => this.updateCurrentLineHighlight());
      }

      selectParagraphContainer(region, blockId) {
        this.clearParagraphBlockMoveSelection();
        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.selectedSubParagraphId = null;
        this.paragraphContainerSelected = true;
        this.selectedObject = null;
        this.selectedCell = null;
        this.clearTableSelectionState();
        this.macroPickerActiveTable = null;
        this.releaseJsonMacroPickerFromImageContext();
        this.renderSelection();
        this.clearCurrentLineHighlight();
      }

      insertSubParagraph() {
        const context = this.getSelectedBlockContext();

        if (!context || context.block.type !== "paragraph") {
          alert("Selecione um parágrafo para adicionar subparágrafo.");
          return;
        }

        const block = context.block;
        this.normalizeParagraphBlock(block);

        const referenceSub = block.subParagraphs.find(item => item.id === this.selectedSubParagraphId) ||
          block.subParagraphs[block.subParagraphs.length - 1];
        const newSub = this.createSubParagraph("", this.pickSubParagraphStyleForNewColumn(referenceSub?.style));

        block.subParagraphs.push(newSub);
        this.equalizeSubParagraphWidthsInBlock(block);
        this.selected.region = context.region;
        this.selectedParagraphId = block.id;
        this.selectedBlockId = block.id;
        this.selectedSubParagraphId = newSub.id;
        this.paragraphContainerSelected = false;
        this.render();

        const subElement = this.getSelectedSubParagraphElement();

        if (subElement) {
          subElement.focus?.();
          this.placeCaretAtEnd(subElement);
          this.saveSelectionIfInsideParagraph();
        }
      }

      deleteSelectedSubParagraph() {
        if (!this.selectedSubParagraphId || this.paragraphContainerSelected) {
          alert("Selecione um subparágrafo para excluir.");
          return;
        }

        this.syncCurrentEditingState();

        const context = this.getSelectedBlockContext();

        if (!context || context.block.type !== "paragraph") {
          alert("Selecione um parágrafo para excluir o subparágrafo.");
          return;
        }

        const block = context.block;
        this.normalizeParagraphBlock(block);

        const index = block.subParagraphs.findIndex(
          item => item.id === this.selectedSubParagraphId
        );

        if (index < 0) {
          alert("Subparágrafo não encontrado.");
          return;
        }

        block.subParagraphs.splice(index, 1);

        if (block.subParagraphs.length === 0) {
          block.subParagraphs.push(
            this.createSubParagraph("", {
              ...this.getDefaultSubParagraphStyle(),
              width: "100%"
            })
          );
        }

        this.equalizeSubParagraphWidthsInBlock(block);

        const nextSub = block.subParagraphs[Math.min(index, block.subParagraphs.length - 1)];

        this.selected.region = context.region;
        this.selectedParagraphId = block.id;
        this.selectedBlockId = block.id;
        this.selectedSubParagraphId = nextSub?.id || null;
        this.paragraphContainerSelected = false;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        this.render();

        const subElement = this.getSelectedSubParagraphElement();

        if (subElement) {
          subElement.focus?.();
          this.placeCaretAtEnd(subElement);
          this.saveSelectionIfInsideParagraph();
        }

        this.saveUndoStateIfChanged();
      }

      updateSubParagraphEmptyState(subParagraphElement) {
        if (!subParagraphElement) return;

        const html = this.getCleanSubParagraphHtml(subParagraphElement);
        subParagraphElement.classList.toggle(
          "is-empty",
          this.isParagraphVisuallyEmptyHtml(html)
        );
      }

      configureParagraphEditingSurface(paragraphElement) {
        if (!paragraphElement?.matches?.(".paragraph")) {
          return;
        }

        /*
          O parágrafo é apenas contêiner flex (colunas). Somente os subparágrafos
          recebem contenteditable; objetos (gráfico, textbox etc.) mantêm regras próprias.
        */
        paragraphElement.contentEditable = "false";

        this.getParagraphDirectSubParagraphElements(paragraphElement).forEach(subElement => {
          this.enableSubParagraphEditing(subElement);
        });
      }

      enableSubParagraphEditing(subParagraphElement) {
        if (!subParagraphElement?.matches?.(WordexEditor.subParagraphSelector)) {
          return;
        }

        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox && subParagraphElement.contains(activeTextbox)) {
          subParagraphElement.contentEditable = "false";
          return;
        }

        subParagraphElement.contentEditable = "true";
      }

      exitTextboxEditingForObjectSelection(targetObject = null) {
        const selection = window.getSelection();
        const range = selection?.rangeCount ? selection.getRangeAt(0) : null;
        const textbox =
          document.activeElement?.closest?.(".wordex-textbox") ||
          this.getTextboxFromRange(range) ||
          this.getTextboxFromRange(this.savedRange);

        if (!textbox || !this.documentElement.contains(textbox)) {
          return;
        }

        if (targetObject && textbox === targetObject) {
          return;
        }

        textbox.blur();
        this.deactivateTextboxEditing(textbox);

        if (this.getTextboxFromRange(this.savedRange) === textbox) {
          this.savedRange = null;
        }

        if (selection && this.getTextboxFromRange(range) === textbox) {
          selection.removeAllRanges();
        }
      }

      activateTextboxEditing(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

        if (subParagraph) {
          subParagraph.contentEditable = "false";
        }

        textbox.contentEditable = "true";
      }

      deactivateTextboxEditing(textbox, relatedTarget = null) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        if (relatedTarget && (textbox.contains(relatedTarget) || relatedTarget === textbox)) {
          return;
        }

        if (relatedTarget?.closest?.(".wordex-textbox")) {
          return;
        }

        const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

        if (subParagraph) {
          subParagraph.contentEditable = "true";
        }
      }

      normalizeTextboxEmptyBlocks(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        Array.from(textbox.children).forEach(child => {
          if (!child.matches("div, p")) {
            return;
          }

          if (child.querySelector(WordexEditor.objectSelector)) {
            return;
          }

          const visibleText = child.textContent
            .replace(/\u200B/g, "")
            .replace(/\u00A0/g, " ")
            .trim();

          if (visibleText.length > 0) {
            return;
          }

          const br = document.createElement("br");
          child.replaceWith(br);
        });
      }

      insertSimpleLineBreak(container) {
        if (!container) {
          return false;
        }

        const selection = window.getSelection();

        if (!selection?.rangeCount || !container.contains(selection.getRangeAt(0).commonAncestorContainer)) {
          return false;
        }

        if (document.execCommand("insertLineBreak", false, null)) {
          this.scrollSelectionCaretIntoView(container);
          return true;
        }

        const range = selection.getRangeAt(0);
        const breakNode = document.createElement("br");

        range.deleteContents();
        range.collapse(true);
        range.insertNode(breakNode);
        range.setStartAfter(breakNode);
        range.collapse(true);
        selection.removeAllRanges();
        selection.addRange(range);
        this.scrollSelectionCaretIntoView(container);
        return true;
      }

      insertEditableLineBreak(container) {
        if (!container) {
          return false;
        }

        if (container.matches?.(".wordex-textbox")) {
          this.normalizeTextboxEmptyBlocks(container);
        }

        return this.insertSimpleLineBreak(container);
      }

      handleEditableShiftEnter(event) {
        if (event.key !== "Enter" || !event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const textbox = event.target.closest(".wordex-textbox");

        if (textbox && this.documentElement.contains(textbox)) {
          event.preventDefault();
          event.stopPropagation();

          this.activateTextboxEditing(textbox);

          if (!this.insertEditableLineBreak(textbox)) {
            return true;
          }

          const paragraph = textbox.closest(".paragraph");
          const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

          if (paragraph && subParagraph) {
            this.fitTextboxHeightToContent(textbox);
            this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
            this.syncParagraphElement(paragraph);
            this.saveUndoStateIfChanged();
          }

          return true;
        }

        if (event.target.closest("td")) {
          return false;
        }

        const subParagraph = event.target.closest(WordexEditor.subParagraphSelector);
        const paragraph = event.target.closest(".paragraph");

        if (!subParagraph || !paragraph || !this.documentElement.contains(subParagraph)) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        if (!this.insertEditableLineBreak(subParagraph)) {
          return true;
        }

        requestAnimationFrame(() => {
          this.refreshParagraphSubParagraphHeightsDuringTyping(paragraph, subParagraph);
          this.updateParagraphEmptyState(paragraph);
          this.syncParagraphElement(paragraph);
          this.saveUndoStateIfChanged();
        });

        return true;
      }

      scrollSelectionCaretIntoView(container) {
        const selection = window.getSelection();

        if (!selection?.rangeCount || !container) {
          return;
        }

        const range = selection.getRangeAt(0);

        if (!container.contains(range.commonAncestorContainer)) {
          return;
        }

        const rects = Array.from(range.getClientRects()).filter(rect => rect.height > 0 || rect.width > 0);
        const rect = rects.length ? rects[rects.length - 1] : range.getBoundingClientRect();

        const scrollRect = rect.height > 0 || rect.width > 0 ? rect : range.getBoundingClientRect();

        if (!scrollRect.height && !scrollRect.width) {
          return;
        }

        const containerRect = container.getBoundingClientRect();

        if (scrollRect.bottom > containerRect.bottom - 2) {
          container.scrollTop += scrollRect.bottom - containerRect.bottom + 8;
        } else if (scrollRect.top < containerRect.top + 2) {
          container.scrollTop -= containerRect.top - scrollRect.top + 8;
        }
      }

      subParagraphHostsMainLayoutObject(subParagraphElement) {
        return !!subParagraphElement?.querySelector?.(WordexEditor.mainObjectSelector);
      }

      subParagraphBlocksAlignToolbar(subParagraphElement) {
        return !!subParagraphElement?.querySelector?.(WordexEditor.objectSelector);
      }

      isSelectedSubParagraphAlignToolbarBlocked() {
        if (this.paragraphContainerSelected) {
          return false;
        }

        const subParagraph = this.getSelectedSubParagraphElement();

        return this.subParagraphBlocksAlignToolbar(subParagraph);
      }

      allowsCurrentLineHighlight(container) {
        if (!container) {
          return false;
        }

        if (container.matches?.(".wordex-textbox")) {
          return true;
        }

        if (container.matches?.(WordexEditor.subParagraphSelector)) {
          return !this.subParagraphHostsMainLayoutObject(container);
        }

        return false;
      }

      getActiveEditableLineContainer() {
        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          return activeTextbox;
        }

        const activeElement = document.activeElement;

        if (
          activeElement?.matches?.(WordexEditor.subParagraphSelector) &&
          this.documentElement.contains(activeElement) &&
          this.allowsCurrentLineHighlight(activeElement)
        ) {
          return activeElement;
        }

        const selection = window.getSelection();

        if (selection?.rangeCount) {
          const subParagraph = this.findSubParagraphElementFromNode(
            selection.getRangeAt(0).commonAncestorContainer
          );

          if (
            subParagraph &&
            subParagraph.contentEditable === "true" &&
            this.documentElement.contains(subParagraph) &&
            this.allowsCurrentLineHighlight(subParagraph)
          ) {
            return subParagraph;
          }
        }

        if (!this.paragraphContainerSelected && !this.selectedObject) {
          const selectedSubParagraph = this.getSelectedSubParagraphElement();

          if (
            selectedSubParagraph &&
            selectedSubParagraph.contentEditable === "true" &&
            this.documentElement.contains(selectedSubParagraph) &&
            this.allowsCurrentLineHighlight(selectedSubParagraph)
          ) {
            return selectedSubParagraph;
          }
        }

        return null;
      }

      isEditableLineContainerBlank(container) {
        if (!container) {
          return false;
        }

        const html = container.matches?.(".wordex-textbox")
          ? container.innerHTML
          : this.getCleanSubParagraphHtml(container);

        return String(html || "").replace(/\s/g, "") === "";
      }

      probeCaretLineViewportRect(container, range) {
        const selection = window.getSelection();

        if (!selection?.rangeCount || !container || !range) {
          return null;
        }

        const savedRange = selection.getRangeAt(0).cloneRange();
        const marker = document.createElement("span");
        marker.dataset.wordexLineProbe = "1";
        marker.appendChild(document.createTextNode("\u200B"));

        const probeRange = range.cloneRange();
        probeRange.collapse(true);

        try {
          probeRange.insertNode(marker);

          const markerRect = marker.getBoundingClientRect();
          const containerRect = container.getBoundingClientRect();
          const lineHeight = Number.parseFloat(window.getComputedStyle(container).lineHeight) || 18;

          marker.remove();
          selection.removeAllRanges();
          selection.addRange(savedRange);

          return {
            top: markerRect.height > 0 ? markerRect.top : markerRect.top - lineHeight * 0.15,
            left: containerRect.left,
            width: containerRect.width,
            height: Math.max(markerRect.height, lineHeight)
          };
        } catch (error) {
          marker.remove();
          selection.removeAllRanges();
          selection.addRange(savedRange);
          return null;
        }
      }

      getEditableLineBlockAtRange(container, range) {
        if (!container || !range) {
          return null;
        }

        let node = range.startContainer;

        if (node.nodeType === Node.TEXT_NODE) {
          if (node.parentElement === container) {
            return null;
          }

          node = node.parentElement;
        }

        while (node && node !== container) {
          if (node.parentElement === container && node.matches?.("div, p")) {
            return node;
          }

          node = node.parentElement;
        }

        return null;
      }

      getCurrentLineViewportRect(container, range) {
        if (!container || !range || !container.contains(range.commonAncestorContainer)) {
          return null;
        }

        const lineBlock = this.getEditableLineBlockAtRange(container, range);
        const containerRect = container.getBoundingClientRect();
        const lineHeight = Number.parseFloat(window.getComputedStyle(container).lineHeight) || 18;

        if (lineBlock?.matches?.("div, p")) {
          const lineRect = lineBlock.getBoundingClientRect();

          return {
            top: lineRect.top,
            left: containerRect.left,
            width: containerRect.width,
            height: Math.max(lineRect.height, lineHeight)
          };
        }

        const caretRects = Array.from(range.getClientRects()).filter(
          rect => rect.height > 0 || rect.width > 0
        );

        if (!caretRects.length) {
          const probedRect = this.probeCaretLineViewportRect(container, range);

          if (probedRect) {
            return probedRect;
          }
        }

        const caretRect = caretRects.length
          ? caretRects[caretRects.length - 1]
          : range.getBoundingClientRect();
        const top = caretRect.height > 0 ? caretRect.top : caretRect.top - lineHeight * 0.15;

        return {
          top,
          left: containerRect.left,
          width: containerRect.width,
          height: Math.max(caretRect.height, lineHeight)
        };
      }

      ensureCurrentLineBandElement() {
        if (!this.currentLineBandElement) {
          this.currentLineBandElement = document.createElement("div");
          this.currentLineBandElement.className = "wordex-current-line-band";
          this.currentLineBandElement.setAttribute("aria-hidden", "true");
          document.body.appendChild(this.currentLineBandElement);
        }

        return this.currentLineBandElement;
      }

      wireCurrentLineBandScroll(container) {
        if (!container || container.dataset.wordexLineBandScrollWired === "1") {
          return;
        }

        container.dataset.wordexLineBandScrollWired = "1";
        container.addEventListener(
          "scroll",
          () => {
            if (this.currentLineBandContainer === container) {
              this.updateCurrentLineHighlight();
            }
          },
          { passive: true }
        );
      }

      hideCurrentLineBand() {
        if (this.currentLineBandElement) {
          this.currentLineBandElement.style.display = "none";
        }

        this.currentLineBandContainer = null;
      }

      clearCurrentLineHighlight() {
        this.documentElement?.querySelectorAll(".wordex-current-line").forEach(element => {
          element.classList.remove("wordex-current-line");
        });
        this.hideCurrentLineBand();
      }

      positionCurrentLineBand(container, range) {
        const viewportRect = this.getCurrentLineViewportRect(container, range);

        if (!viewportRect) {
          this.positionDefaultLineBandInContainer(container);
          return;
        }

        const containerRect = container.getBoundingClientRect();
        const visibleTop = Math.max(viewportRect.top, containerRect.top);
        const visibleBottom = Math.min(
          viewportRect.top + viewportRect.height,
          containerRect.bottom
        );
        const visibleHeight = visibleBottom - visibleTop;

        if (visibleHeight <= 0) {
          this.positionDefaultLineBandInContainer(container);
          return;
        }

        const band = this.ensureCurrentLineBandElement();

        this.currentLineBandContainer = container;
        this.wireCurrentLineBandScroll(container);
        band.style.display = "block";
        band.style.top = `${visibleTop}px`;
        band.style.left = `${viewportRect.left}px`;
        band.style.width = `${viewportRect.width}px`;
        band.style.height = `${visibleHeight}px`;
      }

      positionDefaultLineBandInContainer(container) {
        if (!container) {
          return;
        }

        const containerRect = container.getBoundingClientRect();
        const lineHeight = Number.parseFloat(window.getComputedStyle(container).lineHeight) || 18;
        const band = this.ensureCurrentLineBandElement();

        this.currentLineBandContainer = container;
        this.wireCurrentLineBandScroll(container);
        band.style.display = "block";
        band.style.top = `${containerRect.top}px`;
        band.style.left = `${containerRect.left}px`;
        band.style.width = `${containerRect.width}px`;
        band.style.height = `${lineHeight}px`;
      }

      updateCurrentLineHighlight() {
        if (document.body.classList.contains("wordex-generated-report")) {
          this.clearCurrentLineHighlight();
          return;
        }

        /*
          Enquanto um objeto está selecionado, o mousedown num subparágrafo
          vizinho move o caret antes do clique concluir — não mostrar faixa
          de linha até a seleção mudar de verdade (mouseup/click).
        */
        if (this.selectedObject?.matches?.(WordexEditor.objectSelector)) {
          this.clearCurrentLineHighlight();
          return;
        }

        this.documentElement?.querySelectorAll(".wordex-current-line").forEach(element => {
          element.classList.remove("wordex-current-line");
        });
        this.hideCurrentLineBand();

        const container = this.getActiveEditableLineContainer();

        if (!container) {
          return;
        }

        if (this.isEditableLineContainerBlank(container)) {
          this.positionDefaultLineBandInContainer(container);
          return;
        }

        const selection = window.getSelection();

        if (!selection?.rangeCount) {
          this.positionDefaultLineBandInContainer(container);
          return;
        }

        const range = selection.getRangeAt(0);

        if (!container.contains(range.commonAncestorContainer)) {
          this.positionDefaultLineBandInContainer(container);
          return;
        }

        const lineBlock = this.getEditableLineBlockAtRange(container, range);

        if (lineBlock?.matches?.("div, p")) {
          lineBlock.classList.add("wordex-current-line");
          return;
        }

        this.positionCurrentLineBand(container, range);
      }

      wireTextboxEditorEvents(textbox) {
        if (!textbox?.matches?.(".wordex-textbox") || textbox.dataset.wordexTextboxEditorWired === "1") {
          return;
        }

        textbox.dataset.wordexTextboxEditorWired = "1";

        const syncTextboxLayout = () => {
          const paragraph = textbox.closest(".paragraph");
          const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

          if (paragraph && subParagraph) {
            this.fitTextboxHeightToContent(textbox);
            this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
          }
        };

        textbox.addEventListener("focusin", () => {
          this.activateTextboxEditing(textbox);
          syncTextboxLayout();
          requestAnimationFrame(() => this.updateCurrentLineHighlight());
        });

        textbox.addEventListener("input", () => {
          this.activateTextboxEditing(textbox);
          syncTextboxLayout();
        });
        textbox.addEventListener("focusout", event => {
          this.deactivateTextboxEditing(textbox, event.relatedTarget);

          if (!event.relatedTarget?.closest?.(".wordex-textbox, .wordex-sub-paragraph, .toolbar")) {
            this.clearCurrentLineHighlight();
          }
        });

        textbox.addEventListener("mousedown", event => {
          if (this.isPrimaryModifierPressed(event)) {
            return;
          }

          if (this.selectedObject === textbox) {
            return;
          }

          event.stopPropagation();
          this.activateTextboxEditing(textbox);

          if (document.activeElement !== textbox) {
            textbox.focus();
          }
        });
      }

      wireSubParagraphEditorEvents(subParagraph) {
        if (
          !subParagraph?.matches?.(WordexEditor.subParagraphSelector) ||
          subParagraph.dataset.wordexSubEditorWired === "1" ||
          this.subParagraphHostsMainLayoutObject(subParagraph)
        ) {
          return;
        }

        subParagraph.dataset.wordexSubEditorWired = "1";

        subParagraph.addEventListener("focusin", () => {
          requestAnimationFrame(() => this.updateCurrentLineHighlight());
        });

        subParagraph.addEventListener("focusout", event => {
          if (!event.relatedTarget?.closest?.(".wordex-textbox, .wordex-sub-paragraph, .toolbar")) {
            this.clearCurrentLineHighlight();
          }
        });
      }

      wireDocumentEditableSurfaceEvents(root = this.documentElement) {
        this.wireDocumentTextboxEditorEvents(root);
        root?.querySelectorAll?.(WordexEditor.subParagraphSelector).forEach(subParagraph => {
          this.wireSubParagraphEditorEvents(subParagraph);
        });
      }

      wireDocumentTextboxEditorEvents(root = this.documentElement) {
        root?.querySelectorAll?.(".wordex-textbox").forEach(textbox => {
          this.wireTextboxEditorEvents(textbox);
        });
      }

      measureSubParagraphContentHeight(subParagraphElement) {
        if (!subParagraphElement) {
          return 18;
        }

        const hostsMainLayoutObject = this.subParagraphHostsMainLayoutObject(subParagraphElement);
        const savedMinHeight = subParagraphElement.style.minHeight;

        subParagraphElement.style.minHeight = "0px";

        let height = Math.max(18, Math.ceil(subParagraphElement.scrollHeight || 0));

        subParagraphElement.style.minHeight = savedMinHeight;

        subParagraphElement.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
          const objectBottom = hostsMainLayoutObject && object.matches(WordexEditor.mainObjectSelector)
            ? this.getObjectLayoutBottomInContainer(object, subParagraphElement)
            : this.getObjectBottomInFreeContainer(object, subParagraphElement);

          height = Math.max(height, objectBottom);
        });

        return Math.max(18, height);
      }

      getTextboxBorderThicknessPx(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return { top: 0, right: 0, bottom: 0, left: 0, vertical: 0, horizontal: 0 };
        }

        void textbox.offsetHeight;
        const style = window.getComputedStyle(textbox);

        const top = parseFloat(style.borderTopWidth) || 0;
        const right = parseFloat(style.borderRightWidth) || 0;
        const bottom = parseFloat(style.borderBottomWidth) || 0;
        const left = parseFloat(style.borderLeftWidth) || 0;

        return {
          top,
          right,
          bottom,
          left,
          vertical: top + bottom,
          horizontal: left + right
        };
      }

      fitTextboxHeightToContent(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return 0;
        }

        const savedHeight = textbox.style.height;
        textbox.style.height = "auto";

        void textbox.offsetHeight;

        const neededHeight = Math.max(
          18,
          Math.ceil(textbox.offsetHeight || textbox.scrollHeight || 0)
        );

        textbox.style.height = savedHeight;

        textbox.style.height = neededHeight + "px";
        return neededHeight;
      }

      refreshTextboxSizeAfterResize(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const manualHeight =
          this.parseCssSizeToPixels(textbox.style.height) ||
          Math.round(textbox.offsetHeight || 0);

        this.fitTextboxHeightToContent(textbox);

        const fittedHeight =
          this.parseCssSizeToPixels(textbox.style.height) ||
          Math.round(textbox.offsetHeight || 0);

        textbox.style.height = Math.max(manualHeight, fittedHeight) + "px";

        const paragraph = textbox.closest(".paragraph");
        const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

        if (paragraph && subParagraph) {
          this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
          this.updateFreeContainerBounds(subParagraph);
        }
      }

      refreshTextboxLayoutAfterBorderChange(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const prevVertical = Number.parseFloat(textbox.dataset.wordexBorderVerticalPx) || 0;
        const prevHorizontal = Number.parseFloat(textbox.dataset.wordexBorderHorizontalPx) || 0;
        const borders = this.getTextboxBorderThicknessPx(textbox);
        const deltaVertical = borders.vertical - prevVertical;
        const deltaHorizontal = borders.horizontal - prevHorizontal;

        if (deltaVertical !== 0) {
          const heightPx =
            this.parseCssSizeToPixels(textbox.style.height) ||
            textbox.offsetHeight ||
            0;

          if (heightPx > 0) {
            textbox.style.height = Math.max(18, Math.round(heightPx + deltaVertical)) + "px";
          }
        }

        if (deltaHorizontal !== 0) {
          const widthPx =
            this.parseCssSizeToPixels(textbox.style.width) ||
            textbox.offsetWidth ||
            0;

          if (widthPx > 0) {
            textbox.style.width = Math.max(40, Math.round(widthPx + deltaHorizontal)) + "px";
          }
        }

        textbox.dataset.wordexBorderVerticalPx = String(borders.vertical);
        textbox.dataset.wordexBorderHorizontalPx = String(borders.horizontal);

        this.fitTextboxHeightToContent(textbox);

        if (textbox.scrollHeight > textbox.clientHeight + 1) {
          textbox.style.height =
            Math.ceil(textbox.scrollHeight + borders.vertical) + "px";
        }

        const paragraph = textbox.closest(".paragraph");
        const subParagraph = textbox.closest(WordexEditor.subParagraphSelector);

        if (paragraph && subParagraph) {
          this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
        }
      }

      refreshLayoutAfterTextContentChange(paragraph, options = {}) {
        if (!paragraph?.matches?.(".paragraph")) {
          return;
        }

        let subParagraph = options.subParagraph || null;
        const textbox = options.textbox || null;

        if (textbox && paragraph.contains(textbox)) {
          this.fitTextboxHeightToContent(textbox);
          subParagraph = subParagraph || textbox.closest(WordexEditor.subParagraphSelector);
        }

        if (!subParagraph) {
          const selection = window.getSelection();

          if (selection?.rangeCount) {
            const node = selection.getRangeAt(0).startContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            subParagraph = element?.closest?.(WordexEditor.subParagraphSelector) || null;
          }
        }

        if (!subParagraph) {
          subParagraph =
            this.getSelectedSubParagraphElement() ||
            paragraph.querySelector(WordexEditor.subParagraphSelector);
        }

        if (subParagraph) {
          this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
          this.updateFreeContainerBounds(subParagraph);
        }

        requestAnimationFrame(() => this.positionObjectResizeOverlay());
      }

      refreshParagraphSubParagraphHeightsDuringTyping(paragraphElement, scopeSubParagraphElement = null) {
        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (
          activeTextbox &&
          paragraphElement?.contains(activeTextbox)
        ) {
          this.fitTextboxHeightToContent(activeTextbox);
        }

        this.updateParagraphSubParagraphHeightsFromContent(paragraphElement, scopeSubParagraphElement);
        requestAnimationFrame(() => this.positionObjectResizeOverlay());
      }

      updateParagraphSubParagraphHeightsFromContent(paragraphElement, scopeSubParagraphElement = null) {
        if (!paragraphElement?.matches?.(".paragraph")) {
          return;
        }

        const subParagraphElements = scopeSubParagraphElement
          ? [scopeSubParagraphElement]
          : this.getParagraphDirectSubParagraphElements(paragraphElement);

        subParagraphElements.forEach(subParagraphElement => {
          if (
            !scopeSubParagraphElement &&
            this.subParagraphHostsMainLayoutObject(subParagraphElement)
          ) {
            return;
          }

          subParagraphElement.style.minHeight =
            this.measureSubParagraphContentHeight(subParagraphElement) + "px";
        });
      }

      updateParagraphEmptyState(paragraphElement) {
        if (!paragraphElement) return;

        paragraphElement.querySelectorAll(WordexEditor.subParagraphSelector).forEach(sub => {
          this.updateSubParagraphEmptyState(sub);
        });

        const block = this.findBlockById(paragraphElement.dataset.blockId);
        const html = block?.subParagraphs
          ? block.subParagraphs.map(sub => sub.html).join("")
          : this.getCleanInnerHtml(paragraphElement);
        let isEmpty = this.isParagraphVisuallyEmptyHtml(html);

        if (isEmpty && this.hasParagraphVisualContent(paragraphElement)) {
          isEmpty = false;
        }

        paragraphElement.classList.toggle("is-empty", isEmpty);
        paragraphElement.dataset.emptyText = "Parágrafo vazio";
      }

      getCleanSubParagraphHtml(subParagraphElement) {
        if (!subParagraphElement) return "";

        if (subParagraphElement.querySelector("table.wordex-table")) {
          return this.serializeParagraphInlineObjects(subParagraphElement);
        }

        const clone = subParagraphElement.cloneNode(true);
        clone.querySelectorAll(".wordex-sub-paragraph-editor-guides").forEach(node => node.remove());
        this.clearObjectSelectionMarks(clone);
        this.normalizeDynamicImageBoxesForSave(clone);
        return clone.innerHTML;
      }

      syncSubParagraphWidthsFromDom(paragraphElement, block) {
        const subs = Array.from(paragraphElement.querySelectorAll(WordexEditor.subParagraphSelector));

        subs.forEach((subElement, index) => {
          const subBlock = block.subParagraphs[index];

          if (!subBlock) {
            return;
          }

          subBlock.style = subBlock.style || {};
          subBlock.style.width = subElement.style.width ||
            subElement.style.flexBasis ||
            subBlock.style.width ||
            `${100 / subs.length}%`;
        });
      }

      redistributeSubParagraphWidths(paragraphElement, block, index, deltaPercent) {
        const subs = Array.from(paragraphElement.querySelectorAll(WordexEditor.subParagraphSelector));

        if (subs.length < 2 || index < 0 || index >= subs.length - 1) {
          return;
        }

        const minPercent = 8;
        const widths = subs.map((sub, subIndex) =>
          this.parseSubParagraphWidthPercent(
            sub.style.width || block.subParagraphs[subIndex]?.style?.width,
            subs.length
          )
        );

        const pairTotal = widths[index] + widths[index + 1];
        let nextLeft = this.clamp(widths[index] + deltaPercent, minPercent, pairTotal - minPercent);
        let nextRight = pairTotal - nextLeft;

        widths[index] = nextLeft;
        widths[index + 1] = nextRight;

        subs.forEach((subElement, subIndex) => {
          const width = widths[subIndex].toFixed(4) + "%";
          subElement.style.flex = `0 0 ${width}`;
          subElement.style.width = width;
          subElement.style.maxWidth = width;

          if (block.subParagraphs[subIndex]) {
            block.subParagraphs[subIndex].style.width = width;
          }
        });
      }

      createTableHtml(rows, cols, align, width) {
        return this.createTableElement(rows, cols, align, width).outerHTML;
      }

      clearSelection() {
        this.selectedParagraphId = null;
        this.selectedSubParagraphId = null;
        this.paragraphContainerSelected = false;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.releaseJsonMacroPickerFromImageContext();
        this.clearTableSelectionState();
        this.savedRange = null;

        if (this.selected.region === "bodyFlow") {
          this.ensureParagraphSelection();
        }
      }

      clearTableSelectionState() {
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.selectedTableRowIndices = [];
        this.selectedTableColumnIndices = [];
        this.selectedTableCells = [];
        this.tableSelectionAnchor = null;
      }

      focusSelectedParagraphForTyping() {
        this.focusParagraphForTyping(this.getSelectedParagraphElement(), {
          placement: "preserve"
        });
      }

      getPrimaryEditableSubParagraph(paragraphElement, preferredSubParagraphId = null) {
        if (!paragraphElement?.matches?.(".paragraph")) {
          return null;
        }

        if (preferredSubParagraphId) {
          const preferred = paragraphElement.querySelector(
            `${WordexEditor.subParagraphSelector}[data-sub-paragraph-id="${preferredSubParagraphId}"]`
          );

          if (preferred) {
            return preferred;
          }
        }

        return this.getParagraphDirectSubParagraphElements(paragraphElement)[0] || null;
      }

      focusEditableSubParagraph(subParagraphElement, placement = "end") {
        if (!subParagraphElement) {
          return;
        }

        subParagraphElement.focus({ preventScroll: true });

        const selection = window.getSelection();

        if (
          placement === "preserve" &&
          selection?.rangeCount &&
          subParagraphElement.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          this.saveSelectionIfInsideParagraph();
          return;
        }

        if (placement === "start") {
          this.placeCaretAtStart(subParagraphElement);
        } else if (
          placement === "end-if-empty" &&
          this.isParagraphVisuallyEmptyHtml(this.getCleanSubParagraphHtml(subParagraphElement))
        ) {
          this.placeCaretAtStart(subParagraphElement);
        } else {
          this.placeCaretAtEnd(subParagraphElement);
        }

        this.saveSelectionIfInsideParagraph();
        requestAnimationFrame(() => this.updateCurrentLineHighlight());
      }

      focusParagraphForTyping(paragraphElement, options = {}) {
        const subParagraph = this.getPrimaryEditableSubParagraph(
          paragraphElement,
          options.subParagraphId || this.selectedSubParagraphId
        );

        this.focusEditableSubParagraph(subParagraph, options.placement || "end");
      }

      ensureParagraphInRegion(region) {
        if (!Array.isArray(this.wordexDocument[region])) {
          this.wordexDocument[region] = [];
        }

        let paragraph = this.wordexDocument[region].find(block => block.type === "paragraph");

        if (!paragraph) {
          paragraph = this.createParagraph("");
          this.wordexDocument[region].push(paragraph);
        }

        return paragraph;
      }

      selectRegionOnly(region, shouldRender = true) {
        this.selected.region = region;
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        if (shouldRender) {
          this.renderSelection();
        }
      }

      selectParagraphInRegion(region, shouldRender = true, shouldFocus = true) {
        const paragraph = this.ensureParagraphInRegion(region);

        this.selected.region = region;
        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.normalizeParagraphBlock(paragraph);
        this.selectedSubParagraphId = paragraph.subParagraphs[0]?.id || null;
        this.paragraphContainerSelected = false;
        this.selectedObject = null;
        this.clearTableSelectionState();
        this.savedRange = null;

        if (shouldRender) {
          this.render();

          if (shouldFocus) {
            this.focusSelectedParagraphForTyping();
          }
        }

        return paragraph;
      }

      ensureParagraphSelection() {
        if (
          this.selectedParagraphId &&
          this.findBlockById(this.selectedParagraphId)
        ) {
          return;
        }

        if (this.selected.region === "bodyFlow") {
          this.selectParagraphInRegion("bodyFlow", false, false);
        }
      }

      selectFallbackParagraph(shouldRender = true) {
        this.ensureRequiredParagraphs();

        const regions = [
          this.selected.region || "bodyFlow",
          "bodyFlow",
          "headerTemplate",
          "footerTemplate"
        ];

        for (const region of regions) {
          const blocks = this.wordexDocument[region] || [];
          const paragraph = blocks.find(block => block.type === "paragraph");

          if (paragraph) {
            this.selected.region = region;
            this.selectedParagraphId = paragraph.id;
            this.selectedBlockId = paragraph.id;
            this.normalizeParagraphBlock(paragraph);
            this.selectedSubParagraphId = paragraph.subParagraphs[0]?.id || null;
            this.paragraphContainerSelected = false;
            this.selectedObject = null;
            this.clearTableSelectionState();
            this.savedRange = null;

            if (shouldRender) {
              this.renderSelection();
            }

            return;
          }
        }

        this.selectParagraphInRegion("bodyFlow", shouldRender, false);
      }

      getSelectedBlocks() {
        return this.wordexDocument[this.selected.region];
      }

      findBlockById(blockId) {
        if (!blockId) return null;

        for (const region of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
          const block = this.wordexDocument[region].find(item => item.id === blockId);

          if (block) {
            return block;
          }
        }

        return null;
      }

      getSelectedParagraphElement() {
        if (!this.selectedParagraphId) return null;

        return this.documentElement.querySelector(
          `.paragraph[data-block-id="${this.selectedParagraphId}"]`
        );
      }


      selectRegion(region) {
        this.selected.region = region;

        if (region === "bodyFlow") {
          this.selectParagraphInRegion("bodyFlow");
          return;
        }

        const blocks = this.wordexDocument[region] || [];
        const paragraph = blocks.find(block => block.type === "paragraph");

        if (paragraph) {
          this.selectedParagraphId = paragraph.id;
          this.selectedBlockId = paragraph.id;
          this.selectedObject = null;
          this.releaseJsonMacroPickerFromImageContext();
          this.clearTableSelectionState();
          this.savedRange = null;

          this.renderSelection();

          const element = this.getSelectedParagraphElement();

          if (element) {
            this.focusParagraphForTyping(element);
          }

          return;
        }

        this.selectRegionOnly(region);
      }

      selectParagraph(region, blockId, options = {}) {
        this.clearParagraphBlockMoveSelection();

        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.paragraphContainerSelected = false;

        const block = this.findBlockById(blockId);

        if (block?.type === "paragraph") {
          this.normalizeParagraphBlock(block);

          if (!options.subParagraphId) {
            const subFromCaret = this.findSubParagraphElementFromNode(
              window.getSelection()?.getRangeAt?.(0)?.commonAncestorContainer
            );
            this.selectedSubParagraphId =
              subFromCaret?.dataset?.subParagraphId ||
              block.subParagraphs[0]?.id ||
              null;
          } else {
            this.selectedSubParagraphId = options.subParagraphId;
          }
        } else {
          this.selectedSubParagraphId = null;
        }

        if (!options.preserveTableSelection) {
          this.selectedObject = null;
          this.selectedCell = null;
          this.clearTableSelectionState();
          this.macroPickerActiveTable = null;
          this.releaseJsonMacroPickerFromImageContext();
        }

        this.renderSelection();
      }

      selectObject(object) {
        this.clearParagraphBlockMoveSelection();

        const paragraph = object.closest(".paragraph");
        const block = object.closest(".paragraph-block, .object-block");
        const region = object.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
          const subParagraph = object.closest(WordexEditor.subParagraphSelector);
          this.selectedSubParagraphId = subParagraph?.dataset?.subParagraphId || null;
          this.paragraphContainerSelected = false;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedSubParagraphId = null;
          this.paragraphContainerSelected = false;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.selectedObject = object;

        if (object?.matches?.(".wordex-textbox")) {
          object.blur();

          const selection = window.getSelection();

          if (selection) {
            selection.removeAllRanges();
          }

          this.savedRange = null;
        }

        if (this.isWordexTableObject(object)) {
          this.macroPickerActiveTable = object;

          if (!this.selectedTableMode) {
            this.selectedTableMode = "table";
          }

          object.dataset.wordexSelectionMode = this.selectedTableMode;
        } else if (object?.matches?.(".dynamic-image-box")) {
          this.syncJsonMacroPickerForImageContext(this.getImageMacroContext(object));
        } else {
          this.releaseJsonMacroPickerFromImageContext();
        }

        if (!this.isWordexTableObject(object)) {
          this.clearTableSelectionState();
          this.macroPickerActiveTable = null;

          const selection = window.getSelection();
          const range = selection?.rangeCount ? selection.getRangeAt(0) : null;
          const cellFromSelection =
            this.getTableCellFromRange(range) || this.getTableCellFromRange(this.savedRange);

          if (cellFromSelection) {
            this.savedRange = null;

            if (selection) {
              selection.removeAllRanges();
            }
          }
        }

        if (!object?.matches?.(".wordex-textbox")) {
          this.exitTextboxEditingForObjectSelection(object);
        }

        const subParagraph = object.closest(WordexEditor.subParagraphSelector);

        if (subParagraph && !this.isInsertingObject) {
          this.clampObjectInsideContainer(object, subParagraph);
          this.updateFreeContainerBounds(subParagraph);
        }

        this.renderSelection();
      }

      insertParagraph() {
        this.syncCurrentEditingState();

        const paragraph = this.createParagraph(
          this.getDefaultParagraphTextForCurrentRegion()
        );
        this.getSelectedBlocks().push(paragraph);
        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedSubParagraphId = paragraph.subParagraphs[0]?.id || null;
        this.paragraphContainerSelected = false;
        this.selectedObject = null;
        this.render();

        const element = this.getSelectedParagraphElement();

        if (element) {
          this.selectSubParagraph(
            this.selected.region,
            paragraph.id,
            paragraph.subParagraphs[0]?.id
          );

          /*
            Não focar o subparágrafo aqui. O clique normal no parágrafo foca
            via gesto do utilizador; focus() programático logo após o render
            deixa os <select> da toolbar sem abrir até haver clique no documento.
          */
          const selection = window.getSelection();

          if (selection) {
            selection.removeAllRanges();
          }

          if (document.activeElement?.closest?.(WordexEditor.subParagraphSelector)) {
            document.activeElement.blur();
          }
        }
      }

      installWordexClipboardEvents() {
        document.addEventListener("copy", event => {
          this.handleWordexCopyEvent(event);
        });

        document.addEventListener("cut", event => {
          this.handleWordexCutEvent(event);
        });

        document.addEventListener("paste", event => {
          this.handleWordexPasteEvent(event);
        });
      }

      getWordexClipboardMarker() {
        return "__WORDEX_BLOCK_CLIPBOARD_V1__";
      }

      hasNonCollapsedSelectionInsideEditor() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !!element && this.documentElement.contains(element);
      }

      getSelectedBlockContext() {
        const blockId = this.selectedBlockId || this.selectedParagraphId;

        if (!blockId) return null;

        for (const region of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
          const blocks = this.wordexDocument[region] || [];
          const index = blocks.findIndex(block => block.id === blockId);

          if (index >= 0) {
            return { region, blocks, block: blocks[index], index };
          }
        }

        return null;
      }

      sanitizeClipboardBlockHtml(html) {
        const template = document.createElement("template");
        template.innerHTML = String(html || "");
        this.clearObjectSelectionMarks(template.content);
        return template.innerHTML;
      }

      cloneBlockForClipboard(block) {
        const clone = JSON.parse(JSON.stringify(block));

        if (clone.html) {
          clone.html = this.sanitizeClipboardBlockHtml(clone.html);
        }

        return clone;
      }

      cloneBlockForPaste(block) {
        const clone = this.cloneBlockForClipboard(block);
        clone.id = this.createId(clone.type || "paragraph");
        return clone;
      }

      createWordexClipboardPayload() {
        this.syncCurrentEditingState();

        const context = this.getSelectedBlockContext();

        if (!context) {
          return null;
