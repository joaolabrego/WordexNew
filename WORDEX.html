          this.deleteSelectedObject();
          return true;
        }

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }
        const container = this.findDeletionContainerFromNode(range.commonAncestorContainer);

        if (!container || !this.documentElement.contains(container)) {
          return false;
        }

        const result = this.findAdjacentObjectAtCaret(container, range, event.key);

        if (!result || !result.object || !result.marker) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        /*
          Não exclui de imediato. Primeiro seleciona o objeto.
          Isso evita surpresas e também resolve melhor objetos centralizados
          ou alinhados à direita, que não se comportam como texto comum.
        */
        this.placeCaretAtMarker(result.marker);
        result.marker.remove();

        this.selectObject(result.object);

        const cell = result.object.closest("td");
        if (cell) {
          this.selectedCell = cell;
        }

        return true;
      }

      findDeletionContainerFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        /*
          Se o caret está numa célula, a célula é o container de edição.
          Caso contrário, usa o parágrafo.
        */
        return element.closest("td") || element.closest(".paragraph");
      }

      findAdjacentObjectAtCaret(container, range, key) {
        const marker = document.createElement("span");
        marker.dataset.wordexCaretMarker = "1";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "0";
        marker.style.overflow = "hidden";
        marker.appendChild(document.createTextNode("\u200B"));

        const workRange = range.cloneRange();
        workRange.insertNode(marker);

        const units = this.getDeletionUnits(container, marker);
        const index = units.indexOf(marker);

        if (index < 0) {
          marker.remove();
          return null;
        }

        const step = key === "Backspace" ? -1 : 1;

        for (let i = index + step; i >= 0 && i < units.length; i += step) {
          const current = units[i];

          if (this.isWordexInlineObject(current)) {
            return {
              object: current,
              marker
            };
          }

          if (current.nodeType === Node.TEXT_NODE) {
            /*
              Textos técnicos invisíveis não contam como conteúdo.
              Texto real interrompe a busca, deixando o navegador apagar texto normalmente.
            */
            const text = current.nodeValue
              .replace(/\u200B/g, "")
              .replace(/\uFEFF/g, "")
              .replace(/\s/g, "");

            if (text.length === 0) {
              continue;
            }

            break;
          }

          /*
            BRs e spans vazios podem existir como sobras de edição;
            não devem impedir a seleção do objeto adjacente.
          */
          if (
            current.nodeType === Node.ELEMENT_NODE &&
            (
              current.tagName === "BR" ||
              current.dataset.wordexCaretMarker === "1" ||
              current.textContent.replace(/\u200B/g, "").trim() === ""
            )
          ) {
            continue;
          }

          break;
        }

        marker.remove();
        return null;
      }

      getDeletionUnits(container, marker) {
        const units = [];

        const walk = node => {
          if (node === marker) {
            units.push(node);
            return;
          }

          if (node.nodeType === Node.TEXT_NODE) {
            units.push(node);
            return;
          }

          if (node.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          /*
            Objetos Wordex contam como uma unidade apagável.
            Não entramos no conteúdo interno deles.
          */
          if (this.isWordexInlineObject(node)) {
            units.push(node);
            return;
          }

          /*
            BR conta como unidade vazia atravessável.
          */
          if (node.tagName === "BR") {
            units.push(node);
            return;
          }

          Array.from(node.childNodes).forEach(child => walk(child));
        };

        Array.from(container.childNodes).forEach(child => walk(child));

        return units;
      }

      isWordexInlineObject(node) {
        return Boolean(
          node &&
          node.nodeType === Node.ELEMENT_NODE &&
          node.matches(WordexEditor.objectSelector)
        );
      }

      placeCaretAtMarker(marker) {
        const selection = window.getSelection();
        const range = document.createRange();

        range.setStartBefore(marker);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      handleEmptyParagraphDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        if (
          !this.isParagraphHtmlEmpty(this.getCleanInnerHtml(paragraph)) ||
          this.hasParagraphVisualContent(paragraph)
        ) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.deleteEmptyParagraph(paragraph);
        return true;
      }

      deleteEmptyParagraph(paragraphElement) {
        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        blocks.splice(index, 1);

        this.ensureRequiredParagraphs();

        let targetBlock = null;

        if (blocks.length > 0) {
          targetBlock = blocks[Math.min(index, blocks.length - 1)];
        }

        this.selected.region = region;
        this.selectedObject = null;
        this.selectedCell = null;

        if (targetBlock && targetBlock.type === "paragraph") {
          this.selectedParagraphId = targetBlock.id;
          this.selectedBlockId = targetBlock.id;
        } else {
          this.selectedParagraphId = null;
          this.selectedBlockId = null;
        }

        this.render();

        const targetElement = this.getSelectedParagraphElement();

        if (targetElement) {
          this.focusParagraphForTyping(targetElement, { placement: "end-if-empty" });
        }
      }

      handleParagraphEnter(event) {
        if (event.key !== "Enter") {
          return false;
        }

        /*
          Shift+Enter é tratado em handleEditableShiftEnter().
        */
        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        const paragraph = event.target.closest(".paragraph");

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          Dentro de célula de tabela ou textbox, Enter deve continuar sendo comportamento
          do próprio conteúdo, não criação de novo parágrafo externo.
        */
        if (event.target.closest("td, .wordex-textbox")) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        this.splitParagraphAtCaret(paragraph);
        return true;
      }

      splitParagraphAtCaret(paragraphElement) {
        if (!paragraphElement) return;

        const regionElement = paragraphElement.closest(".region");
        const region = regionElement?.dataset.region || this.selected.region;
        const blockId = paragraphElement.dataset.blockId;
        const blocks = this.wordexDocument[region];

        if (!blocks) return;

        const index = blocks.findIndex(block => block.id === blockId);

        if (index < 0) return;

        const currentBlock = blocks[index];

        let afterHtml = "";

        const selection = window.getSelection();

        if (
          selection &&
          selection.rangeCount > 0 &&
          paragraphElement.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          const range = selection.getRangeAt(0);

          /*
            Se houver texto selecionado, ele é removido antes da divisão.
          */
          if (!range.collapsed) {
            range.deleteContents();
          }

          const afterRange = document.createRange();
          afterRange.selectNodeContents(paragraphElement);
          afterRange.setStart(range.startContainer, range.startOffset);

          const afterFragment = afterRange.extractContents();
          afterHtml = this.fragmentToHtml(afterFragment);
        }

        /*
          Depois de extrair o conteúdo posterior ao cursor,
          o parágrafo atual fica apenas com a parte anterior.
        */
        this.syncParagraphElement(paragraphElement);

        /*
          O novo parágrafo deve nascer com a configuração atual da toolbar,
          não com o estilo do parágrafo anterior.
        */
        const newParagraph = this.createParagraph(afterHtml);

        blocks.splice(index + 1, 0, newParagraph);

        this.selected.region = region;
        this.selectedParagraphId = newParagraph.id;
        this.selectedBlockId = newParagraph.id;
        this.selectedSubParagraphId = newParagraph.subParagraphs[0]?.id || null;
        this.paragraphContainerSelected = false;
        this.selectedObject = null;
        this.selectedCell = null;

        this.render();

        const newElement = this.getSelectedParagraphElement();

        if (newElement) {
          this.selectSubParagraph(
            region,
            newParagraph.id,
            newParagraph.subParagraphs[0]?.id
          );
          this.focusParagraphForTyping(newElement, {
            subParagraphId: newParagraph.subParagraphs[0]?.id,
            placement: "start"
          });
        }
      }

      fragmentToHtml(fragment) {
        const container = document.createElement("div");
        container.appendChild(fragment);
        return container.innerHTML;
      }

      handleParagraphBoundaryArrow(event) {
        if (event.key !== "ArrowUp" && event.key !== "ArrowDown") {
          return false;
        }

        /*
          Ctrl+setas continuam reservadas para movimentar objetos/blocos.
        */
        if (event.ctrlKey || event.altKey || event.metaKey || event.shiftKey) {
          return false;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || !selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        if (paragraph.closest("td")) {
          return false;
        }

        const lineInfo = this.getCaretVisualLineInfo(paragraph, range);

        if (!lineInfo) {
          return false;
        }

        if (event.key === "ArrowUp" && !lineInfo.isFirstLine) {
          return false;
        }

        if (event.key === "ArrowDown" && !lineInfo.isLastLine) {
          return false;
        }

        const currentBlock = paragraph.closest(".paragraph-block");

        if (!currentBlock) {
          return false;
        }

        const targetBlock = event.key === "ArrowUp"
          ? this.findSiblingParagraphBlock(currentBlock, "previous")
          : this.findSiblingParagraphBlock(currentBlock, "next");

        if (!targetBlock) {
          return false;
        }

        const targetParagraph = targetBlock.querySelector(".paragraph");

        if (!targetParagraph) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();

        const region = targetBlock.closest(".region")?.dataset.region || this.selected.region;
        const blockId = targetBlock.dataset.blockId;

        this.selectParagraph(region, blockId);
        this.focusParagraphForTyping(targetParagraph, {
          placement: event.key === "ArrowUp" ? "end" : "start"
        });

        return true;
      }

      findSiblingParagraphBlock(currentBlock, direction) {
        let sibling = direction === "previous"
          ? currentBlock.previousElementSibling
          : currentBlock.nextElementSibling;

        while (sibling) {
          if (sibling.classList.contains("paragraph-block")) {
            return sibling;
          }

          sibling = direction === "previous"
            ? sibling.previousElementSibling
            : sibling.nextElementSibling;
        }

        return null;
      }

      getCaretVisualLineInfo(paragraph, range) {
        /*
          Detecta a linha visual real do caret.
          Isso é diferente de início/fim lógico do parágrafo.
          Exemplo: em um parágrafo quebrado em 3 linhas, seta para cima
          só vai ao parágrafo anterior se o caret estiver na primeira linha visual.
        */
        const marker = document.createElement("span");
        marker.dataset.wordexCaretLineMarker = "1";
        marker.textContent = "\u200B";
        marker.style.display = "inline-block";
        marker.style.width = "0";
        marker.style.height = "1em";
        marker.style.overflow = "hidden";
        marker.style.verticalAlign = "baseline";

        const markerRange = range.cloneRange();
        markerRange.insertNode(marker);

        const caretRect = marker.getBoundingClientRect();

        const paragraphRange = document.createRange();
        paragraphRange.selectNodeContents(paragraph);

        const rects = Array.from(paragraphRange.getClientRects())
          .filter(rect => rect.width > 0 && rect.height > 0);

        marker.remove();

        if (!caretRect || caretRect.height === 0) {
          return null;
        }

        if (rects.length === 0) {
          return {
            isFirstLine: true,
            isLastLine: true
          };
        }

        /*
          Agrupa retângulos por linha visual, porque getClientRects()
          pode retornar vários retângulos na mesma linha.
        */
        const tolerance = 3;
        const lines = [];

        rects.forEach(rect => {
          let line = lines.find(item => Math.abs(item.top - rect.top) <= tolerance);

          if (!line) {
            line = {
              top: rect.top,
              bottom: rect.bottom
            };
            lines.push(line);
          } else {
            line.top = Math.min(line.top, rect.top);
            line.bottom = Math.max(line.bottom, rect.bottom);
          }
        });

        lines.sort((a, b) => a.top - b.top);

        const firstLine = lines[0];
        const lastLine = lines[lines.length - 1];

        return {
          isFirstLine: Math.abs(caretRect.top - firstLine.top) <= tolerance ||
            (caretRect.top >= firstLine.top - tolerance && caretRect.top <= firstLine.bottom + tolerance),

          isLastLine: Math.abs(caretRect.top - lastLine.top) <= tolerance ||
            (caretRect.top >= lastLine.top - tolerance && caretRect.top <= lastLine.bottom + tolerance)
        };
      }

      installInlineObjectDragEvents() {
        this.documentElement.addEventListener("mousedown", event => {
          this.startInlineObjectMouseDragCandidate(event);
        });

        document.addEventListener("mousemove", event => {
          this.handleInlineObjectMouseDragMove(event);
          this.handleParagraphBlockReorderDragMove(event);
        });

        document.addEventListener("mouseup", event => {
          this.finishInlineObjectMouseDrag(event);
          this.finishParagraphBlockReorderDrag(event);
        });
      }

      installParagraphBlockReorderEvents() {
        this.documentElement.addEventListener("mousedown", event => {
          this.startParagraphBlockReorderDragCandidate(event);
        }, true);
      }

      selectParagraphBlockForMove(region, blockId) {
        this.syncCurrentEditingState();
        this.paragraphMoveBlockId = blockId;
        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.selectedObject = null;
        this.selectedCell = null;
        this.clearTableSelectionState();
        this.macroPickerActiveTable = null;
        this.releaseJsonMacroPickerFromImageContext();
        this.renderSelection();
      }

      clearParagraphBlockMoveSelection() {
        if (!this.paragraphMoveBlockId) {
          return;
        }

        this.paragraphMoveBlockId = null;
        this.removeParagraphBlockDropIndicator();
        this.renderSelection();
      }

      getRegionElement(region) {
        return this.documentElement.querySelector(`.region[data-region="${region}"]`);
      }

      getParagraphBlockLayoutRect(wrapper) {
        const rect = wrapper.getBoundingClientRect();
        let top = rect.top;
        let bottom = rect.bottom;

        wrapper.querySelectorAll(".chart-box, .table-box, .image-box, .object-block").forEach(element => {
          const elementRect = element.getBoundingClientRect();

          if (elementRect.height > 0) {
            top = Math.min(top, elementRect.top);
            bottom = Math.max(bottom, elementRect.bottom);
          }
        });

        return { top, bottom, height: Math.max(bottom - top, rect.height) };
      }

      findInsertBeforeParagraphWrapperIndex(wrappers, clientY, draggedBlockId) {
        for (let index = 0; index < wrappers.length; index++) {
          const wrapper = wrappers[index];
          const blockId = wrapper.dataset.blockId;
          const isDragged = blockId === draggedBlockId;
          const rect = this.getParagraphBlockLayoutRect(wrapper);

          if (clientY < rect.top) {
            return index;
          }

          if (clientY <= rect.bottom) {
            if (isDragged) {
              continue;
            }

            return index + 1;
          }
        }

        return wrappers.length;
      }

      computeParagraphBlockDropIndex(region, draggedBlockId, clientY) {
        const regionElement = this.getRegionElement(region);
        const modelBlocks = this.wordexDocument[region] || [];

        if (!regionElement || !modelBlocks.length) {
          return -1;
        }

        const wrappers = Array.from(regionElement.querySelectorAll(".paragraph-block"));
        const fromIndex = modelBlocks.findIndex(block => block.id === draggedBlockId);

        if (fromIndex < 0) {
          return -1;
        }

        const insertBeforeWrapperIndex = this.findInsertBeforeParagraphWrapperIndex(
          wrappers,
          clientY,
          draggedBlockId
        );
        const insertBeforeId = wrappers[insertBeforeWrapperIndex]?.dataset?.blockId || null;
        let toIndex = insertBeforeId
          ? modelBlocks.findIndex(block => block.id === insertBeforeId)
          : modelBlocks.length;

        if (toIndex > fromIndex) {
          toIndex--;
        }

        return toIndex;
      }

      showParagraphBlockDropIndicator(region, clientY, draggedBlockId) {
        const regionElement = this.getRegionElement(region);

        if (!regionElement) {
          return;
        }

        const wrappers = Array.from(regionElement.querySelectorAll(".paragraph-block"));
        const insertBeforeWrapperIndex = this.findInsertBeforeParagraphWrapperIndex(
          wrappers,
          clientY,
          draggedBlockId
        );
        const insertBeforeWrapper = wrappers[insertBeforeWrapperIndex] || null;

        this.removeParagraphBlockDropIndicator();

        const indicator = document.createElement("div");
        indicator.className = "wordex-paragraph-drop-indicator";
        indicator.dataset.wordexDropIndicator = "1";

        if (insertBeforeWrapper) {
          regionElement.insertBefore(indicator, insertBeforeWrapper);
        } else if (wrappers.length) {
          const lastWrapper = wrappers[wrappers.length - 1];
          lastWrapper.insertAdjacentElement("afterend", indicator);
        } else {
          regionElement.appendChild(indicator);
        }

        this.paragraphBlockDropIndicator = indicator;
      }

      removeParagraphBlockDropIndicator() {
        if (this.paragraphBlockDropIndicator?.parentNode) {
          this.paragraphBlockDropIndicator.parentNode.removeChild(this.paragraphBlockDropIndicator);
        }

        this.paragraphBlockDropIndicator = null;
      }

      moveBlockToIndex(region, blockId, targetIndex) {
        this.syncCurrentEditingState();

        const blocks = this.wordexDocument[region] || [];
        const fromIndex = blocks.findIndex(block => block.id === blockId);

        if (fromIndex < 0 || targetIndex < 0 || targetIndex >= blocks.length || fromIndex === targetIndex) {
          return false;
        }

        const [block] = blocks.splice(fromIndex, 1);
        blocks.splice(targetIndex, 0, block);

        this.selected.region = region;
        this.selectedBlockId = block.id;
        this.selectedParagraphId = block.id;
        this.paragraphMoveBlockId = block.id;
        this.selectedObject = null;

        this.render();
        this.renderSelection();
        this.saveUndoStateIfChanged();
        return true;
      }

      startParagraphBlockReorderDragCandidate(event) {
        if (
          event.button !== 0 ||
          event.defaultPrevented ||
          this.resizeDrag ||
          this.inlineObjectDrag ||
          !this.paragraphMoveBlockId
        ) {
          return;
        }

        if (event.target.closest(".wordex-resize-overlay, .toolbar, .wordex-resize-handle")) {
          return;
        }

        const wrapper = event.target.closest(".paragraph-block");

        if (!wrapper || wrapper.dataset.blockId !== this.paragraphMoveBlockId) {
          return;
        }

        const regionElement = wrapper.closest(".region");

        if (!regionElement) {
          return;
        }

        event.preventDefault();

        this.paragraphBlockReorderDrag = {
          region: regionElement.dataset.region,
          blockId: this.paragraphMoveBlockId,
          started: false,
          startClientX: event.clientX,
          startClientY: event.clientY
        };
      }

      handleParagraphBlockReorderDragMove(event) {
        const drag = this.paragraphBlockReorderDrag;

        if (!drag) {
          return;
        }

        const dx = event.clientX - drag.startClientX;
        const dy = event.clientY - drag.startClientY;

        if (!drag.started) {
          if (Math.hypot(dx, dy) < 5) {
            return;
          }

          drag.started = true;
          document.body.classList.add("wordex-paragraph-block-dragging");
        }

        event.preventDefault();
        this.showParagraphBlockDropIndicator(drag.region, event.clientY, drag.blockId);
      }

      finishParagraphBlockReorderDrag(event) {
        const drag = this.paragraphBlockReorderDrag;

        if (!drag) {
          return;
        }

        this.paragraphBlockReorderDrag = null;
        document.body.classList.remove("wordex-paragraph-block-dragging");
        this.removeParagraphBlockDropIndicator();

        if (!drag.started) {
          return;
        }

        const targetIndex = this.computeParagraphBlockDropIndex(
          drag.region,
          drag.blockId,
          event.clientY
        );

        if (targetIndex >= 0) {
          this.moveBlockToIndex(drag.region, drag.blockId, targetIndex);
        }

        this.paragraphBlockReorderSuppressClickClear = true;
        window.setTimeout(() => {
          this.paragraphBlockReorderSuppressClickClear = false;
        }, 0);

        event?.preventDefault?.();
        event?.stopPropagation?.();
      }

      startInlineObjectMouseDragCandidate(event) {
        if (event.button !== 0 || this.resizeDrag) {
          return;
        }

        if (this.paragraphMoveBlockId) {
          return;
        }

        if (event.target.closest(".wordex-resize-overlay, .toolbar, .wordex-resize-handle")) {
          return;
        }

        const object = event.target.closest(WordexEditor.objectSelector);
        if (!object || !this.documentElement.contains(object)) {
          return;
        }

        const dragContext = this.getObjectDragContainer(object);
        if (!dragContext) {
          return;
        }

        const isTableWholeDrag =
          this.isWordexTableObject(object) &&
          this.selectedObject === object &&
          this.selectedTableMode === "table";

        /*
          O mousedown do parágrafo chama preventDefault() para manter a seleção
          da tabela inteira; isso não pode bloquear o início do arrasto livre.
        */
        if (event.defaultPrevented && !isTableWholeDrag) {
          return;
        }

        /*
          Tabelas continuam usando Ctrl+click para alternar seleção de tabela,
          linha, coluna e célula. O arrasto da tabela inteira só começa no modo
          table; célula, linha e coluna são fixos para edição/redimensionamento
          parcial (linha/coluna), mas a célula em si não move nem redimensiona.
        */
        if (this.isWordexTableObject(object) && this.selectedObject !== object) {
          return;
        }

        if (
          this.isWordexTableObject(object) &&
          this.selectedTableMode !== "table"
        ) {
          return;
        }

        /*
          Textbox só se move livremente depois de selecionado como objeto (Ctrl+click).
          Clique normal continua reservado para editar o texto interno.
        */
        if (object.matches(".wordex-textbox") && this.selectedObject !== object) {
          return;
        }

        this.inlineObjectDrag = {
          object,
          mode: dragContext.mode,
          container: dragContext.container,
          started: false,
          adjustBottomGap: this.isPrimaryModifierPressed(event) &&
            dragContext.container.matches(".paragraph, .wordex-sub-paragraph"),
          startClientX: event.clientX,
          startClientY: event.clientY,
          startOffsetX: 0,
          startOffsetY: 0,
          startBottomGap: 0
        };
      }

      handleInlineObjectMouseDragMove(event) {
        const drag = this.inlineObjectDrag;
        if (!drag) return;

        if (!this.isInDocument(drag.object) || !this.isInDocument(drag.container)) {
          this.finishInlineObjectMouseDrag(event);
          return;
        }

        const dx = event.clientX - drag.startClientX;
        const dy = event.clientY - drag.startClientY;

        if (!drag.started) {
          if (Math.hypot(dx, dy) < 5) {
            return;
          }

          drag.started = true;
          document.body.classList.add("wordex-object-dragging");
          drag.object.classList.add("wordex-inline-object-dragging");
          this.selectObject(drag.object);
          this.prepareObjectForFreeDrag(drag.object, drag.container);
          drag.startOffsetX = this.getObjectVisualXInsideBlock(drag.object, drag.container);
          drag.startOffsetY = this.getObjectVisualYInsideBlock(drag.object, drag.container);
          drag.startBottomGap = this.getObjectBottomGap(drag.object);
        }

        event.preventDefault();

        if (drag.adjustBottomGap) {
          this.applyObjectFreePosition(
            drag.object,
            drag.container,
            drag.startOffsetX + dx,
            drag.startOffsetY,
            drag.startBottomGap + dy
          );
        } else {
          this.applyObjectFreePosition(
            drag.object,
            drag.container,
            drag.startOffsetX + dx,
            drag.startOffsetY + dy
          );
        }

        this.updateFreeContainerBounds(drag.container);
        this.clampObjectInsideContainer(drag.object, drag.container);
        this.keepObjectSelected(drag.object);
      }

      finishInlineObjectMouseDrag(event) {
        const drag = this.inlineObjectDrag;
        if (!drag) return;

        this.inlineObjectDrag = null;
        document.body.classList.remove("wordex-object-dragging");

        if (!this.isInDocument(drag.object)) {
          return;
        }

        drag.object.classList.remove("wordex-inline-object-dragging");

        if (drag.started) {
          this.clampObjectInsideContainer(drag.object, drag.container);
          this.updateFreeContainerBounds(drag.container);
          this.syncObjectPositionInContainer(drag.object, drag.container, drag.mode);
          this.syncObjectAfterChangeAndKeepSelected(drag.object);
          this.inlineObjectDragSuppressClickClear = true;
          window.setTimeout(() => {
            this.inlineObjectDragSuppressClickClear = false;
          }, 0);
          event?.preventDefault?.();
        }
      }


      handleFreeObjectKeyboard(event) {
        const arrows = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"];
        if (!arrows.includes(event.key)) return;

        /*
          Setas comuns ficam para navegação normal.
          Movimentação de objetos/blocos só com Ctrl + seta.
        */
        if (!event.ctrlKey) return;

        /*
          Se houver imagem/tabela selecionada, ela tem prioridade.
        */
        if (this.selectedObject) {
          const paragraph = this.selectedObject.closest(".paragraph");
          const objectBlock = this.selectedObject.closest(".object-block");

          if (!paragraph && !objectBlock) return;

          event.preventDefault();

          const step = event.shiftKey ? 80 : 24;

          /*
            Se o objeto está dentro de um parágrafo e o usuário usa Ctrl+seta,
            assumimos que ele quer movimentação livre dentro do texto.
            Então convertemos o alinhamento para "free" automaticamente.
          */
          if (paragraph) {
            const dragContext = this.getObjectDragContainer(this.selectedObject);
            const container = dragContext?.container || paragraph;
            const currentX = this.getObjectVisualXInsideBlock(this.selectedObject, container);
            const currentY = this.getObjectVisualYInsideBlock(this.selectedObject, container);
            const currentBottomGap = this.getObjectBottomGap(this.selectedObject);
            const adjustBottomGap = event.shiftKey;

            if (event.key === "ArrowLeft") {
              this.applyObjectFreePosition(this.selectedObject, container, currentX - step, currentY);
            } else if (event.key === "ArrowRight") {
              this.applyObjectFreePosition(this.selectedObject, container, currentX + step, currentY);
            } else if (event.key === "ArrowUp") {
              if (adjustBottomGap) {
                this.applyObjectFreePosition(
                  this.selectedObject,
                  container,
                  currentX,
                  currentY,
                  currentBottomGap - step
                );
              } else {
                this.applyObjectFreePosition(this.selectedObject, container, currentX, currentY - step);
              }
            } else if (event.key === "ArrowDown") {
              if (adjustBottomGap) {
                this.applyObjectFreePosition(
                  this.selectedObject,
                  container,
                  currentX,
                  currentY,
                  currentBottomGap + step
                );
              } else {
                this.applyObjectFreePosition(this.selectedObject, container, currentX, currentY + step);
              }
            }

            this.clampObjectInsideContainer(this.selectedObject, container);
            this.updateFreeContainerBounds(container);
            this.syncParagraphElement(paragraph);
            this.keepObjectSelected(this.selectedObject);
            return;
          }

          if (objectBlock) {
            if (event.key === "ArrowLeft") {
              this.moveStandaloneObjectHorizontally(-step);
            } else if (event.key === "ArrowRight") {
              this.moveStandaloneObjectHorizontally(step);
            } else if (event.key === "ArrowUp") {
              this.moveObjectBlockVertically("up");
            } else if (event.key === "ArrowDown") {
              this.moveObjectBlockVertically("down");
            }

            return;
          }
        }

      }

      moveStandaloneObjectHorizontally(delta) {
        const object = this.selectedObject;
        if (!object) return;

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const currentX = this.getObjectVisualXInsideBlock(object, wrapper);
        const currentY = this.getObjectVisualYInsideBlock(object, wrapper);

        this.applyObjectFreePosition(object, wrapper, currentX + delta, currentY);
        this.updateFreeContainerBounds(wrapper);
        this.syncStandaloneObjectFromDom(object);
        this.keepObjectSelected(object);
      }

      clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }


      moveObjectBlockVertically(direction) {
        const object = this.selectedObject;
        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          const currentBlock = paragraph.closest(".paragraph-block");
          const targetBlock = direction === "up"
            ? currentBlock.previousElementSibling
            : currentBlock.nextElementSibling;

          if (!targetBlock || !targetBlock.classList.contains("paragraph-block")) return;

          const targetParagraph = targetBlock.querySelector(".paragraph");
          if (!targetParagraph) return;

          object.classList.remove("selected-object");
          object.remove();

          if (direction === "up") {
            targetParagraph.appendChild(object);
          } else {
            targetParagraph.insertBefore(object, targetParagraph.firstChild);
          }

          this.syncParagraphElement(paragraph);
          this.syncParagraphElement(targetParagraph);
          this.keepObjectSelected(object);
          return;
        }

        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const region = wrapper.closest(".region");
        const blocks = this.wordexDocument[region.dataset.region];
        const index = blocks.findIndex(block => block.id === wrapper.dataset.blockId);
        const newIndex = direction === "up" ? index - 1 : index + 1;

        if (index < 0 || newIndex < 0 || newIndex >= blocks.length) return;

        const [block] = blocks.splice(index, 1);
        blocks.splice(newIndex, 0, block);

        this.selectedBlockId = block.id;
        this.render();

        const rendered = this.documentElement.querySelector(
          `.object-block[data-block-id="${block.id}"] .dynamic-image-box, .object-block[data-block-id="${block.id}"] .wordex-table`
        );

        if (rendered) this.selectObject(rendered);
      }





      keepObjectSelected(object) {
        if (!object) return;

        this.selectObject(object);

        const selection = window.getSelection();
        if (selection) {
          selection.removeAllRanges();
        }

        /*
          Alguns elementos, especialmente tabela com células editáveis,
          fazem o navegador tentar devolver o foco ao texto/célula após a movimentação.
          Este reforço mantém o objeto selecionado visualmente e logicamente.
        */
        setTimeout(() => {
          if (!this.documentElement.contains(object)) return;

          this.selectedObject = object;

          const paragraph = object.closest(".paragraph");
          const block = object.closest(".paragraph-block, .object-block");
          const region = object.closest(".region");

          if (region) {
            this.selected.region = region.dataset.region;
          }

          if (paragraph) {
            this.selectedParagraphId = paragraph.dataset.blockId;
            this.selectedBlockId = paragraph.dataset.blockId;
          } else if (block) {
            this.selectedParagraphId = null;
            this.selectedBlockId = block.dataset.blockId;
          }

          this.renderSelection();
        }, 0);
      }


      deleteSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, histograma, textbox ou tabela.");
          return;
        }

        /*
          Proteção: célula selecionada deixa a tabela dona da célula como objeto
          selecionado. Essa seleção é operacional; não deve apagar a tabela.
        */
        const selection = window.getSelection();
        const range = selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

        const activeCell =
          this.getTableCellFromRange(range) ||
          this.selectedCell;

        const selectedCellTable = activeCell?.closest?.(".wordex-table") || null;

        if (selectedCellTable && this.selectedObject === selectedCellTable) {
          return;
        }

        const paragraph = this.selectedObject.closest(".paragraph");
        const objectBlock = this.selectedObject.closest(".object-block");

        if (paragraph) {
          this.selectedObject.remove();
          this.selectedObject = null;
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          return;
        }

        if (objectBlock) {
          this.deleteBlock(this.selected.region, objectBlock.dataset.blockId);
        }
      }

      deleteBlock(region, blockId) {
        const blocks = this.wordexDocument[region];
        const index = blocks.findIndex(block => block.id === blockId);

        if (index >= 0) {
          blocks.splice(index, 1);
        }

        this.ensureRequiredParagraphs();

        this.clearSelection();
        this.render();
      }

      syncObjectDomState(object) {
        if (!object) {
          return false;
        }

        const paragraph = object.closest(".paragraph");

        if (paragraph) {
          this.syncParagraphElement(paragraph);
          return true;
        }

        if (object.closest(".object-block")) {
          this.syncStandaloneObjectFromDom(object);
          return true;
        }

        return false;
      }

      syncObjectAfterChange(object) {
        if (this.syncObjectDomState(object)) {
          const paragraph = object.closest(".paragraph");

          if (
            paragraph &&
            object.matches?.(WordexEditor.mainObjectSelector) &&
            this.paragraphHasMainObject(paragraph)
          ) {
            this.scheduleFitParagraphBlockToMainObject(object);
          }

          if (!this.deferFormattingUndo) {
            this.saveUndoStateIfChanged();
          }
        }
      }

      syncObjectAfterChangeAndKeepSelected(object) {
        this.syncObjectAfterChange(object);
        this.keepObjectSelected(object);
      }

      migrateParagraphMarginsToWrapper(paragraphElement, wrapper) {
        if (!paragraphElement || !wrapper) return;

        ["marginTop", "marginRight", "marginBottom", "marginLeft"].forEach(property => {
          const value = paragraphElement.style[property];

          if (!value) return;

          if (!wrapper.style[property]) {
            wrapper.style[property] = value;
          }

          paragraphElement.style[property] = "";
        });
      }

      syncParagraphElement(paragraphElement) {
        if (!paragraphElement) return;

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (!block) return;

        this.normalizeParagraphBlock(block);
        block.style = block.style || {};

        const wrapper = paragraphElement.closest(".paragraph-block");

        if (wrapper) {
          this.migrateParagraphMarginsToWrapper(paragraphElement, wrapper);
          block.style.marginTop = wrapper.style.marginTop || "";
          block.style.marginRight = wrapper.style.marginRight || "";
          block.style.marginBottom = wrapper.style.marginBottom || "";
          block.style.marginLeft = wrapper.style.marginLeft || "";
        }

        this.syncParagraphContainerStyleToBlock(paragraphElement, block);

        const subElements = this.getParagraphDirectSubParagraphElements(paragraphElement);

        if (subElements.length === 0) {
          const fallbackHtml = this.getCleanInnerHtml(paragraphElement);
          block.subParagraphs = [
            this.createSubParagraph(
              this.isParagraphVisuallyEmptyHtml(fallbackHtml) ? "" : fallbackHtml,
              {
                ...this.extractSubParagraphStyleFromElement(paragraphElement),
                width: "100%"
              }
            )
          ];
        } else {
          subElements.forEach((subElement, index) => {
            let subBlock = block.subParagraphs[index];

            if (!subBlock) {
              subBlock = this.createSubParagraph("");
              block.subParagraphs[index] = subBlock;
            }

            const html = this.getCleanSubParagraphHtml(subElement);
            subBlock.html = this.isParagraphVisuallyEmptyHtml(html) ? "" : html;
            subBlock.style = {
              ...this.getDefaultSubParagraphStyle(),
              ...this.extractSubParagraphStyleFromElement(subElement)
            };
          });

          block.subParagraphs.length = subElements.length;
        }

        this.ensureSubParagraphWidthsInBlock(block);
        this.ensureParagraphDomHasSubParagraphs(paragraphElement);
        this.applySubParagraphLayoutFromBlock(paragraphElement, block);
        this.applyParagraphContainerElementStyles(paragraphElement, block.style);
        this.syncSubParagraphWidthsFromDom(paragraphElement, block);
        this.updateParagraphEmptyState(paragraphElement);
        delete block.html;
      }

      copyStandaloneAlignAndWidth(block, object) {
        block.align = object.dataset.align;
        block.width = object.style.width;
      }

      copyStandaloneBlockX(block, object) {
        block.blockX = object.dataset.blockX || "0";
        block.blockY = object.dataset.blockY || "0";
        block.blockBottomGap = object.dataset.blockBottomGap ||
          String(this.getDefaultObjectBottomGap());
      }

      syncStandaloneObjectHtml(block, object) {
        block.html = this.getCleanOuterHtml(object);
      }

      syncStandaloneObjectFromDom(object) {
        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const block = this.findBlockById(wrapper.dataset.blockId);
        if (!block) return;

        if (block.type === "dynamicImage") {
          block.fieldName = object.dataset.fieldName;
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.copyStandaloneBlockX(block, object);
          return;
        }

        if (block.type === "staticImage") {
          block.imageName = object.dataset.imageName || object.querySelector("img")?.alt || "Imagem";
          block.imageSrc = object.querySelector("img")?.getAttribute("src") || "";
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.copyStandaloneBlockX(block, object);
          return;
        }

        if (block.type === "chart") {
          block.sourceName = object.dataset.sourceName || "";
          block.chartType = object.dataset.chartType;
          block.chartData = this.readChartDataFromElement(object);
          this.copyStandaloneAlignAndWidth(block, object);
          block.height = object.style.height;
          this.syncStandaloneObjectHtml(block, object);
          return;
        }

        if (block.type === "table") {
          this.copyStandaloneAlignAndWidth(block, object);
          this.copyStandaloneBlockX(block, object);
          this.syncStandaloneObjectHtml(block, object);
        }
      }

      getCleanInnerHtml(paragraphElement) {
        /*
          Tabelas (contenteditable=false dentro do parágrafo) por vezes não entram
          de forma fiável no innerHTML do clone. Imagem/histograma não têm esse problema.
        */
        if (paragraphElement.querySelector("table.wordex-table")) {
          return this.serializeParagraphInlineObjects(paragraphElement);
        }

        const clone = paragraphElement.cloneNode(true);
        this.clearObjectSelectionMarks(clone);
        this.normalizeDynamicImageBoxesForSave(clone);
        return clone.innerHTML;
      }

      serializeParagraphInlineObjects(paragraphElement) {
        const parts = [];

        paragraphElement.childNodes.forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            parts.push(child.textContent);
            return;
          }

          if (child.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          if (child.matches(WordexEditor.objectSelector)) {
            parts.push(this.getCleanOuterHtml(child));
            return;
          }

          if (child.tagName === "BR") {
            parts.push("<br>");
            return;
          }

          parts.push(child.outerHTML);
        });

        return parts.join("");
      }

      getCleanOuterHtml(element) {
        const clone = element.cloneNode(true);
        this.normalizeLegacyTableFooterRows(clone);
        this.clearObjectSelectionMarks(clone);
        this.normalizeDynamicImageBoxesForSave(clone);
        return clone.outerHTML;
      }

      saveSelectionIfInsideParagraph() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const paragraphElement = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraphElement) return;

        const previousObject = this.selectedObject;
        const previousRegion = this.selected.region;
        const regionElement = paragraphElement.closest(".region");

        if (regionElement?.dataset?.region) {
          this.selected.region = regionElement.dataset.region;
        }

        /*
          A célula deve ser determinada pelo caret real, não pelo parágrafo.
          A tabela fica dentro do parágrafo, então paragraphElement.closest("td")
          sempre seria falso e limparia selectedCell durante a digitação.
        */
        const activeCell = this.getTableCellFromRange(range);

        if (activeCell) {
          const table = activeCell.closest(".wordex-table");

          this.selectedCell = activeCell;
          this.selectedTableRow = activeCell.parentElement;
          this.selectedTableColumnIndex = activeCell.parentElement
            ? this.getCellLogicalColumnIndex(activeCell.parentElement, activeCell)
            : null;

          if (this.isTableComponentSelectionActive(table)) {
            this.macroPickerActiveTable = table;
          } else {
            this.selectedObject = null;
            this.clearTableComponentSelectionState();
            this.macroPickerActiveTable = table;
          }
        } else {
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;

          if (this.selectedObject?.matches?.(".wordex-table")) {
            const keepTableSelection =
              this.selectedTableMode === "table" ||
              this.selectedTableMode === "row" ||
              this.selectedTableMode === "column";

            if (!keepTableSelection) {
              this.selectedObject = null;
            }
          }

          if (!document.activeElement?.closest?.(".toolbar")) {
            if (this.selectedObject?.matches?.(".wordex-table")) {
              this.macroPickerActiveTable = this.selectedObject;
            } else {
              this.macroPickerActiveTable = null;
            }
          }
        }

        if (
          this.selectedObject?.matches?.(".dynamic-image-box") &&
          !this.shouldDeferObjectSelectionSyncFromCaret()
        ) {
          const range = selection.getRangeAt(0);
          const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;
          const focusInImage =
            document.activeElement?.closest?.(".dynamic-image-box") === this.selectedObject;

          if (!focusInImage && (!element || !this.selectedObject.contains(element))) {
            this.selectedObject = null;
          }
        }

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;

        const subFromCaret = this.findSubParagraphElementFromNode(range.commonAncestorContainer);

        if (
          subFromCaret &&
          paragraphElement.contains(subFromCaret) &&
          !this.paragraphContainerSelected &&
          !this.shouldDeferObjectSelectionSyncFromCaret()
        ) {
          this.selectedSubParagraphId = subFromCaret.dataset.subParagraphId;
        } else if (!this.paragraphContainerSelected && this.selectedSubParagraphId) {
          const selectedSub = paragraphElement.querySelector(
            `${WordexEditor.subParagraphSelector}[data-sub-paragraph-id="${this.selectedSubParagraphId}"]`
          );

          if (!selectedSub) {
            const firstSub = this.getParagraphDirectSubParagraphElements(paragraphElement)[0];
            this.selectedSubParagraphId = firstSub?.dataset?.subParagraphId || null;
          }
        }

        this.savedRange = range.cloneRange();

        if (!this.getTextboxFromRange(range)) {
          this.verticalAlignTargetTextbox = null;
        }

        const nextTable = this.getActiveTableForMacroContext();
        const jsonToolbarNeedsUpdate =
          this.selectedObject !== previousObject ||
          nextTable !== this.macroPickerActiveTable ||
          this.selected.region !== previousRegion;

        if (jsonToolbarNeedsUpdate) {
          this.macroPickerActiveTable = nextTable;
          this.updateJsonMacroToolbar();
        }
      }

      findParagraphElementFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        return element.closest(".paragraph");
      }

      placeCaretAtStart(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEnd(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEndIfNoSelection(element) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          this.placeCaretAtEnd(element);
          return;
        }

        const range = selection.getRangeAt(0);

        if (!element.contains(range.commonAncestorContainer)) {
          this.placeCaretAtEnd(element);
        }
      }

      normalizeAllObjectsIntoParagraphs() {
        ["headerTemplate", "bodyFlow", "footerTemplate"].forEach(region => {
          this.wordexDocument[region] = this.wordexDocument[region].map(block => {
            if (block.type === "paragraph") {
              return this.normalizeParagraphBlock(block);
            }

            return this.convertObjectBlockToParagraph(block);
          });
        });
      }

      convertObjectBlockToParagraph(block) {
        let html = "";

        if (block.type === "dynamicImage") {
          const image = this.createDynamicImageElement(
            block.fieldName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "staticImage") {
          const image = this.createStaticImageElement(
            block.imageSrc || "",
            block.imageName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "table") {
          html = (block.html || this.createTableHtml(1, 1, block.align || "left", block.width || "80mm")) + "\u200B";
        }

        return {
          id: block.id || this.createId("paragraph"),
          type: "paragraph",
          style: this.getDefaultParagraphContainerStyle(),
          subParagraphs: [
            this.createSubParagraph(html, {
              fontFamily: "Arial",
              fontSize: "12pt",
              textAlign: "left",
              width: "100%"
            })
          ]
        };
      }

      render() {
        this.clearCurrentLineHighlight();
        this.normalizeAllObjectsIntoParagraphs();
        this.documentElement.innerHTML = "";
        this.syncDocumentTitleBar();

        this.injectContinuousWatermarkPreview(
          this.documentElement,
          this.getGeneratedWatermarkSettings(),
          "wordex-editor-watermark"
        );

        const pageShell = document.createElement("div");
        pageShell.className = "document-page-shell";

        const headerSlot = this.createDocumentRegionSlot(
          "document-page-header",
          "Header",
          this.renderRegion("headerTemplate", "header-template", "Modelo de cabeçalho")
        );

        const bodySlot = this.createDocumentRegionSlot(
          "document-page-body",
          "Body",
          this.renderRegion("bodyFlow", "body-flow", "Corpo contínuo")
        );

        const footerSlot = this.createDocumentRegionSlot(
          "document-page-footer",
          "Footer",
          this.renderRegion("footerTemplate", "footer-template", "Modelo de rodapé")
        );

        pageShell.appendChild(headerSlot);
        pageShell.appendChild(bodySlot);
        pageShell.appendChild(footerSlot);
        this.documentElement.appendChild(pageShell);

        if (this.selected.region === "bodyFlow") {
          this.ensureParagraphSelection();
        }

        this.renderSelection();

        if (!this.isInsertingObject) {
          this.updateJsonMacroToolbar();
          this.saveUndoStateIfChanged();
        } else {
          this.updateToolbarContext();
        }

        if (this.getReportDataRootRecord()) {
          this.previewDynamicImagesInDocument().catch(() => {});
        }

        this.wireDocumentEditableSurfaceEvents(this.documentElement);
      }

      refreshTableRowTypeLabels(container) {
        if (!container) return;

        container.querySelectorAll(".wordex-table").forEach(table => {
          Array.from(table.rows).forEach(row => {
            const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

            if (rowType) {
              row.dataset.wordexRowType = rowType;
              this.normalizeTableRowColumnsForType(table, row, rowType);
            }

            this.updateTableRowTypeLabel(row);
          });
        });
      }

      createDocumentRegionSlot(slotClass, labelText, regionElement) {
        const slot = document.createElement("div");
        slot.className = slotClass;

        const label = document.createElement("div");
        label.className = "wordex-region-slot-label";
        label.textContent = labelText;
        slot.appendChild(label);
        slot.appendChild(regionElement);

        return slot;
      }

      renderRegion(region, cssClass, emptyText) {
        const regionElement = document.createElement("section");
        regionElement.className = "region " + cssClass;
        regionElement.dataset.region = region;

        if (this.wordexDocument[region].length === 0) {
          regionElement.classList.add("is-empty");
        }

        regionElement.addEventListener("click", event => {
          event.stopPropagation();

          if (event.target === regionElement || event.target.classList.contains("empty")) {
            this.selectRegion(region);
          }
        });

        const blocks = this.wordexDocument[region];

        if (blocks.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = emptyText + " vazio";
          regionElement.appendChild(empty);
        }

        blocks.forEach(block => {
          if (block.type !== "paragraph") {
            block = this.convertObjectBlockToParagraph(block);
          }

          regionElement.appendChild(this.renderParagraphBlock(region, block));
        });

        return regionElement;
      }

      renderParagraphBlock(region, block) {
        this.normalizeParagraphBlock(block);

        const wrapper = document.createElement("div");
        wrapper.className = "paragraph-block";
        wrapper.dataset.blockId = block.id;

        const blockStyle = block.style || {};
        wrapper.style.marginTop = blockStyle.marginTop || "";
        wrapper.style.marginRight = blockStyle.marginRight || "";
        wrapper.style.marginBottom = blockStyle.marginBottom || "";
        wrapper.style.marginLeft = blockStyle.marginLeft || "";

        wrapper.addEventListener("click", event => {
          if (this.handleTableOrObjectClick(event, wrapper, {
            stopPropagationAtStart: true
          })) {
            return;
          }

          if (this.isPrimaryModifierPressed(event)) {
            event.preventDefault();
            this.selectParagraphBlockForMove(region, block.id);
            return;
          }

          this.clearParagraphBlockMoveSelection();

          const sub = event.target.closest(WordexEditor.subParagraphSelector);

          if (sub) {
            this.selectSubParagraph(region, block.id, sub.dataset.subParagraphId);
            return;
          }

          this.selectSubParagraph(region, block.id, block.subParagraphs[0]?.id);
        });

        const paragraph = document.createElement("div");
        paragraph.className = "paragraph";
        paragraph.contentEditable = "false";
        paragraph.dataset.blockId = block.id;
        paragraph.dataset.emptyText = "Parágrafo vazio";
        this.applyParagraphContainerElementStyles(paragraph, blockStyle);

        block.subParagraphs.forEach(sub => {
          const subElement = document.createElement("div");
          subElement.className = "wordex-sub-paragraph";
          subElement.dataset.subParagraphId = sub.id;
          subElement.dataset.emptyText = "Subparágrafo vazio";
          subElement.innerHTML = sub.html || "";
          const subStyle = { ...sub.style };

          if (block.subParagraphs.length === 1) {
            subStyle.width = "100%";
          }

          this.applySubParagraphElementStyles(subElement, subStyle);
          subElement.contentEditable = "true";
          subElement.classList.toggle(
            "is-empty",
            this.isParagraphVisuallyEmptyHtml(sub.html)
          );
          paragraph.appendChild(subElement);
        });

        this.ensureParagraphDomHasSubParagraphs(paragraph);

        this.configureParagraphEditingSurface(paragraph);

        this.refreshTableRowTypeLabels(paragraph);

        requestAnimationFrame(() => {
          paragraph.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            this.limitObjectWidthToParagraph(object);
          });

          paragraph.querySelectorAll(".wordex-chart-box").forEach(chartBox => {
            this.migrateChartTextStyleFromInline(chartBox);
            this.hydrateChartBoxFromSavedHtml(chartBox);
          });

          this.normalizeFreeObjectsInContainer(paragraph);
          this.reapplyParagraphTextboxVerticalAligns(paragraph);
          this.wireDocumentEditableSurfaceEvents(paragraph);
          this.updateParagraphSubParagraphHeightsFromContent(paragraph);
          this.syncParagraphElement(paragraph);

          const mainObjects = paragraph.querySelectorAll(WordexEditor.mainObjectSelector);

          if (mainObjects.length === 1) {
            this.scheduleFitParagraphBlockToMainObject(mainObjects[0]);
          }
        });

        paragraph.addEventListener("mousedown", event => {
          const cell = event.target.closest("td");
          const table = event.target.closest(".wordex-table");

          if (cell && table && table.closest(".paragraph") === paragraph) {
            paragraph.dataset.wordexFocusFromTable = "1";

            if (!this.isPrimaryModifierPressed(event) && !event.shiftKey) {
              if (
                this.selectedObject !== table ||
                this.selectedTableMode !== "table"
              ) {
                event.preventDefault();
                this.prepareTableCellForEditing(cell);
              }
            }

            return;
          }

          paragraph.dataset.wordexFocusFromTable = table ? "1" : "";
        }, true);

        paragraph.addEventListener("click", event => {
          if (this.handleTableOrObjectClick(event, paragraph, {
            stopPropagationOnCell: true,
            stopPropagationOnObjectModifier: true
          })) {
            return;
          }

          if (this.isPrimaryModifierPressed(event)) {
            event.preventDefault();
            event.stopPropagation();
            this.selectParagraphContainer(region, block.id);
            return;
          }

          this.clearParagraphBlockMoveSelection();

          const textbox = event.target.closest(".wordex-textbox");
          const sub = event.target.closest(WordexEditor.subParagraphSelector);

          if (textbox) {
            if (sub) {
              this.selectSubParagraph(region, block.id, sub.dataset.subParagraphId);
            }

            this.activateTextboxEditing(textbox);
            textbox.focus();
            this.saveSelectionIfInsideParagraph();
            return;
          }

          if (sub) {
            this.selectSubParagraph(region, block.id, sub.dataset.subParagraphId);

            const selection = window.getSelection();
            const caretAlreadyInSub =
              selection?.rangeCount &&
              sub.contains(selection.getRangeAt(0).commonAncestorContainer);

            if (caretAlreadyInSub) {
              sub.focus({ preventScroll: true });
            } else {
              this.focusEditableSubParagraph(sub, "end");
            }

            requestAnimationFrame(() => this.updateCurrentLineHighlight());
          } else {
            this.selectSubParagraph(region, block.id, block.subParagraphs[0]?.id);
          }

          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("keyup", event => {
          const scopeSubParagraph = event.target.closest(WordexEditor.subParagraphSelector);
          this.refreshParagraphSubParagraphHeightsDuringTyping(paragraph, scopeSubParagraph);
          this.updateParagraphEmptyState(paragraph);
          this.saveSelectionIfInsideParagraph();
          this.syncParagraphElement(paragraph);
        });

        paragraph.addEventListener("mouseup", () => {
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("input", event => {
          const scopeSubParagraph = event.target.closest(WordexEditor.subParagraphSelector);
          this.refreshParagraphSubParagraphHeightsDuringTyping(paragraph, scopeSubParagraph);
          this.updateParagraphEmptyState(paragraph);
          this.syncParagraphElement(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        wrapper.appendChild(paragraph);

        return wrapper;
      }

      isInDocument(node) {
        return !!(node && this.documentElement.contains(node));
      }

      clearObjectSelectionMarks(container) {
        if (!container) return;

        container.querySelectorAll(".wordex-resize-overlay").forEach(element => element.remove());

        container.querySelectorAll(WordexEditor.objectSelectionSelector).forEach(element => {
          element.classList.remove(...WordexEditor.objectSelectionClasses);
        });
      }

      clearEditorSelectionMarks(container) {
        if (!container) return;

        container.querySelectorAll(WordexEditor.editorSelectionSelector).forEach(element => {
          element.classList.remove(...WordexEditor.editorSelectionClasses);
        });
      }

      applyObjectSelectionMarks() {
        if (this.isInDocument(this.selectedObject)) {
          const isTableComponentSelection =
            this.isWordexTableObject(this.selectedObject) &&
            this.selectedTableMode &&
            this.selectedTableMode !== "table";

          if (!isTableComponentSelection) {
            this.selectedObject.classList.add("selected-object");
          }
        }

        const table = this.selectedObject?.matches?.(".wordex-table")
          ? this.selectedObject
          : null;

        if (this.selectedTableMode === "cell") {
          this.getSelectedTableCells().forEach(cell => {
            if (this.isInDocument(cell)) {
              cell.classList.add("selected-cell");
            }
          });
        }

        if (this.selectedTableMode === "row" && table) {
          this.getSelectedTableRowIndices().forEach(rowIndex => {
            const row = table.rows[rowIndex];

            if (!row) {
              return;
            }

            Array.from(row.cells).forEach(cell => {
              cell.classList.add("selected-row-cell");
            });
          });
        }

        if (this.selectedTableMode === "column" && table) {
          this.getSelectedTableColumnIndices().forEach(columnIndex => {
            Array.from(table.rows).forEach(row => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                slot.cell.classList.add("selected-column-cell");
              }
            });
          });
        }
      }

      renderSelection() {
        this.documentElement.querySelectorAll(".region").forEach(regionElement => {
          regionElement.classList.toggle(
            "selected",
            regionElement.dataset.region === this.selected.region
          );
        });

        this.documentElement.querySelectorAll(".paragraph-block, .object-block").forEach(blockElement => {
          blockElement.classList.toggle(
            "selected-block",
            blockElement.dataset.blockId === this.selectedBlockId
          );
          blockElement.classList.toggle(
            "move-selected",
            blockElement.matches(".paragraph-block") &&
              blockElement.dataset.blockId === this.paragraphMoveBlockId
          );
        });

        this.documentElement.querySelectorAll(WordexEditor.subParagraphSelector).forEach(subElement => {
          subElement.classList.toggle(
            "wordex-selected-sub-paragraph",
            !this.paragraphContainerSelected &&
              !this.selectedObject &&
              subElement.dataset.subParagraphId === this.selectedSubParagraphId
          );
        });

        this.documentElement.querySelectorAll(".paragraph").forEach(paragraphElement => {
          paragraphElement.classList.toggle(
            "wordex-paragraph-container-selected",
            this.paragraphContainerSelected &&
              paragraphElement.dataset.blockId === this.selectedParagraphId
          );
        });

        this.clearObjectSelectionMarks(this.documentElement);
        this.applyObjectSelectionMarks();
        this.updateToolbarContext();
        this.updateJsonMacroToolbar();
        this.updateObjectResizeOverlay();
      }

      resizeTableRowsByTotalHeight(table, totalHeight) {
        const rows = Array.from(table.rows);
        if (rows.length === 0) return;

        const rowHeight = Math.max(18, Math.floor(totalHeight / rows.length));

        rows.forEach(row => {
          row.style.height = rowHeight + "px";

          Array.from(row.cells).forEach(cell => {
            cell.style.height = rowHeight + "px";
          });
        });
      }

      loadSavedWordexDocumentFromHtml() {
        const stateElement = document.getElementById("wordexSavedDocument");

        if (!stateElement) return;

        try {
          const state = JSON.parse(stateElement.textContent || "{}");

          if (state && state.wordexDocument) {
            this.wordexDocument = state.wordexDocument;
          } else if (state && Array.isArray(state.bodyFlow)) {
            this.wordexDocument = state;
          }

          if (state?.reportData) {
            this.reportData = state.reportData;
            this.reportDataFileName = String(state.reportDataFileName || "").trim();
          }
        } catch (error) {
          console.warn("Não foi possível carregar o documento Wordex salvo.", error);
        }
      }

      syncCurrentEditingState() {
        if (this.isRestoringUndo) {
          this.syncDocumentFromDomForUndo();
          return;
        }

        if (this.selectedObject && this.syncObjectDomState(this.selectedObject)) {
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.syncParagraphElement(paragraph);
        }
      }

      saveWordexHtml() {
        try {
          this.syncCurrentEditingState();

          const html = this.buildStandaloneWordexHtml();
          const fileName = this.getSavedWordexHtmlFileName();

          if (this.savedWordexFileHandle?.createWritable) {
            this.writeTextToFileHandle(this.savedWordexFileHandle, html).catch(() => {
              this.savedWordexFileHandle = null;
              this.promptSaveWordexHtml(html, fileName);
            });
            return;
          }

          this.promptSaveWordexHtml(html, fileName);
        } catch (error) {
          alert("Erro ao salvar Wordex HTML: " + error.message);
        }
      }

      async promptSaveWordexHtml(html, fileName) {
        try {
          await this.writeTextFilePreferred(fileName, html, "text/html;charset=utf-8");
        } catch (error) {
          if (error?.name === "AbortError") {
            return;
          }

          alert("Erro ao salvar Wordex HTML: " + error.message);
        }
      }

      canUseNativeSaveFilePicker() {
        return window.isSecureContext && typeof window.showSaveFilePicker === "function";
      }

      async writeTextFilePreferred(fileName, text, mimeType) {
        if (this.canUseNativeSaveFilePicker()) {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{
              description: "HTML Wordex",
              accept: { "text/html": [".html", ".htm"] }
            }]
          });

          await this.writeTextToFileHandle(handle, text);
          this.savedWordexFileHandle = handle;
          return true;
        }

        this.downloadTextFile(fileName, text, mimeType);
        return true;
      }

      async writeTextToFileHandle(handle, text) {
        const writable = await handle.createWritable();
        await writable.write(String(text || ""));
        await writable.close();
      }

      sanitizeSavedHtmlFileName(value) {
        const reservedNames = new Set([
          "wordex",
          "wordex.html",
          "wordexnew",
          "wordexnew.html"
        ]);

        let baseName = String(value || "").trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        baseName = baseName
          .replace(/\.html?$/i, "")
          .replace(/[\\/:*?"<>|]+/g, "_")
          .trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        return baseName + ".html";
      }

      getSavedWordexState() {
        return {
          savedAt: new Date().toISOString(),
          wordexDocument: this.wordexDocument,
          reportData: this.reportData,
          reportDataFileName: this.reportDataFileName
        };
      }

      escapeScriptTagBreakout(text) {
        return String(text || "").replace(/<\/script/gi, "<\\/script");
      }

      buildStandaloneWordexHtml() {
        const clone = document.documentElement.cloneNode(true);

        clone.querySelectorAll("#wordexSavedDocument").forEach(node => node.remove());
        this.removeObjectResizeOverlayFromClone(clone);
        clone.querySelectorAll("script").forEach(node => node.remove());

        const bootScriptHtml = this.serializeInlineScript(
          "wordexEmbeddedTemplates",
          this.buildEmbeddedTemplatesBootScript()
        );
        const stateScriptHtml = this.serializeJsonStateScript();
        const editorScriptHtml = this.serializeInlineScript("", this.getLiveWordexEditorScriptSource());

        const markup = "<!DOCTYPE html>\n" + clone.outerHTML;
        const bodyClose = markup.lastIndexOf("</body>");

        if (bodyClose < 0) {
          throw new Error("Não foi possível montar o HTML standalone.");
        }

        return (
          markup.slice(0, bodyClose) +
          bootScriptHtml +
          stateScriptHtml +
          editorScriptHtml +
          markup.slice(bodyClose)
        );
      }

      buildEmbeddedTemplatesBootScript() {
        return [
          "window.WORDEX_PAGED_TEMPLATE = " + JSON.stringify(String(window.WORDEX_PAGED_TEMPLATE || "")) + ";",
          "window.WORDEX_PDF_TEMPLATE = " + JSON.stringify(String(window.WORDEX_PDF_TEMPLATE || "")) + ";"
        ].join("\n");
      }

      serializeInlineScript(id, content) {
        const idAttr = id ? ` id="${id}"` : "";

        return `<script${idAttr}>${this.escapeScriptTagBreakout(content)}<\/script>\n`;
      }

      serializeJsonStateScript() {
        const json = JSON.stringify(this.getSavedWordexState(), null, 2);

        return `<script id="wordexSavedDocument" type="application/json">${this.escapeScriptTagBreakout(json)}<\/script>\n`;
      }

      getLiveWordexEditorScriptSource() {
        const editorScript = Array.from(document.body?.querySelectorAll("script:not([src])") || []).find(script => {
          return script.id !== "wordexSavedDocument" &&
            script.id !== "wordexEmbeddedTemplates" &&
            script.type !== "application/json" &&
            String(script.textContent || "").includes("class WordexEditor");
        });

        if (!editorScript) {
          throw new Error("Script principal do WordexEditor não encontrado na página.");
        }

        let source = String(editorScript.textContent || "").trim();

        if (!/\bwindow\.wordex\s*=/.test(source)) {
          source += /\b(const|let|var)\s+wordex\s*=/.test(source)
            ? "\nwindow.wordex = wordex;"
            : '\nconst wordex = new WordexEditor("document");\nwindow.wordex = wordex;';
        }

        return source;
      }

      getSavedWordexHtmlFileName() {
        return this.sanitizeSavedHtmlFileName(document.title || "Relatorio");
      }

      getSuggestedReportBaseName() {
        return this.sanitizeSavedHtmlFileName(document.title || "Relatorio").replace(/\.html$/i, "");
      }

      getSuggestedReportPdfFileName() {
        return this.getSuggestedReportBaseName() + ".pdf";
      }

      openBlobContent(content, options = {}) {
        const mimeType = options.mimeType || "text/plain;charset=utf-8";
        const blob = content instanceof Blob
          ? content
          : new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const revokeMs = Number(options.revokeMs) > 0 ? Number(options.revokeMs) : 1000;

        if (options.download) {
          const link = document.createElement("a");
          link.href = url;
          link.download = options.download;
          document.body.appendChild(link);
          link.click();
          link.remove();
        } else {
          const opened = window.open(url, options.target || "_blank");

          if (!opened) {
            const link = document.createElement("a");
            link.href = url;
            link.target = options.target || "_blank";
            document.body.appendChild(link);
            link.click();
            link.remove();
          }
        }

        setTimeout(() => URL.revokeObjectURL(url), revokeMs);
      }

      downloadTextFile(fileName, text, mimeType) {
        this.openBlobContent(text, {
          mimeType: mimeType || "text/plain;charset=utf-8",
          download: fileName,
          revokeMs: 1000
        });
      }

      generateHtmlFromJson() {
        this.generateHtmlFromJsonAsync().catch(error => {
          alert("Erro ao montar HTML: " + error.message);
        });
      }

      async generateHtmlFromJsonAsync() {
        this.syncCurrentEditingState();
        await this.prefetchReportImageDataUrls(this.reportData);

        const html = this.buildGeneratedReportHtml(this.reportData);
        this.openGeneratedHtmlInNewTab(html);
      }

      collectImageUrlsFromReportValue(value, urls) {
        if (this.isTypedFieldValue(value) && String(value.Kind || "").toLowerCase() === "image") {
          const imageUrl = String(value.Value || "").trim();

          if (this.looksLikeImageSource(imageUrl) && !/^data:/i.test(imageUrl) && !this.looksLikeRawBase64Image(imageUrl)) {
            urls.add(imageUrl);
          }

          return;
        }

        if (Array.isArray(value)) {
          value.forEach(item => this.collectImageUrlsFromReportValue(item, urls));
          return;
        }

        if (value && typeof value === "object") {
          Object.values(value).forEach(item => this.collectImageUrlsFromReportValue(item, urls));
        }
      }

      looksLikeRawBase64Image(value) {
        const text = String(value || "").trim().replace(/\s+/g, "");

        if (text.length < 32) {
          return false;
        }

        if (/^data:/i.test(text) || /^https?:\/\//i.test(text) || /^blob:/i.test(text)) {
          return false;
        }

        return /^[A-Za-z0-9+/=]+$/.test(text) && text.length % 4 === 0;
      }

      guessBase64ImageMime(base64) {
        const value = String(base64 || "").trim().replace(/\s+/g, "");

        if (value.startsWith("iVBORw0KG")) {
          return "image/png";
        }

        if (value.startsWith("/9j/")) {
          return "image/jpeg";
        }

        if (value.startsWith("R0lGOD")) {
          return "image/gif";
        }

        if (value.startsWith("UklGR")) {
          return "image/webp";
        }
