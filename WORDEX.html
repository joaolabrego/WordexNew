        const previousValue = fieldSelect.value;
        const fields = this.getMacroFieldsForCollection(collectionName, options);
        const includeSystemMacros = !!options?.includeSystemMacros;
        const selectableValues = [];

        fieldSelect.innerHTML = `<option value="">${mode === "chart" ? "Histograma" : "Campo"}</option>`;

        if (includeSystemMacros) {
          WordexEditor.getSystemMacroFieldDefinitions().forEach(definition => {
            const option = document.createElement("option");

            option.value = definition.value;
            option.textContent = definition.label;
            fieldSelect.appendChild(option);
            selectableValues.push(definition.value);
          });
        }

        fields.forEach(fieldName => {
          const option = document.createElement("option");

          option.value = fieldName;
          option.textContent = mode === "chart"
            ? `${fieldName} (histograma)`
            : (sample ? this.formatMacroFieldOption(fieldName, sample) : fieldName);
          fieldSelect.appendChild(option);
          selectableValues.push(fieldName);
        });

        this.suppressJsonMacroAutoInsert = true;
        fieldSelect.value = selectableValues.includes(previousValue) ? previousValue : "";
        this.suppressJsonMacroAutoInsert = false;

        if (mode === "chart") {
          fieldSelect.disabled = false;
        }

        this.updateJsonMacroPickerTitles();
      }

      updateJsonMacroToolbar(options = {}) {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");

        if (!collectionSelect || !fieldSelect) {
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          this.syncJsonMacroPickerForImageContext(this.getImageMacroContext(this.selectedObject));
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        if (this.isChartMacroToolbarActive()) {
          this.syncJsonMacroPickerForChartContext(options);
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        if (this.syncJsonMacroPickerForTableContext(options)) {
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        if (this.isParagraphMacroToolbarActive()) {
          this.syncJsonMacroPickerForParagraphContext();
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        const root = this.getReportDataRootRecord();
        const hasData = !!root;

        this.jsonMacroKindFilter = null;

        collectionSelect.disabled = !hasData;
        fieldSelect.disabled = !hasData;

        if (!hasData) {
          collectionSelect.innerHTML = '<option value="">Coleção</option>';
          fieldSelect.innerHTML = '<option value="">Campo</option>';
          this.updateJsonDataToolbarHint();
          this.updateToolbarContext();
          return;
        }

        const collections = this.getReportDataCollections();
        const previousCollection = collectionSelect.value || "ROOT";
        const nextCollection = this.renderJsonCollectionSelect(
          collectionSelect,
          collections,
          previousCollection,
          { force: !!options.forceCollectionRebuild }
        );

        this.populateJsonMacroFieldSelect(nextCollection);
        this.updateJsonDataToolbarHint();
        this.updateToolbarContext();
      }

      onJsonCollectionChange() {
        if (this.getActiveTableForMacroContext()) {
          this.syncJsonMacroPickerForTableContext({ forceCollectionRebuild: true });
          this.updateJsonMacroPickerTitles();
          return;
        }

        const collectionName = document.getElementById("jsonCollection")?.value;

        if (this.isChartMacroToolbarActive()) {
          const context = this.getChartMacroContext(this.selectedObject);
          const nextCollection = collectionName || "ROOT";

          if (context.inTableCell && nextCollection !== context.collectionName) {
            this.syncJsonMacroPickerForChartContext({ forceCollectionRebuild: true });
            alert(
              `Este histograma só aceita dados da coleção ${context.collectionName}.`
            );
            this.updateJsonMacroPickerTitles();
            return;
          }

          if (!context.inTableCell && this.isChartHistogramCollectionName(nextCollection)) {
            this.applyMacroFieldToChartBox(this.selectedObject, nextCollection);
            this.populateJsonMacroFieldSelect(nextCollection, { mode: "chart" });
          } else {
            this.populateJsonMacroFieldSelect(nextCollection, { mode: "chart" });
          }

          this.updateJsonMacroPickerTitles();
          return;
        }

        if (this.isParagraphMacroToolbarActive()) {
          this.syncJsonMacroPickerForParagraphContext();
          this.updateJsonMacroPickerTitles();
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          const context = this.getImageMacroContext(this.selectedObject);

          if ((collectionName || "ROOT") !== context.collectionName) {
            this.syncJsonMacroPickerForImageContext(context);
            this.updateJsonMacroPickerTitles();
            return;
          }
        }

        if (!collectionName) {
          this.populateJsonMacroFieldSelect("ROOT");
          this.updateJsonMacroPickerTitles();
          return;
        }

        this.populateJsonMacroFieldSelect(collectionName);
        this.updateJsonMacroPickerTitles();
      }

      onJsonMacroFieldChange() {
        this.updateJsonMacroPickerTitles();

        if (this.suppressJsonMacroAutoInsert) {
          return;
        }

        const macroField = this.getSelectedJsonMacroName();

        if (!macroField) {
          return;
        }

        if (this.isSystemMacroPath(macroField)) {
          if (this.getTextboxForMacroInsertion() || this.isParagraphMacroToolbarActive()) {
            this.insertJsonMacroField(macroField);
            return;
          }

          return;
        }

        if (!this.getReportDataRootRecord()) {
          return;
        }

        if (this.isImageMacroToolbarActive()) {
          const context = this.getImageMacroContext(this.selectedObject);
          const requestedCollection = this.getSelectedJsonCollectionName();

          if (
            context.inTableCell &&
            requestedCollection !== context.collectionName
          ) {
            this.syncJsonMacroPickerForImageContext(context);
            alert(
              `Esta imagem só aceita macros do tipo image em coleção ${context.collectionName}.`
            );
            return;
          }

          if (!context.inTableCell && requestedCollection !== "ROOT") {
            this.syncJsonMacroPickerForImageContext(context);
            alert("Esta imagem só aceita macros do tipo image em ROOT.");
            return;
          }

          this.syncJsonMacroPickerForImageContext(context);

          if (!this.isAllowedImageMacroField(macroField, context)) {
            const scopeLabel = context.inTableCell
              ? `coleção ${context.collectionName}`
              : "ROOT";

            alert(
              `Esta imagem só aceita macros do tipo image em ${scopeLabel}.`
            );
            return;
          }

          this.applyMacroFieldToImageBox(this.selectedObject, macroField);
          return;
        }

        if (this.selectedObject?.matches?.(".wordex-chart-box")) {
          const context = this.getChartMacroContext(this.selectedObject);
          const requestedCollection = this.getSelectedJsonCollectionName();

          if (context.inTableCell && requestedCollection !== context.collectionName) {
            this.syncJsonMacroPickerForChartContext({ forceCollectionRebuild: true });
            alert(
              `Este histograma só aceita dados da coleção ${context.collectionName}.`
            );
            return;
          }

          if (!context.inTableCell && this.isChartHistogramCollectionName(requestedCollection)) {
            this.applyMacroFieldToChartBox(this.selectedObject, requestedCollection);
            return;
          }

          const allowedFields = this.getMacroFieldsForCollection(requestedCollection || "ROOT", {
            mode: "chart"
          });

          if (!allowedFields.includes(macroField)) {
            const scopeLabel = context.inTableCell
              ? `coleção ${context.collectionName}`
              : "ROOT";

            alert(
              `Este histograma só aceita campos histograma em ${scopeLabel}.`
            );
            return;
          }

          this.applyMacroFieldToChartBox(this.selectedObject, macroField);
          return;
        }

        this.insertJsonMacroField(macroField);
      }

      getMacroInsertionContainer() {
        const activeTextbox = this.getTextboxForMacroInsertion();

        if (activeTextbox) {
          return activeTextbox;
        }

        const selection = window.getSelection();
        const rangeFromSelection = selection?.rangeCount ? selection.getRangeAt(0) : null;
        const cellFromSelection = this.getTableCellFromRange(rangeFromSelection);
        const cellFromSavedRange = this.getTableCellFromRange(this.savedRange);

        if (cellFromSelection) {
          return cellFromSelection;
        }

        if (cellFromSavedRange) {
          return cellFromSavedRange;
        }

        if (this.selectedCell && this.documentElement.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        const paragraphFromSelection = this.findParagraphElementFromNode(
          rangeFromSelection?.commonAncestorContainer
        );
        const paragraphFromSavedRange = this.findParagraphElementFromNode(
          this.savedRange?.commonAncestorContainer
        );
        const selectedParagraph = this.getSelectedParagraphElement();
        const paragraph = paragraphFromSelection ||
          paragraphFromSavedRange ||
          selectedParagraph ||
          null;

        if (paragraph && this.paragraphHasMainObject(paragraph)) {
          return null;
        }

        return paragraph;
      }

      insertMacroTextInEditableContainer(container, macroText) {
        if (!container || !macroText) {
          return false;
        }

        if (container.matches("td")) {
          container.focus();
        } else if (container.matches(".paragraph, .wordex-textbox")) {
          container.focus();
        }

        const selection = window.getSelection();
        let range = null;

        if (
          selection?.rangeCount &&
          container.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          range = selection.getRangeAt(0).cloneRange();
        } else if (
          this.savedRange &&
          container.contains(this.savedRange.commonAncestorContainer)
        ) {
          range = this.savedRange.cloneRange();
        } else {
          range = document.createRange();
          range.selectNodeContents(container);
          range.collapse(false);
        }

        const rangeContainer = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;
        const objectInSelection = rangeContainer?.closest?.(WordexEditor.objectSelector);

        if (objectInSelection && container.contains(objectInSelection)) {
          if (objectInSelection.matches(".wordex-textbox")) {
            if (!container.matches(".wordex-textbox")) {
              container = objectInSelection;
              container.focus();
            }
          } else if (container.matches(".paragraph") && this.paragraphHasMainObject(container)) {
            return false;
          } else {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        }

        if (container.matches("td") && container.innerHTML.trim().toLowerCase() === "<br>") {
          container.innerHTML = "";
          range = document.createRange();
          range.selectNodeContents(container);
          range.collapse(false);
        }

        const textNode = document.createTextNode(macroText);
        range.insertNode(textNode);

        const caretRange = document.createRange();
        caretRange.setStartAfter(textNode);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);
        this.savedRange = caretRange.cloneRange();

        const paragraph = container.matches(".paragraph")
          ? container
          : container.closest(".paragraph");

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
          this.syncParagraphElement(paragraph);
          this.updateParagraphEmptyState(paragraph);
          this.saveUndoStateIfChanged();
        }

        if (container.matches(".wordex-textbox")) {
          this.macroInsertionTargetTextbox = container;
        }

        return true;
      }

      insertMacroAtCaret(macroText) {
        const container = this.getMacroInsertionContainer();

        if (!container) {
          return false;
        }

        return this.insertMacroTextInEditableContainer(container, macroText);
      }

      insertJsonMacroField(macroName) {
        const normalized = this.normalizeMacroName(macroName);

        if (!normalized) {
          return;
        }

        const macroText = this.formatMacroName(normalized);
        const textboxTarget = this.getTextboxForMacroInsertion();

        if (textboxTarget) {
          this.macroInsertionTargetTextbox = textboxTarget;
        }

        const inserted = this.insertMacroAtCaret(macroText);

        if (!inserted) {
          const objectParagraph = this.getSelectedObjectParagraphElement();

          if (objectParagraph) {
            alert("Em parágrafos de objeto (imagem, gráfico ou tabela), coloque o cursor dentro de um textbox para inserir a macro.");
          } else {
            alert("Coloque o cursor num parágrafo, num textbox ou numa célula de tabela para inserir a macro.");
          }

          return;
        }

        const fieldSelect = document.getElementById("jsonMacroField");

        if (fieldSelect) {
          this.suppressJsonMacroAutoInsert = true;
          fieldSelect.value = "";
          this.suppressJsonMacroAutoInsert = false;
          this.updateJsonMacroPickerTitles();
        }
      }

      loadJsonFile(file) {
        if (!file) return;

        const reader = new FileReader();
        const hadData = !!this.getReportDataRootRecord();

        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result || "").replace(/^\uFEFF/, ""));
            this.reportData = data;
            this.reportDataFileName = file.name || "JSON carregado";
            this.prefetchReportImageDataUrls(this.reportData)
              .then(() => this.previewDynamicImagesInDocument())
              .catch(() => this.previewDynamicImagesInDocument());
            this.updateJsonMacroToolbar({ forceCollectionRebuild: true });
          } catch (error) {
            if (!hadData) {
              this.reportData = null;
              this.reportDataFileName = "";
              this.previewDynamicImagesInDocument().catch(() => {});
              this.updateJsonMacroToolbar();
            }

            alert("Erro ao carregar JSON: " + error.message);
          }
        };

        reader.onerror = () => {
          alert("Não foi possível ler o arquivo JSON.");
        };

        reader.readAsText(file, "utf-8");
      }

      escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      normalizeReportJsonInput(json) {
        if (json == null) {
          throw new Error("JSON do relatório não informado.");
        }

        if (typeof json === "string") {
          const text = json.trim();

          if (!text) {
            throw new Error("JSON do relatório está vazio.");
          }

          return JSON.parse(text);
        }

        return json;
      }

      createHiddenPipelineIframe(html) {
        return new Promise((resolve, reject) => {
          const iframe = document.createElement("iframe");
          iframe.setAttribute("aria-hidden", "true");
          iframe.setAttribute("tabindex", "-1");
          iframe.style.cssText =
            "position:fixed;left:-10000px;top:0;width:1px;height:1px;border:0;opacity:0;pointer-events:none";

          const blob = new Blob([html], { type: "text/html;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          let settled = false;

          const cleanup = () => {
            URL.revokeObjectURL(url);

            if (iframe.parentNode) {
              iframe.parentNode.removeChild(iframe);
            }
          };

          const finish = (handler) => {
            if (settled) {
              return;
            }

            settled = true;
            handler();
          };

          iframe.addEventListener("load", () => {
            finish(() => {
              const win = iframe.contentWindow;

              if (!win) {
                cleanup();
                reject(new Error("Não foi possível inicializar o iframe do relatório."));
                return;
              }

              resolve({
                iframe,
                win,
                cleanup
              });
            });
          });

          iframe.addEventListener("error", () => {
            finish(() => {
              cleanup();
              reject(new Error("Falha ao carregar o iframe do relatório."));
            });
          });

          document.body.appendChild(iframe);
          iframe.src = url;
        });
      }

      async waitForDocumentReadyFlag(win, className, timeoutMs) {
        const deadline = Date.now() + (timeoutMs || 120000);

        while (Date.now() < deadline) {
          const body = win.document?.body;

          if (body && body.classList.contains(className)) {
            return;
          }

          await new Promise(resolve => setTimeout(resolve, 50));
        }

        throw new Error("Tempo esgotado aguardando a etapa do relatório.");
      }

      async waitForPdfExportResult(win, timeoutMs) {
        const deadline = Date.now() + (timeoutMs || 180000);

        while (Date.now() < deadline) {
          const result = win.wordexPdfExportResult;

          if (result?.ok && (result.dataUri || result.base64)) {
            return result;
          }

          if (result && result.ok === false) {
            throw new Error(result.error || "Erro ao gerar PDF.");
          }

          await new Promise(resolve => setTimeout(resolve, 100));
        }

        throw new Error("Tempo esgotado aguardando a geração do PDF.");
      }

      async obterPdfFromJson(json, options = {}) {
        const data = this.normalizeReportJsonInput(json);
        const timeoutMs = Number(options.timeoutMs) > 0 ? Number(options.timeoutMs) : 180000;

        this.reportData = data;
        await this.prefetchReportImageDataUrls(data);

        const pagedHtml = this.buildGeneratedReportHtml(data);
        const pagedFrame = await this.createHiddenPipelineIframe(pagedHtml);

        try {
          await this.waitForDocumentReadyFlag(pagedFrame.win, "wordex-pagex-ready", timeoutMs);

          const buildPdfHtml = pagedFrame.win.wordexBuildPdfHtml;

          if (typeof buildPdfHtml !== "function") {
            throw new Error("Pipeline de PDF indisponível no relatório paginado.");
          }

          const pdfHtml = await buildPdfHtml.call(pagedFrame.win, { returnBase64: true });
          pagedFrame.cleanup();

          const pdfFrame = await this.createHiddenPipelineIframe(pdfHtml);

          try {
            const result = await this.waitForPdfExportResult(pdfFrame.win, timeoutMs);

            if (result.dataUri) {
              return result.dataUri;
            }

            return `data:application/pdf;base64,${result.base64}`;
          } finally {
            pdfFrame.cleanup();
          }
        } finally {
          if (pagedFrame.iframe.parentNode) {
            pagedFrame.cleanup();
          }
        }
      }
    }

    const wordex = new WordexEditor("document");
    window.wordex = wordex;

    window.ObterPDF = function ObterPDF(json, options) {
      return wordex.obterPdfFromJson(json, options);
    };

    window.addEventListener("message", event => {
      const payload = event.data;

      if (!payload || payload.type !== "wordex-obter-pdf") {
        return;
      }

      const reply = detail => {
        if (!event.source || typeof event.source.postMessage !== "function") {
          return;
        }

        event.source.postMessage(
          {
            type: "wordex-obter-pdf-result",
            id: payload.id ?? null,
            ...detail
          },
          event.origin || "*"
        );
      };

      window.ObterPDF(payload.json, payload.options)
        .then(dataUri => {
          reply({
            ok: true,
            dataUri,
            base64: dataUri,
            fileName: wordex.getSuggestedReportPdfFileName()
          });
        })
        .catch(error => {
          reply({
            ok: false,
            error: error?.message || String(error)
          });
        });
    });
  </script>
</body>
