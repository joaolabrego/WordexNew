          }

          this.renderSelection();
        }, 0);
      }

      setCaretAfterObject(object) {
        const selection = window.getSelection();
        const caretRange = document.createRange();

        caretRange.setStartAfter(object);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.savedRange = caretRange.cloneRange();
      }

      deleteSelectedObject() {
        if (!this.selectedObject) {
          alert("Selecione uma imagem, gráfico, textbox ou tabela.");
          return;
        }

        /*
          Proteção: célula selecionada deixa a tabela dona da célula como objeto
          selecionado. Essa seleção é operacional; não deve apagar a tabela.
        */
        const selection = window.getSelection();
        const range = selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

        const activeCell =
          this.getTableCellFromRange(range) ||
          this.selectedCell;

        const selectedCellTable = activeCell?.closest?.(".wordex-table") || null;

        if (selectedCellTable && this.selectedObject === selectedCellTable) {
          return;
        }

        const paragraph = this.selectedObject.closest(".paragraph");
        const objectBlock = this.selectedObject.closest(".object-block");

        if (paragraph) {
          this.selectedObject.remove();
          this.selectedObject = null;
          this.syncParagraphElement(paragraph);
          this.renderSelection();
          return;
        }

        if (objectBlock) {
          this.deleteBlock(this.selected.region, objectBlock.dataset.blockId);
        }
      }

      deleteBlock(region, blockId) {
        const blocks = this.wordexDocument[region];
        const index = blocks.findIndex(block => block.id === blockId);

        if (index >= 0) {
          blocks.splice(index, 1);
        }

        this.ensureRequiredParagraphs();

        this.clearSelection();
        this.render();
      }

      syncObjectAfterChange(object) {
        const paragraph = object.closest(".paragraph");
        const objectBlock = object.closest(".object-block");

        if (paragraph) {
          this.syncParagraphElement(paragraph);
          this.saveUndoStateIfChanged();
          return;
        }

        if (objectBlock) {
          this.syncStandaloneObjectFromDom(object);
          this.saveUndoStateIfChanged();
        }
      }

      syncParagraphElement(paragraphElement) {
        if (!paragraphElement) return;

        const block = this.findBlockById(paragraphElement.dataset.blockId);

        if (block) {
          this.updateParagraphEmptyState(paragraphElement);
          block.html = this.getCleanInnerHtml(paragraphElement);
        }
      }

      syncStandaloneObjectFromDom(object) {
        const wrapper = object.closest(".object-block");
        if (!wrapper) return;

        const block = this.findBlockById(wrapper.dataset.blockId);
        if (!block) return;

        if (block.type === "dynamicImage") {
          block.fieldName = object.dataset.fieldName;
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.height = object.style.height;
          block.blockX = object.dataset.blockX || "0";
        } else if (block.type === "chart") {
          block.sourceName = object.dataset.sourceName;
          block.chartType = object.dataset.chartType;
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.height = object.style.height;
          block.html = this.getCleanOuterHtml(object);
        } else if (block.type === "table") {
          block.align = object.dataset.align;
          block.width = object.style.width;
          block.blockX = object.dataset.blockX || "0";
          block.html = this.getCleanOuterHtml(object);
        }
      }

      getCleanInnerHtml(paragraphElement) {
        /*
          Tabelas (contenteditable=false dentro do parágrafo) por vezes não entram
          de forma fiável no innerHTML do clone. Imagem/gráfico não têm esse problema.
        */
        if (paragraphElement.querySelector("table.wordex-table")) {
          return this.serializeParagraphInlineObjects(paragraphElement);
        }

        const clone = paragraphElement.cloneNode(true);

        clone.querySelectorAll(".selected-object").forEach(element => {
          element.classList.remove("selected-object");
        });

        clone.querySelectorAll(".selected-cell").forEach(element => {
          element.classList.remove("selected-cell");
        });

        return clone.innerHTML;
      }

      serializeParagraphInlineObjects(paragraphElement) {
        const parts = [];

        paragraphElement.childNodes.forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            parts.push(child.textContent);
            return;
          }

          if (child.nodeType !== Node.ELEMENT_NODE) {
            return;
          }

          if (child.matches(WordexEditor.objectSelector)) {
            parts.push(this.getCleanOuterHtml(child));
            return;
          }

          if (child.tagName === "BR") {
            parts.push("<br>");
            return;
          }

          parts.push(child.outerHTML);
        });

        return parts.join("");
      }

      getCleanOuterHtml(element) {
        const clone = element.cloneNode(true);
        this.normalizeLegacyTableFooterRows(clone);
        clone.classList.remove("selected-object");

        clone.querySelectorAll(".selected-cell").forEach(item => {
          item.classList.remove("selected-cell");
        });

        return clone.outerHTML;
      }

      saveSelectionIfInsideParagraph() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const paragraphElement = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraphElement) return;

        /*
          A célula deve ser determinada pelo caret real, não pelo parágrafo.
          A tabela fica dentro do parágrafo, então paragraphElement.closest("td")
          sempre seria falso e limparia selectedCell durante a digitação.
        */
        const activeCell = this.getTableCellFromRange(range);

        if (activeCell) {
          const table = activeCell.closest(".wordex-table");

          this.selectedCell = activeCell;
          this.selectedObject = table || this.selectedObject;
          this.selectedTableMode = this.selectedTableMode || "cell";
          this.selectedTableRow = activeCell.parentElement;
          this.selectedTableColumnIndex = activeCell.parentElement
            ? Array.from(activeCell.parentElement.cells).indexOf(activeCell)
            : null;
        } else {
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;
        }

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.savedRange = range.cloneRange();
      }

      findParagraphElementFromNode(node) {
        if (!node) return null;

        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;

        return element.closest(".paragraph");
      }

      placeCaretAtStart(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(true);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEnd(element) {
        const range = document.createRange();
        const selection = window.getSelection();

        range.selectNodeContents(element);
        range.collapse(false);

        selection.removeAllRanges();
        selection.addRange(range);

        this.savedRange = range.cloneRange();
      }

      placeCaretAtEndIfNoSelection(element) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          this.placeCaretAtEnd(element);
          return;
        }

        const range = selection.getRangeAt(0);

        if (!element.contains(range.commonAncestorContainer)) {
          this.placeCaretAtEnd(element);
        }
      }

      normalizeAllObjectsIntoParagraphs() {
        ["headerTemplate", "bodyFlow", "footerTemplate"].forEach(region => {
          this.wordexDocument[region] = this.wordexDocument[region].map(block => {
            if (block.type === "paragraph") {
              return block;
            }

            return this.convertObjectBlockToParagraph(block);
          });
        });
      }

      convertObjectBlockToParagraph(block) {
        let html = "";

        if (block.type === "dynamicImage") {
          const image = this.createDynamicImageElement(
            block.fieldName || "Imagem",
            block.align || "left",
            block.width || "80mm",
            block.height || "45mm"
          );

          html = image.outerHTML + "\u200B";
        } else if (block.type === "table") {
          html = (block.html || this.createTableHtml(1, 1, block.align || "left", block.width || "80mm")) + "\u200B";
        }

        return {
          id: block.id || this.createId("paragraph"),
          type: "paragraph",
          html,
          style: {
            fontFamily: "Arial",
            fontSize: "12pt",
            textAlign: "left"
          }
        };
      }

      render() {
        this.normalizeAllObjectsIntoParagraphs();
        this.documentElement.innerHTML = "";

        const title = document.createElement("div");
        title.className = "document-title";
        const page = this.getPageSettings();
        title.textContent = `Wordex — ${page.format} ${page.orientation === "landscape" ? "paisagem" : "retrato"} — ${page.width} x ${page.height}`;
        this.documentElement.appendChild(title);

        this.documentElement.appendChild(
          this.renderRegion("headerTemplate", "header-template", "Modelo de cabeçalho")
        );

        this.documentElement.appendChild(
          this.renderRegion("bodyFlow", "body-flow", "Corpo contínuo")
        );

        this.documentElement.appendChild(
          this.renderRegion("footerTemplate", "footer-template", "Modelo de rodapé")
        );

        if (this.selected.region === "bodyFlow") {
          this.ensureParagraphSelection();
        }

        this.renderSelection();

        if (!this.isInsertingObject) {
          this.saveUndoStateIfChanged();
        }
      }

      refreshTableRowTypeLabels(container) {
        if (!container) return;

        container.querySelectorAll(".wordex-table").forEach(table => {
          Array.from(table.rows).forEach(row => {
            const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

            if (rowType) {
              row.dataset.wordexRowType = rowType;
              this.normalizeTableRowColumnsForType(table, row, rowType);
            }

            this.updateTableRowTypeLabel(row);
          });
        });
      }

      renderRegion(region, cssClass, emptyText) {
        const regionElement = document.createElement("section");
        regionElement.className = "region " + cssClass;
        regionElement.dataset.region = region;

        if (this.wordexDocument[region].length === 0) {
          regionElement.classList.add("is-empty");
        }

        regionElement.addEventListener("click", event => {
          event.stopPropagation();

          if (event.target === regionElement || event.target.classList.contains("empty")) {
            this.selectRegion(region);
          }
        });

        const blocks = this.wordexDocument[region];

        if (blocks.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = emptyText + " vazio";
          regionElement.appendChild(empty);
        }

        blocks.forEach(block => {
          if (block.type !== "paragraph") {
            block = this.convertObjectBlockToParagraph(block);
          }

          regionElement.appendChild(this.renderParagraphBlock(region, block));
        });

        return regionElement;
      }

      renderParagraphBlock(region, block) {
        const wrapper = document.createElement("div");
        wrapper.className = "paragraph-block";
        wrapper.dataset.blockId = block.id;

        wrapper.addEventListener("click", event => {
          event.stopPropagation();

          if (event.defaultPrevented || event.wordexTableClickHandled) {
            return;
          }

          if (this.trySelectObjectInsideTableCell(event, wrapper)) {
            return;
          }

          const cell = event.target.closest("td");

          if (cell && wrapper.contains(cell)) {
            const table = cell.closest(".wordex-table");

            if (table) {
              event.wordexTableClickHandled = true;

              if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                this.cycleTableComponentSelection(cell);
              } else {
                this.selectTableCell(cell);
              }

              return;
            }
          }

          const object = event.target.closest(WordexEditor.objectSelector);

          if (object && wrapper.contains(object)) {
            if ((event.ctrlKey || event.metaKey) && object.matches(".wordex-table")) {
              event.preventDefault();
              event.wordexTableClickHandled = true;

              const cycleCell = this.getCellForTableComponentCycle(object, event.target);

              if (cycleCell) {
                this.cycleTableComponentSelection(cycleCell);
              } else {
                this.selectTableComponent(object, null, "table");
              }
            } else {
              this.selectObject(object);
            }

            return;
          }

          this.selectParagraph(region, block.id);
        });

        /*
          Parágrafos não têm mais botão Excluir.
          Eles são removidos com Backspace/Delete quando estiverem vazios.
        */

        const paragraph = document.createElement("div");
        paragraph.className = "paragraph";
        paragraph.contentEditable = "true";
        paragraph.dataset.blockId = block.id;
        paragraph.dataset.emptyText = "Parágrafo vazio";
        paragraph.innerHTML = block.html || "";
        this.refreshTableRowTypeLabels(paragraph);

        paragraph.classList.toggle("is-empty", this.isParagraphHtmlEmpty(block.html));

        requestAnimationFrame(() => {
          paragraph.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            this.limitObjectWidthToParagraph(object);
            this.syncParagraphElement(paragraph);
          });
        });

        paragraph.style.fontFamily = block.style.fontFamily;
        paragraph.style.fontSize = block.style.fontSize;
        paragraph.style.color = block.style.color || "#000000";
        paragraph.style.textAlign = block.style.textAlign;

        paragraph.addEventListener("focus", () => {
          this.selectParagraph(region, block.id);
          this.placeCaretAtEndIfNoSelection(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("click", event => {
          if (event.defaultPrevented || event.wordexTableClickHandled) {
            return;
          }

          if (this.trySelectObjectInsideTableCell(event, paragraph)) {
            return;
          }

          const cell = event.target.closest("td");

          if (cell && paragraph.contains(cell)) {
            const table = cell.closest(".wordex-table");
            if (table) {
              event.stopPropagation();
              event.wordexTableClickHandled = true;

              if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                this.cycleTableComponentSelection(cell);
              } else {
                this.selectTableCell(cell);
              }

              return;
            }
          }

          const object = event.target.closest(WordexEditor.objectSelector);

          if (object && paragraph.contains(object)) {
            if ((event.ctrlKey || event.metaKey) && object.matches(".wordex-table")) {
              event.preventDefault();
              event.stopPropagation();
              event.wordexTableClickHandled = true;

              const cycleCell = this.getCellForTableComponentCycle(object, event.target);

              if (cycleCell) {
                this.cycleTableComponentSelection(cycleCell);
              } else {
                this.selectTableComponent(object, null, "table");
              }
            } else {
              this.selectObject(object);
            }

            return;
          }

          this.selectParagraph(region, block.id);
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("keyup", () => {
          this.updateParagraphEmptyState(paragraph);
          this.saveSelectionIfInsideParagraph();
          block.html = this.getCleanInnerHtml(paragraph);
        });

        paragraph.addEventListener("mouseup", () => {
          this.saveSelectionIfInsideParagraph();
        });

        paragraph.addEventListener("input", () => {
          this.updateParagraphEmptyState(paragraph);
          block.html = this.getCleanInnerHtml(paragraph);
          this.saveSelectionIfInsideParagraph();
        });

        wrapper.appendChild(paragraph);

        return wrapper;
      }

      renderSelection() {
        this.documentElement.querySelectorAll(".region").forEach(regionElement => {
          regionElement.classList.toggle(
            "selected",
            regionElement.dataset.region === this.selected.region
          );
        });

        this.documentElement.querySelectorAll(".paragraph-block, .object-block").forEach(blockElement => {
          blockElement.classList.toggle(
            "selected-block",
            blockElement.dataset.blockId === this.selectedBlockId
          );
        });

        this.documentElement.querySelectorAll(".selected-object").forEach(element => {
          element.classList.remove("selected-object");
        });

        this.documentElement.querySelectorAll(".selected-cell").forEach(element => {
          element.classList.remove("selected-cell");
        });

        this.documentElement.querySelectorAll(".selected-row-cell").forEach(element => {
          element.classList.remove("selected-row-cell");
        });

        this.documentElement.querySelectorAll(".selected-column-cell").forEach(element => {
          element.classList.remove("selected-column-cell");
        });

        if (this.selectedObject && this.documentElement.contains(this.selectedObject)) {
          const isTableComponentSelection =
            this.selectedObject.matches(".wordex-table") &&
            this.selectedTableMode &&
            this.selectedTableMode !== "table";

          if (!isTableComponentSelection) {
            this.selectedObject.classList.add("selected-object");
          }
        }

        if (
          this.selectedCell &&
          this.documentElement.contains(this.selectedCell) &&
          this.selectedTableMode === "cell"
        ) {
          this.selectedCell.classList.add("selected-cell");
        }

        if (
          this.selectedTableMode === "row" &&
          this.selectedTableRow &&
          this.documentElement.contains(this.selectedTableRow)
        ) {
          Array.from(this.selectedTableRow.cells).forEach(cell => {
            cell.classList.add("selected-row-cell");
          });
        }

        if (
          this.selectedTableMode === "column" &&
          this.selectedObject &&
          this.selectedObject.matches(".wordex-table") &&
          Number.isInteger(this.selectedTableColumnIndex)
        ) {
          Array.from(this.selectedObject.rows).forEach(row => {
            const cell = row.cells[this.selectedTableColumnIndex];

            if (cell) {
              cell.classList.add("selected-column-cell");
            }
          });
        }

        this.syncTableRowTypeToolbar();
      }

      resizeTableRowsByTotalHeight(table, totalHeight) {
        const rows = Array.from(table.rows);
        if (rows.length === 0) return;

        const rowHeight = Math.max(18, Math.floor(totalHeight / rows.length));

        rows.forEach(row => {
          row.style.height = rowHeight + "px";

          Array.from(row.cells).forEach(cell => {
            cell.style.height = rowHeight + "px";
          });
        });
      }

      loadSavedWordexDocumentFromHtml() {
        const stateElement = document.getElementById("wordexSavedDocument");

        if (!stateElement) return;

        try {
          const state = JSON.parse(stateElement.textContent || "{}");

          if (state && state.wordexDocument) {
            this.wordexDocument = state.wordexDocument;
          } else if (state && Array.isArray(state.bodyFlow)) {
            this.wordexDocument = state;
          }
        } catch (error) {
          console.warn("Não foi possível carregar o documento Wordex salvo.", error);
        }
      }

      syncCurrentEditingState() {
        if (this.isRestoringUndo) {
          this.syncDocumentFromDomForUndo();
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.syncParagraphElement(paragraph);
        }

        if (this.selectedObject) {
          this.syncObjectAfterChange(this.selectedObject);
        }
      }

      saveWordexHtml() {
        try {
          this.syncCurrentEditingState();

          const html = this.buildStandaloneWordexHtml();
          const fileName = this.getSavedWordexHtmlFileName();

          this.downloadTextFile(fileName, html, "text/html;charset=utf-8");
        } catch (error) {
          alert("Erro ao salvar Wordex HTML: " + error.message);
        }
      }

      getSavedWordexState() {
        return {
          savedAt: new Date().toISOString(),
          wordexDocument: this.wordexDocument
        };
      }

      buildStandaloneWordexHtml() {
        const clone = document.documentElement.cloneNode(true);

        clone.querySelectorAll("#wordexSavedDocument").forEach(node => node.remove());

        const stateScript = document.createElement("script");
        stateScript.id = "wordexSavedDocument";
        stateScript.type = "application/json";

        /*
          Escapa fechamento de script dentro do JSON para evitar quebrar o HTML.
        */
        stateScript.textContent = JSON
          .stringify(this.getSavedWordexState(), null, 2)
          .replace(/<\/script/gi, "<\\/script");

        const body = clone.querySelector("body");
        const mainScript = body
          ? Array.from(body.querySelectorAll("script")).find(script => {
              return script.id !== "wordexSavedDocument" &&
                script.type !== "application/json";
            })
          : null;

        if (body && mainScript) {
          body.insertBefore(stateScript, mainScript);
        } else if (body) {
          body.appendChild(stateScript);
        } else {
          clone.appendChild(stateScript);
        }

        return "<!DOCTYPE html>\n" + clone.outerHTML;
      }

      getSavedWordexHtmlFileName() {
        /*
          Nunca sugerir wordex.html, para reduzir o risco de o usuário
          sobrescrever o HTML-base do editor.

          O navegador ainda pode permitir que o usuário escolha manualmente
          outro nome na janela de salvamento, mas o Wordex nunca sugerirá
          o nome reservado.
        */
        const reservedNames = new Set([
          "wordex",
          "wordex.html",
          "wordexnew",
          "wordexnew.html"
        ]);

        let baseName = String(document.title || "").trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        baseName = baseName
          .replace(/\.html?$/i, "")
          .replace(/[\\/:*?"<>|]+/g, "_")
          .trim();

        if (!baseName || reservedNames.has(baseName.toLowerCase())) {
          baseName = "Relatorio";
        }

        return baseName + ".html";
      }

      downloadTextFile(fileName, text, mimeType) {
        const blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      generateHtmlFromJson() {
        try {
          if (!this.reportData) {
            alert("Carregue um arquivo JSON antes de montar o HTML.");
            return;
          }

          this.syncCurrentEditingState();

          const html = this.buildGeneratedReportHtml(this.reportData);
          this.openGeneratedHtmlInNewTab(html);
        } catch (error) {
          alert("Erro ao montar HTML com JSON: " + error.message);
        }
      }

      openGeneratedHtmlInNewTab(html) {
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const openedWindow = window.open(url, "_blank", "noopener");

        if (!openedWindow) {
          URL.revokeObjectURL(url);
          alert("O navegador bloqueou a nova aba. Libere pop-ups para visualizar o HTML montado.");
          return;
        }

        /*
          Mantém a URL temporária viva tempo suficiente para a nova aba
          carregar o HTML montado antes de liberar o objeto Blob.
        */
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      }

      getGeneratedHtmlFileName() {
        const sourceName = String(this.reportDataFileName || "Relatorio")
          .replace(/\.(json)$/i, "")
          .replace(/[\\/:*?"<>|]+/g, "_")
          .trim() || "Relatorio";

        return sourceName + "-montado.html";
      }

      buildGeneratedReportHtml(data) {
        const documentClone = this.buildGeneratedDocumentClone(data);
        const styleElement = document.getElementById("wordex-editor-style");
        const styleText = styleElement ? styleElement.textContent : "";
        const page = this.getPageSettings();
        const title = this.escapeHtml("Relatório Wordex montado");
        const generatedCss = this.getGeneratedReportCss(page);

        return [
          "<!DOCTYPE html>",
          '<html lang="pt-BR">',
          "<head>",
          '  <meta charset="UTF-8" />',
          '  <meta name="viewport" content="width=device-width, initial-scale=1.0" />',
          `  <title>${title}</title>`,
          "  <style>",
          styleText,
          generatedCss,
          "  </style>",
          this.getGeneratedPagedJsConfigScript(),
          "</head>",
          '<body class="wordex-generated-report">',
          '  <div id="wordex-report-source" class="workspace">',
          documentClone.outerHTML,
          "  </div>",
          '  <div id="wordex-paged-output"></div>',
          '  <script src="https://unpkg.com/pagedjs/dist/paged.polyfill.js"><\/script>',
          this.getGeneratedPagedJsStartScript(),
          "</body>",
          "</html>"
        ].join("\n");
      }

      getGeneratedPagedJsConfigScript() {
        return [
          "  <script>",
          "    window.PagedConfig = { auto: false };",
          "  <\/script>"
        ].join("\n");
      }

      getGeneratedPagedJsStartScript() {
        return [
          "  <script>",
          "    (function () {",
          "      function showPagedError(message) {",
          "        var warning = document.createElement('div');",
          "        warning.style.cssText = 'margin:12px;padding:10px;border:1px solid #c00;background:#fff2f2;color:#900;font-family:Arial,sans-serif;font-size:13px';",
          "        warning.textContent = message;",
          "        document.body.insertBefore(warning, document.body.firstChild);",
          "      }",
          "      function startPagedWordex() {",
          "        var source = document.getElementById('wordex-report-source');",
          "        var output = document.getElementById('wordex-paged-output');",
          "        if (!source || !output) return;",
          "        if (!window.Paged || !window.Paged.Previewer) {",
          "          showPagedError('Paged.js não foi carregado. O relatório continua em fluxo contínuo.');",
          "          return;",
          "        }",
          "        var previewer = new window.Paged.Previewer();",
          "        previewer.preview(source, [], output).then(function (flow) {",
          "          document.body.classList.add('wordex-paged-ready');",
          "          document.documentElement.classList.add('wordex-paged-ready');",
          "          console.log('Wordex/Paged.js:', flow.total, 'páginas.');",
          "        }).catch(function (error) {",
          "          console.error('Erro ao paginar com Paged.js:', error);",
          "          showPagedError('Erro ao paginar com Paged.js. O relatório continua em fluxo contínuo.');",
          "        });",
          "      }",
          "      if (document.readyState === 'loading') {",
          "        document.addEventListener('DOMContentLoaded', startPagedWordex);",
          "      } else {",
          "        startPagedWordex();",
          "      }",
          "    }());",
          "  <\/script>"
        ].join("\n");
      }

      getGeneratedReportCss(page) {
        return `

/* Wordex: HTML montado por dados */
@page {
  size: ${page.width} ${page.height};
  margin: ${this.getPageMarginCss()};
}

body {
  background: white;
}

body.wordex-generated-report {
  margin: 0;
}

.workspace {
  padding: 0;
}

.document {
  margin: 0 auto;
  box-shadow: none;
}

.document-title,
.empty,
.wordex-table tr[data-wordex-row-type] td:first-child::before {
  display: none !important;
}

.region,
.region:hover,
.region.selected,
.paragraph,
.paragraph:hover,
.paragraph:focus,
.paragraph-block,
.object-block,
.paragraph-block.selected-block,
.object-block.selected-block,
.selected-object,

`;
      }

      buildGeneratedDocumentClone(data) {
        const clone = this.documentElement.cloneNode(true);
        const rootCollection = this.normalizeRootCollection(data);
        const firstRootItem = rootCollection.length > 0 ? rootCollection[0] : {};
        const rootScope = this.createDataScope(firstRootItem, "ROOT", firstRootItem, null);

        clone.querySelectorAll(".document-title, .empty").forEach(node => node.remove());
        this.removeEditorSelectionMarks(clone);

        /*
          O ROOT é sempre tratado como coleção. O uso recomendado é uma única
          linha em ROOT, mas duas ou mais linhas serão processadas normalmente
          pelo mesmo forEach dos demais grupos.
        */
        this.expandTablesWithData(clone, rootCollection, null);
        this.resolveMacrosInElement(clone, [rootScope]);
        this.cleanGeneratedDocumentNode(clone);

        return clone;
      }

      normalizeRootCollection(data) {
        if (Array.isArray(data)) {
          return data;
        }

        if (data === undefined || data === null) {
          return [];
        }

        return [data];
      }

      removeEditorSelectionMarks(container) {
        if (!container) return;

        container.querySelectorAll(".selected, .selected-block, .selected-object, .selected-cell, .selected-row-cell, .selected-column-cell")
          .forEach(element => {
            element.classList.remove(
              "selected",
              "selected-block",
              "selected-object",
              "selected-cell",
              "selected-row-cell",
              "selected-column-cell"
            );
          });
      }

      cleanGeneratedDocumentNode(container) {
        if (!container) return;

        this.normalizeLegacyTableFooterRows(container);

        container.querySelectorAll("*").forEach(element => {
          element.removeAttribute("contenteditable");
          element.removeAttribute("data-row-type-label");
          element.removeAttribute("data-wordex-datasource");
          element.removeAttribute("data-wordex-enabled");
          element.removeAttribute("data-wordex-generated");
          element.classList.remove(
            "selected",
            "selected-block",
            "selected-object",
            "selected-cell",
            "selected-row-cell",
            "selected-column-cell",
            "is-empty"
          );
        });

        container.querySelectorAll("tr[data-wordex-row-type]").forEach(row => {
          delete row.dataset.wordexRowType;
          delete row.dataset.wordexDatasource;
          delete row.dataset.wordexEnabled;
          delete row.dataset.wordexDecolumnized;
          delete row.dataset.wordexOriginalColumnCount;
        });
      }

      expandTablesWithData(container, rootData, inheritedScopes = null) {
        if (!container) return;

        const rootCollection = this.normalizeRootCollection(rootData);
        const scopes = inheritedScopes || [
          this.createDataScope(rootCollection[0] || {}, "ROOT", rootCollection[0] || {}, null)
        ];

        Array.from(container.querySelectorAll("table.wordex-table")).forEach(table => {
          this.expandTableWithData(table, rootCollection, scopes);
        });
      }

      expandTableWithData(table, rootData, rootScopes) {
        if (!table || table.dataset.wordexGenerated === "1") return;

        this.normalizeLegacyTableFooterRows(table);

        const rows = Array.from(table.rows);

        if (rows.length === 0) {
          return;
        }

        const reportMap = this.buildTableReportMap(table, rows);
        const rootCollection = Array.isArray(rootData) ? rootData : this.normalizeRootCollection(rootData);
        const expandedRows = this.renderTableReportMap(reportMap, rootCollection, rootScopes);

        table.innerHTML = "";
        expandedRows.forEach(row => table.appendChild(row));
        table.dataset.wordexGenerated = "1";
      }

      buildTableReportMap(table, rows) {
        const datasource = String(table?.dataset?.wordexDatasource || "ROOT").trim() || "ROOT";
        const entries = rows.map((row, index) => this.createTableReportMapEntry(row, index));
        const rootGroup = this.createTableReportMapGroup(datasource, null, true);
        const nextIndex = this.consumeTableReportGroup(rootGroup, entries, 0);

        if (nextIndex < entries.length) {
          const extra = entries[nextIndex];
          throw new Error(
            `Estrutura da tabela inválida: linha ${extra.index + 1} apareceu depois do fechamento do grupo ROOT.`
          );
        }

        return rootGroup;
      }

      createTableReportMapEntry(row, index) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (rowType && rowType !== (row.dataset.wordexRowType || "")) {
          row.dataset.wordexRowType = rowType;
          this.updateTableRowTypeLabel(row);
        }

        return {
          kind: "row",
          row,
          index,
          rowType,
          datasource: this.getTableRowDatasource(row),
          enabled: this.isTableRowEnabled(row),
          isPhantom: false
        };
      }

      createTableReportMapGroup(datasource, headerEntry = null, isRoot = false) {
        return {
          kind: "group",
          datasource: String(datasource || (isRoot ? "ROOT" : "")).trim(),
          isRoot: !!isRoot,
          headers: headerEntry ? [headerEntry] : [],
          body: [],
          footer: null,
          phantomFooter: false
        };
      }

      consumeTableReportGroup(group, entries, startIndex) {
        let index = startIndex;
        let terminalMode = false;

        while (index < entries.length) {
          const entry = entries[index];
          const rowType = entry.rowType;

          if (!rowType) {
            group.body.push(entry);
            index++;
            continue;
          }

          if (rowType === "ColumnHeader") {
            if (terminalMode) {
              throw new Error(
                `Estrutura da tabela inválida: ColumnHeader na linha ${entry.index + 1} apareceu depois de Detail/GroupFooter. Depois de Detail só são aceitos Detail, GroupFooter ou linha sem tipo.`
              );
            }

            group.body.push(entry);
            index++;
            continue;
          }

          if (rowType === "Detail") {
            group.body.push(entry);
            terminalMode = true;
            index++;
            continue;
          }

          if (rowType === "GroupFooter") {
            group.footer = entry;
            return index + 1;
          }

          if (rowType === "GroupHeader") {
            if (terminalMode) {
              throw new Error(
                `Estrutura da tabela inválida: GroupHeader na linha ${entry.index + 1} apareceu depois de Detail/GroupFooter. Depois de Detail só são aceitos Detail, GroupFooter ou linha sem tipo.`
              );
            }

            const datasource = String(entry.datasource || "").trim();
            const belongsToCurrentGroup = !datasource || datasource === group.datasource;

            if (belongsToCurrentGroup && group.body.length === 0) {
              group.headers.push(entry);
              index++;
              continue;
            }

            if (!datasource) {
              throw new Error(
                `Estrutura da tabela inválida: GroupHeader na linha ${entry.index + 1} precisa de datasource para abrir subgrupo.`
              );
            }

            const childGroup = this.createTableReportMapGroup(datasource, entry, false);
            index = this.consumeTableReportGroup(childGroup, entries, index + 1);
            group.body.push(childGroup);
            terminalMode = true;
            continue;
          }

          throw new Error(`Tipo de linha inválido na linha ${entry.index + 1}: ${rowType}`);
        }

        group.footer = this.createPhantomGroupFooterEntry(entries.length);
        group.phantomFooter = true;
        return index;
      }

      createPhantomGroupFooterEntry(index) {
        return {
          kind: "row",
          row: null,
          index,
          rowType: "GroupFooter",
          datasource: "",
          enabled: false,
          isPhantom: true
        };
      }

      renderTableReportMap(reportMap, rootCollection, rootScopes) {
        const rootItems = this.createInitialReportItems(reportMap.datasource, rootCollection, rootScopes);
        const expandedRows = [];

        rootItems.forEach(item => {
          expandedRows.push(...this.renderReportGroup(reportMap, item));
        });

        return expandedRows;
      }

      createInitialReportItems(datasource, rootCollection, rootScopes) {
        const tableDatasource = String(datasource || "ROOT").trim() || "ROOT";
        const roots = this.normalizeRootCollection(rootCollection);
        const items = [];

        if (tableDatasource === "ROOT") {
          roots.forEach(rootItem => {
            items.push({
              value: rootItem,
              root: rootItem,
              collectionName: "ROOT"
            });
          });

          return items;
        }

        roots.forEach(rootItem => {
          this.resolveDatasourceItems(rootItem, tableDatasource, rootItem).forEach(child => {
            items.push({
              value: child.value,
              root: rootItem,
              collectionName: this.getDatasourceCollectionName(tableDatasource)
            });
          });
        });

        return items;
      }

      renderReportGroup(group, item) {
        const rows = [];
        const scope = this.createDataScope(
          item.value,
          group.datasource || item.collectionName || "ROOT",
          item.root,
          null
        );

        group.headers.forEach(entry => {
          rows.push(...this.renderReportMapRow(entry, item.value, item.root, scope, {
            ignoreDatasource: true
          }));
        });

        group.body.forEach(entry => {
          if (entry.kind === "group") {
            const childItems = this.resolveDatasourceItems(item.value, entry.datasource, item.root);

            childItems.forEach(childItem => {
              rows.push(...this.renderReportGroup(entry, {
                value: childItem.value,
                root: item.root,
                collectionName: this.getDatasourceCollectionName(entry.datasource)
              }));
            });

            return;
          }

          if (entry.rowType === "Detail") {
            rows.push(...this.renderDetailMapRow(entry, item.value, item.root));
            return;
          }

          rows.push(...this.renderReportMapRow(entry, item.value, item.root, scope));
        });

        if (group.footer) {
          rows.push(...this.renderReportMapRow(group.footer, item.value, item.root, scope, {
            ignoreDatasource: group.footer.datasource === group.datasource
          }));
        }

        return rows;
      }

      renderDetailMapRow(entry, currentValue, rootData) {
        if (!entry.enabled) return [];

        const datasource = String(entry.datasource || "").trim();

        if (!datasource) {
          const scope = this.createDataScope(currentValue, "", rootData, null);
          return [this.cloneReportMapRow(entry.row, scope, rootData)];
        }

        return this.resolveDatasourceItems(currentValue, datasource, rootData).map(item => {
          const scope = this.createDataScope(
            item.value,
            this.getDatasourceCollectionName(datasource),
            rootData,
            null
          );

          return this.cloneReportMapRow(entry.row, scope, rootData);
        });
      }

      renderReportMapRow(entry, currentValue, rootData, currentScope, options = {}) {
        if (!entry || !entry.enabled || entry.isPhantom || !entry.row) {
          return [];
        }

        const datasource = String(entry.datasource || "").trim();

        if (datasource && !options.ignoreDatasource) {
          const items = this.resolveDatasourceItems(currentValue, datasource, rootData);

          return items.map(item => {
            const scope = this.createDataScope(
              item.value,
              this.getDatasourceCollectionName(datasource),
              rootData,
              null
            );

            return this.cloneReportMapRow(entry.row, scope, rootData);
          });
        }

        return [this.cloneReportMapRow(entry.row, currentScope, rootData)];
      }

      cloneReportMapRow(row, scope, rootData) {
        const clone = row.cloneNode(true);

        this.expandTablesWithData(clone, rootData, [scope]);
        this.resolveMacrosInElement(clone, [scope]);

        return clone;
      }

      resolveDatasourceItems(currentValue, datasource, rootData) {
        const value = this.resolveDatasourceValue(currentValue, datasource, rootData);

        if (Array.isArray(value)) {
          return value.map(item => ({ value: item }));
        }

        if (value && typeof value === "object") {
          if (Array.isArray(value.$items)) {
            return value.$items.map(item => ({ value: item }));
          }

          if (Array.isArray(value.items)) {
            return value.items.map(item => ({ value: item }));
          }

          return [{ value }];
        }

        return [];
      }

      resolveDatasourceValue(currentValue, datasource, rootData) {
        const sourceName = String(datasource || "").trim();

        if (!sourceName || sourceName === "." || sourceName === "$item") {
          return currentValue;
        }

        if (sourceName === "ROOT" || sourceName === "$root") {
          return rootData;
        }

        const parts = sourceName
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return this.getValueByPath(currentValue, parts);
      }

      getDatasourceCollectionName(datasource) {
        const parts = String(datasource || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return parts.length > 0 ? parts[parts.length - 1] : "";
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveMacrosInElement(clone, scopes);
        return clone;
      }

      inferGroupCollectionNameFromRows(rows, currentValue) {
        const arrays = this.getArrayProperties(currentValue);

        if (arrays.length === 0) return null;

        const groupRows = rows.filter(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
          return rowType === "GroupHeader" || rowType === "GroupFooter";
        });

        const macroPaths = groupRows.length > 0
          ? groupRows.flatMap(row => this.collectMacroPaths(row))
          : rows.flatMap(row => this.collectMacroPaths(row));

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveMacrosInElement(clone, scopes);
        return clone;
      }

      inferGroupCollectionName(table, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = this.collectMacroPaths(table);

        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);
        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferRootDetailCollectionName(detailRows, rootData) {
        const arrays = this.getArrayProperties(rootData);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      inferDetailCollectionName(detailRows, groupItem) {
        const arrays = this.getArrayProperties(groupItem);

        if (arrays.length === 0) return null;

        const macroPaths = detailRows.flatMap(row => this.collectMacroPaths(row));
        const explicit = this.findCollectionNameReferencedByMacros(arrays, macroPaths);

        if (explicit) return explicit;

        const nonTotal = arrays.find(item => !this.isTotalCollectionName(item.name));
        return (nonTotal || arrays[0]).name;
      }

      findCollectionNameReferencedByMacros(collections, macroPaths) {
        for (const item of collections) {
          const singular = this.singularizeCollectionName(item.name);

          if (macroPaths.some(path => path === item.name || path.startsWith(item.name + "."))) {
            return item.name;
          }

          if (singular && macroPaths.some(path => path === singular || path.startsWith(singular + "."))) {
            return item.name;
          }
        }

        return null;
      }

      getArrayProperties(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) return [];

        return Object.keys(value)
          .filter(key => Array.isArray(value[key]))
          .map(key => ({ name: key, value: value[key] }));
      }

      isTotalCollectionName(name) {
        return /^Totais/i.test(String(name || ""));
      }

      getCollectionFromValue(value, collectionName) {
        if (!value || !collectionName || !Array.isArray(value[collectionName])) {
          return [];
        }

        return value[collectionName];
      }

      collectMacroPaths(element) {
        const paths = [];
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);

        while (walker.nextNode()) {
          const text = walker.currentNode.nodeValue || "";
          const matches = text.matchAll(/{{\s*([^{}]+?)\s*}}/g);

          for (const match of matches) {
            paths.push(match[1].trim());
          }
        }

        if (element.attributes) {
          Array.from(element.attributes).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        }

        element.querySelectorAll?.("*").forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        });

        return paths;
      }

      resolveMacrosInElement(element, scopes) {
        if (!element) return;

        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
        const textNodes = [];

        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(node => {
          node.nodeValue = this.resolveMacrosInText(node.nodeValue || "", scopes);
        });

        const allElements = [element, ...Array.from(element.querySelectorAll?.("*") || [])];

        allElements.forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            if (!String(attribute.value || "").includes("{{")) return;
            child.setAttribute(attribute.name, this.resolveMacrosInText(attribute.value, scopes));
          });
        });
      }

      resolveMacrosInText(text, scopes) {
        return String(text || "").replace(/{{\s*([^{}]+?)\s*}}/g, (_match, path) => {
          return this.escapeHtml(this.stringifyResolvedValue(this.resolveDataPath(path, scopes)));
        });
      }

      resolveDataPath(path, scopes) {
        const parts = String(path || "")
          .trim()
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) return "";

        for (const scope of scopes || []) {
          const value = this.getValueByPath(scope, parts);

          if (value !== undefined && value !== null) {
            return value;
          }
        }

        return "";
      }

      getValueByPath(source, parts) {
        let value = source;
        let previousPart = "";

        for (const part of parts) {
          if (value === undefined || value === null) return undefined;

          if (Array.isArray(value)) {
            if (/^\d+$/.test(part)) {
              value = value[Number(part)];
              previousPart = part;
              continue;
            }

            /*
              Coleções normais nunca são reduzidas automaticamente ao primeiro item.
              Assim, {{Produtos.Nome}} não pega o primeiro produto por acidente fora do
              contexto Detail/Produto corrente.

              A exceção deliberada são coleções de totais, como TotaisProdutos, porque
              elas representam um resumo do grupo corrente e só são usadas quando o
              template as referencia explicitamente, normalmente no GroupFooter.
            */
            if (this.isTotalCollectionName(previousPart)) {
              value = value.length > 0 ? value[0]?.[part] : undefined;
              previousPart = part;
              continue;
            }

            return undefined;
          }

          if (typeof value !== "object") {
            return undefined;
          }

          if (Object.prototype.hasOwnProperty.call(value, part)) {
            value = value[part];
            previousPart = part;
          } else {
            return undefined;
          }
        }

        return value;
      }

      stringifyResolvedValue(value) {
        if (value === undefined || value === null) return "";
        if (Array.isArray(value)) return value.map(item => this.stringifyResolvedValue(item)).join(", ");
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      }

      createDataScope(value, collectionName, rootData, parentValue, parentCollectionName = "") {
        /*
          Cada escopo representa a linha corrente de um nível do JSON.
          O nome plural da coleção e sua forma singular apontam para essa linha.

          Exemplos:
          - collectionName = "Clientes"  => Cliente.Nome é o cliente corrente.
          - collectionName = "Produtos"  => Produto.Nome é o produto corrente.

          A resolução usa uma pilha de escopos, sempre do mais interno para o mais externo.
        */
        const scope = {};

        if (value && typeof value === "object" && !Array.isArray(value)) {
          Object.assign(scope, value);
        }

        scope.$value = value;
        scope.$item = value;
        scope.$root = rootData;
        scope.$collectionName = collectionName || "";

        if (parentValue !== undefined && parentValue !== null) {
          scope.$parent = parentValue;

          if (parentCollectionName) {
            scope[parentCollectionName] = parentValue;

            const parentSingular = this.singularizeCollectionName(parentCollectionName);

            if (parentSingular && parentSingular !== parentCollectionName) {
              scope[parentSingular] = parentValue;
            }
          }
        }

        if (collectionName) {
          scope[collectionName] = value;

          const singular = this.singularizeCollectionName(collectionName);

          if (singular && singular !== collectionName) {
            scope[singular] = value;
          }
        }

        return scope;
      }

      singularizeCollectionName(name) {
        const text = String(name || "").trim();

        if (!text) return "";
        if (text.endsWith("ões")) return text.slice(0, -3) + "ão";
        if (text.endsWith("ães")) return text.slice(0, -3) + "ãe";
        if (text.endsWith("is")) return text.slice(0, -2) + "il";
        if (text.endsWith("es")) return text.slice(0, -2);
        if (text.endsWith("s")) return text.slice(0, -1);

        return text;
      }

      chooseJsonFile() {
        const input = document.getElementById("jsonFileInput");

        if (!input) {
          alert("Input de JSON não encontrado.");
          return;
        }

        input.click();
      }

      loadJsonFile(file) {
        if (!file) return;

        const reader = new FileReader();

        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result || "").replace(/^\uFEFF/, ""));
            this.reportData = data;
            this.reportDataFileName = file.name || "JSON carregado";
            alert("JSON carregado: " + this.reportDataFileName);
          } catch (error) {
            this.reportData = null;
            this.reportDataFileName = "";
            alert("Erro ao carregar JSON: " + error.message);
          }
        };

        reader.onerror = () => {
          alert("Não foi possível ler o arquivo JSON.");
        };

        reader.readAsText(file, "utf-8");
      }

      clearJsonData() {
        this.reportData = null;
        this.reportDataFileName = "";
        alert("JSON limpo.");
      }

      escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      escapeAttribute(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll('"', "&quot;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
    }

    const wordex = new WordexEditor("document");
  </script>
