        const isTextbox = element.matches(".wordex-textbox");

        if (align === "left") {
          element.style.float = "left";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 10px 8px 0";

          if (isTextbox && element.dataset.textVerticalAlign) {
            this.syncTextboxContentVerticalAlignStyles(element);
          }

          return;
        }

        if (align === "right") {
          element.style.float = "right";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 0 8px 10px";

          if (isTextbox && element.dataset.textVerticalAlign) {
            this.syncTextboxContentVerticalAlignStyles(element);
          }

          return;
        }

        if (align === "center") {
          element.style.float = "none";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "8px auto";

          if (isTextbox && element.dataset.textVerticalAlign) {
            this.syncTextboxContentVerticalAlignStyles(element);
          }

          return;
        }

        if (align === "free") {
          element.style.float = "none";
          element.style.display = isTable ? "inline-table" : (isChart ? "flex" : (isTextbox ? "inline-block" : "inline-flex"));
          element.style.verticalAlign = "middle";
          element.style.margin = "4px";
        }

        if (isTextbox && element.dataset.textVerticalAlign) {
          this.syncTextboxContentVerticalAlignStyles(element);
        }
      }

      insertNodeAtCurrentInsertionPoint(node) {
        this.isInsertingObject = true;

        try {
          if (this.isTextboxNode(node)) {
            this.insertTextboxIntoObjectParagraph(node);
            return;
          }

          const cell = this.getSelectedCellForInsertion();

          if (cell && this.isMainObjectNode(node)) {
            this.insertNodeInsideSelectedTableCell(node, cell);
            return;
          }

          this.selectedCell = null;

          const target = this.createSubParagraphForObjectInsertion();

          if (!target?.subParagraphElement) {
            return;
          }

          this.insertNodeInsideSubParagraph(
            node,
            target.subParagraphElement,
            target.paragraphElement
          );
        } finally {
          this.isInsertingObject = false;

          if (this.selectedObject?.matches?.(WordexEditor.objectSelector)) {
            this.scheduleObjectResizeOverlayAfterInsert(this.selectedObject);
          }
        }
      }

      scheduleObjectResizeOverlayAfterInsert(object) {
        if (!object?.matches?.(WordexEditor.objectSelector)) {
          return;
        }

        const finalize = () => {
          if (!this.isInDocument(object)) {
            return;
          }

          if (this.selectedObject && this.selectedObject !== object) {
            return;
          }

          if (!this.selectedObject) {
            this.selectedObject = object;
          }

          if (object.matches?.(WordexEditor.mainObjectSelector)) {
            this.fitParagraphBlockToMainObject(object);
          }

          const container =
            object.closest(WordexEditor.subParagraphSelector) ||
            object.closest(".paragraph");

          void container?.offsetHeight;
          void object.offsetHeight;

          this.renderSelection();
        };

        const images = object.matches("img")
          ? [object]
          : Array.from(object.querySelectorAll("img"));
        const pendingImages = images.filter(image => !image.complete);

        if (pendingImages.length === 0) {
          requestAnimationFrame(() => {
            requestAnimationFrame(finalize);
          });
          return;
        }

        let pending = pendingImages.length;

        const onImageReady = () => {
          pending -= 1;

          if (pending > 0) {
            return;
          }

          requestAnimationFrame(() => {
            requestAnimationFrame(finalize);
          });
        };

        pendingImages.forEach(image => {
          image.addEventListener("load", onImageReady, { once: true });
          image.addEventListener("error", onImageReady, { once: true });
        });
      }

      clearSelectedCellWhenCaretLeavesTable() {
        if (!this.selectedCell) return;

        if (document.activeElement?.closest?.(".toolbar")) {
          return;
        }

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        if (!element || !this.documentElement.contains(element)) return;

        if (!element.closest("td")) {
          this.clearTableSelectionState();
        }
      }

      getSelectedCellForInsertion() {
        /*
          A célula selecionada só deve vencer quando o caret/seleção atual
          estiver dentro de uma célula, ou quando não houver uma seleção útil
          no documento, como acontece depois de clicar no toolbar.

          Se o usuário colocou o caret num parágrafo fora da tabela, não pode
          continuar inserindo na última célula selecionada.
        */
        const cellFromSelection = this.getTableCellFromRangeSelection(window.getSelection());

        if (cellFromSelection) {
          return cellFromSelection;
        }

        const cellFromSavedRange = this.getTableCellFromRange(this.savedRange);

        if (cellFromSavedRange) {
          return cellFromSavedRange;
        }

        if (this.currentSelectionIsInsideDocumentButOutsideTable()) {
          this.selectedCell = null;
          return null;
        }

        if (this.selectedCell && this.documentElement.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        return null;
      }

      getTableCellFromRangeSelection(selection) {
        if (!selection || selection.rangeCount === 0) return null;

        return this.getTableCellFromRange(selection.getRangeAt(0));
      }

      getTableCellFromRange(range) {
        if (!range) return null;

        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        const cell = element?.closest?.("td") || null;

        if (!cell || !this.documentElement.contains(cell)) return null;

        const table = cell.closest(".wordex-table");

        return table ? cell : null;
      }

      currentSelectionIsInsideDocumentButOutsideTable() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        if (!element || !this.documentElement.contains(element)) {
          return false;
        }

        return !element.closest("td");
      }

      insertNodeInsideSelectedTableCell(node, cell = this.getSelectedCellForInsertion()) {
        if (!node || !cell) return;

        const paragraphForUndo = cell.closest(".paragraph");

        if (paragraphForUndo) {
          this.saveUndoCheckpointForParagraph(paragraphForUndo);
        }

        cell.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro da célula, o novo objeto
          entra depois dele.
        */
        if (this.selectedObject && cell.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (
          selection &&
          selection.rangeCount > 0 &&
          cell.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          range = selection.getRangeAt(0).cloneRange();

          /*
            Se o caret estiver dentro de um objeto da célula, sobe para fora.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && cell.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        /*
          Célula recém-criada costuma ter apenas <br>. Remove esse marcador
          antes de inserir objeto real.
        */
        if (cell.innerHTML.trim().toLowerCase() === "<br>") {
          cell.innerHTML = "";
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");
        range.insertNode(anchor);
        range.insertNode(node);

        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToCell(node, cell);
        this.fitObjectInTableCell(node, cell);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        const table = cell.closest(".wordex-table");

        if (table) {
          this.syncObjectAfterChange(table);
          this.selectObject(node);
          this.selectTableCell(cell);
        } else {
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }

        this.savedRange = null;
      }

      limitObjectWidthToCell(object, cell) {
        if (!object || !cell) return;

        if (!object.matches(WordexEditor.objectSelector)) return;

        const cellWidth = cell.clientWidth;

        if (!cellWidth) return;

        const computed = window.getComputedStyle(object);
        const marginLeft = parseFloat(computed.marginLeft || "0") || 0;
        const marginRight = parseFloat(computed.marginRight || "0") || 0;
        const maxWidth = Math.max(30, Math.floor(cellWidth - marginLeft - marginRight - 4));
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      ensureCellObjectContainer(cell) {
        if (!cell) {
          return;
        }

        cell.classList.add("wordex-cell-has-object");
        cell.style.position = "relative";
        cell.style.overflow = "hidden";
      }

      getSubParagraphObjectInsetPx(container = null) {
        if (container?.matches?.(WordexEditor.subParagraphSelector)) {
          return WordexEditor.subParagraphObjectInsetPx;
        }

        return 0;
      }

      getSubParagraphSelectionChromePx(container = null) {
        if (container?.matches?.(WordexEditor.subParagraphSelector)) {
          return WordexEditor.subParagraphSelectionChromePx;
        }

        return 0;
      }

      clampObjectPositionInsideSubParagraph(object, container) {
        if (!object || !container?.matches?.(WordexEditor.subParagraphSelector)) {
          return;
        }

        const min = this.getObjectMinimumSize(object);
        const containerWidth = container.clientWidth || 0;
        let width = Math.round(object.getBoundingClientRect().width || object.offsetWidth || min.width);
        const maxWidth = this.getMaxObjectWidthInSubParagraph(object, container);

        if (width > maxWidth) {
          width = maxWidth;
          object.style.width = width + "px";
        }

        let layoutHeight = Math.max(
          min.height,
          Math.round(object.offsetHeight || min.height)
        );

        if (object.matches(".dynamic-image-box, .wordex-chart-box")) {
          layoutHeight = Math.max(
            min.height,
            Math.round(object.getBoundingClientRect().height || object.offsetHeight || min.height)
          );
          object.style.height = layoutHeight + "px";

          if (object.matches(".wordex-chart-box")) {
            this.scheduleChartOverlayLayout(object);
          }
        }

        const neededBottom = this.getObjectBottomInFreeContainer(object, container);

        if (neededBottom > container.clientHeight) {
          container.style.minHeight = Math.max(18, neededBottom) + "px";
        }

        const containerHeight = Math.max(container.clientHeight || 0, neededBottom);
        const maxX = Math.max(0, containerWidth - width);
        const maxY = Math.max(0, containerHeight - layoutHeight);
        const clampedX = this.clamp(this.getObjectVisualXInsideBlock(object, container), 0, maxX);
        const y = this.clamp(this.getObjectVisualYInsideBlock(object, container), 0, maxY);

        this.applyObjectFreePosition(object, container, clampedX, y);
      }

      clampObjectInsideContainer(object, container) {
        if (!object || !container) {
          return;
        }

        if (container.matches(WordexEditor.subParagraphSelector)) {
          this.clampObjectPositionInsideSubParagraph(object, container);
          return;
        }

        const inset = this.getSubParagraphObjectInsetPx(container);
        const padding = inset > 0 ? inset : 4;
        const min = this.getObjectMinimumSize(object);
        const containerWidth = Math.max(min.width + padding * 2, container.clientWidth || 0);
        const containerHeight = Math.max(min.height + padding * 2, container.clientHeight || 0);
        const currentWidth = object.getBoundingClientRect().width || object.offsetWidth;
        const currentHeight = object.getBoundingClientRect().height || object.offsetHeight;
        const width = this.clamp(
          Math.round(currentWidth),
          min.width,
          Math.max(min.width, containerWidth - padding * 2)
        );
        const height = this.clamp(
          Math.round(currentHeight),
          min.height,
          Math.max(min.height, containerHeight - padding * 2)
        );

        object.style.width = width + "px";

        let layoutHeight = height;

        if (object.matches(".dynamic-image-box, .wordex-chart-box")) {
          object.style.height = height + "px";
        } else if (object.matches(".wordex-textbox")) {
          layoutHeight = Math.max(
            min.height,
            Math.round(object.offsetHeight || min.height)
          );

          if (layoutHeight > height) {
            object.style.height = height + "px";
            layoutHeight = height;
          }
        } else if (this.isWordexTableObject(object)) {
          object.style.height = height + "px";
        }

        const maxX = Math.max(0, containerWidth - width - padding);
        const maxY = Math.max(0, containerHeight - layoutHeight - padding);
        const x = this.clamp(this.getObjectVisualXInsideBlock(object, container), 0, maxX);
        const y = this.clamp(this.getObjectVisualYInsideBlock(object, container), 0, maxY);

        this.applyObjectFreePosition(object, container, x, y);
      }

      fitObjectInTableCell(object, cell) {
        if (!object || !cell) {
          return;
        }

        this.ensureCellObjectContainer(cell);
        this.limitObjectWidthToCell(object, cell);

        const padding = 4;
        const min = this.getObjectMinimumSize(object);
        const maxWidth = Math.max(min.width, cell.clientWidth - padding * 2);
        const maxHeight = Math.max(min.height, cell.clientHeight - padding * 2);
        let width = object.getBoundingClientRect().width || min.width;
        let height = object.getBoundingClientRect().height || min.height;

        width = Math.min(width, maxWidth);
        height = Math.min(height, maxHeight);

        object.style.width = Math.round(width) + "px";

        if (object.matches(".dynamic-image-box, .wordex-chart-box, .wordex-textbox")) {
          object.style.height = Math.round(height) + "px";
        }

        this.prepareObjectForFreeDrag(object, cell);
        this.clampObjectInsideContainer(object, cell);
      }

      insertNodeInsideCurrentParagraph(node) {
        const target = this.getSubParagraphInsertionTarget({ alert: false });

        if (!target) {
          return;
        }

        this.insertNodeInsideSubParagraph(
          node,
          target.subParagraphElement,
          target.paragraphElement
        );
      }

      insertNodeInsideSubParagraph(node, subParagraphElement, paragraphElement) {
        if (!node || !subParagraphElement || !paragraphElement) {
          return;
        }

        if (node.matches?.(WordexEditor.mainObjectSelector)) {
          this.insertMainObjectInsideSubParagraph(node, subParagraphElement, paragraphElement);
          return;
        }

        this.saveUndoCheckpointForParagraph(paragraphElement);

        subParagraphElement.focus({ preventScroll: true });

        const selection = window.getSelection();
        let range = null;

        if (this.selectedObject && subParagraphElement.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (this.savedRange && subParagraphElement.contains(this.savedRange.commonAncestorContainer)) {
          range = this.savedRange.cloneRange();

          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && subParagraphElement.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(subParagraphElement);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");

        range.insertNode(anchor);
        range.insertNode(node);

        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToParagraph(node);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.selectedSubParagraphId = subParagraphElement.dataset.subParagraphId;
        this.paragraphContainerSelected = false;
        this.selectedObject = null;
        this.savedRange = caretRange.cloneRange();

        this.syncParagraphElement(paragraphElement);

        if (node.matches?.(WordexEditor.mainObjectSelector)) {
          this.scheduleFitParagraphBlockToMainObject(node);
        }

        this.renderSelection();

        if (node.matches?.("table.wordex-table")) {
          this.ensureUndoRecordsTableInParagraph(paragraphElement);
        } else {
          this.saveUndoStateIfChanged();
        }

        if (node.matches?.(WordexEditor.objectSelector)) {
          this.selectObject(node);
        }
      }

      getSubParagraphInnerSize(subParagraphElement) {
        if (!subParagraphElement?.matches?.(WordexEditor.subParagraphSelector)) {
          return { width: 0, height: 0 };
        }

        const inset = this.getSubParagraphObjectInsetPx(subParagraphElement);
        const style = window.getComputedStyle(subParagraphElement);
        const paddingLeft = parseFloat(style.paddingLeft) || 0;
        const paddingRight = parseFloat(style.paddingRight) || 0;
        const paddingTop = parseFloat(style.paddingTop) || 0;
        const paddingBottom = parseFloat(style.paddingBottom) || 0;

        return {
          width: Math.max(
            0,
            (subParagraphElement.clientWidth || 0) - paddingLeft - paddingRight - inset * 2
          ),
          height: Math.max(
            0,
            (subParagraphElement.clientHeight || 0) - paddingTop - paddingBottom - inset * 2
          )
        };
      }

      getSubParagraphBoundsForObjectFill(subParagraphElement, object, options = {}) {
        if (!subParagraphElement?.matches?.(WordexEditor.subParagraphSelector)) {
          return { width: 40, height: 24 };
        }

        const min = this.getObjectMinimumSize(object);
        const inset = this.getSubParagraphObjectInsetPx(subParagraphElement);
        void subParagraphElement.offsetHeight;

        const inner = this.getSubParagraphInnerSize(subParagraphElement);
        const width = Math.max(min.width, Math.floor(inner.width));

        const paragraph = subParagraphElement.closest(".paragraph");
        const siblings = paragraph
          ? this.getParagraphDirectSubParagraphElements(paragraph)
          : [subParagraphElement];
        let height = 18;

        siblings.forEach(sub => {
          void sub.offsetHeight;
          height = Math.max(height, Math.ceil(sub.getBoundingClientRect().height || 0));

          const minHeight = Number.parseInt(sub.style.minHeight, 10);

          if (Number.isFinite(minHeight) && minHeight > 0) {
            height = Math.max(height, minHeight);
          }
        });

        const wasEmpty =
          options.wasEmpty === true ||
          this.isParagraphVisuallyEmptyHtml(this.getCleanSubParagraphHtml(subParagraphElement));

        if (wasEmpty) {
          const defaultHeightPx =
            this.parseCssSizeToPixels(object?.style?.height) ||
            this.parseCssSizeToPixels("45mm");

          height = Math.max(height, defaultHeightPx);
        }

        height = Math.max(min.height, Math.floor(height - inset * 2));

        return { width, height };
      }

      fitMainObjectToSubParagraphBounds(object, subParagraphElement, options = {}) {
        if (
          !object?.matches?.(WordexEditor.mainObjectSelector) ||
          !subParagraphElement?.matches?.(WordexEditor.subParagraphSelector)
        ) {
          return;
        }

        const bounds = this.getSubParagraphBoundsForObjectFill(
          subParagraphElement,
          object,
          options
        );
        const inset = this.getSubParagraphObjectInsetPx(subParagraphElement);

        subParagraphElement.style.minHeight = Math.max(bounds.height + inset * 2, 18) + "px";
        void subParagraphElement.offsetHeight;

        const inner = this.getSubParagraphInnerSize(subParagraphElement);
        const fillWidth = Math.max(
          bounds.width,
          Math.floor(inner.width || bounds.width)
        );

        object.style.maxWidth = "none";
        object.style.minWidth = "0";
        object.style.right = "";

        this.applyObjectSizeInPixels(object, fillWidth, bounds.height);
        object.dataset.blockBottomGap = "0";
        this.applyObjectFreePosition(object, subParagraphElement, inset, inset, 0);
      }

      insertMainObjectInsideSubParagraph(node, subParagraphElement, paragraphElement) {
        this.saveUndoCheckpointForParagraph(paragraphElement);

        subParagraphElement.innerHTML = "";
        const wasEmpty = true;
        this.applyAlignment(node, "free");
        subParagraphElement.appendChild(node);

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.selectedSubParagraphId = subParagraphElement.dataset.subParagraphId;
        this.paragraphContainerSelected = false;

        this.syncParagraphElement(paragraphElement);
        this.updateSubParagraphEmptyState(subParagraphElement);
        this.syncSubParagraphEditorOutline(subParagraphElement);
        this.fitMainObjectToSubParagraphBounds(node, subParagraphElement, { wasEmpty });
        this.updateFreeContainerBounds(subParagraphElement);
        this.scheduleFitParagraphBlockToMainObject(node);
        this.selectObject(node);
        this.fitMainObjectToSubParagraphBounds(node, subParagraphElement, { wasEmpty });
        this.clearCurrentLineHighlight();
        this.saveUndoStateIfChanged();
      }

      ensureUndoRecordsTableInParagraph(paragraphElement) {
        if (this.isRestoringUndo || !paragraphElement) return;

        this.syncParagraphElement(paragraphElement);

        const snapshot = this.getUndoSnapshot();
        const blockId = paragraphElement.dataset.blockId;
        const block = this.findBlockById(blockId);
        const html = block?.html || "";

        if (!html.includes("wordex-table")) {
          return;
        }

        if (this.undoStack[this.undoIndex] === snapshot) {
          this.lastUndoSnapshot = snapshot;
          return;
        }

        if (this.undoIndex < this.undoStack.length - 1) {
          this.undoStack = this.undoStack.slice(0, this.undoIndex + 1);
        }

        this.undoStack.push(snapshot);
        this.undoIndex = this.undoStack.length - 1;
        this.lastUndoSnapshot = snapshot;

        if (this.undoStack.length > this.maxUndoSteps) {
          this.undoStack.shift();
          this.undoIndex = Math.max(0, this.undoIndex - 1);
        }
      }

      getMaxObjectWidthInSubParagraph(object, subParagraph) {
        if (!object || !subParagraph) {
          return 40;
        }

        const min = this.getObjectMinimumSize(object);
        const currentX = this.getObjectVisualXInsideBlock(object, subParagraph);
        const available = (subParagraph.clientWidth || 0) - currentX;

        return Math.max(min.width, Math.floor(available));
      }

      getMaxObjectWidthInParagraph(object, paragraph) {
        if (!object || !paragraph) return 40;

        const subParagraph = object.closest(WordexEditor.subParagraphSelector);

        if (subParagraph) {
          return this.getMaxObjectWidthInSubParagraph(object, subParagraph);
        }

        const paragraphWidth = paragraph.clientWidth;
        const computed = window.getComputedStyle(object);

        /*
          v255: quando o objeto está centralizado, o navegador transforma
          margin-left/right:auto em margens computadas grandes. Se essas
          margens forem descontadas daqui, cada novo clique em centralizar
          reduz a largura do objeto alguns pixels. Portanto, margens auto
          ou alinhamento center não entram no limite de largura.
        */
        const hasAutoHorizontalMargin =
          object.dataset.align === "center" ||
          object.style.marginLeft === "auto" ||
          object.style.marginRight === "auto";

        const marginLeft = hasAutoHorizontalMargin
          ? 0
          : (parseFloat(computed.marginLeft || "0") || 0);

        const marginRight = hasAutoHorizontalMargin
          ? 0
          : (parseFloat(computed.marginRight || "0") || 0);

        /*
          A largura do objeto deve caber dentro da área útil do parágrafo,
          descontando margens horizontais reais do próprio objeto.
        */
        return Math.max(40, Math.floor(paragraphWidth - marginLeft - marginRight - 4));
      }

      limitObjectWidthToParagraph(object) {
        if (!object) return;

        if (!object.matches(WordexEditor.objectSelector)) return;

        const paragraph = object.closest(".paragraph");

        if (!paragraph) return;

        /*
          Precisa estar no DOM para getBoundingClientRect refletir o layout real.
        */
        const maxWidth = this.getMaxObjectWidthInParagraph(object, paragraph);
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      resizeSelectedTableComponentBy(deltaWidth, deltaHeight) {
        if (
          !this.selectedObject ||
          !this.isWordexTableObject(this.selectedObject) ||
          !this.selectedTableMode ||
          this.selectedTableMode === "table"
        ) {
          return false;
        }

        const context = this.getSelectedTableContext();

        if (!context) return false;

        const mode = this.selectedTableMode;

        if (mode === "row") {
          const rect = context.row.getBoundingClientRect();
          const newHeight = Math.max(18, Math.round(rect.height + deltaHeight));

          if (deltaHeight === 0) {
            return true;
          }

          context.row.style.height = newHeight + "px";
          Array.from(context.row.cells).forEach(cell => {
            cell.style.height = newHeight + "px";
          });

          this.syncAndSelectTableComponent(context, "row");
          this.syncFreeContainerBoundsForObject(context.table);
          return true;
        }

        if (mode === "column") {
          if (deltaWidth === 0) {
            return true;
          }

          const currentCell = context.cell;
          const currentWidth = currentCell.getBoundingClientRect().width;
          const newWidth = Math.max(24, Math.round(currentWidth + deltaWidth));
          const columnIndices = this.getSelectedTableColumnIndices().length
            ? this.getSelectedTableColumnIndices()
            : [context.columnIndex];

          Array.from(context.table.rows).forEach(row => {
            columnIndices.forEach(columnIndex => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                slot.cell.style.width = newWidth + "px";
              }
            });
          });

          this.syncAndSelectTableComponent(context, "column");
          this.syncFreeContainerBoundsForObject(context.table);
          return true;
        }

        return false;
      }

      installObjectResizeHandleEvents() {
        document.addEventListener("mousemove", event => {
          this.handleObjectResizePointerMove(event);
        });

        document.addEventListener("mouseup", event => {
          this.handleObjectResizePointerUp(event);
        });

        window.addEventListener("resize", () => {
          this.positionObjectResizeOverlay();
        });

        document.addEventListener("scroll", () => {
          this.positionObjectResizeOverlay();
        }, true);
      }

      getSubParagraphResizeInfo() {
        if (this.paragraphContainerSelected || this.selectedObject) {
          return null;
        }

        if (this.getActiveTextboxForTextEditing()) {
          return null;
        }

        const sub = this.getSelectedSubParagraphElement();

        if (!sub) {
          return null;
        }

        const paragraph = sub.closest(".paragraph");

        if (!paragraph) {
          return null;
        }

        const subs = Array.from(paragraph.querySelectorAll(WordexEditor.subParagraphSelector));
        const index = subs.indexOf(sub);
        const rect = sub.getBoundingClientRect();

        if (index < 0 || rect.width <= 0 || rect.height <= 0) {
          return null;
        }

        return {
          kind: "sub-paragraph",
          rect,
          sub,
          paragraph,
          block: this.findBlockById(paragraph.dataset.blockId),
          index,
          subs
        };
      }

      getParagraphContainerResizeInfo() {
        if (!this.paragraphContainerSelected || this.selectedObject) {
          return null;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph) {
          return null;
        }

        const rect = paragraph.getBoundingClientRect();

        if (rect.width <= 0 || rect.height <= 0) {
          return null;
        }

        return {
          kind: "paragraph-container",
          rect,
          paragraph,
          block: this.findBlockById(paragraph.dataset.blockId)
        };
      }

      isObjectResizeOverlayAllowed(object = this.selectedObject) {
        if (this.getParagraphContainerResizeInfo()) {
          return true;
        }

        if (this.getSubParagraphResizeInfo()) {
          return true;
        }

        if (!this.isInDocument(object)) return false;

        if (
          this.isWordexTableObject(object) &&
          this.selectedTableMode &&
          this.selectedTableMode !== "table"
        ) {
          return !!this.getSelectedTableComponentResizeInfo();
        }

        return !!object.matches?.(WordexEditor.objectSelector);
      }

      getObjectResizeInfo() {
        if (!this.isObjectResizeOverlayAllowed()) {
          return null;
        }

        const paragraphContainerInfo = this.getParagraphContainerResizeInfo();

        if (paragraphContainerInfo) {
          return paragraphContainerInfo;
        }

        const tableComponentInfo = this.getSelectedTableComponentResizeInfo();

        if (tableComponentInfo) {
          return tableComponentInfo;
        }

        if (this.selectedObject?.matches?.(WordexEditor.objectSelector)) {
          const object = this.selectedObject;
          const container =
            object.closest(WordexEditor.subParagraphSelector) ||
            object.closest(".paragraph");

          void container?.offsetHeight;
          void object.offsetHeight;

          const rect = object.getBoundingClientRect();

          if (rect.width > 0 && rect.height > 0) {
            return {
              kind: "object",
              mode: "object",
              rect,
              object
            };
          }
        }

        const subParagraphInfo = this.getSubParagraphResizeInfo();

        if (subParagraphInfo) {
          return subParagraphInfo;
        }

        return null;
      }

      getUnionRectFromElements(elements) {
        const visibleRects = Array.from(elements || [])
          .filter(element => element && this.isInDocument(element))
          .map(element => element.getBoundingClientRect())
          .filter(rect => rect.width > 0 || rect.height > 0);

        if (visibleRects.length === 0) {
          return null;
        }

        const left = Math.min(...visibleRects.map(rect => rect.left));
        const top = Math.min(...visibleRects.map(rect => rect.top));
        const right = Math.max(...visibleRects.map(rect => rect.right));
        const bottom = Math.max(...visibleRects.map(rect => rect.bottom));

        return {
          left,
          top,
          right,
          bottom,
          width: right - left,
          height: bottom - top
        };
      }

      getSelectedTableComponentResizeInfo() {
        if (
          !this.selectedObject ||
          !this.isWordexTableObject(this.selectedObject) ||
          !this.selectedTableMode ||
          this.selectedTableMode === "table"
        ) {
          return null;
        }

        const context = this.getSelectedTableContextWithoutAlert();

        if (!context) {
          return null;
        }

        const mode = this.selectedTableMode;

        if (mode === "cell") {
          return null;
        }

        let rect = null;

        if (mode === "row") {
          const rowElements = this.getSelectedTableRowIndices().length
            ? this.getSelectedTableRowIndices()
                .map(rowIndex => context.table.rows[rowIndex])
                .filter(Boolean)
            : [context.row];

          rect = this.getUnionRectFromElements(rowElements);
        } else if (mode === "column") {
          const columnIndices = this.getSelectedTableColumnIndices().length
            ? this.getSelectedTableColumnIndices()
            : [context.columnIndex];
          const cells = [];

          Array.from(context.table.rows).forEach(row => {
            columnIndices.forEach(columnIndex => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                cells.push(slot.cell);
              }
            });
          });

          rect = this.getUnionRectFromElements(cells);
        }

        if (!rect || rect.width <= 0 || rect.height <= 0) {
          return null;
        }

        return {
          kind: "table-" + mode,
          mode,
          rect,
          table: context.table,
          cell: context.cell,
          row: context.row,
          columnIndex: context.columnIndex
        };
      }

      ensureObjectResizeOverlay() {
        if (this.resizeOverlay) {
          return this.resizeOverlay;
        }

        const overlay = document.createElement("div");
        overlay.className = "wordex-resize-overlay";
        overlay.setAttribute("aria-hidden", "true");

        ["nw", "ne", "sw", "se"].forEach(handleName => {
          const handle = document.createElement("span");
          handle.className = "wordex-resize-handle";
          handle.dataset.handle = handleName;
          handle.title = "Arraste para redimensionar";
          overlay.appendChild(handle);
        });

        overlay.addEventListener("mousedown", event => {
          const handle = event.target.closest(".wordex-resize-handle");
          if (!handle) return;

          this.startObjectResizeDrag(event, handle.dataset.handle);
        });

        document.body.appendChild(overlay);
        this.resizeOverlay = overlay;
        return overlay;
      }

      hideObjectResizeOverlay() {
        if (this.resizeOverlay) {
          this.resizeOverlay.classList.remove("is-visible");
        }
      }

      removeObjectResizeOverlayFromClone(root) {
        root?.querySelectorAll?.(".wordex-resize-overlay").forEach(node => node.remove());
      }

      shouldDeferObjectSelectionSyncFromCaret() {
        return (
          this.primaryMouseButtonDown &&
          this.selectedObject?.matches?.(WordexEditor.objectSelector)
        );
      }

      updateObjectResizeOverlay() {
        if (this.isInsertingObject) {
          this.hideObjectResizeOverlay();
          return;
        }

        if (!this.isObjectResizeOverlayAllowed()) {
          this.hideObjectResizeOverlay();
          return;
        }

        this.ensureObjectResizeOverlay();

        requestAnimationFrame(() => {
          this.positionObjectResizeOverlay();
        });
      }

      refreshResizeOverlayRect(resizeInfo) {
        if (!resizeInfo) {
          return null;
        }

        if (resizeInfo.kind === "object") {
          const object = resizeInfo.object;

          if (object && this.isInDocument(object)) {
            const container =
              object.closest(WordexEditor.subParagraphSelector) ||
              object.closest(".paragraph");

            void container?.offsetHeight;
            void object.offsetHeight;
            return object.getBoundingClientRect();
          }
        }

        if (resizeInfo.kind === "sub-paragraph") {
          const sub = resizeInfo.sub;

          if (sub && this.isInDocument(sub)) {
            void sub.offsetHeight;
            return sub.getBoundingClientRect();
          }
        }

        if (resizeInfo.kind === "paragraph-container") {
          const paragraph = resizeInfo.paragraph;

          if (paragraph && this.isInDocument(paragraph)) {
            void paragraph.offsetHeight;
            return paragraph.getBoundingClientRect();
          }
        }

        if (String(resizeInfo.kind || "").startsWith("table-")) {
          const refreshed = this.getSelectedTableComponentResizeInfo();
          return refreshed?.rect || resizeInfo.rect;
        }

        return resizeInfo.rect;
      }

      positionObjectResizeOverlay() {
        if (!this.resizeOverlay) {
          this.hideObjectResizeOverlay();
          return;
        }

        const resizeInfo = this.getObjectResizeInfo();

        if (!resizeInfo) {
          this.hideObjectResizeOverlay();
          return;
        }

        const rect = this.refreshResizeOverlayRect(resizeInfo);

        if (!rect || rect.width <= 0 || rect.height <= 0) {
          this.hideObjectResizeOverlay();
          return;
        }

        this.resizeOverlay.dataset.resizeTarget = resizeInfo.kind;
        this.resizeOverlay.style.left = rect.left + "px";
        this.resizeOverlay.style.top = rect.top + "px";
        this.resizeOverlay.style.width = rect.width + "px";
        this.resizeOverlay.style.height = rect.height + "px";
        this.resizeOverlay.classList.add("is-visible");
      }

      getObjectVisualXInsideBlock(object, container) {
        if (!object || !container) return 0;

        if (object.style.position === "absolute") {
          const left = Number.parseInt(object.style.left, 10);

          if (Number.isFinite(left)) {
            return left;
          }
        }

        const blockRect = container.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();
        return this.clamp(
          Math.round(objectRect.left - blockRect.left),
          0,
          Math.max(0, container.clientWidth)
        );
      }

      getObjectVisualYInsideBlock(object, container) {
        if (!object || !container) return 0;

        if (object.style.position === "absolute") {
          const top = Number.parseInt(object.style.top, 10);

          if (Number.isFinite(top)) {
            return top;
          }
        }

        const blockRect = container.getBoundingClientRect();
        const objectRect = object.getBoundingClientRect();
        return this.clamp(
          Math.round(objectRect.top - blockRect.top),
          0,
          Math.max(0, container.clientHeight)
        );
      }

      usesFreeAbsolutePosition(container) {
        return !!container?.matches?.(".paragraph, .wordex-sub-paragraph, .object-block, td");
      }

      getFreeObjectDisplay(object) {
        if (object.matches("table")) {
          return "table";
        }

        if (object.matches(".wordex-chart-box")) {
          return "flex";
        }

        if (object.matches(".wordex-textbox")) {
          return "block";
        }

        return "inline-flex";
      }

      normalizeFreeObjectsInContainer(container) {
        if (!container) {
          return;
        }

        if (container.matches(".paragraph")) {
          const subParagraphs = container.querySelectorAll(WordexEditor.subParagraphSelector);

          if (subParagraphs.length > 0) {
            subParagraphs.forEach(subParagraph => {
              this.normalizeFreeObjectsInContainer(subParagraph);
            });
            return;
          }
        }

        if (!this.usesFreeAbsolutePosition(container)) {
          return;
        }

        const objects = container.matches(".paragraph") && this.paragraphHasMainObject(container)
          ? container.querySelectorAll(WordexEditor.objectSelector)
          : container.querySelectorAll(`${WordexEditor.objectSelector}[data-align="free"]`);

        objects.forEach(object => {
          this.applyObjectFreePosition(
            object,
            container,
            this.getObjectVisualXInsideBlock(object, container),
            this.getObjectVisualYInsideBlock(object, container)
          );
          this.clampObjectInsideContainer(object, container);
        });

        this.updateFreeContainerBounds(container);
      }

      getObjectDragContainer(object) {
        if (!object) {
          return null;
        }

        const objectBlock = object.closest(".object-block");

        if (objectBlock) {
          return { mode: "objectBlock", container: objectBlock };
        }

        const tableCell = object.closest("td");

        if (tableCell && this.documentElement.contains(tableCell)) {
          return { mode: "tableCell", container: tableCell };
        }

        const subParagraph = object.closest(WordexEditor.subParagraphSelector);
        const paragraph = object.closest(".paragraph");

        if (subParagraph && paragraph && paragraph.contains(subParagraph)) {
          return { mode: "subParagraph", container: subParagraph };
        }

        if (paragraph) {
          return { mode: "paragraph", container: paragraph };
        }

        return null;
      }

      prepareObjectForFreeDrag(object, container) {
        if (!object || !container) {
          return;
        }

        if (object.dataset.align !== "free") {
          this.applyAlignment(object, "free");
        }

        this.applyObjectFreePosition(
          object,
          container,
          this.getObjectVisualXInsideBlock(object, container),
          this.getObjectVisualYInsideBlock(object, container)
        );
      }

      getDefaultObjectBottomGap() {
        return 4;
      }

      getObjectBottomGap(object) {
        const stored = Number.parseInt(object?.dataset?.blockBottomGap, 10);

        if (Number.isFinite(stored)) {
          return Math.max(0, stored);
        }

        const marginBottom = Number.parseInt(object?.style?.marginBottom, 10);

        if (Number.isFinite(marginBottom)) {
          return Math.max(0, marginBottom);
        }

        return this.getDefaultObjectBottomGap();
      }

      normalizeVerticalAlign(value) {
        const normalized = String(value || "").trim().toLowerCase();

        if (
          !normalized ||
          normalized === "none" ||
          normalized === "nenhum" ||
          normalized === "sem"
        ) {
          return "none";
        }

        if (normalized === "center" || normalized === "middle" || normalized === "centro") {
          return "middle";
        }

        if (
          normalized === "bottom" ||
          normalized === "base" ||
          normalized === "sope" ||
          normalized === "sopé" ||
          normalized === "rodape" ||
          normalized === "rodapé"
        ) {
          return "bottom";
        }

        return "top";
      }

      getTargetTextboxForVerticalAlign() {
        const liveObject = this.getLiveSelectedObject();

        if (liveObject?.matches?.(".wordex-textbox")) {
          return liveObject;
        }

        if (this.selectedObject?.matches?.(".wordex-textbox") &&
          this.documentElement.contains(this.selectedObject)) {
          return this.selectedObject;
        }

        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          return activeTextbox;
        }

        return null;
      }

      restoreTextboxDisplayMode(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const align = textbox.dataset.align || "free";

        if (textbox.style.position === "absolute") {
          textbox.style.display = this.getFreeObjectDisplay(textbox);
          return;
        }

        if (align === "left" || align === "right") {
          textbox.style.display = "block";
          return;
        }

        if (align === "center") {
          textbox.style.display = "block";
          return;
        }

        textbox.style.display = align === "free" ? "inline-block" : "";
      }

      syncTextboxContentVerticalAlignStyles(textbox) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const align = textbox.dataset.textVerticalAlign
          ? this.normalizeVerticalAlign(textbox.dataset.textVerticalAlign)
          : "none";

        textbox.style.flexDirection = "";
        textbox.style.justifyContent = "";

        if (align === "none") {
          delete textbox.dataset.textVerticalAlign;
          this.restoreTextboxDisplayMode(textbox);
          return;
        }

        textbox.dataset.textVerticalAlign = align;
        textbox.style.display = "flex";
        textbox.style.flexDirection = "column";

        if (align === "middle") {
          textbox.style.justifyContent = "center";
        } else if (align === "bottom") {
          textbox.style.justifyContent = "flex-end";
        } else {
          textbox.style.justifyContent = "flex-start";
        }
      }

      applyTextboxContentVerticalAlign(textbox, verticalAlign) {
        if (!textbox?.matches?.(".wordex-textbox")) {
          return;
        }

        const normalized = this.normalizeVerticalAlign(verticalAlign);

        if (normalized === "none") {
          delete textbox.dataset.textVerticalAlign;
        } else {
          textbox.dataset.textVerticalAlign = normalized;
        }

        this.syncTextboxContentVerticalAlignStyles(textbox);
        this.syncObjectAfterChangeAndKeepSelected(textbox);
        this.syncTextboxVerticalAlignSelect();
      }

      reapplyParagraphTextboxVerticalAligns(paragraph) {
        if (!paragraph) {
          return;
        }

        paragraph.querySelectorAll(".wordex-textbox").forEach(textbox => {
          if (textbox.dataset.textVerticalAlign) {
            this.syncTextboxContentVerticalAlignStyles(textbox);
          }
        });
      }

      applyTextboxVerticalAlign(verticalAlign, textbox = null) {
        const target = textbox ||
          this.verticalAlignTargetTextbox ||
          this.getTargetTextboxForVerticalAlign();

        if (!target) {
          alert("Selecione ou edite um textbox para alinhar o texto na vertical.");
          return;
        }

        this.applyTextboxContentVerticalAlign(target, verticalAlign);
      }

      prepareTextboxVerticalAlignSelect(event) {
        const textbox = this.getTargetTextboxForVerticalAlign();
        this.verticalAlignTargetTextbox = textbox || null;
        event?.stopPropagation?.();
      }

      onTextboxVerticalAlignChange() {
        const select = document.getElementById("textboxVerticalAlign");
        const value = String(select?.value || "").trim();

        if (!value) {
          return;
        }

        const textbox = this.getTargetTextboxForVerticalAlign();

        if (!textbox) {
          alert("Selecione ou edite um textbox para alinhar o texto na vertical.");
          select.value = "none";
          this.verticalAlignTargetTextbox = null;
          return;
        }

        this.verticalAlignTargetTextbox = textbox;
        this.applyTextboxContentVerticalAlign(textbox, value);
      }

      syncTextboxVerticalAlignSelect() {
        const select = document.getElementById("textboxVerticalAlign");

        if (!select) {
          return;
        }

        const textbox = this.getTargetTextboxForVerticalAlign();
        const hasTarget = !!textbox;

        if (textbox) {
          this.verticalAlignTargetTextbox = textbox;
        } else {
          this.verticalAlignTargetTextbox = null;
        }

        select.disabled = !hasTarget;

        if (!hasTarget) {
          select.value = "none";
          return;
        }

        const current = textbox.dataset.textVerticalAlign
          ? this.normalizeVerticalAlign(textbox.dataset.textVerticalAlign)
          : "none";

        if ([...select.options].some(option => option.value === current)) {
          select.value = current;
        } else {
          select.value = "none";
        }
      }

      resolveObjectBottomGap(object, bottomGap) {
        if (bottomGap === undefined) {
          return this.getObjectBottomGap(object);
        }

        const next = Math.max(0, Math.round(bottomGap));
        object.dataset.blockBottomGap = String(next);
        return next;
      }

      applyObjectFreePosition(object, container, x, y, bottomGap = undefined) {
        if (!object || !container) {
          return;
        }

        const wrapperWidth = container.clientWidth;
        const objectWidth = object.getBoundingClientRect().width;
        const objectHeight = object.getBoundingClientRect().height;
        const min = this.getObjectMinimumSize(object);
        const resolvedBottomGap = this.resolveObjectBottomGap(object, bottomGap);
        const inset = this.getSubParagraphObjectInsetPx(container);
        const edgeSlack = container.matches(".wordex-sub-paragraph") ? 0 : 4;

        const nextX = this.clamp(
          Math.round(x),
          inset,
          Math.max(inset, Math.floor(wrapperWidth - Math.max(objectWidth, min.width) - inset - edgeSlack))
        );
        let nextY = Math.max(inset, Math.round(y));

        if (container.matches("td")) {
          const maxY = Math.max(
            0,
            Math.floor(container.clientHeight - Math.max(objectHeight, min.height) - 4)
          );
          nextY = this.clamp(nextY, 0, maxY);
        } else if (container.matches(".wordex-sub-paragraph")) {
          const neededHeight = nextY + Math.max(objectHeight, min.height) + resolvedBottomGap;

          if (neededHeight > container.clientHeight) {
            container.style.minHeight = neededHeight + "px";
          }

          const limitHeight = Math.max(container.clientHeight, neededHeight);
          const maxY = Math.max(
            inset,
            Math.floor(limitHeight - Math.max(objectHeight, min.height) - resolvedBottomGap)
          );
          nextY = this.clamp(nextY, inset, maxY);
        } else if (container.matches(".paragraph")) {
          const neededHeight = nextY + Math.max(objectHeight, min.height) + resolvedBottomGap;

          if (neededHeight > container.clientHeight) {
            container.style.minHeight = neededHeight + "px";
          }
        } else {
          const neededHeight = nextY + Math.max(objectHeight, min.height) + 8;

          if (neededHeight > container.clientHeight) {
            container.style.minHeight = neededHeight + "px";
          }
        }

        object.dataset.blockX = String(nextX);
        object.dataset.blockY = String(nextY);
        object.dataset.align = "free";

        if (this.usesFreeAbsolutePosition(container)) {
          object.style.position = "absolute";
          object.style.float = "none";
          object.style.left = nextX + "px";
          object.style.top = nextY + "px";
          object.style.margin = "0";
          object.style.right = "";
          object.style.bottom = "";
          object.style.verticalAlign = "";
          object.style.display = this.getFreeObjectDisplay(object);
          object.style.zIndex = object.matches(".wordex-textbox") ? "2" : "1";

          if (object.matches(".wordex-textbox") && object.dataset.textVerticalAlign) {
            this.syncTextboxContentVerticalAlignStyles(object);
          }

          return;
        }

        object.style.float = "none";
        object.style.position = "";
        object.style.display = object.matches("table")
          ? "table"
          : (object.matches(".wordex-chart-box") ? "flex" : "inline-block");
        object.style.marginLeft = nextX + "px";
        object.style.marginTop = nextY + "px";
        object.style.marginRight = "8px";
        object.style.marginBottom = resolvedBottomGap + "px";
      }

      updateFreeContainerBounds(container) {
        if (!container) {
          return;
        }

        if (container.matches("td")) {
          container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            this.clampObjectInsideContainer(object, container);
          });
          return;
        }

        if (container.matches(WordexEditor.subParagraphSelector)) {
          let maxBottom = 0;

          container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            maxBottom = Math.max(maxBottom, this.getObjectBottomInFreeContainer(object, container));
          });

          if (maxBottom > 0) {
            container.style.minHeight = Math.max(18, maxBottom) + "px";
          }

          container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
            this.clampObjectPositionInsideSubParagraph(object, container);
          });

          this.updateSubParagraphEmptyState(container);
          return;
        }

        if (container.matches(".paragraph") && this.paragraphHasMainObject(container)) {
          const mainObjects = container.querySelectorAll(WordexEditor.mainObjectSelector);

          if (mainObjects.length === 1) {
            this.scheduleFitParagraphBlockToMainObject(mainObjects[0]);
            return;
          }
        }

        let maxBottom = 0;

        container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
          maxBottom = Math.max(maxBottom, this.getObjectBottomInFreeContainer(object, container));
        });

        if (maxBottom <= 0) {
          return;
        }

        const baseline = container.classList.contains("object-block") ? 24 : 18;
        container.style.minHeight = Math.max(baseline, maxBottom) + "px";
      }

      measureParagraphMainObjectLayout(object, paragraph) {
        const objectRect = object.getBoundingClientRect();
        const paragraphRect = paragraph.getBoundingClientRect();
        const objectHeight = Math.ceil(object.offsetHeight || objectRect.height);

        if (objectHeight <= 0) {
          return null;
        }

        const measuredTopGap = Math.max(0, Math.round(objectRect.top - paragraphRect.top));
        const storedY = Number.parseInt(object.dataset.blockY, 10);
        const marginTop = Number.parseInt(object.style.marginTop, 10);
        const absoluteTop = Number.parseInt(object.style.top, 10);
        const explicitTopGap = [
          Number.isFinite(storedY) ? storedY : null,
          Number.isFinite(marginTop) ? marginTop : null,
          Number.isFinite(absoluteTop) ? absoluteTop : null
        ].reduce((max, value) => (value === null ? max : Math.max(max, value)), 0);
        const topGap = Math.max(measuredTopGap, explicitTopGap);
        const bottomGap = this.getObjectBottomGap(object);

        return {
          objectHeight,
          topGap,
          bottomGap
        };
      }

      applyFloatedMainObjectVerticalGaps(object, topGap, bottomGap) {
        const align = object.dataset.align || "left";

        if (align === "free") {
          if (object.style.position === "absolute") {
            object.style.margin = "0";
            return;
          }

          const marginLeft = Number.parseInt(object.style.marginLeft, 10);
          const marginRight = Number.parseInt(object.style.marginRight, 10);
          const left = Number.isFinite(marginLeft) ? marginLeft : 0;
          const right = Number.isFinite(marginRight) ? marginRight : 8;

          object.style.margin = `${topGap}px ${right}px ${bottomGap}px ${left}px`;
          return;
        }

        if (align === "left") {
          object.style.margin = `0 10px ${bottomGap}px 0`;
          return;
        }

        if (align === "right") {
          object.style.margin = `0 0 ${bottomGap}px 10px`;
          return;
        }

        if (align === "center") {
          object.style.margin = `${topGap}px auto ${bottomGap}px`;
        }
      }

      fitParagraphBlockToMainObject(object) {
        if (!object?.matches?.(WordexEditor.mainObjectSelector)) {
          return;
        }

        const paragraph = object.closest(".paragraph");
        const subParagraph = object.closest(WordexEditor.subParagraphSelector);
        const layoutContainer = subParagraph || paragraph;

        if (!paragraph || !this.paragraphHasMainObject(paragraph)) {
          return;
        }

        const layout = this.measureParagraphMainObjectLayout(object, layoutContainer);

        if (!layout) {
          return;
        }

        this.applyFloatedMainObjectVerticalGaps(
          object,
          layout.topGap,
          layout.bottomGap
        );

        let neededHeight = layout.topGap + layout.objectHeight + layout.bottomGap;

        (subParagraph || paragraph).querySelectorAll(WordexEditor.objectSelector).forEach(item => {
          if (item === object) {
            return;
          }

          neededHeight = Math.max(
            neededHeight,
            this.getObjectBottomInFreeContainer(item, layoutContainer)
          );
        });

        const minHeightValue = Math.max(18, neededHeight) + "px";

        if (subParagraph) {
          subParagraph.style.minHeight = minHeightValue;
        } else {
          paragraph.style.minHeight = minHeightValue;
        }

        const block = this.findBlockById(paragraph.dataset.blockId);

        if (block) {
          block.style = block.style || {};
          block.style.minHeight = paragraph.style.minHeight;
        }

        this.reapplyParagraphTextboxVerticalAligns(paragraph);
      }

      scheduleFitParagraphBlockToMainObject(object) {
        if (!object?.matches?.(WordexEditor.mainObjectSelector)) {
          return;
        }

        const paragraph = object.closest(".paragraph");

        if (!paragraph || !this.paragraphHasMainObject(paragraph)) {
          return;
        }

        const mainObjects = paragraph.querySelectorAll(WordexEditor.mainObjectSelector);

        if (mainObjects.length !== 1) {
          return;
        }

        this.fitParagraphBlockToMainObject(object);

        requestAnimationFrame(() => {
          if (!this.documentElement.contains(object)) {
            return;
          }

          this.fitParagraphBlockToMainObject(object);

          if (!this.isInsertingObject) {
            this.positionObjectResizeOverlay();
          }
        });
      }

      getTableRowExplicitHeight(row) {
        if (!row) {
          return 0;
        }

        const rowHeight = Number.parseFloat(row.style.height);
        const cellHeight = Number.parseFloat(row.cells[0]?.style.height);
        const height = Number.isFinite(rowHeight) && rowHeight > 0
          ? rowHeight
          : (Number.isFinite(cellHeight) && cellHeight > 0 ? cellHeight : 0);

        return Math.ceil(height);
      }

      applyTableRowHeightFromReference(referenceRow, targetRow) {
        if (!targetRow || !referenceRow) {
          return;
        }

        let height = this.getTableRowExplicitHeight(referenceRow);

        if (height <= 0) {
          height = Math.ceil(referenceRow.getBoundingClientRect().height);
        }

        if (height <= 0) {
          return;
        }

        targetRow.style.height = height + "px";

        Array.from(targetRow.cells).forEach(cell => {
          cell.style.height = height + "px";
        });
      }

      measureTableRowContentHeight(row) {
        if (!row) {
          return 0;
        }

        row.style.height = "auto";

        Array.from(row.cells).forEach(cell => {
          cell.style.height = "auto";
        });

        void row.offsetHeight;

        let maxHeight = Math.ceil(row.getBoundingClientRect().height);

        Array.from(row.cells).forEach(cell => {
          maxHeight = Math.max(maxHeight, Math.ceil(cell.getBoundingClientRect().height));
        });

        return Math.max(18, maxHeight);
      }

      syncTableRowsHeightToContent(table, rows = null) {
        if (!this.isWordexTableObject(table)) {
          return;
        }

        const targetRows = Array.isArray(rows) && rows.length
          ? rows.filter(Boolean)
          : Array.from(table.rows);

        targetRows.forEach(row => {
          const neededHeight = this.measureTableRowContentHeight(row);

          if (neededHeight <= 0) {
            return;
          }

          row.style.height = neededHeight + "px";

          Array.from(row.cells).forEach(cell => {
            cell.style.height = neededHeight + "px";
          });
        });
      }

      syncTableLayoutAfterTextFormatting(table, rows = null) {
        if (!this.isWordexTableObject(table)) {
          return;
        }

        this.syncTableRowsHeightToContent(table, rows);
        this.syncTableLayoutAfterStructureChange(table);
      }

      syncTableLayoutAfterCellContentChange(cells) {
        const targets = Array.isArray(cells) ? cells.filter(Boolean) : [];

        if (!targets.length) {
          return;
        }

        const table = targets[0].closest(".wordex-table");

        if (!table || !this.isWordexTableObject(table)) {
          const paragraph = targets[0].closest(".paragraph");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
            this.saveUndoStateIfChanged();
          }

          return;
        }

        const rows = [...new Set(
          targets.map(cell => cell.parentElement).filter(Boolean)
        )];

        this.syncTableLayoutAfterTextFormatting(table, rows);
      }

      syncTableLayoutAfterStructureChange(table) {
        if (!this.isWordexTableObject(table)) {
          return;
        }

        this.syncObjectAfterChange(table);
        this.scheduleFitParagraphBlockToMainObject(table);
        this.syncFreeContainerBoundsForObject(table);
        this.positionObjectResizeOverlay();
      }

      measureTableContentHeight(table) {
        const rows = Array.from(table?.rows || []);

        if (rows.length === 0) {
          return 0;
        }

        /*
          O CSS do relatório paginado impõe min-height: 7mm nas células.
          Na geração fora do DOM, usamos um piso conservador para não subestimar
          a altura real depois que os dados expandem a tabela.
        */
        const reportCellMinPx = Math.ceil((7 * 96) / 25.4);
        let total = 0;

        rows.forEach(row => {
          const rowHeight = Number.parseFloat(row.style.height) ||
            Number.parseFloat(row.cells[0]?.style.height) ||
            18;

          total += Math.max(18, reportCellMinPx, Math.ceil(rowHeight));
        });

        return total + 2;
      }

      measureObjectContentHeight(object) {
        if (!object) {
          return 0;
        }

        if (this.isWordexTableObject(object)) {
          return this.measureTableContentHeight(object);
        }

        const styledHeight = Number.parseFloat(object.style.height);

        if (Number.isFinite(styledHeight) && styledHeight > 0) {
          return Math.ceil(styledHeight);
        }

        return Math.ceil(object.offsetHeight || object.getBoundingClientRect().height || 0);
      }

      getObjectBottomInGeneratedContainer(object, container) {
        if (!object || !container) {
          return 0;
        }

        if (
          this.usesFreeAbsolutePosition(container) &&
          object.style.position === "absolute" &&
          container.isConnected
        ) {
          const containerRect = container.getBoundingClientRect();
          const objectRect = object.getBoundingClientRect();

          if (containerRect.height > 0 && objectRect.height > 0) {
            return Math.max(0, Math.round(objectRect.bottom - containerRect.top + 8));
          }
        }

        const top = Number.parseInt(object.dataset.blockY, 10) ||
          Number.parseInt(object.style.top, 10) ||
          Number.parseInt(object.style.marginTop, 10) ||
          0;
        const bottomGap = container.matches(".paragraph")
          ? this.getObjectBottomGap(object)
          : 8;

        return top + this.measureObjectContentHeight(object) + bottomGap;
      }

      updateGeneratedFreeContainerBounds(container) {
        if (!container) {
          return;
        }

        if (container.matches(".paragraph") && this.paragraphHasMainObject(container)) {
          const mainObjects = container.querySelectorAll(WordexEditor.mainObjectSelector);

          if (mainObjects.length === 1) {
            this.fitGeneratedParagraphBlockToMainObject(mainObjects[0]);
            return;
          }
        }

        let maxBottom = 0;

        container.querySelectorAll(WordexEditor.objectSelector).forEach(object => {
          maxBottom = Math.max(
            maxBottom,
            this.getObjectBottomInGeneratedContainer(object, container)
          );
        });

        if (maxBottom <= 0) {
          return;
        }

        const baseline = container.classList.contains("object-block") ? 24 : 18;
        container.style.minHeight = Math.max(baseline, maxBottom) + "px";
      }

      fitGeneratedParagraphBlockToMainObject(object) {
        if (!object?.matches?.(WordexEditor.mainObjectSelector)) {
          return;
        }

        const paragraph = object.closest(".paragraph");

        if (!paragraph || !this.paragraphHasMainObject(paragraph)) {
          return;
        }

        const layout = this.measureParagraphMainObjectLayout(object, paragraph);

        if (!layout) {
          return;
        }

        this.applyFloatedMainObjectVerticalGaps(
          object,
          layout.topGap,
          layout.bottomGap
        );

        let neededHeight = layout.topGap + layout.objectHeight + layout.bottomGap;

        paragraph.querySelectorAll(WordexEditor.objectSelector).forEach(item => {
          if (item === object) {
            return;
          }

          neededHeight = Math.max(
            neededHeight,
            this.getObjectBottomInGeneratedContainer(item, paragraph)
          );
        });

        paragraph.style.minHeight = Math.max(18, neededHeight) + "px";

        const wrapper = paragraph.closest(".paragraph-block, .object-block");

        if (wrapper) {
          wrapper.style.minHeight = "";
        }
      }

      syncGeneratedFreeContainerBounds(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll(".paragraph").forEach(paragraph => {
          if (this.usesFreeAbsolutePosition(paragraph)) {
            this.updateGeneratedFreeContainerBounds(paragraph);
          }
        });

        container.querySelectorAll(".object-block").forEach(block => {
          if (this.usesFreeAbsolutePosition(block)) {
            this.updateGeneratedFreeContainerBounds(block);
          }
        });
      }

      getObjectBottomInFreeContainer(object, container) {
        if (!object || !container) {
          return 0;
        }

        if (
          this.usesFreeAbsolutePosition(container) &&
          object.style.position === "absolute" &&
          this.documentElement.contains(container)
        ) {
          const containerRect = container.getBoundingClientRect();
          const objectRect = object.getBoundingClientRect();
          const bottomGap = container.matches(".paragraph, .wordex-sub-paragraph")
            ? this.getObjectBottomGap(object)
            : 8;

          return Math.max(0, Math.round(objectRect.bottom - containerRect.top + bottomGap));
        }

        const top = Number.parseInt(object.style.top, 10) ||
          Number.parseInt(object.dataset.blockY, 10) ||
          Number.parseInt(object.style.marginTop, 10) ||
          0;
        const bottomGap = container.matches(".paragraph, .wordex-sub-paragraph")
          ? this.getObjectBottomGap(object)
          : 8;
        return top + object.offsetHeight + bottomGap;
      }

      getObjectLayoutBottomInContainer(object, container) {
        if (!object || !container) {
          return 0;
        }

        const top = Number.parseInt(object.style.top, 10) ||
          Number.parseInt(object.dataset.blockY, 10) ||
          Number.parseInt(object.style.marginTop, 10) ||
          0;
        const bottomGap = container.matches(".paragraph, .wordex-sub-paragraph")
          ? this.getObjectBottomGap(object)
          : 8;

        return top + this.measureObjectContentHeight(object) + bottomGap;
      }

      syncFreeContainerBoundsForObject(object) {
        if (!object) {
          return;
        }

        const container = this.getObjectDragContainer(object)?.container;

        if (container && this.usesFreeAbsolutePosition(container)) {
          this.updateFreeContainerBounds(container);
        }
      }

      syncObjectPositionInContainer(object, container, mode) {
        if (!object || !container) {
          return;
        }

        if (mode === "objectBlock") {
          this.syncStandaloneObjectFromDom(object);
          return;
        }

        if (mode === "paragraph" || mode === "subParagraph") {
          const paragraph = container.closest(".paragraph") || container;
          this.syncParagraphElement(paragraph);
          return;
        }

        if (mode === "tableCell") {
          this.syncObjectAfterChange(object);
        }
      }

      getObjectMinimumSize(object) {
        if (this.isWordexTableObject(object)) {
          return { width: 40, height: 24 };
        }

        if (object?.matches?.(".wordex-textbox")) {
          return { width: 24, height: 18 };
        }

        return { width: 40, height: 24 };
      }

      constrainObjectSize(object, width, height) {
        const min = this.getObjectMinimumSize(object);
        let newWidth = Math.max(min.width, Math.round(width));
        let newHeight = Math.max(min.height, Math.round(height));

        const objectBlock = object.closest(".object-block");

        if (objectBlock) {
          const wrapperWidth = objectBlock.clientWidth;
          const currentX = this.getObjectVisualXInsideBlock(object, objectBlock);
          const maxWidth = Math.max(min.width, wrapperWidth - currentX - 4);
          newWidth = Math.min(newWidth, maxWidth);
        }

        const subParagraph = object.closest(WordexEditor.subParagraphSelector);

        if (subParagraph) {
          newWidth = Math.min(newWidth, this.getMaxObjectWidthInSubParagraph(object, subParagraph));
        } else if (paragraph) {
          newWidth = Math.min(newWidth, this.getMaxObjectWidthInParagraph(object, paragraph));
        }

        const cell = object.closest("td");

        if (cell) {
          const padding = 4;
          const currentX = this.getObjectVisualXInsideBlock(object, cell);
          const currentY = this.getObjectVisualYInsideBlock(object, cell);
          const maxWidth = Math.max(min.width, cell.clientWidth - currentX - padding);
          const maxHeight = Math.max(min.height, cell.clientHeight - currentY - padding);
          newWidth = Math.min(newWidth, maxWidth);
          newHeight = Math.min(newHeight, maxHeight);
        }

        return { width: newWidth, height: newHeight };
      }

      applyObjectSizeInPixels(object, width, height) {
        const size = this.constrainObjectSize(object, width, height);

        object.style.width = size.width + "px";

        if (object.matches(".dynamic-image-box, .wordex-chart-box, .wordex-textbox")) {
          object.style.height = size.height + "px";

          if (object.matches(".wordex-chart-box")) {
            this.scheduleChartOverlayLayout(object);
          }
        } else if (this.isWordexTableObject(object)) {
          this.resizeTableRowsByTotalHeight(object, size.height);
        }

        const container = this.getObjectDragContainer(object)?.container;

        if (container && this.usesFreeAbsolutePosition(container)) {
          this.updateFreeContainerBounds(container);
        }

        if (!this.isInsertingObject) {
          this.positionObjectResizeOverlay();
        }

        return size;
      }

      startObjectResizeDrag(event, handleName) {
        const resizeInfo = this.getObjectResizeInfo();

        if (!resizeInfo) return;

        event.preventDefault();
        event.stopPropagation();

        const rect = resizeInfo.rect;

        if (resizeInfo.kind === "sub-paragraph") {
          const startWidths = resizeInfo.subs.map((subElement, subIndex) =>
            this.parseSubParagraphWidthPercent(
              subElement.style.width || resizeInfo.block?.subParagraphs?.[subIndex]?.style?.width,
              resizeInfo.subs.length
            )
          );

          this.resizeDrag = {
            kind: "sub-paragraph",
            handleName,
            paragraph: resizeInfo.paragraph,
            block: resizeInfo.block,
            index: resizeInfo.index,
            subs: resizeInfo.subs,
            startWidths,
            startClientX: event.clientX
          };

          document.body.classList.add("wordex-resizing");
          return;
        }

        if (resizeInfo.kind === "paragraph-container") {
          const wrapper = resizeInfo.paragraph.closest(".paragraph-block");

          this.resizeDrag = {
            kind: "paragraph-container",
            handleName,
            paragraph: resizeInfo.paragraph,
            block: resizeInfo.block,
            wrapper,
            startClientX: event.clientX,
            startClientY: event.clientY,
            startWidth: rect.width,
            startHeight: rect.height,
            startWidthPercent: this.parseSubParagraphWidthPercent(
              resizeInfo.paragraph.style.width,
              1
            ),
            startMinHeight: Number.parseInt(resizeInfo.paragraph.style.minHeight, 10) ||
              Math.round(rect.height)
          };

          document.body.classList.add("wordex-resizing");
          return;
        }

        if (resizeInfo.kind.startsWith("table-")) {
          this.resizeDrag = {
            kind: "table-component",
            mode: resizeInfo.mode,
            table: resizeInfo.table,
            cell: resizeInfo.cell,
            row: resizeInfo.row,
            columnIndex: resizeInfo.columnIndex,
            handleName,
            startClientX: event.clientX,
            startClientY: event.clientY,
            startWidth: rect.width,
            startHeight: rect.height
          };

          document.body.classList.add("wordex-resizing");
          return;
        }

        const object = resizeInfo.object || this.selectedObject;
        const objectBlock = object.closest(".object-block");
        const blockX = objectBlock
          ? this.getObjectVisualXInsideBlock(object, objectBlock)
          : 0;

        this.resizeDrag = {
          kind: "object",
          object,
          handleName,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startWidth: rect.width,
          startHeight: rect.height,
          startBlockX: blockX,
          objectBlock,
          wrapperWidth: objectBlock?.clientWidth || 0
        };

        document.body.classList.add("wordex-resizing");
      }

      applySubParagraphResizeFromDrag(drag, dx) {
        if (!drag?.paragraph || !drag.block || !Array.isArray(drag.startWidths)) {
          return;
        }

        const paragraphWidth = drag.paragraph.getBoundingClientRect().width;

        if (paragraphWidth <= 0) {
          return;
        }

        const minPercent = 8;
        const index = drag.index;

        if (index < 0 || index >= drag.startWidths.length - 1) {
          return;
        }

        const deltaPercent = (dx / paragraphWidth) * 100;
        const widths = drag.startWidths.slice();
        const pairTotal = widths[index] + widths[index + 1];
        widths[index] = this.clamp(
          widths[index] + deltaPercent,
          minPercent,
          pairTotal - minPercent
        );
        widths[index + 1] = pairTotal - widths[index];

        drag.subs.forEach((subElement, subIndex) => {
          const width = widths[subIndex].toFixed(4) + "%";
          subElement.style.flex = `0 0 ${width}`;
          subElement.style.width = width;
          subElement.style.maxWidth = width;

          if (drag.block.subParagraphs[subIndex]) {
