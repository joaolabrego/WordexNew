          this.selectedTableColumnIndices = [];
          this.selectedTableCells = [];
        }

        if (options.setAnchor !== false && cell && normalizedMode !== "table") {
          this.tableSelectionAnchor = this.getTableSelectionAnchorFromCell(
            table,
            cell,
            normalizedMode
          );
        } else if (normalizedMode === "table") {
          this.tableSelectionAnchor = null;
        }

        if (this.selectedTableMode !== "cell") {
          const selection = window.getSelection();

          if (selection) {
            selection.removeAllRanges();
          }

          this.savedRange = null;
        }

        const paragraph = table.closest(".paragraph");
        const block = table.closest(".paragraph-block, .object-block");
        const region = table.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.macroPickerActiveTable = table;
        this.renderSelection();
      }

      normalizeTableRowType(rowType) {
        return String(rowType || "").trim();
      }

      normalizeLegacyTableFooterRows(container) {
        if (!container) return;

        container.querySelectorAll?.('tr[data-wordex-row-type="TableHeader"]').forEach(row => {
          row.dataset.wordexRowType = "TableHeader";
          this.updateTableRowTypeLabel(row);
        });

        container.querySelectorAll?.('tr[data-wordex-row-type="TableFooter"]').forEach(row => {
          row.dataset.wordexRowType = "TableFooter";
          this.updateTableRowTypeLabel(row);
        });
      }

      getTableRowDatasource(row) {
        return String(row?.dataset?.wordexDatasource || "").trim();
      }

      getTableRowTypeLabel(row) {
        if (!row) return "";

        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
        const datasource = this.getTableRowDatasource(row);

        if (rowType === "TableHeader") {
          return "TableHeader | ROOT";
        }

        if (rowType === "TableFooter") {
          return datasource ? `TableFooter | ${datasource}` : "TableFooter";
        }

        if (rowType === "Free") {
          return datasource ? `Free | ${datasource}` : "Free";
        }

        const parts = [];

        if (rowType) parts.push(rowType);
        if (datasource) parts.push(datasource);

        return parts.join(" | ");
      }

      updateTableRowTypeLabel(row) {
        if (!row) return;

        const label = this.getTableRowTypeLabel(row);

        if (label) {
          row.title = label;
        } else {
          row.removeAttribute("title");
        }

        Array.from(row.cells || []).forEach(cell => {
          delete cell.dataset.rowTypeLabel;
        });
      }

      shouldDecolumnizeTableRow(table, row, rowType) {
        /*
          A descolunização pertence ao tipo da linha, não à posição.
          Qualquer linha GroupHeader vira uma célula única
          com colspan total.
        */
        if (row?.dataset?.wordexManualColumns === "1") {
          return false;
        }

        rowType = this.normalizeTableRowType(rowType);
        return rowType === "GroupHeader" || rowType === "TableHeader";
      }

      isFreeTableRow(row) {
        return this.normalizeTableRowType(row?.dataset?.wordexRowType || "") === "Free";
      }

      getTableDetailRowIndex(table) {
        return Array.from(table?.rows || []).findIndex(row => {
          return this.normalizeTableRowType(row.dataset.wordexRowType || "") === "Detail";
        });
      }

      getTableDetailRow(table) {
        const rowIndex = this.getTableDetailRowIndex(table);

        return rowIndex >= 0 ? table.rows[rowIndex] : null;
      }

      getTableDetailColumnCount(table) {
        const detailRow = this.getTableDetailRow(table);

        if (!detailRow) {
          return this.getTableColumnCount(table);
        }

        return Math.max(
          1,
          this.getTableRowLogicalColumnSpan(detailRow) || this.getTableColumnCount(table)
        );
      }

      getTableDetailFieldsFromTable(table) {
        const detailRow = this.getTableDetailRow(table);

        if (!detailRow) {
          return [];
        }

        return Array.from(detailRow.cells).map((cell, index) => {
          const html = String(cell.innerHTML || "");
          const macroMatch = html.match(/\{\{\s*([^{}]+?)\s*\}\}/);
          const macroPath = macroMatch ? macroMatch[1].trim() : "";
          const name = macroPath
            ? macroPath.split(".").filter(Boolean).pop() || macroPath
            : String(cell.textContent || "").trim() || `Coluna${index + 1}`;

          return { name };
        });
      }

      recolumnizeTableRowToDetailColumns(table, row) {
        if (!table || !row) {
          return;
        }

        const cols = this.getTableDetailColumnCount(table);
        this.recolumnizeTableRow(table, row, cols);
        this.ensureTableRowLogicalColumnCount(table, row, cols);
      }

      resolveFreeRowDatasourceForInsert(table, insertRowIndex, previousRow) {
        const detailRowIndex = this.getTableDetailRowIndex(table);
        const previousDatasource = this.getTableRowDatasource(previousRow) || "ROOT";

        if (detailRowIndex < 0 || insertRowIndex <= detailRowIndex) {
          return previousDatasource;
        }

        return this.getDatasourceParentPath(previousDatasource) || "ROOT";
      }

      resolveFreeRowDatasourceAtPosition(table, rowIndex) {
        const previousRow = table?.rows?.[rowIndex - 1];

        if (!previousRow) {
          return "ROOT";
        }

        return this.resolveFreeRowDatasourceForInsert(table, rowIndex, previousRow);
      }

      canSwapLogicalColumnsInRow(row, leftLogicalCol) {
        const rightLogicalCol = leftLogicalCol + 1;
        const leftSlot = this.getTableCellAtLogicalColumn(row, leftLogicalCol);
        const rightSlot = this.getTableCellAtLogicalColumn(row, rightLogicalCol);

        if (!leftSlot?.cell || !rightSlot?.cell) {
          return false;
        }

        if (leftSlot.logicalStart !== leftLogicalCol || rightSlot.logicalStart !== rightLogicalCol) {
          return false;
        }

        if (leftSlot.span !== 1 || rightSlot.span !== 1) {
          return false;
        }

        if ((Number(leftSlot.cell.rowSpan) || 1) > 1 || (Number(rightSlot.cell.rowSpan) || 1) > 1) {
          return false;
        }

        return leftSlot.cell.parentElement === row && rightSlot.cell.parentElement === row;
      }

      swapAdjacentTableCells(cellA, cellB) {
        if (!cellA || !cellB || cellA === cellB) {
          return false;
        }

        const parent = cellA.parentElement;

        if (!parent || cellB.parentElement !== parent) {
          return false;
        }

        if (cellA.nextSibling === cellB) {
          parent.insertBefore(cellB, cellA);
          return true;
        }

        if (cellB.nextSibling === cellA) {
          parent.insertBefore(cellA, cellB);
          return true;
        }

        const nextAfterA = cellA.nextSibling;
        parent.insertBefore(cellA, cellB.nextSibling);
        parent.insertBefore(cellB, nextAfterA);
        return true;
      }

      swapLogicalColumnsInRow(row, leftLogicalCol) {
        const rightLogicalCol = leftLogicalCol + 1;
        const leftSlot = this.getTableCellAtLogicalColumn(row, leftLogicalCol);
        const rightSlot = this.getTableCellAtLogicalColumn(row, rightLogicalCol);

        return this.swapAdjacentTableCells(leftSlot?.cell, rightSlot?.cell);
      }

      moveTableColumn(step) {
        const selection = this.requireTableColumnStructureSelection(
          "Selecione uma coluna com Ctrl+clique na tabela para mover."
        );

        if (!selection) {
          return;
        }

        const table = selection.table;
        const columnIndex = selection.columnIndex;
        const totalCols = this.getTableColumnCount(table);
        const targetIndex = columnIndex + step;

        if (targetIndex < 0 || targetIndex >= totalCols) {
          alert("A coluna não pode ser movida para fora da tabela.");
          return;
        }

        const leftCol = Math.min(columnIndex, targetIndex);
        let swappedAny = false;

        Array.from(table.rows).forEach(row => {
          if (!this.canSwapLogicalColumnsInRow(row, leftCol)) {
            return;
          }

          if (this.swapLogicalColumnsInRow(row, leftCol)) {
            swappedAny = true;
          }
        });

        if (!swappedAny) {
          alert("Não foi possível mover a coluna (mesclagens ou linhas colunizadas impedem a troca).");
          return;
        }

        this.normalizeTableRowsAfterMerge(table);
        this.syncObjectAfterChange(table);

        const anchorRow = table.rows[0] || table.rows[1];
        const anchorCell = anchorRow
          ? this.getTableCellAtLogicalColumn(anchorRow, targetIndex)?.cell
          : null;

        this.selectTableComponent(table, anchorCell, "column", {
          columnIndices: [targetIndex]
        });
        this.saveUndoStateIfChanged();
      }

      moveTableStructure(step) {
        if (this.selectedTableMode === "column" && this.getSelectedTableColumnIndices().length) {
          this.moveTableColumn(step);
          return;
        }

        if (this.selectedTableMode === "row" && this.selectedTableRow) {
          this.moveFreeTableRow(step);
          return;
        }

        alert("Selecione uma linha ou coluna com Ctrl+clique na tabela para mover.");
      }

      moveTableStructureBackward() {
        this.moveTableStructure(-1);
      }

      moveTableStructureForward() {
        this.moveTableStructure(1);
      }

      moveFreeTableRow(step) {
        const context = this.requireTableRowStructureSelection(
          "Selecione uma linha Free com Ctrl+clique na tabela para mover."
        );

        if (!context) {
          return;
        }

        if (!this.isFreeTableRow(context.row)) {
          alert("Selecione uma linha Free para mover.");
          return;
        }

        const table = context.table;
        const rows = Array.from(table.rows);
        const rowIndex = rows.indexOf(context.row);
        const newIndex = rowIndex + step;

        const isStatic = this.isStaticTable(table);

        if (isStatic) {
          if (newIndex < 0 || newIndex >= rows.length) {
            alert("A linha não pode ser movida para fora da tabela.");
            return;
          }
        } else if (newIndex <= 0 || newIndex >= rows.length - 1) {
          alert("A linha Free não pode ultrapassar o TableHeader nem o TableFooter.");
          return;
        }

        const movingRow = context.row;
        const columnIndex = Math.max(0, context.columnIndex);

        if (step < 0) {
          table.insertBefore(movingRow, table.rows[newIndex]);
        } else {
          const afterReference = table.rows[newIndex + 1] || null;
          table.insertBefore(movingRow, afterReference);
        }

        if (!isStatic) {
          const updatedIndex = Array.from(table.rows).indexOf(movingRow);
          this.setTableRowDatasource(
            movingRow,
            this.resolveFreeRowDatasourceAtPosition(table, updatedIndex)
          );
        }

        const selectedCell = movingRow.cells[columnIndex] || movingRow.cells[0] || null;
        this.syncObjectAfterChange(table);
        this.selectTableComponent(table, selectedCell, "row");
        this.saveUndoStateIfChanged();
      }

      moveFreeTableRowUp() {
        this.moveTableStructureBackward();
      }

      moveFreeTableRowDown() {
        this.moveTableStructureForward();
      }

      canInsertFreeTableRowAt(table, insertRowIndex) {
        const rowCount = table?.rows?.length || 0;

        if (this.isStaticTable(table)) {
          return insertRowIndex > 0 && insertRowIndex <= rowCount;
        }

        if (rowCount < 3) {
          return false;
        }

        return insertRowIndex > 0 && insertRowIndex < rowCount - 1;
      }

      splitOrderedMiddleRows(orderedMiddleRows = []) {
        const leadingFree = [];
        const structural = [];
        const trailingFree = [];
        let phase = "leading";

        orderedMiddleRows.forEach(entry => {
          if (entry.rowType === "Free") {
            if (phase === "leading") {
              leadingFree.push(entry);
            } else {
              phase = "trailing";
              trailingFree.push(entry);
            }

            return;
          }

          if (["GroupHeader", "Detail", "GroupFooter"].includes(entry.rowType)) {
            phase = "structural";
            structural.push(entry);
          }
        });

        return { leadingFree, structural, trailingFree };
      }

      createEmptyTableCell() {
        const td = document.createElement("td");
        td.contentEditable = "true";
        td.innerHTML = "<br>";
        return td;
      }

      getActiveTableForColumnEdit() {
        const table = this.selectedObject?.matches?.(".wordex-table")
          ? this.selectedObject
          : this.getSelectedTableContextWithoutAlert()?.table;

        if (!table) {
          alert("Selecione uma tabela.");
          return null;
        }

        return table;
      }

      requireTableRowStructureSelection(message = "Selecione uma linha com Ctrl+clique na tabela.") {
        const table = this.selectedObject?.matches?.(".wordex-table") ? this.selectedObject : null;

        if (!table || !this.documentElement.contains(table)) {
          alert("Selecione uma tabela.");
          return null;
        }

        if (this.selectedTableMode !== "row" || !this.selectedTableRow) {
          alert(message);
          return null;
        }

        const row = this.selectedTableRow;

        if (!row?.isConnected || row.closest(".wordex-table") !== table) {
          alert(message);
          return null;
        }

        const cell = this.selectedCell?.isConnected && row.contains(this.selectedCell)
          ? this.selectedCell
          : (this.getTableCellAtLogicalColumn(row, 0)?.cell || row.cells[0] || null);
        const columnIndex = cell
          ? this.getCellLogicalColumnIndex(row, cell)
          : 0;

        return {
          table,
          row,
          cell,
          columnIndex: Math.max(0, columnIndex)
        };
      }

      requireTableColumnStructureSelection(message = "Selecione uma coluna com Ctrl+clique na tabela.") {
        const table = this.selectedObject?.matches?.(".wordex-table") ? this.selectedObject : null;

        if (!table || !this.documentElement.contains(table)) {
          alert("Selecione uma tabela.");
          return null;
        }

        if (this.selectedTableMode !== "column") {
          alert(message);
          return null;
        }

        const columnIndices = this.getSelectedTableColumnIndices();

        if (!columnIndices.length) {
          alert(message);
          return null;
        }

        const columnIndex = columnIndices[0];
        const anchorRow = table.rows[0] || table.rows[1];
        const cell = anchorRow
          ? (this.getTableCellAtLogicalColumn(anchorRow, columnIndex)?.cell || anchorRow.cells[0] || null)
          : null;

        return {
          table,
          columnIndex,
          cell
        };
      }

      insertTableStructure() {
        if (this.selectedTableMode === "column" && this.getSelectedTableColumnIndices().length) {
          this.insertTableColumn();
          return;
        }

        if (this.selectedTableMode === "row" && this.selectedTableRow) {
          this.insertFreeTableRow();
          return;
        }

        alert("Selecione uma linha ou coluna com Ctrl+clique na tabela.");
      }

      deleteTableStructure() {
        if (this.selectedTableMode === "column" && this.getSelectedTableColumnIndices().length) {
          this.deleteTableColumn();
          return;
        }

        if (this.selectedTableMode === "row" && this.selectedTableRow) {
          this.deleteFreeTableRow();
          return;
        }

        alert("Selecione uma linha ou coluna com Ctrl+clique na tabela.");
      }

      resolveTableColumnEditIndex(table, mode = "insert") {
        const totalCols = this.getTableColumnCount(table);
        const columnIndices = this.getSelectedTableColumnIndices();

        if (columnIndices.length > 0) {
          if (mode === "insert") {
            return Math.min(totalCols, Math.max(...columnIndices) + 1);
          }

          return columnIndices[0];
        }

        if (this.selectedTableMode === "column" && Number.isInteger(this.selectedTableColumnIndex)) {
          return mode === "insert"
            ? this.selectedTableColumnIndex + 1
            : this.selectedTableColumnIndex;
        }

        const context = this.getSelectedTableContextWithoutAlert();

        if (context?.table === table && Number.isInteger(context.columnIndex)) {
          return mode === "insert" ? context.columnIndex + 1 : context.columnIndex;
        }

        if (mode === "insert") {
          return totalCols;
        }

        return Math.max(0, totalCols - 1);
      }

      prepareTableRowForColumnEdit(table, row) {
        if (!table || !row || row.dataset.wordexDecolumnized !== "1") {
          return;
        }

        const cols = this.getTableColumnCount(table);
        this.recolumnizeTableRow(table, row, cols);
      }

      insertLogicalColumnInRow(row, logicalIndex) {
        const insertAt = Math.max(0, logicalIndex);
        let logical = 0;

        for (const cell of Array.from(row.cells)) {
          const span = Number(cell.colSpan) || 1;
          const cellStart = logical;
          const cellEnd = logical + span - 1;

          if (insertAt < cellStart) {
            row.insertBefore(this.createEmptyTableCell(), cell);
            return true;
          }

          if (insertAt > cellEnd) {
            logical += span;
            continue;
          }

          const offset = insertAt - cellStart;

          if (offset === 0) {
            row.insertBefore(this.createEmptyTableCell(), cell);
            return true;
          }

          const leftSpan = offset;
          const rightSpan = span - offset;
          const newCell = this.createEmptyTableCell();
          cell.colSpan = leftSpan;
          cell.insertAdjacentElement("afterend", newCell);

          if (rightSpan > 1) {
            const rightCell = this.createEmptyTableCell();
            rightCell.colSpan = rightSpan;
            newCell.insertAdjacentElement("afterend", rightCell);
          }

          return true;
        }

        row.appendChild(this.createEmptyTableCell());
        return true;
      }

      deleteLogicalColumnInRow(row, logicalIndex) {
        let logical = 0;

        for (const cell of Array.from(row.cells)) {
          const span = Number(cell.colSpan) || 1;
          const cellStart = logical;

          if (logicalIndex < cellStart || logicalIndex >= cellStart + span) {
            logical += span;
            continue;
          }

          if (span === 1) {
            cell.remove();
            return true;
          }

          const offset = logicalIndex - cellStart;

          if (offset === 0 || offset === span - 1) {
            cell.colSpan = span - 1;
            return true;
          }

          const leftSpan = offset;
          const rightSpan = span - offset - 1;
          cell.colSpan = leftSpan;

          if (rightSpan > 0) {
            const rightCell = this.createEmptyTableCell();
            rightCell.colSpan = rightSpan;
            cell.insertAdjacentElement("afterend", rightCell);
          }

          return true;
        }

        return false;
      }

      insertColumnInTableRow(table, row, insertAt) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (
          row.dataset.wordexDecolumnized === "1" &&
          row.cells.length === 1 &&
          insertAt >= (Number(row.cells[0].colSpan) || 1)
        ) {
          const cell = row.cells[0];
          cell.colSpan = (Number(cell.colSpan) || 1) + 1;
          row.dataset.wordexOriginalColumnCount = String(cell.colSpan);
          this.updateTableRowTypeLabel(row);
          return;
        }

        this.prepareTableRowForColumnEdit(table, row);
        this.insertLogicalColumnInRow(row, insertAt);

        if (!this.shouldDecolumnizeTableRow(table, row, rowType)) {
          row.dataset.wordexManualColumns = "1";
        }
      }

      deleteColumnInTableRow(table, row, deleteAt) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (row.dataset.wordexDecolumnized === "1" && row.cells.length === 1) {
          const cell = row.cells[0];
          const span = Number(cell.colSpan) || 1;

          if (span > 1) {
            cell.colSpan = span - 1;
            row.dataset.wordexOriginalColumnCount = String(cell.colSpan);
            this.updateTableRowTypeLabel(row);
            return true;
          }

          this.prepareTableRowForColumnEdit(table, row);
        } else {
          this.prepareTableRowForColumnEdit(table, row);
        }

        if (!this.deleteLogicalColumnInRow(row, deleteAt)) {
          return false;
        }

        if (!this.shouldDecolumnizeTableRow(table, row, rowType)) {
          row.dataset.wordexManualColumns = "1";
        }

        return true;
      }

      finalizeTableRowsAfterColumnEdit(table) {
        const cols = this.getTableColumnCount(table);

        Array.from(table.rows).forEach(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

          if (this.shouldDecolumnizeTableRow(table, row, rowType)) {
            this.decolumnizeTableRow(table, row, rowType, cols);
            return;
          }

          this.updateTableRowTypeLabel(row);
        });
      }

      insertTableColumn() {
        const selection = this.requireTableColumnStructureSelection();

        if (!selection) {
          return;
        }

        const table = selection.table;
        const insertAt = this.resolveTableColumnEditIndex(table, "insert");

        Array.from(table.rows).forEach(row => {
          this.insertColumnInTableRow(table, row, insertAt);
        });

        this.finalizeTableRowsAfterColumnEdit(table);
        this.normalizeTableRowsAfterMerge(table);
        this.syncObjectAfterChange(table);

        const anchorRow = table.rows[0] || table.rows[1];
        const anchorCell = anchorRow
          ? this.getTableCellAtLogicalColumn(anchorRow, insertAt)?.cell
          : null;

        this.selectTableComponent(table, anchorCell, "column", {
          columnIndices: [insertAt]
        });
        this.saveUndoStateIfChanged();
      }

      deleteTableColumn() {
        const selection = this.requireTableColumnStructureSelection();

        if (!selection) {
          return;
        }

        const table = selection.table;

        if (this.getTableColumnCount(table) <= 1) {
          alert("A tabela precisa manter ao menos uma coluna.");
          return;
        }

        const deleteAt = this.resolveTableColumnEditIndex(table, "delete");
        let deletedAny = false;

        Array.from(table.rows).forEach(row => {
          if (this.deleteColumnInTableRow(table, row, deleteAt)) {
            deletedAny = true;
          }
        });

        if (!deletedAny) {
          alert("Não foi possível excluir a coluna selecionada.");
          return;
        }

        this.finalizeTableRowsAfterColumnEdit(table);
        this.normalizeTableRowsAfterMerge(table);
        this.syncObjectAfterChange(table);

        const nextColumnIndex = Math.min(deleteAt, this.getTableColumnCount(table) - 1);
        const anchorRow = table.rows[0] || table.rows[1];
        const anchorCell = anchorRow
          ? this.getTableCellAtLogicalColumn(anchorRow, nextColumnIndex)?.cell
          : null;

        this.selectTableComponent(table, anchorCell, "column", {
          columnIndices: [nextColumnIndex]
        });
        this.saveUndoStateIfChanged();
      }

      appendMergedCellContent(targetCell, sourceCell) {
        if (!targetCell || !sourceCell || this.isCellHtmlEmpty(sourceCell.innerHTML)) {
          return;
        }

        if (!this.isCellHtmlEmpty(targetCell.innerHTML)) {
          targetCell.insertAdjacentHTML("beforeend", "<br>");
        }

        targetCell.insertAdjacentHTML("beforeend", sourceCell.innerHTML);
      }

      mergeRectangularTableCells(table, cells) {
        const uniqueCells = [...new Set((cells || []).filter(cell => cell?.isConnected))];

        if (uniqueCells.length < 2) {
          return false;
        }

        const positions = uniqueCells.map(cell => {
          const row = cell.parentElement;

          return {
            cell,
            row,
            rowIndex: this.getTableRowIndex(table, row),
            logicalCol: this.getCellLogicalColumnIndex(row, cell),
            rowSpan: Number(cell.rowSpan) || 1,
            colSpan: Number(cell.colSpan) || 1
          };
        });

        if (positions.some(position => position.rowSpan !== 1 || position.colSpan !== 1)) {
          return false;
        }

        const minRow = Math.min(...positions.map(position => position.rowIndex));
        const maxRow = Math.max(...positions.map(position => position.rowIndex));
        const minCol = Math.min(...positions.map(position => position.logicalCol));
        const maxCol = Math.max(...positions.map(position => position.logicalCol));
        const rectCells = [];

        for (let rowIndex = minRow; rowIndex <= maxRow; rowIndex++) {
          const row = table.rows[rowIndex];

          if (!row || !this.isCellMergeRowEligible(row)) {
            return false;
          }

          for (let logicalCol = minCol; logicalCol <= maxCol; logicalCol++) {
            const slot = this.getTableCellAtLogicalColumn(row, logicalCol);

            if (!slot?.cell) {
              return false;
            }

            if (!rectCells.includes(slot.cell)) {
              rectCells.push(slot.cell);
            }
          }
        }

        if (rectCells.length !== uniqueCells.length) {
          return false;
        }

        const anchor = this.getTableCellAtLogicalColumn(table.rows[minRow], minCol)?.cell;

        if (!anchor) {
          return false;
        }

        for (let rowIndex = minRow; rowIndex <= maxRow; rowIndex++) {
          const row = table.rows[rowIndex];

          for (let logicalCol = maxCol; logicalCol >= minCol; logicalCol--) {
            const slot = this.getTableCellAtLogicalColumn(row, logicalCol);

            if (!slot?.cell || slot.cell === anchor) {
              continue;
            }

            this.appendMergedCellContent(anchor, slot.cell);
            slot.cell.remove();
          }
        }

        anchor.colSpan = maxCol - minCol + 1;
        anchor.rowSpan = maxRow - minRow + 1;
        table.rows[minRow].dataset.wordexManualColumns = "1";
        return true;
      }

      mergeSelectedTableComponents() {
        const table = this.selectedObject?.matches?.(".wordex-table")
          ? this.selectedObject
          : this.getSelectedTableContext()?.table;

        if (!table) {
          alert("Selecione uma tabela.");
          return;
        }

        this.mergeSelectedTableCells(table);
      }

      mergeSelectedTableCells(table) {
        const cells = this.getSelectedTableCells();

        if (cells.length < 2) {
          alert("Selecione ao menos duas células contíguas.");
          return;
        }

        const positions = cells.map(cell => ({
          cell,
          rowIndex: this.getTableRowIndex(table, cell.parentElement),
          logicalCol: this.getCellLogicalColumnIndex(cell.parentElement, cell)
        }));

        for (const position of positions) {
          const row = position.cell.parentElement;

          if (!row || !this.isCellMergeRowEligible(row)) {
            alert("Não é possível mesclar células em TableHeader ou Detail.");
            return;
          }
        }

        const minRow = Math.min(...positions.map(position => position.rowIndex));
        const minCol = Math.min(...positions.map(position => position.logicalCol));

        if (!this.mergeRectangularTableCells(table, cells)) {
          alert("Selecione um bloco retangular contíguo de células.");
          return;
        }

        const anchorCell = this.getTableCellAtLogicalColumn(table.rows[minRow], minCol)?.cell ||
          cells[0];

        this.normalizeTableRowsAfterMerge(table);
        this.syncObjectAfterChange(table);
        this.selectTableComponent(table, anchorCell, "cell", {
          cells: [anchorCell]
        });
        this.saveUndoStateIfChanged();
      }

      insertFreeTableRow() {
        const context = this.requireTableRowStructureSelection();

        if (!context) {
          return;
        }

        const table = context.table;
        const rows = Array.from(table.rows);
        const rowIndex = rows.indexOf(context.row);
        const isStatic = this.isStaticTable(table);

        if (!isStatic && (rowIndex <= 0 || rowIndex >= rows.length - 1)) {
          alert("Selecione uma linha entre o TableHeader e o TableFooter.");
          return;
        }

        const insertIndex = rowIndex + 1;

        if (!this.canInsertFreeTableRowAt(table, insertIndex)) {
          alert(
            isStatic
              ? "Não foi possível inserir a linha nesta posição."
              : "Linhas Free só podem ficar entre o TableHeader e o TableFooter."
          );
          return;
        }

        const cols = isStatic
          ? this.getTableColumnCount(table)
          : this.getTableDetailColumnCount(table);
        const newRow = table.insertRow(insertIndex);

        for (let column = 0; column < cols; column++) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          newRow.appendChild(td);
        }

        newRow.dataset.wordexRowType = "Free";

        if (isStatic) {
          this.updateTableRowTypeLabel(newRow);
        } else {
          const freeDatasource = this.resolveFreeRowDatasourceForInsert(
            table,
            insertIndex,
            context.row
          );

          this.setTableRowDatasource(newRow, freeDatasource);
          this.recolumnizeTableRowToDetailColumns(table, newRow);
        }

        this.applyTableRowHeightFromReference(context.row, newRow);
        this.syncTableLayoutAfterStructureChange(table);
        this.selectTableComponent(table, context.cell, "row");
        this.saveUndoStateIfChanged();
      }

      deleteFreeTableRow() {
        const context = this.requireTableRowStructureSelection();

        if (!context) {
          return;
        }

        if (!this.isFreeTableRow(context.row)) {
          alert("Só é possível excluir linhas Free.");
          return;
        }

        const table = context.table;
        const rows = Array.from(table.rows);
        const rowIndex = rows.indexOf(context.row);
        const columnIndex = Math.max(0, context.columnIndex);

        const isStatic = this.isStaticTable(table);

        if (isStatic) {
          if (rows.length <= 1) {
            alert("A tabela precisa manter ao menos uma linha.");
            return;
          }
        } else if (rowIndex <= 0 || rowIndex >= rows.length - 1) {
          alert("Esta linha não pode ser excluída.");
          return;
        }

        table.deleteRow(rowIndex);

        if (!isStatic) {
          this.ensureTableBoundaryRowTypes(table);
        }

        const targetRow = table.rows[rowIndex] || table.rows[rowIndex - 1] || table.rows[0] || null;
        const targetCell = targetRow
          ? (this.getTableCellAtLogicalColumn(targetRow, columnIndex)?.cell || targetRow.cells[0] || null)
          : null;

        this.syncTableLayoutAfterStructureChange(table);

        if (targetCell) {
          this.selectTableComponent(table, targetCell, "row");
        } else {
          this.selectObject(table);
        }

        this.saveUndoStateIfChanged();
      }

      isCellHtmlEmpty(html) {
        const text = String(html || "")
          .replace(/<br\s*\/?\s*>/gi, "")
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      decolumnizeTableRow(table, row, rowType, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const columnCount = Math.max(
          1,
          Number(totalColumns) || this.getTableColumnCount(table)
        );

        const firstCell = row.cells[0];
        const extraCells = Array.from(row.cells).slice(1);

        /*
          Preserva algum conteúdo que eventualmente exista nas demais células,
          antes de remover as células excedentes.
        */
        extraCells.forEach(cell => {
          if (!this.isCellHtmlEmpty(cell.innerHTML)) {
            if (!this.isCellHtmlEmpty(firstCell.innerHTML)) {
              firstCell.insertAdjacentHTML("beforeend", "<br>");
            }

            firstCell.insertAdjacentHTML("beforeend", cell.innerHTML);
          }

          cell.remove();
        });

        firstCell.colSpan = columnCount;
        firstCell.contentEditable = "true";

        row.dataset.wordexDecolumnized = "1";
        row.dataset.wordexOriginalColumnCount = String(columnCount);
        this.updateTableRowTypeLabel(row);
      }

      recolumnizeTableRow(table, row, totalColumns = null) {
        if (!table || !row || row.cells.length === 0) return;

        const firstCell = row.cells[0];
        const columnCount = Math.max(
          1,
          Number(totalColumns) ||
            Number(row.dataset.wordexOriginalColumnCount) ||
            Number(firstCell.colSpan) ||
            this.getTableColumnCount(table)
        );

        firstCell.colSpan = 1;

        delete row.dataset.wordexDecolumnized;
        delete row.dataset.wordexOriginalColumnCount;

        while (row.cells.length < columnCount) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          row.appendChild(td);
        }
      }

      normalizeTableRowColumnsForType(table, row, rowType) {
        if (!table || !row) return;

        if (this.shouldDecolumnizeTableRow(table, row, rowType)) {
          this.decolumnizeTableRow(table, row, rowType);
          return;
        }

        this.recolumnizeTableRowToDetailColumns(table, row);
      }

      resetStructuralFootersLayout() {
        const table = this.selectedObject?.matches?.(".wordex-table")
          ? this.selectedObject
          : this.getSelectedTableContext()?.table;

        if (!table) {
          alert("Selecione uma tabela.");
          return;
        }

        const detailFields = this.getTableDetailFieldsFromTable(table);
        const cols = this.getTableDetailColumnCount(table);
        let resetCount = 0;

        Array.from(table.rows).forEach(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

          if (rowType !== "GroupFooter" && rowType !== "TableFooter") {
            return;
          }

          delete row.dataset.wordexManualColumns;
          delete row.dataset.wordexDecolumnized;
          delete row.dataset.wordexOriginalColumnCount;

          this.recolumnizeTableRow(table, row, cols);

          const footerDatasource = this.getTableRowDatasource(row);

          if (rowType === "GroupFooter") {
            this.populateGroupFooterRow(row, footerDatasource, detailFields);
          } else {
            this.populateTableFooterRow(row, footerDatasource, detailFields);
          }

          this.updateTableRowTypeLabel(row);
          resetCount += 1;
        });

        if (!resetCount) {
          alert("Não há footers estruturais nesta tabela.");
          return;
        }

        const firstFooterRow = Array.from(table.rows).find(row => {
          const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");
          return rowType === "GroupFooter" || rowType === "TableFooter";
        });

        this.syncTableLayoutAfterStructureChange(table);
        this.enterTableCellEditMode(firstFooterRow?.cells?.[0] || null);
        this.saveUndoStateIfChanged();
      }

      isCaretInEditableTableCell() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          cell = this.getTableCellFromRangeSelection(window.getSelection());
        }

        if (!cell && this.savedRange) {
          cell = this.getTableCellFromRange(this.savedRange);
        }

        return !!(cell && this.documentElement.contains(cell));
      }

      isTableCellTextEditingContext() {
        const liveObject = this.getLiveSelectedObject();

        if (liveObject && this.isWordexTableObject(liveObject)) {
          const mode = this.selectedTableMode || "table";

          if (mode === "row" || mode === "column") {
            return false;
          }

          if (mode === "cell" && this.getSelectedTableCells().length > 0) {
            return true;
          }
        }

        if (this.isCaretInEditableTableCell()) {
          if (liveObject && !this.isWordexTableObject(liveObject)) {
            return false;
          }

          if (liveObject && this.isWordexTableObject(liveObject)) {
            const mode = this.selectedTableMode || "table";

            /*
              Com a tabela inteira selecionada (Ctrl+clique), a toolbar deve
              formatar todas as células — não só a célula do cursor.
            */
            if (mode === "table" && this.selectedObject === liveObject) {
              return false;
            }

            return mode === "cell" || mode === "table";
          }

          return true;
        }

        if (
          this.selectedCell &&
          this.documentElement.contains(this.selectedCell) &&
          !liveObject
        ) {
          return true;
        }

        return false;
      }

      getActiveTableCellForTextFormatting() {
        if (this.selectedTableMode === "cell") {
          const selectedCells = this.getSelectedTableCells();

          if (selectedCells.length === 1) {
            return selectedCells[0];
          }

          if (selectedCells.length > 1) {
            return selectedCells[0];
          }
        }

        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          cell = this.getTableCellFromRangeSelection(window.getSelection());
        }

        if (!cell && this.savedRange) {
          cell = this.getTableCellFromRange(this.savedRange);
        }

        return cell && this.documentElement.contains(cell) ? cell : null;
      }

      getTableCellsForTextFormatting() {
        if (this.selectedTableMode === "cell") {
          const selectedCells = this.getSelectedTableCells();

          if (selectedCells.length > 0) {
            return selectedCells;
          }
        }

        const cell = this.getActiveTableCellForTextFormatting();

        return cell ? [cell] : [];
      }

      getTableCellsForObjectFormatting(table) {
        if (!this.isWordexTableObject(table)) {
          return [];
        }

        const mode = this.selectedTableMode || "table";

        if (mode === "row") {
          const rowIndices = this.getSelectedTableRowIndices();

          if (rowIndices.length) {
            return rowIndices.flatMap(rowIndex => {
              const row = table.rows[rowIndex];
              return row ? Array.from(row.cells) : [];
            });
          }
        }

        if (mode === "column") {
          const columnIndices = this.getSelectedTableColumnIndices();

          if (columnIndices.length) {
            const cells = [];

            Array.from(table.rows).forEach(row => {
              columnIndices.forEach(columnIndex => {
                const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

                if (slot?.cell) {
                  cells.push(slot.cell);
                }
              });
            });

            return cells;
          }
        }

        return Array.from(table.querySelectorAll("td"));
      }

      getTextStyleAtSelection(fallbackElement = null) {
        const selection = window.getSelection();
        let styleSource = fallbackElement;

        if (selection?.rangeCount) {
          const node = selection.getRangeAt(0).startContainer;
          const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
          const scoped = element?.closest?.("span, td, .paragraph, .wordex-textbox");

          if (scoped && this.documentElement.contains(scoped)) {
            styleSource = scoped;
          }
        }

        if (!styleSource) {
          return null;
        }

        const computed = window.getComputedStyle(styleSource);
        const inline = styleSource.style || {};

        return {
          fontFamily: inline.fontFamily || computed.fontFamily,
          fontSize: inline.fontSize || computed.fontSize,
          color: inline.color || computed.color
        };
      }

      syncTextToolbarControls() {
        let styleSource = null;

        if (this.isTableCellTextEditingContext()) {
          styleSource = this.getActiveTableCellForTextFormatting();
        } else if (this.getActiveTextboxForTextEditing()) {
          styleSource = this.getActiveTextboxForTextEditing();
        } else if (this.getLiveSelectedObject()?.matches?.(".wordex-textbox")) {
          styleSource = this.getLiveSelectedObject();
        } else if (this.selectedObject && this.isWordexTableObject(this.selectedObject)) {
          const cells = this.getTableCellsForObjectFormatting(this.selectedObject);
          styleSource = cells[0] || this.selectedObject.querySelector("td");
        }

        if (!styleSource) {
          return;
        }

        const style = this.getTextStyleAtSelection(styleSource);
        const fontFamily = document.getElementById("fontFamily");
        const fontSize = document.getElementById("fontSize");
        const fontColor = document.getElementById("fontColor");

        if (!style) {
          return;
        }

        if (fontFamily) {
          fontFamily.value = this.normalizeFontFamilyForSelect(style.fontFamily);
        }

        if (fontSize) {
          fontSize.value = this.normalizeFontSizeForSelect(style.fontSize);
        }

        if (fontColor) {
          fontColor.value = this.normalizeColorForInput(style.color);
        }
      }

      syncTableCellFormattingState(cells) {
        const targets = Array.isArray(cells) ? cells.filter(Boolean) : [];

        if (!targets.length) {
          return;
        }

        this.syncTableLayoutAfterCellContentChange(targets);
        this.renderSelection();
      }

      applyFormattingToTableCellContent(cell, style) {
        if (!cell || !style) {
          return;
        }

        this.applyStyleObject(cell, style);

        /*
          Texto pré-existente em spans (ou negrito etc.) mantém font-size próprio
          e ignora o estilo da célula. Propagar para todo o conteúdo inline.
        */
        cell.querySelectorAll("span, strong, em, b, i, u, font").forEach(node => {
          this.applyStyleObject(node, style);
        });

        if (style.fontSize) {
          cell.querySelectorAll("[style]").forEach(node => {
            if (node !== cell) {
              this.applyStyleObject(node, style);
            }
          });
        }
      }

      applyFormattingToActiveTableCell(style) {
        if (!this.isTableCellTextEditingContext()) {
          return false;
        }

        const cells = this.getTableCellsForTextFormatting();

        if (!cells.length) {
          return false;
        }

        cells.forEach(cell => {
          this.applyFormattingToTableCellContent(cell, style);
        });

        this.syncTableCellFormattingState(cells);
        return true;
      }

      clearTextEmphasisFromActiveTableCell() {
        if (!this.isTableCellTextEditingContext()) {
          return false;
        }

        const cells = this.getTableCellsForTextFormatting();

        if (!cells.length) {
          return false;
        }

        cells.forEach(cell => {
          this.clearTextEmphasisFromElement(cell);
          this.removeEmptyInlineStyleElements(cell);
        });

        this.syncTableCellFormattingState(cells);
        return true;
      }

      isCaretInParagraphTextOutsideMainObject(paragraph) {
        const selection = window.getSelection();

        if (!selection?.rangeCount || !paragraph) {
          return false;
        }

        const range = selection.getRangeAt(0);

        if (!paragraph.contains(range.commonAncestorContainer)) {
          return false;
        }

        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !element?.closest?.(WordexEditor.mainObjectSelector);
      }

      isTextToolbarContext() {
        const liveObject = this.getLiveSelectedObject();
        const activeTextbox = this.getActiveTextboxForTextEditing();
        const paragraph = this.getSelectedParagraphElement();

        if (liveObject?.matches?.(".dynamic-image-box")) {
          return false;
        }

        if (liveObject?.matches?.(".wordex-textbox")) {
          return true;
        }

        if (liveObject?.matches?.(".wordex-chart-box")) {
          return true;
        }

        if (liveObject && this.isWordexTableObject(liveObject)) {
          return true;
        }

        if (activeTextbox) {
          return true;
        }

        if (this.isTableCellTextEditingContext()) {
          return true;
        }

        if (!paragraph) {
          return false;
        }

        if (this.paragraphContainerSelected) {
          return false;
        }

        if (!this.paragraphHasMainObject(paragraph)) {
          return true;
        }

        return this.isCaretInParagraphTextOutsideMainObject(paragraph);
      }

      isAlignToolbarContext() {
        const liveObject = this.getLiveSelectedObject();
        const activeTextbox = this.getActiveTextboxForTextEditing();
        const paragraph = this.getSelectedParagraphElement();

        if (liveObject?.matches?.(".wordex-textbox")) {
          return true;
        }

        if (activeTextbox) {
          return true;
        }

        if (this.isTableCellTextEditingContext()) {
          return true;
        }

        if (!paragraph) {
          return false;
        }

        if (this.paragraphContainerSelected) {
          return false;
        }

        if (this.isSelectedSubParagraphAlignToolbarBlocked()) {
          return false;
        }

        if (!this.paragraphHasMainObject(paragraph)) {
          return true;
        }

        return this.isCaretInParagraphTextOutsideMainObject(paragraph);
      }

      isVerticalAlignToolbarContext() {
        return !!this.getTargetTextboxForVerticalAlign();
      }

      isBorderToolbarContext() {
        const liveObject = this.getLiveSelectedObject();

        if (liveObject && this.isWordexTableObject(liveObject)) {
          const mode = this.selectedTableMode || "table";
          return mode === "cell" || !!this.getCurrentTableBorderContext();
        }

        return !!this.getCurrentTableBorderContext() || !!this.getCurrentBoxBorderTarget();
      }

      isJsonMacrosToolbarContext() {
        if (this.isParagraphMacroToolbarActive()) {
          return true;
        }

        if (this.getTextboxForMacroInsertion()) {
          return true;
        }

        if (!this.getReportDataRootRecord()) {
          return false;
        }

        return !!(
          this.getActiveTableForMacroContext() ||
          this.isImageMacroToolbarActive() ||
          this.isChartMacroToolbarActive()
        );
      }

      getToolbarContextState() {
        const liveObject = this.getLiveSelectedObject();
        const isTable = !!(liveObject && this.isWordexTableObject(liveObject));
        const isChart = !!(liveObject && liveObject.matches(".wordex-chart-box"));
        const marginTarget = this.getCurrentMarginTarget();
        const hasJsonData = !!this.getReportDataRootRecord();

        return {
          insert: true,
          "delete-block": !!this.selectedParagraphId,
          page: true,
          output: true,
          "data-core": true,
          subparagraph: !!(this.getSelectedSubParagraphElement() || this.paragraphContainerSelected),
          "delete-subparagraph": (() => {
            if (!this.selectedSubParagraphId || this.paragraphContainerSelected) {
              return false;
            }

            const context = this.getSelectedBlockContext();

            return !!(context && context.block.type === "paragraph");
          })(),
          text: this.isTextToolbarContext(),
          align: this.isAlignToolbarContext(),
          "align-vertical": this.isVerticalAlignToolbarContext(),
          "chart-bar": isChart,
          border: this.isBorderToolbarContext(),
          table: isTable,
          margin: !!marginTarget,
          object: !!liveObject,
          "json-image": hasJsonData,
          "json-macros": this.isJsonMacrosToolbarContext()
        };
      }

      updateToolbarContext() {
        const state = this.getToolbarContextState();

        document.querySelectorAll("[data-wordex-toolbar-context]").forEach(element => {
          const contexts = String(element.dataset.wordexToolbarContext || "")
            .split(/\s+/)
            .map(context => context.trim())
            .filter(Boolean);
          const visible = contexts.some(context => !!state[context]);

          element.classList.toggle("wordex-toolbar-hidden", !visible);
        });

        if (!state.border) {
          this.closeBorderDropdown?.();
        }

        this.syncBorderMenuAvailability();

        if (this.getLiveSelectedObject()?.matches?.(".wordex-chart-box")) {
          this.syncChartToolbarControls();
        } else {
          this.syncParagraphToolbarControls();
        }

        this.syncBorderToolbarControls();
        this.syncTextToolbarControls();
        this.syncTableStructureToolbarControls();
        this.syncTextboxVerticalAlignSelect();
      }

      syncTableStructureToolbarControls() {
        const minusButton = document.getElementById("wordexTableMoveMinus");
        const plusButton = document.getElementById("wordexTableMovePlus");

        if (!minusButton || !plusButton) {
          return;
        }

        const isColumn =
          this.selectedObject?.matches?.(".wordex-table") &&
          this.selectedTableMode === "column" &&
          this.getSelectedTableColumnIndices().length > 0;

        if (isColumn) {
          minusButton.dataset.icon = "←";
          plusButton.dataset.icon = "→";
          minusButton.title = "Mover coluna selecionada para a esquerda (Ctrl+clique na coluna)";
          plusButton.title = "Mover coluna selecionada para a direita (Ctrl+clique na coluna)";
          minusButton.setAttribute("aria-label", "Mover coluna para a esquerda");
          plusButton.setAttribute("aria-label", "Mover coluna para a direita");
          return;
        }

        minusButton.dataset.icon = "↑";
        plusButton.dataset.icon = "↓";
        minusButton.title = "Mover linha selecionada para cima (Ctrl+clique na linha)";
        plusButton.title = "Mover linha selecionada para baixo (Ctrl+clique na linha)";
        minusButton.setAttribute("aria-label", "Mover linha para cima");
        plusButton.setAttribute("aria-label", "Mover linha para baixo");
      }

      syncParagraphToolbarControls() {
        if (this.selectedObject || this.isTableCellTextEditingContext()) {
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph) {
          return;
        }

        const block = this.findBlockById(paragraph.dataset.blockId);
        const style = this.getParagraphBlockTextStyle(block);
        const fontFamily = document.getElementById("fontFamily");
        const fontSize = document.getElementById("fontSize");
        const fontColor = document.getElementById("fontColor");

        if (fontFamily) {
          fontFamily.value = this.normalizeFontFamilyForSelect(style.fontFamily);
        }

        if (fontSize) {
          fontSize.value = this.normalizeFontSizeForSelect(style.fontSize);
        }

        if (fontColor) {
          fontColor.value = this.normalizeColorForInput(style.color);
        }
      }

      syncBorderMenuAvailability() {
        const noneButton = document.querySelector('#wordexBorderMenu button[data-border-preset="none"]');

        if (!noneButton) {
          return;
        }

        noneButton.disabled = false;
        noneButton.title = "Remover bordas";
      }

      syncBorderToolbarControls() {
        if (!this.isBorderToolbarContext()) {
          return;
        }

        const tableContext = this.getCurrentTableBorderContext();
        let styleSource = null;

        if (tableContext?.cell) {
          styleSource = tableContext.cell;
        } else if (tableContext?.table) {
          styleSource = tableContext.table;
        } else {
          const target = this.getCurrentBoxBorderTarget();
          styleSource = target?.element || null;
        }

        const borderColor = document.getElementById("borderColor");
        const borderWidth = document.getElementById("borderWidth");
        const borderStyle = document.getElementById("borderStyle");
        const borderRadius = document.getElementById("borderRadius");
        const settings = styleSource ? this.readBorderSettingsFromElement(styleSource) : null;

        if (!settings) {
          return;
        }

        if (borderColor) {
          borderColor.value = this.normalizeColorForInput(settings.color);
        }

        if (borderWidth) {
          borderWidth.value = this.normalizeBorderWidthForSelect(settings.width);
        }

        if (borderStyle) {
          borderStyle.value = this.normalizeBorderStyleForSelect(settings.style);
        }

        if (borderRadius) {
          borderRadius.value = this.normalizeBorderRadiusForSelect(settings.radius);
        }
      }

      getSelectedTableRowContextWithoutAlert() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) return null;

        return {
          table,
          row: cell.parentElement,
          cell,
          rowIndex: Array.from(table.rows).indexOf(cell.parentElement)
        };
      }

      askTableAlignment() {
        const value = prompt("Alinhamento: left, center, right ou justify", "left");

        if (!value) return null;

        const align = value.trim().toLowerCase();

        if (!["left", "center", "right", "justify"].includes(align)) {
          alert("Alinhamento inválido. Use left, center, right ou justify.");
          return null;
        }

        return align;
      }

      getSelectedTableContext() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            const node = selection.getRangeAt(0).commonAncestorContainer;
            const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
            cell = element?.closest("td") || null;
          }
        }

        if (!cell) {
          alert("Selecione uma célula da tabela.");
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          alert("A célula selecionada não pertence a uma tabela Wordex.");
          return null;
        }

        const row = cell.parentElement;

        return {
          table,
          cell,
          row,
          columnIndex: this.getCellLogicalColumnIndex(row, cell)
        };
      }

      getSelectedTableContextWithoutAlert() {
        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection && selection.rangeCount > 0) {
            cell = this.getTableCellFromRange(selection.getRangeAt(0));
          }
        }

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");

        if (!table) {
          return null;
        }

        const row = cell.parentElement;

        return {
          table,
          cell,
          row,
          columnIndex: this.getCellLogicalColumnIndex(row, cell)
        };
      }

      applyParagraphAlignToSelectedTableComponent(align) {
        const context = this.getSelectedTableContextWithoutAlert();

        if (!context) {
          return false;
        }

        const mode = this.selectedTableMode || "cell";

        /*
          v255: tabela inteira selecionada com Ctrl+click deve se comportar
          como objeto dentro do parágrafo. Assim, esquerda/centro/direita
          alinham a tabela no fluxo, em vez de alterar o texto das células.
          Célula, linha e coluna continuam alinhando o conteúdo interno.
        */
        if (mode === "table") {
          return false;
        }

        const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
          ? align
          : "";

        const applyToCell = cell => {
          if (cell) {
            cell.style.textAlign = normalizedAlign;
          }
        };

        if (mode === "row") {
          const rowIndices = this.getSelectedTableRowIndices().length
            ? this.getSelectedTableRowIndices()
            : [this.getTableRowIndex(context.table, context.row)];

          rowIndices.forEach(rowIndex => {
            const row = context.table.rows[rowIndex];

            if (row) {
              Array.from(row.cells).forEach(applyToCell);
            }
          });
        } else if (mode === "column") {
          const columnIndices = this.getSelectedTableColumnIndices().length
            ? this.getSelectedTableColumnIndices()
            : [context.columnIndex];

          Array.from(context.table.rows).forEach(row => {
            columnIndices.forEach(columnIndex => {
              const slot = this.getTableCellAtLogicalColumn(row, columnIndex);

              if (slot?.cell) {
                applyToCell(slot.cell);
              }
            });
          });
        } else if (mode === "table") {
          context.table.querySelectorAll("td").forEach(applyToCell);
        } else {
          this.getSelectedTableCells().forEach(applyToCell);
        }

        this.syncAndSelectTableComponent(context, mode === "table" ? "table" : mode);
        return true;
      }





      applyParagraphAlign(align) {
        /*
          Célula/linha/coluna/tabela continuam tendo prioridade sobre objetos
          selecionados anteriormente.
        */
        if (this.applyParagraphAlignToSelectedTableComponent(align)) {
          return;
        }

        const selectedObject = this.getLiveSelectedObject();

        if (selectedObject?.matches?.(".wordex-textbox")) {
          this.applyTextboxTextAlign(selectedObject, align);
          return;
        }

        if (selectedObject) {
          const objectAlign = this.normalizeToolbarAlignForObject(align);
          this.applyAlignment(selectedObject, objectAlign);
          this.limitObjectWidthToParagraph(selectedObject);
          this.syncObjectAfterChangeAndKeepSelected(selectedObject);
          return;
        }

        const activeTextbox = this.getActiveTextboxForTextEditing();

        if (activeTextbox) {
          this.applyTextboxTextAlign(activeTextbox, align);
          return;
        }

        const subParagraph = this.getSelectedSubParagraphElement();

        if (subParagraph && !this.paragraphContainerSelected) {
          const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
            ? align
            : "";

          subParagraph.style.textAlign = normalizedAlign;

          const paragraph = subParagraph.closest(".paragraph");
          const block = this.findBlockById(paragraph?.dataset?.blockId);
          const subBlock = block?.subParagraphs?.find(item => item.id === subParagraph.dataset.subParagraphId);

          if (subBlock) {
            subBlock.style.textAlign = normalizedAlign;
          }

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph && this.paragraphContainerSelected) {
          return;
        }

        if (paragraph) {
          const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
            ? align
            : "";

          paragraph.style.textAlign = normalizedAlign;

          const block = this.findBlockById(paragraph.dataset.blockId);
          if (block) {
            block.style.textAlign = normalizedAlign;
          }
          return;
        }
      }

      applyTextboxTextAlign(textbox, align) {
        if (!textbox) return;

        const normalizedAlign = ["left", "center", "right", "justify"].includes(align)
          ? align
          : "left";

        /*
          v253/v254: o textbox precisa ter alinhamento interno próprio.
          Quando o parágrafo é alinhado, o objeto acompanha visualmente o fluxo,
          mas o texto interno não deve herdar o text-align do parágrafo.
          Com textbox selecionado (Ctrl+click), os botões Alinhar atuam só
          no texto interno — não movem/redimensionam a caixa.
        */
        textbox.style.textAlign = normalizedAlign;

        if (this.selectedObject === textbox || this.getActiveTextboxForTextEditing() === textbox) {
          this.syncObjectAfterChange(textbox);
          return;
        }

        this.syncObjectAfterChangeAndKeepSelected(textbox);
      }

      getLiveSelectedObject() {
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          this.selectedObject.matches?.(WordexEditor.objectSelector)
        ) {
          return this.selectedObject;
        }

        return null;
      }

      getActiveTextboxForTextEditing() {
        const liveObject = this.getLiveSelectedObject();

        if (liveObject && !liveObject.matches?.(".wordex-textbox")) {
          return null;
        }

        const activeElement = document.activeElement;
        const activeTextbox = activeElement?.closest?.(".wordex-textbox") || null;

        if (activeTextbox && this.documentElement.contains(activeTextbox)) {
          return activeTextbox;
        }

        const selection = window.getSelection();

        if (selection?.rangeCount) {
          const textboxFromSelection = this.getTextboxFromRange(selection.getRangeAt(0));

          if (textboxFromSelection) {
            return textboxFromSelection;
          }
        }

        if (document.activeElement?.closest?.(".toolbar")) {
          const textboxFromSavedRange = this.getTextboxFromRange(this.savedRange);

          if (textboxFromSavedRange) {
            return textboxFromSavedRange;
          }
        }

        return null;
      }

      normalizeToolbarAlignForObject(align) {
        if (align === "left" || align === "center" || align === "right") {
          return align;
        }

        return "free";
      }

      applyFormatting(style) {
        if (this.applyFormattingToSelectedText(style)) {
          return;
        }

        if (this.selectedObject && this.isWordexTableObject(this.selectedObject)) {
          const mode = this.selectedTableMode || "table";

          if (mode === "cell" && this.getSelectedTableCells().length > 0) {
            if (this.applyFormattingToActiveTableCell(style)) {
              return;
            }
          } else {
            this.applyFormattingToSelectedObject(style);
            return;
          }
        }

        if (this.applyFormattingToActiveTableCell(style)) {
          return;
        }

        if (this.selectedObject) {
          this.applyFormattingToSelectedObject(style);
          return;
        }

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          this.applyFormattingToParagraph(paragraph, style);
        }
      }

      applyFormattingToSelectedText(style) {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const paragraph = this.findParagraphElementFromNode(range.commonAncestorContainer);

        if (!paragraph || !this.documentElement.contains(paragraph)) {
          return false;
        }

        /*
          v247: quando o usuário seleciona um trecho que já está dentro de um
          span de formatação e muda o tamanho da fonte de volta, não podemos
          simplesmente criar outro span dentro do anterior. O span antigo fica
          segurando a altura da linha mesmo que o texto visível volte ao tamanho
          normal. Nesse caso, reaproveitamos o span existente e atualizamos sua
          formatação em vez de aninhar outro.
        */
        const existingSpan = this.findFormattingSpanCoveredByRange(range, paragraph);

        if (existingSpan) {
          this.applyStyleObject(existingSpan, style);
          existingSpan.querySelectorAll("span").forEach(child => {
            this.applyStyleObject(child, style);
          });

          this.removeEmptyInlineStyleElements(paragraph);

          selection.removeAllRanges();

          const newRange = document.createRange();
          newRange.selectNodeContents(existingSpan);
          selection.addRange(newRange);

          this.finalizeParagraphFormatting(paragraph, true);
          return true;
        }

        const span = document.createElement("span");
        this.applyStyleObject(span, style);

        try {
          range.surroundContents(span);
        } catch {
          const contents = range.extractContents();
          span.appendChild(contents);
          range.insertNode(span);
        }

        selection.removeAllRanges();

        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        selection.addRange(newRange);

        this.finalizeParagraphFormatting(paragraph, true);

        return true;
      }

      findFormattingSpanCoveredByRange(range, paragraph) {
        if (!range || !paragraph) return null;

        const startElement = range.startContainer.nodeType === Node.ELEMENT_NODE
          ? range.startContainer
          : range.startContainer.parentElement;

        const endElement = range.endContainer.nodeType === Node.ELEMENT_NODE
          ? range.endContainer
          : range.endContainer.parentElement;

        if (!startElement || !endElement) return null;

        const selectedText = String(range.toString() || "").trim();

        if (!selectedText) return null;

        const candidates = [];
        let current = startElement;

        while (current && current !== paragraph) {
          if (
            current instanceof HTMLSpanElement &&
            current.contains(endElement) &&
            paragraph.contains(current)
          ) {
            const spanText = String(current.textContent || "").trim();

            if (spanText === selectedText) {
              candidates.push(current);
            }
          }

          current = current.parentElement;
        }

        /*
          Retorna o span mais externo que ainda corresponde exatamente ao texto
          selecionado. Se existir um span antigo grande envolvendo um span novo
          pequeno, atualizar o externo é o que permite a altura da linha voltar.
        */
        return candidates.length ? candidates[candidates.length - 1] : null;
      }

      finalizeParagraphFormatting(paragraph, updateSelectionIds = false) {
        if (!paragraph) return;

        if (updateSelectionIds) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        }

        const activeCell = this.isCaretInEditableTableCell()
          ? this.getActiveTableCellForTextFormatting()
          : null;

        if (activeCell && paragraph.contains(activeCell)) {
          this.syncTableLayoutAfterCellContentChange([activeCell]);
          this.renderSelection();
          return;
        }

        const selection = window.getSelection();
        const textbox = selection?.rangeCount
          ? this.getTextboxFromRange(selection.getRangeAt(0))
          : null;

        if (textbox && paragraph.contains(textbox)) {
          this.syncParagraphElement(paragraph);
          this.refreshLayoutAfterTextContentChange(paragraph, { textbox });
          this.renderSelection();

          if (!this.deferFormattingUndo) {
            this.saveUndoStateIfChanged();
          }

          return;
        }

        this.syncParagraphElement(paragraph);
        this.refreshLayoutAfterTextContentChange(paragraph);
        this.renderSelection();

        if (!this.deferFormattingUndo) {
          this.saveUndoStateIfChanged();
        }
      }

      applyFormattingToParagraph(paragraph, style) {
        const subParagraph =
          this.getSelectedSubParagraphElement() ||
          paragraph.querySelector(WordexEditor.subParagraphSelector);

        if (!subParagraph) {
          return;
        }

        this.applyStyleObject(subParagraph, style);

        const block = this.findBlockById(paragraph.dataset.blockId);

        if (block) {
          const subBlock = block.subParagraphs?.find(item => item.id === subParagraph.dataset.subParagraphId);

          if (subBlock) {
            subBlock.style = subBlock.style || {};
            subBlock.style.fontFamily = subParagraph.style.fontFamily || subBlock.style.fontFamily;
            subBlock.style.fontSize = subParagraph.style.fontSize || subBlock.style.fontSize;
            subBlock.style.color = subParagraph.style.color || subBlock.style.color || "#000000";
            subBlock.style.textAlign = subParagraph.style.textAlign || subBlock.style.textAlign;
          }
        }

        this.finalizeParagraphFormatting(paragraph);
      }

      applyFormattingToSelectedObject(style) {
        const object = this.selectedObject;

        if (!object) return;

        if (object.matches(".wordex-chart-box")) {
          this.applyChartTextStyle(object, style);
          this.updateChartBoxPresentation(object);
          this.syncObjectAfterChangeAndKeepSelected(object);
          return;
        }

        if (object.matches(".wordex-textbox")) {
          this.applyFormattingToTableCellContent(object, style);
          this.fitTextboxHeightToContent(object);

          const paragraph = object.closest(".paragraph");
          const subParagraph = object.closest(WordexEditor.subParagraphSelector);

          if (paragraph && subParagraph) {
            this.updateParagraphSubParagraphHeightsFromContent(paragraph, subParagraph);
            this.updateFreeContainerBounds(subParagraph);
          }

          this.syncObjectAfterChangeAndKeepSelected(object);
          requestAnimationFrame(() => this.positionObjectResizeOverlay());
          return;
        }

        /*
          Imagem: fonte/cor afetam apenas o rótulo visual do marcador.
          Tabela: fonte/cor afetam o conteúdo das células.
        */
        this.applyStyleObject(object, style);

        if (this.isWordexTableObject(object)) {
          const cells = this.getTableCellsForObjectFormatting(object);

          cells.forEach(cell => {
            this.applyFormattingToTableCellContent(cell, style);
          });
          this.syncTableLayoutAfterTextFormatting(object);
          this.syncObjectAfterChange(object);
          this.keepObjectSelected(object);
          return;
        }

        this.syncObjectAfterChangeAndKeepSelected(object);
      }

      applyStyleObject(element, style) {
        if (!element || !style) return;

        Object.entries(style).forEach(([key, value]) => {
          element.style[key] = value;

          if (key === "textDecoration") {
            element.style.textDecorationLine = value;
          }
        });
      }

      isPrimaryModifierPressed(event) {
        return !!(event && (event.ctrlKey || event.metaKey));
      }

      isWordexTableObject(object) {
        return !!(object && object.matches(".wordex-table"));
      }

      handleUndoShortcut(event) {
        if (event.wordexUndoHandled) {
          return false;
        }

        const key = String(event.key || "").toLowerCase();

        if (!this.isPrimaryModifierPressed(event)) {
          return false;
        }

        if (event.shiftKey || event.altKey || key !== "z") {
          return false;
        }

        /*
          Não sequestra Ctrl+Z em campos auxiliares do próprio navegador/editor.
        */
        const target = event.target;

        if (
          target?.closest?.(".toolbar") ||
          target?.matches?.("textarea, input, select")
        ) {
          return false;
        }

        event.preventDefault();
        event.stopPropagation();
        event.wordexUndoHandled = true;

        this.undoLastChange();
        return true;
      }

      getUndoSnapshot() {
        return JSON.stringify(this.wordexDocument);
      }

      resetUndoHistory() {
        const snapshot = this.getUndoSnapshot();

        this.undoStack = [snapshot];
        this.undoIndex = 0;
        this.lastUndoSnapshot = snapshot;
      }

      saveUndoCheckpointForParagraph(paragraphElement) {
        if (this.isRestoringUndo || !paragraphElement) return;

        this.syncParagraphElement(paragraphElement);
        this.saveUndoStateIfChanged();
      }

      syncDocumentFromDomForUndo() {
        if (!this.documentElement) return;

        this.documentElement.querySelectorAll(".paragraph").forEach(paragraphElement => {
          this.syncParagraphElement(paragraphElement);
        });

        this.documentElement.querySelectorAll(".object-block").forEach(wrapper => {
          const object = wrapper.querySelector(WordexEditor.objectSelector);

          if (object) {
            this.syncStandaloneObjectFromDom(object);
          }
        });
      }

      saveUndoStateIfChanged() {
        if (this.isRestoringUndo) return;

        const snapshot = this.getUndoSnapshot();
        const currentHistorySnapshot = this.undoStack[this.undoIndex];

        if (snapshot === currentHistorySnapshot) {
          this.lastUndoSnapshot = snapshot;
          return;
        }

        /*
          Se o usuário desfez e depois alterou o documento,
          descarta o futuro do histórico.
        */
        if (this.undoIndex < this.undoStack.length - 1) {
          this.undoStack = this.undoStack.slice(0, this.undoIndex + 1);
        }

        this.undoStack.push(snapshot);
        this.undoIndex = this.undoStack.length - 1;
        this.lastUndoSnapshot = snapshot;

        if (this.undoStack.length > this.maxUndoSteps) {
          this.undoStack.shift();
          this.undoIndex = Math.max(0, this.undoIndex - 1);
        }
      }

      countTablesInUndoSnapshot(snapshot) {
        return (String(snapshot || "").match(/wordex-table/g) || []).length;
      }

      undoSnapshotWouldLoseTables(storedSnapshot, liveSnapshot) {
        return (
          this.countTablesInUndoSnapshot(storedSnapshot) >
          this.countTablesInUndoSnapshot(liveSnapshot)
        );
      }

      undoLastChange() {
        if (this.undoStack.length === 0 || this.undoIndex <= 0) {
          alert("Nada para desfazer.");
          return;
        }

        /*
          Mescla edição de texto ainda não salva no índice atual (sem criar entrada nova).
          Se a sincronização omitir tabelas do HTML, não sobrescreve o snapshot guardado.
        */
        const storedSnapshot = this.undoStack[this.undoIndex];

        this.isRestoringUndo = true;
        this.syncDocumentFromDomForUndo();
        const liveSnapshot = this.getUndoSnapshot();

        if (!this.undoSnapshotWouldLoseTables(storedSnapshot, liveSnapshot)) {
          this.undoStack[this.undoIndex] = liveSnapshot;
          this.lastUndoSnapshot = liveSnapshot;
        }

        this.isRestoringUndo = false;

        this.undoIndex--;
        this.restoreUndoSnapshot(this.undoStack[this.undoIndex]);
      }

      restoreUndoSnapshot(snapshot) {
        try {
          this.isRestoringUndo = true;

          this.wordexDocument = JSON.parse(snapshot);
          this.lastUndoSnapshot = snapshot;

          this.clearSelection();
          this.render();
        } catch (error) {
          alert("Erro ao desfazer: " + error.message);
        } finally {
          this.isRestoringUndo = false;
        }
      }

      handleInlineObjectDelete(event) {
        if (event.key !== "Backspace" && event.key !== "Delete") {
          return false;
        }

        if (event.shiftKey || event.ctrlKey || event.altKey || event.metaKey) {
          return false;
        }

        /*
          Dentro de textbox, Backspace/Delete continua sendo edição normal.
          Dentro de célula de tabela, porém, o Wordex precisa conseguir
          selecionar/excluir objetos inseridos na célula.
        */
        if (event.target.closest(".wordex-textbox")) {
          return false;
        }

        const selection = window.getSelection();
        const range = selection && selection.rangeCount > 0
          ? selection.getRangeAt(0)
          : null;

        const activeCell =
          event.target.closest("td") ||
          this.getTableCellFromRange(range) ||
          this.selectedCell;

        /*
          Se uma célula está ativa, a tabela dona da célula também fica
          marcada como selectedObject para fins de edição da tabela.
          Nesse caso, Backspace/Delete NÃO pode apagar essa tabela inteira.
          Primeiro deve tentar achar objeto dentro da célula.
        */
        const selectedCellTable = activeCell?.closest?.(".wordex-table") || null;
        const selectedObjectIsOwnerTable =
          selectedCellTable &&
          this.selectedObject === selectedCellTable;

        /*
          Se já há um objeto selecionado, Backspace/Delete exclui esse objeto,
          exceto quando esse objeto é apenas a tabela dona da célula ativa.
        */
        if (
          this.selectedObject &&
          this.documentElement.contains(this.selectedObject) &&
          !selectedObjectIsOwnerTable
        ) {
          event.preventDefault();
          event.stopPropagation();
