        if (value.startsWith("PHN2Zy") || value.startsWith("PD94bW")) {
          return "image/svg+xml";
        }

        return "image/png";
      }

      wrapRawBase64AsDataUrl(value) {
        const base64 = String(value || "").trim().replace(/\s+/g, "");
        return `data:${this.guessBase64ImageMime(base64)};base64,${base64}`;
      }

      normalizeReportImageSource(value) {
        const src = String(value || "").trim();

        if (!src) {
          return "";
        }

        if (/^data:image\//i.test(src)) {
          return src;
        }

        if (this.looksLikeRawBase64Image(src)) {
          return this.wrapRawBase64AsDataUrl(src);
        }

        return src;
      }

      blobToDataUrl(blob) {
        return new Promise(resolve => {
          if (!blob) {
            resolve("");
            return;
          }

          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => resolve("");
          reader.readAsDataURL(blob);
        });
      }

      async fetchReportImageAsDataUrl(url) {
        const src = String(url || "").trim();

        if (!src || /^data:/i.test(src)) {
          return "";
        }

        try {
          const response = await fetch(src, {
            mode: "cors",
            credentials: "omit",
            cache: "force-cache"
          });

          if (!response.ok) {
            return "";
          }

          const blob = await response.blob();

          if (!String(blob.type || "").startsWith("image/")) {
            return "";
          }

          return await this.blobToDataUrl(blob);
        } catch (error) {
          return "";
        }
      }

      loadReportImageAsDataUrl(url, useCrossOrigin = true) {
        return new Promise(resolve => {
          const src = String(url || "").trim();

          if (!src) {
            resolve("");
            return;
          }

          if (/^data:/i.test(src)) {
            resolve(src);
            return;
          }

          const img = new Image();

          if (useCrossOrigin) {
            img.crossOrigin = "anonymous";
          }

          img.onload = () => {
            try {
              const canvas = document.createElement("canvas");
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              canvas.getContext("2d").drawImage(img, 0, 0);
              resolve(canvas.toDataURL("image/png"));
            } catch (error) {
              resolve("");
            }
          };

          img.onerror = () => resolve("");
          img.src = src;
        });
      }

      async ensureReportImageDataUrl(url) {
        const src = String(url || "").trim();

        if (!src) {
          return "";
        }

        const normalized = this.normalizeReportImageSource(src);

        if (/^data:image\//i.test(normalized)) {
          if (!/^data:/i.test(src)) {
            this.reportImageDataUrlCache[src] = normalized;
          }

          return normalized;
        }

        if (this.reportImageDataUrlCache[src]) {
          return this.reportImageDataUrlCache[src];
        }

        let dataUrl = await this.fetchReportImageAsDataUrl(src);

        if (!dataUrl) {
          dataUrl = await this.loadReportImageAsDataUrl(src, true);
        }

        if (!dataUrl) {
          dataUrl = await this.loadReportImageAsDataUrl(src, false);
        }

        if (dataUrl && dataUrl !== src) {
          this.reportImageDataUrlCache[src] = dataUrl;
          return dataUrl;
        }

        return src;
      }

      async prefetchReportImageDataUrls(data) {
        if (data === undefined || data === null) {
          return;
        }

        this.reportImageDataUrlCache = this.reportImageDataUrlCache || {};
        const urls = new Set();
        this.collectImageUrlsFromReportValue(data, urls);

        await Promise.all(
          Array.from(urls).map(url => this.ensureReportImageDataUrl(url))
        );
      }

      resolveReportImageSourceForOutput(url) {
        const src = String(url || "").trim();

        if (!src) {
          return "";
        }

        const normalized = this.normalizeReportImageSource(src);

        if (/^data:/i.test(normalized)) {
          return normalized;
        }

        return this.reportImageDataUrlCache?.[src] || normalized;
      }

      openGeneratedHtmlInNewTab(html) {
        this.openBlobContent(html, {
          mimeType: "text/html;charset=utf-8",
          target: "_blank",
          revokeMs: 60000
        });
      }

      static getTemplateHelpersScript() {
        return [
          "function applyTemplatePlaceholders(template, values) {",
          "  return String(template || \"\").replace(/@@([A-Z0-9_]+)@@/g, function (match, key) {",
          "    if (!Object.prototype.hasOwnProperty.call(values, key)) {",
          "      return match;",
          "    }",
          "    return String(values[key] ?? \"\");",
          "  });",
          "}",
          "",
          "function sanitizeOutputFileName(value, defaultName, ext) {",
          "  var name = String(value || \"\").trim().replace(/[\\\\/:*?\"<>|]+/g, \"_\");",
          "  if (!name) return defaultName;",
          "  var suffix = String(ext || \"\");",
          "  if (suffix && !new RegExp(suffix.replace(\".\", \"\\\\.\") + \"$\", \"i\").test(name)) {",
          "    name += suffix;",
          "  }",
          "  return name;",
          "}",
          "",
          "function sanitizeHtmlFileName(value) {",
          "  return sanitizeOutputFileName(value, \"Relatorio.html\", \".html\");",
          "}",
          "",
          "function sanitizeFileName(value) {",
          "  return sanitizeOutputFileName(value, \"Relatorio.pdf\", \".pdf\");",
          "}",
          "",
          "function blobToDataUrl(blob) {",
          "  return new Promise(function (resolve) {",
          "    if (!blob) {",
          "      resolve(\"\");",
          "      return;",
          "    }",
          "    var reader = new FileReader();",
          "    reader.onload = function () {",
          "      resolve(String(reader.result || \"\"));",
          "    };",
          "    reader.onerror = function () {",
          "      resolve(\"\");",
          "    };",
          "    reader.readAsDataURL(blob);",
          "  });",
          "}",
          "",
          "function fetchImageAsDataUrl(url) {",
          "  var src = String(url || \"\").trim();",
          "  if (!src || src.indexOf(\"data:\") === 0) {",
          "    return Promise.resolve(\"\");",
          "  }",
          "  return fetch(src, {",
          "    mode: \"cors\",",
          "    credentials: \"omit\",",
          "    cache: \"force-cache\"",
          "  })",
          "    .then(function (response) {",
          "      if (!response.ok) {",
          "        return \"\";",
          "      }",
          "      return response.blob();",
          "    })",
          "    .then(function (blob) {",
          "      if (!blob || String(blob.type || \"\").indexOf(\"image/\") !== 0) {",
          "        return \"\";",
          "      }",
          "      return blobToDataUrl(blob);",
          "    })",
          "    .catch(function () {",
          "      return \"\";",
          "    });",
          "}",
          "",
          "function rasterizeLoadedImageElement(img) {",
          "  if (!img || !img.naturalWidth || !img.naturalHeight) {",
          "    return \"\";",
          "  }",
          "  try {",
          "    var canvas = document.createElement(\"canvas\");",
          "    canvas.width = img.naturalWidth;",
          "    canvas.height = img.naturalHeight;",
          "    canvas.getContext(\"2d\").drawImage(img, 0, 0);",
          "    return canvas.toDataURL(\"image/png\");",
          "  } catch (error) {",
          "    return \"\";",
          "  }",
          "}",
          "",
          "function loadImageAsDataUrl(url, useCrossOrigin) {",
          "  return new Promise(function (resolve) {",
          "    var src = String(url || \"\").trim();",
          "    if (!src) {",
          "      resolve(\"\");",
          "      return;",
          "    }",
          "    if (src.indexOf(\"data:\") === 0) {",
          "      resolve(src);",
          "      return;",
          "    }",
          "    var img = new Image();",
          "    if (useCrossOrigin) {",
          "      img.crossOrigin = \"anonymous\";",
          "    }",
          "    img.onload = function () {",
          "      resolve(rasterizeLoadedImageElement(img));",
          "    };",
          "    img.onerror = function () {",
          "      resolve(\"\");",
          "    };",
          "    img.src = src;",
          "  });",
          "}",
          "",
          "function isProbablyCrossOriginUrl(url) {",
          "  var src = String(url || \"\").trim();",
          "  if (!src || src.indexOf(\"data:\") === 0 || src.indexOf(\"blob:\") === 0) {",
          "    return false;",
          "  }",
          "  try {",
          "    return new URL(src, window.location.href).origin !== window.location.origin;",
          "  } catch (error) {",
          "    return /^https?:/i.test(src);",
          "  }",
          "}",
          "",
          "function omitUnembeddableImage(cloneImg, src, skipped) {",
          "  if (!cloneImg) return;",
          "  cloneImg.removeAttribute(\"src\");",
          "  cloneImg.removeAttribute(\"crossorigin\");",
          "  cloneImg.setAttribute(\"data-wordex-pdf-omitted\", \"1\");",
          "  cloneImg.style.visibility = \"hidden\";",
          "  cloneImg.style.display = \"none\";",
          "  if (src && skipped && skipped.indexOf(src) === -1) {",
          "    skipped.push(src);",
          "  }",
          "}",
          "",
          "function resolveMappedImageDataUrl(src, imageDataUrlMap) {",
          "  var text = String(src || \"\").trim();",
          "  var map = imageDataUrlMap || {};",
          "  if (!text) {",
          "    return \"\";",
          "  }",
          "  if (map[text] && String(map[text]).indexOf(\"data:\") === 0) {",
          "    return String(map[text]);",
          "  }",
          "  return \"\";",
          "}",
          "",
          "function normalizeWordexSystemMacroName(path) {",
          "  return String(path || \"\").trim().replace(/^@+/, \"\").toLowerCase();",
          "}",
          "",
          "function isWordexSystemMacroPath(path) {",
          "  return String(path || \"\").trim().indexOf(\"@\") === 0;",
          "}",
          "",
          "function formatWordexSystemMacroDate(date, kind) {",
          "  var value = date instanceof Date ? date : new Date(date);",
          "  var pad = function (part) { return String(part).padStart(2, \"0\"); };",
          "  if (kind === \"dateiso\") {",
          "    return value.getFullYear() + \"-\" + pad(value.getMonth() + 1) + \"-\" + pad(value.getDate());",
          "  }",
          "  if (kind === \"time\") {",
          "    return pad(value.getHours()) + \":\" + pad(value.getMinutes()) + \":\" + pad(value.getSeconds());",
          "  }",
          "  if (kind === \"date\") {",
          "    return value.toLocaleDateString(\"pt-BR\");",
          "  }",
          "  return value.toLocaleString(\"pt-BR\", {",
          "    year: \"numeric\",",
          "    month: \"2-digit\",",
          "    day: \"2-digit\",",
          "    hour: \"2-digit\",",
          "    minute: \"2-digit\",",
          "    second: \"2-digit\"",
          "  });",
          "}",
          "",
          "function resolveWordexSystemMacroValue(path, options) {",
          "  options = options || {};",
          "  var name = normalizeWordexSystemMacroName(path);",
          "  if (!name) return null;",
          "  if (name === \"pagenumber\") {",
          "    return Number.isFinite(options.pageNumber) ? String(options.pageNumber) : null;",
          "  }",
          "  if (name === \"pagecount\") {",
          "    return Number.isFinite(options.pageCount) ? String(options.pageCount) : null;",
          "  }",
          "  var generationTime = options.generationTime || new Date();",
          "  if (name === \"today\") return formatWordexSystemMacroDate(generationTime, \"date\");",
          "  if (name === \"now\") return formatWordexSystemMacroDate(generationTime, \"datetime\");",
          "  if (name === \"dateiso\") return formatWordexSystemMacroDate(generationTime, \"dateiso\");",
          "  if (name === \"time\") return formatWordexSystemMacroDate(generationTime, \"time\");",
          "  if (name === \"year\") return String(generationTime.getFullYear());",
          "  if (name === \"month\") return String(generationTime.getMonth() + 1).padStart(2, \"0\");",
          "  if (name === \"day\") return String(generationTime.getDate()).padStart(2, \"0\");",
          "  return null;",
          "}",
          "",
          "function replaceWordexSystemMacrosInText(text, options) {",
          "  return String(text || \"\").replace(/\\{\\{\\s*([^{}]+?)\\s*\\}\\}/g, function (match, path) {",
          "    var trimmed = String(path || \"\").trim();",
          "    if (!isWordexSystemMacroPath(trimmed)) return match;",
          "    var resolved = resolveWordexSystemMacroValue(trimmed, options);",
          "    return resolved === null ? match : resolved;",
          "  });",
          "}",
          "",
          "function applyWordexSystemMacrosInElement(root, options) {",
          "  if (!root) return;",
          "  var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);",
          "  var textNodes = [];",
          "  while (walker.nextNode()) textNodes.push(walker.currentNode);",
          "  textNodes.forEach(function (node) {",
          "    node.nodeValue = replaceWordexSystemMacrosInText(node.nodeValue || \"\", options);",
          "  });",
          "  var elements = [root].concat(Array.prototype.slice.call(root.querySelectorAll(\"*\")));",
          "  elements.forEach(function (element) {",
          "    Array.prototype.slice.call(element.attributes || []).forEach(function (attribute) {",
          "      if (String(attribute.value || \"\").indexOf(\"{{\") < 0) return;",
          "      element.setAttribute(attribute.name, replaceWordexSystemMacrosInText(attribute.value, options));",
          "    });",
          "  });",
          "}",
          "",
          "function applyWordexSystemPageMacros(root) {",
          "  if (!root) return;",
          "  var pages = root.querySelectorAll(\".pagex-page\");",
          "  var pageCount = pages.length;",
          "  Array.prototype.forEach.call(pages, function (pageEl, index) {",
          "    applyWordexSystemMacrosInElement(pageEl, {",
          "      pageNumber: index + 1,",
          "      pageCount: pageCount",
          "    });",
          "  });",
          "}"
        ].join("\n");
      }

      static injectTemplateHelpers(template) {
        const source = String(template || "");

        if (!source.includes(WordexEditor.templateHelpersMarker)) {
          return source;
        }

        return source.replace(
          WordexEditor.templateHelpersMarker,
          WordexEditor.getTemplateHelpersScript()
        );
      }

      static loadPagedTemplate() {
        if (WordexEditor.pagedTemplateCache) {
          return WordexEditor.pagedTemplateCache;
        }

        const template = window.WORDEX_PAGED_TEMPLATE;

        if (!template) {
          throw new Error(
            "wordex-paged.html não foi carregado. Mantenha o arquivo na mesma pasta de WORDEX.html."
          );
        }

        WordexEditor.pagedTemplateCache = WordexEditor.injectTemplateHelpers(template);
        return WordexEditor.pagedTemplateCache;
      }

      static loadPdfTemplate() {
        if (WordexEditor.pdfTemplateCache) {
          return WordexEditor.pdfTemplateCache;
        }

        const template = window.WORDEX_PDF_TEMPLATE;

        if (!template) {
          throw new Error(
            "wordex-pdf.html não foi carregado. Mantenha o arquivo na mesma pasta de WORDEX.html."
          );
        }

        WordexEditor.pdfTemplateCache = WordexEditor.injectTemplateHelpers(template);
        return WordexEditor.pdfTemplateCache;
      }

      applyPagedTemplatePlaceholders(template, values) {
        return String(template || "").replace(/@@([A-Z0-9_]+)@@/g, (match, key) => {
          if (!Object.prototype.hasOwnProperty.call(values, key)) {
            return match;
          }

          return String(values[key] ?? "");
        });
      }

      buildGeneratedReportHtml(data) {
        const pagedTemplate = WordexEditor.loadPagedTemplate();
        const documentClone = this.buildGeneratedDocumentClone(data);
        const headerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".header-template");
        const footerTemplateHtml = this.extractGeneratedRegionTemplateHtml(documentClone, ".footer-template");

        /*
          Defesa extra: header/footer nunca podem permanecer no source paginado.
          Eles pertencem ao chrome de página e são reinjetados uma vez por página
          depois que o Pagex monta as páginas.
        */
        this.removeGeneratedHeaderFooterRegionsFromSource(documentClone);
        const page = this.getPageSettings();
        // O body paginado respeita a altura real do chrome header/footer,
        // medida a partir dos parágrafos inseridos no template.
        const minimumHeaderChromeMm = 12;
        const minimumFooterChromeMm = 12;
        const measuredHeaderChromeMm = headerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(headerTemplateHtml, "header-template", minimumHeaderChromeMm)
          : 0;
        const measuredFooterChromeMm = footerTemplateHtml
          ? this.measureGeneratedRegionHtmlMargin(footerTemplateHtml, "footer-template", minimumFooterChromeMm)
          : 0;
        const fixedHeaderChromeMm = headerTemplateHtml
          ? Math.max(minimumHeaderChromeMm, measuredHeaderChromeMm)
          : minimumHeaderChromeMm;
        const fixedFooterChromeMm = footerTemplateHtml
          ? Math.max(minimumFooterChromeMm, measuredFooterChromeMm)
          : minimumFooterChromeMm;
        const generatedPage = {
          ...page,
          marginTop: headerTemplateHtml
            ? this.formatMillimeters(fixedHeaderChromeMm)
            : page.marginTop,
          marginBottom: footerTemplateHtml
            ? this.formatMillimeters(fixedFooterChromeMm)
            : page.marginBottom
        };
        const pageMetrics = {
          marginLeftMm: this.parseCssSizeToMillimeters(page.marginLeft),
          marginRightMm: this.parseCssSizeToMillimeters(page.marginRight)
        };
        const title = this.escapeHtml("Relatório Wordex montado");
        const pageAtRule = this.getGeneratedPageAtRule(generatedPage);
        const watermark = this.getGeneratedWatermarkSettings();

        documentClone.style.width = generatedPage.width;
        documentClone.style.minHeight = generatedPage.height;
        documentClone.style.margin = "0 auto";
        documentClone.style.boxSizing = "border-box";

        this.injectContinuousWatermarkPreview(
          documentClone,
          watermark,
          "wordex-generated-continuous-watermark"
        );

        const pagexConfig = JSON.stringify({
          headerTemplateHtml: headerTemplateHtml || "",
          footerTemplateHtml: footerTemplateHtml || "",
          watermarkConfig: watermark || null,
          pdfFileName: this.getSuggestedReportPdfFileName(),
          htmlFileName: this.getSuggestedReportBaseName() + ".html",
          pdfTitle: String(document.title || "Relatório Wordex").trim(),
          imageDataUrlMap: this.buildReportImageDataUrlMapForOutput(),
          pageConfig: {
            width: generatedPage.width,
            height: generatedPage.height,
            marginLeftMm: pageMetrics.marginLeftMm,
            marginRightMm: pageMetrics.marginRightMm
          }
        }).replace(/<\//g, "<\\/");

        return this.applyPagedTemplatePlaceholders(pagedTemplate, {
          WORDEX_TITLE: title,
          WORDEX_PAGE_WIDTH: generatedPage.width,
          WORDEX_PAGE_MIN_HEIGHT: generatedPage.height,
          WORDEX_PAGE_MARGIN_LEFT: page.marginLeft || "15mm",
          WORDEX_PAGE_MARGIN_RIGHT: page.marginRight || "15mm",
          WORDEX_PAGE_AT_RULE: pageAtRule,
          WORDEX_SOURCE_HTML: documentClone.outerHTML,
          WORDEX_PAGEX_CONFIG: pagexConfig,
          WORDEX_PDF_TEMPLATE_BOOT: `<textarea id="wordex-pdf-template-store" hidden style="display:none">${this.escapeHtml(WordexEditor.loadPdfTemplate())}</textarea><script>window.WORDEX_PDF_TEMPLATE=document.getElementById("wordex-pdf-template-store").value;<\/script>`
        });
      }

      regionHasPrintableContent(region) {
        if (!region) {
          return false;
        }

        return region.querySelector(".paragraph-block, .object-block") !== null;
      }

      extractGeneratedRegionTemplateHtml(container, selector) {
        const region = container?.querySelector(selector);

        if (!this.regionHasPrintableContent(region)) {
          return "";
        }

        const html = region.outerHTML;
        region.remove();
        return html;
      }

      removeGeneratedHeaderFooterRegionsFromSource(container) {
        if (!container) return;

        container.querySelectorAll(
          ".header-template, .footer-template"
        ).forEach(node => node.remove());
      }

      getGeneratedPageAtRule(page) {
        return `@page {
  size: ${page.width} ${page.height};
  margin: ${this.getPageMarginCss(page)};
}`;
      }

      buildGeneratedDocumentClone(data) {
        this.reportGenerationTime = new Date();
        const clone = this.documentElement.cloneNode(true);
        const hasReportData = data !== undefined && data !== null;

        clone.querySelectorAll(".document-title, .empty").forEach(node => node.remove());
        this.clearEditorSelectionMarks(clone);

        if (hasReportData) {
          const rootCollection = this.normalizeRootCollection(data);
          const firstRootItem = rootCollection.length > 0 ? rootCollection[0] : {};
          const rootScope = this.createDataScope(firstRootItem, "ROOT", firstRootItem, null);

          /*
            O ROOT é sempre tratado como coleção. O uso recomendado é uma única
            linha em ROOT, mas duas ou mais linhas serão processadas normalmente
            pelo mesmo forEach dos demais grupos.
          */
          this.expandTablesWithData(clone, rootCollection, null);
          this.resolveGeneratedContentMacros(clone, [rootScope]);
        } else {
          this.finalizeStaticImages(clone);
          this.materializeCharts(clone, []);
          this.applySystemMacrosInElement(clone);
        }

        this.layoutGeneratedReportCharts(clone);

        this.cleanGeneratedDocumentNode(clone);
        this.markGeneratedPaginationAtoms(clone);
        this.rewriteEmbeddedImagesInContainer(clone);

        return clone;
      }

      rewriteEmbeddedImagesInContainer(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll("img").forEach(img => {
          const src = String(img.getAttribute("src") || "").trim();
          const resolved = this.resolveReportImageSourceForOutput(src);

          if (resolved && resolved !== src) {
            img.setAttribute("src", resolved);
            img.removeAttribute("crossorigin");
          }
        });
      }

      buildReportImageDataUrlMapForOutput() {
        const map = Object.assign({}, this.reportImageDataUrlCache || {});
        const urls = new Set();
        this.collectImageUrlsFromReportValue(this.reportData, urls);

        urls.forEach(url => {
          const resolved = this.resolveReportImageSourceForOutput(url);

          if (resolved && /^data:/i.test(resolved)) {
            map[url] = resolved;
          }
        });

        return map;
      }

      markGeneratedPaginationAtoms(container) {
        if (!container) return;

        const atomicObjectSelector = ".dynamic-image-box, .wordex-chart-box, .wordex-textbox";

        container.querySelectorAll(atomicObjectSelector).forEach(object => {
          object.classList.add("wordex-atomic-object");

          const paragraphBlock = object.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-atomic-block");
          }
        });

        container.querySelectorAll("table.wordex-table").forEach(table => {
          table.classList.add("wordex-paginable-table");

          const paragraphBlock = table.closest(".paragraph-block");

          if (paragraphBlock) {
            paragraphBlock.classList.add("wordex-table-block");
          }
        });
      }

      normalizeRootCollection(data) {
        if (Array.isArray(data)) {
          return data;
        }

        if (data === undefined || data === null) {
          return [];
        }

        return [data];
      }

      cleanGeneratedDocumentNode(container) {
        if (!container) return;

        this.normalizeLegacyTableFooterRows(container);

        container.querySelectorAll("*").forEach(element => {
          element.removeAttribute("contenteditable");
          element.removeAttribute("data-row-type-label");
          element.removeAttribute("data-wordex-datasource");
          element.removeAttribute("data-wordex-enabled");
          element.removeAttribute("data-wordex-generated");
          element.classList.remove(
            ...WordexEditor.editorSelectionClasses,
            "is-empty"
          );
        });

        container.querySelectorAll("tr[data-wordex-row-type]").forEach(row => {
          row.removeAttribute("title");
          delete row.dataset.wordexRowType;
          delete row.dataset.wordexDatasource;
          delete row.dataset.wordexEnabled;
          delete row.dataset.wordexDecolumnized;
          delete row.dataset.wordexOriginalColumnCount;
        });
      }

      expandTablesWithData(container, rootData, inheritedScopes = null) {
        if (!container) return;

        const rootCollection = this.normalizeRootCollection(rootData);
        const scopes = inheritedScopes || [
          this.createDataScope(rootCollection[0] || {}, "ROOT", rootCollection[0] || {}, null)
        ];

        Array.from(container.querySelectorAll("table.wordex-table")).forEach(table => {
          this.expandTableWithData(table, rootCollection, scopes);
        });
      }

      expandTableWithData(table, rootData, rootScopes) {
        if (!table || table.dataset.wordexGenerated === "1") return;

        if (this.isStaticTable(table)) {
          return;
        }

        this.normalizeLegacyTableFooterRows(table);

        const rows = Array.from(table.rows);

        if (rows.length === 0) {
          return;
        }

        const reportMap = this.buildTableReportMap(table, rows);
        const rootCollection = Array.isArray(rootData) ? rootData : this.normalizeRootCollection(rootData);
        const expandedRows = this.renderTableReportMapByRowDatasource(reportMap, rootCollection, rootScopes);

        table.innerHTML = "";
        expandedRows.forEach(row => table.appendChild(row));
        table.dataset.wordexGenerated = "1";
      }

      buildTableReportMap(table, rows) {
        if (rows.length < 2) {
          throw new Error("A tabela precisa de pelo menos TableHeader e TableFooter.");
        }

        const map = {
          tableHeader: null,
          orderedMiddleRows: [],
          tableFooter: null
        };

        rows.forEach((row, index) => {
          const entry = this.createTableReportMapEntry(row, index);
          const rowType = entry.rowType || "";
          const isFirst = index === 0;
          const isLast = index === rows.length - 1;

          if (isFirst) {
            if (rowType && rowType !== "TableHeader") {
              throw new Error(
                `Estrutura da tabela inválida: a linha 1 deve ser TableHeader (encontrado ${rowType}).`
              );
            }

            map.tableHeader = entry;
            return;
          }

          if (isLast) {
            if (rowType && rowType !== "TableFooter") {
              throw new Error(
                `Estrutura da tabela inválida: a última linha deve ser TableFooter (encontrado ${rowType}).`
              );
            }

            map.tableFooter = entry;
            return;
          }

          if (rowType === "TableHeader" || rowType === "TableFooter") {
            throw new Error(
              `Estrutura da tabela inválida: ${rowType} só pode ficar na primeira ou na última linha.`
            );
          }

          if (!rowType || !["GroupHeader", "Detail", "GroupFooter", "Free"].includes(rowType)) {
            throw new Error(
              `Estrutura da tabela inválida na linha ${entry.index + 1}: use GroupHeader, Detail, GroupFooter ou Free.`
            );
          }

          map.orderedMiddleRows.push(entry);
        });

        if (!map.tableHeader || !map.tableFooter) {
          throw new Error("A tabela precisa de TableHeader na primeira linha e TableFooter na última.");
        }

        if (!map.orderedMiddleRows.some(entry => entry.rowType === "Detail")) {
          throw new Error("A tabela precisa de ao menos uma linha Detail.");
        }

        return map;
      }

      createTableReportMapEntry(row, index) {
        const rowType = this.normalizeTableRowType(row.dataset.wordexRowType || "");

        if (rowType && rowType !== (row.dataset.wordexRowType || "")) {
          row.dataset.wordexRowType = rowType;
          this.updateTableRowTypeLabel(row);
        }

        return {
          row,
          index,
          rowType,
          datasource: this.getTableRowDatasource(row)
        };
      }

      parseTableDatasourceBand(reportMap) {
        const groupHeaders = [];
        let detail = null;
        const groupFooters = [];

        (reportMap.orderedMiddleRows || []).forEach(entry => {
          if (entry.rowType === "GroupHeader") {
            groupHeaders.push(entry);
            return;
          }

          if (entry.rowType === "Detail") {
            detail = entry;
            return;
          }

          if (entry.rowType === "GroupFooter") {
            groupFooters.push(entry);
          }
        });

        return { groupHeaders, detail, groupFooters };
      }

      resolveRowDatasourceItems(scopes, datasource, rootData) {
        const path = String(datasource || "").trim();

        if (!path || path === "ROOT") {
          return this.normalizeRootCollection(rootData).map(item => ({ value: item }));
        }

        const parts = path.split(".").filter(Boolean);
        const level = Math.max(0, (scopes?.length || 1) - 1);
        const segment = parts[level];

        if (!segment) {
          return [];
        }

        const parentValue = level === 0
          ? (scopes?.[0]?.$root ?? rootData)
          : scopes?.[level]?.$item;

        return this.resolveDatasourceItems(parentValue, segment, scopes?.[0]?.$root ?? rootData);
      }

      createRowDataScope(scopes, item, datasource, rootData) {
        const path = String(datasource || "ROOT").trim() || "ROOT";
        const parts = path === "ROOT" ? [] : path.split(".").filter(Boolean);
        const level = Math.max(0, (scopes?.length || 1) - 1);
        const collectionName = parts[level] || "ROOT";
        const parentValue = level === 0 ? null : scopes?.[level]?.$item;
        const parentCollectionName = level > 0 ? (parts[level - 1] || "") : "";

        return this.createDataScope(
          item?.value ?? item,
          collectionName,
          scopes?.[0]?.$root ?? rootData,
          parentValue,
          parentCollectionName
        );
      }

      renderNestedTableBand(band, scopes, rootData, level, output) {
        if (level < band.groupHeaders.length) {
          const groupHeader = band.groupHeaders[level];
          const items = this.resolveRowDatasourceItems(scopes, groupHeader.datasource, rootData);

          items.forEach(item => {
            const scope = this.createRowDataScope(scopes, item, groupHeader.datasource, rootData);
            const expandedScopes = scopes.concat(scope);

            output.push(...this.renderTableBandRow(groupHeader, scope, rootData));
            this.renderNestedTableBand(band, expandedScopes, rootData, level + 1, output);

            const footerIndex = band.groupHeaders.length - 1 - level;
            const groupFooter = band.groupFooters[footerIndex];

            if (groupFooter) {
              output.push(...this.renderTableBandRow(groupFooter, scope, rootData));
            }
          });

          if (level === 0 && band.groupFooters.length > band.groupHeaders.length) {
            const outerFooters = band.groupFooters.slice(band.groupHeaders.length);

            outerFooters.forEach(groupFooter => {
              output.push(...this.renderTableBandRow(groupFooter, scopes[0], rootData));
            });
          }

          return;
        }

        if (!band.detail) {
          return;
        }

        const detailItems = this.resolveRowDatasourceItems(scopes, band.detail.datasource, rootData);

        detailItems.forEach(item => {
          const scope = this.createRowDataScope(scopes, item, band.detail.datasource, rootData);
          output.push(...this.renderTableBandRow(band.detail, scope, rootData));
        });

        if (band.groupHeaders.length === 0 && band.groupFooters.length > 0) {
          band.groupFooters.forEach(groupFooter => {
            output.push(...this.renderTableBandRow(groupFooter, scopes[0], rootData));
          });
        }
      }

      renderTableReportMapByRowDatasource(reportMap, rootCollection, rootScopes) {
        const roots = this.normalizeRootCollection(rootCollection);
        const { leadingFree, structural, trailingFree } = this.splitOrderedMiddleRows(
          reportMap.orderedMiddleRows || []
        );
        const band = this.parseTableDatasourceBand({ orderedMiddleRows: structural });
        const expandedRows = [];

        roots.forEach(rootItem => {
          const rootScope = this.createDataScope(rootItem, "ROOT", rootItem, null);

          expandedRows.push(
            ...this.renderTableBandRow(reportMap.tableHeader, rootScope, rootItem)
          );

          leadingFree.forEach(entry => {
            expandedRows.push(...this.renderTableBandRow(entry, rootScope, rootItem));
          });

          const bandOutput = [];
          this.renderNestedTableBand(band, [rootScope], rootItem, 0, bandOutput);
          expandedRows.push(...bandOutput);

          trailingFree.forEach(entry => {
            expandedRows.push(...this.renderTableBandRow(entry, rootScope, rootItem));
          });

          expandedRows.push(
            ...this.renderTableBandRow(reportMap.tableFooter, rootScope, rootItem)
          );
        });

        return expandedRows;
      }

      getScopeIdentityValue(scope, key) {
        if (!scope || !key) {
          return "";
        }

        const direct = scope[key] ?? scope.$item?.[key];
        return this.stringifyResolvedValue(this.unwrapTypedFieldValue(direct));
      }

      matchTotalItemToScope(items, scope) {
        const identityKeys = ["ClienteId", "ProdutoId", "CategoriaId", "Id"];

        for (const key of identityKeys) {
          const scopeValue = this.getScopeIdentityValue(scope, key);

          if (!scopeValue) {
            continue;
          }

          const match = (items || []).find(item => {
            const row = item?.value ?? item;
            return this.getScopeIdentityValue(row, key) === scopeValue;
          });

          if (match) {
            return match?.value ?? match;
          }
        }

        return null;
      }

      getTotalWrapperRow(wrapper, scope) {
        const items = this.getReportDatasourceItems(wrapper);

        if (!items.length) {
          return null;
        }

        if (items.length === 1) {
          return items[0]?.value ?? items[0];
        }

        const matched = this.matchTotalItemToScope(items, scope);

        if (matched) {
          return matched;
        }

        return items[0]?.value ?? items[0];
      }

      createFooterMacroScope(entry, scope, rootData) {
        const datasource = String(entry?.datasource || "").trim();

        if (!datasource) {
          return null;
        }

        const current = scope?.$item ?? scope;
        let wrapper = this.resolveDatasourceValue(current, datasource, rootData);

        if (!wrapper) {
          const collectionName = this.getDatasourceCollectionName(datasource);
          wrapper = this.resolveDatasourceValue(current, collectionName, rootData);
        }

        if (!wrapper) {
          return null;
        }

        const totalRow = this.getTotalWrapperRow(wrapper, scope);

        if (!totalRow || typeof totalRow !== "object") {
          return null;
        }

        const collectionName = this.getDatasourceCollectionName(datasource);
        const footerScope = this.createDataScope(
          totalRow,
          collectionName,
          scope?.$root ?? rootData,
          scope?.$item ?? scope,
          scope?.$collectionName || ""
        );

        Object.keys(totalRow).forEach(key => {
          if (!key.startsWith("$")) {
            footerScope[key] = totalRow[key];
          }
        });

        return footerScope;
      }

      buildMacroScopesForTableBandRow(entry, scope, rootData) {
        const scopes = [scope];

        if (entry?.rowType !== "GroupFooter" && entry?.rowType !== "TableFooter") {
          return scopes;
        }

        const footerScope = this.createFooterMacroScope(entry, scope, rootData);

        if (footerScope) {
          scopes.unshift(footerScope);
        }

        return scopes;
      }

      renderTableBandRow(entry, scope, rootData) {
        if (!entry?.row) {
          return [];
        }

        if (entry.rowType === "GroupFooter" && !entry.datasource) {
          return [];
        }

        const clone = entry.row.cloneNode(true);
        const macroScopes = this.buildMacroScopesForTableBandRow(entry, scope, rootData);

        this.expandTablesWithData(clone, rootData, macroScopes);
        this.resolveGeneratedContentMacros(clone, macroScopes);

        return [clone];
      }

      resolveDatasourceItems(currentValue, datasource, rootData) {
        const value = this.resolveDatasourceValue(currentValue, datasource, rootData);

        if (this.isReportDatasourceWrapper(value)) {
          return (value.Items || []).map(item => ({ value: item }));
        }

        if (Array.isArray(value)) {
          return value.map(item => ({ value: item }));
        }

        if (value && typeof value === "object") {
          if (Array.isArray(value.$items)) {
            return value.$items.map(item => ({ value: item }));
          }

          if (Array.isArray(value.items)) {
            return value.items.map(item => ({ value: item }));
          }

          if (Array.isArray(value.Items)) {
            return value.Items.map(item => ({ value: item }));
          }

          return [{ value }];
        }

        return [];
      }

      resolveDatasourceValue(currentValue, datasource, rootData) {
        const sourceName = String(datasource || "").trim();

        if (!sourceName || sourceName === "." || sourceName === "$item") {
          return currentValue;
        }

        if (sourceName === "ROOT" || sourceName === "$root") {
          return rootData;
        }

        const parts = sourceName
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return this.getValueByPath(currentValue, parts);
      }

      getDatasourceCollectionName(datasource) {
        const parts = String(datasource || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        return parts.length > 0 ? parts[parts.length - 1] : "";
      }

      cloneReportRow(row, scopes, rootData) {
        const clone = row.cloneNode(true);
        this.expandTablesWithData(clone, rootData, scopes);
        this.resolveGeneratedContentMacros(clone, scopes);
        return clone;
      }

      findCollectionNameReferencedByMacros(collections, macroPaths) {
        for (const item of collections) {
          if (macroPaths.some(path => path === item.name || path.startsWith(item.name + "."))) {
            return item.name;
          }
        }

        return null;
      }

      getArrayProperties(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) return [];

        return Object.keys(value)
          .filter(key => !key.startsWith("$"))
          .map(key => {
            const propertyValue = value[key];

            if (Array.isArray(propertyValue)) {
              return { name: key, value: propertyValue };
            }

            if (this.isReportDatasourceWrapper(propertyValue)) {
              return { name: key, value: propertyValue.Items };
            }

            return null;
          })
          .filter(Boolean);
      }

      isTotalCollectionName(name) {
        return /^Totais/i.test(String(name || ""));
      }

      getCollectionFromValue(value, collectionName) {
        if (!value || !collectionName) {
          return [];
        }

        return this.getReportDatasourceItems(value[collectionName]);
      }

      collectMacroPaths(element) {
        const paths = [];
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);

        while (walker.nextNode()) {
          const text = walker.currentNode.nodeValue || "";
          const matches = text.matchAll(/{{\s*([^{}]+?)\s*}}/g);

          for (const match of matches) {
            paths.push(match[1].trim());
          }
        }

        if (element.attributes) {
          Array.from(element.attributes).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        }

        element.querySelectorAll?.("*").forEach(child => {
          Array.from(child.attributes || []).forEach(attribute => {
            const matches = String(attribute.value || "").matchAll(/{{\s*([^{}]+?)\s*}}/g);

            for (const match of matches) {
              paths.push(match[1].trim());
            }
          });
        });

        return paths;
      }

      resolveGeneratedContentMacros(element, scopes) {
        this.resolveMacrosInElement(element, scopes);
        this.materializeResolvedImageUrlTextNodes(element);
        this.materializeDynamicImages(element, scopes);
        this.materializeCharts(element, scopes);
      }

      shouldSkipMacroResolutionNode(node) {
        return !!node?.parentElement?.closest?.(".dynamic-image-box, .wordex-chart-box");
      }

      decodeHtmlEntities(value) {
        return String(value ?? "")
          .replace(/&amp;/g, "&")
          .replace(/&quot;/g, "\"")
          .replace(/&#039;/g, "'")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">");
      }

      looksLikeImageSource(value) {
        if (this.isTypedFieldValue(value)) {
          if (String(value.Kind || "").toLowerCase() === "image") {
            return this.looksLikeImageSource(value.Value);
          }

          return false;
        }

        const text = String(value || "").trim();

        if (!text) {
          return false;
        }

        if (/^data:image\//i.test(text)) {
          return true;
        }

        if (this.looksLikeRawBase64Image(text)) {
          return true;
        }

        if (/\.(png|jpe?g|gif|webp|svg|bmp|ico)(\?|#|$)/i.test(text)) {
          return true;
        }

        if (/^https?:\/\//i.test(text) && /(?:imgurl=|\/img\/|image\/|logo|foto|photo)/i.test(text)) {
          return true;
        }

        return false;
      }

      extractMacroNameFromImageBox(box) {
        if (!box) {
          return "";
        }

        const fromDataset = this.normalizeMacroName(box.dataset.fieldName || "");

        if (fromDataset) {
          return fromDataset;
        }

        const fromAttribute = this.normalizeMacroName(box.getAttribute("data-field-name") || "");

        if (fromAttribute) {
          return fromAttribute;
        }

        const macroMatch = String(box.innerHTML || "").match(/\{\{\s*([^{}]+?)\s*\}\}/);

        return macroMatch ? this.normalizeMacroName(macroMatch[1]) : "";
      }

      isSystemMacroPath(path) {
        return String(path || "").trim().startsWith("@");
      }

      normalizeSystemMacroName(path) {
        return String(path || "")
          .trim()
          .replace(/^@+/, "")
          .toLowerCase();
      }

      isDeferredSystemMacroName(name) {
        return WordexEditor.deferredSystemMacroNames.includes(
          this.normalizeSystemMacroName(name)
        );
      }

      getMacroResolutionOptions(overrides = {}) {
        return {
          generationTime: overrides.generationTime || this.reportGenerationTime || new Date(),
          pageNumber: overrides.pageNumber,
          pageCount: overrides.pageCount
        };
      }

      formatSystemMacroDate(date, kind) {
        const value = date instanceof Date ? date : new Date(date);
        const pad = part => String(part).padStart(2, "0");

        if (kind === "dateiso") {
          return `${value.getFullYear()}-${pad(value.getMonth() + 1)}-${pad(value.getDate())}`;
        }

        if (kind === "time") {
          return `${pad(value.getHours())}:${pad(value.getMinutes())}:${pad(value.getSeconds())}`;
        }

        if (kind === "date") {
          return value.toLocaleDateString("pt-BR");
        }

        return value.toLocaleString("pt-BR", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      resolveSystemMacroValue(path, options = {}) {
        const name = this.normalizeSystemMacroName(path);

        if (!name) {
          return null;
        }

        if (name === "pagenumber") {
          return Number.isFinite(options.pageNumber) ? String(options.pageNumber) : null;
        }

        if (name === "pagecount") {
          return Number.isFinite(options.pageCount) ? String(options.pageCount) : null;
        }

        const generationTime = options.generationTime || new Date();

        if (name === "today") {
          return this.formatSystemMacroDate(generationTime, "date");
        }

        if (name === "now") {
          return this.formatSystemMacroDate(generationTime, "datetime");
        }

        if (name === "dateiso") {
          return this.formatSystemMacroDate(generationTime, "dateiso");
        }

        if (name === "time") {
          return this.formatSystemMacroDate(generationTime, "time");
        }

        if (name === "year") {
          return String(generationTime.getFullYear());
        }

        if (name === "month") {
          return String(generationTime.getMonth() + 1).padStart(2, "0");
        }

        if (name === "day") {
          return String(generationTime.getDate()).padStart(2, "0");
        }

        return null;
      }

      resolveSystemMacrosInText(text, options = {}) {
        const macroOptions = this.getMacroResolutionOptions(options);

        return String(text || "").replace(/{{\s*([^{}]+?)\s*}}/g, (match, path) => {
          const trimmed = String(path || "").trim();

          if (!this.isSystemMacroPath(trimmed)) {
            return match;
          }

          const resolved = this.resolveSystemMacroValue(trimmed, macroOptions);

          return resolved === null ? match : resolved;
        });
      }

      applySystemMacrosInElement(element, options = {}) {
        if (!element) {
          return;
        }

        const macroOptions = this.getMacroResolutionOptions(options);
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
        const textNodes = [];

        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(node => {
          if (this.shouldSkipMacroResolutionNode(node)) {
            return;
          }

          node.nodeValue = this.resolveSystemMacrosInText(node.nodeValue || "", macroOptions);
        });

        const allElements = [element, ...Array.from(element.querySelectorAll?.("*") || [])];

        allElements.forEach(child => {
          if (child.matches?.(".dynamic-image-box, .wordex-chart-box")) {
            return;
          }

          Array.from(child.attributes || []).forEach(attribute => {
            if (!String(attribute.value || "").includes("{{")) {
              return;
            }

            child.setAttribute(
              attribute.name,
              this.resolveSystemMacrosInText(attribute.value, macroOptions)
            );
          });
        });
      }

      resolveMacrosInElement(element, scopes, macroOptions = null) {
        if (!element) return;

        const options = macroOptions || this.getMacroResolutionOptions();
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT);
        const textNodes = [];

        while (walker.nextNode()) {
          textNodes.push(walker.currentNode);
        }

        textNodes.forEach(node => {
          if (this.shouldSkipMacroResolutionNode(node)) {
            return;
          }

          node.nodeValue = this.resolveMacrosInText(node.nodeValue || "", scopes, options);
        });

        const allElements = [element, ...Array.from(element.querySelectorAll?.("*") || [])];

        allElements.forEach(child => {
          if (child.matches?.(".dynamic-image-box, .wordex-chart-box")) {
            return;
          }

          Array.from(child.attributes || []).forEach(attribute => {
            if (!String(attribute.value || "").includes("{{")) return;
            child.setAttribute(attribute.name, this.resolveMacrosInText(attribute.value, scopes, options));
          });
        });
      }

      materializeResolvedImageUrlTextNodes(container) {
        if (!container) {
          return;
        }

        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
        const replacements = [];

        while (walker.nextNode()) {
          const node = walker.currentNode;

          if (node.parentElement?.closest?.(".dynamic-image-box")) {
            continue;
          }

          const value = this.decodeHtmlEntities(node.nodeValue || "").trim();

          if (!this.looksLikeImageSource(value)) {
            continue;
          }

          replacements.push({ node, value });
        }

        replacements.forEach(item => {
          const img = document.createElement("img");
          img.src = this.resolveReportImageSourceForOutput(item.value);
          img.alt = "";
          img.draggable = false;
          img.style.display = "block";
          img.style.maxWidth = "100%";
          img.style.height = "auto";
          item.node.parentNode.replaceChild(img, item.node);
        });
      }

      materializeDynamicImages(container, scopes) {
        if (!container) return;

        container.querySelectorAll(".dynamic-image-box").forEach(box => {
          this.materializeDynamicImageBox(box, scopes);
        });
      }

      materializeDynamicImageBox(box, scopes) {
        if (!box || box.dataset.wordexMaterialized === "1") return;

        const existingImg = box.querySelector("img");
        const existingSrc = String(existingImg?.getAttribute("src") || "").trim();

        if (existingSrc && this.looksLikeImageSource(existingSrc)) {
          box.dataset.wordexMaterialized = "1";
          return;
        }

        const fieldName = this.extractMacroNameFromImageBox(box);
        let imageSrc = "";

        if (fieldName) {
          imageSrc = this.stringifyResolvedValue(this.resolveDataPath(fieldName, scopes)).trim();
        }

        if (!imageSrc) {
          const textFallback = this.decodeHtmlEntities(String(box.textContent || ""))
            .replace(/^\s*Imagem\s*/i, "")
            .replace(/\{\{[^}]+\}\}/g, "")
            .trim();

          if (this.looksLikeImageSource(textFallback)) {
            imageSrc = textFallback;
          }
        }

        imageSrc = this.decodeHtmlEntities(String(imageSrc || "").trim());
        imageSrc = this.resolveReportImageSourceForOutput(imageSrc);

        if (!imageSrc || !this.looksLikeImageSource(imageSrc)) {
          box.innerHTML = "";
          box.dataset.wordexMaterialized = "1";
          return;
        }

        const img = document.createElement("img");
        img.src = imageSrc;
        img.alt = fieldName || "";
        img.draggable = false;
        img.style.display = "block";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";
        img.style.width = "auto";
        img.style.height = "auto";
        img.style.objectFit = "contain";

        box.innerHTML = "";
        box.appendChild(img);
        box.dataset.wordexMaterialized = "1";
      }

      finalizeStaticImages(container) {
        if (!container) {
          return;
        }

        container.querySelectorAll(".dynamic-image-box").forEach(box => {
          this.materializeDynamicImageBox(box, []);
        });
      }

      resolveMacrosInText(text, scopes, macroOptions = null) {
        const options = macroOptions || this.getMacroResolutionOptions();

        return String(text || "").replace(/{{\s*([^{}]+?)\s*}}/g, (match, path) => {
          const trimmed = String(path || "").trim();

          if (this.isSystemMacroPath(trimmed)) {
            const resolved = this.resolveSystemMacroValue(trimmed, options);

            if (resolved === null) {
              return match;
            }

            return this.escapeHtml(resolved);
          }

          return this.escapeHtml(this.stringifyResolvedValue(this.resolveDataPath(path, scopes)));
        });
      }

      resolveDataPath(path, scopes) {
        const parts = String(path || "")
          .trim()
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) return "";

        for (const scope of scopes || []) {
          const value = this.getValueByPath(scope, parts);

          if (value !== undefined && value !== null) {
            return this.unwrapTypedFieldValue(value);
          }
        }

        return "";
      }

      getValueByPath(source, parts) {
        let value = source;
        let previousPart = "";
        const scopeRoot = source;

        for (const part of parts) {
          if (value === undefined || value === null) return undefined;

          if (this.isReportDatasourceWrapper(value)) {
            const wrapperKind = this.getReportDatasourceWrapperKind(value);

            if (
              wrapperKind === "totals" ||
              wrapperKind === "graph" ||
              this.isTotalCollectionName(previousPart)
            ) {
              const row = wrapperKind === "totals"
                ? this.getTotalWrapperRow(value, scopeRoot)
                : value.Items?.[0];

              if (!row || !Object.prototype.hasOwnProperty.call(row, part)) {
                return undefined;
              }

              value = row[part];
              previousPart = part;
              value = this.advanceValueForPathTraversal(value);
              continue;
            }

            return undefined;
          }

          if (Array.isArray(value)) {
            if (/^\d+$/.test(part)) {
              value = value[Number(part)];
              previousPart = part;
              continue;
            }

            /*
              Coleções normais nunca são reduzidas automaticamente ao primeiro item.
              Assim, {{Produtos.Nome}} não pega o primeiro produto por acidente fora do
              contexto Detail/Produto corrente.

              A exceção deliberada são coleções de totais, como TotaisProdutos, porque
              elas representam um resumo do grupo corrente e só são usadas quando o
              template as referencia explicitamente, normalmente no GroupFooter.
            */
            if (this.isTotalCollectionName(previousPart)) {
              const matched = this.matchTotalItemToScope(
                value.map(item => ({ value: item })),
                scopeRoot
              );
              const row = matched || (value.length > 0 ? value[0] : null);

              value = row ? row[part] : undefined;
              previousPart = part;
              value = this.advanceValueForPathTraversal(value);
              continue;
            }

            return undefined;
          }

          if (typeof value !== "object") {
            return undefined;
          }

          if (Object.prototype.hasOwnProperty.call(value, part)) {
            value = value[part];
            previousPart = part;
            value = this.advanceValueForPathTraversal(value);
          } else {
            return undefined;
          }
        }

        return value;
      }

      advanceValueForPathTraversal(value) {
        if (!this.isTypedFieldValue(value)) {
          return value;
        }

        if (this.normalizeReportFieldKind(value.Kind) === "object") {
          return value.Value;
        }

        return value;
      }

      isTypedFieldValue(value) {
        return !!(
          value &&
          typeof value === "object" &&
          !Array.isArray(value) &&
          Object.prototype.hasOwnProperty.call(value, "Kind") &&
          Object.prototype.hasOwnProperty.call(value, "Value")
        );
      }

      unwrapTypedFieldValue(value) {
        return this.isTypedFieldValue(value) ? value.Value : value;
      }

      isScalarReportField(value) {
        if (value === null || value === undefined) {
          return true;
        }

        if (this.isTypedFieldValue(value)) {
          return this.normalizeReportFieldKind(value.Kind) !== "object";
        }

        return typeof value !== "object";
      }

      isChartDataObject(value) {
        if (!value || typeof value !== "object" || Array.isArray(value) || this.isTypedFieldValue(value)) {
          return false;
        }

        return this.isHistogramChartSource(value) || this.isNativeChartDataObject(value);
      }

      normalizeMacroFieldOptions(options) {
        if (Array.isArray(options)) {
          return { mode: "scalar", allowedKinds: options };
        }

        if (!options || typeof options !== "object") {
          return { mode: "scalar", allowedKinds: this.jsonMacroKindFilter };
        }

        return {
          mode: options.mode || "scalar",
          allowedKinds: options.allowedKinds ?? this.jsonMacroKindFilter
        };
      }

      normalizeReportFieldKind(kind) {
        const normalized = String(kind || "string").trim().toLowerCase();

        if (normalized === "text") {
          return "string";
        }

        if (normalized === "histogram") {
          return "graph";
        }

        if (normalized === "total") {
          return "totals";
        }

        return normalized;
      }

      inferLegacyFieldKind(fieldName, value) {
        const name = String(fieldName || "").toLowerCase();

        if (/_value$/i.test(name)) {
          return "number";
        }

        if (/_label$/i.test(name)) {
          return "string";
        }

        if (
          /logo|imagem|image|foto|picture|avatar|url/.test(name) &&
          this.looksLikeImageSource(value)
        ) {
          return "image";
        }

        if (this.looksLikeImageSource(value)) {
          return "image";
        }

        if (typeof value === "boolean") {
          return "boolean";
        }

        if (typeof value === "number") {
          return Number.isInteger(value) ? "number" : "currency";
        }

        return "string";
      }

      getReportFieldKind(sample, fieldName) {
        const value = sample?.[fieldName];

        if (this.isTypedFieldValue(value)) {
          return this.normalizeReportFieldKind(value.Kind);
        }

        return this.inferLegacyFieldKind(fieldName, value);
      }

      formatMacroFieldOption(fieldName, sample) {
        const path = String(fieldName || "").trim();
        const kind = path.includes(".")
          ? this.getReportFieldKindAtPath(sample, path)
          : this.getReportFieldKind(sample, fieldName);

        return `${path} (${kind})`;
      }

      stringifyResolvedValue(value) {
        value = this.unwrapTypedFieldValue(value);
        if (value === undefined || value === null) return "";
        if (Array.isArray(value)) return value.map(item => this.stringifyResolvedValue(item)).join(", ");
        if (typeof value === "object") {
          if (this.isChartDataObject(value)) {
            return "";
          }

          return JSON.stringify(value);
        }
        return String(value);
      }

      createDataScope(value, collectionName, rootData, parentValue, parentCollectionName = "") {
        /*
          Cada escopo representa a linha corrente de um nível do JSON.
          Campos do registro ficam no scope sem prefixo inventado: {{Email}}, {{Nome}}.
          O nome da coleção aponta para a linha corrente: {{Clientes.Nome}}.
          No Child, a coleção Parent continua disponível com o nome real do JSON.

          A resolução usa uma pilha de escopos, sempre do mais interno para o mais externo.
        */
        const scope = {};

        if (value && typeof value === "object" && !Array.isArray(value)) {
          Object.assign(scope, value);
        }

        scope.$value = value;
        scope.$item = value;
        scope.$root = rootData;
        scope.$collectionName = collectionName || "";

        if (parentValue !== undefined && parentValue !== null) {
          scope.$parent = parentValue;

          if (parentCollectionName) {
            scope[parentCollectionName] = parentValue;
          }
        }

        if (collectionName) {
          scope[collectionName] = value;
        }

        return scope;
      }

      chooseJsonFile() {
        const input = document.getElementById("jsonFileInput");

        if (!input) {
          alert("Input de JSON não encontrado.");
          return;
        }

        input.click();
      }

      getReportDataRootRecord() {
        if (!this.reportData) {
          return null;
        }

        if (Array.isArray(this.reportData)) {
          return this.reportData[0] ?? null;
        }

        if (this.reportData && typeof this.reportData === "object") {
          return this.reportData;
        }

        return null;
      }

      getReportDataCollections() {
        const root = this.getReportDataRootRecord();

        if (!root) {
          return [];
        }

        const collections = [{ name: "ROOT", label: "ROOT" }];
        const seen = new Set(["ROOT"]);

        this.getArrayProperties(root).forEach(item => {
          if (seen.has(item.name)) {
            return;
          }

          const propertyValue = root[item.name];

          if (this.isReportDatasourceWrapper(propertyValue)) {
            if (this.getReportDatasourceWrapperKind(propertyValue) !== "collection") {
              return;
            }
          }

          seen.add(item.name);
          collections.push({ name: item.name, label: item.name });
        });

        return collections;
      }

      renderJsonCollectionSelect(collectionSelect, collections, preferredValue = "ROOT", options = {}) {
        if (!collectionSelect) {
          return "";
        }

        const items = Array.isArray(collections) ? collections : [];
        const names = items.map(item => item.name);
        const preferred = String(preferredValue || "").trim();
        const nextValue = names.includes(preferred)
          ? preferred
          : (names.includes("ROOT") ? "ROOT" : (names[0] || ""));

        if (items.length === 0) {
          collectionSelect.innerHTML = '<option value="">Coleção</option>';
          collectionSelect.value = "";
          return "";
        }

        const currentValues = [...collectionSelect.options].map(option => option.value);
        const hasPlaceholderOnly =
          currentValues.length === 0 ||
          (currentValues.length === 1 && !currentValues[0]);

        if (
          !options.force &&
          !hasPlaceholderOnly &&
          document.activeElement === collectionSelect &&
          currentValues.length === names.length &&
          names.every((name, index) => currentValues[index] === name) &&
          names.includes(collectionSelect.value)
        ) {
          return collectionSelect.value;
        }

        collectionSelect.innerHTML = "";

        items.forEach(item => {
          const option = document.createElement("option");
          option.value = item.name;
          option.textContent = item.label;
          collectionSelect.appendChild(option);
        });

        collectionSelect.value = nextValue;
        return nextValue;
      }

      ensureJsonCollectionSelectOption(collectionSelect, collectionName, label = collectionName) {
        if (!collectionSelect || !collectionName) {
          return;
        }

        const exists = [...collectionSelect.options].some(option => option.value === collectionName);

        if (!exists) {
          const option = document.createElement("option");
          option.value = collectionName;
          option.textContent = label || collectionName;
          collectionSelect.appendChild(option);
        }
      }

      resolveActiveTableForMacroContext() {
        const rowContext = this.getSelectedTableRowForMacroContext();

        if (rowContext?.table) {
          return rowContext.table;
        }

        const cell = this.getSelectedCellForInsertion();
        const tableFromCell = cell?.closest?.(".wordex-table");

        if (tableFromCell) {
          return tableFromCell;
        }

        if (
          this.selectedObject?.matches?.(".wordex-table") &&
          this.documentElement.contains(this.selectedObject)
        ) {
          return this.selectedObject;
        }

        if (
          this.macroPickerActiveTable &&
          this.documentElement.contains(this.macroPickerActiveTable)
        ) {
          return this.macroPickerActiveTable;
        }

        return null;
      }

      getActiveTableForMacroContext() {
        return this.resolveActiveTableForMacroContext();
      }

      getSelectedTableRowForMacroContext() {
        const rowContext = this.getSelectedTableRowContextWithoutAlert();

        if (rowContext?.row) {
          return rowContext;
        }

        let cell = this.selectedCell;

        if (!cell || !this.documentElement.contains(cell)) {
          const selection = window.getSelection();

          if (selection?.rangeCount) {
            cell = this.getTableCellFromRange(selection.getRangeAt(0));
          }
        }

        if (!cell && this.savedRange) {
          cell = this.getTableCellFromRange(this.savedRange);
        }

        if (!cell || !this.documentElement.contains(cell)) {
          return null;
        }

        const table = cell.closest(".wordex-table");
        const row = cell.closest("tr");

        if (!table || !row) {
          return null;
        }

        return { table, row, cell };
      }

      syncJsonMacroPickerForTableContext(options = {}) {
        const table = this.getActiveTableForMacroContext();

        if (!table) {
          return false;
        }

        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");
        const hasData = !!this.getReportDataRootRecord();

        if (!hasData) {
          return false;
        }

        if (!collectionSelect || !fieldSelect) {
          return false;
        }

        const rowContext = this.getSelectedTableRowForMacroContext();
        const collectionName = this.isStaticTable(table)
          ? "ROOT"
          : (rowContext?.row
            ? this.getTableRowMacroCollectionName(table, rowContext.row)
            : "ROOT");
        const collections = this.getLockedTableCollectionOptions(collectionName);
        const nextCollection = this.renderJsonCollectionSelect(
          collectionSelect,
          collections,
          collectionName,
          { force: !!options.forceCollectionRebuild }
        );

        collectionSelect.disabled = true;
        fieldSelect.disabled = false;

        this.populateJsonMacroFieldSelect(nextCollection);

        return true;
      }

      refreshJsonCollectionPicker() {
        this.updateJsonMacroToolbar({ forceCollectionRebuild: true });
      }

      updateJsonDataToolbarHint() {
        const jsonButton = document.querySelector('.toolbar button[aria-label="Carregar JSON"]');

        if (jsonButton) {
          jsonButton.title = this.reportDataFileName
            ? `JSON: ${this.reportDataFileName} (clique para substituir)`
            : "Abrir arquivo JSON do disco";
        }

        this.updateJsonMacroPickerTitles();
        this.updateDocumentJsonStatus();
      }

      updateJsonMacroPickerTitles() {
        const collectionSelect = document.getElementById("jsonCollection");
        const fieldSelect = document.getElementById("jsonMacroField");

        if (collectionSelect) {
          const selectedCollection = String(collectionSelect.value || "").trim();
          const table = this.getActiveTableForMacroContext();

          if (table) {
            collectionSelect.title = selectedCollection
              ? `Coleção da linha da tabela (fixa) — ${selectedCollection}`
              : "Coleção da linha da tabela (fixa)";
          } else if (this.isParagraphMacroToolbarActive()) {
            collectionSelect.title = selectedCollection
              ? `Coleção do parágrafo (ROOT) — ${selectedCollection}`
              : "Coleção do parágrafo (ROOT)";
          } else if (this.isChartMacroToolbarActive()) {
            const context = this.getChartMacroContext(this.selectedObject);
            const scopeHint = context.inTableCell
              ? `coleção ${context.collectionName}`
              : "ROOT e histogramas do ROOT";

            collectionSelect.title = selectedCollection
              ? `Contexto do histograma (${scopeHint}) — ${selectedCollection}`
              : `Contexto do histograma (${scopeHint})`;
          } else {
            const base = this.getReportDataRootRecord()
              ? "Coleção do JSON"
              : "Coleção do JSON (carregue o JSON com 📂)";

            collectionSelect.title = selectedCollection
              ? `${base} — ${selectedCollection}`
              : base;
          }
        }

        if (fieldSelect) {
          const base = "Campo macro do JSON";
          const selectedMacro = String(fieldSelect.value || "").trim();

          if (!selectedMacro) {
            fieldSelect.title = base;
            return;
          }

          const option = fieldSelect.selectedOptions?.[0] ||
            fieldSelect.options[fieldSelect.selectedIndex];
          const label = String(option?.textContent || selectedMacro).trim();

          fieldSelect.title = `${base} — ${label}`;
        }
      }

      updateDocumentJsonStatus() {
        if (document.body.classList.contains("wordex-generated-report")) {
          return;
        }

        const title = this.documentTitleElement;

        if (!title) {
          return;
        }

        let status = title.querySelector(".document-json-status");

        if (!status) {
          status = document.createElement("span");
          status.className = "document-json-status";
          title.appendChild(status);
        }

        if (this.getReportDataRootRecord()) {
          status.textContent = "";
          status.hidden = true;
          return;
        }

        status.hidden = false;
        status.textContent = "(SEM JSON)";
      }

      getSampleValueForCollection(collectionName) {
        const root = this.getReportDataRootRecord();

        if (!root) {
          return null;
        }

        const normalized = String(collectionName || "").trim();

        if (!normalized || normalized === "ROOT") {
          return root;
        }

        if (normalized.includes(".")) {
          const parts = normalized.split(".").filter(Boolean);
          let current = root;

          for (const part of parts) {
            if (!current || typeof current !== "object") {
              return null;
            }

            const items = current[part];
            const firstRow = this.getFirstReportDatasourceRow(items);

            if (!firstRow) {
              return null;
            }

            current = firstRow;
          }

          return current;
        }

        const directItems = root[normalized];
        const firstRow = this.getFirstReportDatasourceRow(directItems);

        if (firstRow) {
          return firstRow;
        }

        if (
          directItems &&
          typeof directItems === "object" &&
          this.classifyReportDatasourceKey(normalized, directItems)
        ) {
          return directItems;
        }

        return this.findNestedCollectionSample(root, normalized);
      }

      findNestedCollectionSample(root, collectionName) {
        const normalized = String(collectionName || "").trim();

        if (!normalized || !root || typeof root !== "object") {
          return null;
        }

        for (const item of this.getArrayProperties(root)) {
          if (this.isTotalCollectionName(item.name)) {
            continue;
          }

          for (const parentRecord of item.value) {
            if (!parentRecord || typeof parentRecord !== "object") {
              continue;
            }

            const nestedItems = parentRecord[normalized];
            const firstRow = this.getFirstReportDatasourceRow(nestedItems);

            if (firstRow) {
              return firstRow;
            }
          }
        }

        return null;
      }

      isEmbeddedFkObject(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return false;
        }

        if (this.isTypedFieldValue(value) || this.isChartDataObject(value)) {
          return false;
        }

        return true;
      }

      collectContextFieldPaths(value, prefix = "") {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return [];
        }

        const paths = [];

        Object.keys(value)
          .filter(key => !key.startsWith("$"))
          .filter(key => !/_Kind$/i.test(key))
          .sort((left, right) => left.localeCompare(right, "pt"))
          .forEach(key => {
            const child = value[key];
            const path = prefix ? `${prefix}.${key}` : key;

            if (Array.isArray(child)) {
              return;
            }

            if (this.isTypedFieldValue(child)) {
              const kind = this.normalizeReportFieldKind(child.Kind);

              if (
                kind === "object" &&
                child.Value &&
                typeof child.Value === "object" &&
                !Array.isArray(child.Value)
              ) {
                paths.push(...this.collectContextFieldPaths(child.Value, path));
              } else if (child !== null && child !== undefined) {
                paths.push(path);
              }

              return;
            }

            if (this.isScalarReportField(child)) {
              if (child !== null && child !== undefined) {
                paths.push(path);
              }

              return;
            }

            if (this.isEmbeddedFkObject(child)) {
              paths.push(...this.collectContextFieldPaths(child, path));
            }
          });

        return paths;
      }

      collectContextFieldNames(value) {
        return this.collectContextFieldPaths(value);
      }

      getReportFieldKindAtPath(sample, path) {
        const parts = String(path || "")
          .split(".")
          .map(part => part.trim())
          .filter(Boolean);

        if (parts.length === 0) {
          return "string";
        }

        const value = this.getValueByPath(sample, parts);

        if (this.isTypedFieldValue(value)) {
          return this.normalizeReportFieldKind(value.Kind);
        }

        return this.inferLegacyFieldKind(parts[parts.length - 1], value);
      }

      collectChartSourceNames(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return [];
        }

        return Object.keys(value)
          .filter(key => !key.startsWith("$"))
          .filter(key => !/_Kind$/i.test(key))
          .filter(key => this.isHistogramChartSource(value[key]) || this.isNativeChartDataObject(value[key]))
          .sort((left, right) => left.localeCompare(right, "pt"));
      }

      isHistogramChartSource(value) {
        return this.isHistogramReportDatasource(value);
      }

      isNativeChartDataObject(value) {
        if (!value || typeof value !== "object" || Array.isArray(value) || this.isTypedFieldValue(value)) {
          return false;
        }

        if (this.isReportDatasourceWrapper(value)) {
          return false;
        }

        return (
          Object.prototype.hasOwnProperty.call(value, "ChartTitle") ||
          Object.prototype.hasOwnProperty.call(value, "chartTitle") ||
          Array.isArray(value.Columns) ||
          Array.isArray(value.columns) ||
          Array.isArray(value.Items) ||
          Array.isArray(value.items)
        );
      }

      getMacroFieldsForCollection(collectionName, options = null) {
        const sample = this.getSampleValueForCollection(collectionName);

        if (!sample) {
          return [];
        }

        const { mode, allowedKinds } = this.normalizeMacroFieldOptions(options);
        let rawPaths = mode === "chart"
          ? this.collectChartSourceNames(sample)
          : this.collectContextFieldNames(sample);

        const kinds = Array.isArray(allowedKinds)
          ? allowedKinds.map(kind => this.normalizeReportFieldKind(kind)).filter(Boolean)
          : null;

        if (mode !== "chart" && kinds?.length) {
          rawPaths = rawPaths.filter(path =>
            kinds.includes(this.getReportFieldKindAtPath(sample, path))
          );
        }

        return rawPaths;
      }

      setJsonMacroKindFilter(allowedKinds) {
        this.jsonMacroKindFilter = Array.isArray(allowedKinds) ? allowedKinds : null;
        this.onJsonCollectionChange();
      }

      populateJsonMacroFieldSelect(collectionName, options = null) {
        const fieldSelect = document.getElementById("jsonMacroField");

        if (!fieldSelect) {
          return;
        }

        const { mode } = this.normalizeMacroFieldOptions(options);

        if (mode === "chart" && this.isChartHistogramCollectionName(collectionName)) {
          fieldSelect.innerHTML = '<option value="">—</option>';
          fieldSelect.disabled = true;
          this.updateJsonMacroPickerTitles();
          return;
        }

        const sample = this.getSampleValueForCollection(collectionName);
