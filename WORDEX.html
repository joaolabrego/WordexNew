        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma >= 0 && lastDot >= 0) {
          if (lastComma > lastDot) {
            text = text.replace(/\./g, "").replace(",", ".");
          } else {
            text = text.replace(/,/g, "");
          }
        } else if (lastComma >= 0) {
          const decimals = text.length - lastComma - 1;

          if (decimals === 3 && lastComma > 0) {
            text = text.replace(/,/g, "");
          } else {
            text = text.replace(",", ".");
          }
        } else if (lastDot >= 0) {
          const decimals = text.length - lastDot - 1;
          const dotCount = (text.match(/\./g) || []).length;

          if (dotCount > 1 || (decimals === 3 && lastDot > 0)) {
            text = text.replace(/\./g, "");
          }
        }

        const parsed = Number(text);
        return Number.isFinite(parsed) ? parsed : NaN;
      }

      toChartNumericValue(raw, fallback = 0) {
        const parsed = this.parseChartLocaleNumber(raw);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      normalizeChartCellValue(cell, defaultLabel) {
        const displayText = String(cell?.text ?? cell?.label ?? "").trim();
        const numericSource = typeof cell?.value === "number"
          ? cell.value
          : (cell?.value ?? cell?.text);
        const value = this.toChartNumericValue(numericSource);
        const text = displayText || this.formatChartAxisValue(value);

        return {
          text,
          value,
          label: String(cell?.label ?? defaultLabel ?? "")
        };
      }

      syncChartToolbarControls() {
        const horizontalCheckbox = document.getElementById("chartHorizontal");
        const modeSelect = document.getElementById("chartMode");
        const chartBox = this.getLiveSelectedObject();

        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        const chartType = String(chartBox.dataset.chartType || "bar").trim().toLowerCase();

        if (horizontalCheckbox) {
          horizontalCheckbox.checked = chartType === "hbar";
        }
        if (modeSelect) {
          modeSelect.value = chartBox.dataset.chartMode || "normal";
        }

        const style = this.getChartTextStyle(chartBox);
        const fontFamily = document.getElementById("fontFamily");
        const fontSize = document.getElementById("fontSize");
        const fontColor = document.getElementById("fontColor");

        if (fontFamily) {
          fontFamily.value = this.normalizeFontFamilyForSelect(style.fontFamily);
        }

        if (fontSize) {
          fontSize.value = this.normalizeFontSizeForSelect(style.fontSize);
        }

        if (fontColor) {
          fontColor.value = this.normalizeColorForInput(style.color);
        }

        if (chartType !== "bar" && chartType !== "hbar") {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);
        const activeSeriesIndex = this.getChartActiveSeriesIndex(chartBox, seriesCount);
        const colorInput = document.getElementById("chartSeriesColor");
        const colorLabel = document.getElementById("chartSeriesColorLabel");
        const columnLabel = chartData?.Columns?.[activeSeriesIndex]?.label || `Série ${activeSeriesIndex + 1}`;

        if (colorLabel) {
          colorLabel.textContent = columnLabel;
        }

        if (colorInput) {
          colorInput.value = this.normalizeColorForInput(seriesColors[activeSeriesIndex]);
        }
      }

      getDefaultChartSeriesColors() {
        return ["#555555", "#888888", "#aaaaaa", "#bbbbbb", "#777777"];
      }

      readChartSeriesColors(chartBox, seriesCount = 1) {
        const defaults = this.getDefaultChartSeriesColors();
        let stored = [];

        try {
          const parsed = JSON.parse(chartBox?.dataset?.wordexChartSeriesColors || "[]");
          stored = Array.isArray(parsed)
            ? parsed.map(color => this.normalizeColorForInput(color))
            : [];
        } catch (error) {
          stored = [];
        }

        const count = Math.max(Number(seriesCount) || 1, 1);

        return Array.from({ length: count }, (_, index) => {
          return stored[index] || defaults[index % defaults.length];
        });
      }

      writeChartSeriesColors(chartBox, colors) {
        if (!chartBox || !Array.isArray(colors)) {
          return;
        }

        chartBox.dataset.wordexChartSeriesColors = JSON.stringify(
          colors.map(color => this.normalizeColorForInput(color))
        );
      }

      getChartBoxPreviewScopes(chartBox) {
        const rootRecord = this.getReportDataRootRecord() || {};
        const rootScope = this.createDataScope(rootRecord, "ROOT", rootRecord, null);
        const context = this.getChartMacroContext(chartBox);

        if (!context.inTableCell || context.collectionName === "ROOT") {
          return [rootScope];
        }

        const sample = this.getSampleValueForCollection(context.collectionName);

        if (!sample) {
          return [rootScope];
        }

        return [
          this.createDataScope(sample, context.collectionName, rootRecord, rootRecord, "ROOT"),
          rootScope
        ];
      }

      getDynamicImagePreviewScopes(imageBox) {
        const rootRecord = this.getReportDataRootRecord() || {};
        const rootScope = this.createDataScope(rootRecord, "ROOT", rootRecord, null);
        const context = this.getImageMacroContext(imageBox);

        if (!context.inTableCell || context.collectionName === "ROOT") {
          return [rootScope];
        }

        const sample = this.getSampleValueForCollection(context.collectionName);

        if (!sample) {
          return [rootScope];
        }

        return [
          this.createDataScope(sample, context.collectionName, rootRecord, rootRecord, "ROOT"),
          rootScope
        ];
      }

      restoreDynamicImageMacroPlaceholder(imageBox, fieldName = "") {
        if (!imageBox?.matches?.(".dynamic-image-box")) {
          return;
        }

        if (imageBox.dataset.wordexType === "staticImage") {
          return;
        }

        const macroField = String(
          fieldName ||
          imageBox.dataset.fieldName ||
          this.extractMacroNameFromImageBox(imageBox) ||
          ""
        ).trim();

        if (!macroField) {
          return;
        }

        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = macroField;
        delete imageBox.dataset.wordexMaterialized;
        delete imageBox.dataset.wordexEditorPreview;
        imageBox.innerHTML = "{{" + this.escapeHtml(macroField) + "}}";
      }

      normalizeDynamicImageBoxesForSave(root) {
        if (!root) {
          return;
        }

        root.querySelectorAll(".dynamic-image-box").forEach(box => {
          if (box.dataset.wordexType === "staticImage") {
            return;
          }

          this.restoreDynamicImageMacroPlaceholder(box);
        });
      }

      previewDynamicImageBox(imageBox) {
        if (!imageBox?.matches?.(".dynamic-image-box")) {
          return;
        }

        if (imageBox.dataset.wordexType === "staticImage") {
          return;
        }

        const fieldName = String(
          imageBox.dataset.fieldName ||
          this.extractMacroNameFromImageBox(imageBox) ||
          ""
        ).trim();

        if (!fieldName || !this.getReportDataRootRecord()) {
          this.restoreDynamicImageMacroPlaceholder(imageBox, fieldName);
          return;
        }

        const scopes = this.getDynamicImagePreviewScopes(imageBox);
        let imageSrc = this.stringifyResolvedValue(
          this.resolveDataPath(fieldName, scopes)
        ).trim();

        imageSrc = this.decodeHtmlEntities(imageSrc);
        imageSrc = this.resolveReportImageSourceForOutput(imageSrc);

        if (!imageSrc || !this.looksLikeImageSource(imageSrc)) {
          this.restoreDynamicImageMacroPlaceholder(imageBox, fieldName);
          return;
        }

        const img = document.createElement("img");
        img.src = imageSrc;
        img.alt = fieldName;
        img.draggable = false;
        img.style.display = "block";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";
        img.style.width = "auto";
        img.style.height = "auto";
        img.style.objectFit = "contain";

        imageBox.innerHTML = "";
        imageBox.appendChild(img);
        imageBox.dataset.wordexEditorPreview = "1";
        delete imageBox.dataset.wordexMaterialized;

        if (this.selectedObject === imageBox) {
          this.scheduleObjectResizeOverlayAfterInsert(imageBox);
        }
      }

      async previewDynamicImagesInDocument() {
        if (!this.getReportDataRootRecord()) {
          this.documentElement
            .querySelectorAll(".dynamic-image-box")
            .forEach(box => this.restoreDynamicImageMacroPlaceholder(box));
          return;
        }

        await this.prefetchReportImageDataUrls(this.reportData);

        this.documentElement
          .querySelectorAll(".dynamic-image-box")
          .forEach(box => this.previewDynamicImageBox(box));
      }

      getChartBoxResolvedData(chartBox) {
        if (!chartBox) {
          return null;
        }

        return this.readChartDataFromElement(chartBox);
      }

      hydrateChartBoxFromSavedHtml(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box")) {
          return;
        }

        this.migrateChartTextStyleFromInline(chartBox);

        const chartData = this.readChartDataFromElement(chartBox);

        if (!chartData) {
          return;
        }

        if (!this.getChartDataScriptElement(chartBox)) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.bindChartBarSeriesInteraction(chartBox);
        this.scheduleChartOverlayLayout(chartBox);
      }

      getDefaultChartLegendPosition() {
        return { x: 8, y: 10, custom: false };
      }

      readChartLegendPosition(chartBox) {
        const x = Number(chartBox?.dataset?.wordexChartLegendX);
        const y = Number(chartBox?.dataset?.wordexChartLegendY);

        if (Number.isFinite(x) && Number.isFinite(y)) {
          return { x, y, custom: true };
        }

        return this.getDefaultChartLegendPosition();
      }

      writeChartLegendPosition(chartBox, x, y) {
        if (!chartBox) {
          return;
        }

        chartBox.dataset.wordexChartLegendX = String(Math.round(Number(x) * 10) / 10);
        chartBox.dataset.wordexChartLegendY = String(Math.round(Number(y) * 10) / 10);
      }

      buildChartLegendPanelHtml(seriesLabels, seriesColors, chartStyle) {
        if (!Array.isArray(seriesLabels) || seriesLabels.length < 2) {
          return "";
        }

        const labelStyle = this.buildChartOverlayLabelStyle(chartStyle);
        const items = seriesLabels.map((label, index) => {
          const swatchColor = seriesColors[index % seriesColors.length];

          return `
            <span class="wordex-chart-legend-item">
              <span class="wordex-chart-legend-swatch" style="background-color:${swatchColor};"></span>
              <span class="wordex-chart-legend-label" style="${labelStyle}">${this.escapeHtml(label)}</span>
            </span>
          `;
        }).join("");

        return `<div class="wordex-chart-legend-panel" role="presentation">${items}</div>`;
      }

      applyChartLegendPanelPosition(chartBox) {
        const panel = chartBox?.querySelector?.(".wordex-chart-legend-panel");

        if (!panel) {
          return;
        }

        const position = this.readChartLegendPosition(chartBox);
        panel.style.left = `${position.x}px`;
        panel.style.top = `${position.y}px`;
      }

      startChartLegendDrag(event, chartBox) {
        const preview = chartBox?.querySelector?.(".wordex-chart-preview");
        const panel = preview?.querySelector?.(".wordex-chart-legend-panel");

        if (!preview || !panel) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        const startPointerX = event.clientX;
        const startPointerY = event.clientY;
        const startPosition = this.readChartLegendPosition(chartBox);

        preview.setPointerCapture?.(event.pointerId);

        const onMove = moveEvent => {
          const x = startPosition.x + (moveEvent.clientX - startPointerX);
          const y = startPosition.y + (moveEvent.clientY - startPointerY);

          panel.style.left = `${x}px`;
          panel.style.top = `${y}px`;
          this.writeChartLegendPosition(chartBox, x, y);
        };

        const onUp = upEvent => {
          preview.releasePointerCapture?.(upEvent.pointerId);
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          this.syncObjectAfterChangeAndKeepSelected(chartBox);
        };

        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      }

      getChartActiveSeriesIndex(chartBox, seriesCount = 1) {
        const maxIndex = Math.max(Number(seriesCount) || 1, 1) - 1;
        const index = Number(chartBox?.dataset?.wordexChartActiveSeriesIndex ?? "0");

        if (!Number.isFinite(index)) {
          return 0;
        }

        return Math.min(Math.max(0, index), maxIndex);
      }

      applyChartSeriesColor(chartBox, seriesIndex, color) {
        if (!chartBox?.matches?.(".wordex-chart-box") || !["bar", "hbar"].includes(chartBox.dataset.chartType)) {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(
          this.getChartSeriesCount(chartData),
          Number(seriesIndex) + 1,
          1
        );
        const colors = this.readChartSeriesColors(chartBox, seriesCount);
        colors[seriesIndex] = this.normalizeColorForInput(color);
        chartBox.dataset.wordexChartActiveSeriesIndex = String(seriesIndex);
        this.writeChartSeriesColors(chartBox, colors);
        this.updateChartBoxPresentation(chartBox);
      }

      applyChartSeriesColorFromToolbar(color) {
        const chartBox = this.getLiveSelectedObject();

        if (!chartBox?.matches?.(".wordex-chart-box") || !["bar", "hbar"].includes(chartBox.dataset.chartType)) {
          return;
        }

        const chartData = this.getChartBoxResolvedData(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesIndex = this.getChartActiveSeriesIndex(chartBox, seriesCount);
        this.applyChartSeriesColor(chartBox, seriesIndex, color);
        this.syncObjectAfterChangeAndKeepSelected(chartBox);
      }

      bindChartBarSeriesInteraction(chartBox) {
        if (!chartBox?.matches?.(".wordex-chart-box") || !["bar", "hbar"].includes(chartBox.dataset.chartType)) {
          return;
        }

        const preview = chartBox.querySelector(".wordex-chart-preview");

        if (!preview || preview.dataset.wordexChartBarsBound === "1") {
          return;
        }

        preview.dataset.wordexChartBarsBound = "1";
        preview.addEventListener("pointerdown", event => {
          if (this.selectedObject !== chartBox) {
            return;
          }

          if (event.target?.closest?.(".wordex-chart-legend-panel")) {
            this.startChartLegendDrag(event, chartBox);
            return;
          }

          const target = event.target?.closest?.("rect.wordex-chart-bar, circle.wordex-chart-line-point");

          if (!target || !chartBox.contains(target)) {
            return;
          }

          event.preventDefault();
          event.stopPropagation();

          const seriesIndex = Number(target.dataset.seriesIndex);

          if (!Number.isFinite(seriesIndex)) {
            return;
          }

          chartBox.dataset.wordexChartActiveSeriesIndex = String(seriesIndex);
          this.syncChartToolbarControls();
        });
      }

      insertTextbox() {
        if (!this.selectedParagraphId) {
          alert("Selecione um parágrafo para inserir o textbox.");
          return;
        }

        if (!this.getSelectedObjectParagraphElement()) {
          alert("Selecione um parágrafo com objeto (imagem, histograma ou tabela) para inserir o textbox.");
          return;
        }

        this.insertTextboxIntoObjectParagraph(
          this.createTextboxElement("Textbox", "free", "35mm", "8mm")
        );
      }


      insertTable() {
        if (!this.getReportDataRootRecord()) {
          this.insertSimpleStaticTable();
          return;
        }

        this.openInsertTableDialog();
      }

      isStaticTable(table) {
        return !!table?.matches?.("table.wordex-table") &&
          String(table.dataset.wordexTableKind || "").trim().toLowerCase() === "static";
      }

      insertSimpleStaticTable(rows = 3, cols = 3) {
        const table = this.createSimpleStaticTableElement(rows, cols, "left", "80mm");
        this.insertNodeAtCurrentInsertionPoint(table);
      }

      closeInsertTableDialog() {
        if (this.insertTableDialogBackdrop?.parentNode) {
          this.insertTableDialogBackdrop.parentNode.removeChild(this.insertTableDialogBackdrop);
        }

        this.insertTableDialogBackdrop = null;
      }


      normalizeDatasourceKind(kind) {
        const normalized = String(kind || "").trim().toLowerCase();

        if (normalized === "histogram") {
          return "graph";
        }

        if (normalized === "total") {
          return "totals";
        }

        if (normalized === "collection" || normalized === "totals" || normalized === "graph") {
          return normalized;
        }

        return null;
      }

      isReportDatasourceWrapper(value) {
        return !!(
          value &&
          typeof value === "object" &&
          !Array.isArray(value) &&
          !this.isTypedFieldValue(value) &&
          Array.isArray(value.Items)
        );
      }

      getReportDatasourceWrapperKind(value) {
        if (!this.isReportDatasourceWrapper(value)) {
          return null;
        }

        return this.normalizeDatasourceKind(value.Kind) || "collection";
      }

      getReportDatasourceItems(value) {
        if (Array.isArray(value)) {
          return value;
        }

        if (this.isReportDatasourceWrapper(value)) {
          return value.Items;
        }

        return [];
      }

      getFirstReportDatasourceRow(value) {
        const items = this.getReportDatasourceItems(value);

        return items.length > 0 ? items[0] : null;
      }

      classifyReportDatasourceKey(name, value) {
        const wrapperKind = this.getReportDatasourceWrapperKind(value);

        if (wrapperKind) {
          return wrapperKind;
        }

        if (Array.isArray(value)) {
          return "collection";
        }

        if (!value || typeof value !== "object" || this.isTypedFieldValue(value)) {
          return null;
        }

        if (this.isHistogramDatasourceObject(name, value)) {
          return "graph";
        }

        if (this.isTotalCollectionName(name)) {
          return "totals";
        }

        if (this.isEmbeddedFkObject(value)) {
          return null;
        }

        return null;
      }

      isHistogramDatasourceObject(name, value) {
        if (!value || typeof value !== "object" || Array.isArray(value) || this.isTypedFieldValue(value)) {
          return false;
        }

        if (this.isChartDataObject(value)) {
          return true;
        }

        if (/Grafico$/i.test(String(name || ""))) {
          return true;
        }

        const items = this.getReportDatasourceItems(value);

        if (items.length > 0) {
          return this.isHistogramReportRow(items[0]);
        }

        return this.isHistogramReportRow(value);
      }

      getAllReportDatasources() {
        const root = this.getReportDataRootRecord();

        if (!root) {
          return [];
        }

        const results = [{ path: "ROOT", label: "ROOT [collection]", kind: "collection" }];
        const seen = new Set(["ROOT"]);

        const addDatasource = (path, label, kind) => {
          if (!path || seen.has(path)) {
            return;
          }

          seen.add(path);
          results.push({ path, label: `${label} [${kind}]`, kind });
        };

        const walk = (sample, prefix, labelPrefix) => {
          if (!sample || typeof sample !== "object" || Array.isArray(sample)) {
            return;
          }

          Object.keys(sample)
            .filter(key => !key.startsWith("$"))
            .sort((left, right) => left.localeCompare(right, "pt"))
            .forEach(key => {
              const value = sample[key];
              const kind = this.classifyReportDatasourceKey(key, value);

              if (!kind) {
                return;
              }

              const path = prefix ? `${prefix}.${key}` : key;
              const label = labelPrefix ? `${labelPrefix} › ${key}` : key;

              addDatasource(path, label, kind);

              if (kind === "collection") {
                const firstRow = this.getFirstReportDatasourceRow(value);

                if (firstRow) {
                  walk(firstRow, path, label);
                }
              }
            });
        };

        walk(root, "", "");
        return results;
      }

      getDatasourceParentPath(path) {
        const normalized = String(path || "ROOT").trim() || "ROOT";

        if (normalized === "ROOT") {
          return null;
        }

        const parts = normalized.split(".").filter(Boolean);

        if (parts.length <= 1) {
          return "ROOT";
        }

        return parts.slice(0, -1).join(".");
      }

      getSampleValueForDatasourceContext(path) {
        const normalized = String(path || "ROOT").trim() || "ROOT";

        if (!normalized || normalized === "ROOT") {
          return this.getReportDataRootRecord();
        }

        return this.getSampleValueForCollection(normalized);
      }

      getReportDatasourcesInParent(parentPath, kind = null) {
        const normalizedParent = parentPath == null ? "ROOT" : String(parentPath).trim() || "ROOT";
        const sample = this.getSampleValueForDatasourceContext(normalizedParent);

        if (!sample || typeof sample !== "object") {
          return [];
        }

        const labelPrefix = normalizedParent === "ROOT" ? "" : normalizedParent.replace(/\./g, " › ");
        const results = [];

        Object.keys(sample)
          .filter(key => !key.startsWith("$"))
          .sort((left, right) => left.localeCompare(right, "pt"))
          .forEach(key => {
            const value = sample[key];
            const itemKind = this.classifyReportDatasourceKey(key, value);

            if (!itemKind || (kind && itemKind !== kind)) {
              return;
            }

            const path = normalizedParent === "ROOT" ? key : `${normalizedParent}.${key}`;
            const label = labelPrefix ? `${labelPrefix} › ${key}` : key;

            results.push({ path, label: `${label} [${itemKind}]`, kind: itemKind });
          });

        return results;
      }

      getHeaderDatasourceOptionsForAncestor(detailPath, ancestorPath) {
        const normalizedDetail = String(detailPath || "").trim();
        const detailParent = this.getDatasourceParentPath(normalizedDetail) || "ROOT";
        const excludeDetail = item => item.path !== normalizedDetail;
        const options = this.getReportDatasourcesInParent(detailParent, "collection").filter(excludeDetail);
        const ancestor = String(ancestorPath || "").trim();

        if (!ancestor || ancestor === "ROOT" || options.some(item => item.path === ancestor)) {
          return options;
        }

        const ancestorParent = this.getDatasourceParentPath(ancestor) || "ROOT";
        const ancestorOptions = this.getReportDatasourcesInParent(ancestorParent, "collection");
        const ancestorOption = ancestorOptions.find(item => item.path === ancestor);

        if (!ancestorOption || ancestorOption.path === normalizedDetail) {
          return options;
        }

        return [ancestorOption, ...options.filter(item => item.path !== ancestor)];
      }

      getFooterDatasourceOptionsForAncestor(ancestorPath) {
        const ancestor = String(ancestorPath || "ROOT").trim() || "ROOT";

        return this.getReportDatasourcesInParent(ancestor, "totals");
      }

      getCollectionAncestorChain(detailPath) {
        const normalized = String(detailPath || "ROOT").trim() || "ROOT";

        if (normalized === "ROOT") {
          return ["ROOT"];
        }

        const parts = normalized.split(".").filter(Boolean);
        const ancestors = [];

        for (let index = parts.length - 1; index >= 1; index--) {
          ancestors.push(parts.slice(0, index).join("."));
        }

        ancestors.push("ROOT");
        return ancestors;
      }

      setTableRowDatasource(row, datasource) {
        if (!row) {
          return;
        }

        const value = String(datasource || "").trim();

        if (value) {
          row.dataset.wordexDatasource = value;
        } else {
          delete row.dataset.wordexDatasource;
        }

        this.updateTableRowTypeLabel(row);
      }

      renderCollectionPathOptions(collections, selectedValue = "", includeEmpty = false) {
        const options = [];

        if (includeEmpty) {
          options.push(`<option value="">${this.escapeHtml("(não renderizar)")}</option>`);
        }

        collections.forEach(item => {
          const selected = item.path === selectedValue ? " selected" : "";
          options.push(
            `<option value="${this.escapeHtml(item.path)}"${selected}>${this.escapeHtml(item.label)}</option>`
          );
        });

        return options.join("");
      }

      openInsertTableDialog() {
        const datasources = this.getAllReportDatasources().filter(item => item.kind === "collection");

        if (!datasources.length) {
          alert("Nenhuma coleção encontrada no JSON.");
          return;
        }

        this.closeInsertTableDialog();

        const defaultDetailPath = datasources.find(item => item.path !== "ROOT")?.path || "ROOT";
        const backdrop = document.createElement("div");
        backdrop.className = "wordex-chart-data-dialog-backdrop";
        backdrop.innerHTML = `
          <div class="wordex-chart-data-dialog" role="dialog" aria-modal="true" aria-labelledby="wordex-insert-table-title">
            <h2 id="wordex-insert-table-title">Inserir Tabela</h2>
            <div class="wordex-chart-data-dialog-fields">
              <label>Datasource do Detail
                <select id="wordexInsertTableDetailDatasource">
                  ${this.renderCollectionPathOptions(datasources, defaultDetailPath)}
                </select>
              </label>
            </div>
            <div id="wordexInsertTableHeaderFields" class="wordex-chart-data-dialog-fields"></div>
            <div id="wordexInsertTableFooterFields" class="wordex-chart-data-dialog-fields"></div>
            <div class="wordex-chart-data-dialog-actions">
              <button type="button" id="wordexInsertTableCancel">Cancelar</button>
              <button type="button" class="primary" id="wordexInsertTableConfirm">Confirmar</button>
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);
        this.insertTableDialogBackdrop = backdrop;

        const detailSelect = backdrop.querySelector("#wordexInsertTableDetailDatasource");
        const headerFields = backdrop.querySelector("#wordexInsertTableHeaderFields");
        const footerFields = backdrop.querySelector("#wordexInsertTableFooterFields");

        const readSelectedValues = attributeName => {
          const values = {};

          backdrop.querySelectorAll(`[${attributeName}]`).forEach(select => {
            const key = select.getAttribute(attributeName) || "";

            if (key) {
              values[key] = String(select.value || "").trim();
            }
          });

          return values;
        };

        const renderGroupFields = () => {
          const detailPath = String(detailSelect?.value || "ROOT").trim() || "ROOT";

          if (detailPath === "ROOT") {
            headerFields.innerHTML =
              "<p style=\"margin:0;color:#555;font-size:13px;\">Tabela estática 3×3: preencha as células com texto fixo ou macros do ROOT (sem coleções).</p>";
            footerFields.innerHTML = "";
            return;
          }

          const ancestors = this.getCollectionAncestorChain(detailPath);
          const headerAncestors = ancestors.filter(ancestor => ancestor !== "ROOT").slice().reverse();
          const previousHeaders = readSelectedValues("data-wordex-header-ancestor");
          const previousFooters = readSelectedValues("data-wordex-footer-ancestor");

          headerFields.innerHTML = headerAncestors.map(ancestor => {
            const options = this.getHeaderDatasourceOptionsForAncestor(detailPath, ancestor);
            const defaultHeader = options.some(item => item.path === ancestor)
              ? ancestor
              : (previousHeaders[ancestor] || options[0]?.path || ancestor);

            return `
              <label>Grupo ${this.escapeHtml(ancestor)} (collection)
                <select data-wordex-header-ancestor="${this.escapeHtml(ancestor)}">
                  ${this.renderCollectionPathOptions(options, defaultHeader)}
                </select>
              </label>
            `;
          }).join("");

          footerFields.innerHTML = ancestors.map(ancestor => {
            const options = this.getFooterDatasourceOptionsForAncestor(ancestor);
            const defaultFooter = previousFooters[ancestor] || "";

            const footerLabel = ancestor === "ROOT"
              ? "TableFooter (total)"
              : `Footer de ${this.escapeHtml(ancestor)} (total)`;

            return `
              <label>${footerLabel}
                <select data-wordex-footer-ancestor="${this.escapeHtml(ancestor)}">
                  ${this.renderCollectionPathOptions(options, defaultFooter, true)}
                </select>
              </label>
            `;
          }).join("");
        };

        renderGroupFields();
        detailSelect?.addEventListener("change", renderGroupFields);
        headerFields?.addEventListener("change", event => {
          if (event.target?.matches?.("[data-wordex-header-ancestor]")) {
            renderGroupFields();
          }
        });

        backdrop.querySelector("#wordexInsertTableCancel")?.addEventListener("click", () => {
          this.closeInsertTableDialog();
        });

        backdrop.addEventListener("click", event => {
          if (event.target === backdrop) {
            this.closeInsertTableDialog();
          }
        });

        backdrop.querySelector("#wordexInsertTableConfirm")?.addEventListener("click", () => {
          const detailDatasource = String(detailSelect?.value || "ROOT").trim() || "ROOT";

          if (detailDatasource === "ROOT") {
            this.closeInsertTableDialog();
            this.insertSimpleStaticTable();
            return;
          }

          const headerDatasources = readSelectedValues("data-wordex-header-ancestor");
          const footerDatasources = readSelectedValues("data-wordex-footer-ancestor");
          const table = this.buildTableFromDatasourceSpec(
            detailDatasource,
            footerDatasources,
            headerDatasources
          );

          if (!table) {
            return;
          }

          this.closeInsertTableDialog();
          this.insertNodeAtCurrentInsertionPoint(table);
        });
      }

      collectDetailTableColumnFields(detailPath) {
        const sample = this.getSampleValueForCollection(detailPath);

        if (!sample || typeof sample !== "object" || Array.isArray(sample)) {
          return [];
        }

        return Object.keys(sample)
          .filter(key => !key.startsWith("$"))
          .sort((left, right) => left.localeCompare(right, "pt"))
          .filter(key => {
            const value = sample[key];

            if (this.classifyReportDatasourceKey(key, value)) {
              return false;
            }

            if (Array.isArray(value)) {
              return false;
            }

            if (this.isEmbeddedFkObject(value)) {
              return false;
            }

            return this.isScalarReportField(value);
          })
          .map(name => ({ name }));
      }

      ensureTableRowCellCount(row, columnCount) {
        const cols = Math.max(1, Number(columnCount) || 1);

        while (row.cells.length < cols) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          row.appendChild(td);
        }

        while (row.cells.length > cols) {
          row.deleteCell(row.cells.length - 1);
        }
      }

      getTableRowLogicalColumnSpan(row, table = null) {
        const thisRowSpan = Array.from(row?.cells || []).reduce((total, cell) => {
          return total + (Number(cell.colSpan) || 1);
        }, 0);

        if (!table || !row) {
          return thisRowSpan;
        }

        const rowIndex = this.getTableRowIndex(table, row);

        if (rowIndex <= 0) {
          return thisRowSpan;
        }

        let occupiedFromAbove = 0;

        for (let aboveIndex = 0; aboveIndex < rowIndex; aboveIndex++) {
          const aboveRow = table.rows[aboveIndex];

          for (const cell of Array.from(aboveRow?.cells || [])) {
            const colSpan = Number(cell.colSpan) || 1;
            const rowSpan = Number(cell.rowSpan) || 1;

            if (rowIndex - aboveIndex < rowSpan) {
              occupiedFromAbove += colSpan;
            }
          }
        }

        return occupiedFromAbove + thisRowSpan;
      }

      ensureTableRowLogicalColumnCount(table, row, expectedColumns = null) {
        if (!table || !row) {
          return;
        }

        const expected = Math.max(
          1,
          Number(expectedColumns) || this.getTableColumnCount(table)
        );
        let logical = this.getTableRowLogicalColumnSpan(row, table);

        while (logical < expected) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          td.innerHTML = "<br>";
          row.appendChild(td);
          logical += 1;
        }

        if (logical !== expected) {
          row.dataset.wordexManualColumns = "1";
        }
      }

      normalizeTableRowsAfterMerge(table) {
        if (!table) {
          return;
        }

        const expected = this.getTableColumnCount(table);

        Array.from(table.rows).forEach(row => {
          this.ensureTableRowLogicalColumnCount(table, row, expected);
        });
      }

      populateDetailColumnTitlesRow(row, fields) {
        this.ensureTableRowCellCount(row, Math.max(1, fields.length));

        fields.forEach((field, index) => {
          const cell = row.cells[index];

          if (!cell) {
            return;
          }

          cell.innerHTML = this.escapeHtml(field.name);
        });
      }

      populateDetailDataRow(row, fields) {
        this.ensureTableRowCellCount(row, Math.max(1, fields.length));

        fields.forEach((field, index) => {
          const cell = row.cells[index];

          if (!cell) {
            return;
          }

          cell.innerHTML = this.escapeHtml(this.formatMacroName(field.name));
        });
      }

      collectTotalFieldsFromFooterDatasource(footerDatasource) {
        const path = String(footerDatasource || "").trim();

        if (!path) {
          return [];
        }

        const parentPath = this.getDatasourceParentPath(path) || "ROOT";
        const collectionName = path.split(".").filter(Boolean).pop() || "";
        const parentSample = this.getSampleValueForDatasourceContext(parentPath);
        const wrapper = this.resolveDatasourceValue(parentSample, collectionName, parentSample);
        const firstRow = this.getFirstReportDatasourceRow(wrapper);

        if (!firstRow || typeof firstRow !== "object") {
          return [];
        }

        return Object.keys(firstRow)
          .filter(key => !key.startsWith("$"))
          .filter(key => /(Sum|Count|Min|Max|Avg)$/i.test(key))
          .sort((left, right) => left.localeCompare(right, "pt"))
          .map(name => ({ name }));
      }

      matchTotalMacroForDetailField(detailFieldName, totalFields) {
        const base = String(detailFieldName || "").trim();

        if (!base) {
          return null;
        }

        const names = (totalFields || []).map(field => field.name);
        const exactSum = names.find(name => name === `${base}Sum`);

        if (exactSum) {
          return exactSum;
        }

        return names.find(name => name.startsWith(base)) || null;
      }

      populateGroupFooterRow(row, footerDatasource, detailFields, label = "TOTAL CLIENTE:") {
        const cols = Math.max(1, detailFields.length);
        const totalFields = this.collectTotalFieldsFromFooterDatasource(footerDatasource);

        this.ensureTableRowCellCount(row, cols);
        row.cells[0].innerHTML = this.escapeHtml(label);

        for (let index = 1; index < cols; index++) {
          const detailField = detailFields[index];
          const totalMacro = this.matchTotalMacroForDetailField(detailField?.name, totalFields);
          const cell = row.cells[index];

          if (!cell) {
            continue;
          }

          cell.innerHTML = totalMacro
            ? this.escapeHtml(this.formatMacroName(totalMacro))
            : "<br>";
        }
      }

      populateTableFooterRow(row, footerDatasource, detailFields, label = "TOTAL GERAL:") {
        const cols = Math.max(1, detailFields?.length || 1);
        const totalFields = this.collectTotalFieldsFromFooterDatasource(footerDatasource);

        this.ensureTableRowCellCount(row, cols);
        row.cells[0].innerHTML = this.escapeHtml(label);

        for (let index = 1; index < cols; index++) {
          const detailField = detailFields[index];
          const totalMacro = this.matchTotalMacroForDetailField(detailField?.name, totalFields);
          const cell = row.cells[index];

          if (!cell) {
            continue;
          }

          cell.innerHTML = totalMacro
            ? this.escapeHtml(this.formatMacroName(totalMacro))
            : "<br>";
        }
      }

      buildTableFromDatasourceSpec(detailDatasource, footerDatasources = {}, headerDatasources = {}) {
        const detailPath = String(detailDatasource || "ROOT").trim() || "ROOT";
        const ancestors = this.getCollectionAncestorChain(detailPath);
        const headerAncestors = ancestors.filter(ancestor => ancestor !== "ROOT").slice().reverse();
        const groupFooterAncestors = ancestors.filter(ancestor => ancestor !== "ROOT");
        const detailFields = this.collectDetailTableColumnFields(detailPath);
        const cols = Math.max(1, detailFields.length || 3);
        const leadingFreeCount = headerAncestors.length > 0 ? 1 : 0;
        const middleRowCount = leadingFreeCount + headerAncestors.length + 1 + groupFooterAncestors.length;
        const table = this.createTableElement(middleRowCount + 2, cols, "left", "80mm");

        delete table.dataset.wordexDatasource;
        delete table.dataset.wordexChildren;

        const middleRows = Array.from(table.rows).slice(1, -1);
        let rowIndex = 0;

        if (leadingFreeCount > 0) {
          const titlesRow = middleRows[rowIndex++];

          if (titlesRow) {
            const titlesInsertIndex = Array.from(table.rows).indexOf(titlesRow);
            const titlesDatasource = this.resolveFreeRowDatasourceForInsert(
              table,
              titlesInsertIndex,
              table.rows[0]
            );

            titlesRow.dataset.wordexRowType = "Free";
            this.setTableRowDatasource(titlesRow, titlesDatasource);
            this.populateDetailColumnTitlesRow(titlesRow, detailFields);
            this.recolumnizeTableRow(table, titlesRow, cols);
          }
        }

        headerAncestors.forEach(ancestorPath => {
          const row = middleRows[rowIndex++];

          if (!row) {
            return;
          }

          row.dataset.wordexRowType = "GroupHeader";
          this.setTableRowDatasource(
            row,
            headerDatasources[ancestorPath] || ancestorPath
          );
          this.normalizeTableRowColumnsForType(table, row, "GroupHeader");
        });

        const detailRow = middleRows[rowIndex++];

        if (detailRow) {
          detailRow.dataset.wordexRowType = "Detail";
          this.setTableRowDatasource(detailRow, detailPath);
          this.populateDetailDataRow(detailRow, detailFields);
          this.recolumnizeTableRow(table, detailRow, cols);
        }

        groupFooterAncestors.forEach(ancestorPath => {
          const row = middleRows[rowIndex++];

          if (!row) {
            return;
          }

          row.dataset.wordexRowType = "GroupFooter";
          const footerDatasource = footerDatasources[ancestorPath] || "";
          this.setTableRowDatasource(row, footerDatasource);
          this.recolumnizeTableRow(table, row, cols);
          this.populateGroupFooterRow(row, footerDatasource, detailFields);
        });

        this.setTableRowDatasource(table.rows[0], "ROOT");
        const tableFooterRow = table.rows[table.rows.length - 1];
        const tableFooterDatasource = footerDatasources.ROOT || "";
        this.setTableRowDatasource(tableFooterRow, tableFooterDatasource);
        this.recolumnizeTableRow(table, tableFooterRow, cols);
        this.populateTableFooterRow(tableFooterRow, tableFooterDatasource, detailFields);

        Array.from(table.rows).forEach(row => this.updateTableRowTypeLabel(row));
        this.applyInitialTextStyleToTable(table);
        return table;
      }

      createDynamicImageElement(fieldName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = fieldName;
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;

        imageBox.innerHTML = "{{" + this.escapeHtml(fieldName) + "}}";

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      createEmptyImageElement(align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "staticImage";
        imageBox.dataset.imageName = "Imagem";
        imageBox.dataset.align = align || "left";
        imageBox.style.width = width || "80mm";
        imageBox.style.height = height || "45mm";

        this.applyAlignment(imageBox, align || "left");
        return imageBox;
      }

      createStaticImageElement(imageSrc, imageName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "staticImage";
        imageBox.dataset.imageName = imageName || "Imagem";
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;
        imageBox.dataset.wordexMaterialized = "1";

        const img = document.createElement("img");
        img.src = String(imageSrc || "");
        img.alt = imageName || "Imagem";
        img.draggable = false;
        img.style.display = "block";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "100%";
        img.style.width = "auto";
        img.style.height = "auto";
        img.style.objectFit = "contain";
        imageBox.appendChild(img);

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      applyMacroFieldToChartBox(chartBox, macroField) {
        if (!chartBox?.matches?.(".wordex-chart-box") || !macroField) {
          return null;
        }

        chartBox.dataset.sourceName = macroField;
        this.importChartDataFromMacroSource(chartBox, macroField);
        this.updateChartBoxPresentation(chartBox);
        this.syncObjectAfterChange(chartBox);
        this.selectObject(chartBox);
        return chartBox;
      }

      createChartElement(sourceName, chartType, align, width, height, chartData = null) {
        const chartBox = document.createElement("div");
        chartBox.className = "wordex-chart-box";
        chartBox.contentEditable = "false";
        chartBox.dataset.wordexType = "chart";
        chartBox.dataset.chartType = chartType;
        chartBox.dataset.align = align;
        chartBox.style.width = width;
        chartBox.style.height = height;

        if (sourceName) {
          chartBox.dataset.sourceName = sourceName;
        }

        if (chartData) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.updateChartBoxPresentation(chartBox);
        this.applyBorderStyle(chartBox, WordexEditor.getChartDefaultBorderSettings());
        this.applyAlignment(chartBox, align);
        return chartBox;
      }

      createTextboxElement(text, align, width, height) {
        const textbox = document.createElement("div");
        textbox.className = "wordex-textbox";
        textbox.contentEditable = "true";
        textbox.dataset.wordexType = "textbox";
        textbox.dataset.align = align;
        textbox.style.width = width;
        textbox.style.height = height;
        textbox.style.textAlign = "left";
        textbox.innerHTML = this.escapeHtml(text || "");

        this.applyAlignment(textbox, align);
        this.wireTextboxEditorEvents(textbox);
        return textbox;
      }

      generateChartPlaceholderHtml(sourceName, chartType, chartData = null, chartStyle = null, seriesColors = null, chartMode = "normal") {
        let previewSvg = chartData
          ? this.generateChartSvgFromData(chartType, chartData, chartStyle, seriesColors, chartMode)
          : this.generateChartSvg(chartType, chartStyle);
        let legendHtml = "";
        let valueLabelsHtml = "";
        let categoryLabelsHtml = "";

        if (chartData && (chartType === "bar" || chartType === "hbar")) {
          const layout = this.computeHistogramLayout(chartType, chartData, chartStyle, seriesColors, chartMode);
          const seriesCount = this.getChartSeriesCount(chartData);

          valueLabelsHtml = this.buildChartBarValueLabelsPanelHtml(
            layout.valueLabels,
            chartStyle,
            layout.axisY,
            seriesCount,
            layout.groupWidth
          );
          categoryLabelsHtml = this.buildChartCategoryLabelsPanelHtml(layout.categoryLabelSpecs, chartStyle);
        }

        if (chartData && (chartType === "bar" || chartType === "hbar") && this.getChartSeriesCount(chartData) >= 2) {
          const seriesLabels = this.getChartSeriesLabels(chartData);
          const colors = Array.isArray(seriesColors) && seriesColors.length
            ? seriesColors
            : this.getDefaultChartSeriesColors();

          legendHtml = this.buildChartLegendPanelHtml(seriesLabels, colors, chartStyle);
        }

        return `
          <span class="wordex-chart-preview">
            ${previewSvg}
            ${valueLabelsHtml}
            ${categoryLabelsHtml}
            ${legendHtml}
          </span>
        `;
      }

      generateChartSvg(chartType) {
        if (chartType === "hbar") {
          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              <rect x="42" y="14" width="72" height="10" fill="#bbb"></rect>
              <rect x="42" y="31" width="118" height="10" fill="#999"></rect>
              <rect x="42" y="48" width="54" height="10" fill="#ccc"></rect>
              <rect x="42" y="65" width="148" height="10" fill="#888"></rect>
              <line x1="42" y1="8" x2="42" y2="84" stroke="#777" stroke-width="1"></line>
              <line x1="42" y1="84" x2="208" y2="84" stroke="#aaa" stroke-width="1"></line>
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="none">
            <rect x="24" y="28" width="26" height="62" fill="#bbb"></rect>
            <rect x="62" y="12" width="26" height="78" fill="#999"></rect>
            <rect x="100" y="48" width="26" height="42" fill="#ccc"></rect>
            <rect x="138" y="6" width="26" height="84" fill="#888"></rect>
            <rect x="176" y="24" width="26" height="66" fill="#aaa"></rect>
            <line x1="14" y1="90" x2="208" y2="90" stroke="#777" stroke-width="1"></line>
            <line x1="14" y1="8" x2="14" y2="90" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      getDefaultChartData() {
        return {
          ChartTitle: "",
          CategoryField: "Categoria",
          Columns: [
            { key: "Serie1", label: "Série 1" }
          ],
          Items: [
            {
              title: "",
              values: [
                { text: "", value: 0, label: "Série 1" }
              ]
            }
          ]
        };
      }

      isHistogramReportRow(row) {
        if (!row || typeof row !== "object" || Array.isArray(row)) {
          return false;
        }

        return this.collectHistogramMetricBaseKeys(row).length > 0;
      }

      collectHistogramMetricBaseKeys(row) {
        if (!row || typeof row !== "object" || Array.isArray(row)) {
          return [];
        }

        return Object.keys(row)
          .filter(key => /_Label$/i.test(key))
          .map(key => key.replace(/_Label$/i, ""))
          .filter(baseKey => baseKey && Object.prototype.hasOwnProperty.call(row, baseKey));
      }

      isHistogramReportMetricFieldKey(key) {
        const name = String(key || "");

        if (/_(Value|Label)$/i.test(name)) {
          return true;
        }

        return /(Sum|Count|Min|Max|Avg)$/i.test(name);
      }

      isHistogramReportDatasource(value) {
        if (!value || typeof value !== "object" || Array.isArray(value) || this.isTypedFieldValue(value)) {
          return false;
        }

        if (this.isReportDatasourceWrapper(value) && this.getReportDatasourceWrapperKind(value) === "graph") {
          return true;
        }

        const items = this.getReportDatasourceItems(value);

        return items.length > 0 && this.isHistogramReportRow(items[0]);
      }

      collectHistogramSeriesFromRows(items) {
        const seriesMap = new Map();

        items.forEach(row => {
          this.collectHistogramMetricBaseKeys(row).forEach(baseKey => {
            if (seriesMap.has(baseKey)) {
              return;
            }

            const labelRaw = row[`${baseKey}_Label`];
            const label = String(this.unwrapTypedFieldValue(labelRaw) ?? baseKey).trim() || baseKey;

            seriesMap.set(baseKey, { key: baseKey, label });
          });
        });

        return Array.from(seriesMap.values());
      }

      getHistogramCategoryTitle(row, index) {
        const keys = Object.keys(row)
          .filter(key => !key.startsWith("$"))
          .filter(key => !/_Kind$/i.test(key))
          .filter(key => !this.isHistogramReportMetricFieldKey(key))
          .sort((left, right) => left.localeCompare(right, "pt"));

        const preferred = keys.find(key => /^nome$/i.test(key) || /nome$/i.test(key));
        const fieldKey = preferred || keys[0];

        if (fieldKey) {
          const text = String(this.unwrapTypedFieldValue(row[fieldKey]) ?? "").trim();

          if (text) {
            return text;
          }
        }

        return `Item ${index + 1}`;
      }

      buildChartRowValuesFromHistogramRow(row, columns) {
        return columns.map(column => {
          const displayRaw = row[column.key];
          const displayText = String(this.unwrapTypedFieldValue(displayRaw) ?? "").trim();

          return this.normalizeChartCellValue({
            text: displayText,
            label: column.label
          }, column.label);
        });
      }

      convertHistogramDatasourceToChartPayload(value) {
        const items = this.getReportDatasourceItems(value).filter(item => this.isHistogramReportRow(item));

        if (!items.length) {
          return null;
        }

        const columns = this.collectHistogramSeriesFromRows(items);

        if (!columns.length) {
          return null;
        }

        return {
          ChartTitle: String(value?.ChartTitle || value?.chartTitle || "").trim(),
          CategoryField: String(value?.CategoryField || "Categoria").trim() || "Categoria",
          Columns: columns,
          Items: items.map((row, index) => ({
            title: this.getHistogramCategoryTitle(row, index),
            values: this.buildChartRowValuesFromHistogramRow(row, columns)
          }))
        };
      }

      normalizeChartPayload(payload) {
        if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
          return null;
        }

        const histogramPayload = this.convertHistogramDatasourceToChartPayload(payload);

        if (histogramPayload) {
          payload = histogramPayload;
        }

        if (Array.isArray(payload.Items) && !Array.isArray(payload.Columns)) {
          const itemTitle = String(payload.ItemTitle || "Valor").trim() || "Valor";
          const firstLabel = String(payload.Items[0]?.label || itemTitle).trim() || itemTitle;

          return {
            ChartTitle: String(payload.ChartTitle || payload.chartTitle || "").trim(),
            CategoryField: String(payload.CategoryField || payload.ItemTitle || "Categoria").trim() || "Categoria",
            Columns: [{ key: itemTitle, label: firstLabel }],
            Items: payload.Items.map(item => ({
              title: String(item?.title ?? ""),
              values: [
                this.normalizeChartCellValue(item, firstLabel)
              ]
            }))
          };
        }

        return {
          ChartTitle: String(payload.ChartTitle || payload.chartTitle || "").trim(),
          CategoryField: String(payload.CategoryField || "Categoria").trim() || "Categoria",
          Columns: Array.isArray(payload.Columns)
            ? payload.Columns.map((column, index) => ({
              key: String(column?.key || column?.title || `Serie${index + 1}`).trim() || `Serie${index + 1}`,
              label: String(column?.label || column?.title || column?.key || `Série ${index + 1}`).trim() || `Série ${index + 1}`
            }))
            : [],
          Items: Array.isArray(payload.Items)
            ? payload.Items.map(item => ({
              title: String(item?.title ?? ""),
              values: Array.isArray(item?.values)
                ? item.values.map((value, index) => this.normalizeChartCellValue(
                  value,
                  value?.label ||
                  payload.Columns?.[index]?.label ||
                  payload.Columns?.[index]?.key ||
                  `Série ${index + 1}`
                ))
                : []
            }))
            : []
        };
      }

      getChartDataScriptElement(chartBox) {
        return chartBox?.querySelector?.("script.wordex-chart-data") || null;
      }

      readChartDataFromElement(chartBox) {
        if (!chartBox) {
          return null;
        }

        const script = this.getChartDataScriptElement(chartBox);

        if (script) {
          try {
            const parsed = this.normalizeChartPayload(JSON.parse(script.textContent || ""));

            if (parsed) {
              return parsed;
            }
          } catch (error) {
            /* tenta data-wordex-chart-data abaixo */
          }
        }

        const inlineData = String(chartBox.dataset.wordexChartData || "").trim();

        if (!inlineData) {
          return null;
        }

        try {
          return this.normalizeChartPayload(JSON.parse(inlineData));
        } catch (error) {
          return null;
        }
      }

      writeChartDataToElement(chartBox, chartData) {
        if (!chartBox) {
          return;
        }

        const normalized = chartData ? this.normalizeChartPayload(chartData) : null;
        let script = this.getChartDataScriptElement(chartBox);

        if (!normalized) {
          script?.remove();
          delete chartBox.dataset.chartDataMode;
          chartBox.removeAttribute("data-wordex-chart-data");
          return;
        }

        if (!script) {
          script = document.createElement("script");
          script.type = "application/json";
          script.className = "wordex-chart-data";
          chartBox.appendChild(script);
        }

        script.textContent = JSON.stringify(normalized);
        chartBox.dataset.chartDataMode = "manual";
        chartBox.dataset.wordexChartData = JSON.stringify(normalized);
      }

      clearChartManualData(chartBox) {
        this.writeChartDataToElement(chartBox, null);
      }

      hasChartMacroSource(chartBox) {
        return !!String(chartBox?.dataset?.sourceName || "").trim();
      }

      resolveMacroSourceChartPayload(sourceName, scopes) {
        const normalized = String(sourceName || "").trim();

        if (!normalized) {
          return null;
        }

        const resolved = this.resolveDataPath(normalized, scopes);

        if (resolved === undefined || resolved === null || resolved === "") {
          return null;
        }

        const histogramPayload = this.convertHistogramDatasourceToChartPayload(resolved);

        if (histogramPayload) {
          return this.normalizeChartPayload(histogramPayload);
        }

        if (typeof resolved === "object" && this.isChartDataObject(resolved)) {
          return this.normalizeChartPayload(resolved);
        }

        return null;
      }

      importChartDataFromMacroSource(chartBox, sourceName, scopes = null) {
        const payload = this.resolveMacroSourceChartPayload(
          sourceName,
          scopes || this.getChartBoxPreviewScopes(chartBox)
        );

        if (!payload) {
          this.clearChartManualData(chartBox);
          return null;
        }

        this.writeChartDataToElement(chartBox, payload);
        return payload;
      }

      resolveChartPayload(chartBox, scopes) {
        const manualPayload = this.readChartDataFromElement(chartBox);

        if (manualPayload) {
          return manualPayload;
        }

        return this.resolveMacroSourceChartPayload(
          String(chartBox?.dataset?.sourceName || "").trim(),
          scopes
        );
      }

      updateChartBoxPresentation(chartBox) {
        if (!chartBox) {
          return;
        }

        this.migrateChartTextStyleFromInline(chartBox);

        const sourceName = String(chartBox.dataset.sourceName || "").trim();
        const chartType = chartBox.dataset.chartType || "bar";
        const chartMode = chartBox.dataset.chartMode || "normal";
        const chartData = this.getChartBoxResolvedData(chartBox);
        const chartStyle = this.getChartTextStyle(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(chartData), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);

        chartBox.innerHTML = this.generateChartPlaceholderHtml(
          sourceName,
          chartType,
          chartData,
          chartStyle,
          seriesColors,
          chartMode
        );

        if (chartData) {
          this.writeChartDataToElement(chartBox, chartData);
        }

        this.applyChartLegendPanelPosition(chartBox);
        this.bindChartBarSeriesInteraction(chartBox);
        this.scheduleChartOverlayLayout(chartBox);
        this.ensureChartEssentialBorder(chartBox);
      }

      chartDataToDialogModel(chartData) {
        const payload = this.normalizeChartPayload(chartData) || this.getDefaultChartData();
        const columns = payload.Columns.length
          ? payload.Columns
          : [{ key: "Serie1", label: "Série 1" }];
        const items = payload.Items.length
          ? payload.Items
          : [{ title: "", values: [{ text: "", value: 0, label: columns[0].label }] }];

        return {
          categoryField: payload.CategoryField || "Categoria",
          columns: columns.map(column => ({
            key: column.key,
            label: column.label
          })),
          rows: items.map(item => ({
            category: String(item.title ?? ""),
            values: columns.map((column, index) => {
              const cell = item.values?.[index] || {};

              return {
                text: String(cell.text ?? cell.value ?? ""),
                value: this.toChartNumericValue(
                  typeof cell.value === "number" ? cell.value : (cell.value ?? cell.text)
                )
              };
            })
          }))
        };
      }

      buildChartDataFromDialogModel(model) {
        const categoryField = String(model?.categoryField || "Categoria").trim() || "Categoria";
        const columns = (model?.columns || [])
          .map((column, index) => ({
            key: String(column?.key || `Serie${index + 1}`).trim() || `Serie${index + 1}`,
            label: String(column?.label || `Série ${index + 1}`).trim() || `Série ${index + 1}`
          }))
          .filter(column => column.label);

        if (columns.length === 0) {
          throw new Error("Informe ao menos uma coluna de série.");
        }

        const rows = Array.isArray(model?.rows) ? model.rows : [];

        if (rows.length === 0) {
          throw new Error("Informe ao menos uma linha de categoria.");
        }

        return this.normalizeChartPayload({
          ChartTitle: "",
          CategoryField: categoryField,
          Columns: columns,
          Items: rows.map(row => ({
            title: String(row?.category ?? "").trim(),
            values: columns.map((column, index) => {
              const rawInput = String(
                row?.values?.[index]?.text ??
                row?.values?.[index]?.value ??
                ""
              ).trim();
              const numericValue = this.parseChartLocaleNumber(rawInput);

              return {
                text: rawInput || (Number.isFinite(numericValue) ? this.formatChartAxisValue(numericValue) : ""),
                value: Number.isFinite(numericValue) ? numericValue : 0,
                label: column.label
              };
            })
          }))
        });
      }

      validateChartDialogModel(model) {
        if (!model?.columns?.length) {
          return "Informe ao menos uma coluna de série.";
        }

        if (!model?.rows?.length) {
          return "Informe ao menos uma linha de categoria.";
        }

        for (const column of model.columns) {
          if (!String(column.label || "").trim()) {
            return "Cada coluna precisa de um rótulo.";
          }
        }

        for (const row of model.rows) {
          if (!String(row.category || "").trim()) {
            return "Cada linha precisa de uma categoria.";
          }

          for (const cell of row.values || []) {
            const numericValue = this.parseChartLocaleNumber(cell?.value ?? cell?.text);

            if (!Number.isFinite(numericValue)) {
              return "Informe valores numéricos válidos em todas as células.";
            }
          }
        }

        return "";
      }

      closeChartDataDialog() {
        this.chartDataDialogBackdrop?.remove();
        this.chartDataDialogBackdrop = null;
      }

      openChartDataDialog(chartBox = this.selectedObject) {
        if (!chartBox?.matches?.(".wordex-chart-box")) {
          alert("Selecione um histograma.");
          return;
        }

        this.selectObject(chartBox);

        if (
          !this.readChartDataFromElement(chartBox) &&
          this.hasChartMacroSource(chartBox)
        ) {
          this.importChartDataFromMacroSource(chartBox, chartBox.dataset.sourceName);
        }

        this.closeChartDataDialog();

        const model = this.chartDataToDialogModel(this.readChartDataFromElement(chartBox));
        const backdrop = document.createElement("div");
        backdrop.className = "wordex-chart-data-dialog-backdrop";
        backdrop.innerHTML = `
          <div class="wordex-chart-data-dialog" role="dialog" aria-modal="true" aria-labelledby="wordex-chart-data-title">
            <h2 id="wordex-chart-data-title">Dados do histograma</h2>
            <div class="wordex-chart-data-dialog-fields">
              <label>Campo categoria
                <input type="text" id="wordexChartDialogCategoryField" value="${this.escapeHtml(model.categoryField)}" />
              </label>
            </div>
            <div class="wordex-chart-data-dialog-toolbar">
              <button type="button" id="wordexChartDialogAddRow">+ Linha</button>
              <button type="button" id="wordexChartDialogRemoveRow">− Linha</button>
              <button type="button" id="wordexChartDialogAddColumn">+ Coluna</button>
              <button type="button" id="wordexChartDialogRemoveColumn">− Coluna</button>
            </div>
            <div class="wordex-chart-data-dialog-table-wrap">
              <table id="wordexChartDialogTable"></table>
            </div>
            <div class="wordex-chart-data-dialog-actions">
              <button type="button" id="wordexChartDialogCancel">Cancelar</button>
              <button type="button" class="primary" id="wordexChartDialogConfirm">Confirmar</button>
            </div>
          </div>
        `;

        document.body.appendChild(backdrop);
        this.chartDataDialogBackdrop = backdrop;

        const table = backdrop.querySelector("#wordexChartDialogTable");
        const removeRowButton = backdrop.querySelector("#wordexChartDialogRemoveRow");
        const removeColumnButton = backdrop.querySelector("#wordexChartDialogRemoveColumn");

        const updateRemoveButtonsState = () => {
          if (removeRowButton) {
            removeRowButton.disabled = model.rows.length <= 1;
          }

          if (removeColumnButton) {
            removeColumnButton.disabled = model.columns.length <= 1;
          }
        };

        const renderTable = () => {
          const headerCells = [
            `<th>${this.escapeHtml(model.categoryField || "Categoria")}</th>`
          ].concat(
            model.columns.map((column, index) => `
              <th>
                <input type="text" data-chart-column-label="${index}" value="${this.escapeHtml(column.label)}" aria-label="Rótulo da coluna ${index + 1}" />
              </th>
            `)
          );

          const bodyRows = model.rows.map((row, rowIndex) => {
            const cells = [
              `<td><input type="text" data-chart-row-category="${rowIndex}" value="${this.escapeHtml(row.category)}" aria-label="Categoria ${rowIndex + 1}" /></td>`
            ].concat(
              row.values.map((cell, columnIndex) => `
                <td>
                  <input type="text" data-chart-cell="${rowIndex}:${columnIndex}" value="${this.escapeHtml(String(cell.text ?? cell.value ?? ""))}" aria-label="Valor linha ${rowIndex + 1} coluna ${columnIndex + 1}" />
                </td>
              `)
            );

            return `<tr>${cells.join("")}</tr>`;
          });

          table.innerHTML = `<thead><tr>${headerCells.join("")}</tr></thead><tbody>${bodyRows.join("")}</tbody>`;
          updateRemoveButtonsState();
        };

        const syncModelFromTable = () => {
          model.categoryField = backdrop.querySelector("#wordexChartDialogCategoryField")?.value || "Categoria";
          backdrop.querySelectorAll("[data-chart-column-label]").forEach(input => {
            const index = Number(input.getAttribute("data-chart-column-label"));
            if (model.columns[index]) {
              model.columns[index].label = input.value;
              model.columns[index].key = String(input.value || `Serie${index + 1}`).trim() || `Serie${index + 1}`;
            }
          });
          model.rows.forEach((row, rowIndex) => {
            row.category = backdrop.querySelector(`[data-chart-row-category="${rowIndex}"]`)?.value || "";
            row.values.forEach((cell, columnIndex) => {
              cell.value = backdrop.querySelector(`[data-chart-cell="${rowIndex}:${columnIndex}"]`)?.value || "";
              cell.text = cell.value;
            });
          });
        };

        renderTable();

        backdrop.querySelector("#wordexChartDialogCategoryField")?.addEventListener("input", event => {
          model.categoryField = event.target.value || "Categoria";
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogAddRow")?.addEventListener("click", () => {
          syncModelFromTable();
          model.rows.push({
            category: "",
            values: model.columns.map(column => ({ text: "", value: "", label: column.label }))
          });
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogAddColumn")?.addEventListener("click", () => {
          syncModelFromTable();
          const index = model.columns.length + 1;
          model.columns.push({ key: `Serie${index}`, label: `Série ${index}` });
          model.rows.forEach(row => row.values.push({ text: "", value: "" }));
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogRemoveRow")?.addEventListener("click", () => {
          syncModelFromTable();

          if (model.rows.length <= 1) {
            return;
          }

          model.rows.pop();
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogRemoveColumn")?.addEventListener("click", () => {
          syncModelFromTable();

          if (model.columns.length <= 1) {
            return;
          }

          model.columns.pop();
          model.rows.forEach(row => row.values.pop());
          renderTable();
        });

        backdrop.querySelector("#wordexChartDialogCancel")?.addEventListener("click", () => {
          this.closeChartDataDialog();
        });

        backdrop.addEventListener("click", event => {
          if (event.target === backdrop) {
            this.closeChartDataDialog();
          }
        });

        backdrop.querySelector("#wordexChartDialogConfirm")?.addEventListener("click", () => {
          syncModelFromTable();
          const validationError = this.validateChartDialogModel(model);

          if (validationError) {
            alert(validationError);
            return;
          }

          try {
            const chartData = this.buildChartDataFromDialogModel(model);
            this.writeChartDataToElement(chartBox, chartData);
            this.updateChartBoxPresentation(chartBox);
            this.syncObjectAfterChange(chartBox);
            this.selectObject(chartBox);
            this.closeChartDataDialog();
          } catch (error) {
            alert(error.message || String(error));
          }
        });
      }


      getChartCategoryLabels(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload) {
          return [];
        }

        return payload.Items.map(item => String(item.title ?? "").trim());
      }

      getAllChartNumericValues(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload) {
          return [];
        }

        const values = [];

        payload.Items.forEach(item => {
          (item.values || []).forEach(cell => {
            values.push(this.toChartNumericValue(cell?.value));
          });
        });

        return values;
      }

      getChartSeriesCount(chartData) {
        const payload = this.normalizeChartPayload(chartData);
        return Math.max(payload?.Columns?.length || 0, 1);
      }

      getChartSeriesLabels(chartData) {
        const payload = this.normalizeChartPayload(chartData);

        if (!payload?.Columns?.length) {
          return ["Série 1"];
        }

        return payload.Columns.map((column, index) => {
          return String(column.label || column.key || `Série ${index + 1}`).trim() || `Série ${index + 1}`;
        });
      }

      formatChartAxisValue(value) {
        const amount = Number(value);

        if (!Number.isFinite(amount)) {
          return "0";
        }

        const rounded = Math.round(amount * 1000) / 1000;

        if (Math.abs(rounded - Math.round(rounded)) < 0.001) {
          return String(Math.round(rounded));
        }

        return String(rounded).replace(".", ",");
      }

      formatChartNumericTooltip(value) {
        const amount = Number(value);

        if (!Number.isFinite(amount)) {
          return "0";
        }

        return String(amount);
      }


      generateChartSvgFromData(chartType, chartData, chartStyle = null, seriesColors = null, chartMode = "normal") {
        if (chartType === "hbar") {
          const layout = this.computeHistogramLayout(chartType, chartData, chartStyle, seriesColors, chartMode);

          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              ${layout.bars.join("")}
              <line x1="${layout.axisX}" y1="${layout.plotTop}" x2="${layout.axisX}" y2="${layout.plotBottomLimit}" stroke="#777" stroke-width="1"></line>
              <line x1="${layout.plotLeft}" y1="${layout.plotBottomLimit}" x2="${layout.plotRight}" y2="${layout.plotBottomLimit}" stroke="#aaa" stroke-width="1"></line>
            </svg>
          `;
        }

        const layout = this.computeHistogramLayout(chartType, chartData, chartStyle, seriesColors, chartMode);

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="xMidYMid meet">
            ${layout.bars.join("")}
            <line x1="${layout.plotLeft}" y1="${layout.axisY}" x2="${layout.plotRight}" y2="${layout.axisY}" stroke="#777" stroke-width="1"></line>
            <line x1="${layout.plotLeft}" y1="${layout.plotTop}" x2="${layout.plotLeft}" y2="${layout.plotBottomLimit}" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      materializeCharts(container, scopes) {
        if (!container) {
          return;
        }

        container.querySelectorAll(".wordex-chart-box").forEach(chartBox => {
          this.materializeChartBox(chartBox, scopes);
        });
      }

      materializeChartBox(chartBox, scopes) {
        if (!chartBox || chartBox.dataset.wordexMaterialized === "1") {
          return;
        }

        const payload = this.resolveChartPayload(chartBox, scopes);
        const chartType = chartBox.dataset.chartType || "bar";
        const chartMode = chartBox.dataset.chartMode || "normal";
        const chartStyle = this.getChartTextStyle(chartBox);
        const seriesCount = Math.max(this.getChartSeriesCount(payload), 1);
        const seriesColors = this.readChartSeriesColors(chartBox, seriesCount);

        chartBox.innerHTML = this.generateChartPlaceholderHtml(
          "",
          chartType,
          payload,
          chartStyle,
          seriesColors,
          chartMode
        );

        if (payload) {
          chartBox.dataset.wordexChartData = JSON.stringify(payload);
        } else {
          chartBox.removeAttribute("data-wordex-chart-data");
        }

        this.applyChartLegendPanelPosition(chartBox);
        this.bindChartBarSeriesInteraction(chartBox);
        chartBox.dataset.wordexMaterialized = "1";
        this.scheduleChartOverlayLayout(chartBox);
      }

      createTableElement(rows, cols, align, width) {
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.align = align;
        table.style.width = width;

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement("tr");

          for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
        }

        this.applyAlignment(table, align);
        this.ensureTableBoundaryRowTypes(table);
        this.applyInitialTextStyleToTable(table);
        return table;
      }

      createSimpleStaticTableElement(rows = 3, cols = 3, align = "left", width = "80mm") {
        const safeRows = Math.max(1, Number(rows) || 3);
        const safeCols = Math.max(1, Number(cols) || 3);
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.wordexTableKind = "static";
        table.dataset.align = align;
        table.style.width = width;

        for (let rowIndex = 0; rowIndex < safeRows; rowIndex++) {
          const tr = document.createElement("tr");
          tr.dataset.wordexRowType = "Free";

          for (let columnIndex = 0; columnIndex < safeCols; columnIndex++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
          this.updateTableRowTypeLabel(tr);
        }

        this.applyAlignment(table, align);
        this.applyInitialTextStyleToTable(table);
        return table;
      }

      ensureTableBoundaryRowTypes(table) {
        const rows = Array.from(table?.rows || []);

        if (rows.length === 0) {
          return;
        }

        rows[0].dataset.wordexRowType = "TableHeader";
        this.setTableRowDatasource(rows[0], "ROOT");
        this.normalizeTableRowColumnsForType(table, rows[0], "TableHeader");

        if (rows.length > 1) {
          const footerRow = rows[rows.length - 1];
          footerRow.dataset.wordexRowType = "TableFooter";
          this.recolumnizeTableRowToDetailColumns(table, footerRow);
        }

        rows.forEach(row => this.updateTableRowTypeLabel(row));
      }

      askAlignment(defaultValue) {
        const value = prompt("Alinhamento: left, right, center ou none", defaultValue === "free" ? "none" : defaultValue);
        if (!value) return null;

        let align = value.trim().toLowerCase();

        if (align === "none") {
          align = "free";
        }

        if (!["left", "right", "center", "free"].includes(align)) {
          alert("Alinhamento inválido. Use left, right, center ou none.");
          return null;
        }

        return align;
      }

      applyAlignment(element, align) {
        element.dataset.align = align;

        element.style.float = "";
        element.style.display = "";
        element.style.margin = "";
        element.style.verticalAlign = "";
        element.style.position = "";

        const isTable = element.matches("table");
        const isChart = element.matches(".wordex-chart-box");
