<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordex - MVP Contínuo v198</title>

  <style id="wordex-editor-style">
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #d8d8d8;
      color: #222;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 8px;
      padding: 8px;
      background: #202020;
      color: white;
      border-bottom: 1px solid #111;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      padding: 6px;
      border: 1px solid #454545;
      border-radius: 8px;
      background: #2a2a2a;
    }

    .toolbar-title {
      align-self: stretch;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border-right: 1px solid #555;
      color: #d5d5d5;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .toolbar button,
    .toolbar select,
    .toolbar input[type="color"],
    .toolbar input[type="text"] {
      border: 0;
      padding: 5px 8px;
      border-radius: 4px;
      background: #f2f2f2;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      min-height: 30px;
    }

    .toolbar button.primary {
      background: #e8f0ff;
      font-weight: bold;
    }

    .toolbar button.danger {
      background: #ffe9e9;
    }

    .toolbar input[type="color"] {
      width: 38px;
      height: 30px;
      padding: 2px;
    }

    .toolbar input[type="text"] {
      width: 62px;
      height: 30px;
      padding: 4px 6px;
    }

    .toolbar-label {
      align-self: center;
      font-size: 12px;
      color: #ddd;
      white-space: nowrap;
    }

    .toolbar select.small {
      max-width: 84px;
      padding-left: 6px;
      padding-right: 6px;
    }

    .toolbar button:hover,
    .toolbar select:hover,
    .toolbar input[type="color"]:hover,
    .toolbar input[type="text"]:hover {
      background: white;
    }

    .toolbar .compact {
      padding-left: 7px;
      padding-right: 7px;
      min-width: 30px;
    }

    .workspace { padding: 28px 0 50px; }

    .document {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 28px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,.35);
    }

    .document-title {
      padding: 8px 15mm;
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      color: #555;
    }

    .region {
      padding: 10mm 15mm;
      outline: 2px solid transparent;
    }

    .region:hover { outline: 2px dashed #bbb; }
    .region.selected { outline: 2px solid #2277cc; }

    .header-template {
      min-height: 12mm;
      max-height: var(--wordex-header-footer-max-height, 89.1mm);
      overflow: auto;
      border-bottom: 1px dashed #ccc;
      background: #fcfcfc;
    }

    .header-template.is-empty {
      min-height: 8mm;
      padding-top: 3mm;
      padding-bottom: 3mm;
    }

    .body-flow { min-height: 220mm; }

    .footer-template {
      min-height: 12mm;
      max-height: var(--wordex-header-footer-max-height, 89.1mm);
      overflow: auto;
      border-top: 1px dashed #ccc;
      background: #fcfcfc;
    }

    .footer-template.is-empty {
      min-height: 8mm;
      padding-top: 3mm;
      padding-bottom: 3mm;
    }

    .empty {
      color: #aaa;
      font-size: 13px;
      font-style: italic;
      user-select: none;
    }

    .paragraph-block,
    .object-block {
      margin: 8px 0;
      position: relative;
      padding: 2px;
    }

    .object-block {
      display: flow-root;
      min-height: 0;
    }

    .paragraph-block.selected-block,
    .object-block.selected-block {
      outline: 1px solid #2277cc;
    }

    .paragraph {
      position: relative;
      min-height: 22px;
      line-height: 1.45;
      outline: 1px dashed #ddd;
      outline-offset: 1px;
      white-space: pre-wrap;
    }

    .paragraph:hover {
      outline-color: #aaa;
    }

    .paragraph:focus,
    .paragraph-block.selected-block .paragraph {
      outline-color: #2277cc;
    }

    .paragraph.is-empty::before {
      content: attr(data-empty-text);
      position: absolute;
      left: 0;
      top: 0;
      color: #aaa;
      font-style: italic;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .paragraph.is-empty:focus::before {
      color: #c2c2c2;
    }

    .paragraph::after {
      content: "";
      display: block;
      clear: both;
    }

    .dynamic-image-box {
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      border: 2px dashed #999;
      background: #f8f8f8;
      color: #555;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      user-select: none;
      min-width: 28mm;
      min-height: 18mm;
    }

    .dynamic-image-box strong,
    .wordex-chart-box strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: #333;
    }

    .wordex-chart-box {
      display: flex;
      flex-direction: column;
      max-width: 100%;
      border: 2px dashed #777;
      background: #fafafa;
      color: #555;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      user-select: none;
      min-width: 40mm;
      min-height: 28mm;
      overflow: hidden;
      contain: layout paint;
      clear: both;
    }

    .wordex-chart-label {
      display: block;
      flex: 0 0 auto;
      line-height: 1.2;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .wordex-chart-label strong {
      font-size: 13px;
      margin-bottom: 2px;
    }

    .wordex-chart-preview {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
    }

    .wordex-chart-preview svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    table.wordex-table {
      max-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }

    .wordex-table td {
      border: 1px solid #444;
      padding: 5px;
      min-width: 12mm;
      min-height: 7mm;
      outline: none;
      vertical-align: top;
    }

    .selected-object {
      outline: 3px solid #e69500 !important;
      outline-offset: 2px;
    }

    .selected-cell {
      outline: 2px solid #2277cc !important;
      outline-offset: -2px;
    }

    .selected-row-cell {
      outline: 2px solid #33aa55 !important;
      outline-offset: -2px;
      background-image: linear-gradient(rgba(51, 170, 85, .10), rgba(51, 170, 85, .10));
    }

    .selected-column-cell {
      outline: 2px solid #8a55cc !important;
      outline-offset: -2px;
      background-image: linear-gradient(rgba(138, 85, 204, .10), rgba(138, 85, 204, .10));
    }

    .wordex-table tr[data-wordex-row-type] td:first-child {
      position: relative;
    }

    .wordex-table tr[data-wordex-row-type] td:first-child::before {
      content: attr(data-row-type-label);
      position: absolute;
      left: -2px;
      top: -16px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #333;
      color: white;
      font-size: 10px;
      line-height: 1.2;
      pointer-events: none;
      user-select: none;
      z-index: 3;
      opacity: .85;
    }

    [data-align="free"] {
      cursor: default;
    }

    .wordex-textbox {
      display: inline-block;
      max-width: 100%;
      min-width: 32mm;
      min-height: 16mm;
      padding: 6px;
      border: none !important;
      outline: 1px dashed #999 !important;
      outline-offset: 2px;
      box-shadow: 0 0 0 1px #999 inset !important;
      border-radius: 4px;
      background: #fff;
      color: #222;
      font-size: 12pt;
      line-height: 1.35;
      overflow: auto;
      white-space: pre-wrap;
      user-select: text;
    }

    .wordex-textbox:hover {
      outline-color: #777 !important;
      box-shadow: 0 0 0 1px #777 inset !important;
    }

    .wordex-textbox.selected-object {
      outline-color: #f0a000 !important;
      box-shadow: 0 0 0 2px #f0a000 inset !important;
    }

    .wordex-textbox:empty::before {
      content: "Textbox";
      color: #aaa;
      font-style: italic;
    }

@media print {
      body { background: white; }

      .toolbar,
      .document-title,
      .wordex-table tr[data-wordex-row-type] td:first-child::before {
        display: none !important;
      }

      .workspace { padding: 0; }

      .document {
        width: auto;
        min-height: auto;
        margin: 0;
        box-shadow: none;
      }

      .region,
      .region:hover,
      .region.selected,
      .paragraph,
      .wordex-textbox,
      .paragraph-block,
      .object-block,
      .paragraph-block.selected-block,
      .object-block.selected-block,
      .selected-object,
      .selected-cell,
      .selected-row-cell,
      .selected-column-cell {
        outline: none !important;
        box-shadow: none !important;
        background-image: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <span class="toolbar-title">Inserir</span>
      <button onclick="wordex.insertParagraph()">Parágrafo</button>
      <button class="danger" onclick="wordex.deleteSelectedParagraph()">Excluir parágrafo</button>
      <button onclick="wordex.insertDynamicImage()">Imagem</button>
      <button onclick="wordex.insertChart()">Gráfico</button>
      <button onclick="wordex.insertTextbox()">Textbox</button>
      <button onclick="wordex.insertTable()">Tabela</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Clipboard</span>
      <button onclick="wordex.copySelectedWordexBlockToClipboard()">Copiar bloco</button>
      <button onclick="wordex.cutSelectedWordexBlockToClipboard()">Recortar bloco</button>
      <button onclick="wordex.pasteWordexBlockFromClipboard()">Colar bloco</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Página</span>
      <select id="pageFormat" onchange="wordex.applyPageSettingsFromToolbar()"></select>
      <select id="pageOrientation" onchange="wordex.applyPageSettingsFromToolbar()">
        <option value="portrait">Retrato</option>
        <option value="landscape">Paisagem</option>
      </select>
      <span class="toolbar-label">Margens</span>
      <input id="marginTop" type="text" value="25mm" title="Margem superior" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginRight" type="text" value="15mm" title="Margem direita" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginBottom" type="text" value="20mm" title="Margem inferior" onchange="wordex.applyPageSettingsFromToolbar()" />
      <input id="marginLeft" type="text" value="15mm" title="Margem esquerda" onchange="wordex.applyPageSettingsFromToolbar()" />
      <button onclick="wordex.applyPageSettingsFromToolbar()">Aplicar</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Texto</span>
      <select id="fontFamily" onchange="wordex.applyFontFamily(this.value)">
        <option value="Arial">Arial</option>
        <option value="Calibri">Calibri</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Verdana">Verdana</option>
        <option value="Georgia">Georgia</option>
      </select>

      <select id="fontSize" onchange="wordex.applyFontSize(this.value)">
        <option value="8pt">8</option>
        <option value="9pt">9</option>
        <option value="10pt">10</option>
        <option value="11pt">11</option>
        <option value="12pt" selected>12</option>
        <option value="14pt">14</option>
        <option value="16pt">16</option>
        <option value="18pt">18</option>
        <option value="24pt">24</option>
        <option value="36pt">36</option>
      </select>

      <button class="compact" onclick="wordex.toggleBold()"><b>N</b></button>
      <button class="compact" onclick="wordex.toggleItalic()"><i>I</i></button>
      <button class="compact" onclick="wordex.toggleUnderline()"><u>S</u></button>
      <button onclick="wordex.clearTextEmphasis()">Normal</button>
      <span class="toolbar-label">Cor</span>
      <input id="fontColor" type="color" value="#000000" onchange="wordex.applyTextColor(this.value)" />
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Alinhar</span>
      <button onclick="wordex.applyParagraphAlign('left')">Esq</button>
      <button onclick="wordex.applyParagraphAlign('center')">Centro</button>
      <button onclick="wordex.applyParagraphAlign('right')">Dir</button>
      <button onclick="wordex.applyParagraphAlign('justify')">Just</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Tabela</span>
      <button onclick="wordex.alignSelectedTableCell()">Célula</button>
      <button onclick="wordex.alignSelectedTableRow()">Linha</button>
      <button onclick="wordex.alignSelectedTableColumn()">Coluna</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Linha</span>
      <select id="tableRowType" onchange="wordex.applySelectedTableRowType(this.value)">
        <option value="">Tipo da linha</option>
        <option value="ColumnHeader">ColumnHeader</option>
        <option value="GroupHeader">GroupHeader</option>
        <option value="Detail">Detail</option>
        <option value="GroupFooter">GroupFooter</option>
              </select>
      <button onclick="wordex.clearSelectedTableRowType()">Limpar</button>
      <button onclick="wordex.configureSelectedTableRow()">Config linha</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Borda</span>
      <input id="borderColor" type="color" value="#000000" />
      <select id="borderWidth" class="small">
        <option value="0">0</option>
        <option value="1px" selected>1px</option>
        <option value="2px">2px</option>
        <option value="3px">3px</option>
        <option value="4px">4px</option>
        <option value="6px">6px</option>
      </select>
      <select id="borderStyle" class="small">
        <option value="solid" selected>solid</option>
        <option value="dashed">dashed</option>
        <option value="dotted">dotted</option>
        <option value="double">double</option>
        <option value="none">none</option>
      </select>
      <select id="borderRadius" class="small">
        <option value="0">0</option>
        <option value="2px">2px</option>
        <option value="4px" selected>4px</option>
        <option value="8px">8px</option>
        <option value="12px">12px</option>
        <option value="16px">16px</option>
      </select>

      <button onclick="wordex.applyBorderToCurrent()">Aplicar</button>
      <button onclick="wordex.applyBorderToSelectedTableCell()">Célula</button>
      <button onclick="wordex.applyBorderToSelectedTableRow()">Linha</button>
      <button onclick="wordex.applyBorderToSelectedTableColumn()">Coluna</button>
      <button onclick="wordex.applyBorderToSelectedTable()">Tabela</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Objeto</span>
      <button onclick="wordex.configureSelectedObject()">Configurar</button>
      <button onclick="wordex.resizeSelectedObjectBy(-10, 0)">Larg -</button>
      <button onclick="wordex.resizeSelectedObjectBy(10, 0)">Larg +</button>
      <button onclick="wordex.resizeSelectedObjectBy(0, -10)">Alt -</button>
      <button onclick="wordex.resizeSelectedObjectBy(0, 10)">Alt +</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Dados</span>
      <input id="jsonFileInput" type="file" accept=".json,application/json" style="display:none" onchange="wordex.loadJsonFile(this.files[0]); this.value='';" />
      <button onclick="wordex.chooseJsonFile()">Carregar JSON</button>
      <button onclick="wordex.clearJsonData()">Limpar JSON</button>
      <button class="primary" onclick="wordex.generateHtmlFromJson()">Montar HTML</button>
    </div>

    <div class="toolbar-group">
      <span class="toolbar-title">Saída</span>
      <button onclick="wordex.saveWordexHtml()">Salvar Wordex HTML</button>
      <button class="primary" onclick="window.print()">Imprimir fluxo</button>
    </div>

  </div>

  <div class="workspace">
    <div id="document" class="document"></div>
  </div>



  <script>
    class WordexEditor {
      static objectSelector = ".dynamic-image-box, .wordex-table, .wordex-chart-box, .wordex-textbox";

      static paperFormatList = Object.freeze([
        { value: "A0", text: "A0", width: "841mm", height: "1189mm" },
        { value: "A1", text: "A1", width: "594mm", height: "841mm" },
        { value: "A2", text: "A2", width: "420mm", height: "594mm" },
        { value: "A3", text: "A3", width: "297mm", height: "420mm" },
        { value: "A4", text: "A4", width: "210mm", height: "297mm", selected: true },
        { value: "A5", text: "A5", width: "148mm", height: "210mm" },
        { value: "A6", text: "A6", width: "105mm", height: "148mm" },
        { value: "A7", text: "A7", width: "74mm", height: "105mm" },
        { value: "A8", text: "A8", width: "52mm", height: "74mm" },
        { value: "A9", text: "A9", width: "37mm", height: "52mm" },
        { value: "A10", text: "A10", width: "26mm", height: "37mm" },

        { value: "B0", text: "B0", width: "1000mm", height: "1414mm" },
        { value: "B1", text: "B1", width: "707mm", height: "1000mm" },
        { value: "B2", text: "B2", width: "500mm", height: "707mm" },
        { value: "B3", text: "B3", width: "353mm", height: "500mm" },
        { value: "B4", text: "B4", width: "250mm", height: "353mm" },
        { value: "B5", text: "B5", width: "176mm", height: "250mm" },
        { value: "B6", text: "B6", width: "125mm", height: "176mm" },
        { value: "B7", text: "B7", width: "88mm", height: "125mm" },
        { value: "B8", text: "B8", width: "62mm", height: "88mm" },
        { value: "B9", text: "B9", width: "44mm", height: "62mm" },
        { value: "B10", text: "B10", width: "31mm", height: "44mm" },

        { value: "C0", text: "C0", width: "917mm", height: "1297mm" },
        { value: "C1", text: "C1", width: "648mm", height: "917mm" },
        { value: "C2", text: "C2", width: "458mm", height: "648mm" },
        { value: "C3", text: "C3", width: "324mm", height: "458mm" },
        { value: "C4", text: "C4", width: "229mm", height: "324mm" },
        { value: "C5", text: "C5", width: "162mm", height: "229mm" },
        { value: "C6", text: "C6", width: "114mm", height: "162mm" },
        { value: "C7", text: "C7", width: "81mm", height: "114mm" },
        { value: "C8", text: "C8", width: "57mm", height: "81mm" },
        { value: "C9", text: "C9", width: "40mm", height: "57mm" },
        { value: "C10", text: "C10", width: "28mm", height: "40mm" },

        { value: "Letter", text: "Carta", width: "215.9mm", height: "279.4mm" },
        { value: "Legal", text: "Legal", width: "215.9mm", height: "355.6mm" },
        { value: "Executive", text: "Executivo", width: "184.15mm", height: "266.7mm" },
        { value: "Tabloid", text: "Tabloide", width: "279.4mm", height: "431.8mm" },
        { value: "Ledger", text: "Ledger", width: "431.8mm", height: "279.4mm" },

        { value: "ANSI_A", text: "ANSI A", width: "215.9mm", height: "279.4mm" },
        { value: "ANSI_B", text: "ANSI B", width: "279.4mm", height: "431.8mm" },
        { value: "ANSI_C", text: "ANSI C", width: "431.8mm", height: "558.8mm" },
        { value: "ANSI_D", text: "ANSI D", width: "558.8mm", height: "863.6mm" },
        { value: "ANSI_E", text: "ANSI E", width: "863.6mm", height: "1117.6mm" }
      ]);

      constructor(documentId) {
        this.documentElement = document.getElementById(documentId);

        this.wordexDocument = {
          version: "1.98",
          mode: "continuous",
          description: "Editor Wordex em fluxo contínuo (HTML editável, header/footer, JSON, undo, tabelas, objetos e montagem HTML por dados e clipboard interno).",
          headerTemplate: [],
          bodyFlow: [],
          footerTemplate: [],
          page: {
            format: "A4",
            orientation: "portrait",
            width: "210mm",
            height: "297mm",
            marginTop: "25mm",
            marginRight: "15mm",
            marginBottom: "20mm",
            marginLeft: "15mm"
          }
        };

        this.selected = { region: "bodyFlow" };
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;
        this.reportData = null;
        this.reportDataFileName = "";
        this.wordexClipboard = null;

        this.undoStack = [];
        this.undoIndex = -1;
        this.maxUndoSteps = 500;
        this.lastUndoSnapshot = "";
        this.isRestoringUndo = false;
        this.isInsertingObject = false;

        /*
          Captura Ctrl+Z antes do contenteditable/navegador.
          O listener normal de keydown continua abaixo para as demais teclas.
        */
        window.addEventListener("keydown", event => {
          this.handleUndoShortcut(event);
        }, true);

        this.loadSavedWordexDocumentFromHtml();

        this.ensureRequiredParagraphs();

        document.addEventListener("selectionchange", () => {
          const selection = window.getSelection();

          if (selection?.rangeCount) {
            const paragraph = this.findParagraphElementFromNode(
              selection.getRangeAt(0).commonAncestorContainer
            );

            if (paragraph) {
              this.updateParagraphEmptyState(paragraph);
            }
          }

          this.clearSelectedCellWhenCaretLeavesTable();
          this.saveSelectionIfInsideParagraph();
        });

        document.addEventListener("click", event => {
          if (!event.target.closest(".document") && !event.target.closest(".toolbar")) {
            this.selectFallbackParagraph();
            this.renderSelection();
          }
        });

        this.documentElement.addEventListener("click", event => {
          /*
            Cliques em tabelas dentro de parágrafos já são tratados no próprio
            parágrafo/wrapper. Aqui só fica como rede de segurança.
          */
          if (event.defaultPrevented || event.wordexTableClickHandled) {
            return;
          }

          if (this.trySelectObjectInsideTableCell(event, this.documentElement)) {
            return;
          }

          const cell = event.target.closest("td");

          if (cell && this.documentElement.contains(cell)) {
            const table = cell.closest(".wordex-table");

            if (table) {
              if (event.ctrlKey || event.metaKey) {
                event.preventDefault();
                event.stopPropagation();
                event.wordexTableClickHandled = true;
                this.cycleTableComponentSelection(cell);
              } else {
                event.wordexTableClickHandled = true;
                this.selectTableCell(cell);
              }

              return;
            }
          }

          const object = event.target.closest(WordexEditor.objectSelector);

          if (object) {
            event.stopPropagation();

            if ((event.ctrlKey || event.metaKey) && object.matches(".wordex-table")) {
              event.preventDefault();
              event.wordexTableClickHandled = true;

              const cycleCell = this.getCellForTableComponentCycle(object, event.target);

              if (cycleCell) {
                this.cycleTableComponentSelection(cycleCell);
              } else {
                this.selectTableComponent(object, null, "table");
              }
            } else {
              this.selectObject(object);
            }
          }
        });

        this.documentElement.addEventListener("dblclick", event => {
          const object = event.target.closest(WordexEditor.objectSelector);

          if (!object) return;

          /*
            Duplo-clique normal fica livre para o navegador:
            selecionar palavra/texto dentro da célula, por exemplo.

            Configuração do objeto só com Ctrl + duplo-clique.
          */
          if (!event.ctrlKey) {
            return;
          }

          event.preventDefault();
          event.stopPropagation();
          this.selectObject(object);
          this.configureSelectedObject();
        });

        document.addEventListener("keydown", event => {
          if (this.handleUndoShortcut(event)) {
            return;
          }

          if (this.handleInlineObjectDelete(event)) {
            return;
          }

          if (this.handleEmptyParagraphDelete(event)) {
            return;
          }

          if (this.handleParagraphEnter(event)) {
            return;
          }

          if (this.handleParagraphBoundaryArrow(event)) {
            return;
          }

          this.handleFreeObjectKeyboard(event);
        });

        this.installWordexClipboardEvents();

        this.documentElement.addEventListener("input", event => {
          /*
            Inserções programáticas (tabela/imagem) disparam input no contenteditable.
            Ignorar aqui evita entradas duplicadas ou fora de ordem no histórico.
          */
          if (this.isInsertingObject) {
            return;
          }

          const paragraph = event.target.closest(".paragraph");
          const table = event.target.closest(".wordex-table");

          if (paragraph) {
            this.syncParagraphElement(paragraph);
          }

          if (table) {
            this.syncStandaloneObjectFromDom(table);
          }

          this.saveUndoStateIfChanged();
        });

        this.initializePageControls();
        this.applyPageSettingsToEditor();
        this.render();
        this.resetUndoHistory();
        this.focusSelectedParagraphForTyping();
      }

      initializePageControls() {
        const select = document.getElementById("pageFormat");
        if (!select) return;

        select.innerHTML = "";

        WordexEditor.paperFormatList.forEach(format => {
          const option = document.createElement("option");
          option.value = format.value;
          option.textContent = format.text;

          if (format.selected) {
            option.selected = true;
          }

          select.appendChild(option);
        });

        this.syncPageControlsFromDocument();
      }

      getPageSettings() {
        if (!this.wordexDocument.page) {
          this.wordexDocument.page = {
            format: "A4",
            orientation: "portrait",
            width: "210mm",
            height: "297mm",
            marginTop: "25mm",
            marginRight: "15mm",
            marginBottom: "20mm",
            marginLeft: "15mm"
          };
        }

        return this.wordexDocument.page;
      }

      getPaperFormat(formatValue) {
        return WordexEditor.paperFormatList.find(item => item.value === formatValue)
          || WordexEditor.paperFormatList.find(item => item.value === "A4");
      }

      syncPageControlsFromDocument() {
        const page = this.getPageSettings();

        const pageFormat = document.getElementById("pageFormat");
        const pageOrientation = document.getElementById("pageOrientation");
        const marginTop = document.getElementById("marginTop");
        const marginRight = document.getElementById("marginRight");
        const marginBottom = document.getElementById("marginBottom");
        const marginLeft = document.getElementById("marginLeft");

        if (pageFormat) pageFormat.value = page.format || "A4";
        if (pageOrientation) pageOrientation.value = page.orientation || "portrait";
        if (marginTop) marginTop.value = page.marginTop || "25mm";
        if (marginRight) marginRight.value = page.marginRight || "15mm";
        if (marginBottom) marginBottom.value = page.marginBottom || "20mm";
        if (marginLeft) marginLeft.value = page.marginLeft || "15mm";
      }

      applyPageSettingsFromToolbar() {
        const formatValue = document.getElementById("pageFormat")?.value || "A4";
        const orientation = document.getElementById("pageOrientation")?.value || "portrait";
        const format = this.getPaperFormat(formatValue);

        const page = this.getPageSettings();

        page.format = format.value;
        page.orientation = orientation;
        page.width = orientation === "landscape" ? format.height : format.width;
        page.height = orientation === "landscape" ? format.width : format.height;
        page.marginTop = this.normalizeCssSize(document.getElementById("marginTop")?.value || "25mm", "25mm");
        page.marginRight = this.normalizeCssSize(document.getElementById("marginRight")?.value || "15mm", "15mm");
        page.marginBottom = this.normalizeCssSize(document.getElementById("marginBottom")?.value || "20mm", "20mm");
        page.marginLeft = this.normalizeCssSize(document.getElementById("marginLeft")?.value || "15mm", "15mm");

        this.applyPageSettingsToEditor();
        this.saveUndoStateIfChanged();
      }

      normalizeCssSize(value, fallback) {
        const text = String(value || "").trim();

        if (/^-?\d+(\.\d+)?(mm|cm|px|pt|in)$/.test(text)) {
          return text;
        }

        if (/^-?\d+(\.\d+)?$/.test(text)) {
          return text + "mm";
        }

        return fallback;
      }

      applyPageSettingsToEditor() {
        const page = this.getPageSettings();

        if (!this.documentElement) return;

        this.documentElement.style.width = page.width;
        this.documentElement.style.minHeight = page.height;

        const headerMax = this.getThirtyPercentOfCssSize(page.height);
        this.documentElement.style.setProperty("--wordex-header-footer-max-height", headerMax);
      }

      getThirtyPercentOfCssSize(cssSize) {
        const match = String(cssSize || "").trim().match(/^(\d+(?:\.\d+)?)(mm|cm|px|pt|in)$/);

        if (!match) return "89.1mm";

        return (Number(match[1]) * 0.30).toFixed(2).replace(/\.?0+$/, "") + match[2];
      }

      getPageSizeCss() {
        const page = this.getPageSettings();
        return `${page.width} ${page.height}`;
      }

      getCssPixelsToMillimeters(px) {
        return px / 3.7795275591;
      }

      parseCssSizeToMillimeters(value) {
        const text = String(value || "").trim();
        const match = text.match(/^(\d+(?:\.\d+)?)(mm|cm|px|pt|in)$/);

        if (!match) return 0;

        const number = Number(match[1]);
        const unit = match[2];

        if (unit === "mm") return number;
        if (unit === "cm") return number * 10;
        if (unit === "px") return this.getCssPixelsToMillimeters(number);
        if (unit === "pt") return number * 0.3527777778;
        if (unit === "in") return number * 25.4;

        return 0;
      }

      formatMillimeters(value) {
        return Math.max(0, value).toFixed(2).replace(/\.?0+$/, "") + "mm";
      }

      calculateRegionContentMargin(regionClass, minimumMm) {
        const region = this.documentElement?.querySelector(`.${regionClass}`);

        if (!region) {
          return minimumMm;
        }

        const blocks = Array.from(
          region.querySelectorAll(":scope > .paragraph-block, :scope > .object-block")
        );

        if (blocks.length === 0) {
          return minimumMm;
        }

        const regionRect = region.getBoundingClientRect();

        let top = Number.POSITIVE_INFINITY;
        let bottom = Number.NEGATIVE_INFINITY;

        blocks.forEach(block => {
          const rect = block.getBoundingClientRect();

          if (rect.width <= 0 && rect.height <= 0) return;

          top = Math.min(top, rect.top - regionRect.top);
          bottom = Math.max(bottom, rect.bottom - regionRect.top);
        });

        if (!Number.isFinite(top) || !Number.isFinite(bottom)) {
          return minimumMm;
        }

        /*
          Altura real do conteúdo + folga.
          Não usa a altura visual da região, porque ela pode ter espaço vazio
          apenas para facilitar a edição.
        */
        return Math.max(minimumMm, this.getCssPixelsToMillimeters(bottom - top) + 6);
      }

      updateHeaderFooterMarginsFromEditor() {
        const page = this.getPageSettings();

        const pageHeightMm = this.parseCssSizeToMillimeters(page.height);
        const maxMarginMm = pageHeightMm > 0 ? pageHeightMm * 0.30 : 89.1;

        const headerMm = Math.min(
          this.calculateRegionContentMargin("header-template", 12),
          maxMarginMm
        );

        const footerMm = Math.min(
          this.calculateRegionContentMargin("footer-template", 12),
          maxMarginMm
        );

        page.marginTop = this.formatMillimeters(headerMm);
        page.marginBottom = this.formatMillimeters(footerMm);

        const marginTop = document.getElementById("marginTop");
        const marginBottom = document.getElementById("marginBottom");

        if (marginTop) marginTop.value = page.marginTop;
        if (marginBottom) marginBottom.value = page.marginBottom;
      }

      getPageMarginCss() {
        const page = this.getPageSettings();
        return `${page.marginTop} ${page.marginRight} ${page.marginBottom} ${page.marginLeft}`;
      }

      createId(prefix) {
        return prefix + "_" + Math.random().toString(36).slice(2, 10);
      }

      ensureRequiredParagraphs() {
        /*
          O body sempre terá pelo menos um parágrafo editável.
          Header/footer continuam opcionais: quando vazios, mostram o aviso
          da própria região.
        */
        if (!Array.isArray(this.wordexDocument.bodyFlow)) {
          this.wordexDocument.bodyFlow = [];
        }

        if (this.wordexDocument.bodyFlow.length === 0) {
          this.wordexDocument.bodyFlow.push(this.createParagraph(""));
        }
      }

      isParagraphHtmlEmpty(html) {
        const source = String(html || "");

        /*
          Objeto dentro do parágrafo conta como conteúdo.
        */
        if (
          source.includes("dynamic-image-box") ||
          source.includes("wordex-table") ||
          source.includes("wordex-chart-box") ||
          source.includes("wordex-textbox")
        ) {
          return false;
        }

        /*
          Quebra de linha inserida pelo usuário é conteúdo estrutural.
          Portanto, parágrafo com <br> não deve mostrar "Parágrafo vazio".
        */
        if (/<br\s*\/?>/i.test(source)) {
          return false;
        }

        /*
          Blocos vazios criados pelo contenteditable também representam
          linhas em branco e não devem ser tratados como parágrafo inexistente.
        */
        if (/<(div|p)[^>]*>\s*(?:&nbsp;|&#160;|\u200B|\s)*<\/\1>/i.test(source)) {
          return false;
        }

        const text = source
          .replace(/&nbsp;/gi, " ")
          .replace(/&#160;/gi, " ")
          .replace(/\u200B/g, "")
          .replace(/<[^>]+>/g, "")
          .trim();

        return text.length === 0;
      }

      updateParagraphEmptyState(paragraphElement) {
        if (!paragraphElement) return;

        const html = this.getCleanInnerHtml(paragraphElement);
        let isEmpty = this.isParagraphHtmlEmpty(html);

        /*
          Se o usuário inseriu quebras/linhas em branco, alguns navegadores
          podem normalizar o HTML de formas diferentes. Então usamos também
          a altura visual: se o parágrafo ficou maior que uma linha, ele já
          não deve exibir "Parágrafo vazio".
        */
        if (isEmpty && this.hasParagraphVisualContent(paragraphElement)) {
          isEmpty = false;
        }

        paragraphElement.classList.toggle("is-empty", isEmpty);
        paragraphElement.dataset.emptyText = "Parágrafo vazio";
      }

      hasParagraphVisualContent(paragraphElement) {
        if (!paragraphElement) return false;

        if (
          paragraphElement.querySelector(WordexEditor.objectSelector)
        ) {
          return true;
        }

        const style = window.getComputedStyle(paragraphElement);
        const lineHeight = Number.parseFloat(style.lineHeight) ||
          Number.parseFloat(style.fontSize) * 1.45 ||
          22;

        /*
          Tolerância pequena para não classificar um parágrafo normal vazio
          como preenchido por causa de borda/outline/subpixel.
        */
        return paragraphElement.scrollHeight > lineHeight + 6;
      }

      getDefaultParagraphTextForCurrentRegion() {
        if (this.selected.region === "headerTemplate") {
          return "Novo parágrafo header";
        }

        if (this.selected.region === "footerTemplate") {
          return "Novo parágrafo footer";
        }

        return "Novo parágrafo body";
      }

      getCurrentParagraphStyleFromToolbar() {
        return {
          fontFamily: document.getElementById("fontFamily")?.value || "Arial",
          fontSize: document.getElementById("fontSize")?.value || "12pt",
          color: document.getElementById("fontColor")?.value || "#000000"
        };
      }

      createParagraph(html = "Novo parágrafo body", style = null) {
        return {
          id: this.createId("paragraph"),
          type: "paragraph",
          html,
          style: {
            fontFamily: "Arial",
            fontSize: "12pt",
            color: "#000000",
            textAlign: "left",
            ...this.getCurrentParagraphStyleFromToolbar(),
            ...(style || {})
          }
        };
      }

      createTableHtml(rows, cols, align, width) {
        return this.createTableElement(rows, cols, align, width).outerHTML;
      }

      clearSelection() {
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        if (this.selected.region === "bodyFlow") {
          this.ensureParagraphSelection();
        }
      }

      focusSelectedParagraphForTyping() {
        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph) return;

        paragraph.focus({ preventScroll: true });

        const selection = window.getSelection();

        /*
          Só posiciona o caret se não houver uma seleção útil dentro do próprio
          parágrafo. Assim não atrapalha seleções manuais posteriores.
        */
        if (
          !selection ||
          selection.rangeCount === 0 ||
          !paragraph.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          this.placeCaretAtEnd(paragraph);
        }

        this.saveSelectionIfInsideParagraph();
      }

      ensureParagraphInRegion(region) {
        if (!Array.isArray(this.wordexDocument[region])) {
          this.wordexDocument[region] = [];
        }

        let paragraph = this.wordexDocument[region].find(block => block.type === "paragraph");

        if (!paragraph) {
          paragraph = this.createParagraph("");
          this.wordexDocument[region].push(paragraph);
        }

        return paragraph;
      }

      selectRegionOnly(region, shouldRender = true) {
        this.selected.region = region;
        this.selectedParagraphId = null;
        this.selectedBlockId = null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        if (shouldRender) {
          this.renderSelection();
        }
      }

      selectParagraphInRegion(region, shouldRender = true, shouldFocus = true) {
        const paragraph = this.ensureParagraphInRegion(region);

        this.selected.region = region;
        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        if (shouldRender) {
          this.render();

          if (shouldFocus) {
            this.focusSelectedParagraphForTyping();
          }
        }

        return paragraph;
      }

      ensureParagraphSelection() {
        if (
          this.selectedParagraphId &&
          this.findBlockById(this.selectedParagraphId)
        ) {
          return;
        }

        if (this.selected.region === "bodyFlow") {
          this.selectParagraphInRegion("bodyFlow", false, false);
        }
      }

      selectFallbackParagraph(shouldRender = true) {
        this.ensureRequiredParagraphs();

        const regions = [
          this.selected.region || "bodyFlow",
          "bodyFlow",
          "headerTemplate",
          "footerTemplate"
        ];

        for (const region of regions) {
          const blocks = this.wordexDocument[region] || [];
          const paragraph = blocks.find(block => block.type === "paragraph");

          if (paragraph) {
            this.selected.region = region;
            this.selectedParagraphId = paragraph.id;
            this.selectedBlockId = paragraph.id;
            this.selectedObject = null;
            this.selectedCell = null;
            this.selectedTableMode = null;
            this.selectedTableRow = null;
            this.selectedTableColumnIndex = null;
            this.savedRange = null;

            if (shouldRender) {
              this.renderSelection();
            }

            return;
          }
        }

        this.selectParagraphInRegion("bodyFlow", shouldRender, false);
      }

      getSelectedBlocks() {
        return this.wordexDocument[this.selected.region];
      }

      findBlockById(blockId) {
        if (!blockId) return null;

        for (const region of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
          const block = this.wordexDocument[region].find(item => item.id === blockId);

          if (block) {
            return block;
          }
        }

        return null;
      }

      getSelectedParagraphElement() {
        if (!this.selectedParagraphId) return null;

        return this.documentElement.querySelector(
          `.paragraph[data-block-id="${this.selectedParagraphId}"]`
        );
      }

      getSelectedParagraphBlock() {
        if (!this.selectedParagraphId) return null;
        return this.findBlockById(this.selectedParagraphId);
      }

      selectRegion(region) {
        this.selected.region = region;

        if (region === "bodyFlow") {
          this.selectParagraphInRegion("bodyFlow");
          return;
        }

        const blocks = this.wordexDocument[region] || [];
        const paragraph = blocks.find(block => block.type === "paragraph");

        if (paragraph) {
          this.selectedParagraphId = paragraph.id;
          this.selectedBlockId = paragraph.id;
          this.selectedObject = null;
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;
          this.savedRange = null;

          this.renderSelection();

          const element = this.getSelectedParagraphElement();

          if (element) {
            element.focus();
            this.placeCaretAtEnd(element);
            this.saveSelectionIfInsideParagraph();
          }

          return;
        }

        this.selectRegionOnly(region);
      }

      selectParagraph(region, blockId) {
        this.selected.region = region;
        this.selectedParagraphId = blockId;
        this.selectedBlockId = blockId;
        this.selectedObject = null;
        this.selectedCell = null;
        this.renderSelection();
      }

      selectObject(object) {
        const paragraph = object.closest(".paragraph");
        const block = object.closest(".paragraph-block, .object-block");
        const region = object.closest(".region");

        if (region) {
          this.selected.region = region.dataset.region;
        }

        if (paragraph) {
          this.selectedParagraphId = paragraph.dataset.blockId;
          this.selectedBlockId = paragraph.dataset.blockId;
        } else if (block) {
          this.selectedParagraphId = null;
          this.selectedBlockId = block.dataset.blockId;
        }

        this.selectedObject = object;

        if (!object.matches(".wordex-table")) {
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;
        }

        this.renderSelection();
      }

      insertParagraph() {
        const paragraph = this.createParagraph(
          this.getDefaultParagraphTextForCurrentRegion()
        );
        this.getSelectedBlocks().push(paragraph);
        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedObject = null;
        this.render();

        const element = this.getSelectedParagraphElement();

        if (element) {
          element.focus();
          this.placeCaretAtEnd(element);
          this.saveSelectionIfInsideParagraph();
        }
      }

      installWordexClipboardEvents() {
        document.addEventListener("copy", event => {
          this.handleWordexCopyEvent(event);
        });

        document.addEventListener("cut", event => {
          this.handleWordexCutEvent(event);
        });

        document.addEventListener("paste", event => {
          this.handleWordexPasteEvent(event);
        });
      }

      getWordexClipboardMarker() {
        return "__WORDEX_BLOCK_CLIPBOARD_V1__";
      }

      hasNonCollapsedSelectionInsideEditor() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        return !!element && this.documentElement.contains(element);
      }

      getSelectedBlockContext() {
        const blockId = this.selectedBlockId || this.selectedParagraphId;

        if (!blockId) return null;

        for (const region of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
          const blocks = this.wordexDocument[region] || [];
          const index = blocks.findIndex(block => block.id === blockId);

          if (index >= 0) {
            return { region, blocks, block: blocks[index], index };
          }
        }

        return null;
      }

      sanitizeClipboardBlockHtml(html) {
        const template = document.createElement("template");
        template.innerHTML = String(html || "");

        template.content.querySelectorAll(
          ".selected-object, .selected-cell, .selected-row-cell, .selected-column-cell"
        ).forEach(element => {
          element.classList.remove(
            "selected-object",
            "selected-cell",
            "selected-row-cell",
            "selected-column-cell"
          );
        });

        return template.innerHTML;
      }

      cloneBlockForClipboard(block) {
        const clone = JSON.parse(JSON.stringify(block));

        if (clone.html) {
          clone.html = this.sanitizeClipboardBlockHtml(clone.html);
        }

        return clone;
      }

      cloneBlockForPaste(block) {
        const clone = this.cloneBlockForClipboard(block);
        clone.id = this.createId(clone.type || "paragraph");
        return clone;
      }

      createWordexClipboardPayload() {
        this.syncCurrentEditingState();

        const context = this.getSelectedBlockContext();

        if (!context) {
          return null;
        }

        return {
          source: "Wordex",
          kind: "blocks",
          version: "1.98",
          createdAt: new Date().toISOString(),
          region: context.region,
          blocks: [this.cloneBlockForClipboard(context.block)]
        };
      }

      serializeWordexClipboardPayload(payload) {
        return this.getWordexClipboardMarker() + "\n" + JSON.stringify(payload);
      }

      parseWordexClipboardText(text) {
        const source = String(text || "");
        const marker = this.getWordexClipboardMarker();

        if (!source.startsWith(marker)) {
          return null;
        }

        try {
          const payload = JSON.parse(source.slice(marker.length).trim());

          if (
            payload &&
            payload.source === "Wordex" &&
            payload.kind === "blocks" &&
            Array.isArray(payload.blocks)
          ) {
            return payload;
          }
        } catch (error) {
          console.warn("Clipboard Wordex inválido.", error);
        }

        return null;
      }

      copyPayloadToClipboardEvent(event, payload) {
        if (!event?.clipboardData || !payload) return false;

        const text = this.serializeWordexClipboardPayload(payload);
        event.clipboardData.setData("text/plain", text);
        event.clipboardData.setData("application/x-wordex-blocks", text);
        event.preventDefault();

        this.wordexClipboard = payload;
        return true;
      }

      async writePayloadToSystemClipboard(payload) {
        if (!payload) return false;

        const text = this.serializeWordexClipboardPayload(payload);
        this.wordexClipboard = payload;

        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (error) {
            console.warn("Clipboard API indisponível; usando fallback.", error);
          }
        }

        return this.writeTextToClipboardFallback(text);
      }

      writeTextToClipboardFallback(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "readonly");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        textarea.style.top = "-9999px";
        document.body.appendChild(textarea);

        const selection = window.getSelection();
        const savedRanges = [];

        if (selection) {
          for (let i = 0; i < selection.rangeCount; i++) {
            savedRanges.push(selection.getRangeAt(i).cloneRange());
          }
        }

        textarea.select();

        let copied = false;

        try {
          copied = document.execCommand("copy");
        } catch (error) {
          copied = false;
        }

        document.body.removeChild(textarea);

        if (selection) {
          selection.removeAllRanges();
          savedRanges.forEach(range => selection.addRange(range));
        }

        return copied;
      }

      async readWordexPayloadFromSystemClipboard() {
        if (!navigator.clipboard?.readText) {
          return null;
        }

        try {
          return this.parseWordexClipboardText(await navigator.clipboard.readText());
        } catch (error) {
          console.warn("Não foi possível ler o clipboard do navegador.", error);
          return null;
        }
      }

      handleWordexCopyEvent(event) {
        if (this.hasNonCollapsedSelectionInsideEditor()) {
          return;
        }

        const payload = this.createWordexClipboardPayload();

        if (payload) {
          this.copyPayloadToClipboardEvent(event, payload);
        }
      }

      handleWordexCutEvent(event) {
        if (this.hasNonCollapsedSelectionInsideEditor()) {
          return;
        }

        const payload = this.createWordexClipboardPayload();

        if (this.copyPayloadToClipboardEvent(event, payload)) {
          this.removeSelectedWordexBlockAfterCut();
        }
      }

      handleWordexPasteEvent(event) {
        const text = event.clipboardData?.getData("application/x-wordex-blocks") ||
          event.clipboardData?.getData("text/plain") || "";

        const payload = this.parseWordexClipboardText(text);

        if (!payload) {
          return;
        }

        event.preventDefault();
        this.insertWordexClipboardPayload(payload);
      }

      async copySelectedWordexBlockToClipboard() {
        const payload = this.createWordexClipboardPayload();

        if (!payload) {
          alert("Selecione um bloco/parágrafo para copiar.");
          return;
        }

        const copied = await this.writePayloadToSystemClipboard(payload);

        if (!copied) {
          alert("Bloco copiado apenas para o clipboard interno desta janela.");
        }
      }

      async cutSelectedWordexBlockToClipboard() {
        const payload = this.createWordexClipboardPayload();

        if (!payload) {
          alert("Selecione um bloco/parágrafo para recortar.");
          return;
        }

        await this.writePayloadToSystemClipboard(payload);
        this.removeSelectedWordexBlockAfterCut();
      }

      async pasteWordexBlockFromClipboard() {
        let payload = this.wordexClipboard;

        if (!payload) {
          payload = await this.readWordexPayloadFromSystemClipboard();
        }

        if (!payload) {
          alert("Nenhum bloco Wordex encontrado no clipboard. Use Ctrl+V depois de copiar um bloco Wordex.");
          return;
        }

        this.insertWordexClipboardPayload(payload);
      }

      removeSelectedWordexBlockAfterCut() {
        const context = this.getSelectedBlockContext();

        if (!context) return;

        context.blocks.splice(context.index, 1);
        this.ensureRequiredParagraphs();

        const remainingBlocks = this.wordexDocument[context.region] || [];
        const target = remainingBlocks[Math.min(context.index, remainingBlocks.length - 1)] ||
          remainingBlocks[context.index - 1] ||
          remainingBlocks.find(block => block.type === "paragraph") ||
          null;

        this.selected.region = context.region;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        if (target) {
          this.selectedBlockId = target.id;
          this.selectedParagraphId = target.type === "paragraph" ? target.id : null;
        } else {
          this.selectedBlockId = null;
          this.selectedParagraphId = null;
        }

        this.render();
        this.saveUndoStateIfChanged();
      }

      insertWordexClipboardPayload(payload) {
        if (!payload || !Array.isArray(payload.blocks) || payload.blocks.length === 0) {
          return;
        }

        this.syncCurrentEditingState();

        const context = this.getSelectedBlockContext();
        const targetRegion = context?.region || this.selected.region || "bodyFlow";

        if (!Array.isArray(this.wordexDocument[targetRegion])) {
          this.wordexDocument[targetRegion] = [];
        }

        const blocks = this.wordexDocument[targetRegion];
        const insertIndex = context ? context.index + 1 : blocks.length;
        const newBlocks = payload.blocks.map(block => this.cloneBlockForPaste(block));

        blocks.splice(insertIndex, 0, ...newBlocks);
        this.ensureRequiredParagraphs();

        const lastBlock = newBlocks[newBlocks.length - 1];
        this.selected.region = targetRegion;
        this.selectedBlockId = lastBlock.id;
        this.selectedParagraphId = lastBlock.type === "paragraph" ? lastBlock.id : null;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        this.render();

        const paragraph = this.getSelectedParagraphElement();

        if (paragraph) {
          paragraph.focus();
          this.placeCaretAtEnd(paragraph);
          this.saveSelectionIfInsideParagraph();
        }

        this.saveUndoStateIfChanged();
      }

      deleteSelectedParagraph() {
        if (!this.selectedParagraphId) {
          alert("Selecione um parágrafo para excluir.");
          return;
        }

        this.syncCurrentEditingState();

        let region = this.selected.region;
        let blocks = this.wordexDocument[region] || [];
        let index = blocks.findIndex(block => block.id === this.selectedParagraphId);

        /*
          Segurança: se a região atual estiver defasada, procura o parágrafo
          nas três regiões.
        */
        if (index < 0) {
          for (const candidateRegion of ["headerTemplate", "bodyFlow", "footerTemplate"]) {
            const candidateBlocks = this.wordexDocument[candidateRegion] || [];
            const candidateIndex = candidateBlocks.findIndex(block => block.id === this.selectedParagraphId);

            if (candidateIndex >= 0) {
              region = candidateRegion;
              blocks = candidateBlocks;
              index = candidateIndex;
              break;
            }
          }
        }

        if (index < 0) {
          alert("Parágrafo não encontrado.");
          return;
        }

        blocks.splice(index, 1);
        this.ensureRequiredParagraphs();

        let targetBlock = null;

        if (region === "bodyFlow") {
          const bodyBlocks = this.wordexDocument.bodyFlow || [];
          targetBlock =
            bodyBlocks[Math.min(index, bodyBlocks.length - 1)] ||
            bodyBlocks.find(block => block.type === "paragraph") ||
            null;
        } else {
          targetBlock =
            blocks[Math.min(index, blocks.length - 1)] ||
            blocks.find(block => block.type === "paragraph") ||
            null;
        }

        this.selected.region = region;
        this.selectedObject = null;
        this.selectedCell = null;
        this.selectedTableMode = null;
        this.selectedTableRow = null;
        this.selectedTableColumnIndex = null;
        this.savedRange = null;

        if (targetBlock && targetBlock.type === "paragraph") {
          this.selectedParagraphId = targetBlock.id;
          this.selectedBlockId = targetBlock.id;
        } else {
          this.selectedParagraphId = null;
          this.selectedBlockId = null;
        }

        this.render();

        const targetElement = this.getSelectedParagraphElement();

        if (targetElement) {
          targetElement.focus();
          this.placeCaretAtEnd(targetElement);
          this.saveSelectionIfInsideParagraph();
        }
      }

      hasActiveParagraphCursor() {
        const paragraph = this.getSelectedParagraphElement();

        if (!paragraph || !this.savedRange) return false;

        return paragraph.contains(this.savedRange.commonAncestorContainer);
      }

      ensureParagraphForInsertion() {
        if (this.hasActiveParagraphCursor()) {
          return this.getSelectedParagraphElement();
        }

        const paragraph = this.createParagraph("");
        this.getSelectedBlocks().push(paragraph);

        this.selectedParagraphId = paragraph.id;
        this.selectedBlockId = paragraph.id;
        this.selectedObject = null;

        this.render();

        const paragraphElement = this.getSelectedParagraphElement();

        if (paragraphElement) {
          paragraphElement.focus();
          this.placeCaretAtEnd(paragraphElement);
          this.saveSelectionIfInsideParagraph();
        }

        return paragraphElement;
      }

      promptSizeAndAlign(defaultWidth, defaultHeight) {
        const align = this.askAlignment("left");
        if (!align) return null;

        const width = prompt("Largura:", defaultWidth);
        if (!width) return null;

        const height = prompt("Altura:", defaultHeight);
        if (!height) return null;

        return { align, width, height };
      }

      insertDynamicImage() {
        const fieldName = prompt("Nome da imagem:", "Imagem");
        if (!fieldName) return;

        const size = this.promptSizeAndAlign("80mm", "45mm");
        if (!size) return;

        this.insertNodeAtCurrentInsertionPoint(
          this.createDynamicImageElement(fieldName, size.align, size.width, size.height)
        );
      }

      insertChart() {
        const sourceName = prompt("Nome lógico/fonte de dados do gráfico:", "VendasPorMes");
        if (!sourceName) return;

        const chartType = this.askChartType("bar");
        if (!chartType) return;

        const size = this.promptSizeAndAlign("100mm", "60mm");
        if (!size) return;

        this.insertNodeAtCurrentInsertionPoint(
          this.createChartElement(sourceName, chartType, size.align, size.width, size.height)
        );
      }

      insertTextbox() {
        const text = prompt("Texto inicial:", "Textbox");
        if (text === null) return;

        const size = this.promptSizeAndAlign("80mm", "30mm");
        if (!size) return;

        this.insertNodeAtCurrentInsertionPoint(
          this.createTextboxElement(text, size.align, size.width, size.height)
        );
      }

      askChartType(defaultValue) {
        const value = prompt("Tipo do gráfico: bar, line, pie ou doughnut", defaultValue);

        if (!value) return null;

        const chartType = value.trim().toLowerCase();

        if (!["bar", "line", "pie", "doughnut"].includes(chartType)) {
          alert("Tipo inválido. Use bar, line, pie ou doughnut.");
          return null;
        }

        return chartType;
      }

      insertTable() {
        const rows = Number(prompt("Quantidade de linhas:", "3"));
        const cols = Number(prompt("Quantidade de colunas:", "3"));

        if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 1 || cols < 1) {
          alert("Informe uma quantidade válida de linhas e colunas.");
          return;
        }

        const align = this.askAlignment("left");
        if (!align) return;

        const width = prompt("Largura da tabela:", "80mm");
        if (!width) return;

        const table = this.createTableElement(rows, cols, align, width);

        this.insertNodeAtCurrentInsertionPoint(table);
      }

      createDynamicImageElement(fieldName, align, width, height) {
        const imageBox = document.createElement("span");
        imageBox.className = "dynamic-image-box";
        imageBox.contentEditable = "false";
        imageBox.dataset.wordexType = "dynamicImage";
        imageBox.dataset.fieldName = fieldName;
        imageBox.dataset.align = align;
        imageBox.style.width = width;
        imageBox.style.height = height;

        imageBox.innerHTML =
          "<span><strong>Imagem</strong>{{" +
          this.escapeHtml(fieldName) +
          "}}</span>";

        this.applyAlignment(imageBox, align);
        return imageBox;
      }

      createChartElement(sourceName, chartType, align, width, height) {
        const chartBox = document.createElement("div");
        chartBox.className = "wordex-chart-box";
        chartBox.contentEditable = "false";
        chartBox.dataset.wordexType = "chart";
        chartBox.dataset.sourceName = sourceName;
        chartBox.dataset.chartType = chartType;
        chartBox.dataset.align = align;
        chartBox.style.width = width;
        chartBox.style.height = height;

        chartBox.innerHTML = this.generateChartPlaceholderHtml(sourceName, chartType);

        this.applyAlignment(chartBox, align);
        return chartBox;
      }

      createTextboxElement(text, align, width, height) {
        const textbox = document.createElement("div");
        textbox.className = "wordex-textbox";
        textbox.contentEditable = "true";
        textbox.dataset.wordexType = "textbox";
        textbox.dataset.align = align;
        textbox.style.width = width;
        textbox.style.height = height;
        textbox.innerHTML = this.escapeHtml(text || "");

        this.applyAlignment(textbox, align);
        return textbox;
      }

      generateChartPlaceholderHtml(sourceName, chartType) {
        return `
          <span class="wordex-chart-label">
            <strong>Gráfico dinâmico</strong>
            {{${this.escapeHtml(sourceName)}}} / ${this.escapeHtml(chartType)}
          </span>
          <span class="wordex-chart-preview">
            ${this.generateChartSvg(chartType)}
          </span>
        `;
      }

      generateChartSvg(chartType) {
        if (chartType === "line") {
          return `
            <svg viewBox="0 0 220 100" preserveAspectRatio="none">
              <polyline points="14,82 48,52 84,66 120,24 156,42 192,12 208,22"
                fill="none" stroke="#555" stroke-width="4" />
              <line x1="14" y1="90" x2="208" y2="90" stroke="#bbb" stroke-width="1" />
              <line x1="14" y1="8" x2="14" y2="90" stroke="#bbb" stroke-width="1" />
            </svg>
          `;
        }

        if (chartType === "pie" || chartType === "doughnut") {
          const hole = chartType === "doughnut"
            ? '<circle cx="110" cy="50" r="22" fill="#fafafa"></circle>'
            : "";

          return `
            <svg viewBox="0 0 220 100">
              <circle cx="110" cy="50" r="42" fill="#ddd"></circle>
              <path d="M110 50 L110 8 A42 42 0 0 1 150 63 Z" fill="#aaa"></path>
              <path d="M110 50 L150 63 A42 42 0 0 1 78 78 Z" fill="#c8c8c8"></path>
              ${hole}
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 220 100" preserveAspectRatio="none">
            <rect x="24" y="28" width="26" height="62" fill="#bbb"></rect>
            <rect x="62" y="12" width="26" height="78" fill="#999"></rect>
            <rect x="100" y="48" width="26" height="42" fill="#ccc"></rect>
            <rect x="138" y="6" width="26" height="84" fill="#888"></rect>
            <rect x="176" y="24" width="26" height="66" fill="#aaa"></rect>
            <line x1="14" y1="90" x2="208" y2="90" stroke="#777" stroke-width="1"></line>
            <line x1="14" y1="8" x2="14" y2="90" stroke="#aaa" stroke-width="1"></line>
          </svg>
        `;
      }

      createTableElement(rows, cols, align, width) {
        const table = document.createElement("table");
        table.className = "wordex-table";
        table.contentEditable = "false";
        table.dataset.wordexType = "table";
        table.dataset.align = align;
        table.style.width = width;

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement("tr");

          for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");
            td.contentEditable = "true";
            td.innerHTML = "<br>";
            tr.appendChild(td);
          }

          table.appendChild(tr);
        }

        this.applyAlignment(table, align);
        return table;
      }

      askAlignment(defaultValue) {
        const value = prompt("Alinhamento: left, right, center ou free", defaultValue);
        if (!value) return null;

        const align = value.trim().toLowerCase();

        if (!["left", "right", "center", "free"].includes(align)) {
          alert("Alinhamento inválido. Use left, right, center ou free.");
          return null;
        }

        return align;
      }

      applyAlignment(element, align) {
        element.dataset.align = align;

        element.style.float = "";
        element.style.display = "";
        element.style.margin = "";
        element.style.verticalAlign = "";
        element.style.position = "";

        const isTable = element.matches("table");
        const isChart = element.matches(".wordex-chart-box");
        const isTextbox = element.matches(".wordex-textbox");

        if (align === "left") {
          element.style.float = "left";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 10px 8px 0";
          return;
        }

        if (align === "right") {
          element.style.float = "right";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "0 0 8px 10px";
          return;
        }

        if (align === "center") {
          element.style.float = "none";
          element.style.display = isTable ? "table" : (isTextbox ? "block" : "flex");
          element.style.margin = "8px auto";
          return;
        }

        if (align === "free") {
          element.style.float = "none";
          element.style.display = isTable ? "inline-table" : (isChart ? "flex" : (isTextbox ? "inline-block" : "inline-flex"));
          element.style.verticalAlign = "middle";
          element.style.margin = "4px";
        }
      }

      insertNodeAtCurrentInsertionPoint(node) {
        this.isInsertingObject = true;

        try {
          const cell = this.getSelectedCellForInsertion();

          if (cell) {
            this.insertNodeInsideSelectedTableCell(node, cell);
            return;
          }

          this.selectedCell = null;

          const paragraphElement = this.ensureParagraphForInsertion();

          if (!paragraphElement) return;

          this.insertNodeInsideCurrentParagraph(node);
        } finally {
          this.isInsertingObject = false;
        }
      }

      clearSelectedCellWhenCaretLeavesTable() {
        if (!this.selectedCell) return;

        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) return;

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        if (!element || !this.documentElement.contains(element)) return;

        if (!element.closest("td")) {
          this.selectedCell = null;
          this.selectedTableMode = null;
          this.selectedTableRow = null;
          this.selectedTableColumnIndex = null;
        }
      }

      getSelectedCellForInsertion() {
        /*
          A célula selecionada só deve vencer quando o caret/seleção atual
          estiver dentro de uma célula, ou quando não houver uma seleção útil
          no documento, como acontece depois de clicar no toolbar.

          Se o usuário colocou o caret num parágrafo fora da tabela, não pode
          continuar inserindo na última célula selecionada.
        */
        const cellFromSelection = this.getTableCellFromRangeSelection(window.getSelection());

        if (cellFromSelection) {
          return cellFromSelection;
        }

        const cellFromSavedRange = this.getTableCellFromRange(this.savedRange);

        if (cellFromSavedRange) {
          return cellFromSavedRange;
        }

        if (this.currentSelectionIsInsideDocumentButOutsideTable()) {
          this.selectedCell = null;
          return null;
        }

        if (this.selectedCell && this.documentElement.contains(this.selectedCell)) {
          return this.selectedCell;
        }

        return null;
      }

      getTableCellFromRangeSelection(selection) {
        if (!selection || selection.rangeCount === 0) return null;

        return this.getTableCellFromRange(selection.getRangeAt(0));
      }

      getTableCellFromRange(range) {
        if (!range) return null;

        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        const cell = element?.closest?.("td") || null;

        if (!cell || !this.documentElement.contains(cell)) return null;

        const table = cell.closest(".wordex-table");

        return table ? cell : null;
      }

      currentSelectionIsInsideDocumentButOutsideTable() {
        const selection = window.getSelection();

        if (!selection || selection.rangeCount === 0) {
          return false;
        }

        const range = selection.getRangeAt(0);
        const element = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
          ? range.commonAncestorContainer
          : range.commonAncestorContainer.parentElement;

        if (!element || !this.documentElement.contains(element)) {
          return false;
        }

        return !element.closest("td");
      }

      insertNodeInsideSelectedTableCell(node, cell = this.getSelectedCellForInsertion()) {
        if (!node || !cell) return;

        const paragraphForUndo = cell.closest(".paragraph");

        if (paragraphForUndo) {
          this.saveUndoCheckpointForParagraph(paragraphForUndo);
        }

        cell.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro da célula, o novo objeto
          entra depois dele.
        */
        if (this.selectedObject && cell.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (
          selection &&
          selection.rangeCount > 0 &&
          cell.contains(selection.getRangeAt(0).commonAncestorContainer)
        ) {
          range = selection.getRangeAt(0).cloneRange();

          /*
            Se o caret estiver dentro de um objeto da célula, sobe para fora.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && cell.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        /*
          Célula recém-criada costuma ter apenas <br>. Remove esse marcador
          antes de inserir objeto real.
        */
        if (cell.innerHTML.trim().toLowerCase() === "<br>") {
          cell.innerHTML = "";
          range = document.createRange();
          range.selectNodeContents(cell);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");
        range.insertNode(anchor);
        range.insertNode(node);

        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToCell(node, cell);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        const table = cell.closest(".wordex-table");

        if (table) {
          this.syncObjectAfterChange(table);
          this.selectObject(table);
          this.selectTableCell(cell);
        } else {
          this.renderSelection();
          this.saveUndoStateIfChanged();
        }

        this.savedRange = null;
      }

      limitObjectWidthToCell(object, cell) {
        if (!object || !cell) return;

        if (!object.matches(WordexEditor.objectSelector)) return;

        const cellWidth = cell.clientWidth;

        if (!cellWidth) return;

        const computed = window.getComputedStyle(object);
        const marginLeft = parseFloat(computed.marginLeft || "0") || 0;
        const marginRight = parseFloat(computed.marginRight || "0") || 0;
        const maxWidth = Math.max(30, Math.floor(cellWidth - marginLeft - marginRight - 4));
        const currentWidth = object.getBoundingClientRect().width;

        if (currentWidth > maxWidth) {
          object.style.width = maxWidth + "px";
        }
      }

      insertNodeInsideCurrentParagraph(node) {
        const paragraphElement = this.getSelectedParagraphElement();

        if (!paragraphElement) return;

        this.saveUndoCheckpointForParagraph(paragraphElement);

        paragraphElement.focus();

        const selection = window.getSelection();
        let range = null;

        /*
          Se já existe objeto selecionado dentro do parágrafo, o novo objeto
          deve ser inserido DEPOIS dele, nunca dentro dele.
          Isso evita tabela/imagem/gráfico invadindo o gráfico anterior.
        */
        if (this.selectedObject && paragraphElement.contains(this.selectedObject)) {
          range = document.createRange();
          range.setStartAfter(this.selectedObject);
          range.collapse(true);
        } else if (this.savedRange && paragraphElement.contains(this.savedRange.commonAncestorContainer)) {
          range = this.savedRange.cloneRange();

          /*
            Se a seleção salva estiver dentro de um objeto, sobe para fora dele.
          */
          const container = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
            ? range.commonAncestorContainer
            : range.commonAncestorContainer.parentElement;

          const objectInSelection = container?.closest?.(WordexEditor.objectSelector);

          if (objectInSelection && paragraphElement.contains(objectInSelection)) {
            range = document.createRange();
            range.setStartAfter(objectInSelection);
            range.collapse(true);
          }
        } else {
          range = document.createRange();
          range.selectNodeContents(paragraphElement);
          range.collapse(false);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        range.deleteContents();

        const anchor = document.createTextNode("\u200B");

        range.insertNode(anchor);
        range.insertNode(node);

        /*
          Mantém um ponto de edição depois do objeto, fora da caixa.
          Isso evita que o próximo objeto seja inserido dentro do gráfico/imagem.
        */
        const afterObjectAnchor = document.createTextNode("\u200B");
        node.after(afterObjectAnchor);

        this.limitObjectWidthToParagraph(node);

        const caretRange = document.createRange();
        caretRange.setStartAfter(afterObjectAnchor);
        caretRange.collapse(true);

        selection.removeAllRanges();
        selection.addRange(caretRange);

        this.selectedParagraphId = paragraphElement.dataset.blockId;
        this.selectedBlockId = paragraphElement.dataset.blockId;
        this.selectedObject = null;
        this.savedRange = caretRange.cloneRange();

        this.syncParagraphElement(paragraphElement);
        this.renderSelection();

        if (node.matches?.("table.wordex-table")) {
          this.ensureUndoRecordsTableInParagraph(paragraphElement);
